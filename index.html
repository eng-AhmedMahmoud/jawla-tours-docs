 حجز في أقل من 20 ثانية.\n- ضمان دعم 1,000+ مستخدم متزامن دون تدهور الأداء.\n- ضمان أمان البيانات وفقاً للمعايير الدولية.\n\n### ضمان التحديثات\n\n- جميع التحديثات الأمنية الضرورية مجانية خلال فترة الضمان.\n- توافق مستمر مع أي تحديثات لأنظمة الدفع، المتاجر، والمنصات الشريكة.\n\n### ما لا يشمله الضمان\n\n- الميزات الجديدة الكاملة التي تتجاوز نطاق المتطلبات المُعتمدة.\n- المشاكل الناتجة عن التدخل المباشر من فريق العميل في إعدادات المنصة دون استشارة الفريق المُنفِّذ.\n- المشاكل الناتجة عن خدمات طرف ثالث (مع الالتزام بالتنسيق لحلها).\n- التغييرات في سياسات الفنادق أو شركات الطيران.\n\n---\n\n## الصيانة\n\nنقدم باقة صيانة شهرية مؤسسية بقيمة **30,000 جنيه مصري شهرياً** تشمل:\n\n### الصيانة الفنية المؤسسية\n\n- **مراقبة على مدار الساعة** طوال أيام الأسبوع بفريق متخصص.\n- تطبيق التحديثات الأمنية الدورية فوراً.\n- النسخ الاحتياطي **في الوقت الفعلي** لجميع البيانات الحرجة.\n- معالجة المشاكل الطارئة بسرعة استجابة قصوى **ساعة واحدة**.\n- اختبارات أداء أسبوعية وتقارير شهرية.\n- اختبارات أمان شهرية شاملة.\n- خطط استرداد من الكوارث محدثة دائماً.\n\n### الصيانة الوظيفية\n\n- إصلاح أي خلل يظهر في جميع الميزات المُسلَّمة.\n- التوافق مع جميع تحديثات الأنظمة الخارجية.\n- ضبط الأداء وتحسين سرعة الاستجابة باستمرار.\n- تحديث أسعار الصرف ومراقبة دقتها.\n- تحديث التطبيقات لمتاجر آبل وجوجل عند الحاجة.\n\n### الدعم الفني المؤسسي\n\n- قناة دعم مخصصة بثلاث وسائط (بريد + هاتف + تطبيق محادثة).\n- **خط ساخن مخصص** للحالات الحرجة على مدار الساعة.\n- **مدير حساب مخصص** نقطة اتصال موحدة لجميع المتطلبات.\n- تقرير شهري مفصل بأنشطة الصيانة المُنفَّذة.\n- تقرير ربعي تحليلي شامل بأداء المنصة وتوصيات التحسين.\n- مراجعة استراتيجية سنوية شاملة.\n\n### حدود باقة الصيانة المؤسسية\n\n- تشمل ما يصل إلى **40 ساعة عمل شهرياً** لتنفيذ تعديلات وتحسينات.\n- إضافة محتوى وتعديلات على الواجهة بكميات كبيرة.\n- تحديث المرشحات وإضافة وجهات جديدة.\n- تعديلات على نظام التسعير وقواعده.\n- إضافة وكلاء جدد وحسابات مؤسسية جديدة.\n- التعديلات الكبيرة أو الميزات الجديدة الكبرى تُسعَّر بشكل منفصل.\n\n### الميزات الإضافية المؤسسية\n\n- جلسات استشارية شهرية مع الإدارة العليا.\n- ورش عمل ربعية لتحسين تجربة المستخدم.\n- تقارير سنوية شاملة لمراجعة الأداء وتحديد الفرص.\n- دعم في تطوير الميزات الجديدة بأسعار تفضيلية (خصم 20%).\n- تدريب دوري لأي موظفين جدد في فريق العميل.\n\n---\n\n## الافتراضات\n\nيستند هذا العرض إلى مجموعة من الافتراضات الجوهرية:\n\n1. **توفر العميل للقرارات السريعة**: يلتزم فريق جولة تورز بالرد على الاستفسارات واعتماد التصاميم خلال 5 أيام عمل كحد أقصى لكل مرحلة كبرى.\n\n2. **الحصول على بيانات الاعتماد**: يلتزم العميل بتوفير بيانات الاعتماد اللازمة من جميع مزودي الخدمات (أماديوس، مزودي الفنادق، بوابات الدفع، واتساب، أسعار الصرف، شركاء التمويل) قبل بدء كل مرحلة تكامل ذات صلة.\n\n3. **حسابات متاجر التطبيقات**: يلتزم العميل بإنشاء حسابات مطورين رسمية على متجر آبل (Apple Developer) ومتجر جوجل (Google Play Console) قبل الأسبوع الثاني عشر.\n\n4. **اتفاقيات صحيحة مع مزودي المحتوى**: يلتزم العميل بوجود اتفاقيات سارية وصحيحة مع جميع مزودي المحتوى.\n\n5. **توفر المحتوى الأولي**: يلتزم العميل بتوفير المحتوى التسويقي الأساسي الشامل خلال الأسابيع الثلاثة الأولى.\n\n6. **تثبيت نطاق المشروع**: يفترض العرض ثبات المتطلبات المُعتمدة بعد ورش العمل التفصيلية.\n\n7. **توفر بنية تحتية مؤسسية**: يفترض توفر بنية استضافة سحابية مؤسسية مناسبة لاستضافة المنصة بمستوى الأداء المطلوب.\n\n8. **التزام العميل بالاجتماعات الدورية**: يلتزم ممثلو العميل بحضور الاجتماعات الأسبوعية وورش العمل التفصيلية.\n\n9. **حساب أعمال واتساب الرسمي**: يلتزم العميل بإنشاء حساب أعمال واتساب رسمي على مستوى مؤسسي.\n\n10. **الموافقات القانونية الشاملة**: يلتزم العميل بالحصول على جميع الموافقات القانونية اللازمة لتشغيل:\n    - منصة محفظة إلكترونية\n    - نظام ولاء ومكافآت\n    - بوابة وكلاء B2B\n    - حسابات مؤسسية\n    - علامات تجارية فرعية\n\n11. **تحديد سياسات الأعمال**: يلتزم العميل بتحديد جميع سياسات الأعمال (الولاء، العمولات، التسعير، الإلغاء) خلال ورش العمل الأولى.\n\n12. **توفر فريق داخلي للتنسيق**: يلتزم العميل بتوفير فريق داخلي مكون من 3 أشخاص على الأقل (ممثل تجاري، ممثل تقني، ممثل عمليات) للتنسيق طوال المشروع.\n\n13. **اعتماد البائعين والشركاء**: يلتزم العميل باعتماد قائمة الوكلاء الأولية والحسابات المؤسسية الأولى لاختبار البوابات المخصصة.\n\n14. **الجاهزية للإطلاق المرحلي**: يقبل العميل الإطلاق المرحلي للمكونات بدلاً من الإطلاق الكلي مرة واحدة، لضمان جودة كل مكون.\n\n---\n\n## الاستثناءات\n\nلا يشمل هذا العرض البنود التالية، والتي يمكن إضافتها كخدمات مستقلة عند الحاجة:\n\n### الخدمات غير المشمولة\n\n- **إنتاج المحتوى التسويقي**: لا يشمل العرض كتابة المحتوى التسويقي، تصوير الفنادق، إنتاج الفيديوهات الترويجية، أو إعداد الكاتالوجات.\n- **الحملات التسويقية الرقمية**: لا يشمل العرض إدارة حملات إعلانية على جوجل وفيسبوك أو منصات أخرى.\n- **استراتيجية التسويق**: لا يشمل العرض وضع استراتيجية تسويقية شاملة للوكالة.\n- **خدمات تحسين محركات البحث (SEO) المتقدمة**: يشمل العرض الأساسيات فقط.\n- **ترجمة المحتوى**: لا يشمل العرض ترجمة المحتوى إلى لغات إضافية غير العربية والإنجليزية.\n- **استضافة المنصة**: تُحتسب رسوم الاستضافة منفصلة (يُمكن للطرف المُنفِّذ التوصية والإدارة).\n- **شراء النطاقات**: شراء النطاق الإلكتروني والشهادات الأمنية المميزة.\n- **الإجراءات القانونية**: التسجيلات الرسمية للشركة وعلاماتها التجارية الفرعية.\n- **تدريب المهارات العامة**: تدريب موظفي جولة تورز على مهارات خدمة العملاء والمبيعات.\n- **رسوم الخدمات الخارجية**: رسوم اشتراك واتساب الرسمية، أسعار الصرف، حسابات المطورين في المتاجر، التمويل التقسيطي - جميعها تُسدَّد مباشرة لمزوديها.\n\n### الميزات غير المشمولة\n\n- **الذكاء الاصطناعي التوليدي**: لا يشمل العرض دمج روبوتات محادثة بالذكاء الاصطناعي التوليدي (يمكن إضافتها لاحقاً).\n- **التوصيات الشخصية بالذكاء الاصطناعي**: نظام توصيات أساسي مشمول، أما التوصيات المتقدمة بنماذج التعلم الآلي فمنفصلة.\n- **الواقع الافتراضي / المعزز**: لا يشمل العرض جولات افتراضية بتقنية VR/AR للفنادق أو الوجهات.\n- **حجز الرحلات البحرية (Cruises)**: لا يشمل العرض حجز الرحلات البحرية والكروز.\n- **حجز القطارات والحافلات**: لا يشمل العرض حجز وسائل النقل البري.\n- **الأنظمة المحاسبية المتقدمة**: لا يشمل العرض نظام محاسبة كامل (يمكن التكامل مع أنظمة موجودة).\n- **التكامل مع أنظمة ERP**: يحتاج لتقييم منفصل حسب النظام المعتمد لدى العميل.\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- تنتقل ملكية الكود البرمجي للمنصة والتطبيقات إلى شركة جولة تورز بعد سداد كامل قيمة المشروع.\n- تنتقل ملكية جميع التصاميم والمواد الإبداعية المُنتَجة للعميل.\n- تحتفظ الشركة المُنفِّذة بحق الإشارة إلى المشروع كعمل مرجعي في معرض أعمالها.\n- يحتفظ الطرف المُنفِّذ بحقوق الأدوات والمكتبات الداخلية المُعاد استخدامها (يحصل العميل على حقوق الاستخدام الكامل).\n\n### 2. السرية\n\n- يلتزم الطرفان بسرية كافة المعلومات المتبادلة خلال مدة المشروع وبعدها.\n- لا يجوز لأي طرف الإفصاح عن المعلومات التجارية أو التقنية للطرف الآخر دون إذن خطي.\n- تمتد التزامات السرية لمدة 7 سنوات بعد انتهاء العقد.\n- اتفاقية عدم إفصاح (NDA) منفصلة تُوقَّع مع كل عضو من فريق العمل من الجانبين.\n\n### 3. تعديل النطاق\n\n- يجوز إجراء تعديلات على النطاق عبر طلب خطي رسمي.\n- يتم تقييم أثر التعديل على الجدول الزمني والتكلفة، ولا يبدأ التنفيذ إلا بعد اعتماد التقييم من العميل.\n- التغييرات البسيطة (أقل من 8 ساعات عمل) يتم تنفيذها ضمن النطاق دون رسوم إضافية.\n- التغييرات المتوسطة تُسعَّر بنسبة 15% خصم عن السعر القياسي.\n\n### 4. التسليم والاستلام\n\n- يُعتبر التسليم نهائياً بعد مرور 30 يوماً من تاريخ الإشعار بالاستلام دون اعتراض خطي مسبَّب.\n- يلتزم العميل بمراجعة المُخرَجات خلال هذه الفترة وتقديم ملاحظاته إن وُجدت.\n- يتم اختبار جميع الميزات بحضور ممثلي العميل قبل الإطلاق الرسمي لكل مرحلة.\n- جلسات اختبار قبول رسمية (UAT) لكل مكون رئيسي.\n\n### 5. القوة القاهرة\n\n- لا يُعتبر أي طرف مخلاً بالتزاماته إذا كان السبب راجعاً لظروف القوة القاهرة.\n- يلتزم الطرفان بإخطار بعضهما فوراً عند حدوث أي ظرف قاهر.\n\n### 6. حل النزاعات\n\n- يسعى الطرفان لحل أي خلاف ودياً عبر التفاوض المباشر.\n- في حال تعذر الحل الودي، يتم اللجوء إلى الوساطة عبر طرف ثالث مُحايد.\n- في حال استمرار الخلاف، يتم اللجوء إلى التحكيم وفق قواعد مركز القاهرة الإقليمي للتحكيم التجاري الدولي.\n- يكون التحكيم نهائياً وملزماً للطرفين.\n\n### 7. الإنهاء\n\n- يحق لأي طرف إنهاء العقد بإشعار خطي مسبق مدته 60 يوماً.\n- في حال الإنهاء، يستحق الطرف المُنفِّذ قيمة العمل المُنجَز حتى تاريخ الإنهاء.\n- يلتزم الطرف المُنفِّذ بتسليم جميع الملفات والوثائق المُنجَزة حتى تاريخ الإنهاء.\n- يتم نقل المعرفة لفريق بديل خلال فترة الإشعار.\n\n### 8. الفواتير والضرائب\n\n- جميع الأسعار لا تشمل ضريبة القيمة المضافة.\n- تُصدر الفواتير الضريبية وفق القانون المصري.\n- يلتزم الطرفان بالالتزامات الضريبية المنصوص عليها في القانون.\n\n### 9. حماية البيانات\n\n- يلتزم الطرف المُنفِّذ بحماية بيانات عملاء الوكالة وفقاً لأعلى الممارسات الدولية.\n- يلتزم الطرفان بالالتزام بأي لوائح حماية بيانات معمول بها في مصر والأسواق المُستهدَفة.\n- يلتزم الطرف المُنفِّذ بإجراء تدقيقات أمنية دورية مجانية خلال فترة الضمان.\n\n### 10. الالتزامات المتبادلة\n\n- يلتزم الطرف المُنفِّذ بتخصيص فريق عمل ثابت من 6-8 مهندسين متخصصين طوال مدة المشروع.\n- يلتزم الطرف المُنفِّذ بعدم استبدال أعضاء الفريق الرئيسيين دون إذن العميل.\n- يلتزم العميل بتوفير نقاط اتصال واضحة للقرارات السريعة.\n- يلتزم العميل بالاجتماعات الأسبوعية وورش العمل التفصيلية.\n\n### 11. ضمان عدم المنافسة\n\n- خلال فترة المشروع وسنة بعد انتهائه، يلتزم الطرف المُنفِّذ بعدم تنفيذ مشروع مماثل لأي منافس مباشر لشركة جولة تورز داخل السوق المصري.\n\n### 12. التعديلات على العقد\n\n- لا يجوز تعديل أي بند من بنود هذا العقد إلا بموافقة خطية من الطرفين.\n- جميع الملحقات والتعديلات تُعتبر جزءاً لا يتجزأ من العقد الأصلي.\n\n---\n\n## صفحة التوقيع\n\nتم إعداد هذا العرض المؤسسي بأقصى درجات الدقة والعناية ليعكس فهمنا العميق لرؤية شركة جولة تورز الاستراتيجية، والتزامنا التام بتنفيذه ضمن أعلى المعايير المهنية.\n\nنتطلع إلى **شراكة استراتيجية طويلة الأمد** تُحقق التطلعات الرقمية الكاملة للوكالة، وتفتح آفاقاً غير مسبوقة من النمو والريادة في السوق السياحي العربي.\n\n---\n\n### عن الطرف الأول (العميل)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | شركة جولة تورز للسياحة |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| رقم السجل التجاري | _______________________ |\n| رقم البطاقة الضريبية | _______________________ |\n| العنوان الرسمي | _______________________ |\n| التاريخ | ____________
