<style>

<script id="docs-data" type="application/json">{"proposals-basic":"# عرض المشروع — منصة جولة للحجز الإلكتروني (الباقة الأساسية)\n\n---\n\n<div align=\"center\">\n\n## صفحة الغلاف\n\n<br/>\n\n### عرض مشروع رسمي\n\n# منصة جولة الإلكترونية للحجز السياحي\n## الباقة الأساسية — Basic OTA Platform\n\n<br/>\n\n**مُقدَّم إلى:**\n**شركة جولة للسياحة (Jawla Tours)**\n**القاهرة، جمهورية مصر العربية**\n\n<br/>\n\n**مُقدَّم من:**\n**Tajera Software House team**\n\n<br/>\n\n| البند | التفاصيل |\n|---|---|\n| **اسم المشروع** | منصة جولة للحجز الإلكتروني — الباقة الأساسية |\n| **العميل** | شركة جولة للسياحة |\n| **الإصدار** | 1.0 |\n| **تاريخ الإصدار** | 29 يونيو 2026 |\n| **مُعدّ بواسطة** | إدارة المشاريع — Tajera Software House |\n| **مدة صلاحية العرض** | 30 يوماً من تاريخ الإصدار |\n| **مرجع المستند** | JAW-OTA-BASIC-2026-001 |\n\n<br/>\n\n> **محور المشروع:** بناء **منصة حجز رحلات الطيران المتكاملة** لشركة جولة، مُعتمدة بالكامل على نظام **Amadeus Self-Service APIs** للحصول على بيانات الطيران في الوقت الفعلي وإتمام عمليات الحجز الرسمية وإصدار التذاكر الإلكترونية.\n\n</div>\n\n---\n\n## الملخص التنفيذي\n\nتتشرف **Tajera Software House** بتقديم هذا العرض لشركة **جولة للسياحة** بهدف تحويل موقعها الحالي من مجرد واجهة تعريفية إلى **منصة حجز رحلات الطيران المتكاملة (Flight Booking Platform)** معتمدة على نظام **Amadeus** العالمي — وهو النظام الأكثر استخداماً في صناعة السياحة حول العالم.\n\nتركّز هذه الباقة على بناء **الأساس التشغيلي المتين** الذي يُمكّن جولة من بيع تذاكر الطيران إلكترونياً عبر موقع ويب متجاوب (Responsive Web) باللغتين العربية والإنجليزية، مع دعم الدفع المحلي بالجنيه المصري عبر **PayTabs** (بوابة دفع متعددة العملات).\n\n### النقاط الجوهرية للعرض\n\n| البند | القيمة |\n|---|---|\n| **الباقة** | الأساسية (Basic OTA Platform) |\n| **السعر الإجمالي** | **$15,000 دولار أمريكي** (≈ **750,000 جنيه مصري**) |\n| **مدة التنفيذ** | **3 أشهر (12 أسبوعاً)** |\n| **الصيانة الشهرية** | **10,000 جنيه مصري شهرياً** (≈ **$200 دولار شهرياً**) |\n| **الضمان** | 6 أشهر بعد التسليم |\n| **استشاري Amadeus** | 40 ساعة مُدرجة في السعر |\n| **المنصة** | ويب متجاوب فقط (لا يشمل تطبيق جوال) |\n\n### لماذا Amadeus؟\n\nاختار العميل **Amadeus** كركيزة أساسية للمشروع لأسباب استراتيجية واضحة:\n\n- ✓ **الموزّع العالمي الأول** لمحتوى الطيران (يخدم 95% من شركات السياحة في الشرق الأوسط).\n- ✓ **تغطية أكثر من 770 شركة طيران** حول العالم في واجهة برمجية موحّدة.\n- ✓ **بيانات لحظية (Real-time)** للأسعار والمقاعد المتاحة.\n- ✓ **إصدار تذاكر إلكترونية رسمية (E-tickets)** معتمدة من IATA.\n- ✓ **بيئة اختبار مجانية (Self-Service Test Environment)** تتيح بناء وتشغيل المنصة قبل الانتقال للإنتاج.\n\n### المُخرج النهائي\n\nعند اكتمال المشروع خلال 3 أشهر، ستمتلك جولة:\n\n1. **منصة ويب متجاوبة** تعمل على جميع الأجهزة (سطح المكتب، التابلت، الجوال) عبر المتصفح.\n2. **تكامل كامل مع Amadeus** لبيع تذاكر الطيران وإصدار التذاكر الإلكترونية الرسمية.\n3. **بوابة دفع متعددة العملات** (PayTabs) بالجنيه المصري.\n4. **لوحة إدارة (Admin Panel)** لمتابعة الحجوزات والمبيعات.\n5. **حسابات عملاء** مع سجل حجوزات وتذاكر إلكترونية.\n6. **نظام إشعارات بريدية** تلقائي لتأكيد الحجوزات.\n\n---\n\n## فهم احتياجات العميل\n\nبعد جلسات اكتشاف متعددة مع فريق جولة، تبلوَر التحدي الأساسي والمتطلبات الجوهرية كما يلي:\n\n### الوضع الحالي\n\nتعمل شركة جولة حالياً عبر:\n- موقع تعريفي ثابت يعرض الباقات والوجهات دون إمكانية الحجز المباشر.\n- اعتماد كامل على الاتصال الهاتفي وواتساب لإتمام أي حجز.\n- متابعة الحجوزات يدوياً عبر جداول إكسل.\n- عدم وجود بوابة دفع إلكترونية.\n\n### المتطلب المحوري (Top Priority)\n\n> **\"نريد بناء منصة حجز رحلات طيران حقيقية — مثل المواقع العالمية — تعتمد على نظام Amadeus لبيع تذاكر الطيران مباشرة من الموقع، دون تدخل بشري.\"**\n\nهذا المتطلب يضع **تكامل Amadeus** في قلب المشروع، وليس مجرد ميزة جانبية. كل قرار معماري وتقني في هذا العرض مُصمَّم حول هذا المحور.\n\n### المتطلبات الجوهرية المُستخلصة\n\n| # | المتطلب | الأولوية |\n|---|---|:---:|\n| 1 | **تكامل كامل مع Amadeus Self-Service APIs** للطيران | 🔴 حرجة |\n| 2 | بحث الرحلات وعرض الأسعار اللحظية | 🔴 حرجة |\n| 3 | إصدار تذاكر إلكترونية رسمية (E-tickets) | 🔴 حرجة |\n| 4 | دفع إلكتروني محلي بالجنيه المصري | 🔴 حرجة |\n| 5 | دعم اللغتين العربية والإنجليزية | 🟡 عالية |\n| 6 | موقع متجاوب يعمل على الجوال (Mobile-friendly Web) | 🟡 عالية |\n| 7 | لوحة إدارة لمتابعة الحجوزات | 🟡 عالية |\n| 8 | حسابات عملاء مع سجل حجوزات | 🟢 متوسطة |\n| 9 | إشعارات بريدية تلقائية | 🟢 متوسطة |\n\n### القيود المُتفق عليها لهذه الباقة\n\nلتركيز الميزانية والوقت على **محور Amadeus**، اتفقنا على استبعاد البنود التالية من هذه الباقة (يمكن إضافتها في باقات لاحقة):\n\n- ❌ **تطبيق جوال (iOS/Android)** — الاكتفاء بالويب المتجاوب.\n- ❌ **تعدد العملات** — العمل بالجنيه المصري (EGP) فقط.\n- ❌ **بوابة B2B للوكلاء** — منصة B2C فقط للعملاء النهائيين.\n- ❌ **إشعارات واتساب/SMS** — الاكتفاء بالبريد الإلكتروني.\n\n---\n\n## الأهداف التجارية\n\n| # | الهدف | المؤشر القابل للقياس |\n|---|---|---|\n| 1 | **رقمنة عملية البيع بالكامل** | تحويل 60%+ من الحجوزات اليدوية إلى آلية خلال 6 أشهر من الإطلاق |\n| 2 | **توسيع المخزون المعروض** | الانتقال من باقات ثابتة إلى **770+ شركة طيران** عبر Amadeus |\n| 3 | **خفض التكلفة التشغيلية** | تقليل الوقت المُستغرَق لكل حجز من 25 دقيقة (يدوي) إلى أقل من دقيقتين (آلي) |\n| 4 | **زيادة الإيرادات** | فتح قناة بيع 24/7 لا تتوقف على ساعات عمل الموظفين |\n| 5 | **بناء قاعدة بيانات عملاء** | تجميع بيانات العملاء وحجوزاتهم لاستخدامها في حملات إعادة التسويق |\n| 6 | **رفع الثقة بالعلامة التجارية** | إصدار تذاكر رسمية من Amadeus يرفع الموثوقية |\n| 7 | **تأسيس بنية قابلة للنمو** | البنية التحتية جاهزة لإضافة (تطبيق، B2B، عملات إضافية) في المستقبل |\n\n---\n\n## نطاق المشروع\n\nالنطاق العام للباقة الأساسية يشمل التسليمات التالية على مستوى عالٍ:\n\n### ما يشمله المشروع (In-Scope)\n\n| المجال | الوصف المختصر |\n|---|---|\n| **التكامل مع Amadeus** | ربط 6 واجهات برمجية على الأقل من Amadeus Self-Service (طيران + مرجعية) |\n| **واجهة الموقع (Frontend)** | موقع ويب متجاوب بـ Next.js يدعم العربية والإنجليزية |\n| **الخادم (Backend)** | NestJS API يُدير الحجوزات والدفع والتكامل مع Amadeus |\n| **قاعدة البيانات** | PostgreSQL لتخزين الحجوزات والمستخدمين والسجلات |\n| **بوابات الدفع** | PayTabs (بوابة دفع متعددة العملات — الجنيه المصري فقط في هذه الباقة) |\n| **حسابات المستخدمين** | تسجيل، دخول، استعادة كلمة مرور، سجل حجوزات |\n| **لوحة الإدارة** | عرض الحجوزات، إلغاء/استرداد يدوي، تقارير أساسية |\n| **الإشعارات** | بريد إلكتروني تلقائي لتأكيد الحجوزات وإرسال التذاكر |\n| **الاستضافة والنشر** | إعداد بيئة إنتاج كاملة على **Google Cloud Platform (GCP)** الخاصة بالعميل (Cloud Run + Cloud SQL + Cloud Storage) — حساب GCP **مقدَّم من العميل** والتكلفة الشهرية على عاتقه مباشرة |\n| **التدريب والتوثيق** | جلسة تدريب لفريق العميل + دليل استخدام عربي |\n\n### ما لا يشمله المشروع (Out-of-Scope)\n\nراجع قسم **\"الاستثناءات\"** أدناه للقائمة الكاملة.\n\n---\n\n## الميزات التفصيلية حسب الوحدة\n\nهذا هو القسم الجوهري في العرض. سنستعرض كل وحدة من وحدات المنصة بالتفصيل، مع التركيز على **واجهات Amadeus** المستخدمة في كل وحدة.\n\n---\n\n### 🛫 وحدة الطيران (Amadeus Self-Service Flight APIs)\n\nهذه هي **الوحدة المحورية** في المشروع. تعتمد كلياً على واجهات **Amadeus Self-Service** لتوفير تجربة بحث وحجز طيران احترافية مماثلة لكبرى منصات السفر العالمية.\n\n#### واجهات Amadeus المستخدمة في وحدة الطيران\n\n| # | الواجهة (API) | الغرض الوظيفي | متى تُستدعى |\n|:---:|---|---|---|\n| 1 | **Flight Offers Search** | البحث عن الرحلات المتاحة بين مطار المغادرة والوصول في تاريخ مُحدّد، مع عرض جميع شركات الطيران والأسعار اللحظية | عند ضغط المستخدم على زر \"بحث\" |\n| 2 | **Flight Offers Price** | التحقق من السعر النهائي للرحلة المختارة قبل الحجز (لأن الأسعار في Amadeus قد تتغير خلال ثوانٍ) | عند اختيار المستخدم لرحلة معينة قبل الانتقال لصفحة الدفع |\n| 3 | **Flight Create Orders** | إنشاء حجز رسمي (PNR) في نظام Amadeus وإصدار التذكرة الإلكترونية | بعد نجاح عملية الدفع |\n| 4 | **Flight Order Management** | استرجاع تفاصيل الحجز، تعديله، أو إلغاؤه | عند طلب العميل عرض/إلغاء حجزه |\n| 5 | **Airport & City Search** | البحث الذكي عن المطارات والمدن أثناء الكتابة (Autocomplete) — مثلاً عند كتابة \"CAI\" تظهر \"Cairo International Airport\" | في حقول \"من\" و\"إلى\" بصفحة البحث |\n| 6 | **Airline Code Lookup** | تحويل أكواد شركات الطيران (مثل \"MS\") إلى أسماء كاملة وشعارات (مثل \"EgyptAir\") | في عرض نتائج البحث وصفحات التذكرة |\n\n#### الميزات الوظيفية لوحدة الطيران\n\n✓ **بحث متعدد المسارات:** ذهاب فقط، ذهاب وعودة، رحلات متعددة المحطات (Multi-city)\n✓ **فلترة متقدمة:** حسب السعر، شركة الطيران، عدد التوقفات، مدة الرحلة، أوقات الإقلاع\n✓ **ترتيب النتائج:** الأرخص، الأسرع، الأنسب (موصى به)\n✓ **عرض تفاصيل الرحلة الكاملة:** أوقات الإقلاع/الوصول، المطار، رقم الرحلة، نوع الطائرة، مدة الترانزيت\n✓ **اختيار درجة المقصورة:** اقتصادية، أعمال، أولى (إذا كانت متاحة)\n✓ **عدد الركاب:** بالغين، أطفال، رضّع\n✓ **حجز فوري:** إصدار تذكرة إلكترونية (E-ticket) معتمدة من IATA بعد الدفع\n✓ **عرض سياسة الأمتعة وقواعد التذكرة** (Fare Rules) قبل الحجز\n✓ **رمز حجز رسمي (PNR)** يمكن للعميل استخدامه على موقع شركة الطيران مباشرة\n\n---\n\n### 💳 وحدة الدفع\n\nتدعم هذه الباقة **بوابة دفع متعددة العملات (PayTabs)** متكاملة لتغطية احتياجات السوق المصري والدولي، مع التركيز على **الجنيه المصري (EGP)** كعملة وحيدة في هذه المرحلة.\n\n#### بوابة الدفع المُدمجة\n\n| البوابة | المنطقة المستهدفة | طرق الدفع المدعومة |\n|---|---|---|\n| **PayTabs** (بوابة دفع متعددة العملات) | السوق المصري + الدولي + الخليجي | بطاقات Visa / MasterCard / Amex / Meeza، Apple Pay، Google Pay، محافظ إلكترونية محلية (مع دعم EGP/USD/EUR/SAR/AED وغيرها) |\n\n#### الميزات الوظيفية لوحدة الدفع\n\n✓ **معالجة آمنة عبر PCI-DSS** (الدفع لا يمر بسيرفر جولة إطلاقاً)\n✓ **تأكيد فوري للدفع** قبل إصدار التذكرة من Amadeus\n✓ **استرداد آلي عند فشل إصدار التذكرة** (Refund Automation)\n✓ **عرض الفاتورة** بصيغة PDF بعد الدفع\n✓ **سجل المعاملات الكامل** في لوحة الإدارة\n✓ **دعم 3D Secure** لأمان البطاقات\n\n> ⚠️ **ملاحظة:** هذه الباقة تدعم **الجنيه المصري فقط (EGP)**. دعم العملات المتعددة (USD, EUR, SAR) متاح في الباقة المتقدمة.\n\n---\n\n### 👤 وحدة حساب العميل\n\nتتيح للعملاء إنشاء حسابات شخصية وإدارة حجوزاتهم بشكل ذاتي.\n\n#### الميزات الوظيفية\n\n✓ **التسجيل عبر:** البريد الإلكتروني / Google / Facebook\n✓ **تسجيل الدخول الآمن** بكلمة مرور مُشفّرة (bcrypt)\n✓ **استعادة كلمة المرور** عبر رابط بريدي\n✓ **الملف الشخصي:** الاسم، رقم الجواز، الجنسية، تاريخ الميلاد، رقم الهاتف\n✓ **سجل الحجوزات الكامل** للرحلات مع حالة كل حجز\n✓ **تحميل التذاكر الإلكترونية** بصيغة PDF في أي وقت\n✓ **عرض تفاصيل الحجز:** رقم PNR، أوقات الرحلة، شركة الطيران، تفاصيل الدفع\n✓ **طلب إلغاء الحجز** (يتم معالجته يدوياً من الإدارة في هذه الباقة)\n✓ **حفظ بيانات المسافرين** لتسريع الحجوزات المستقبلية\n\n---\n\n### 📧 وحدة الإشعارات\n\nنظام إشعارات بريدية تلقائي يُبقي العميل على اطلاع بكل تطوّرات حجزه.\n\n#### قنوات الإشعار المدعومة في هذه الباقة\n\n| القناة | الحالة |\n|---|:---:|\n| **البريد الإلكتروني (Email)** | ✅ مدعوم |\n| WhatsApp | ❌ غير مشمول (متاح في الباقة المتقدمة) |\n| SMS | ❌ غير مشمول (متاح في الباقة المتقدمة) |\n| إشعارات الجوال (Push) | ❌ غير مشمول (يتطلب تطبيق جوال) |\n\n#### قوالب البريد الإلكتروني المُدرجة\n\n1. ✓ بريد ترحيب بعد التسجيل\n2. ✓ تأكيد التسجيل وتفعيل الحساب\n3. ✓ تأكيد استلام طلب الحجز\n4. ✓ تأكيد الدفع\n5. ✓ إرسال التذكرة الإلكترونية (مرفق PDF)\n6. ✓ تذكير قبل موعد الرحلة بـ 48 ساعة\n7. ✓ تأكيد الإلغاء والاسترداد\n8. ✓ استعادة كلمة المرور\n\n> 🛠️ **التقنية المستخدمة:** خدمة بريدية احترافية مثل **Resend** أو **SendGrid** لضمان الوصول إلى صندوق الوارد دون اعتباره Spam.\n\n---\n\n### 🖥️ لوحة الإدارة الأساسية\n\nلوحة تحكم ويب للموظفين في جولة لمتابعة العمليات اليومية.\n\n#### الميزات الوظيفية\n\n✓ **لوحة بيانات (Dashboard):** عدد الحجوزات اليومية، الإيرادات، أكثر الوجهات طلباً\n✓ **قائمة الحجوزات الكاملة:** قابلة للفلترة بالتاريخ، الحالة، شركة الطيران\n✓ **عرض تفاصيل أي حجز:** بيانات العميل، تفاصيل الرحلة، حالة الدفع، رقم PNR\n✓ **إلغاء حجز يدوياً** والتواصل مع Amadeus للاسترداد\n✓ **استرداد المبلغ (Refund)** يدوياً عبر بوابة الدفع\n✓ **إدارة المستخدمين:** عرض، تعطيل، حذف حسابات العملاء\n✓ **تقارير أساسية:** المبيعات الشهرية، أكثر شركات الطيران مبيعاً، أكثر الوجهات طلباً\n✓ **سجل العمليات (Audit Log):** كل إجراء يقوم به الموظف مُسجّل ومُؤرّخ\n✓ **صلاحيات أساسية:** Admin / Operator\n\n> ⚠️ **ملاحظة:** اللوحة الأساسية لا تشمل ميزات متقدمة مثل: نظام الترقيات (Promo Codes) المعقّد، التقارير المالية المُحاسبية، تكامل ERP — هذه ميزات الباقة المتقدمة.\n\n---\n\n### 🌐 اللغة والتجاوب\n\n#### دعم اللغات\n\n✓ **اللغة العربية** (RTL) — اللغة الأساسية\n✓ **اللغة الإنجليزية** (LTR)\n✓ تبديل سلس بين اللغتين دون إعادة تحميل\n✓ ترجمة جميع رسائل النظام والإشعارات البريدية\n\n#### التجاوب (Responsive Web)\n\n✓ تصميم **Mobile-First** يعمل بسلاسة على:\n  - 📱 الجوال (iOS Safari, Android Chrome)\n  - 📱 التابلت (iPad, Galaxy Tab)\n  - 💻 سطح المكتب (Chrome, Firefox, Safari, Edge)\n✓ سرعة تحميل **أقل من 3 ثوانٍ** على شبكة 4G\n✓ تقييم **Google PageSpeed 85+** للجوال\n\n> ❌ **هذه الباقة لا تشمل تطبيق جوال أصلي (Native iOS / Android).** المنصة تعمل عبر متصفح الجوال فقط بطريقة متجاوبة. تطبيق الجوال متاح كباقة منفصلة.\n\n---\n\n## تكامل Amadeus التفصيلي\n\nنظراً لأن **Amadeus هو العمود الفقري** للمنصة، نخصص هذا القسم لتوضيح جميع الواجهات المُستخدمة، والغرض من كل واحدة، والمرحلة التي تُستدعى فيها خلال رحلة المستخدم.\n\n### الجدول الكامل لواجهات Amadeus المُدمجة\n\n| # | اسم الواجهة (API) | الفئة | الغرض | نقطة الاستدعاء في رحلة المستخدم |\n|:---:|---|:---:|---|---|\n| 1 | **Flight Offers Search** | طيران | البحث عن جميع الرحلات المتاحة بأسعارها اللحظية | الخطوة 2 — بعد إدخال المستخدم لتفاصيل البحث |\n| 2 | **Flight Offers Price** | طيران | التحقق من السعر النهائي وقواعد التذكرة (Fare Rules) | الخطوة 4 — بعد اختيار الرحلة وقبل صفحة الدفع |\n| 3 | **Flight Create Orders** | طيران | إصدار التذكرة الإلكترونية الرسمية (E-ticket) وإنشاء PNR | الخطوة 7 — مباشرة بعد نجاح الدفع |\n| 4 | **Flight Order Management** | طيران | عرض/تعديل/إلغاء الحجز لاحقاً | عند طلب العميل لعرض حجزه أو إلغائه |\n| 5 | **Airport & City Search** | مرجعية | الإكمال التلقائي للمطارات والمدن | الخطوة 1 — أثناء كتابة المستخدم في حقل \"من/إلى\" |\n| 6 | **Airline Code Lookup** | مرجعية | تحويل أكواد شركات الطيران (MS) إلى أسماء (EgyptAir) | الخطوة 3 — عند عرض نتائج البحث |\n\n### بيئات Amadeus المستخدمة\n\n| البيئة | الاستخدام | المدة |\n|---|---|---|\n| **Test Environment** | التطوير والاختبار (مجاناً من Amadeus) | الشهر 1 والشهر 2 |\n| **Production Environment** | البيع الفعلي للعملاء | بدءاً من نهاية الشهر 3 |\n\n> 🔐 **التسجيل والاعتماد:** يتم تسجيل الحساب على [developers.amadeus.com](https://developers.amadeus.com) باسم شركة جولة. عملية الانتقال من بيئة الاختبار إلى الإنتاج تتطلب توقيع اتفاقية تجارية مع Amadeus (نقوم بمساعدة العميل خلال هذه الخطوة).\n\n### ملاحظات هامة حول تكلفة Amadeus\n\n- ✅ **بيئة الاختبار مجانية بالكامل** خلال فترة التطوير.\n- ⚠️ **بيئة الإنتاج:** Amadeus تأخذ عمولة على كل معاملة (تختلف حسب نوع المنتج وحجم المبيعات) — هذه التكلفة مباشرة بين جولة وAmadeus، وليست ضمن عرضنا.\n- 💡 نُساعد العميل خلال 40 ساعة الاستشارية في **التفاوض مع Amadeus** للحصول على أفضل شروط تجارية.\n\n---\n\n## رحلة المستخدم\n\nنستعرض هنا رحلة المستخدم النموذجية لحجز رحلة طيران، مع توضيح **متى يتم استدعاء كل واجهة من Amadeus**:\n\n### السيناريو: عميل يريد حجز رحلة من القاهرة إلى دبي\n\n| الخطوة | الإجراء | استدعاءات Amadeus |\n|:---:|---|---|\n| **1** | يدخل العميل الموقع، يبدأ كتابة \"Cair...\" في حقل \"من\" | 📡 `Airport & City Search` (Autocomplete) |\n| **2** | يكمل الحقول (من/إلى/التواريخ/الركاب) ويضغط \"بحث\" | 📡 `Flight Offers Search` — تظهر النتائج خلال ثانيتين |\n| **3** | تعرض المنصة قائمة الرحلات مع شعارات الشركات وأسعارها | 📡 `Airline Code Lookup` (لجلب اسم/شعار كل شركة) |\n| **4** | يختار العميل رحلة EgyptAir بسعر 8,500 جنيه | 📡 `Flight Offers Price` — تأكيد السعر النهائي + قواعد التذكرة |\n| **5** | يُدخل العميل بياناته (الاسم كما في الجواز، رقم الجواز، الجنسية) | — (تخزين محلي) |\n| **6** | يختار طريقة الدفع (PayTabs - فيزا) ويُدخل بيانات البطاقة | 💳 `PayTabs Payment Gateway` |\n| **7** | بعد نجاح الدفع: يصدر النظام التذكرة الإلكترونية الرسمية | 📡 `Flight Create Orders` — إصدار PNR + E-ticket |\n| **8** | يستلم العميل تأكيد الحجز على البريد مع التذكرة (PDF) | 📧 `Email Service` |\n| **9** | يظهر الحجز في لوحة \"حجوزاتي\" بحساب العميل | — (قراءة من قاعدة البيانات) |\n| **10** | إذا أراد العميل إلغاء الحجز لاحقاً، يضغط \"طلب إلغاء\" | 📡 `Flight Order Management` (عند موافقة الإدارة) |\n\n---\n\n## الفوائد لوكالة السفر\n\n### الفوائد الاستراتيجية\n\n| الفائدة | الوصف |\n|---|---|\n| 🌍 **توسعة هائلة للمخزون** | من باقات محدودة إلى 770+ شركة طيران عالمياً |\n| ⏱️ **بيع 24/7** | لا تتوقف المبيعات على ساعات عمل المكتب |\n| 💰 **خفض التكلفة التشغيلية** | تقليل عدد موظفي خدمة العملاء المطلوبين |\n| 🎯 **زيادة هامش الربح** | إمكانية إضافة عمولة (Markup) على أسعار Amadeus |\n| 🏆 **مصداقية أعلى** | إصدار تذاكر رسمية من نظام عالمي معتمد |\n| 📊 **بيانات قابلة للقياس** | معرفة دقيقة بسلوك العملاء وأكثر الوجهات طلباً |\n| 🚀 **منصة قابلة للنمو** | البنية جاهزة لإضافة (تطبيق، B2B، عملات) لاحقاً |\n| 🤝 **علاقة مباشرة مع Amadeus** | فتح أبواب لخدمات إضافية (تأمين سفر، تأجير سيارات) |\n\n### الفوائد التشغيلية\n\n- ✓ تقليل الوقت لكل حجز من 25 دقيقة إلى أقل من دقيقتين.\n- ✓ إلغاء الأخطاء البشرية في إدخال البيانات.\n- ✓ توحيد تجربة العميل عبر جميع نقاط البيع.\n- ✓ تخزين تلقائي لكل حجز في قاعدة بيانات قابلة للبحث.\n- ✓ تقارير فورية بدلاً من جداول Excel.\n\n---\n\n## الجدول الزمني\n\nمدة المشروع **3 أشهر (12 أسبوعاً)**، مُقسّمة إلى 4 مراحل متتابعة:\n\n### نظرة عامة على المراحل\n\n| المرحلة | الفترة | الاسم | النسبة |\n|:---:|:---:|---|:---:|\n| 1 | الأسبوع 1-2 | الاكتشاف والتصميم | 17% |\n| 2 | الأسبوع 3-7 | تطوير قلب المنصة (Amadeus + Backend) | 42% |\n| 3 | الأسبوع 8-10 | الواجهة + الدفع + لوحة الإدارة | 25% |\n| 4 | الأسبوع 11-12 | الاختبار، التدريب، الإطلاق | 16% |\n\n### التفصيل الأسبوعي\n\n#### 🔍 المرحلة 1 — الاكتشاف والتصميم (الأسبوع 1-2)\n\n| الأسبوع | المهام | التسليم |\n|:---:|---|---|\n| **1** | جلسات اكتشاف مع العميل، تحليل المتطلبات، الموافقة على المعمارية، تسجيل حساب Amadeus Test | وثيقة المتطلبات + المخطط المعماري |\n| **2** | تصميم UI/UX لجميع الشاشات (بحث، نتائج، دفع، حساب)، إعداد بيئة التطوير | ملفات Figma معتمدة + بيئة CI/CD جاهزة |\n\n#### ⚙️ المرحلة 2 — تطوير قلب المنصة (الأسبوع 3-7)\n\n| الأسبوع | المهام | التسليم |\n|:---:|---|---|\n| **3** | إعداد Backend (NestJS)، قاعدة البيانات، نظام المصادقة | API Boilerplate جاهز |\n| **4** | تكامل **Flight Offers Search** + **Airport & City Search** + **Airline Lookup** | بحث الرحلات يعمل بالكامل |\n| **5** | تكامل **Flight Offers Price** + **Flight Create Orders** | إصدار تذاكر تعمل في بيئة الاختبار |\n| **6** | تكامل **Flight Order Management** + إدارة الإلغاء والاسترداد | إدارة الحجوزات تعمل بالكامل |\n| **7** | بناء طبقة الكاش لتحسين الأداء + اختبارات شاملة لكل APIs الطيران | جميع APIs مُدمجة ومُختبرة |\n\n#### 🎨 المرحلة 3 — الواجهة + الدفع + الإدارة (الأسبوع 8-10)\n\n| الأسبوع | المهام | التسليم |\n|:---:|---|---|\n| **8** | بناء واجهة الموقع (Next.js) بالعربية والإنجليزية، صفحات البحث والنتائج | الواجهة الأمامية مُربوطة بـ Backend |\n| **9** | تكامل بوابة الدفع PayTabs (بوابة متعددة العملات)، اختبار سيناريوهات الدفع والاسترداد | الدفع يعمل end-to-end |\n| **10** | بناء لوحة الإدارة، حسابات العملاء، نظام الإشعارات البريدية | كل الميزات الأساسية مُسلَّمة |\n\n#### ✅ المرحلة 4 — الاختبار والإطلاق (الأسبوع 11-12)\n\n| الأسبوع | المهام | التسليم |\n|:---:|---|---|\n| **11** | اختبار شامل (QA + UAT)، تحسين الأداء، حل المشكلات، الانتقال إلى Amadeus Production | بيئة إنتاج جاهزة |\n| **12** | تدريب فريق العميل، التوثيق، الإطلاق الرسمي، بداية فترة الضمان | منصة حية + تدريب مكتمل |\n\n---\n\n## جدول الدفع\n\nالسعر الإجمالي للمشروع: **$15,000 دولار أمريكي (≈ 750,000 جنيه مصري)**\n\nسيتم تقسيم المبلغ على **4 دفعات** مرتبطة بمعالم تسليم واضحة:\n\n| # | الدفعة | النسبة | المبلغ (USD) | المبلغ (EGP) | الميعاد |\n|:---:|---|:---:|:---:|:---:|---|\n| 1 | **مقدم التعاقد** | 30% | **$4,500** | **225,000 ج.م** | عند توقيع العقد |\n| 2 | **إنهاء تكامل Amadeus** | 25% | **$3,750** | **187,500 ج.م** | نهاية الأسبوع 7 (إصدار تذكرة تجريبية ناجحة) |\n| 3 | **إنهاء الواجهة والدفع** | 25% | **$3,750** | **187,500 ج.م** | نهاية الأسبوع 10 (نهاية المرحلة 3) |\n| 4 | **التسليم النهائي والإطلاق** | 20% | **$3,000** | **150,000 ج.م** | نهاية الأسبوع 12 (إطلاق رسمي) |\n| | **الإجمالي** | **100%** | **$15,000** | **750,000 ج.م** | |\n\n### ملاحظات الدفع\n\n- ✓ سعر الصرف المعتمد: **1 USD = 50 EGP** (يُعاد تقييمه عند توقيع العقد إذا تجاوز التذبذب ±5%).\n- ✓ الدفع يمكن أن يتم بأي من العملتين (يختار العميل).\n- ✓ تُصدر فاتورة ضريبية رسمية مع كل دفعة.\n- ✓ مهلة السداد: 14 يوماً من تاريخ الفاتورة.\n\n---\n\n## استشاري Amadeus\n\nنظراً لأن **Amadeus** هو محور المشروع، ندرج ضمن العرض **40 ساعة من الاستشارات المتخصصة** مع استشاري Amadeus مُعتمد، تُستخدم خلال 6 أشهر من توقيع العقد.\n\n### ما يُقدّمه الاستشاري\n\n| المجال | التفاصيل |\n|---|---|\n| **التسجيل والاعتماد** | مساعدة جولة في فتح حساب Amadeus، اختيار الباقة الصحيحة، استكمال المستندات القانونية |\n| **التفاوض التجاري** | الحصول على أفضل عمولات وشروط من Amadeus |\n| **الانتقال للإنتاج** | إدارة عملية Go-Live من بيئة الاختبار إلى الإنتاج |\n| **المراجعة الفنية** | مراجعة طريقة استخدام كل API لضمان الكفاءة وخفض التكلفة |\n| **معالجة المشاكل** | حل المشاكل المعقّدة مع Amadeus Support |\n| **التدريب** | تدريب فريق جولة على فهم بنية Amadeus وكيفية قراءة الأخطاء |\n| **التحسين المستمر** | اقتراح APIs إضافية تناسب نمو الشركة (Insurance, Cars, Tours, ...) |\n\n### كيفية استهلاك الساعات\n\n- ✓ **20 ساعة** خلال فترة التطوير (الأشهر 1-3).\n- ✓ **20 ساعة** خلال فترة الضمان (الأشهر 4-9) عند الحاجة.\n- ✓ تُحجز الساعات مسبقاً بإشعار 48 ساعة.\n- ✓ تقارير شهرية بالساعات المستهلكة والمتبقية.\n\n---\n\n## الضمان\n\nنلتزم بضمان شامل لمدة **6 أشهر** كاملة من تاريخ الإطلاق الرسمي.\n\n### ما يشمله الضمان\n\n✓ إصلاح **جميع الأخطاء البرمجية (Bugs)** الناتجة عن التطوير، دون أي تكلفة إضافية.\n✓ تحديثات أمنية حرجة (Security Patches).\n✓ تحديثات توافق مع تحديثات Amadeus API الإلزامية.\n✓ دعم فني عبر البريد الإلكتروني (مدة الاستجابة الأولى: 24 ساعة عمل).\n✓ إصلاح مشاكل الأداء التي تُرصد خلال فترة الضمان.\n\n### ما لا يشمله الضمان\n\n❌ ميزات جديدة لم تُذكر في نطاق المشروع.\n❌ تغييرات في التصميم بناءً على طلب العميل.\n❌ أعطال ناتجة عن تغييرات يُجريها العميل بنفسه على الكود أو السيرفر.\n❌ مشاكل ناتجة عن خدمات طرف ثالث (Amadeus, PayTabs) — نُساعد في التواصل معهم لكن لا نضمن سياساتهم.\n❌ تكاليف استضافة **Google Cloud Platform (GCP)** أو خدمات Amadeus التشغيلية (يتحملها العميل مباشرة).\n\n---\n\n## الصيانة\n\nبعد انتهاء فترة الضمان (6 أشهر)، نقدم باقة صيانة شهرية اختيارية:\n\n### تفاصيل باقة الصيانة الشهرية\n\n| البند | القيمة |\n|---|---|\n| **الرسوم الشهرية** | **10,000 جنيه مصري** (≈ **$200 دولار أمريكي**) |\n| **مدة العقد الأدنى** | 6 أشهر |\n| **مدة الاستجابة** | 24 ساعة عمل (Critical: 4 ساعات) |\n| **قناة التواصل** | البريد الإلكتروني + لوحة Helpdesk |\n\n### ما تشمله الصيانة الشهرية\n\n✓ **مراقبة المنصة 24/7** مع تنبيهات تلقائية عند الأعطال.\n✓ **نسخ احتياطية يومية** لقاعدة البيانات.\n✓ **تحديثات أمنية شهرية** لجميع المكتبات.\n✓ **مراقبة استدعاءات Amadeus** والتنبيه عند أي خلل.\n✓ **تقرير شهري** يشمل: عدد الحجوزات، الأخطاء المُكتشفة والمُعالَجة، التحسينات المُقترحة.\n✓ **حتى 5 ساعات تطوير شهرياً** لتعديلات صغيرة (تحسين نص، تعديل لون، إضافة حقل).\n✓ **دعم فني للموظفين** عبر البريد الإلكتروني.\n✓ **إدارة الشهادات الأمنية (SSL)** وتجديدها تلقائياً.\n\n### ما لا تشمله الصيانة الشهرية\n\n❌ تطوير ميزات جديدة كبيرة (تُسعّر بمشروع منفصل).\n❌ تعديلات معمارية أو إعادة تصميم.\n❌ تكاليف استضافة **Google Cloud Platform (GCP)**, Amadeus، PayTabs.\n❌ ساعات استشاري Amadeus بعد استنفاد الـ 40 ساعة المُدرَجة.\n\n---\n\n## الافتراضات\n\nنبني هذا العرض على الافتراضات التالية:\n\n| # | الافتراض |\n|:---:|---|\n| 1 | يوفّر العميل **حساب Amadeus** باسم شركة جولة قبل بداية الأسبوع 3 (مع مساعدتنا). |\n| 2 | يوفّر العميل **حساب PayTabs** التجاري (بوابة دفع متعددة العملات) قبل بداية الأسبوع 9. |\n| 3 | يوفّر العميل **محتوى الموقع** (نصوص الصفحات التعريفية، الصور، الشعار) خلال الأسبوع الأول. |\n| 4 | يُعيّن العميل **مسؤول مشروع (Project Owner)** واحد ذو صلاحية اتخاذ القرار طوال مدة المشروع. |\n| 5 | يلتزم العميل بـ **مدة استجابة 48 ساعة** للموافقات والمراجعات لتجنب تأخير المشروع. |\n| 6 | يوفّر العميل **حساب Google Cloud Platform (GCP)** قبل بداية الأسبوع 4 — جميع تكاليف **الاستضافة على GCP، النطاق (Domain)، الشهادات (SSL)، الخدمات السحابية** يدفعها العميل مباشرة ولا تدخل ضمن سعر المشروع أو رسوم الصيانة. |\n| 7 | المنصة تعمل على **متصفحات حديثة** (آخر إصدارين من Chrome, Safari, Firefox, Edge). |\n| 8 | تكلفة استخدام Amadeus في بيئة الإنتاج (عمولات المعاملات) **مسؤولية العميل المباشرة**. |\n| 9 | اللغة المعتمدة للتواصل: **العربية** (مع توثيق ثنائي اللغة عند الحاجة). |\n| 10 | جميع الحقوق الفكرية للكود تنتقل للعميل **بعد سداد الدفعة الأخيرة**. |\n\n---\n\n## الاستثناءات\n\nالبنود التالية **خارج نطاق هذه الباقة بشكل صريح**. يمكن إضافتها كعروض منفصلة أو ضمن الباقات الأعلى:\n\n### استثناءات صريحة\n\n| # | البند المُستثنى | البديل |\n|:---:|---|---|\n| 1 | ❌ **تطبيق جوال (iOS / Android)** | الاكتفاء بالويب المتجاوب — متاح كباقة منفصلة |\n| 2 | ❌ **تعدد العملات** — هذه الباقة تدعم **الجنيه المصري (EGP) فقط** | متاح في الباقة المتقدمة |\n| 3 | ❌ **بوابة B2B للوكلاء وشركات السياحة الفرعية** | متاح في الباقة المتقدمة |\n| 4 | ❌ **إشعارات WhatsApp / SMS** | متاح كإضافة منفصلة (Add-on) |\n| 5 | ❌ **إشعارات Push (تتطلب تطبيق جوال)** | يأتي مع تطبيق الجوال |\n| 6 | ❌ **نظام ولاء (Loyalty / Points)** | متاح في الباقة المتقدمة |\n| 7 | ❌ **رموز خصم وعروض ترويجية معقدة** | متاح في الباقة المتقدمة |\n| 8 | ❌ **تكامل ERP / محاسبة (SAP, Oracle, QuickBooks)** | يُسعّر كمشروع منفصل |\n| 9 | ❌ **تأمين سفر، تأجير سيارات، تذاكر فعاليات** | متاح في الباقة المتقدمة (Amadeus Insurance API + Cars API) |\n| 9.1 | ❌ **لا يشمل العرض حجز الفنادق** — تم استبعاد وحدة الفنادق من جميع الباقات بناءً على طلب العميل، والتركيز على وحدة الطيران فقط | — |\n| 10 | ❌ **شاتبوت ذكي / مساعد بالذكاء الاصطناعي** | يُسعّر كمشروع منفصل |\n| 11 | ❌ **تحليلات متقدمة / لوحات BI** | متاح في الباقة المتقدمة |\n| 12 | ❌ **حملات التسويق الإلكتروني (SEO, SEM, Social Ads)** | خدمة منفصلة |\n| 13 | ❌ **استضافة المنصة على Google Cloud Platform (GCP) وتكاليف الخوادم الشهرية** | حساب GCP مقدَّم من العميل ورسومه على نفقته مباشرة |\n| 14 | ❌ **عمولات Amadeus التشغيلية في الإنتاج** | على نفقة العميل |\n| 15 | ❌ **رسوم PayTabs لكل معاملة** | على نفقة العميل |\n| 16 | ❌ **لوحة تحكم مخصصة للعميل (Custom User Dashboard)** — هذه الميزة متوفرة فقط في باقة Enterprise | تتوفر في Enterprise |\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- جميع حقوق ملكية الكود المصدري للمنصة تنتقل بالكامل لشركة جولة بعد **سداد الدفعة النهائية**.\n- يحتفظ Tajera بحق استخدام **أساليب وأنماط التطوير العامة** (لا الكود الخاص بجولة) في مشاريع أخرى.\n- يحق لTajera ذكر اسم جولة كعميل في الموقع التعريفي وملف الأعمال (بإذن العميل).\n\n### 2. السرية (NDA)\n\n- جميع المعلومات التجارية والفنية المتبادلة تُعتبر **سرية** ولا تُكشف لأي طرف ثالث.\n- يلتزم الطرفان بحماية بيانات العملاء وفق **لوائح حماية البيانات الدولية (GDPR)** والمحلية.\n- بنود السرية سارية لمدة **3 سنوات** بعد انتهاء المشروع.\n\n### 3. التعديلات على النطاق\n\n- أي تعديل على النطاق الأصلي يتطلب **طلب تغيير رسمي (Change Request)** موقّع من الطرفين.\n- تُسعّر التعديلات بسعر **$50 / الساعة** (≈ 2,500 جنيه/الساعة) لمطور Senior.\n- تعديلات تتجاوز 10% من النطاق الأصلي قد تؤثر على الجدول الزمني.\n\n### 4. التأخير والقوة القاهرة\n\n- تأخير العميل في تقديم البيانات أو الموافقات لأكثر من **5 أيام عمل** يُمدد الجدول الزمني بنفس المدة.\n- لا يتحمل أي طرف مسؤولية التأخير الناتج عن **قوة قاهرة** (كوارث، حروب، أزمات إنترنت عامة).\n\n### 5. الإلغاء\n\n- في حال إلغاء العميل للمشروع، يحتفظ Tajera بـ **المبالغ المُسدّدة** + **تكلفة العمل المُنجَز** حتى تاريخ الإلغاء.\n- في حال إخلال Tajera الجوهري، يحق للعميل استرداد **الدفعات مقابل التسليمات غير المكتملة**.\n\n### 6. حل النزاعات\n\n- يسعى الطرفان لحل أي نزاع **ودياً** خلال 30 يوماً.\n- في حال الفشل، يُحال النزاع إلى **التحكيم في القاهرة** وفقاً لقواعد مركز القاهرة الإقليمي للتحكيم التجاري (CRCICA).\n- القانون الحاكم: **القانون المصري**.\n\n### 7. حدود المسؤولية\n\n- لا تتجاوز مسؤولية Tajera في أي حال إجمالي قيمة المشروع المُسددة فعلياً.\n- لا يتحمل Tajera أي خسائر غير مباشرة (مثل خسائر الأرباح، فقدان البيانات بسبب طرف ثالث).\n\n### 8. المصداقية\n\n- يلتزم Tajera بمعايير الجودة المهنية وأفضل ممارسات صناعة البرمجيات.\n- جميع الأكواد مكتوبة وفق معايير الأمان (OWASP Top 10).\n\n---\n\n## صفحة التوقيع\n\nبتوقيع هذا المستند، يُقرّ الطرفان بقراءة وفهم وقبول جميع البنود الواردة فيه.\n\n---\n\n### بيانات العميل\n\n**شركة جولة للسياحة (Jawla Tours)**\n\n| البند | التفاصيل |\n|---|---|\n| **الاسم الكامل** | _______________________________ |\n| **المنصب** | _______________________________ |\n| **التاريخ** | _______________________________ |\n| **التوقيع** | _______________________________ |\n| **الختم الرسمي** | _______________________________ |\n\n<br/>\n\n---\n\n### بيانات مُقدّم الخدمة\n\n**Tajera Software House**\n\n| البند | التفاصيل |\n|---|---|\n| **الاسم الكامل** | _______________________________ |\n| **المنصب** | المدير التنفيذي |\n| **التاريخ** | _______________________________ |\n| **التوقيع** | _______________________________ |\n| **الختم الرسمي** | _______________________________ |\n\n<br/>\n\n---\n\n<div align=\"center\">\n\n**انتهى المستند**\n\n**عرض المشروع — منصة جولة للحجز الإلكتروني (الباقة الأساسية)**\n\nالإصدار 1.0 — 29 يونيو 2026\n\n**$15,000 USD (≈ 750,000 EGP) — 3 أشهر — صيانة 10,000 EGP/شهرياً (≈ $200)**\n\n> _\"نبني معك أساس منصة حجز رحلات الطيران المتكاملة على Amadeus، خطوة بخطوة.\"_\n\nTajera Software House | [tajera.net](https://tajera.net)\n\n</div>\n","proposals-professional":"# عرض مشروع منصة الحجوزات الإلكترونية — الباقة الاحترافية\n\n## Jawla Tours — Professional OTA Package\n\n---\n\n## صفحة الغلاف\n\n<div align=\"center\">\n\n# 🌍 عرض احترافي لبناء منصة حجوزات سياحية متكاملة\n\n### **Jawla Professional OTA Platform**\n\n---\n\n**العميل المُكرَّم:** السيد/ صاحب شركة Jawla Tours\n**المُورِّد:** فريق التطوير المتخصص — Tajera Software House\n**رقم العرض:** JAWLA-PRO-2026-002\n**إصدار المستند:** v1.0 (نهائي)\n**تاريخ الإصدار:** 30 يونيو 2026\n**صلاحية العرض:** 30 يومًا من تاريخ الإصدار\n\n---\n\n| البند | التفصيل |\n|------|---------|\n| **اسم الباقة** | الباقة الاحترافية (Professional OTA) |\n| **مدة التنفيذ** | 4 أشهر (16 أسبوعًا) |\n| **السعر الإجمالي** | **18,000 دولار أمريكي** (≈ **900,000 جنيه مصري**) |\n| **الصيانة الشهرية** | 15,000 جنيه مصري شهريًا (≈ 300 دولار أمريكي) |\n| **فترة الضمان** | 6 أشهر بعد الإطلاق |\n| **نموذج التسليم** | تطبيق ويب متجاوب (Responsive Web) — بدون تطبيق جوال |\n\n---\n\n> *\"نبني منصة حجز رحلات الطيران المتكاملة بمستوى عالمي، مدعومة بتكامل عميق مع Amadeus Flight APIs، ومحفظة إلكترونية متعددة العملات، تتيح لعملائك تجربة حجز طيران سلسة وذكية.\"*\n\n</div>\n\n---\n\n## الملخص التنفيذي\n\nتُمثِّل هذه الوثيقة عرضًا تجاريًا وفنيًا متكاملًا لبناء **منصة حجز رحلات الطيران المتكاملة (Flight Booking Platform)** لصالح **Jawla Tours**، بهدف نقل الوكالة من نموذج العمل التقليدي إلى نموذج رقمي متقدِّم يُنافس المنصات الإقليمية والعالمية مثل Wego وAlmosafer وTajawal في تجربة حجز الطيران.\n\nتتمحور الباقة الاحترافية حول **ثلاث ركائز رئيسية** تُشكِّل فارقًا تنافسيًا حقيقيًا:\n\n### 🛫 الركيزة الأولى: تكامل Amadeus الموسَّع\n\nنقدِّم في هذه الباقة **تغطية شاملة لمكتبة Amadeus Self-Service APIs** بما يتجاوز الباقة الأساسية بمراحل، ويشمل ذلك:\n\n- **Flight Inspiration Search** — إلهام العميل بوجهات سفر بناءً على ميزانيته\n- **Flight Cheapest Date Search** — اقتراح أرخص التواريخ للسفر إلى وجهة محددة\n- **Flight Most Booked Destinations** — عرض الوجهات الأكثر حجزًا حسب موسم العام\n- **Seat Maps Display** — عرض خرائط المقاعد المباشرة من شركات الطيران\n- **Branded Fares Upsell** — بيع باقات أعلى (Economy Plus, Business Lite, إلخ)\n- **On-Demand Flight Status** — حالة الرحلة في الوقت الفعلي\n- **Flight Delay Prediction** — توقُّع تأخُّر الرحلة بدقة ذكاء اصطناعي\n- **Trip Purpose Prediction** — تحديد طبيعة الرحلة (عمل/ترفيه) للتوصيات\n- **Travel Recommendations** — توصيات ذكية مبنية على الوجهة والسلوك\n- **Airline Code Lookup** — بحث وتوثيق ذكي لرموز شركات الطيران\n\n### 💳 الركيزة الثانية: المحفظة متعددة العملات\n\nنُقدِّم **محفظة إلكترونية داخلية (E-Wallet)** تدعم خمس عملات: **EGP, USD, EUR, SAR, AED**، تتيح للعميل:\n\n- شحن رصيد بأي عملة عبر PayTabs (بوابة دفع متعددة العملات)\n- تحويل المبالغ المسترَدَّة (Refunds) مباشرة إلى المحفظة لإعادة الاستخدام\n- الدفع الفوري بدون إعادة إدخال بيانات البطاقة\n- استخدام نقاط الولاء كائتمان داخل المحفظة\n\n### 🔄 الركيزة الثالثة: بوابة الخدمة الذاتية للعميل\n\nتمكين العميل من إدارة حجوزاته **دون الحاجة إلى التواصل مع مكتب الوكالة**:\n\n- إلغاء حجز فردي مع احتساب رسوم الإلغاء آليًا\n- طلب استرداد رقمي (Refund Request) مع تتبُّع الحالة\n- تعديل تاريخ الرحلة مع احتساب فرق السعر الفوري\n- إعادة إصدار تذكرة إلكترونية في حال فقدانها\n\n### النتيجة المتوقعة\n\nنتوقَّع — بناءً على معايير الصناعة في منطقة الشرق الأوسط — أن تُحقِّق Jawla Tours خلال الأشهر الستة الأولى من إطلاق المنصة الاحترافية:\n\n- زيادة في معدَّل التحويل (Conversion Rate) بنسبة 40-60%\n- ارتفاع متوسط قيمة الحجز (AOV) بنسبة 25-35% بفعل Branded Fares Upsell\n- خفض التكلفة التشغيلية لخدمة العملاء بنسبة 30-45% بفعل الخدمة الذاتية\n- بناء قاعدة عملاء مُكرَّرين (Repeat Customers) عبر نظام النقاط والمحفظة\n\n---\n\n## فهم احتياجات العميل\n\nمن خلال جلسات الاستكشاف الأولية مع فريق Jawla Tours، رصدنا التحديات والاحتياجات التالية التي تُشكِّل الأساس الذي بُني عليه هذا العرض:\n\n### 🎯 التحديات الحالية\n\n| # | التحدي | الأثر التجاري الحالي |\n|---|--------|----------------------|\n| 1 | الاعتماد الكامل على الحجز اليدوي عبر الهاتف والواتساب | تأخُّر في الردود + ضياع فرص ليلية وخارج ساعات العمل |\n| 2 | محدودية البحث في خيارات الطيران (مزوِّد واحد فقط) | عرض أسعار أعلى من المنافسين |\n| 3 | عدم وجود نظام دفع إلكتروني آمن للعملاء الأجانب | فقدان شريحة العملاء الخليجيين والأوروبيين |\n| 4 | تَكدُّس طلبات الاسترداد والإلغاء لدى الفريق | إرهاق تشغيلي وتأخُّر في معالجة الطلبات |\n| 5 | غياب التحليلات الدقيقة عن سلوك العملاء | قرارات تسويقية مبنية على الحدس لا البيانات |\n| 6 | عدم وجود برنامج ولاء يُكافئ العملاء المتكرِّرين | معدَّل احتفاظ منخفض بالعملاء |\n\n### ✅ الاحتياجات الجوهرية المُستخلصة\n\n1. **منصة ويب متجاوبة** تعمل بكفاءة على الحاسوب والهاتف والتابلت\n2. **تكامل مباشر مع Amadeus Flight APIs** لتوفير أوسع تشكيلة طيران بأفضل الأسعار\n3. **محفظة إلكترونية متعددة العملات** لاستهداف السوقين المحلي والخليجي\n4. **بوابة خدمة ذاتية** لتقليل الضغط على فريق خدمة العملاء\n5. **نظام ولاء وتسويق ذكي** يُحفِّز إعادة الحجز\n6. **لوحة إدارة شاملة** تُمكِّن الإدارة من اتخاذ قرارات مبنية على بيانات حقيقية\n\n---\n\n## الأهداف التجارية\n\nتستهدف الباقة الاحترافية تحقيق **مجموعة أهداف تجارية مُقاسة (KPIs)** على المديين القصير والمتوسط:\n\n### 🎯 الأهداف قصيرة المدى (6 أشهر بعد الإطلاق)\n\n| الهدف | المؤشر المُستهدف |\n|------|------------------|\n| إطلاق منصة احترافية | الإطلاق الرسمي خلال 4 أشهر |\n| تحويل 60% من الحجوزات اليدوية إلى رقمية | قياس عبر تقارير CRM وAdmin Panel |\n| استقطاب 500 مستخدم مُسجَّل في أول 90 يومًا | لوحة المستخدمين النشطين |\n| تحقيق معدَّل تحويل ≥ 3.5% | Google Analytics / Mixpanel |\n| تشغيل المحفظة متعددة العملات بأكثر من 3 عملات نشطة | تقارير المعاملات المالية |\n\n### 🚀 الأهداف متوسطة المدى (12 شهرًا)\n\n| الهدف | المؤشر المُستهدف |\n|------|------------------|\n| الوصول إلى 2,000 حجز شهري | لوحة الإدارة |\n| تحقيق نسبة عملاء مُكرَّرين (Repeat Rate) ≥ 35% | عبر نظام الولاء |\n| تقليل تكلفة الاستحواذ على العميل (CAC) بنسبة 30% | Marketing Reports |\n| رفع متوسط قيمة الحجز (AOV) بنسبة 25% | عبر Branded Fares Upsell |\n\n---\n\n## نطاق المشروع\n\nتُغطِّي هذه الباقة **نطاق عمل شامل ومُحدَّد بدقة** يُسلِّم منتجًا جاهزًا للاستخدام التجاري الفوري، ويشمل:\n\n### ✅ ما يشمله النطاق\n\n- تصميم تجربة مستخدم احترافية (UX) وواجهات استخدام (UI) باللغتين العربية والإنجليزية\n- تطوير الواجهة الأمامية (Frontend) كتطبيق ويب متجاوب (Responsive Web App)\n- بناء الواجهة الخلفية (Backend) باستخدام بنية Microservices مرنة وقابلة للتوسُّع\n- التكامل العميق مع Amadeus Self-Service APIs (الطيران + التحليلات + ميزات الإلهام والتنبؤ)\n- التكامل مع بوابة دفع PayTabs (بوابة دفع متعددة العملات تدعم EGP/USD/EUR/SAR/AED وغيرها)\n- بناء محفظة إلكترونية متعددة العملات داخل المنصة\n- بناء نظام نقاط ولاء (Loyalty Points)\n- بناء بوابة خدمة ذاتية للعميل (Self-Service Portal)\n- بناء لوحة إدارة احترافية (Admin Panel) مع تحليلات وتقارير\n- وحدة إشعارات متعددة القنوات (Email + WhatsApp Business API + SMS اختياري)\n- اختبارات شاملة (Unit + Integration + E2E + UAT)\n- نشر كامل على بيئة إنتاج آمنة على **Google Cloud Platform (GCP)** الخاصة بالعميل (Cloud Run + Cloud SQL + Cloud Storage + Pub/Sub) — حساب GCP مقدَّم من العميل\n- توثيق فني وتدريب فريق Jawla Tours على استخدام المنصة\n\n### ❌ ما لا يشمله النطاق\n\n(تُفصَّل في قسم **الاستثناءات** أدناه — أبرزها: لا تطبيقات جوال، لا بوابة B2B، لا White-Label)\n\n---\n\n## الميزات التفصيلية حسب الوحدة\n\nنُقدِّم في هذا القسم **التفصيل الكامل لكل وحدة وظيفية** ضمن المنصة، مع توضيح الميزات الفرعية والقيمة التجارية لكل منها.\n\n---\n\n### 🛫 وحدة الطيران الموسَّعة (Amadeus Self-Service Flight APIs — Extended)\n\nهذه الوحدة هي **القلب النابض للمنصة الاحترافية**، وتُمثِّل أوسع تغطية لمكتبة Amadeus Self-Service في السوق المصري والإقليمي.\n\n#### الميزات الأساسية (تشمل ما تتضمَّنه الباقة الأساسية)\n\n| # | الميزة | API المُستخدمة | الوصف |\n|---|--------|----------------|-------|\n| 1 | بحث الرحلات | Flight Offers Search | بحث متقدِّم بمعايير متعدِّدة (تواريخ، عدد ركاب، درجة، رحلات مباشرة) |\n| 2 | تفاصيل العرض | Flight Offers Price | تأكيد السعر الفعلي قبل الحجز |\n| 3 | إنشاء الحجز | Flight Create Orders | إصدار PNR وتأكيد الحجز |\n| 4 | استرجاع الحجز | Flight Order Management | عرض تفاصيل الحجز الحالية |\n| 5 | إلغاء الحجز | Flight Order Cancel | إلغاء الحجز مع احتساب الرسوم |\n| 6 | بحث المطارات | Airport & City Search | بحث ذكي بأسماء المطارات والمدن |\n| 7 | إكمال تلقائي للوجهات | Airport Nearest Relevant | اقتراح أقرب المطارات تلقائيًا |\n\n#### الميزات المتقدِّمة (حصرية للباقة الاحترافية) ✨\n\n| # | الميزة | API المُستخدمة | القيمة التجارية |\n|---|--------|----------------|------------------|\n| 8 | **إلهام السفر** | Flight Inspiration Search | \"إلى أين يمكنني السفر بـ 300 دولار؟\" — يجذب العميل المتردِّد |\n| 9 | **أرخص التواريخ** | Flight Cheapest Date Search | \"متى يكون السفر إلى دبي أرخص؟\" — يزيد معدَّل التحويل |\n| 10 | **الوجهات الأكثر حجزًا** | Flight Most Booked Destinations | عرض ترندات الحجز موسميًا — يُساعد التسويق |\n| 11 | **خرائط المقاعد** | SeatMap Display | عرض خرائط المقاعد المباشرة قبل الحجز |\n| 12 | **بيع باقات Branded Fares** | Branded Fares Upsell | رفع متوسط الفاتورة بنسبة 15-25% |\n| 13 | **حالة الرحلة الفورية** | On-Demand Flight Status | تتبُّع لحظي لحالة الرحلة (مُؤكَّدة، مُلغاة، مُتأخِّرة) |\n| 14 | **توقُّع التأخُّر** | Flight Delay Prediction | تنبيه ذكي للعميل قبل التأخُّر بساعات |\n| 15 | **توقُّع طبيعة الرحلة** | Trip Purpose Prediction | تصنيف ذكي للرحلة (عمل/ترفيه) لتخصيص العروض |\n| 16 | **توصيات السفر** | Travel Recommendations | اقتراحات وجهات مشابهة بناءً على السلوك |\n| 17 | **بحث رموز شركات الطيران** | Airline Code Lookup | توثيق ذكي للرموز IATA/ICAO |\n\n---\n\n### 💳 وحدة الدفع متعدِّد العملات\n\nدعم شامل للدفع المحلي والدولي عبر بوابة موحّدة متعددة العملات:\n\n#### بوابة الدفع المُتكامِلة\n\n| البوابة | السوق المُستهدَف | الميزات |\n|---------|-------------------|---------|\n| **PayTabs** (بوابة دفع متعددة العملات) | محلي + دولي + خليجي (EGP, USD, EUR, SAR, AED وغيرها) | Visa, Mastercard, Amex, Meeza, Apple Pay, Google Pay، محافظ إلكترونية محلية |\n\n#### العملات المدعومة\n\n| الرمز | العملة | الاستخدام الأساسي |\n|------|--------|--------------------|\n| **EGP** | الجنيه المصري | الافتراضية للعملاء المصريين |\n| **USD** | الدولار الأمريكي | المعاملات الدولية وعملاء B2C العالميين |\n| **EUR** | اليورو | عملاء أوروبا |\n| **SAR** | الريال السعودي | السوق السعودي والخليجي |\n| **AED** | الدرهم الإماراتي | السوق الإماراتي |\n\n#### ميزات إضافية\n\n- **تحويل تلقائي للعملات** (Dynamic Currency Conversion) بأسعار محدَّثة كل 4 ساعات\n- **حفظ بطاقات العميل بأمان** (Card Tokenization) عبر PayTabs Vault\n- **دعم الدفع بالتقسيط** عبر شركاء PayTabs (للسوق المصري)\n- **استرداد إلكتروني آلي** (Auto Refund) عبر نفس بوابة الدفع\n- **بروتوكول 3D Secure 2.0** لجميع المعاملات الدولية\n\n---\n\n### 👛 محفظة العميل الإلكترونية\n\nمحفظة داخلية كاملة الميزات تُمثِّل **عنصر تمييز رئيسي** للمنصة:\n\n| # | الميزة | الوصف |\n|---|--------|-------|\n| 1 | **رصيد متعدِّد العملات** | محفظة لكل عميل تحفظ رصيدًا بكل عملة على حِدة |\n| 2 | **شحن المحفظة** | إيداع رصيد عبر PayTabs (بوابة دفع متعددة العملات) أو تحويل بنكي |\n| 3 | **الدفع من المحفظة** | الدفع الفوري بدون إعادة إدخال بيانات البطاقة |\n| 4 | **استلام المبالغ المُسترَدَّة** | تحويل Refunds مباشرة إلى المحفظة بدلًا من البطاقة |\n| 5 | **تحويل الرصيد بين العملات** | تحويل داخلي بسعر اللحظة |\n| 6 | **سجل المعاملات** | عرض كامل لكل عملية إيداع/سحب/تحويل |\n| 7 | **تنبيهات الرصيد المنخفض** | إشعار العميل عند انخفاض الرصيد قبل الحجز |\n| 8 | **حماية المحفظة** | تأكيد OTP لأي عملية سحب فوق 1000 جنيه |\n\n---\n\n### 🎁 نظام نقاط الولاء (Jawla Rewards)\n\nبرنامج ولاء متكامل لتحفيز إعادة الحجز:\n\n#### كيفية اكتساب النقاط\n\n| النشاط | النقاط المُستحقَّة |\n|--------|---------------------|\n| كل 100 جنيه إنفاق على رحلة طيران | 1 نقطة |\n| التسجيل لأول مرة | 100 نقطة ترحيبية |\n| إكمال الملف الشخصي | 50 نقطة |\n| تقييم تجربة الحجز | 20 نقطة |\n| دعوة صديق (Referral) — عند أول حجز | 200 نقطة |\n\n#### كيفية استبدال النقاط\n\n- **خصم نقدي:** 100 نقطة = 5 جنيهات خصم\n- **ترقية مقعد:** استبدال نقاط لترقية درجة السفر\n- **خصومات حصرية:** عروض موسمية لأصحاب النقاط المرتفعة\n- **التحويل إلى المحفظة:** تحويل النقاط إلى رصيد محفظة قابل للسحب\n\n#### المستويات (Tiers)\n\n| المستوى | النقاط المطلوبة | المزايا |\n|--------|------------------|---------|\n| 🥉 Bronze | 0 — 999 | المزايا الأساسية |\n| 🥈 Silver | 1,000 — 4,999 | خصم 5% إضافي + شحن مجاني |\n| 🥇 Gold | 5,000 — 14,999 | خصم 10% + أولوية خدمة العملاء |\n| 💎 Platinum | 15,000+ | خصم 15% + مدير حساب مخصَّص |\n\n---\n\n### 🔄 بوابة الخدمة الذاتية للعميل (Self-Service Portal)\n\nتمكين العميل من إدارة حجوزاته **دون الحاجة إلى التواصل مع الوكالة**:\n\n| # | الميزة | تفاصيل التنفيذ |\n|---|--------|-----------------|\n| 1 | **إلغاء حجز ذاتي** | احتساب رسوم الإلغاء آليًا من شركة الطيران |\n| 2 | **طلب استرداد رقمي** | تعبئة نموذج رقمي مع تتبُّع حالة الطلب (Pending / Approved / Completed) |\n| 3 | **تعديل تاريخ الرحلة** | عرض فرق السعر فوريًا قبل التأكيد |\n| 4 | **إعادة إصدار التذكرة** | تنزيل تذكرة PDF موقَّعة إلكترونيًا في أي وقت |\n| 5 | **تحديث بيانات المسافر** | تعديل الاسم/الجواز/الجنسية (وفق سياسة شركة الطيران) |\n| 6 | **عرض كل الحجوزات** | لوحة موحَّدة لكل الحجوزات السابقة والقادمة والمُلغاة |\n| 7 | **تحميل الفواتير** | إصدار فاتورة ضريبية بصيغة PDF |\n| 8 | **استلام تأكيدات** | استلام كل التأكيدات عبر البريد والواتساب |\n\n---\n\n### 💬 وحدة الإشعارات المتعدِّدة\n\nنظام إشعارات متعدِّد القنوات يضمن وصول كل المعلومات الحرجة للعميل:\n\n| القناة | الاستخدامات | المُزوِّد |\n|--------|--------------|----------|\n| **📧 البريد الإلكتروني** | تأكيد الحجز، الفواتير، النشرات التسويقية | SendGrid / Resend |\n| **💬 WhatsApp Business API** | تأكيد الحجز، تنبيهات الرحلة، الاسترداد | Meta WhatsApp Cloud API |\n| **📱 SMS (اختياري)** | OTP، تنبيهات حرجة فقط | Vonage / Twilio |\n| **🔔 إشعارات داخل المنصة** | كل التحديثات داخل لوحة العميل | داخلي (WebSocket) |\n\n#### أمثلة على الإشعارات\n\n- ✅ **عند الحجز:** تأكيد فوري عبر البريد + WhatsApp\n- ⏰ **قبل الرحلة بـ 24 ساعة:** تذكير وتعليمات سفر\n- ⚠️ **عند تأخُّر الرحلة:** تنبيه فوري مع الوقت الجديد\n- 💰 **عند استلام الاسترداد:** إشعار بإيداع المبلغ في المحفظة\n- 🎁 **عروض موسمية:** نشرات تسويقية مُستهدَفة\n\n---\n\n### 📊 لوحة الإدارة المتقدِّمة (Advanced Admin Panel)\n\nلوحة تحكُّم احترافية تُمكِّن إدارة Jawla من السيطرة الكاملة على عمليات المنصة:\n\n#### الأقسام الرئيسية\n\n| القسم | الوظائف الرئيسية |\n|-------|-------------------|\n| **📈 لوحة المؤشرات (Dashboard)** | KPIs لحظية: المبيعات، الحجوزات، العملاء النشطون، الإيرادات |\n| **🛫 إدارة الحجوزات** | عرض/تعديل/إلغاء أي حجز يدويًا، إعادة إصدار التذاكر |\n| **👥 إدارة العملاء (CRM)** | ملف كامل لكل عميل، سجل الحجوزات، نقاط الولاء، الرصيد |\n| **💰 إدارة المعاملات المالية** | كل الدفعات، الاستردادات، تقارير العملات، التسويات |\n| **🎫 إدارة الاسترداد** | معالجة طلبات الاسترداد، الموافقة/الرفض، التتبُّع |\n| **📊 التقارير والتحليلات** | تقارير المبيعات اليومية/الأسبوعية/الشهرية، أفضل الوجهات |\n| **👤 إدارة الموظفين والصلاحيات** | إنشاء حسابات للموظفين بصلاحيات مُحدَّدة (RBAC) |\n| **💼 عمولات الوكلاء** | احتساب عمولات الموظفين تلقائيًا حسب المبيعات |\n| **🔧 إعدادات النظام** | تخصيص العملات، رسوم الخدمة، قواعد الاسترداد |\n| **📰 إدارة المحتوى (CMS)** | تحرير صفحات الوجهات، البنرات، العروض الترويجية |\n\n#### التحليلات المُتقدِّمة\n\n- **Cohort Analysis:** تحليل سلوك العملاء حسب فترة التسجيل\n- **Funnel Analytics:** تحليل قمع التحويل (بحث → عرض → حجز → دفع)\n- **Heat Maps:** خرائط حرارية لأكثر الوجهات والمسارات بحثًا\n- **Revenue Forecasting:** توقُّعات الإيرادات بناءً على البيانات التاريخية\n\n---\n\n### 🌐 اللغة والتجاوب\n\n- ✅ **دعم كامل للعربية والإنجليزية** مع إمكانية إضافة لغات إضافية مستقبلًا\n- ✅ **RTL/LTR Support** كامل في جميع الواجهات\n- ✅ **Responsive Web Design** يعمل بكفاءة على كل الأجهزة:\n  - 🖥️ شاشات الحاسوب (Desktop ≥ 1280px)\n  - 💻 شاشات اللاب توب (Laptop 1024px — 1279px)\n  - 📱 الأجهزة اللوحية (Tablet 768px — 1023px)\n  - 📲 الهواتف المحمولة (Mobile ≤ 767px)\n- ❌ **لا يتضمَّن هذا العرض تطبيقات جوال أصلية (Native Mobile Apps)** — راجع قسم الاستثناءات\n\n---\n\n## تكامل Amadeus التفصيلي\n\nنُقدِّم هنا **خريطة كاملة لكل API ستُستخدم من مكتبة Amadeus Self-Service** ضمن هذه الباقة:\n\n### جدول تكامل Amadeus الشامل\n\n| المجموعة | اسم الـ API | الغرض الوظيفي | الوحدة المُستخدِمة |\n|----------|--------------|----------------|----------------------|\n| **Flights — Search** | Flight Offers Search | البحث الأساسي عن رحلات | وحدة الطيران |\n| **Flights — Search** | Flight Offers Price | تأكيد سعر الرحلة الفعلي | وحدة الطيران |\n| **Flights — Search** | Flight Cheapest Date Search | اقتراح أرخص التواريخ | وحدة الطيران |\n| **Flights — Search** | Flight Inspiration Search | إلهام بوجهات حسب الميزانية | الصفحة الرئيسية + الطيران |\n| **Flights — Search** | Flight Most Booked Destinations | عرض الوجهات الرائجة | الصفحة الرئيسية + التسويق |\n| **Flights — Search** | Flight Most Traveled Destinations | الوجهات الأكثر سفرًا | تقارير الإدارة |\n| **Flights — Booking** | Flight Create Orders | إنشاء حجز وإصدار PNR | وحدة الطيران |\n| **Flights — Booking** | Flight Order Management | استرجاع تفاصيل الحجز | بوابة الخدمة الذاتية |\n| **Flights — Booking** | Flight Order Cancel | إلغاء الحجز | بوابة الخدمة الذاتية |\n| **Flights — Ancillaries** | SeatMap Display | عرض خريطة المقاعد | وحدة الطيران |\n| **Flights — Ancillaries** | Branded Fares Upsell | عرض باقات الترقية | وحدة الطيران |\n| **Flights — Status** | On-Demand Flight Status | حالة الرحلة الفورية | لوحة العميل + الإشعارات |\n| **Flights — Insights** | Flight Delay Prediction | توقُّع تأخُّر الرحلة | الإشعارات الذكية |\n| **Flights — Insights** | Trip Purpose Prediction | تصنيف الرحلة | التسويق الذكي |\n| **Flights — Insights** | Travel Recommendations | توصيات سفر مُخصَّصة | الصفحة الرئيسية |\n| **Reference Data** | Airport & City Search | بحث المطارات والمدن | كل النماذج |\n| **Reference Data** | Airport Nearest Relevant | أقرب المطارات | وحدة الطيران |\n| **Reference Data** | Airline Code Lookup | بحث رموز شركات الطيران | الواجهات الإدارية |\n| **Reference Data** | Locations Score | تقييم الوجهة سياحيًا | صفحات الوجهات |\n\n### بيئة العمل مع Amadeus\n\n| البند | التفصيل |\n|------|---------|\n| **بيئة التطوير** | Amadeus Test Environment (Sandbox) — مجاني |\n| **بيئة الإنتاج** | Amadeus Production Environment (يتطلَّب اشتراك تجاري — مسؤولية العميل) |\n| **التوثيق الفني** | يُجرى وفق Amadeus OAuth 2.0 |\n| **النسخة المُستخدَمة** | Self-Service APIs v2 / v3 (الأحدث المتاح وقت التنفيذ) |\n| **نموذج التسعير** | Pay-Per-Transaction (يدفعه العميل مباشرة لـ Amadeus) |\n| **حد المعاملات** | غير محدود — مُرتبط فقط بالاشتراك مع Amadeus |\n\n---\n\n## خيارات الدفع وتعدُّد العملات\n\nنُقدِّم هنا **التفصيل الكامل لطُرق الدفع المدعومة** والعملات المُتاحة:\n\n### مصفوفة الدفع × العملة\n\n| العملة | PayTabs (متعددة العملات) | Apple Pay | Google Pay | محفظة فودافون | تقسيط |\n|--------|---------------------------|-----------|-------------|-----------------|--------|\n| **EGP** (جنيه مصري) | ✅ | ✅ | ✅ | ✅ | ✅ (شركاء PayTabs) |\n| **USD** (دولار) | ✅ | ✅ | ✅ | ❌ | ❌ |\n| **EUR** (يورو) | ✅ | ✅ | ✅ | ❌ | ❌ |\n| **SAR** (ريال سعودي) | ✅ | ✅ | ✅ | ❌ | ❌ |\n| **AED** (درهم إماراتي) | ✅ | ✅ | ✅ | ❌ | ❌ |\n\n### آلية تحويل العملات (Dynamic Currency Conversion)\n\n- مصدر أسعار الصرف: **OpenExchangeRates API** (محدَّث كل 4 ساعات)\n- تطبيق هامش إداري قابل للتخصيص (Default: 1.5%)\n- عرض السعر بعملتَي العرض والدفع قبل التأكيد للشفافية الكاملة\n- الاحتفاظ بسجل تاريخي لكل أسعار الصرف المُستخدَمة في كل معاملة\n\n### رسوم بوابات الدفع (يتحمَّلها العميل أو Jawla حسب الإعداد)\n\n| البوابة | الرسوم التقريبية | ملاحظات |\n|---------|-------------------|---------|\n| **PayTabs** (محلي EGP) | 2.5% — 2.85% | حسب نوع البطاقة |\n| **PayTabs** (دولي USD/EUR/SAR/AED) | 2.9% + رسم ثابت | للمعاملات بالعملات الأجنبية |\n| **PayTabs Installments (عبر شركاء)** | تتفاوض Jawla مع PayTabs | حسب فترة التقسيط |\n| **Apple/Google Pay** | بدون رسوم إضافية | محسوبة ضمن PayTabs |\n\n---\n\n## رحلة المستخدم (User Journey)\n\nتجربة محسَّنة تعكس الميزات المتقدِّمة للباقة الاحترافية مع لحظات الخدمة الذاتية:\n\n### المرحلة 1: الاكتشاف والإلهام\n\n1. 🏠 يدخل المستخدم الصفحة الرئيسية\n2. ✨ يرى **بنر \"إلى أين تريد السفر بميزانية 5000 جنيه؟\"** (Flight Inspiration)\n3. 🌍 يطَّلِع على **الوجهات الأكثر حجزًا هذا الموسم** (Most Booked Destinations)\n4. 💡 يستعرض **توصيات سفر مُخصَّصة** (Travel Recommendations)\n\n### المرحلة 2: البحث الذكي\n\n5. 🔍 يفتح صفحة البحث ويُدخل وجهته\n6. 📅 يرى **تقويم أرخص التواريخ** (Cheapest Date Search) قبل الاختيار\n7. 🛫 يبحث عن رحلات مع تطبيق فلاتر متقدِّمة\n8. 🪑 يستعرض **خريطة المقاعد الفعلية** قبل الحجز\n\n### المرحلة 3: الترقية الذكية (Upsell)\n\n9. 💼 تظهر له **باقات Branded Fares** (Economy Plus, Business Lite)\n10. 🪙 يُضيف خدمات إضافية (مقعد مفضّل، أمتعة إضافية، وجبة خاصة)\n11. ✅ يُراجع ملخَّص الحجز الشامل\n\n### المرحلة 4: الدفع المرن\n\n12. 💳 يختار طريقة الدفع عبر PayTabs: بطاقة / محفظة Jawla / Apple Pay / تقسيط\n13. 🌐 يختار عملة الدفع (EGP / USD / EUR / SAR / AED)\n14. 💰 يستخدم نقاط الولاء كخصم (اختياري)\n15. ✅ يُنجز الدفع — يستلم تأكيدًا فوريًا عبر البريد + WhatsApp\n\n### المرحلة 5: تجربة ما قبل السفر\n\n16. 🔔 يتلقَّى **تنبيه ذكي بتوقُّع تأخُّر** الرحلة (Delay Prediction)\n17. ⏰ يستلم **تذكيرًا قبل 24 ساعة** بتعليمات السفر\n18. 📲 يستطيع تنزيل تذكرته من بوابة الخدمة الذاتية\n\n### المرحلة 6: الخدمة الذاتية بعد الحجز\n\n19. ❓ يحتاج لتغيير تاريخ الرحلة → يدخل بوابة الخدمة الذاتية\n20. 📅 يختار التاريخ الجديد → يرى فرق السعر فوريًا\n21. ✅ يُؤكِّد التعديل ويدفع الفرق — كل ذلك دون التواصل مع الوكالة\n22. 🎁 يكتسب نقاط ولاء تلقائيًا، ترتفع لمستوى أعلى\n\n### المرحلة 7: إعادة التفاعل\n\n23. 📧 يستلم نشرة بريدية بعروض مُخصَّصة بناءً على سلوكه\n24. 💰 يستخدم الرصيد المُسترَدّ من محفظته في حجز جديد\n25. 👥 يدعو صديقًا (Referral) ويكسب 200 نقطة\n\n---\n\n## الفوائد لوكالة السفر\n\n### 💼 فوائد تجارية مباشرة\n\n| الفائدة | الأثر المُتوقَّع |\n|--------|-------------------|\n| **زيادة معدَّل التحويل** | +40-60% بفعل Inspiration & Cheapest Date Search |\n| **رفع متوسط قيمة الحجز** | +25-35% بفعل Branded Fares Upsell |\n| **توسيع السوق الجغرافي** | استهداف 5 أسواق (مصر، السعودية، الإمارات، أوروبا، أمريكا) |\n| **خفض تكلفة خدمة العملاء** | -30-45% بفعل بوابة الخدمة الذاتية |\n| **بناء ولاء حقيقي** | معدَّل عملاء مُكرَّرين ≥ 35% خلال 12 شهرًا |\n| **توفير ساعات عمل الفريق** | تحرير 40+ ساعة شهريًا للفريق للتركيز على المبيعات الكبيرة |\n\n### 🚀 فوائد استراتيجية بعيدة المدى\n\n- **التموضع كعلامة سياحية رقمية رائدة** في السوق المصري والإقليمي\n- **بناء قاعدة بيانات سلوكية** لكل العملاء — أصل ثمين للتسويق الذكي\n- **جاهزية للنمو والتوسُّع** لاحقًا إلى تطبيقات جوال أو B2B\n- **استقلالية تشغيلية** — لا اعتماد على وسطاء أو شركات وكلاء أخرى\n- **ميزانية تسويقية أكثر كفاءة** بفعل التحليلات والـ Cohort Analysis\n\n### 🛡️ فوائد تشغيلية وأمنية\n\n- **حماية البيانات** وفق معايير PCI-DSS وGDPR\n- **نسخ احتياطي يومي** لكل البيانات على Cloud آمن\n- **بنية قابلة للتوسُّع** (Scalable Architecture) — تستوعب نموًا حتى 10x دون إعادة بناء\n- **توثيق فني كامل** يضمن استقلالية الإدارة عن المُورِّد\n\n---\n\n## الجدول الزمني (4 أشهر / 16 أسبوعًا)\n\n### نظرة شاملة على المراحل\n\n| المرحلة | المدة | الأسابيع | المُخرَجات الرئيسية |\n|---------|------|----------|---------------------|\n| **1. الاكتشاف والتصميم** | 3 أسابيع | 1 — 3 | UX Research, Wireframes, UI Mockups, Design System |\n| **2. تأسيس البنية التحتية** | 2 أسبوع | 4 — 5 | Cloud Setup, Database Schema, Auth, CI/CD |\n| **3. تطوير وحدة الطيران الأساسية** | 3 أسابيع | 6 — 8 | Amadeus Flight APIs (Search + Pricing + Booking) |\n| **4. تطوير الميزات المتقدمة للطيران** | 2 أسبوع | 9 — 10 | Inspiration, Cheapest Date, SeatMap, Branded Fares, Delay Prediction |\n| **5. تطوير المحفظة والولاء والدفع** | 2 أسبوع | 11 — 12 | E-Wallet, Loyalty System, Multi-Currency Payments |\n| **6. لوحة الإدارة والإشعارات** | 2 أسبوع | 13 — 14 | Admin Panel, Self-Service Portal, Notifications |\n| **7. الاختبار والتحسين** | 1 أسبوع | 15 | QA Testing, Performance Optimization, Bug Fixes |\n| **8. الإطلاق والتدريب** | 1 أسبوع | 16 | Production Deployment, Training, Documentation |\n\n### التفصيل الأسبوعي\n\n| الأسبوع | المهام الرئيسية |\n|---------|-----------------|\n| **W1** | Kick-off Meeting, جمع المتطلبات التفصيلية, تحليل المنافسين |\n| **W2** | تصميم Information Architecture, إنشاء Wireframes أولية |\n| **W3** | تصميم UI Mockups نهائية, بناء Design System, موافقة العميل |\n| **W4** | إعداد بنية **Google Cloud Platform (GCP)** الخاصة بالعميل (Cloud Run + Cloud SQL + Cloud Storage + Pub/Sub), إعداد Repositories |\n| **W5** | بناء Database Schema, نظام Authentication & Authorization, CI/CD |\n| **W6** | تكامل Amadeus Flight Search + Pricing + Booking APIs |\n| **W7** | تكامل Flight Order Management + Order Cancel + Airport/City Search |\n| **W8** | تكامل Airline Code Lookup + Airport Nearest Relevant + اختبار end-to-end |\n| **W9** | تكامل Flight Inspiration + Cheapest Date + Most Booked Destinations |\n| **W10** | تكامل SeatMap + Branded Fares + Delay Prediction + Flight Status |\n| **W11** | بناء المحفظة متعدِّدة العملات + تكامل PayTabs (بوابة دفع متعددة العملات) |\n| **W12** | بناء نظام نقاط الولاء + التكامل مع المحفظة + المستويات |\n| **W13** | بناء Admin Panel (Dashboard + CRM + Reports + Settings) |\n| **W14** | بناء Self-Service Portal + Email/WhatsApp/SMS Notifications |\n| **W15** | اختبارات شاملة (Unit + Integration + E2E + UAT) + إصلاح الأخطاء |\n| **W16** | نشر على Production + تدريب فريق Jawla + تسليم التوثيق |\n\n### المعالم الرئيسية (Milestones)\n\n| رقم المَعلَم | اسم المَعلَم | الأسبوع المُتوقَّع |\n|-------------|---------------|---------------------|\n| 🏁 M1 | إعتماد التصميمات النهائية | نهاية الأسبوع 3 |\n| 🏁 M2 | اكتمال البنية التحتية | نهاية الأسبوع 5 |\n| 🏁 M3 | اكتمال وحدة الطيران الأساسية | نهاية الأسبوع 8 |\n| 🏁 M4 | اكتمال الميزات المتقدمة للطيران + المحفظة + الدفع | نهاية الأسبوع 12 |\n| 🏁 M5 | اكتمال المنصة بالكامل (Beta) | نهاية الأسبوع 14 |\n| 🏁 M6 | الإطلاق الرسمي للإنتاج | نهاية الأسبوع 16 |\n\n---\n\n## جدول الدفع (4 أقساط)\n\n| القسط | النسبة | المبلغ (USD) | المبلغ (EGP) | الاستحقاق |\n|------|------|-----------|-----------|----------|\n| **القسط الأول** (دفعة بدء) | 30% | $5,400 | 270,000 جنيه | عند توقيع العقد |\n| **القسط الثاني** (التصميم + الطيران) | 25% | $4,500 | 225,000 جنيه | عند تسليم M3 (نهاية الأسبوع 8) |\n| **القسط الثالث** (الميزات المتقدمة للطيران + الدفع + المحفظة) | 25% | $4,500 | 225,000 جنيه | عند تسليم M4 (نهاية الأسبوع 12) |\n| **القسط الرابع** (التسليم النهائي) | 20% | $3,600 | 180,000 جنيه | عند الإطلاق الرسمي (نهاية الأسبوع 16) |\n| **الإجمالي** | **100%** | **$18,000** | **900,000 جنيه** | — |\n\n### شروط الدفع\n\n- يُعتبر سعر الصرف المُعتمَد لتحويل الدولار إلى الجنيه: **50 جنيهًا للدولار** (قابل لإعادة المراجعة عند كل قسط حسب السعر الرسمي للبنك المركزي وقت الاستحقاق)\n- يُسدَّد كل قسط خلال **7 أيام عمل** من تاريخ إصدار الفاتورة\n- تأخُّر السداد عن 14 يومًا يُؤدِّي إلى تعليق العمل في المشروع\n- يُمكن السداد عبر التحويل البنكي المحلي (EGP) أو Wire Transfer (USD)\n- جميع الأسعار **لا تشمل الضرائب** — تُضاف ضريبة القيمة المُضافة حسب اللوائح السارية\n\n---\n\n## استشاري Amadeus\n\nنظرًا للأهمية الاستراتيجية لتكامل Amadeus في هذه الباقة، يتضمَّن العرض **خدمة استشارية متخصِّصة** لضمان الاستفادة القصوى من المنصة:\n\n### تفاصيل الخدمة الاستشارية\n\n| البند | التفصيل |\n|------|---------|\n| **عدد الساعات المُتضمَّنة** | 60 — 80 ساعة استشارية على مدار المشروع |\n| **خبرة الاستشاري** | ≥ 5 سنوات في تكامل Amadeus Self-Service APIs |\n| **الشهادات** | Amadeus Certified Developer (مفضَّل) |\n| **الخدمات المُقدَّمة** | راجع التفاصيل أدناه |\n\n### نطاق الخدمات الاستشارية\n\n1. **مراجعة عقد Amadeus** التجاري الذي يُوقِّعه العميل مع Amadeus مباشرة\n2. **التوجيه في اختيار خطة Amadeus المناسبة** (Self-Service vs Enterprise)\n3. **تحسين استخدام APIs** لتقليل تكلفة المعاملات (Caching, Batching)\n4. **تدريب فريق Jawla** على فهم تقارير Amadeus والـ Booking Analytics\n5. **حل المشاكل التقنية** المتعلِّقة بـ Amadeus خلال 6 أشهر بعد الإطلاق\n6. **مراجعة الأمان** وفق توصيات Amadeus PCI Compliance\n7. **التحديث المستمر** عند إصدار نسخ جديدة من APIs\n\n### نموذج التواصل\n\n- اجتماعات أسبوعية خلال مرحلة التطوير (4 ساعات/أسبوع)\n- جلسات استشارية عند الطلب بعد الإطلاق (حد أقصى 5 ساعات/شهر)\n- توثيق كل التوصيات في تقارير مكتوبة قابلة للأرشفة\n\n---\n\n## الضمان\n\nنقدِّم **ضمان شامل لمدة 6 أشهر** من تاريخ الإطلاق الرسمي للمنصة:\n\n### ما يشمله الضمان ✅\n\n- إصلاح كل الأخطاء البرمجية (Bugs) المُكتشَفة دون رسوم إضافية\n- معالجة أعطال الأداء (Performance Issues) وتحسين أوقات الاستجابة\n- إصلاح أي مشاكل تكامل مع Amadeus أو بوابة الدفع PayTabs\n- إصلاح ثغرات أمنية مكتشفة في الكود\n- معالجة مشاكل التوافق مع المتصفِّحات الحديثة\n- استشارة فنية مجانية لفريق Jawla خلال فترة الضمان (حد أقصى 10 ساعات/شهر)\n\n### ما لا يشمله الضمان ❌\n\n- إضافة ميزات جديدة لم تكن في النطاق الأصلي (تُعامَل كـ Change Requests)\n- مشاكل ناتجة عن تعديلات أجراها فريق Jawla أو أطراف خارجية\n- أعطال بسبب انقطاع خدمات خارجية (Amadeus, PayTabs, Cloud Provider)\n- استبدال خوادم الإنتاج أو ترقيتها\n- التدريب الإضافي بعد التدريب الأولي المُتفَق عليه\n\n### استجابة الضمان\n\n| مستوى الخطورة | وقت الاستجابة | وقت الحل |\n|----------------|-----------------|----------|\n| 🔴 **حرج (Critical)** — توقُّف كامل للمنصة | خلال 2 ساعة | خلال 8 ساعات |\n| 🟠 **عالي (High)** — وحدة رئيسية لا تعمل | خلال 4 ساعات | خلال 24 ساعة |\n| 🟡 **متوسط (Medium)** — خطأ جزئي | خلال 24 ساعة | خلال 5 أيام عمل |\n| 🟢 **منخفض (Low)** — تحسينات تجميلية | خلال 3 أيام | خلال 14 يوم عمل |\n\n---\n\n## الصيانة (بعد انتهاء الضمان)\n\nنقدِّم **عقد صيانة شهري** يضمن استمرارية وجودة المنصة:\n\n### تفاصيل الصيانة\n\n| البند | التفصيل |\n|------|---------|\n| **الرسوم الشهرية** | **15,000 جنيه مصري شهريًا** (≈ **300 دولار أمريكي**) |\n| **مدة العقد** | 12 شهرًا قابلة للتجديد |\n| **بدء السريان** | بعد انتهاء فترة الضمان (6 أشهر بعد الإطلاق) |\n| **طريقة الدفع** | شهري مُقدَّم (Monthly in Advance) |\n\n### نطاق خدمات الصيانة\n\n| الخدمة | التفصيل |\n|--------|---------|\n| 🔧 **إصلاح الأخطاء** | إصلاح أي bugs تظهر بعد فترة الضمان |\n| 🚀 **تحديثات الأمان** | تطبيق Security Patches فور إصدارها |\n| 📦 **تحديث المكتبات** | ترقية Dependencies بشكل دوري |\n| 🔄 **تحديثات Amadeus APIs** | متابعة وتطبيق إصدارات Amadeus الجديدة |\n| 📊 **مراقبة الأداء** | مراقبة 24/7 عبر أدوات مثل Sentry وUptimeRobot |\n| 💾 **إدارة النسخ الاحتياطية** | التأكُّد من تشغيل Backups يومية |\n| ⚡ **تحسين الأداء** | تحسين دوري لأوقات الاستجابة وقواعد البيانات |\n| 📞 **دعم فني عبر القنوات** | البريد + WhatsApp + الهاتف (ساعات العمل الرسمية) |\n| 📈 **تقارير شهرية** | تقرير أداء شامل + توصيات تحسين |\n| 🎓 **استشارات شهرية** | حتى 8 ساعات استشارية شهريًا |\n\n### حدود الصيانة\n\n- تشمل الصيانة **التطوير لإصلاح الأخطاء فقط** — لا تشمل تطوير ميزات جديدة\n- التطوير الإضافي يُسعَّر بشكل منفصل وفق Hourly Rate مُتَّفَق عليه ($30 — $50/ساعة)\n- إذا احتاجت Jawla لتطوير ميزة كبيرة، يُمكن التعاقُد عليها كمشروع منفصل\n\n---\n\n## الافتراضات (Assumptions)\n\nنُصرِّح هنا **بالافتراضات التي بُني عليها هذا العرض** والتي نعتبرها صحيحة عند التوقيع:\n\n1. ✅ تمتلك Jawla Tours **حسابًا تجاريًا ساريًا مع Amadeus** أو ستحصل عليه قبل بدء التطوير\n2. ✅ تمتلك Jawla **سجلًا تجاريًا** ساريًا وقادرة على التوقيع على عقود مع بوابات الدفع\n3. ✅ تتوفَّر **هوية بصرية** أو ميزانية إنشاء واحدة (Logo, Colors, Fonts)\n4. ✅ يلتزم فريق Jawla بتوفير **شخص مسؤول واحد (Single Point of Contact)** للمشروع\n5. ✅ يلتزم العميل بمراجعة المُخرَجات والرد عليها خلال **48 ساعة** كحد أقصى لتجنُّب التأخُّر\n6. ✅ تتوفَّر **محتوى نصي ومرئي** للوجهات والصفحات الثابتة (أو يُسعَّر منفصلًا)\n7. ✅ تتولَّى Jawla مسؤولية **التراخيص التجارية والضريبية** للتشغيل القانوني\n8. ✅ يوفّر العميل **حساب Google Cloud Platform (GCP)** ويتحمَّل **رسوم الاستضافة الشهرية على GCP** مباشرة (تتراوح بين 100 — 300 دولار/شهر حسب الاستخدام) — لا تدخل ضمن سعر المشروع أو رسوم الصيانة\n9. ✅ تتحمَّل Jawla **رسوم Amadeus** (Pay-Per-Transaction) للاستعلامات والحجوزات\n10. ✅ تتحمَّل Jawla **رسوم بوابات الدفع** (PayTabs, WhatsApp Business API)\n11. ✅ يلتزم العميل بسداد **الأقساط في مواعيدها** المُحدَّدة في جدول الدفع\n12. ✅ تعمل المنصة على أحدث إصدارات المتصفِّحات (Chrome, Safari, Firefox, Edge) — لا دعم لـ Internet Explorer\n\n---\n\n## الاستثناءات (Out of Scope)\n\nنُوضِّح هنا **بشكل صريح** البنود التي **لا يشملها** هذا العرض، لتجنُّب أي سوء فهم لاحق:\n\n### ❌ ما لا يشمله هذا العرض\n\n| # | البند المُستثنى | السبب / البديل |\n|---|------------------|------------------|\n| 0 | 🏨 **حجز الفنادق (Hotel Booking)** | ❌ لا يشمل العرض حجز الفنادق — تم استبعاد وحدة الفنادق من جميع الباقات بناءً على طلب العميل، والتركيز على وحدة الطيران فقط |\n| 1 | 📱 **تطبيقات الجوال الأصلية (Native Mobile Apps)** | لا تشمل هذه الباقة تطبيقات iOS/Android — يُمكن إضافتها كباقة منفصلة لاحقًا |\n| 2 | 🤝 **بوابة B2B للوكلاء (Travel Agents Portal)** | لا تشمل بوابة منفصلة للوكلاء الفرعيين أو نظام Commission Management للوكلاء الخارجيين |\n| 3 | 🏷️ **حلول White-Label** | لا يشمل العرض إعادة بيع المنصة لشركات أخرى تحت علاماتها التجارية |\n| 4 | ✈️ **أنظمة GDS أخرى غير Amadeus** | لا تشمل تكامل Sabre أو Travelport |\n| 5 | 🚗 **حجز السيارات والباصات** | لا تشمل وحدة Car Rental أو Bus Booking |\n| 6 | 🛳️ **حجز الرحلات البحرية (Cruises)** | غير مُدرَجة في هذا العرض |\n| 7 | 🎟️ **حجز الأنشطة والجولات (Activities & Tours)** | غير مُدرَجة — يُمكن إضافتها لاحقًا |\n| 8 | 🛂 **خدمات التأشيرات (Visa Services)** | لا تشمل إصدار أو متابعة التأشيرات |\n| 9 | 🏥 **التأمين السفر** | لا يشمل التكامل مع شركات التأمين |\n| 10 | 🗣️ **خدمة عملاء مباشرة (Live Chat)** | لا تشمل بناء Live Chat — يُمكن استخدام أدوات خارجية (Intercom, Tawk.to) |\n| 11 | 📈 **حملات SEO وتسويق رقمي** | تشمل التطوير فقط — لا تشمل تشغيل حملات Google Ads أو Social Media |\n| 12 | 🎨 **إنتاج محتوى تسويقي** | لا يشمل تصوير الوجهات أو كتابة محتوى تسويقي |\n| 13 | 🌍 **لغات إضافية غير العربية والإنجليزية** | يُمكن إضافتها كـ Change Request بسعر منفصل |\n| 14 | 💼 **نظام ERP داخلي للوكالة** | لا يشمل أنظمة المحاسبة الداخلية أو إدارة الموارد البشرية |\n| 15 | 🔐 **شهادات أمان متقدِّمة (SOC 2, ISO 27001)** | لا يشمل الحصول على شهادات الأمان الدولية |\n| 16 | 🎛️ **لوحة تحكم مخصصة للعميل (Custom User Dashboard)** | ❌ لا يشمل العرض لوحة تحكم مخصصة للعميل (Custom User Dashboard) — هذه الميزة متوفرة فقط في باقة Enterprise |\n\n### 💡 ملاحظة مهمة\n\nإذا رغبت Jawla في إضافة أي من البنود المُستثناة لاحقًا، يُمكن التفاوض عليها كـ:\n- **Change Request** ضمن المشروع الحالي (يُسعَّر بمعدَّل ساعي)\n- **مشروع مرحلة ثانية (Phase 2)** بعد إطلاق المنصة\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- 1.1. تنتقل ملكية الكود المُطوَّر بالكامل إلى Jawla Tours **عند سداد القسط الأخير**\n- 1.2. تحتفظ Tajera Software House بحق استخدام التقنيات والأطر العامة (Boilerplates, Libraries) في مشاريع أخرى\n- 1.3. تُلتزم Tajera بسرية تامة لكل بيانات Jawla التجارية والعملاء (NDA منفصلة عند الطلب)\n\n### 2. تعديلات المشروع (Change Requests)\n\n- 2.1. أي تعديل خارج النطاق المُتَّفَق عليه يُعتبر **Change Request** ويُسعَّر منفصلًا\n- 2.2. يُقدَّر العمل الإضافي بمعدَّل **$35/ساعة** (1,750 جنيه/ساعة)\n- 2.3. أي Change Request يجب أن يُوثَّق كتابيًا ويُواف ية)** |\n| بوابة وكلاء B2B | ❌ | محدودة | ❌ **(تم حذفه — بناءً على طلب العميل)** |\n| محرك White-Label | ❌ | ❌ | ❌ **(تم حذفه — بناءً على طلب العميل)** |\n| تطبيق جوال | ❌ | اختياري | ❌ **(تم حذفه — Web Responsive فقط)** |\n| حجز الفنادق | محدود | محدود | ❌ **(تم حذفه — طيران فقط)** |\n| الاستشاري Amadeus | 20 ساعة | 50 ساعة | **🌟 100-120 ساعة** |\n| الضمان | 3 أشهر | 6 أشهر | **🌟 12 شهرًا** |\n\n### 2.4 ملاحظات مهمة حول النطاق\n\n> ⚠️ **تم حذف تطبيقات الجوال (iOS/Android) من نطاق هذه الباقة** بناءً على متطلبات العميل.\n>\n> سيتم تقديم تجربة **Web-Responsive احترافية بالكامل** تعمل على جميع الأجهزة (Desktop / Tablet / Mobile Browser) بأعلى معايير PWA (Progressive Web App) لضمان تجربة قريبة من التطبيق الأصلي.\n\n> ⚠️ **تم حذف وحدة حجز الفنادق بالكامل** من نطاق هذه الباقة بناءً على طلب العميل.\n>\n> ستركّز المنصة بالكامل على **حجز رحلات الطيران (Flight Booking)** عبر منظومة Amadeus Enterprise، مع الإبقاء على وحدات النقل (Transfers)، تأجير السيارات (Car Rental)، والجولات والأنشطة (Tours & Activities) كقيمة مضافة لرحلة العميل.\n\n> ⚠️ **تم حذف بوابة وكلاء B2B (Sub-system مستقل) من نطاق هذه الباقة** بناءً على طلب العميل.\n>\n> ستركّز المنصة على قنوات B2C (العملاء المباشرين) + Corporate Accounts (الحسابات المؤسسية)، دون قناة الوكلاء/الوسطاء.\n\n> ⚠️ **تم حذف محرك White-Label لإنشاء علامات تجارية فرعية من نطاق هذه الباقة** بناءً على طلب العميل.\n>\n> ستعمل المنصة بعلامة Jawla الواحدة فقط، دون إمكانية إنشاء Sub-brands أو تشغيل علامات شراكة منفصلة.\n\n> 🌟 **ميزة حصرية لـ Enterprise:** **لوحات تحكم مخصصة للعميل (Custom User Dashboards)** — كل عميل يحصل على لوحة تحكم شخصية بـ widgets قابلة للتخصيص، تحليلات شخصية متقدمة (Personal BI)، وتجربة BI-style كاملة. هذه الميزة **غير متوفرة** في باقتي Basic و Professional.\n\n### 2.5 ملخص الاستثمار والعائد\n\n| البند | القيمة |\n|---|---|\n| **إجمالي الاستثمار** | 20,000 USD ≈ 1,000,000 EGP |\n| **مدة التنفيذ** | 6 أشهر |\n| **نقطة التعادل المتوقعة** | الشهر 8-10 بعد الإطلاق |\n| **ROI متوقع في السنة الأولى** | 180% - 240% |\n| **حجم الأ  مع ناقلين إقليميين وعرض أسعار غير متاحة لأي منافس\n4. **السفر الجماعي الديني (تذاكر طيران للحج والعمرة)** — منتج high-margin ومحدود المنافسة الرقمية في قطاع الطيران\n\n---\n\n## 4. الأهداف التجارية\n\n### 4.1 الأهداف الاستراتيجية الكبرى (3-سنوات)\n\n| # | الهدف | المؤشر |\n|---|---|---|\n| 1 | التحوّل من وكالة تقليدية إلى OTA رقمية إقليمية | 60% من الحجوزات digital خلال 3 سنوات |\n| 2 | التوسع لخدمة 5 أسواق خليجية رئيسية | تواجد فعّال في السعودية، الإمارات، الكويت، قطر، البحرين |\n| 3 | الوصول لـ 150 مليون EGP GMV سنوي | بحلول السنة الثالثة |\n\n### 4.2 الأهداف التشغيلية (السنة الأولى)\n\n| المؤشر | الهدف | كيف نقيس |\n|---|---|---|\n| إجمالي حجم الأعمال (GMV) | 35-50 مليون EGP | Analytics dashboard |\n| عدد الحجوزات المكتملة | 8,000-12,000 | Booking module |\n| متوسط قيمة الحجز (AOV) | 4,000-6,000 EGP | تحليل لحظي |\n| معدل التحويل (Conversion) | 2.8-3.5% | Funnel analytics |\n| معدل العودة (Returning Users) | 28-35% | Cohort analysis |\n| رضا العملاء (CSAT) | ≥ 4.4/5 | استبيانات post-booking |\n| NPS | ≥ 45 | استبيانات ربعية |\n| العملاء المؤسسيين (Corporate) | 20-30 شركة | CRM |\n| متوسط Chargeback Rate | < 0.8% (من 3.2% حالي) | Fraud module |\n\n### 4.3 KPIs تقنية\n\n| المؤشر | الهدف |\n|---|---|\n| Uptime | 99.9% (SLA) |\n| Page Load (LCP) | < 2.0s |\n| API Response (P95) | < 400ms |\n| Time to First Booking (TTFB) | < 90s من landing |\n| Error Rate | < 0.3% |\n| Lighthouse Performance | > 90 |\n| Lighthouse Accessibility | > 95 |\n| Mobile Web Experience | PWA-grade |\n\n---\n\n## 5. نطاق المشروع\n\n### 5.1 المُسلَّمات الرئيسية (High-Level Deliverables)\n\n| # | المُسلَّم | الوصف المختصر |\n|---|---|---|\n| 1 | **منصة حجز رحلات الطيران المتكاملة (Web Responsive)** | Frontend + Backend + Admin |\n| 2 | **تكامل Amadeus Enterprise (1A Direct)** | كامل المنظومة |\n| 3 | **نظام Corporate Accounts** | حسابات ائتمانية وفوترة |\n| 4 | **محرك Multi-Currency** | 10+ عملات |\n| 5 | **محرك Multi-Pricing** | 15+ خيار دفع |\n| 6 | **Loyalty Program** | نقاط Jawla Rewards |\n| 7 | **Group Booking Workflow** | حجوزات جماعية آلية |\n| 8 | **Fraud Detection Engine (ML)** | كشف احتيال ذكي |\n| 9 | **BI Analytics Dashboard** | تحليلات متقدمة |\n| 10 | **Multi-Branch Admin** | إدارة الفروع |\n| 11 | **🎨 لوحات تحكم مخصصة للعميل (Custom User Dashboards)** | Widgets قابلة للتخصيص، تحليلات شخصية، تجربة BI-style للعميل النهائي |\n| 12 | **CMS متعدد اللغات** | إدارة محتوى |\n| 13 | **DevOps + CI/CD** | بنية تحتية كاملة |\n| 14 | **التوثيق التقني والتدريبي** | شامل لكل الأنظمة |\n\n### 5.2 ما هو داخل النطاق (IN SCOPE)\n\n✅ تطوير منصة ويب responsive كاملة (Frontend + Backend) لحجز رحلات الطيران\n✅ تكامل Amadeus Enterprise GDS كامل (Master Pricer، Air Sell، PNR، E-Ticket، EMD، Queue، NDC، Ancillaries، Branded Fares)\n✅ تكامل Amadeus Transfers + Car Rental\n✅ تكامل Amadeus Tours and Activities + Points of Interest\n✅ 15+ بوابة دفع وتقسيط مع smart routing\n✅ محرك 10+ عملات بأسعار صرف لحظية\n✅ نظام Corporate Accounts (Net 30/60/90)\n✅ نظام Loyalty Points + Rewards\n✅ Group Bookings مع workflow\n✅ Fraud Detection بـ ML\n✅ BI Dashboards\n✅ 🎨 لوحات تحكم مخصصة للعميل (Custom User Dashboards مع widgets قابلة للتخصيص وتحليلات شخصية متقدمة)\n✅ Multi-Branch Management\n✅ إشعارات (Email + WhatsApp Business + SMS)\n✅ CMS كامل لإدارة المحتوى\n✅ Arabic + English (RTL/LTR)\n✅ DevOps + CI/CD + Monitoring (Sentry + Grafana)\n✅ استشارة Amadeus (100-120 ساعة)\n✅ ضمان 12 شهرًا\n✅ تدريب فريق العميل (20 جلسة)\n✅ التوثيق الكامل\n\n### 5.3 ما هو خارج النطاق (OUT OF SCOPE)\n\n❌ **تطبيقات الجوال (iOS/Android Native)** — تم حذفها صراحة من نطاق هذه الباقة\n❌ **بوابة وكلاء B2B (Sub-system مستقل)** — تم حذفها من النطاق بناءً على طلب العميل\n❌ **محرك White-Label لإنشاء علامات تجارية فرعية** — تم حذفه من النطاق بناءً على طلب العميل\n❌ تراخيص حكومية أو IATA accreditation (على عاتق العميل)\n❌ تكاليف اشتراك Amadeus الشهرية وعمولات المعاملات\n❌ تكاليف SMS/WhatsApp البالغة عن العتبات المتفق عليها\n❌ إنتاج محتوى تسويقي (فيديوهات، صور احترافية، نصوص ترويجية)\n❌ حملات تسويق رقمي مدفوعة (Google Ads، Meta Ads) — يمكن إضافتها كخدمة منفصلة\n❌ خدمات الكول سنتر والدعم البشري للعملاء النهائيين\n❌ تكامل ERP محاسبي خارجي (SAP/Oracle) — يمكن إضافته كخدمة منفصلة\n❌ تطوير Hardware أو POS للفروع الفيزيائية\n\n---\n\n## 6. الميزات التفصيلية حسب الوحدة\n\n> هذا هو القسم الجوهري في العرض. كل وحدة (Module) موصوفة بدقة مع المكوّنات والـ APIs المُستخدمة وتأثيرها على الأعمال.\n\n### 🛫 6.1 وحدة الطيران الكاملة (Full Amadeus Enterprise Suite)\n\n> **🌟 هذه هي الميزة المحورية الأولى في الباقة** — وصول كامل لمنظومة Amadeus Enterprise (1A Direct) وليس Self-Service فقط.\n\n#### 6.1.1 المكوّنات الأساسية\n\n##### أ) All Self-Service APIs (من الباقات الأدنى)\n\n| API | الاستخدام |\n|---|---|\n| Flight Offers Search | البحث الأساسي عن العروض |\n| Flight Offers Price | تأكيد السعر قبل الحجز |\n| Flight Create Orders | إنشاء طلب الحجز |\n| Flight Order Management | إدارة الحجز |\n| Seat Maps | اختيار المقاعد |\n| Airport & City Search | البحث عن المطارات |\n| Flight Inspiration Search | إلهام الوجهات |\n| Flight Cheapest Date Search | البحث بأرخص التواريخ |\n| Flight Most Booked Destinations | الوجهات الأكثر حجزًا |\n| Flight Most Traveled Destinations | الوجهات الأكثر سفرًا |\n| Flight Busiest Traveling Period | المواسم المزدحمة |\n| Flight Delay Prediction | توقع التأخير |\n| Airport On-Time Performance | أداء المطارات |\n\n##### ب) 🌟 Master Pricer Travel Board (Enterprise Exclusive)\n\nأقوى محرّك تسوّق رحلات في صناعة السفر:\n\n- **Multi-fare quotes** — عرض عشرات الأسعار في استعلام واحد\n- **Fare Families** — Economy Light، Classic، Flex، Business، First في عرض واحد\n- **Ancillaries inline** — الحقائب والوجبات تظهر مع نتائج البحث\n- **Negotiated Fares** — تكامل الأسعار التعاقدية الخاصة بـ Jawla\n- **Calendar Search** — مرونة ±3 أيام بـ price matrix\n- **Multi-City** — حتى 6 أرجل (legs) في رحلة واحدة\n- **Cross-fare Pricing** — مزج تذاكر من ناقلين مختلفين\n- **Stop-over Sell** — إضافة محطات توقّف منتجة\n\n##### ج) 🌟 Air Sell from Recommendation\n\nحجز مباشر من نتائج البحث **دون** إعادة استعلام السعر — يوفّر 40-60% من زمن المعاملة:\n\n```\nالمستخدم يختار → النظام يحجز فورًا → PNR يُنشأ → تأكيد فوري\n```\n\n##### د) 🌟 PNR Creation & Management\n\nتحكّم كامل في سجلات الحجز (Passenger Name Record):\n\n- إنشاء PNR كامل (Pax info، Itinerary، Contact، Form of Payment، Remarks)\n- إضافة/تعديل/حذف الأرجل\n- إضافة Special Service Requests (SSR): وجبات خاصة، كرسي متحرك، رضيع، حيوان أليف\n- إضافة Other Service Information (OSI): ملاحظات للشركة\n- Frequent Flyer numbers\n- APIS data (Advanced Passenger Information System)\n- Secure Flight Passenger Data (للولايات المتحدة)\n- Document info (Passport، Visa)\n- Address verification\n\n##### هـ) 🌟 Document Issuance (E-Ticket) + EMD\n\n- إصدار E-Ticket مباشر بعد التأكيد\n- إصدار EMD (Electronic Miscellaneous Document) للخدمات الإضافية:\n  - حقائب إضافية\n  - وجبات مدفوعة\n  - اختيار مقعد مدفوع\n  - Wi-Fi على متن الطائرة\n  - دخول صالة الانتظار\n  - upgrade للدرجة\n- Refund processing\n- Exchange (تغيير التذكرة)\n- Void (إلغاء قبل ساعة الحجز)\n- Reissue (إعادة إصدار)\n\n##### و) 🌟 Queue Management\n\nقوائم عمل احترافية للوكلاء — صميم العمل اليومي:\n\n| Queue Type | الغرض |\n|---|---|\n| Ticketing Queue | حجوزات بانتظار الإصدار |\n| Exchange Queue | طلبات تغيير |\n| Refund Queue | طلبات استرداد |\n| Schedule Change Queue | تعديلات شركات الطيران |\n| Waitlist Queue | حجوزات في قائمة الانتظار |\n| Time Limit Queue | حجوزات قاربت على الانتهاء |\n| Custom Queues | حسب احتياجات Jawla |\n\n##### ز) 🌟 NDC Content (New Distribution Capability)\n\nمحتوى مباشر من شركات الطيران:\n\n- محتوى Rich Media (صور المقاعد، الوجبات، صور الطائرة)\n- عروض مخصصة لكل راكب (Personalized Offers)\n- خدمات إضافية حصرية NDC\n- أسعار محسّنة بدون رسوم GDS\n- شركات NDC المدعومة: Emirates، Lufthansa، Qatar Airways، Singapore Airlines، Air France-KLM، British Airways، United، American، Delta، وأكثر\n\n##### ح) 🌟 Ancillary Services API\n\nكل ما يمكن بيعه إضافيًا للتذكرة:\n\n| الخدمة | الوصف |\n|---|---|\n| Baggage | حقائب مسجّلة وإضافية |\n| Meals | وجبات خاصة (Halal، Vegan، Kosher، Diabetic، Child) |\n| Wi-Fi | الإنترنت على متن الطائرة |\n| Lounge Access | دخول صالات الانتظار |\n| Seat Selection | اختيار المقعد المدفوع |\n| Priority Boarding | الصعود المبكر |\n| Fast Track Security | المرور السريع بالأمن |\n| Cabin Upgrade | الترقية للدرجة الأعلى |\n| Travel Insurance | تأمين السفر |\n\n##### ط) 🌟 Branded Fares Enterprise\n\nعرض كامل لعائلات الأسعار:\n\n```\nEconomy Light    →  Economy Classic    →  Economy Flex\n  ↓                   ↓                       ↓\nPremium Economy  →  Business Saver     →  Business Flex\n  ↓                   ↓                       ↓\nFirst Class\n```\n\nكل عائلة مع تفاصيلها (حقائب، تعديلات، استرداد، أميال، اختيار مقعد).\n\n##### ي) 🌟 Robotics / SOAP Services\n\nأتمتة العمليات الخلفية على مستوى المؤسسة:\n\n- Automated Queue Processing\n- Automated Schedule Change Handling\n- Batch PNR Updates\n- Automated Refund Processing\n- Automated Voiding\n- Robotic Document Generation\n- Smart Re-pricing on Schedule Changes\n\n#### 6.1.2 ميزات إضافية للطيران\n\n| الميزة | الوصف |\n|---|---|\n| ذكاء اصطناعي للأسعار | تنبؤ بتقلبات الأسعار + توصيات للعميل |\n| Price Drop Protection | استرداد الفرق إذا انخفض السعر قبل السفر |\n| Auto Rebooking | إعادة حجز تلقائي عند الإلغاء |\n| Travel Disruption Management | تنبيهات وإعادة جدولة عند التأخير |\n| Carbon Offset | حساب الانبعاثات وإمكانية التعويض |\n| Visa Requirements | عرض متطلبات التأشيرة لكل وجهة |\n| Travel Advisory | تحذيرات سفر بناءً على البيانات الحكومية |\n\n#### 6.1.3 الأثر التجاري\n\n| البُعد | الأثر |\n|---|---|\n| سرعة الحجز | تقليل من 8-12 دقيقة إلى 90 ثانية |\n| دقة البيانات | من 95% إلى 99.9% |\n| Margin per ticket | زيادة 18-25% عبر Ancillaries |\n| Agent productivity | زيادة 3.5x |\n\n---\n\n### 🚗 6.2 وحدة السيارات والتوصيل\n\n#### 6.2.1 المكوّنات\n\n##### أ) Amadeus Transfer Search & Booking\n\n- نقل من/إلى المطار في 200+ مدينة\n- أنواع المركبات (Economy، Comfort، Business، Luxury، Van، Limo)\n- المركبات الكبيرة للمجموعات\n-
