<style>
  :root {
    --bg: #0b0f17;
    --panel: #0f1622;
    --panel-2: #131b2b;
    --border: #1e2a40;
    --text: #e6edf7;
    --muted: #8a98b3;
    --accent: #6ea8ff;
    --accent-2: #9b87ff;
    --success: #34d399;
    --gold: #f4c46b;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .rtl { direction: rtl; font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2a3852; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 320px; flex-shrink: 0; height: 100vh; position: sticky; top: 0; border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; }
  .main { flex: 1; min-width: 0; }
  .topbar { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px); background: rgba(11,15,23,0.85); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
  .brand { display: flex; align-items: center; gap: 12px; padding: 24px 20px; border-bottom: 1px solid var(--border); }
  .brand-logo { width: 56px; height: auto; flex-shrink: 0; display: flex; align-items: center; }
  .brand-logo img { width: 100%; height: auto; display: block; }
  .nav-section { padding: 20px 14px 8px; }
  .nav-section + .nav-section { padding-top: 12px; }
  .nav-label { padding: 8px 12px 2px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .nav-sub { padding: 0 12px 10px; font-size: 10px; color: rgba(138,152,179,0.7); font-style: italic; }
  .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s; background: transparent; border: none; width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: rgba(110,168,255,0.08); color: white; }
  .nav-item.active { background: linear-gradient(90deg, rgba(110,168,255,0.15), rgba(155,135,255,0.08)); border-left: 3px solid var(--accent); color: white; padding-left: 9px; }
  .footer-card { margin: 20px 14px; padding: 14px; border-radius: 10px; background: var(--panel-2); border: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

  .badge-pro { background: rgba(110,168,255,0.15); color: var(--accent); }
  .badge-ent { background: rgba(244,196,107,0.15); color: var(--gold); }

  .ota-block h3 { color: white; font-size: 20px; font-weight: 700; margin: 0 0 12px; }

  .ota-feat-icon { font-size: 20px; margin-bottom: 6px; }
  .ota-feat-title { color: white; font-weight: 600; font-size: 14px; margin-bottom: 2px; }

  .pkg-card { border: 1px solid var(--border); background: var(--panel); border-radius: 16px; padding: 24px; box-shadow: 0 0 40px rgba(110,168,255,0.06); }

  .pkg-tag:hover { color: white; border-color: var(--accent); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .info-grid { grid-template-columns: 1fr; } .sidebar { display: none; } .hero-title { font-size: 36px; } }
  .info-card { border: 1px solid var(--border); background: var(--panel); border-radius: 12px; padding: 20px; }

  .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .stack-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .topbar-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-right: 12px; }
  .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }

  .doc-prose h2 { font-size: 1.6rem; font-weight: 700; margin: 2.5rem 0 0.75rem; color: #fff; letter-spacing: -0.01em; }
  .doc-prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.75rem 0 0.5rem; color: #dde6f4; }
  .doc-prose h4 { font-size: 1.05rem; font-weight: 600; margin: 1.25rem 0 0.4rem; color: #c8d3e8; }

  .doc-prose strong { color: #fff; font-weight: 600; }
  .doc-prose em { color: #aebcd6; }
  .doc-prose ul, .doc-prose ol { margin: 0.8rem 0; padding-inline-start: 1.5rem; color: #c8d3e8; }
  .doc-prose li { margin: 0.3rem 0; }
  .doc-prose ul li::marker { color: var(--accent); }
  .doc-prose ol li::marker { color: var(--accent-2); font-weight: 600; }
  .doc-prose a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .doc-prose hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
  .doc-prose blockquote { border-inline-start: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 1rem 0; background: rgba(110, 168, 255, 0.06); color: #c8d3e8; border-radius: 0 8px 8px 0; }
  .doc-prose code { background: #1a2233; color: var(--gold); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
  .doc-prose pre { background: #0a1020; border: 1px solid var(--border); border-radius: 10px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
  .doc-prose pre code { background: transparent; padding: 0; color: #cfd8eb; font-size: 0.85em; }
  .doc-prose table { border-collapse: collapse; margin: 1.25rem 0; width: 100%; font-size: 0.92rem; background: var(--panel-2); border-radius: 10px; overflow: hidden; }
  .doc-prose th { background: #1a2438; color: #fff; font-weight: 600; text-align: start; padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .doc-prose td { padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); color: #c8d3e8; vertical-align: top; }
  .doc-prose tr:last-child td { border-bottom: 0; }
  .doc-prose tr:hover td { background: rgba(110, 168, 255, 0.04); }
  .doc-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
  @media print {
    body, html { background: #fff !important; color: #000 !important; }
    .no-print, .sidebar, .topbar { display: none !important; }

    .doc-prose h1, .doc-prose h2, .doc-prose h3, .doc-prose h4, .doc-prose p, .doc-prose li, .doc-prose td, .doc-prose strong { color: #000 !important; }
    .doc-prose th { background: #f0f0f0 !important; color: #000 !important; }
    .doc-prose table { background: #fff !important; }
    .doc-prose pre { background: #f5f5f5 !important; border-color: #ddd !important; }
    .doc-prose code { background: #f0f0f0 !important; color: #c0392b !important; }
  }
</style>

<script id="docs-data" type="application/json">{"proposals-basic":"# عرض مشروع منصة الحجوزات الإلكترونية - الباقة الأساسية\n\n---\n\n## صفحة الغلاف\n\n| البند | التفاصيل |\n|-------|----------|\n| **اسم المشروع** | منصة جولة للحجوزات الإلكترونية - الباقة الأساسية |\n| **العميل** | شركة جولة تورز للسياحة (Jawla Tours) |\n| **المقدّم إلى** | الإدارة العليا - شركة جولة تورز |\n| **تاريخ العرض** | 29 يونيو 2026 |\n| **رقم الإصدار** | الإصدار 1.0 |\n| **سريان العرض** | 30 يوماً من تاريخ الإصدار |\n| **مُعدّ بواسطة** | فريق الاستشارات الرقمية |\n| **حالة الوثيقة** | عرض رسمي للاعتماد |\n| **العملة المعتمدة** | الجنيه المصري (EGP) |\n| **القيمة الإجمالية** | 595,000 جنيه مصري |\n| **مدة التنفيذ** | من 8 إلى 10 أسابيع |\n| **رسوم الصيانة الشهرية** | 10,000 جنيه مصري شهرياً |\n\n> هذه الوثيقة سرية ومُعدّة حصرياً لشركة جولة تورز للسياحة. لا يجوز إعادة توزيعها أو نسخها كلياً أو جزئياً دون إذن خطي مسبق من الطرف المُعِد.\n\n---\n\n## الملخص التنفيذي\n\nيسعدنا أن نقدم لشركة **جولة تورز للسياحة** هذا العرض المتكامل لإطلاق منصتها الإلكترونية الأولى للحجوزات السياحية، والتي تمثل خطوة استراتيجية نحو التحول الرقمي الكامل لأعمال الوكالة، وتوسيع نطاق وصولها إلى شرائح جديدة من العملاء داخل جمهورية مصر العربية وخارجها.\n\nتُمثّل **الباقة الأساسية** نقطة الانطلاق المثالية للوكالات السياحية التي ترغب في دخول السوق الرقمية بسرعة وكفاءة، دون التضحية بجودة التجربة المُقدَّمة للعميل النهائي. تم تصميم هذه الباقة لتلبي الحد الأدنى من المتطلبات الأساسية لأي منصة حجوزات احترافية، مع توفير هامش واسع للتوسع المستقبلي.\n\nتشتمل المنصة على القدرة الكاملة على البحث عن الرحلات الجوية وحجزها مباشرة من خلال الربط مع نظام **أماديوس العالمي**، أحد أكبر مزودي محتوى الطيران في العالم، بالإضافة إلى البحث والحجز في الفنادق عبر مزود رئيسي واحد، مع توفير تجربة استخدام سلسة وآمنة باللغتين العربية والإنجليزية، وبوابات دفع موثوقة تشمل **Paymob** و**Stripe** لخدمة جميع شرائح العملاء.\n\nنلتزم بتسليم المشروع كاملاً خلال فترة لا تتجاوز **عشرة أسابيع** من تاريخ التوقيع، بقيمة إجمالية قدرها **595,000 جنيه مصري** فقط، يتم سدادها على أربع دفعات مرنة. كما نضمن استقرار المنصة وتشغيلها بكفاءة عبر باقة الصيانة الشهرية بقيمة **10,000 جنيه مصري** لضمان استمرارية العمل وسرعة الاستجابة لأي ملاحظات.\n\nنؤمن أن هذا الاستثمار سيمكّن جولة تورز من تحقيق نمو ملموس في إيرادات الحجوزات خلال الأرباع الأولى من التشغيل، وتقليل تكاليف الحجز اليدوي بنسبة كبيرة، مع بناء قاعدة بيانات قيمة من العملاء يمكن البناء عليها مستقبلاً.\n\n---\n\n## فهم احتياجات العميل\n\nتأسست شركة **جولة تورز للسياحة** على إرث طويل من الخدمة المتميزة في السوق السياحي المصري، وقد رصدنا بعناية متطلبات الوكالة في المرحلة الحالية، والتي يمكن تلخيصها في النقاط التالية:\n\n### 1. الانتقال من النموذج التقليدي إلى الرقمي\nتعتمد الوكالة حالياً بشكل كبير على الحجز اليدوي عبر المكالمات الهاتفية والزيارات المباشرة للفرع، مما يفرض ضغطاً متزايداً على فريق المبيعات ويُحدث فجوة في خدمة العملاء خارج ساعات العمل الرسمية. هناك حاجة ملحة لإتاحة الحجز للعميل في أي وقت ومن أي مكان.\n\n### 2. توسيع قاعدة العملاء\nتطمح جولة تورز إلى استقطاب شريحة العملاء الشباب وأصحاب الثقافة الرقمية، الذين يفضلون إتمام رحلاتهم عبر الإنترنت دون الحاجة إلى التواصل المباشر، وهي شريحة تنمو بمعدلات متسارعة في السوق المصري.\n\n### 3. تقديم تجربة عميل احترافية\nهناك إدراك واضح لدى الإدارة بأن التجربة الرقمية يجب أن تكون على نفس مستوى المنافسين الإقليميين والعالميين، من حيث سرعة البحث، ووضوح الأسعار، وسهولة إتمام عملية الدفع، وموثوقية تأكيدات الحجز.\n\n### 4. التحكم في المخزون والأسعار\nتحتاج الإدارة إلى أداة موحدة تتيح لها متابعة الحجوزات اليومية، ومعرفة حالة كل حجز، والتحكم في عرض المنتجات السياحية، دون الاعتماد على جداول إلكترونية أو سجلات ورقية.\n\n### 5. الجاهزية للنمو\nنُدرك أن المرحلة الأولى ليست نهاية المطاف، وأن المنصة يجب أن تُبنى على أسس تسمح بإضافة خدمات وميزات متقدمة في المستقبل دون الحاجة لإعادة البناء من الصفر.\n\n### 6. الالتزام بالمعايير المحلية\nيجب أن تُراعي المنصة خصوصية السوق المصري من حيث اللغة، والعملة، والمحتوى الثقافي، وبوابات الدفع المحلية الشائعة، ولوائح حماية المستهلك المعمول بها.\n\n---\n\n## الأهداف التجارية\n\nتستهدف هذه المنصة تحقيق مجموعة من الأهداف التجارية القابلة للقياس، والتي تنعكس مباشرة على نمو الإيرادات وتحسين الكفاءة التشغيلية:\n\n### الأهداف الأساسية\n\n1. **زيادة حجم الحجوزات الشهرية بنسبة لا تقل عن 40%** خلال أول ستة أشهر من إطلاق المنصة، من خلال إتاحة الحجز على مدار الساعة.\n\n2. **تقليل تكلفة الحجز الواحد بنسبة 30% على الأقل**، عبر أتمتة العمليات وتقليل الاعتماد على التدخل البشري في كل عملية حجز.\n\n3. **بناء قاعدة بيانات تسويقية** تضم بيانات عملاء حقيقية يمكن استخدامها في حملات إعادة الاستهداف والعروض الموسمية.\n\n4. **توسيع الانتشار الجغرافي** ليشمل عملاء من المحافظات التي لا تتواجد فيها الوكالة فيزيائياً.\n\n5. **تحسين سمعة العلامة التجارية** من خلال تقديم تجربة رقمية احترافية تعكس مكانة جولة تورز في السوق.\n\n### الأهداف الثانوية\n\n- خفض زمن استجابة العميل من ساعات إلى دقائق معدودة.\n- توفير قناة إضافية للتسويق المباشر للعروض الحصرية.\n- بناء سمعة رقمية إيجابية عبر تقييمات العملاء.\n- تمكين الإدارة من اتخاذ قرارات مبنية على بيانات حقيقية حول سلوك العملاء.\n- توفير ميزة تنافسية واضحة على الوكالات التقليدية التي لم تتحول رقمياً بعد.\n\n---\n\n## نطاق المشروع\n\nيشمل نطاق المشروع تصميم وتطوير وإطلاق منصة إلكترونية متكاملة لحجز الرحلات الجوية والفنادق، تتضمن المكونات التالية:\n\n### المكون الأول: الواجهة العامة للعملاء\n\nتتيح للزائر تصفح المنتجات السياحية المتاحة، البحث عن الرحلات الجوية والفنادق، مقارنة الأسعار، اختيار الخيار المناسب، وإتمام عملية الدفع بسلاسة. الواجهة مصممة لتعمل بكفاءة على أجهزة الحاسب المكتبية والأجهزة اللوحية والهواتف الذكية.\n\n### المكون الثاني: نظام إدارة الحساب الشخصي للعميل\n\nيستطيع العميل من خلاله إنشاء حساب شخصي، حفظ بياناته الأساسية، استعراض حجوزاته السابقة، وتحميل إيصالات الحجز.\n\n### المكون الثالث: بوابات الدفع الآمنة\n\nتكامل مباشر مع بوابة **Paymob** المحلية لخدمة الدفع بالبطاقات المحلية والمحافظ الإلكترونية، إضافة إلى بوابة **Stripe** العالمية لخدمة الدفع الدولي بالبطاقات الائتمانية الدولية.\n\n### المكون الرابع: لوحة الإدارة الداخلية\n\nأداة بسيطة وفعّالة تُتيح لفريق جولة تورز متابعة الحجوزات، إدارة المحتوى، عرض الإحصاءات الأساسية، والتدخل اليدوي عند الحاجة.\n\n### المكون الخامس: نظام الإشعارات والتأكيدات\n\nإرسال رسائل بريد إلكتروني تلقائية تتضمن تفاصيل الحجز، تأكيدات الدفع، والإيصالات الرسمية.\n\n### المكون السادس: دعم لغوي ثنائي\n\nكامل المحتوى والواجهات متاح باللغتين العربية والإنجليزية، مع مراعاة قواعد الاتجاه من اليمين إلى اليسار في العربية.\n\n### المكون السابع: التدريب والتأهيل\n\nتدريب فريق جولة تورز على استخدام لوحة الإدارة وأدوات المتابعة، وتسليم الوثائق التشغيلية اللازمة.\n\n---\n\n## المخرجات\n\nتتضمن مخرجات المشروع المُسلَّمة إلى شركة جولة تورز ما يلي:\n\n| # | المُخرَج | الوصف | تاريخ التسليم المتوقع |\n|---|---------|-------|----------------------|\n| 1 | الهوية البصرية الرقمية | تصميم الواجهات الرئيسية للموقع بألوان وشعار جولة تورز | نهاية الأسبوع الثاني |\n| 2 | الواجهة العامة | موقع إلكتروني كامل للعملاء بصفحاته الأساسية | نهاية الأسبوع السادس |\n| 3 | محرك البحث والحجز | تكامل كامل مع أماديوس ومزود الفنادق | نهاية الأسبوع السابع |\n| 4 | بوابة الدفع المتكاملة | دفع آمن عبر Paymob و Stripe | نهاية الأسبوع الثامن |\n| 5 | لوحة الإدارة | أداة متابعة وإدارة شاملة للفريق الداخلي | نهاية الأسبوع الثامن |\n| 6 | الوثائق التشغيلية | دليل استخدام مُفصَّل بالعربية | مع التسليم النهائي |\n| 7 | الفيديوهات التدريبية | شرح مرئي لجميع وظائف اللوحة الإدارية | مع التسليم النهائي |\n| 8 | شهادات الاختبار | تقرير اختبارات الجودة الشامل | قبل الإطلاق بأسبوع |\n| 9 | الإطلاق الرسمي | إطلاق المنصة على النطاق الرسمي للشركة | نهاية الأسبوع العاشر |\n| 10 | المتابعة بعد الإطلاق | دعم مكثف لأول 30 يوماً من الإطلاق | شهر كامل بعد الإطلاق |\n\n---\n\n## ميزات العميل\n\nتركّز الباقة الأساسية على تقديم تجربة عميل سلسة وموثوقة عبر مجموعة مدروسة من الميزات التي تغطي الاحتياجات الأساسية للمسافر العصري:\n\n### أولاً: البحث الذكي عن الرحلات الجوية\n\n- بحث متقدم باستخدام نقطة الانطلاق، نقطة الوصول، التاريخ، وعدد المسافرين.\n- عرض جميع الرحلات المتاحة مع تفاصيل واضحة (شركة الطيران، وقت الإقلاع والهبوط، عدد التوقفات، السعر النهائي).\n- إمكانية تصفية النتائج حسب السعر، وقت الإقلاع، شركة الطيران، ومدة الرحلة.\n- عرض الرحلات ذهاب فقط أو ذهاب وعودة.\n- اختيار درجة المقعد (اقتصادي، أعمال، أولى).\n\n### ثانياً: البحث الذكي عن الفنادق\n\n- بحث بحسب الوجهة، تواريخ الإقامة، عدد الغرف، وعدد النزلاء.\n- عرض الفنادق مع صور احترافية، تقييمات، ووصف مفصل لكل فندق.\n- تصفية حسب السعر، فئة النجوم، الموقع، والمرافق المتاحة (واي فاي، إفطار، مسبح، إلخ).\n- خريطة تفاعلية تُظهر مواقع الفنادق.\n- عرض سياسة الإلغاء بوضوح قبل تأكيد الحجز.\n\n### ثالثاً: حساب شخصي مبسّط\n\n- التسجيل السريع بالبريد الإلكتروني أو رقم الهاتف.\n- حفظ البيانات الشخصية لتسريع الحجوزات المستقبلية.\n- استعراض جميع الحجوزات السابقة في مكان واحد.\n- إعادة تحميل الإيصالات الرسمية في أي وقت.\n\n### رابعاً: تجربة دفع موثوقة\n\n- دفع آمن عبر بطاقات الفيزا والماستركارد والميزة المصرية.\n- قبول الدفع عبر المحافظ الإلكترونية المصرية (فودافون كاش، أورانج موني، إتصالات كاش).\n- شاشة دفع آمنة بتشفير كامل.\n- إيصال إلكتروني فوري بعد إتمام العملية.\n\n### خامساً: تأكيدات وإشعارات تلقائية\n\n- استلام بريد إلكتروني فوري بعد الحجز يتضمن جميع التفاصيل.\n- إيصال PDF احترافي قابل للتحميل والطباعة.\n- تذكيرات قبل موعد الرحلة بفترة كافية.\n\n### سادساً: دعم لغوي كامل\n\n- التبديل الفوري بين العربية والإنجليزية بضغطة واحدة.\n- محتوى مُحرَّر باحترافية في اللغتين، وليس ترجمة آلية.\n- اتجاه الكتابة من اليمين إلى اليسار يحترم قواعد اللغة العربية.\n\n### سابعاً: عرض الأسعار بالجنيه المصري\n\n- عرض جميع الأسعار بالجنيه المصري كعملة رئيسية.\n- شفافية كاملة في الأسعار: لا توجد رسوم خفية، السعر المعروض هو السعر النهائي.\n\n### ثامناً: تصميم متجاوب مع جميع الأجهزة\n\n- تجربة استخدام مُحسَّنة على الهواتف الذكية، الأجهزة اللوحية، وأجهزة الحاسب.\n- سرعة تحميل عالية حتى على الشبكات البطيئة.\n\n---\n\n## رحلة المستخدم\n\nنستعرض فيما يلي رحلة العميل النموذجية من لحظة الدخول إلى المنصة حتى استلام تأكيد الحجز، لتوضيح مدى سلاسة التجربة المُقدَّمة:\n\n### المرحلة الأولى: الاستكشاف\n\nيدخل العميل إلى الصفحة الرئيسية للمنصة، فيستقبله تصميم احترافي يعرض أبرز العروض السياحية، شريط بحث رئيسي بارز، وأقسام واضحة (رحلات طيران، فنادق). يستطيع العميل التنقل بحرية وبدون أي تسجيل في هذه المرحلة.\n\n### المرحلة الثانية: البحث\n\nيُدخل العميل تفاصيل بحثه (مثال: القاهرة إلى دبي، 15 أغسطس - 22 أغسطس، 2 مسافر بالغ). يضغط زر البحث، فيرى خلال ثوانٍ معدودة جميع الخيارات المتاحة مع تفاصيلها الكاملة.\n\n### المرحلة الثالثة: المقارنة والاختيار\n\nيستخدم العميل أدوات التصفية لتضييق نتائج البحث، يقارن بين الخيارات المختلفة، ويستعرض تفاصيل كل خيار بدقة (للرحلات: مواعيد الإقلاع والهبوط، وزن الأمتعة، سياسة التغيير. للفنادق: الصور، الموقع، التقييمات، المرافق).\n\n### المرحلة الرابعة: الحجز\n\nيختار العميل الخيار المناسب، فينتقل إلى صفحة إدخال بيانات المسافرين. يُملأ النموذج بسهولة مع تحقق فوري من صحة البيانات. يطّلع على ملخص الحجز وسياسة الإلغاء بوضوح قبل المتابعة.\n\n### المرحلة الخامسة: الدفع\n\nيختار العميل وسيلة الدفع المفضلة من بين الخيارات المتاحة (بطاقة ائتمانية، محفظة إلكترونية)، يُكمل بيانات الدفع على شاشة آمنة، ويضغط زر الدفع. تتم العملية خلال ثوانٍ، ويستقبل رسالة نجاح فورية.\n\n### المرحلة السادسة: التأكيد\n\nيستقبل العميل بريداً إلكترونياً تأكيدياً يتضمن جميع تفاصيل الحجز، رقم مرجعي يمكن استخدامه عند التواصل مع خدمة العملاء، وإيصال PDF احترافي. كما يظهر الحجز فوراً في صفحة \"حجوزاتي\" داخل حسابه.\n\n### المرحلة السابعة: قبل السفر\n\nقبل موعد الرحلة بأيام، يستقبل العميل تذكيراً يحتوي على تفاصيل الرحلة وأي إرشادات مهمة (مثل: زمن الوصول للمطار، متطلبات السفر).\n\n---\n\n## الفوائد لوكالة السفر\n\nتُحقق هذه المنصة لشركة جولة تورز جملة من الفوائد الاستراتيجية والتشغيلية:\n\n### الفوائد المالية المباشرة\n\n- **زيادة الإيرادات** من خلال إتاحة الحجز على مدار 24 ساعة و7 أيام في الأسبوع، بما في ذلك العطلات الرسمية والمناسبات.\n- **خفض التكاليف التشغيلية** عبر تقليل الحاجة إلى موظفي الحجز اليدوي، مع توجيه الفريق الحالي للتركيز على الحجوزات المعقدة والعملاء VIP.\n- **زيادة هامش الربح** عن طريق تحسين كفاءة العمليات وتقليل الأخطاء البشرية المكلفة.\n\n### الفوائد التشغيلية\n\n- **توحيد قنوات الحجز** في منصة مركزية واحدة، بدلاً من تشتت البيانات بين الهاتف، البريد، والمكتب.\n- **رؤية شاملة لحالة الأعمال** عبر لوحة معلومات تعرض الحجوزات اليومية والأسبوعية والشهرية.\n- **تقليل الأخطاء البشرية** في تسجيل بيانات الحجوزات.\n\n### الفوائد التسويقية\n\n- **بناء قاعدة بيانات عملاء** قيّمة لاستخدامها في الحملات التسويقية المستقبلية.\n- **تعزيز الحضور الرقمي** للعلامة التجارية في محركات البحث.\n- **زيادة الثقة لدى العملاء الجدد** عبر منصة احترافية تعكس مصداقية الشركة.\n\n### الفوائد الاستراتيجية\n\n- **المنافسة بفعالية** مع كبار اللاعبين في السوق الإقليمي.\n- **بناء أصل رقمي** يزيد من قيمة الشركة على المدى الطويل.\n- **الاستعداد للتوسع** الإقليمي مستقبلاً عبر منصة قابلة للنمو.\n\n---\n\n## الجدول الزمني\n\nتم تخطيط المشروع لينتهي خلال فترة لا تتجاوز عشرة أسابيع، موزعة كما يلي:\n\n| الأسبوع | المرحلة | الأنشطة الرئيسية | المُخرَجات |\n|---------|---------|------------------|-----------|\n| 1 | البدء والتخطيط | اجتماع البدء، جمع المتطلبات التفصيلية، اعتماد الهوية البصرية | وثيقة المتطلبات النهائية |\n| 2 | التصميم | تصميم واجهات المستخدم الرئيسية | نماذج التصميم القابلة للاعتماد |\n| 3 | البناء الأساسي | بناء الهيكل العام للمنصة والصفحات الثابتة | الصفحات الرئيسية جاهزة للمعاينة |\n| 4 | محرك البحث | تكامل أماديوس للرحلات الجوية | البحث عن الرحلات يعمل بالكامل |\n| 5 | الفنادق | تكامل مزود الفنادق | البحث عن الفنادق يعمل بالكامل |\n| 6 | الحساب الشخصي | بناء نظام تسجيل العملاء وحساباتهم الشخصية | الحسابات الشخصية جاهزة |\n| 7 | الدفع والإشعارات | تكامل بوابات الدفع والإشعارات الإلكترونية | عملية حجز كاملة قابلة للاختبار |\n| 8 | لوحة الإدارة | بناء لوحة الإدارة الداخلية | اللوحة الإدارية جاهزة |\n| 9 | الاختبار والتدريب | اختبارات شاملة، تدريب الفريق، تصحيح الملاحظات | منصة مختبرة وفريق مُدرَّب |\n| 10 | الإطلاق | الإطلاق الرسمي والمتابعة | منصة منشورة وتعمل |\n\n> **ملاحظة:** قد يمتد الجدول الزمني إلى الأسبوع الثاني عشر في حال طلب العميل تعديلات جوهرية على المتطلبات بعد بدء التنفيذ.\n\n---\n\n## جدول الدفع\n\nتم تقسيم القيمة الإجمالية للمشروع البالغة **595,000 جنيه مصري** على أربع دفعات مرنة، بحيث ترتبط كل دفعة بمرحلة محددة من التقدم:\n\n| الدفعة | النسبة | القيمة (جنيه مصري) | موعد الاستحقاق | المرحلة المرتبطة |\n|--------|--------|---------------------|----------------|------------------|\n| الأولى | 30% | 178,500 جنيه | عند توقيع العقد | بدء المشروع وتأمين الموارد |\n| الثانية | 25% | 148,750 جنيه | نهاية الأسبوع الرابع | اكتمال التصميم وتكامل أماديوس |\n| الثالثة | 25% | 148,750 جنيه | نهاية الأسبوع الثامن | اكتمال جميع الميزات الأساسية |\n| الرابعة | 20% | 119,000 جنيه | بعد الإطلاق الناجح | اعتماد التسليم النهائي |\n| **الإجمالي** | **100%** | **595,000 جنيه** | | |\n\n### شروط الدفع\n\n- جميع المدفوعات تُسدَّد بالجنيه المصري عبر التحويل البنكي إلى الحساب المعتمد للطرف المُنفِّذ.\n- يتم إصدار فاتورة ضريبية رسمية مع كل دفعة وفقاً للقانون المصري.\n- يتم احتساب ضريبة القيمة المضافة بنسبة 14% فوق المبلغ المذكور إن انطبقت.\n- تأخر السداد لأكثر من 14 يوماً من تاريخ الاستحقاق قد يستوجب تعليق العمل مؤقتاً.\n\n---\n\n## الضمان\n\nنلتزم بضمان شامل على المنصة المُسلَّمة، يشمل ما يلي:\n\n### مدة الضمان\n\n**90 يوماً** كاملة من تاريخ الإطلاق الرسمي للمنصة.\n\n### نطاق الضمان\n\n- **معالجة جميع الأخطاء البرمجية** التي تظهر في الوظائف المُسلَّمة دون أي رسوم إضافية.\n- **استجابة سريعة** للملاحظات الحرجة خلال 4 ساعات عمل.\n- **تصحيح الأخطاء غير الحرجة** خلال 24-48 ساعة عمل.\n- **ضمان عمل جميع التكاملات** مع أماديوس ومزود الفنادق وبوابات الدفع طوال فترة الضمان.\n\n### الالتزامات أثناء الضمان\n\n- مراقبة مستمرة لأداء المنصة.\n- تقارير دورية أسبوعية بحالة المنصة خلال الشهر الأول.\n- اجتماع متابعة شهري لاستعراض الأداء والملاحظات.\n- توفير قناة تواصل مباشرة لفريق جولة تورز للإبلاغ عن أي ملاحظات.\n\n### ما لا يشمله الضمان\n\n- الميزات الجديدة أو التعديلات التي تتجاوز نطاق المتطلبات المُعتمدة.\n- المشاكل الناتجة عن التدخل المباشر من فريق العميل في إعدادات المنصة.\n- المشاكل الناتجة عن خدمات طرف ثالث (مثل انقطاع خدمة بوابة الدفع).\n\n---\n\n## الصيانة\n\nنقدم باقة صيانة شهرية مرنة بقيمة **10,000 جنيه مصري شهرياً** تشمل:\n\n### الصيانة الفنية\n\n- متابعة استقرار المنصة ومراقبتها على مدار الساعة.\n- تطبيق التحديثات الأمنية الدورية.\n- النسخ الاحتياطي اليومي لجميع بيانات الحجوزات.\n- معالجة المشاكل الطارئة بسرعة استجابة قصوى 8 ساعات.\n\n### الصيانة الوظيفية\n\n- إصلاح أي خلل يظهر في الميزات المُسلَّمة.\n- التوافق مع أي تحديثات تطرأ على واجهات أماديوس أو مزود الفنادق أو بوابات الدفع.\n- ضبط الأداء وتحسين سرعة الاستجابة.\n\n### الدعم الفني\n\n- قناة دعم مخصصة لفريق جولة تورز عبر البريد الإلكتروني.\n- خط ساخن للحالات الحرجة.\n- تقرير شهري مفصل بأنشطة الصيانة المُنفَّذة.\n\n### حدود الباقة الأساسية للصيانة\n\n- تشمل ما يصل إلى 10 ساعات عمل شهرياً لتنفيذ تعديلات صغيرة.\n- التعديلات الكبيرة أو الميزات الجديدة تُسعَّر بشكل منفصل.\n\n---\n\n## الافتراضات\n\nيستند هذا العرض إلى مجموعة من الافتراضات الجوهرية التي يجب أن تتحقق لضمان نجاح المشروع:\n\n1. **توفر العميل للقرارات السريعة**: يلتزم فريق جولة تورز بالرد على الاستفسارات واعتماد التصاميم خلال 3 أيام عمل كحد أقصى لكل مرحلة.\n\n2. **الحصول على بيانات الاعتماد**: يلتزم العميل بتوفير بيانات الاعتماد اللازمة من أماديوس، مزود الفنادق، وبوابات الدفع قبل بدء مرحلة التكامل.\n\n3. **توفر المحتوى الأولي**: يلتزم العميل بتوفير المحتوى التسويقي الأساسي (شعار الشركة، نصوص الصفحة الرئيسية، صور الفنادق التعريفية) خلال الأسبوع الأول.\n\n4. **تثبيت نطاق المشروع**: يفترض العرض ثبات المتطلبات المُعتمدة، وأي تغييرات جوهرية بعد البدء قد تستوجب إعادة تقييم الجدول الزمني والتكلفة.\n\n5. **توفر بنية تحتية مناسبة**: يفترض توفر استضافة سحابية حديثة لاستضافة المنصة (يمكن للطرف المُنفِّذ التوصية بمزود مناسب).\n\n6. **اتفاقيات صحيحة مع مزودي المحتوى**: يلتزم العميل بوجود اتفاقيات سارية وصحيحة مع جميع مزودي المحتوى (طيران، فنادق، دفع).\n\n7. **التزام العميل بالاجتماعات الدورية**: يلتزم ممثل العميل بحضور الاجتماعات الأسبوعية لمتابعة سير العمل.\n\n---\n\n## الاستثناءات\n\nلا يشمل هذا العرض البنود التالية، والتي يمكن إضافتها كخدمات مستقلة عند الحاجة:\n\n### الميزات غير المشمولة\n\n- **التطبيقات على الهواتف الذكية**: لا يشمل العرض تطبيق iOS أو Android (متوفرة في الباقات الأعلى).\n- **حجز الباقات السياحية المُجمَّعة**: لا يشمل العرض دمج رحلة طيران مع فندق في باقة واحدة.\n- **بوابة الوكلاء B2B**: لا يشمل العرض منصة منفصلة لوكلاء السفر.\n- **نظام نقاط الولاء**: لا يشمل العرض نظام مكافآت للعملاء المتكررين.\n- **المحفظة الإلكترونية**: لا يشمل العرض محفظة داخلية للعميل.\n- **إشعارات الواتساب**: لا يشمل العرض إرسال إشعارات عبر WhatsApp (تُكتفى بالبريد الإلكتروني).\n- **تعدد العملات**: تعمل المنصة بالجنيه المصري كعملة أساسية.\n\n### الخدمات غير المشمولة\n\n- إنتاج المحتوى التسويقي (نصوص، صور، فيديوهات).\n- الحملات التسويقية الرقمية وإدارة الإعلانات.\n- ترجمة المحتوى إلى لغات إضافية غير العربية والإنجليزية.\n- استضافة المنصة (تُحتسب رسوم الاستضافة منفصلة).\n- شراء النطاق الإلكتروني.\n- الإجراءات القانونية والتسجيلات الرسمية للشركة كوكالة سياحة إلكترونية.\n- تدريب موظفي جولة تورز على مهارات خدمة العملاء.\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- تنتقل ملكية الكود البرمجي للمنصة إلى شركة جولة تورز بعد سداد كامل قيمة المشروع.\n- تحتفظ الشركة المُنفِّذة بحق الإشارة إلى المشروع كعمل مرجعي في معرض أعمالها، مع احترام أي معلومات سرية.\n\n### 2. السرية\n\n- يلتزم الطرفان بسرية كافة المعلومات المتبادلة خلال مدة المشروع وبعدها.\n- لا يجوز لأي طرف الإفصاح عن المعلومات التجارية أو التقنية للطرف الآخر دون إذن خطي.\n\n### 3. تعديل النطاق\n\n- يجوز إجراء تعديلات على النطاق عبر طلب خطي رسمي.\n- يتم تقييم أثر التعديل على الجدول الزمني والتكلفة، ولا يبدأ التنفيذ إلا بعد اعتماد التقييم من العميل.\n\n### 4. التسليم والاستلام\n\n- يُعتبر التسليم نهائياً بعد مرور 14 يوماً من تاريخ الإشعار بالاستلام دون اعتراض خطي مسبَّب.\n- يلتزم العميل بمراجعة المُخرَجات خلال هذه الفترة وتقديم ملاحظاته إن وُجدت.\n\n### 5. القوة القاهرة\n\n- لا يُعتبر أي طرف مخلاً بالتزاماته إذا كان السبب راجعاً لظروف القوة القاهرة (الكوارث الطبيعية، الحروب، الأوبئة، قرارات حكومية).\n\n### 6. حل النزاعات\n\n- يسعى الطرفان لحل أي خلاف ودياً.\n- في حال تعذر الحل الودي، تختص محاكم مدينة القاهرة بالنظر في النزاع وفق القانون المصري.\n\n### 7. الإنهاء\n\n- يحق لأي طرف إنهاء العقد بإشعار خطي مسبق مدته 30 يوماً.\n- في حال الإنهاء، يستحق الطرف المُنفِّذ قيمة العمل المُنجَز حتى تاريخ الإنهاء.\n\n### 8. الفواتير والضرائب\n\n- جميع الأسعار لا تشمل ضريبة القيمة المضافة.\n- تُصدر الفواتير الضريبية وفق القانون المصري.\n\n---\n\n## صفحة التوقيع\n\nتم إعداد هذا العرض بكل دقة وعناية ليعكس فهمنا الكامل لاحتياجات شركة جولة تورز للسياحة، ويُمثل التزامنا الجاد بتنفيذه ضمن الأطر الزمنية والمالية المحددة.\n\nنتطلع إلى شراكة طويلة الأمد تُحقق التطلعات الرقمية للوكالة، وتفتح آفاقاً جديدة من النمو.\n\n---\n\n### عن الطرف الأول (العميل)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | شركة جولة تورز للسياحة |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### عن الطرف الثاني (المُنفِّذ)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | _______________________ |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### شاهد\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n> **ملاحظة ختامية:** يُعدّ توقيع هذه الوثيقة من قِبل الطرفين بمثابة الموافقة الكاملة على جميع البنود والشروط المذكورة، ويُصبح هذا المستند جزءاً لا يتجزأ من العقد الرسمي الذي سيُحرَّر لاحقاً.\n\n> **تاريخ الإصدار:** 29 يونيو 2026\n> **رقم العرض:** JT-2026-BASIC-001\n> **سريان العرض:** ينتهي في 29 يوليو 2026 ما لم يتم تمديده خطياً.\n\n---\n\n*شكراً لثقتكم بنا، ونتطلع لبدء هذه الرحلة معكم.*\n","proposals-professional":"# عرض مشروع منصة الحجوزات الإلكترونية - الباقة الاحترافية\n\n---\n\n## صفحة الغلاف\n\n| البند | التفاصيل |\n|-------|----------|\n| **اسم المشروع** | منصة جولة للحجوزات الإلكترونية - الباقة الاحترافية |\n| **العميل** | شركة جولة تورز للسياحة (Jawla Tours) |\n| **المقدّم إلى** | الإدارة العليا - شركة جولة تورز |\n| **تاريخ العرض** | 29 يونيو 2026 |\n| **رقم الإصدار** | الإصدار 1.0 |\n| **سريان العرض** | 30 يوماً من تاريخ الإصدار |\n| **مُعدّ بواسطة** | فريق الاستشارات الرقمية |\n| **حالة الوثيقة** | عرض رسمي للاعتماد |\n| **العملة المعتمدة** | الجنيه المصري (EGP) |\n| **القيمة الإجمالية** | 845,000 جنيه مصري |\n| **مدة التنفيذ** | من 12 إلى 14 أسبوعاً |\n| **رسوم الصيانة الشهرية** | 18,000 جنيه مصري شهرياً |\n| **نوع الباقة** | احترافية - الأكثر طلباً |\n\n> هذه الوثيقة سرية ومُعدّة حصرياً لشركة جولة تورز للسياحة. لا يجوز إعادة توزيعها أو نسخها كلياً أو جزئياً دون إذن خطي مسبق من الطرف المُعِد.\n\n---\n\n## الملخص التنفيذي\n\nنقدم لشركة **جولة تورز للسياحة** هذا العرض المتقدم لإطلاق منصتها الإلكترونية الاحترافية للحجوزات السياحية، والذي يمثّل قفزة نوعية في مستوى الخدمات الرقمية المُقدَّمة لعملاء الوكالة، ويفتح آفاقاً واسعة للنمو والتوسع في السوق المحلي والإقليمي.\n\nتُمثّل **الباقة الاحترافية** الخيار الأمثل للوكالات السياحية التي تسعى لبناء حضور رقمي قوي ومتكامل، يُنافس كبار اللاعبين في السوق دون التضحية بهوية الشركة وتميّزها. تم تصميم هذه الباقة لتُلبي طموحات الوكالات الجادة في التحول الرقمي الشامل، مع توفير أدوات متقدمة لإدارة العمليات وتحسين تجربة العملاء.\n\nتتميز هذه الباقة بتقديم تجربة مكتملة الأركان للعميل، تشمل البحث عن الرحلات الجوية عبر نظام **أماديوس العالمي**، والبحث عن الفنادق عبر مزودين متعددين لتقديم أفضل الأسعار والخيارات، ونظام نقاط ولاء مُحفِّز للحجوزات المتكررة، ومحفظة إلكترونية داخلية مرنة، وإشعارات فورية عبر **واتساب** بجانب البريد الإلكتروني، ولوحة تحكم متطورة للعميل تتيح له إدارة حجوزاته والإلغاء واسترداد المبالغ بشكل ذاتي.\n\nكما تضم الباقة لوحة إدارة احترافية لفريق جولة تورز تشمل التقارير التفصيلية، وإدارة العملاء، وتعدد العملات لخدمة العملاء الدوليين، ومرشحات بحث متقدمة تُحاكي أرقى المنصات العالمية.\n\nنلتزم بتسليم المشروع كاملاً خلال فترة لا تتجاوز **أربعة عشر أسبوعاً** من تاريخ التوقيع، بقيمة إجمالية قدرها **845,000 جنيه مصري** فقط، يتم سدادها على أربع دفعات مرنة. كما نضمن استقرار المنصة وتشغيلها بكفاءة عبر باقة الصيانة الشهرية بقيمة **18,000 جنيه مصري** التي توفر تغطية شاملة للمتطلبات التشغيلية.\n\nنؤمن أن هذا الاستثمار سيمكّن جولة تورز من تحقيق نمو ملموس في الإيرادات يتراوح بين 60% و 100% خلال السنة الأولى من التشغيل، وبناء قاعدة عملاء أوفياء من خلال نظام الولاء، وتقليل تكاليف خدمة العملاء بنسبة تتجاوز 50% عبر أدوات الخدمة الذاتية المتقدمة.\n\n---\n\n## فهم احتياجات العميل\n\nتأسست شركة **جولة تورز للسياحة** على إرث طويل من الخدمة المتميزة في السوق السياحي المصري، وقد رصدنا بعناية تطلعات الوكالة في المرحلة المقبلة، والتي تتجاوز مجرد التحول الرقمي البسيط لتشمل بناء منظومة متكاملة تُنافس على المستوى الإقليمي:\n\n### 1. التحول الرقمي الشامل لا الجزئي\nتسعى جولة تورز إلى نقلة نوعية تتجاوز مجرد إضافة موقع بسيط للحجز، إلى بناء منظومة رقمية متكاملة تُدير دورة حياة العميل الكاملة من الاكتشاف وحتى ما بعد الرحلة.\n\n### 2. تقديم خيارات أوسع للعميل\nيُدرك العميل العصري قيمة المقارنة بين الخيارات المتعددة. تحتاج المنصة إلى الربط مع مزودي فنادق متعددين لضمان توفير أفضل الأسعار وأوسع الخيارات، مما يُعزز ثقة العميل في عرض الوكالة.\n\n### 3. بناء قاعدة عملاء أوفياء\nلا يكفي اكتساب عميل جديد، بل يجب الاحتفاظ به وتشجيعه على تكرار الحجز. يستوجب ذلك بناء **نظام مكافآت ونقاط ولاء** يُكافئ العميل على كل حجز ويُحفّزه للعودة.\n\n### 4. خفض الضغط على فريق خدمة العملاء\nيستهلك فريق خدمة العملاء حالياً جزءاً كبيراً من وقته في الرد على استفسارات بسيطة (حالة الحجز، طلب نسخة من التذكرة، طلب الإلغاء). الحل في **لوحة تحكم ذاتية للعميل** تتيح له القيام بمعظم هذه المهام بنفسه.\n\n### 5. التواصل عبر القنوات المفضلة لدى العميل\nالبريد الإلكتروني لم يعد كافياً. العميل المصري يفضل **واتساب** للإشعارات السريعة والتأكيدات الفورية. يجب أن تواكب المنصة هذا التحول.\n\n### 6. شفافية كاملة في الأسعار والعملات\nيتعامل العميل المصري مع منتجات سياحية مُسعّرة بعملات متعددة (دولار، يورو، ريال سعودي). تحتاج المنصة إلى عرض الأسعار **بعملات متعددة** مع آلية تحويل واضحة وشفافة.\n\n### 7. أدوات إدارية أكثر تطوراً\nالإدارة بحاجة إلى تقارير تفصيلية تكشف عن مصادر الإيرادات، السلوك الشرائي للعملاء، الفنادق الأكثر طلباً، الوجهات الأكثر شعبية، وأوقات الذروة. هذه البيانات تُمكّن من اتخاذ قرارات استراتيجية مدروسة.\n\n### 8. مرونة في سياسات الإلغاء والاسترداد\nتحتاج الوكالة إلى آلية واضحة ومرنة للتعامل مع طلبات الإلغاء واسترداد المبالغ بما يحمي مصلحة الوكالة ويوفر تجربة عادلة للعميل.\n\n---\n\n## الأهداف التجارية\n\nتستهدف هذه المنصة تحقيق مجموعة طموحة من الأهداف التجارية القابلة للقياس:\n\n### الأهداف الأساسية\n\n1. **مضاعفة حجم الحجوزات الشهرية** خلال أول تسعة أشهر من إطلاق المنصة، مقارنة بالأرقام الحالية للحجز اليدوي.\n\n2. **تحقيق نمو في الإيرادات بنسبة 60-100%** خلال السنة الأولى من التشغيل.\n\n3. **رفع متوسط قيمة الحجز** بنسبة 25% عبر الميزات الذكية التي تُشجع على إضافة خدمات تكميلية.\n\n4. **زيادة معدل تكرار الحجز** للعميل الواحد من مرة واحدة إلى مرتين سنوياً عبر نظام الولاء.\n\n5. **خفض تكلفة خدمة العميل** بنسبة 50% عبر أدوات الخدمة الذاتية.\n\n6. **توسيع قاعدة العملاء** لتشمل العملاء الدوليين والمصريين المقيمين بالخارج.\n\n### الأهداف الثانوية\n\n- تقليل معدل التخلي عن سلة الحجز إلى أقل من 20%.\n- تحقيق تقييمات إيجابية بمتوسط 4.5 من 5 على منصات التقييم العامة.\n- بناء قاعدة بيانات تتجاوز 50,000 عميل مُسجَّل خلال السنة الأولى.\n- تحقيق نسبة 30% من الحجوزات عبر الأجهزة المحمولة.\n- تحويل 15% من زوار المنصة إلى عملاء فعليين.\n- بناء سمعة رقمية تُتيح الدخول في شراكات استراتيجية مع شركات الطيران والفنادق.\n\n---\n\n## نطاق المشروع\n\nيشمل نطاق المشروع تصميم وتطوير وإطلاق منصة إلكترونية متكاملة ومتقدمة لحجز الرحلات الجوية والفنادق، تتضمن المكونات التالية:\n\n### المكون الأول: الواجهة العامة المتقدمة للعملاء\n\nواجهة احترافية تتيح للزائر تصفح المنتجات السياحية المتاحة، البحث المتقدم في الرحلات والفنادق، مقارنة الأسعار من مصادر متعددة، استخدام مرشحات بحث متطورة، واختيار الخيار المناسب وإتمام عملية الدفع بسلاسة.\n\n### المكون الثاني: لوحة تحكم العميل المتطورة\n\nلوحة تحكم شاملة تُتيح للعميل إدارة جميع جوانب علاقته بالوكالة:\n- استعراض الحجوزات النشطة والسابقة\n- تعديل الحجوزات (حسب السياسة)\n- إلغاء الحجوزات وطلب الاسترداد\n- متابعة حالة استرداد المبالغ\n- إدارة المحفظة الإلكترونية\n- متابعة رصيد نقاط الولاء\n- تحديث البيانات الشخصية\n- إدارة المسافرين المضافين\n\n### المكون الثالث: نظام نقاط الولاء\n\nنظام مكافآت متكامل يُكافئ العميل على كل عملية حجز، ويُتيح له استخدام النقاط في تخفيض قيمة الحجوزات المستقبلية أو الحصول على ترقيات حصرية.\n\n### المكون الرابع: المحفظة الإلكترونية\n\nمحفظة داخلية تُتيح للعميل شحن رصيد لاستخدامه في الحجوزات، تلقي قيمة استرداد المبالغ مباشرة، ودفع قيمة الحجوزات الجزئية أو الكاملة.\n\n### المكون الخامس: نظام إشعارات الواتساب\n\nتكامل مع واتساب لإرسال:\n- تأكيدات الحجز الفورية\n- تذكيرات قبل موعد الرحلة\n- إشعارات تغيير الحجوزات\n- العروض الترويجية المخصصة\n\n### المكون السادس: نظام إدارة الإلغاء والاسترداد\n\nنظام متكامل لإدارة طلبات الإلغاء بشكل ذاتي، مع آلية واضحة لاسترداد المبالغ بناءً على سياسة الإلغاء لكل منتج.\n\n### المكون السابع: لوحة الإدارة الاحترافية\n\nأداة إدارية متطورة تشمل:\n- إدارة الحجوزات الشاملة\n- إدارة العملاء\n- التقارير المالية والتحليلية\n- إدارة العروض الترويجية\n- إدارة نظام الولاء\n- إدارة الإلغاءات والاستردادات\n- إدارة المحتوى والوجهات\n\n### المكون الثامن: تعدد العملات\n\nعرض الأسعار بعملات متعددة (الجنيه المصري، الدولار الأمريكي، اليورو، الريال السعودي، الدرهم الإماراتي) مع تحديث تلقائي لأسعار الصرف.\n\n### المكون التاسع: المرشحات المتقدمة\n\nمرشحات بحث متطورة تُتيح للعميل تخصيص نتائج البحث بدقة عالية، مع حفظ التفضيلات للاستخدامات المستقبلية.\n\n### المكون العاشر: التدريب والتأهيل المكثف\n\nبرنامج تدريبي شامل لفريق جولة تورز يشمل التدريب على لوحة الإدارة، إدارة الحجوزات، التعامل مع طلبات الإلغاء، وقراءة التقارير التحليلية.\n\n---\n\n## المخرجات\n\nتتضمن مخرجات المشروع المُسلَّمة إلى شركة جولة تورز ما يلي:\n\n| # | المُخرَج | الوصف | تاريخ التسليم المتوقع |\n|---|---------|-------|----------------------|\n| 1 | الهوية البصرية المتقدمة | تصميم واجهات مخصصة بهوية جولة تورز | نهاية الأسبوع الثاني |\n| 2 | الواجهة العامة المتقدمة | موقع إلكتروني كامل بميزات متقدمة | نهاية الأسبوع السابع |\n| 3 | محرك البحث المتعدد | تكامل أماديوس وعدة مزودي فنادق | نهاية الأسبوع الثامن |\n| 4 | نظام الولاء | نظام نقاط متكامل قابل للتخصيص | نهاية الأسبوع التاسع |\n| 5 | المحفظة الإلكترونية | محفظة مرنة للعملاء | نهاية الأسبوع التاسع |\n| 6 | تكامل واتساب | إشعارات فورية عبر واتساب | نهاية الأسبوع العاشر |\n| 7 | لوحة تحكم العميل | تجربة ذاتية كاملة للعميل | نهاية الأسبوع العاشر |\n| 8 | نظام الإلغاء والاسترداد | آلية شاملة للاسترداد | نهاية الأسبوع الحادي عشر |\n| 9 | لوحة الإدارة الاحترافية | أدوات إدارة متقدمة | نهاية الأسبوع الثاني عشر |\n| 10 | نظام التقارير | تقارير تحليلية ومالية شاملة | نهاية الأسبوع الثاني عشر |\n| 11 | الوثائق التشغيلية | دليل استخدام مُفصَّل بالعربية | مع التسليم النهائي |\n| 12 | الفيديوهات التدريبية | شرح مرئي شامل لجميع الوظائف | مع التسليم النهائي |\n| 13 | شهادات الاختبار | تقرير اختبارات الجودة الشامل | قبل الإطلاق بأسبوعين |\n| 14 | الإطلاق الرسمي | إطلاق المنصة على النطاق الرسمي | نهاية الأسبوع الرابع عشر |\n| 15 | المتابعة بعد الإطلاق | دعم مكثف لأول 60 يوماً من الإطلاق | شهران كاملان |\n\n---\n\n## ميزات العميل\n\nتتضمن الباقة الاحترافية مجموعة شاملة من الميزات المتقدمة المصممة لتقديم تجربة استثنائية:\n\n### أولاً: البحث الذكي والمتقدم عن الرحلات الجوية\n\n- بحث متطور يدعم رحلات الذهاب فقط، الذهاب والعودة، والرحلات متعددة المحطات.\n- تصفية متقدمة بأكثر من 15 معياراً: السعر، شركة الطيران، عدد التوقفات، مدة الرحلة، وقت الإقلاع، وقت الهبوط، نوع التذكرة، وزن الأمتعة، وغيرها.\n- مقارنة جنباً إلى جنب بين الرحلات المختلفة.\n- عرض رحلات مرنة (±3 أيام) للعثور على أفضل الأسعار.\n- اقتراحات ذكية لرحلات بديلة.\n- حفظ عمليات البحث والعودة إليها لاحقاً.\n\n### ثانياً: البحث المتقدم في الفنادق متعدد المزودين\n\n- مقارنة الأسعار من **مزودين متعددين** للفندق الواحد، لضمان أفضل سعر.\n- مرشحات شاملة: السعر، فئة النجوم، الموقع، نوع الإقامة، المرافق (أكثر من 30 مرفق)، تقييمات المسافرين، نوع الإفطار، سياسة الإلغاء.\n- خريطة تفاعلية متطورة مع تصفية مكانية.\n- مقارنة بين عدة فنادق مرة واحدة.\n- عرض الأحياء السياحية والمعالم القريبة.\n- تقييمات مفصلة من نزلاء سابقين.\n- صور احترافية متعددة لكل فندق.\n\n### ثالثاً: نظام نقاط الولاء\n\n- كسب نقاط مع كل حجز (1 نقطة لكل 10 جنيهات يتم إنفاقها).\n- مستويات ولاء متعددة (برونزي، فضي، ذهبي، بلاتيني) مع مزايا متصاعدة.\n- استخدام النقاط لتخفيض قيمة الحجوزات المستقبلية.\n- نقاط مضاعفة في المناسبات الخاصة.\n- إهداء النقاط للأصدقاء والعائلة.\n- تذكير دوري بانتهاء صلاحية النقاط (سنوياً).\n- صفحة شخصية تعرض الإنجازات والمستوى الحالي.\n\n### رابعاً: المحفظة الإلكترونية الذكية\n\n- شحن رصيد بأي مبلغ عبر بوابات الدفع المختلفة.\n- استلام قيمة استرداد المبالغ الملغاة مباشرة في المحفظة.\n- الدفع الجزئي بالمحفظة + بطاقة ائتمانية.\n- سجل كامل بجميع حركات المحفظة.\n- إمكانية نقل الرصيد إلى حساب بنكي بشروط معينة.\n\n### خامساً: لوحة تحكم العميل الشاملة\n\n- نظرة عامة على جميع الحجوزات (قادمة، حالية، سابقة، ملغاة).\n- تفاصيل كاملة لكل حجز مع إمكانية إعادة تحميل التذاكر.\n- طلب إلغاء الحجوزات مباشرة من الحساب.\n- متابعة حالة طلبات الإلغاء واسترداد المبالغ.\n- إضافة وحذف بيانات المسافرين المضافين (الأسرة، الزملاء).\n- إدارة وثائق السفر (جوازات، تأشيرات) لتسهيل الحجوزات المستقبلية.\n- تحديث البيانات الشخصية وبيانات الدفع.\n- مركز إشعارات داخلي.\n- قائمة المفضلة لحفظ الفنادق والوجهات.\n\n### سادساً: إشعارات الواتساب الفورية\n\n- تأكيد الحجز عبر واتساب فور إتمام العملية.\n- إرسال PDF التذكرة والإيصال مباشرة.\n- تذكيرات تلقائية (24 ساعة، 4 ساعات) قبل الرحلة.\n- إشعارات تغيير المواعيد أو الإلغاء من شركة الطيران.\n- عروض ترويجية مخصصة بناءً على تفضيلات العميل.\n- إمكانية الرد المباشر للتواصل مع خدمة العملاء.\n\n### سابعاً: نظام الإلغاء والاسترداد السلس\n\n- زر إلغاء واضح في تفاصيل كل حجز.\n- عرض شفاف لقيمة الاسترداد قبل تأكيد الإلغاء.\n- معالجة سريعة لطلبات الإلغاء (خلال 48 ساعة).\n- خيارات استرداد متعددة: للمحفظة (فوري)، أو للبطاقة الأصلية (7-14 يوم).\n- إشعارات تلقائية بكل خطوة في عملية الاسترداد.\n- سجل كامل بطلبات الإلغاء وحالاتها.\n\n### ثامناً: تعدد العملات\n\n- عرض الأسعار بـ 5 عملات رئيسية: EGP، USD، EUR، SAR، AED.\n- تحويل تلقائي بناءً على أسعار الصرف اليومية.\n- اختيار العملة المفضلة وحفظها للزيارات المستقبلية.\n- إيصالات وفواتير بالعملة المختارة.\n\n### تاسعاً: المرشحات المتقدمة والذكاء\n\n- حفظ المرشحات المُفضَّلة لكل عميل.\n- اقتراحات ذكية بناءً على تاريخ البحث.\n- ترتيب النتائج حسب الأنسب لتفضيلات العميل.\n- تنبيهات السعر: إشعار العميل عند توفر سعر أفضل.\n\n### عاشراً: تجربة الدفع المرنة\n\n- خيارات دفع متعددة: بطاقة ائتمانية، محفظة إلكترونية، Paymob، Stripe، المحفظة الداخلية، نقاط الولاء.\n- إمكانية الدفع الجزئي والتقسيط على بطاقات بنوك مختارة.\n- حفظ بطاقات الدفع بأمان لتسريع العمليات المستقبلية.\n- إيصالات إلكترونية احترافية بكل لغة وعملة.\n\n### حادي عشر: دعم لغوي كامل واحترافي\n\n- التبديل الفوري بين العربية والإنجليزية.\n- محتوى مُحرَّر باحترافية تامة في كلتا اللغتين.\n- اتجاه الكتابة المتكامل من اليمين إلى اليسار.\n\n### ثاني عشر: تصميم متجاوب متطور\n\n- تجربة استخدام مُحسَّنة بشكل خاص للهواتف الذكية.\n- سرعة تحميل عالية حتى على الشبكات البطيئة.\n- وضع الإضاءة الليلي لراحة العين.\n\n---\n\n## رحلة المستخدم\n\nنستعرض فيما يلي رحلة العميل المُتقدِّمة في الباقة الاحترافية، والتي تعكس تجربة استثنائية متعددة الطبقات:\n\n### المرحلة الأولى: الجذب والاكتشاف\n\nيصل العميل إلى المنصة عبر إعلان رقمي، بحث في جوجل، أو توصية من صديق. يستقبله تصميم احترافي يعرض العروض الموسمية، الوجهات الترند، وشريط بحث ذكي بارز. يلاحظ العميل وجود **شارة المستوى** في حال كان عميلاً سابقاً، مما يُعزز شعوره بالتميز.\n\n### المرحلة الثانية: البحث المتقدم\n\nيُدخل العميل تفاصيل بحثه. يستخدم خاصية **التواريخ المرنة** للعثور على أفضل الأسعار. يستعرض النتائج التي تظهر من **مزودين متعددين** للفندق الواحد، فيختار العرض الأنسب من حيث السعر وسياسة الإلغاء. يستخدم **المرشحات المتقدمة** لتضييق النتائج (مثلاً: فنادق تطل على البحر، تتضمن إفطار، تسمح بالحيوانات الأليفة).\n\n### المرحلة الثالثة: المقارنة الذكية\n\nيستخدم العميل ميزة **المقارنة جنباً إلى جنب** لاختيار أفضل خيار. يطّلع على تقييمات النزلاء السابقين، الصور الاحترافية، والمرافق التفصيلية. يستطيع رؤية الأسعار **بعملة بلاده** بسهولة.\n\n### المرحلة الرابعة: الحجز الذكي\n\nيختار العميل الخيار المناسب، فيُقترح عليه إضافة خدمات تكميلية (تأمين السفر، نقل المطار، باقات الطعام). يُدخل بيانات المسافرين، وإن كان لديه بيانات مضافة سابقاً يستخدمها بنقرة واحدة. يطّلع على ملخص الحجز الواضح، **سياسة الإلغاء المفصلة**، والشروط.\n\n### المرحلة الخامسة: الدفع المرن\n\nيختار العميل وسيلة الدفع المُفضَّلة. يستطيع **استخدام نقاط الولاء لتخفيض السعر**، أو الدفع من **محفظته الإلكترونية**، أو الجمع بين أكثر من وسيلة دفع. تتم العملية على شاشة آمنة تماماً.\n\n### المرحلة السادسة: التأكيد متعدد القنوات\n\nيستقبل العميل بريداً إلكترونياً تأكيدياً مفصلاً، **رسالة واتساب** تتضمن التذكرة والإيصال، **إشعار داخل المنصة**، وتحديث فوري للنقاط المكتسبة في حسابه. تظهر **النقاط المكتسبة** بشكل بصري جذاب.\n\n### المرحلة السابعة: ما قبل السفر\n\nيستقبل العميل تذكيرات ذكية عبر واتساب والبريد قبل الرحلة بفترات مدروسة. يجد في لوحة تحكمه **عداً تنازلياً** للرحلة، إمكانية إضافة الرحلة إلى تقويم هاتفه، ومعلومات مهمة عن الوجهة.\n\n### المرحلة الثامنة: أثناء وبعد الرحلة\n\nفي حال احتاج العميل لـ**تعديل الحجز**، يستطيع القيام بذلك من لوحته الذاتية. في حال الإلغاء، يطّلع على **قيمة الاسترداد بشفافية** قبل الموافقة. تصله المبالغ المُستردة فوراً إلى **محفظته** أو خلال أيام إلى بطاقته.\n\n### المرحلة التاسعة: ما بعد الرحلة\n\nيستقبل العميل دعوة لـ**تقييم تجربته**، عرض ترويجي مخصص لرحلته القادمة بناءً على تفضيلاته، وتحديثاً عن **مستوى الولاء الجديد** إذا تجاوز عتبة الترقية.\n\n---\n\n## الفوائد لوكالة السفر\n\nتحقق الباقة الاحترافية لشركة جولة تورز جملة من الفوائد الاستراتيجية والتشغيلية المتقدمة:\n\n### الفوائد المالية\n\n- **مضاعفة الإيرادات** من خلال إتاحة الحجز على مدار الساعة، وتوسيع شريحة العملاء المستهدفة.\n- **زيادة متوسط قيمة الحجز** عبر آليات البيع التكميلي والمتقاطع.\n- **تقليل تكلفة الاستحواذ على العميل** من خلال زيادة معدل تكرار الحجز من العملاء الحاليين.\n- **رفع معدل التحويل** بفضل تجربة الحجز المتقدمة والمرشحات الذكية.\n\n### الفوائد التشغيلية\n\n- **خفض كبير في حجم استفسارات خدمة العملاء** عبر أدوات الخدمة الذاتية.\n- **معالجة سلسة لعمليات الإلغاء والاسترداد** دون تدخل بشري في معظم الحالات.\n- **رؤية شاملة لحالة الأعمال** عبر تقارير تحليلية متطورة.\n- **تحسين تخصيص الموارد البشرية** عبر توجيه الفريق للمهام عالية القيمة.\n\n### الفوائد التسويقية\n\n- **بناء قاعدة عملاء أوفياء** عبر نظام النقاط.\n- **زيادة معدل احتفاظ العملاء** بشكل ملحوظ.\n- **حملات تسويقية مستهدفة** بفضل بيانات سلوك العملاء المتاحة.\n- **انتشار العلامة التجارية** عبر آليات التوصية والإحالة.\n- **زيادة التفاعل** عبر القنوات المُفضَّلة لدى العميل (واتساب).\n\n### الفوائد الاستراتيجية\n\n- **بناء ميزة تنافسية مستدامة** يصعب على المنافسين تقليدها.\n- **منصة قابلة للتوسع** نحو خدمات وأسواق جديدة.\n- **بيانات استراتيجية** تُمكِّن من اتخاذ قرارات مدروسة حول التوسع.\n- **جذب شراكات استراتيجية** مع شركات الطيران والفنادق الكبرى.\n- **بناء أصل رقمي** يزيد من القيمة السوقية للشركة بشكل ملحوظ.\n\n---\n\n## الجدول الزمني\n\nتم تخطيط المشروع لينتهي خلال فترة لا تتجاوز أربعة عشر أسبوعاً، موزعة كما يلي:\n\n| الأسبوع | المرحلة | الأنشطة الرئيسية | المُخرَجات |\n|---------|---------|------------------|-----------|\n| 1 | البدء والاكتشاف | اجتماع البدء، ورش العمل التفصيلية، اعتماد الهوية | وثيقة المتطلبات المعتمدة |\n| 2 | التصميم والنماذج | تصميم جميع الواجهات الرئيسية | نماذج التصميم الكاملة |\n| 3 | البناء الأساسي | بناء الهيكل العام وقاعدة المنصة | الأساس الجاهز للبناء عليه |\n| 4 | محرك البحث - الرحلات | تكامل أماديوس مع البحث المتقدم | البحث عن الرحلات يعمل بميزاته المتقدمة |\n| 5 | محرك البحث - الفنادق | تكامل عدة مزودين للفنادق | البحث عن الفنادق متعدد المزودين جاهز |\n| 6 | المرشحات والمقارنة | بناء المرشحات المتقدمة وأدوات المقارنة | تجربة بحث متطورة |\n| 7 | الحساب والملف الشخصي | بناء نظام الحسابات وإدارة البيانات | الحسابات الشخصية المتقدمة جاهزة |\n| 8 | نظام الولاء والمحفظة | بناء نظام النقاط والمحفظة الإلكترونية | الولاء والمحفظة يعملان بالكامل |\n| 9 | تكامل الدفع المتعدد | تكامل بوابات الدفع وتعدد العملات | جميع طرق الدفع جاهزة |\n| 10 | لوحة تحكم العميل | بناء التجربة الذاتية الكاملة | لوحة العميل جاهزة |\n| 11 | الإلغاء والاسترداد + واتساب | بناء آلية الإلغاء وتكامل واتساب | الاسترداد الذاتي وإشعارات واتساب |\n| 12 | لوحة الإدارة | بناء لوحة الإدارة المتقدمة والتقارير | اللوحة الإدارية الاحترافية جاهزة |\n| 13 | الاختبار والتدريب | اختبارات شاملة، تدريب الفريق، تحسينات | منصة مختبرة وفريق مُدرَّب |\n| 14 | الإطلاق والمتابعة | الإطلاق الرسمي والدعم المكثف | منصة منشورة وتعمل |\n\n> **ملاحظة:** قد يمتد الجدول الزمني بأسبوعين إضافيين في حال طلب العميل تعديلات جوهرية على المتطلبات بعد بدء التنفيذ.\n\n---\n\n## جدول الدفع\n\nتم تقسيم القيمة الإجمالية للمشروع البالغة **845,000 جنيه مصري** على أربع دفعات مرنة:\n\n| الدفعة | النسبة | القيمة (جنيه مصري) | موعد الاستحقاق | المرحلة المرتبطة |\n|--------|--------|---------------------|----------------|------------------|\n| الأولى | 30% | 253,500 جنيه | عند توقيع العقد | بدء المشروع وتأمين الموارد |\n| الثانية | 25% | 211,250 جنيه | نهاية الأسبوع السادس | اكتمال التصميم ومحركات البحث |\n| الثالثة | 25% | 211,250 جنيه | نهاية الأسبوع الحادي عشر | اكتمال الميزات المتقدمة |\n| الرابعة | 20% | 169,000 جنيه | بعد الإطلاق الناجح | اعتماد التسليم النهائي |\n| **الإجمالي** | **100%** | **845,000 جنيه** | | |\n\n### شروط الدفع\n\n- جميع المدفوعات تُسدَّد بالجنيه المصري عبر التحويل البنكي إلى الحساب المعتمد للطرف المُنفِّذ.\n- يتم إصدار فاتورة ضريبية رسمية مع كل دفعة وفقاً للقانون المصري.\n- يتم احتساب ضريبة القيمة المضافة بنسبة 14% فوق المبلغ المذكور إن انطبقت.\n- تأخر السداد لأكثر من 14 يوماً من تاريخ الاستحقاق قد يستوجب تعليق العمل مؤقتاً.\n- في حال السداد المبكر للدفعات بمبلغ كامل، يُقدَّم خصم 3% على إجمالي قيمة المشروع.\n\n---\n\n## الضمان\n\nنلتزم بضمان شامل ومتقدم على المنصة المُسلَّمة، يشمل ما يلي:\n\n### مدة الضمان\n\n**120 يوماً** كاملة من تاريخ الإطلاق الرسمي للمنصة، بزيادة 30 يوماً عن الباقة الأساسية.\n\n### نطاق الضمان\n\n- **معالجة جميع الأخطاء البرمجية** التي تظهر في الوظائف المُسلَّمة دون أي رسوم إضافية.\n- **استجابة فورية** للملاحظات الحرجة خلال ساعتين عمل.\n- **تصحيح الأخطاء غير الحرجة** خلال 12-24 ساعة عمل.\n- **ضمان عمل جميع التكاملات** مع أماديوس، مزودي الفنادق المتعددين، بوابات الدفع، واتساب، وأسعار الصرف.\n\n### الالتزامات أثناء الضمان\n\n- مراقبة مستمرة لأداء المنصة على مدار الساعة.\n- تقارير دورية أسبوعية بحالة المنصة خلال الشهرين الأولين.\n- اجتماع متابعة نصف شهري لاستعراض الأداء والملاحظات.\n- توفير قناة تواصل مباشرة لفريق جولة تورز.\n- توفير مهندس مخصص للاستجابة السريعة للملاحظات.\n\n### ضمان الأداء\n\n- ضمان وقت تشغيل (Uptime) لا يقل عن 99.5% خلال فترة الضمان.\n- ضمان زمن استجابة الصفحات أقل من 3 ثوانٍ.\n- ضمان معالجة كل عملية حجز في أقل من 30 ثانية.\n\n### ما لا يشمله الضمان\n\n- الميزات الجديدة أو التعديلات التي تتجاوز نطاق المتطلبات المُعتمدة.\n- المشاكل الناتجة عن التدخل المباشر من فريق العميل في إعدادات المنصة.\n- المشاكل الناتجة عن خدمات طرف ثالث (مثل انقطاع خدمة بوابة الدفع أو واتساب).\n- التغييرات في سياسات الفنادق أو شركات الطيران.\n\n---\n\n## الصيانة\n\nنقدم باقة صيانة شهرية متقدمة بقيمة **18,000 جنيه مصري شهرياً** تشمل:\n\n### الصيانة الفنية المتقدمة\n\n- متابعة استقرار المنصة ومراقبتها على مدار الساعة طوال أيام الأسبوع.\n- تطبيق التحديثات الأمنية الدورية فوراً.\n- النسخ الاحتياطي اليومي والأسبوعي لجميع البيانات.\n- معالجة المشاكل الطارئة بسرعة استجابة قصوى 4 ساعات.\n- اختبارات أداء دورية شهرية.\n\n### الصيانة الوظيفية\n\n- إصلاح أي خلل يظهر في الميزات المُسلَّمة.\n- التوافق مع أي تحديثات تطرأ على واجهات أماديوس، مزودي الفنادق، بوابات الدفع، أو واتساب.\n- ضبط الأداء وتحسين سرعة الاستجابة.\n- تحديث أسعار الصرف ومراقبة دقتها.\n\n### الدعم الفني المتقدم\n\n- قناة دعم مخصصة لفريق جولة تورز (بريد + هاتف + تطبيق محادثة).\n- خط ساخن للحالات الحرجة على مدار الساعة.\n- تقرير شهري مفصل بأنشطة الصيانة المُنفَّذة.\n- تقرير ربعي تحليلي بأداء المنصة وتوصيات التحسين.\n\n### حدود باقة الصيانة الاحترافية\n\n- تشمل ما يصل إلى 20 ساعة عمل شهرياً لتنفيذ تعديلات وتحسينات.\n- إضافة محتوى وتعديلات على الواجهة.\n- تحديث المرشحات أو إضافة وجهات جديدة.\n- التعديلات الكبيرة أو الميزات الجديدة تُسعَّر بشكل منفصل.\n\n### الميزات الإضافية للصيانة\n\n- جلسات استشارية شهرية لمراجعة أداء المنصة.\n- مراجعة دورية لتجربة المستخدم وتقديم توصيات.\n- متابعة معدلات التحويل واقتراح تحسينات.\n\n---\n\n## الافتراضات\n\nيستند هذا العرض إلى مجموعة من الافتراضات الجوهرية:\n\n1. **توفر العميل للقرارات السريعة**: يلتزم فريق جولة تورز بالرد على الاستفسارات واعتماد التصاميم خلال 3 أيام عمل كحد أقصى لكل مرحلة.\n\n2. **الحصول على بيانات الاعتماد**: يلتزم العميل بتوفير بيانات الاعتماد اللازمة من أماديوس، مزودي الفنادق المتعددين، بوابات الدفع، خدمة واتساب الرسمية، ومزود أسعار الصرف، قبل بدء مرحلة التكامل.\n\n3. **اتفاقيات صحيحة مع مزودي المحتوى**: يلتزم العميل بوجود اتفاقيات سارية وصحيحة مع جميع مزودي المحتوى (طيران، فنادق متعددة، دفع، واتساب).\n\n4. **توفر المحتوى الأولي**: يلتزم العميل بتوفير المحتوى التسويقي الأساسي (شعار الشركة، نصوص الصفحة الرئيسية، الصور، شروط نظام الولاء، سياسات الإلغاء) خلال الأسبوع الأول.\n\n5. **تثبيت نطاق المشروع**: يفترض العرض ثبات المتطلبات المُعتمدة، وأي تغييرات جوهرية بعد البدء قد تستوجب إعادة تقييم الجدول الزمني والتكلفة.\n\n6. **توفر بنية تحتية مناسبة**: يفترض توفر استضافة سحابية حديثة لاستضافة المنصة.\n\n7. **التزام العميل بالاجتماعات الدورية**: يلتزم ممثل العميل بحضور الاجتماعات الأسبوعية لمتابعة سير العمل.\n\n8. **حساب أعمال واتساب**: يلتزم العميل بإنشاء حساب أعمال واتساب رسمي والحصول على الموافقات اللازمة.\n\n9. **تحديد سياسات الولاء**: يلتزم العميل بتحديد قواعد نظام الولاء بوضوح في الأسبوع الأول من المشروع.\n\n10. **الموافقات القانونية**: يلتزم العميل بالحصول على جميع الموافقات القانونية اللازمة لتشغيل نظام محفظة إلكترونية وفقاً للوائح المصرية.\n\n---\n\n## الاستثناءات\n\nلا يشمل هذا العرض البنود التالية، والتي يمكن إضافتها كخدمات مستقلة عند الحاجة:\n\n### الميزات غير المشمولة\n\n- **التطبيقات على الهواتف الذكية**: لا يشمل العرض تطبيق iOS أو Android (متوفر في الباقة المؤسسية).\n- **حجز الباقات السياحية المُجمَّعة**: لا يشمل العرض دمج رحلة طيران مع فندق في باقة سعرية واحدة (متوفر في الباقة المؤسسية).\n- **بوابة الوكلاء B2B**: لا يشمل العرض منصة منفصلة لوكلاء السفر (متوفرة في الباقة المؤسسية).\n- **العلامات التجارية الفرعية (White-label)**: لا يشمل العرض إنشاء علامات تجارية فرعية بهويات مختلفة.\n- **الحجوزات الجماعية**: لا يشمل العرض نظام متخصص للحجوزات الجماعية الكبيرة (أكثر من 20 شخص).\n- **حسابات الشركات**: لا يشمل العرض نظام حسابات للشركات والمؤسسات.\n- **الفروع المتعددة**: لا يشمل العرض إدارة فروع متعددة بصلاحيات متباينة.\n\n### الخدمات غير المشمولة\n\n- إنتاج المحتوى التسويقي الكامل (نصوص، صور، فيديوهات).\n- الحملات التسويقية الرقمية وإدارة الإعلانات.\n- ترجمة المحتوى إلى لغات إضافية غير العربية والإنجليزية.\n- استضافة المنصة (تُحتسب رسوم الاستضافة منفصلة).\n- شراء النطاق الإلكتروني والشهادات الأمنية المميزة.\n- الإجراءات القانونية والتسجيلات الرسمية للشركة.\n- تدريب موظفي جولة تورز على مهارات خدمة العملاء.\n- رسوم اشتراك خدمة واتساب الرسمية (تُسدَّد مباشرة لمزود الخدمة).\n- رسوم اشتراك خدمات أسعار الصرف (تُسدَّد مباشرة لمزود الخدمة).\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- تنتقل ملكية الكود البرمجي للمنصة إلى شركة جولة تورز بعد سداد كامل قيمة المشروع.\n- تحتفظ الشركة المُنفِّذة بحق الإشارة إلى المشروع كعمل مرجعي في معرض أعمالها، مع احترام أي معلومات سرية.\n- يحتفظ الطرف المُنفِّذ بحقوق الأدوات والمكتبات الداخلية المُعاد استخدامها.\n\n### 2. السرية\n\n- يلتزم الطرفان بسرية كافة المعلومات المتبادلة خلال مدة المشروع وبعدها.\n- لا يجوز لأي طرف الإفصاح عن المعلومات التجارية أو التقنية للطرف الآخر دون إذن خطي.\n- تمتد التزامات السرية لمدة 5 سنوات بعد انتهاء العقد.\n\n### 3. تعديل النطاق\n\n- يجوز إجراء تعديلات على النطاق عبر طلب خطي رسمي.\n- يتم تقييم أثر التعديل على الجدول الزمني والتكلفة، ولا يبدأ التنفيذ إلا بعد اعتماد التقييم من العميل.\n- التغييرات البسيطة (أقل من 4 ساعات عمل) يتم تنفيذها ضمن النطاق دون رسوم إضافية.\n\n### 4. التسليم والاستلام\n\n- يُعتبر التسليم نهائياً بعد مرور 21 يوماً من تاريخ الإشعار بالاستلام دون اعتراض خطي مسبَّب.\n- يلتزم العميل بمراجعة المُخرَجات خلال هذه الفترة وتقديم ملاحظاته إن وُجدت.\n- يتم اختبار جميع الميزات بحضور ممثل العميل قبل الإطلاق الرسمي.\n\n### 5. القوة القاهرة\n\n- لا يُعتبر أي طرف مخلاً بالتزاماته إذا كان السبب راجعاً لظروف القوة القاهرة.\n\n### 6. حل النزاعات\n\n- يسعى الطرفان لحل أي خلاف ودياً عبر التفاوض المباشر.\n- في حال تعذر الحل الودي، يتم اللجوء إلى الوساطة قبل التحكيم.\n- في حال استمرار الخلاف، تختص محاكم مدينة القاهرة بالنظر في النزاع وفق القانون المصري.\n\n### 7. الإنهاء\n\n- يحق لأي طرف إنهاء العقد بإشعار خطي مسبق مدته 30 يوماً.\n- في حال الإنهاء، يستحق الطرف المُنفِّذ قيمة العمل المُنجَز حتى تاريخ الإنهاء.\n- يلتزم الطرف المُنفِّذ بتسليم جميع الملفات والوثائق المُنجَزة حتى تاريخ الإنهاء.\n\n### 8. الفواتير والضرائب\n\n- جميع الأسعار لا تشمل ضريبة القيمة المضافة.\n- تُصدر الفواتير الضريبية وفق القانون المصري.\n\n### 9. حماية البيانات\n\n- يلتزم الطرف المُنفِّذ بحماية بيانات عملاء الوكالة وفقاً للممارسات الدولية.\n- يلتزم الطرفان بالالتزام بأي لوائح حماية بيانات معمول بها في مصر.\n\n### 10. الالتزامات المتبادلة\n\n- يلتزم الطرف المُنفِّذ بالحفاظ على فريق العمل المخصص للمشروع طوال مدة التنفيذ.\n- يلتزم العميل بتوفير نقطة اتصال موحدة للقرارات السريعة.\n\n---\n\n## صفحة التوقيع\n\nتم إعداد هذا العرض بكل دقة وعناية ليعكس فهمنا الكامل لاحتياجات شركة جولة تورز للسياحة المتنامية، ويُمثل التزامنا الجاد بتنفيذه ضمن الأطر الزمنية والمالية المحددة.\n\nنتطلع إلى شراكة طويلة الأمد تُحقق التطلعات الرقمية للوكالة، وتفتح آفاقاً جديدة من النمو والتميز.\n\n---\n\n### عن الطرف الأول (العميل)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | شركة جولة تورز للسياحة |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### عن الطرف الثاني (المُنفِّذ)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | _______________________ |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### شاهد أول\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n### شاهد ثانٍ\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n> **ملاحظة ختامية:** يُعدّ توقيع هذه الوثيقة من قِبل الطرفين بمثابة الموافقة الكاملة على جميع البنود والشروط المذكورة، ويُصبح هذا المستند جزءاً لا يتجزأ من العقد الرسمي الذي سيُحرَّر لاحقاً.\n\n> **تاريخ الإصدار:** 29 يونيو 2026\n> **رقم العرض:** JT-2026-PRO-001\n> **سريان العرض:** ينتهي في 29 يوليو 2026 ما لم يتم تمديده خطياً.\n\n---\n\n*شكراً لثقتكم بنا، ونتطلع لبدء هذه الرحلة المتميزة معكم.*\n","proposals-enterprise":"# عرض مشروع منصة الحجوزات الإلكترونية - الباقة المؤسسية\n\n---\n\n## صفحة الغلاف\n\n| البند | التفاصيل |\n|-------|----------|\n| **اسم المشروع** | منصة جولة للحجوزات الإلكترونية - الباقة المؤسسية |\n| **العميل** | شركة جولة تورز للسياحة (Jawla Tours) |\n| **المقدّم إلى** | مجلس الإدارة - شركة جولة تورز |\n| **تاريخ العرض** | 29 يونيو 2026 |\n| **رقم الإصدار** | الإصدار 1.0 |\n| **سريان العرض** | 45 يوماً من تاريخ الإصدار |\n| **مُعدّ بواسطة** | فريق الاستشارات الرقمية - قسم الحلول المؤسسية |\n| **حالة الوثيقة** | عرض رسمي للاعتماد |\n| **العملة المعتمدة** | الجنيه المصري (EGP) |\n| **القيمة الإجمالية** | 1,390,000 جنيه مصري |\n| **مدة التنفيذ** | من 20 إلى 24 أسبوعاً |\n| **رسوم الصيانة الشهرية** | 30,000 جنيه مصري شهرياً |\n| **نوع الباقة** | مؤسسية - الحل الشامل |\n| **مستوى المشروع** | استراتيجي |\n\n> هذه الوثيقة سرية للغاية ومُعدّة حصرياً لمجلس إدارة شركة جولة تورز للسياحة. لا يجوز إعادة توزيعها أو نسخها كلياً أو جزئياً دون إذن خطي مسبق من الطرف المُعِد. تخضع هذه الوثيقة لاتفاقية عدم الإفصاح المبرمة بين الطرفين.\n\n---\n\n## الملخص التنفيذي\n\nيُمثّل هذا العرض **الحل الأمثل والأكثر شمولاً** الذي نُقدِّمه لشركة **جولة تورز للسياحة**، لإطلاق منظومتها الرقمية المتكاملة التي ترتقي بها لمصاف كبرى منصات السفر الإقليمية والعالمية. لا يُعدّ هذا المشروع مجرد منصة حجوزات، بل **تحول مؤسسي شامل** يُعيد رسم خريطة طريق الوكالة نحو الريادة في السوق السياحي العربي.\n\nتُجسِّد **الباقة المؤسسية** فلسفتنا في بناء حلول لا تُلبّي احتياجات اليوم فحسب، بل تستشرف متطلبات السنوات الخمس القادمة. تم تصميمها لتكون **منظومة متعددة الأبعاد** تخدم العملاء الأفراد، الوكلاء الشركاء، الشركات والمؤسسات، والمجموعات السياحية، عبر واجهات ويب احترافية وتطبيقات هاتف ذكي لنظامي iOS و Android.\n\nتتميز هذه الباقة بمجموعة استثنائية من المكونات الاستراتيجية، تبدأ من **الباقات السياحية المُجمَّعة الذكية** التي تدمج الطيران والفنادق والأنشطة في عرض واحد جذاب، مروراً بـ**باقات الجولات السياحية** المُصمَّمة بعناية، وصولاً إلى **بوابة الوكلاء B2B** التي تُحوّل الوكالات الأصغر إلى شركاء يُوزِّعون منتجات جولة تورز ويُحقِّقون لها قنوات إيرادات إضافية.\n\nكما تتضمن الباقة **تطبيقات هاتف ذكي أصلية** لنظامي iOS و Android تمنح العملاء تجربة سلسة على أجهزتهم المُفضَّلة، و**نظام علامات تجارية فرعية (White-label)** يتيح للوكالة إطلاق علامات مساعدة لشرائح سوقية متخصصة، ونظام **تحليلات متقدم وذكاء أعمال** يكشف عن أنماط السوق وفرص النمو، و**نظام تسعير ديناميكي ذكي** يُحسّن هوامش الربح، و**نظام حجوزات جماعية وحسابات الشركات** لخدمة السياحة المؤسسية، و**إدارة فروع متعددة** بصلاحيات هرمية، و**نظام كشف الاحتيال المتقدم** لحماية أصول الوكالة.\n\nنلتزم بتسليم المشروع كاملاً خلال فترة لا تتجاوز **أربعة وعشرين أسبوعاً** من تاريخ التوقيع، بقيمة إجمالية قدرها **1,390,000 جنيه مصري** فقط، يتم سدادها على أربع دفعات مرنة تواكب مراحل الإنجاز. كما نضمن استمرارية المنصة عبر باقة الصيانة الشهرية بقيمة **30,000 جنيه مصري** التي توفر تغطية شاملة بمستوى مؤسسي.\n\nنؤمن أن هذا الاستثمار سيمكّن جولة تورز من تحقيق **تحول مالي جذري** يتمثل في مضاعفة الإيرادات 3-5 مرات خلال السنتين الأوليين، وبناء **محرك نمو ذاتي** يولّد إيرادات من ثلاث قنوات رئيسية: العملاء المباشرين، شبكة الوكلاء، والعملاء المؤسسيين. علاوة على ذلك، تُهيِّئ هذه المنصة الوكالة لمرحلة **التوسع الإقليمي** نحو أسواق الخليج وشمال أفريقيا في أقل من 18 شهراً.\n\n---\n\n## فهم احتياجات العميل\n\nتقف شركة **جولة تورز للسياحة** اليوم على أعتاب مرحلة فاصلة في مسيرتها التجارية، تنتقل فيها من كونها وكالة سفر تقليدية متميزة، إلى **مؤسسة سياحية رقمية متعددة الأذرع**. لقد حلَّلنا بعناية الواقع الحالي وتطلعات الإدارة، وخرجنا بفهم عميق للاحتياجات الاستراتيجية:\n\n### 1. التحول من وكالة إلى منصة متعددة الأطراف\n\nلم يعد الطموح مقتصراً على خدمة العملاء النهائيين، بل يمتد إلى **بناء منظومة سياحية متكاملة** تضم العميل النهائي، الوكلاء الشركاء، الشركات، والمجموعات. هذا التحول يستوجب بنية مؤسسية قادرة على التعامل مع شرائح متعددة بمتطلبات متباينة في الوقت ذاته.\n\n### 2. الانتقال إلى عرض القيمة المُجمَّعة\n\nالعميل العصري لا يبحث عن رحلة طيران منفصلة وفندق منفصل، بل عن **تجربة سياحية متكاملة جاهزة**. يتطلب ذلك القدرة على بناء **باقات سياحية ذكية** تجمع الطيران والإقامة والأنشطة في عرض واحد بسعر تنافسي، مع هامش ربح أفضل للوكالة من بيع كل عنصر منفرداً.\n\n### 3. تنويع قنوات الإيرادات\n\nالاعتماد على قناة واحدة (B2C) يُمثّل مخاطرة تجارية. الحل في **بناء قنوات إيرادات موازية** عبر:\n- بوابة B2B تستقطب الوكلاء الصغار في المحافظات\n- نظام للحسابات المؤسسية يخدم الشركات التي تُسيِّر سفر موظفيها بانتظام\n- علامات تجارية فرعية تستهدف شرائح متخصصة (سياحة فاخرة، سياحة دينية، سياحة شبابية)\n\n### 4. الحضور الكامل على الأجهزة المحمولة\n\nتشير الإحصاءات إلى أن أكثر من 65% من رحلات البحث السياحي تتم اليوم عبر الأجهزة المحمولة. **تطبيق هاتف ذكي أصلي** لكل من iOS و Android لم يعد ترفاً، بل **ضرورة استراتيجية** لا يمكن الاستغناء عنها، خاصة لاستهداف الجيل الشاب.\n\n### 5. القرارات المبنية على البيانات\n\nتستوجب القيادة بمستوى مؤسسي **منظومة ذكاء أعمال متقدمة** تكشف عن:\n- أنماط الشراء حسب الشريحة والوقت والوجهة\n- مصادر الإيرادات والربحية لكل قناة\n- الفرص غير المُستثمَرة في السوق\n- مؤشرات الأداء الرئيسية في الوقت الفعلي\n\n### 6. تحسين هوامش الربح ذاتياً\n\nالأسعار الثابتة تُضيِّع فرص ربحية كبيرة. تحتاج الوكالة إلى **نظام تسعير ديناميكي ذكي** يُعدِّل الهوامش تلقائياً بناءً على:\n- مستوى الطلب على الوجهة\n- موسم السفر\n- الفئة المُستهدَفة\n- تاريخ الحجز قياساً بتاريخ السفر\n- أداء المنافسين\n\n### 7. خدمة السياحة المؤسسية والمجموعات\n\nتُمثّل السياحة المؤسسية والمجموعات شريحة عالية الربحية تخدم الشركات، الجامعات، النوادي، والمنظمات. يتطلب ذلك **أدوات متخصصة** تُمكّن من إدارة الحجوزات الجماعية، الفواتير المؤسسية، وحسابات الإنفاق.\n\n### 8. إدارة فروع متعددة بصلاحيات هرمية\n\nمع التوسع الجغرافي المُخطَّط له، تحتاج جولة تورز إلى **هيكل إداري هرمي** يتيح إدارة فروع متعددة بمستويات صلاحيات متباينة، مع رؤية موحدة من المركز الرئيسي.\n\n### 9. حماية الأصول من الاحتيال\n\nمع كبر حجم العمليات، يصبح **نظام كشف الاحتيال المتقدم** ضرورة حتمية لحماية أصول الوكالة من المحتالين، الدفعات الزائفة، وعمليات الاسترداد الاحتيالية.\n\n### 10. الجاهزية للتوسع الإقليمي\n\nكل قرار يُتخذ اليوم يجب أن يدعم رؤية **التوسع الإقليمي** نحو أسواق الخليج والمغرب العربي خلال 18-24 شهراً.\n\n---\n\n## الأهداف التجارية\n\nتستهدف هذه المنصة المؤسسية تحقيق مجموعة طموحة من الأهداف الاستراتيجية:\n\n### الأهداف الاستراتيجية الكبرى\n\n1. **مضاعفة الإيرادات 3 إلى 5 مرات** خلال السنتين الأوليين من إطلاق المنصة الكاملة.\n\n2. **التحول من شركة بقناة واحدة إلى مؤسسة بثلاث قنوات إيرادات** متكاملة (B2C، B2B، B2B2C).\n\n3. **تحقيق التوسع الإقليمي** إلى ثلاث أسواق جديدة على الأقل خلال 24 شهراً.\n\n4. **بناء شبكة من 500+ وكيل شريك** عبر بوابة B2B خلال السنة الأولى.\n\n5. **استقطاب 100+ حساب مؤسسي** من الشركات الكبرى والمتوسطة.\n\n6. **رفع متوسط قيمة الحجز بنسبة 70%** عبر الباقات المُجمَّعة والبيع التكميلي.\n\n7. **تحقيق هامش ربح أعلى بـ 25%** عبر التسعير الديناميكي.\n\n### الأهداف التشغيلية\n\n- معالجة أكثر من 1,000 حجز يومياً دون تدخل بشري.\n- تقليل تكلفة معالجة الحجز الواحد بنسبة 70%.\n- خفض معدل الاحتيال إلى أقل من 0.1% من إجمالي العمليات.\n- تحقيق نسبة 50%+ من الحجوزات عبر التطبيقات المحمولة.\n- وقت تشغيل لا يقل عن 99.9% طوال العام.\n\n### الأهداف التسويقية\n\n- بناء قاعدة عملاء تتجاوز 200,000 عميل نشط خلال السنة الأولى.\n- تحقيق معدل تكرار حجز بمتوسط 3 مرات سنوياً لكل عميل نشط.\n- بناء سمعة رقمية رائدة عبر تقييمات تتجاوز 4.7 من 5.\n- زيادة الحصة السوقية بشكل ملحوظ في السوق المصري.\n\n### الأهداف المالية\n\n- زيادة هامش الربح الإجمالي للوكالة بنسبة 40%.\n- تنويع مصادر الإيرادات بحيث لا تتجاوز أي قناة 50% من إجمالي الإيرادات.\n- بناء أصل رقمي قابل للتقييم بمليارات الجنيهات على المدى المتوسط.\n\n---\n\n## نطاق المشروع\n\nيشمل نطاق المشروع تصميم وتطوير وإطلاق منظومة سياحية مؤسسية متكاملة، تتضمن العناصر التالية:\n\n### المكون الأول: الواجهة العامة المتقدمة للعملاء (B2C)\n\nمنصة ويب شاملة بتجربة مستخدم استثنائية تُقدِّم جميع منتجات الوكالة بطريقة جذابة وعالية التحويل.\n\n### المكون الثاني: تطبيقات الهاتف الذكي الأصلية\n\nتطبيقان أصليان لنظامي **iOS و Android** بجميع الميزات الكاملة للمنصة، مع تجربة محلية فائقة الأداء.\n\n### المكون الثالث: بوابة الوكلاء B2B\n\nمنصة منفصلة مُخصَّصة للوكلاء الشركاء تشمل:\n- تسجيل الوكلاء واعتمادهم\n- لوحة تحكم خاصة بكل وكيل\n- أسعار صافية حصرية للوكلاء\n- إدارة العمولات والحسابات\n- تقارير أداء لكل وكيل\n- أدوات تسويقية جاهزة\n\n### المكون الرابع: نظام الباقات السياحية المُجمَّعة\n\nأداة متطورة تتيح:\n- إنشاء باقات تدمج الطيران والفندق\n- إضافة الأنشطة والجولات والتنقل\n- تسعير ذكي لكل باقة\n- باقات قابلة للتخصيص من العميل\n- باقات مُحضَّرة مسبقاً للوجهات الشهيرة\n\n### المكون الخامس: نظام الجولات السياحية\n\nمنظومة متكاملة لإدارة الجولات السياحية تشمل:\n- جولات يومية وأسبوعية وأطول\n- جولات داخل مصر وخارجها\n- حجز فردي وجماعي\n- إدارة المرشدين السياحيين\n- إدارة المواعيد والطاقة الاستيعابية\n\n### المكون السادس: نظام العلامات التجارية الفرعية (White-label)\n\nبنية مرنة تتيح إطلاق علامات تجارية فرعية بهويات بصرية مستقلة، نطاقات منفصلة، وسياسات تسعير متباينة، مع إدارة موحدة من المركز.\n\n### المكون السابع: نظام التحليلات وذكاء الأعمال\n\nمنظومة تقارير وتحليلات متقدمة تشمل:\n- لوحات معلومات تفاعلية\n- تحليل سلوك العملاء\n- تحليل الربحية حسب القناة والوجهة والمنتج\n- تنبؤات بالطلب\n- تقارير مخصصة قابلة للجدولة\n\n### المكون الثامن: نظام التسعير الديناميكي\n\nمحرك تسعير ذكي يُعدِّل الهوامش تلقائياً بناءً على قواعد محددة من الإدارة، مع إمكانية التدخل اليدوي عند الحاجة.\n\n### المكون التاسع: نظام الحجوزات الجماعية\n\nأداة متخصصة لإدارة الحجوزات الجماعية الكبيرة:\n- حجوزات 20 شخصاً فأكثر\n- خصومات تلقائية للمجموعات\n- إدارة قائمة المسافرين الكبيرة\n- فواتير جماعية وفردية\n- التواصل المركزي مع المنظم\n\n### المكون العاشر: نظام الحسابات المؤسسية\n\nمنظومة لخدمة العملاء المؤسسيين:\n- ملفات شركات\n- مسافرون مرتبطون بكل شركة\n- سياسات سفر مؤسسية\n- حدود إنفاق\n- فواتير شهرية مُجمَّعة\n- تقارير سفر للشركة\n\n### المكون الحادي عشر: لوحة الإدارة متعددة الفروع\n\nلوحة إدارة مؤسسية متطورة تشمل:\n- إدارة فروع متعددة بصلاحيات هرمية\n- إدارة موظفين بأدوار محددة\n- توزيع الحجوزات على الفروع\n- تقارير لكل فرع ومُجمَّعة\n- إدارة الصلاحيات بدقة عالية\n\n### المكون الثاني عشر: نظام كشف الاحتيال المتقدم\n\nمنظومة ذكية لكشف ومنع المحاولات الاحتيالية:\n- تحليل سلوكي للعمليات المشبوهة\n- قواعد قابلة للتخصيص\n- مراجعة يدوية للحالات الحرجة\n- حماية من الدفعات الزائفة\n- منع عمليات الاسترداد الاحتيالية\n\n### المكون الثالث عشر: جميع ميزات الباقتين السابقتين\n\nتشمل الباقة المؤسسية **كل** ميزات الباقتين الأساسية والاحترافية: نظام الولاء، المحفظة الإلكترونية، إشعارات الواتساب، تعدد المزودين، تعدد العملات، الإلغاء والاسترداد الذاتي، المرشحات المتقدمة، وغيرها.\n\n### المكون الرابع عشر: التدريب المؤسسي الشامل\n\nبرنامج تدريبي مؤسسي يشمل:\n- تدريب الإدارة العليا على القراءة الاستراتيجية للتقارير\n- تدريب مديري الفروع\n- تدريب موظفي خدمة العملاء\n- تدريب موظفي الحجز\n- ورش تدريبية للوكلاء الشركاء\n\n---\n\n## المخرجات\n\nتتضمن مخرجات المشروع المُسلَّمة لشركة جولة تورز ما يلي:\n\n| # | المُخرَج | الوصف | تاريخ التسليم المتوقع |\n|---|---------|-------|----------------------|\n| 1 | الهوية البصرية الشاملة | تصميم متكامل للويب والتطبيقات | نهاية الأسبوع الثالث |\n| 2 | منصة الويب الرئيسية | منصة B2C كاملة الميزات | نهاية الأسبوع العاشر |\n| 3 | تطبيق iOS الأصلي | تطبيق احترافي لمتجر آبل | نهاية الأسبوع الخامس عشر |\n| 4 | تطبيق Android الأصلي | تطبيق احترافي لمتجر جوجل | نهاية الأسبوع الخامس عشر |\n| 5 | بوابة الوكلاء B2B | منصة منفصلة كاملة للوكلاء | نهاية الأسبوع الثاني عشر |\n| 6 | نظام الباقات المُجمَّعة | محرك دمج الطيران والفنادق | نهاية الأسبوع الحادي عشر |\n| 7 | نظام الجولات السياحية | منظومة إدارة الجولات | نهاية الأسبوع الثالث عشر |\n| 8 | نظام White-label | بنية العلامات الفرعية | نهاية الأسبوع السادس عشر |\n| 9 | نظام الحجوزات الجماعية | أداة المجموعات الكبيرة | نهاية الأسبوع الرابع عشر |\n| 10 | نظام الحسابات المؤسسية | منظومة B2B للشركات | نهاية الأسبوع الخامس عشر |\n| 11 | لوحة الإدارة متعددة الفروع | منصة الإدارة المؤسسية | نهاية الأسبوع الثامن عشر |\n| 12 | نظام التحليلات وذكاء الأعمال | منظومة التقارير المتقدمة | نهاية الأسبوع العشرين |\n| 13 | نظام التسعير الديناميكي | محرك التسعير الذكي | نهاية الأسبوع التاسع عشر |\n| 14 | نظام كشف الاحتيال | منظومة الحماية المتقدمة | نهاية الأسبوع العشرين |\n| 15 | الوثائق التشغيلية الشاملة | أدلة استخدام لجميع الأقسام | مع التسليم النهائي |\n| 16 | المكتبة التدريبية المرئية | فيديوهات تدريبية احترافية شاملة | مع التسليم النهائي |\n| 17 | شهادات الاختبار والجودة | تقارير اختبارات شاملة | قبل الإطلاق بأسبوعين |\n| 18 | تقرير الأمان والاحتيال | تقرير اختبارات الأمان | قبل الإطلاق بأسبوع |\n| 19 | الإطلاق المرحلي | إطلاق متدرج للمنصة | الأسابيع 22-24 |\n| 20 | الدعم المُكثَّف بعد الإطلاق | دعم شامل لأول 90 يوماً | ثلاثة أشهر كاملة |\n\n---\n\n## ميزات العميل\n\nتُقدِّم الباقة المؤسسية مجموعة شاملة من الميزات تخدم جميع شرائح المستخدمين:\n\n### القسم الأول: ميزات العميل النهائي (B2C)\n\n#### 1. تطبيقات الهاتف الذكي الأصلية\n\n- تطبيق iOS أصلي بتجربة سلسة فائقة الأداء.\n- تطبيق Android أصلي بمزايا كاملة.\n- إشعارات فورية (Push Notifications) ذكية ومخصصة.\n- تسجيل الدخول البيومتري (بصمة، التعرف على الوجه).\n- العمل دون إنترنت لاستعراض الحجوزات السابقة.\n- مزامنة فورية بين الهاتف والويب.\n- مشاركة الحجوزات مع العائلة بنقرة واحدة.\n\n#### 2. الباقات السياحية المُجمَّعة\n\n- باقات جاهزة لأشهر الوجهات (دبي، إسطنبول، شرم الشيخ، الغردقة، باريس، لندن).\n- باقات قابلة للتخصيص: اختر الفندق، اختر الرحلة، أضف الأنشطة.\n- خصم تلقائي عند الحجز الجماعي (طيران + فندق + نقل).\n- ضمان أفضل سعر للباقة مقابل حجز كل عنصر منفرداً.\n- باقات شهر العسل، باقات العائلة، باقات الشركات.\n- باقات قابلة للإعادة على شكل قسائم هدايا.\n\n#### 3. الجولات السياحية\n\n- جولات يومية في المدن الكبرى.\n- جولات متعددة الأيام في الوجهات المتنوعة.\n- جولات تاريخية، دينية، ترفيهية، مغامرات.\n- اختيار اللغة المُفضَّلة للمرشد السياحي.\n- مجموعات صغيرة أو حجز خاص.\n- قراءة تقييمات مفصلة لكل جولة.\n- خريطة تفاعلية لمسار الجولة.\n\n#### 4. نظام الولاء المتطور\n\n- مستويات ولاء متدرجة (برونزي، فضي، ذهبي، بلاتيني، ماسي).\n- نقاط مضاعفة لمستويات الولاء الأعلى.\n- مزايا حصرية لكل مستوى (ترقيات، دخول مبكر للعروض، خصومات شخصية).\n- نظام إحالة الأصدقاء مع مكافآت متبادلة.\n- شراكات حصرية مع علامات تجارية أخرى لتعزيز قيمة النقاط.\n\n#### 5. المحفظة الذكية متعددة العملات\n\n- محفظة تدعم 5 عملات رئيسية في وقت واحد.\n- تحويل بين العملات داخل المحفظة.\n- استلام الاستردادات بأي عملة محددة.\n- ربط مباشر بالحسابات البنكية للسحب الفوري.\n- معاملات داخلية بين أعضاء العائلة.\n\n#### 6. تجربة بحث ومقارنة استثنائية\n\n- بحث ذكي بمعالجة لغوية طبيعية (\"رحلة لطفلين وزوجين إلى تركيا في أغسطس\").\n- مقارنة جنباً إلى جنب لأكثر من 4 خيارات.\n- تنبيهات السعر التلقائية.\n- متابعة الوجهات المُفضَّلة وتنبيه عند انخفاض الأسعار.\n- اقتراحات ذكية بناءً على تاريخ السفر.\n\n#### 7. خدمات تكميلية متكاملة\n\n- تأمين السفر بأفضل الأسعار.\n- خدمات نقل المطار (تكسي خاص، حافلات).\n- استئجار السيارات.\n- حجز المطاعم في الوجهة.\n- تذاكر المعالم السياحية والترفيه.\n- خدمة المساعد الشخصي للحجوزات المعقدة.\n\n#### 8. خدمة العملاء المتطورة\n\n- محادثة فورية مع موظفي خدمة العملاء داخل التطبيق.\n- مكالمة فيديو مع المستشار السياحي.\n- خدمة عملاء عبر واتساب باللغة العربية.\n- نظام تذاكر متابعة للاستفسارات المعقدة.\n- مكتبة أسئلة شائعة شاملة بمحرك بحث ذكي.\n\n### القسم الثاني: ميزات الوكلاء (B2B)\n\n#### 9. بوابة الوكلاء المتكاملة\n\n- تسجيل وكلاء جديدة بسهولة مع نظام اعتماد إداري.\n- لوحة تحكم خاصة بكل وكيل تعرض حجوزاته وعمولاته.\n- أسعار صافية حصرية تختلف عن الأسعار العامة.\n- نظام عمولات مرن (نسبة مئوية، مبلغ ثابت، حسب المنتج).\n- إصدار فواتير العمولات تلقائياً.\n- تقارير أداء أسبوعية وشهرية.\n- تنبيهات بأفضل العروض للوكيل لتسويقها.\n- أدوات تسويقية جاهزة (صور، نصوص، فيديوهات).\n\n#### 10. أدوات الوكيل التشغيلية\n\n- حجز نيابة عن العميل بسرعة عالية.\n- إصدار تذاكر باسم الوكيل أو باسم جولة تورز.\n- إدارة عملاء الوكيل ومتابعة تاريخهم.\n- نظام أكواد خصم خاصة بكل وكيل.\n- ربط أعضاء فريق الوكيل بصلاحيات متباينة.\n\n### القسم الثالث: ميزات الشركات (B2B Corporate)\n\n#### 11. حسابات الشركات\n\n- ملف شركة كامل مع شعار ومعلومات قانونية.\n- إضافة موظفين كمسافرين مرتبطين بالشركة.\n- تحديد سياسات السفر (الدرجة المسموحة، الميزانية لكل رحلة).\n- حدود إنفاق شهرية أو سنوية.\n- فواتير شهرية مُجمَّعة وفق متطلبات المحاسبة.\n- تقارير إنفاق السفر للشركة.\n- موافقات هرمية للحجوزات (الموظف يطلب، المدير يوافق).\n- ربط مع أنظمة المحاسبة لدى الشركات الكبرى.\n\n#### 12. الحجوزات الجماعية\n\n- نموذج طلب حجز جماعي بسيط.\n- عرض سعر مخصص للمجموعة.\n- إدارة قائمة المسافرين الكبيرة (Excel/CSV).\n- تسديد جماعي أو فردي لكل عضو.\n- إصدار تذاكر جماعية أو فردية.\n- التواصل المركزي مع منظم المجموعة.\n\n### القسم الرابع: تجربة موحدة ومرنة\n\n#### 13. تعدد العملات الموسع\n\n- دعم 8+ عملات: EGP، USD، EUR، SAR، AED، KWD، QAR، GBP.\n- تحديث مستمر لأسعار الصرف.\n- تفضيلات عملة لكل مستخدم.\n\n#### 14. دعم لغوي موسع\n\n- العربية والإنجليزية بشكل كامل واحترافي.\n- جاهزية البنية لإضافة لغات إضافية (الفرنسية، التركية، الروسية) في المستقبل.\n\n#### 15. تجربة دفع لا مثيل لها\n\n- جميع بوابات الدفع المحلية والعالمية.\n- التقسيط على بطاقات أكثر من 10 بنوك مصرية.\n- شراء آجل (اشترِ الآن وادفع لاحقاً) عبر شركاء التمويل.\n- محفظة داخلية + نقاط الولاء + بطاقة هدية + بطاقة دفع.\n- دفع جماعي للمجموعات (كل عضو يدفع حصته).\n\n---\n\n## رحلة المستخدم\n\nنستعرض رحلات متعددة تعكس تنوع المستخدمين على المنصة المؤسسية:\n\n### الرحلة الأولى: العميل النهائي (B2C)\n\n#### المرحلة الأولى: الجذب\n\nيكتشف العميل علامة جولة تورز عبر إعلان ذكي مُستهدَف على وسائل التواصل، أو بحث في جوجل، أو توصية شخصية. يصل إلى الموقع أو يُحمِّل التطبيق من المتجر، فيستقبله تصميم استثنائي بعروض موسمية ذات أولوية.\n\n#### المرحلة الثانية: التسجيل السلس\n\nيُسجَّل العميل خلال 30 ثانية باستخدام بريده، أو حسابه على جوجل/أبل/فيسبوك. يستقبل **مكافأة ترحيبية** على شكل نقاط ولاء، مما يُحفِّزه على إتمام أول حجز.\n\n#### المرحلة الثالثة: الاستكشاف الذكي\n\nيستعرض العميل **الباقات السياحية المُجمَّعة** المعروضة بشكل جذاب: \"باقة شهر العسل في موريشيوس - 5 ليالٍ في فندق 5 نجوم + طيران ذهاب وعودة + استقبال خاص في المطار + جولة سياحية - بسعر شامل قدره X\". يجد العميل قيمة واضحة في الباقة الجاهزة.\n\n#### المرحلة الرابعة: التخصيص\n\nيستطيع العميل **تخصيص الباقة** كاملاً: ترقية الفندق، تغيير شركة الطيران، إضافة جولات، تأمين السفر، نقل المطار. يرى تأثير كل اختيار على السعر النهائي بشفافية كاملة.\n\n#### المرحلة الخامسة: الحجز والدفع\n\nيختار العميل وسيلة الدفع المُفضَّلة: قد يدفع جزءاً من المحفظة، جزءاً بنقاط الولاء، وجزءاً بالتقسيط على بطاقته. أو قد يستخدم خدمة \"اشترِ الآن وادفع لاحقاً\" لإحدى الشركات الشريكة. تتم العملية بأمان كامل.\n\n#### المرحلة السادسة: ما قبل السفر\n\nيستقبل العميل سلسلة ذكية من التواصل: تأكيد فوري عبر التطبيق والواتساب، أدلة وجهة مفصلة قبل الرحلة بأسبوعين، توصيات للأنشطة المحلية، تذكيرات تدريجية، وعرض حصري لاستئجار سيارة أو حجز مطعم.\n\n#### المرحلة السابعة: أثناء الرحلة\n\nيستخدم العميل التطبيق كرفيق سفر: عرض جدول الرحلة، خرائط، تواصل مع الفندق، طلب خدمات إضافية. في حال طارئ، يستطيع الوصول الفوري لخدمة العملاء.\n\n#### المرحلة الثامنة: ما بعد الرحلة\n\nيتلقى العميل دعوة لتقييم التجربة بكل عنصر (الطيران، الفندق، الجولة). يستلم مكافأة نقاط إضافية بعد التقييم. يتلقى عرضاً مخصصاً لرحلته القادمة بناءً على تفضيلاته المُستخلَصة من رحلته الأخيرة.\n\n### الرحلة الثانية: الوكيل الشريك (B2B)\n\n#### المرحلة الأولى: التسجيل والاعتماد\n\nتتقدم وكالة سفر صغيرة في المنصورة للانضمام لشبكة وكلاء جولة تورز. تُدخل بيانات الشركة، الترخيص، السجل التجاري. يستلم فريق جولة تورز إشعاراً، يُراجع الطلب، ثم يعتمد الوكيل خلال 48 ساعة.\n\n#### المرحلة الثانية: التأهيل\n\nيحضر الوكيل ندوة تدريبية أونلاين، يستلم دليل الاستخدام، ويبدأ بالاستفادة من المنصة. يحصل على **أسعار صافية** حصرية تُتيح له هامش ربح جذاب.\n\n#### المرحلة الثالثة: العمل اليومي\n\nيستقبل الوكيل عميلاً في مكتبه. يبحث له عن خيارات السفر عبر بوابة B2B بسرعة عالية. يعرض الخيارات بهامش ربحه المُضاف. يُتمم الحجز نيابة عن العميل، يستلم منه المبلغ نقداً، ويُسدد المبلغ الصافي لجولة تورز عبر المحفظة.\n\n#### المرحلة الرابعة: المتابعة\n\nفي نهاية كل شهر، يستلم الوكيل **تقريراً مفصلاً** بأدائه: عدد الحجوزات، إجمالي الإيرادات، صافي العمولات، أفضل المنتجات المُباعة. يستلم **عمولاته** تلقائياً عبر تحويل بنكي.\n\n### الرحلة الثالثة: الشركة المؤسسية (B2B Corporate)\n\n#### المرحلة الأولى: التأهيل المؤسسي\n\nتتعاقد شركة مصرية كبرى مع جولة تورز لإدارة سفر موظفيها. يُنشأ ملف الشركة، يُحدَّد **سقف الإنفاق الشهري**، تُضاف **سياسة السفر** (مثال: الدرجة الاقتصادية للرحلات أقل من 5 ساعات).\n\n#### المرحلة الثانية: حجز موظف\n\nيطلب موظف رحلة عمل. يستخدم بوابة الشركة على المنصة. يجد الخيارات المتوافقة مع سياسة شركته فقط (تلقائياً). يختار الأنسب ويرسل طلب موافقة لمديره.\n\n#### المرحلة الثالثة: الموافقة والحجز\n\nيستلم المدير إشعاراً، يراجع تفاصيل الرحلة، يوافق بنقرة واحدة. يتم الحجز تلقائياً، تُخصم القيمة من حساب الشركة، ويستلم الموظف تذاكره.\n\n#### المرحلة الرابعة: المحاسبة الشهرية\n\nفي نهاية الشهر، تستلم الشركة **فاتورة موحدة** بجميع رحلات موظفيها، مفصلة بطريقة تتوافق مع متطلباتها المحاسبية. تستلم أيضاً **تقرير سفر** يكشف عن أنماط الإنفاق وفرص التوفير.\n\n---\n\n## الفوائد لوكالة السفر\n\nتحقق الباقة المؤسسية لشركة جولة تورز فوائد استثنائية على جميع المستويات:\n\n### الفوائد الاستراتيجية\n\n#### 1. التحول المؤسسي الشامل\n- الانتقال من **وكالة سفر** إلى **منصة سياحية متعددة الأطراف**.\n- بناء **ميزة تنافسية مستدامة** يصعب تقليدها على المدى القصير.\n- تأمين **حصة سوقية كبيرة** قبل دخول منافسين دوليين أقوى.\n\n#### 2. تنويع مصادر الإيرادات\n- ثلاث قنوات إيرادات مستقلة (B2C، B2B، Corporate) تُقلِّل المخاطرة.\n- كل قناة تخدم شريحة عملاء بمتطلبات مختلفة.\n- استقرار مالي أكبر في مواجهة تقلبات السوق.\n\n#### 3. الجاهزية للتوسع الإقليمي\n- بنية متعددة الفروع تدعم التوسع الجغرافي بسهولة.\n- نظام تعدد العملات يُسهِّل دخول أسواق جديدة.\n- نظام White-label يتيح إطلاق علامات محلية في كل سوق.\n\n### الفوائد المالية\n\n#### 4. مضاعفة الإيرادات\n- زيادة الإيرادات بنسبة 200-400% خلال السنتين الأوليين.\n- متوسط قيمة حجز أعلى بنسبة 70% بفضل الباقات المُجمَّعة.\n- معدل تكرار حجز للعميل الواحد 3 مرات سنوياً.\n\n#### 5. تحسين الهوامش\n- التسعير الديناميكي يُحسِّن ال
