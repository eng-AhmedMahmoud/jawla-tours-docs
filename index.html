Metadata)\n\n| البند (Item) | التفاصيل (Details) |\n|---|---|\n| رقم العقد (Contract No.) | JWL-MNT-PRO-2026-001 |\n| اسم العقد (Contract Title) | عقد صيانة ودعم فني — الباقة الاحترافية (Professional Maintenance & Support Agreement) |\n| الطرف الأول — مقدم الخدمة (Service Provider / First Party) | شركة ديفيا للحلول التقنية (Devya Solutions Ltd.) — جمهورية مصر العربية |\n| الطرف الثاني — العميل (Client / Second Party) | شركة جولة للسياحة (Jawla Tours OTA) |\n| تاريخ السريان (Effective Date) | 29 يونيو 2026 (June 29, 2026) |\n| مدة العقد (Initial Term) | اثنا عشر (12) شهراً ميلادياً |\n| تاريخ الانتهاء (Expiry Date) | 28 يونيو 2027 (June 28, 2027) |\n| القيمة الشهرية (Monthly Value) | 18,000 جنيه مصري (EGP 18,000) |\n| القيمة السنوية الإجمالية (Annual Contract Value) | 216,000 جنيه مصري (EGP 216,000) |\n| العملة (Currency) | الجنيه المصري (EGP) |\n| نوع الباقة (Tier) | الاحترافية (Professional) |\n| ساعات التطوير الشهرية المُضمَّنة | 4 ساعات / شهر (Carry-over غير مسموح) |\n| القانون الحاكم (Governing Law) | قوانين جمهورية مصر العربية |\n| المحكمة المختصة (Jurisdiction) | محاكم القاهرة الاقتصادية |\n\n---\n\n## المقدمة والتعريفات (Preamble & Definitions)\n\n### تمهيد\n\nأُبرم هذا العقد في يوم الإثنين الموافق التاسع والعشرين من شهر يونيو لعام ألفين وستة وعشرين ميلادية (2026-06-29) بين الطرفين المذكورين أعلاه. ويُعدّ هذا العقد الإطار التنظيمي الكامل لتقديم خدمات الصيانة والدعم الفني الاحترافية (Professional Tier) من قبل مقدم الخدمة لصالح العميل، فيما يتعلق بمنصة \"جولة\" (Jawla) الإلكترونية لحجوزات السياحة (Online Travel Agency)، وذلك وفق الشروط والأحكام المُبيّنة أدناه.\n\nوقد أقرّ الطرفان بأهليتهما القانونية الكاملة للتعاقد، واتفقا على ما يلي.\n\n### التعريفات (Definitions)\n\nلأغراض تفسير وتطبيق هذا العقد، تُحمل المصطلحات التالية المعاني المُبيّنة قرين كل منها:\n\n- **المنصة (Platform):** منصة \"جولة\" الإلكترونية بكافة مكوّناتها (Web App, Mobile API, Admin Dashboard, Database, Background Jobs).\n- **الخدمات (Services):** خدمات الصيانة والدعم والمراقبة الاستباقية المُحدّدة في \"نطاق الخدمات\".\n- **اتفاقية مستوى الخدمة (SLA):** الالتزامات الكميّة بالإتاحة، الاستجابة، والحل.\n- **الإتاحة (Uptime):** النسبة المئوية للوقت الذي تكون فيه المنصة عاملة، شهرياً، باستثناء الصيانة المُجدوَلة.\n- **الحادثة (Incident):** أي خلل يؤثر على عمل المنصة.\n- **مستوى الخطورة (Severity Level):** تصنيف الحادثة (P1 / P2 / P3 / P4).\n- **زمن الاستجابة (Response Time) / زمن الحل (Resolution Time):** كما هو معرّف في قسم SLA.\n- **ساعات العمل المُمتدّة (Extended Business Hours):** من الأحد إلى الخميس 8:00 ص – 10:00 م، والسبت 10:00 ص – 6:00 م بتوقيت القاهرة.\n- **المراقبة الاستباقية (Proactive Monitoring):** أنظمة المراقبة التي تكتشف المشكلات قبل أن يُبلِّغ عنها العميل.\n- **تحسين الأداء (Performance Tuning):** عمليات قياس وتحسين أداء المنصة بشكل دوري.\n- **ساعات التطوير المُضمَّنة (Included Dev Hours):** ساعات العمل الفني المخصّصة شهرياً لتغييرات صغيرة لا تستوجب فاتورة منفصلة.\n- **الاجتماع الشهري (Monthly Review):** اجتماع مراجعة الأداء بين الطرفين.\n\n---\n\n## نطاق الخدمات (Scope of Services)\n\nيلتزم مقدم الخدمة بتقديم باقة شاملة من خدمات الصيانة والدعم الاحترافية، تشمل:\n\n### 1. الدعم التفاعلي والاستباقي (Reactive & Proactive Support)\n\n- استقبال بلاغات الأعطال والاستجابة وفق SLA الباقة الاحترافية.\n- المراقبة الاستباقية للمنصة وفتح تذاكر داخلية قبل إبلاغ العميل عند اكتشاف انحرافات.\n\n### 2. التصحيحات الأمنية الشاملة (Comprehensive Security Patching)\n\nتطبيق التصحيحات الأمنية على:\n\n- نظام التشغيل للخوادم.\n- قاعدة البيانات (MongoDB / PostgreSQL).\n- بيئة التشغيل (Node.js / NestJS).\n- جميع التبعيات (Dependencies) ذات الثغرات المُعلَنة.\n- إعدادات الشبكة والجدار الناري.\n- شهادات SSL/TLS وتجديدها التلقائي.\n\n### 3. المراقبة الاستباقية (Proactive Monitoring)\n\n- مراقبة 24/7 لمكوّنات البنية التحتية.\n- مراقبة الأداء (Performance Metrics) ومعدلات الأخطاء.\n- مراقبة الاستهلاك (CPU, Memory, Disk, Network).\n- مراقبة طوابير المهام الخلفية (Background Jobs Queues).\n- مراقبة معدلات نجاح/فشل التكاملات (Payment Gateways, Suppliers APIs).\n\n### 4. تحسين الأداء (Performance Tuning)\n\n- مراجعة استعلامات قاعدة البيانات (Query Optimization) ربع سنوياً.\n- ضبط الفهارس (Indexes Tuning).\n- مراجعة استراتيجيات التخزين المؤقت (Caching Strategy).\n- تحسين أوقات تحميل الواجهات الأمامية.\n\n### 5. ساعات التطوير الشهرية (Monthly Development Hours)\n\n- **4 ساعات شهرياً** مُضمَّنة لتنفيذ تغييرات صغيرة أو تحسينات وظيفية.\n- التغييرات تشمل: تعديلات على نماذج الإدخال، إضافة حقول، تعديل تقارير، تحسينات تجميلية على الواجهة.\n- لا تُرحَّل الساعات غير المُستخدَمة إلى الشهر التالي (Use-it-or-lose-it).\n\n### 6. التقارير الدورية (Periodic Reports)\n\n- تقرير نصف شهري (Biweekly Report).\n- تقرير شهري شامل (Monthly Comprehensive Report).\n- اجتماع مراجعة شهري (Monthly Review Meeting).\n\n### 7. النسخ الاحتياطي المُحسَّن (Enhanced Backups)\n\n- نسخ احتياطي يومي كامل + نسخ تزايدية (Incremental) كل 6 ساعات.\n- اختبار استعادة شهري (Monthly Restore Test).\n\n### 8. إدارة الإصدارات (Release Management)\n\n- تنسيق نوافذ الإصدار مع العميل.\n- إجراء نشر تجريبي على بيئة الـ Staging قبل بيئة الإنتاج.\n\n---\n\n## اتفاقية مستوى الخدمة SLA (Service Level Agreement)\n\n### نسبة الإتاحة المضمونة (Guaranteed Uptime)\n\nيضمن مقدم الخدمة نسبة إتاحة شهرية لا تقل عن **99.5%** (تسعة وتسعين فاصلة خمسة بالمئة) من إجمالي ساعات الشهر التقويمي، باستثناء نوافذ الصيانة المُجدوَلة مُسبقاً.\n\n| المعيار (Metric) | القيمة (Value) | ملاحظات (Notes) |\n|---|---|---|\n| نسبة الإتاحة (Uptime %) | 99.5% | شهرياً |\n| الحد الأقصى للتوقف (Max Downtime) | ≈ 3 ساعات و39 دقيقة شهرياً | تراكمي |\n| نافذة الصيانة (Maintenance Window) | الجمعة 02:00 – 05:00 ص | بتوقيت القاهرة، إخطار مسبق 72 ساعة |\n| المراقبة (Monitoring) | 24/7 | استباقية مع تنبيهات فورية |\n\n### تصنيف الحوادث وأزمنة الاستجابة (Severity Levels)\n\n| المستوى | الوصف | زمن الاستجابة | زمن الحل المُستهدف |\n|---|---|---|---|\n| **P1 — حرجة (Critical)** | توقّف كامل، فقدان بيانات، اختراق أمني | **1 ساعة** | **8 ساعات** |\n| **P2 — عالية (High)** | تعطّل وظيفة رئيسية (الحجز، الدفع) | **4 ساعات** | **24 ساعة** |\n| **P3 — متوسطة (Medium)** | خلل وظيفي محدود لا يمنع الاستخدام | **8 ساعات عمل** | **3 أيام عمل** |\n| **P4 — منخفضة (Low)** | استفسارات، تحسينات تجميلية | **يوم عمل واحد** | **حسب جدول الإصدارات** |\n\n### حساب نسبة الإتاحة\n\n> **Uptime % = ((إجمالي الدقائق في الشهر − دقائق التوقّف غير المُجدوَل) / إجمالي الدقائق في الشهر) × 100**\n\n### مقاييس الأداء الإضافية (Additional Performance KPIs)\n\n| المعيار | الهدف |\n|---|---|\n| متوسط زمن استجابة الواجهة (API Response Time p95) | < 800 ميلي ثانية |\n| معدل أخطاء التطبيق (Application Error Rate) | < 0.5% |\n| نسبة نجاح المدفوعات (Payment Success Rate) | > 97% (للمدفوعات الفنية فقط) |\n| زمن تحميل الصفحة الأولى (Page Load Time p75) | < 3 ثواني |\n\n### تعويضات الإخلال بمستوى الخدمة (Service Credits)\n\n| نسبة الإتاحة الفعلية | الخصم المُستحَق |\n|---|---|\n| من 99.0% إلى أقل من 99.5% | 10% من قيمة الشهر |\n| من 98.0% إلى أقل من 99.0% | 20% من قيمة الشهر |\n| من 95.0% إلى أقل من 98.0% | 35% من قيمة الشهر |\n| أقل من 95.0% | 50% من قيمة الشهر |\n\n### تعويضات تجاوز زمن الاستجابة لحوادث P1\n\n- لكل ساعة تأخير في الاستجابة بعد المهلة المُحدّدة: خصم 2% من قيمة الشهر، بحد أقصى 20%.\n\n---\n\n## ساعات الدعم (Support Hours)\n\n| اليوم (Day) | الساعات (Hours) | المنطقة الزمنية |\n|---|---|---|\n| الأحد (Sunday) | 8:00 ص – 10:00 م | توقيت القاهرة (GMT+2) |\n| الإثنين (Monday) | 8:00 ص – 10:00 م | توقيت القاهرة (GMT+2) |\n| الثلاثاء (Tuesday) | 8:00 ص – 10:00 م | توقيت القاهرة (GMT+2) |\n| الأربعاء (Wednesday) | 8:00 ص – 10:00 م | توقيت القاهرة (GMT+2) |\n| الخميس (Thursday) | 8:00 ص – 10:00 م | توقيت القاهرة (GMT+2) |\n| الجمعة (Friday) | خارج الخدمة (طوارئ P1 فقط) | — |\n| السبت (Saturday) | 10:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n\n**إجمالي ساعات التغطية الأسبوعية:** 78 ساعة.\n\n### حوادث P1 خارج ساعات العمل\n\n- متاحة على مدار 24/7 من خلال نظام التنبيهات الاستباقية.\n- يُحتسب زمن الاستجابة من لحظة الإبلاغ بغض النظر عن الوقت.\n\n### العطلات الرسمية\n\n- يُغطّى أول يومين من كل عيد عمل بدعم محدود (P1 و P2 فقط).\n- بقية أيام العطلة: P1 فقط.\n\n---\n\n## قنوات الدعم (Support Channels)\n\n| القناة | التفاصيل | الاستخدام |\n|---|---|---|\n| **البريد الإلكتروني** | support@devya.dev | جميع الطلبات |\n| **بوابة التذاكر** | https://support.devya.dev | تتبّع وإدارة التذاكر |\n| **واتساب الأعمال** | +20 1XX XXX XXXX (مخصّص للعميل) | حوادث P1 و P2 السريعة |\n| **الهاتف** | غير متاح في الباقة الاحترافية | متوفر في الباقة المؤسسية |\n| **اجتماعات Microsoft Teams / Zoom** | حسب الجدولة | اجتماعات المراجعة الشهرية |\n\n**التواصل عبر واتساب الأعمال يُسجَّل تلقائياً في نظام التذاكر لضمان التوثيق.**\n\n---\n\n## الخدمات المشمولة (Included Services)\n\n- استقبال بلاغات الأعطال وتحليلها وتشخيصها وفق SLA الباقة الاحترافية.\n- إصلاح جميع الأعطال البرمجية في الوحدات القائمة.\n- تطبيق التصحيحات الأمنية الحرجة والعالية والمتوسطة.\n- المراقبة الاستباقية 24/7 لجميع مكوّنات البنية التحتية.\n- نسخ احتياطي يومي + تزايدي كل 6 ساعات.\n- استعادة قاعدة البيانات (حتى 3 مرات شهرياً دون رسوم إضافية).\n- تحسين الأداء الدوري (مراجعة ربع سنوية).\n- تقارير نصف شهرية وشهرية.\n- اجتماع مراجعة شهري عبر فيديو كونفرنس (مدة الاجتماع: ساعة).\n- 4 ساعات تطوير شهرية لتعديلات صغيرة.\n- إدارة الإصدارات والنشر التجريبي على Staging.\n- مراجعة أمان أساسية (Basic Security Review) كل 6 أشهر.\n- دعم تكاملات الطرف الثالث الموجودة (بوابات الدفع، APIs المورّدين).\n- مراجعة سجلّات الأخطاء وتقديم توصيات استباقية.\n- تجديد الشهادات الرقمية (SSL/TLS) تلقائياً.\n- ضبط استراتيجية التخزين المؤقت (Caching).\n- مراجعة استعلامات قاعدة البيانات وضبط الفهارس.\n- مراقبة معدلات نجاح/فشل بوابات الدفع وتنبيه استباقي.\n- توثيق التغييرات في سجل الإصدارات (Changelog).\n\n---\n\n## الخدمات غير المشمولة (Excluded Services)\n\n- تطوير وحدات أو مزايا جديدة كبيرة تتجاوز ساعات التطوير الشهرية المُضمَّنة (4 ساعات).\n- إعادة تصميم شامل للواجهات (Full UI/UX Redesign).\n- تكاملات جديدة مع موردين أو بوابات دفع لم تكن قائمة وقت توقيع العقد.\n- اختبار الاختراق المتقدم (Advanced Penetration Testing) — متوفر في الباقة المؤسسية.\n- التدقيق الأمني الكامل (Full Security Audit) — متوفر في الباقة المؤسسية.\n- مدير حساب مخصّص بدوام كامل (Dedicated Account Manager) — متوفر في الباقة المؤسسية.\n- ترحيل البيانات بين الأنظمة (Data Migration).\n- التدريب الموسّع للمستخدمين النهائيين (أكثر من جلستين سنوياً).\n- إصلاح الأعطال الناتجة عن تعديلات أجراها العميل أو أطراف خارجية دون علم مقدم الخدمة.\n- إعادة الهيكلة الجوهرية للكود (Major Refactoring).\n- استرداد بيانات من نسخ احتياطية أقدم من 30 يوماً.\n- دعم نسخ المنصة المُنشورة في بيئات لا يديرها مقدم الخدمة.\n- تطوير تطبيقات الموبايل الجديدة (Native Mobile Apps) من الصفر.\n- خدمات استشارية استراتيجية تتجاوز نطاق التشغيل التقني.\n\n---\n\n## التحديثات الأمنية (Security Updates)\n\n### السياسة العامة\n\n| فئة التحديث | المهلة الزمنية |\n|---|---|\n| ثغرات حرجة (Critical CVE — CVSS ≥ 9.0) | خلال **24 ساعة** من الإعلان |\n| ثغرات عالية (High — CVSS 7.0–8.9) | خلال **7 أيام** |\n| ثغرات متوسطة (Medium — CVSS 4.0–6.9) | خلال **21 يوماً** |\n| ثغرات منخفضة (Low — CVSS < 4.0) | خلال **60 يوماً** |\n\n### نطاق التحديثات\n\n- نظام التشغيل وحزم النظام (Linux Distro Packages).\n- قاعدة البيانات (Database Engines).\n- بيئة التشغيل (Node.js / NestJS / Next.js).\n- جميع التبعيات البرمجية (NPM, PIP, Composer إن وُجد).\n- صور Docker الأساسية (Base Images).\n- شهادات الأمان (SSL/TLS Certificates).\n- بروتوكولات الأمان (TLS Versions, Cipher Suites).\n- إعدادات الجدار الناري وقائمة عناوين IP المسموحة.\n\n### الاختبار قبل النشر\n\n- جميع التحديثات الأمنية تُختبَر أولاً على بيئة Staging.\n- يُرسَل تقرير مُختصَر للعميل قبل النشر على الإنتاج (باستثناء الطوارئ القصوى).\n\n### إخطار العميل\n\n- إخطار مُسبق بـ 24 ساعة للتحديثات العادية.\n- إخطار فوري مع تقرير لاحق خلال 4 ساعات للتحديثات الطارئة.\n\n---\n\n## مراقبة البنية التحتية (Infrastructure Monitoring)\n\nنظام مراقبة شامل 24/7 يشمل:\n\n| نوع المراقبة | التفاصيل | عتبة التنبيه |\n|---|---|---|\n| الإتاحة (Uptime) | فحص HTTP كل دقيقة | فشل > 2 محاولة متتالية |\n| زمن الاستجابة (Latency) | قياس p50/p95/p99 | p95 > 1500ms |\n| استهلاك المعالج (CPU) | كل دقيقة | > 80% لمدة 10 دقائق |\n| استهلاك الذاكرة (Memory) | كل دقيقة | > 85% لمدة 10 دقائق |\n| مساحة القرص (Disk) | كل 5 دقائق | > 80% |\n| صحة قاعدة البيانات (DB Health) | كل دقيقة | استعلام بطيء > 5s |\n| طوابير المهام (Job Queues) | كل دقيقة | تراكم > 1000 مهمة |\n| معدل الأخطاء (Error Rate) | كل دقيقة | > 1% خلال 5 دقائق |\n| شهادات SSL | يومي | انتهاء خلال 30 يوماً |\n| تكاملات الدفع (Payment APIs) | كل 5 دقائق | فشل > 5% |\n| تكاملات الموردين (Supplier APIs) | كل 5 دقائق | فشل > 10% |\n\n### قناة التنبيهات\n\n- تنبيهات داخلية لفريق الدعم عبر Slack + PagerDuty.\n- تنبيهات للعميل (للحالات التي تستوجب وعيه) عبر البريد + واتساب.\n\n---\n\n## التقارير الدورية (Periodic Reports)\n\n### التقرير نصف الشهري (Biweekly Report)\n\nيُسلَّم كل أسبوعين ويتضمّن:\n\n1. ملخّص الحوادث منذ التقرير السابق.\n2. نسبة الإتاحة حتى تاريخه.\n3. التذاكر المُغلَقة والمفتوحة.\n4. الإجراءات الاستباقية المُتّخذة.\n5. التحديثات الأمنية المُطبَّقة.\n\n### التقرير الشهري الشامل (Monthly Comprehensive Report)\n\nيُسلَّم خلال الأسبوع الأول من كل شهر ويتضمّن:\n\n1. **ملخّص تنفيذي** — نسبة الإتاحة، التزام SLA، أبرز الإنجازات.\n2. **سجل الحوادث الكامل** — مع التحليل والسبب الجذري.\n3. **مقاييس الأداء (KPIs)** — رسوم بيانية لزمن الاستجابة، معدل الأخطاء، نسبة نجاح الدفع.\n4. **استخدام الموارد** — رسوم بيانية للـ CPU/Memory/Disk.\n5. **التحديثات الأمنية** — قائمة كاملة بما طُبّق.\n6. **ساعات التطوير المُستهلَكة** — تفصيل الـ 4 ساعات الشهرية.\n7. **التغييرات على المنصة** — Changelog.\n8. **التوصيات الاستراتيجية** — مقترحات تحسين للشهر القادم.\n9. **حالة النسخ الاحتياطي** — نتائج اختبار الاستعادة الشهري.\n\n### اجتماع المراجعة الشهري (Monthly Review Meeting)\n\n- يُعقد في الأسبوع الثاني من كل شهر.\n- مدته: ساعة واحدة عبر Microsoft Teams أو Zoom.\n- يحضره: مدير الحساب من مقدم الخدمة + المسؤول الرئيسي والفني من العميل.\n- يُسلَّم محضر اجتماع موقّع خلال 48 ساعة.\n\n---\n\n## إدارة الحوادث (Incident Management)\n\n### مراحل دورة حياة الحادثة\n\n1. **الاكتشاف (Detection):** إمّا عبر إبلاغ العميل أو عبر نظام المراقبة الاستباقية.\n2. **التسجيل (Logging):** فتح تذكرة برقم تعريفي فريد.\n3. **التصنيف (Triage):** تخصيص مستوى الخطورة (P1–P4).\n4. **التأكيد (Acknowledgment):** خلال زمن الاستجابة المُحدّد بالـ SLA.\n5. **التحقيق (Investigation):** تحليل السبب الجذري.\n6. **الحلّ المؤقت (Workaround):** عند الحاجة لإعادة الخدمة بسرعة.\n7. **الحلّ الجذري (Permanent Fix):** الإصلاح النهائي.\n8. **التحقق (Verification):** اختبار الحل مع العميل.\n9. **الإغلاق (Closure):** بعد موافقة العميل.\n10. **تقرير ما بعد الحادثة (Post-Mortem):** لكل حوادث P1 وP2، يُسلَّم خلال 3 أيام عمل.\n\n### مصفوفة التصعيد (Escalation Matrix)\n\n| المستوى | الجهة | إذا تجاوز الزمن |\n|---|---|---|\n| L1 | فني الدعم المسؤول | الزمن المُحدّد بالـ SLA |\n| L2 | قائد فريق الدعم | بعد تجاوز 50% من زمن الحل |\n| L3 | مدير الهندسة | بعد تجاوز 80% من زمن الحل |\n| L4 | المدير التنفيذي للعمليات (COO) | بعد تجاوز 100% من زمن الحل |\n\n### تواصل العميل أثناء الحوادث\n\n- **حوادث P1:** تحديث للعميل كل 30 دقيقة حتى الحلّ.\n- **حوادث P2:** تحديث كل ساعتين.\n- **حوادث P3/P4:** تحديث يومي.\n\n---\n\n## النسخ الاحتياطي والاستعادة (Backup & Restore)\n\n### سياسة النسخ الاحتياطي\n\n| المُكوِّن | التكرار | فترة الاحتفاظ |\n|---|---|---|\n| قاعدة البيانات (كامل) | يومي 02:00 ص | 30 يوماً |\n| قاعدة البيانات (تزايدي) | كل 6 ساعات | 7 أيام |\n| الملفّات المرفوعة | يومي | 30 يوماً |\n| إعدادات الخادم | عند كل تغيير | 90 يوماً |\n| نسخ شهرية مؤرشفة | شهري (آخر يوم) | 12 شهراً |\n\n### الاستعادة\n\n- **عدد الاستعادات المجانية:** حتى 3 مرات شهرياً.\n- **زمن الاستعادة المُستهدف (RTO):** 4 ساعات.\n- **زمن فقدان البيانات الأقصى (RPO):** 6 ساعات.\n- **استعادة جزئية:** متاحة على مستوى السجل الفردي عند الحاجة.\n- **اختبار استعادة شهري:** يُجرى على بيئة معزولة ويُوثَّق في التقرير الشهري.\n\n### موقع التخزين\n\n- نسخ احتياطية في موقع جغرافي مُنفصل عن الإنتاج (Cross-Region).\n- نسخة إضافية على تخزين بارد (Cold Storage) للأرشيف الشهري.\n- تشفير AES-256 في الراحة + TLS 1.3 أثناء النقل.\n\n---\n\n## التسعير وجدول الدفع (Pricing & Payment Schedule)\n\n### القيمة الإجمالية\n\n| البند | القيمة | الوحدة |\n|---|---|---|\n| الاشتراك الشهري | 18,000 | جنيه مصري / شهرياً |\n| الاشتراك السنوي (12 شهراً) | 216,000 | جنيه مصري / سنوياً |\n| خصم الدفع السنوي المُقدَّم | 5% (10,800 جنيه) | يُخصم من الإجمالي |\n| القيمة الفعلية السنوية بعد الخصم | 205,200 | جنيه مصري |\n| الضرائب | حسب القانون | تُضاف للفاتورة |\n\n### الخدمات الإضافية\n\n| الخدمة | السعر |\n|---|---|\n| ساعات تطوير إضافية فوق 4 ساعات | 1,000 جنيه / ساعة |\n| دعم طارئ خارج النطاق المُغطّى | 2,000 جنيه / ساعة |\n| استعادة إضافية (بعد 3 استعادات) | 2,500 جنيه / استعادة |\n| تكامل جديد مع طرف ثالث | يُسعَّر بشكل مُنفصل (Statement of Work) |\n| تدريب موسّع للمستخدمين | 5,000 جنيه / جلسة (3 ساعات) |\n| تدقيق أمني سريع (Quick Security Scan) | 8,000 جنيه |\n\n### جدول الدفع\n\n- **الدورة:** شهرياً (أو سنوياً مع خصم 5%).\n- **تاريخ الإصدار:** اليوم الأول من كل شهر ميلادي.\n- **مهلة السداد:** خلال 15 يوماً من تاريخ الفاتورة.\n- **طريقة الدفع:** تحويل بنكي.\n- **التأخر في السداد:** فائدة تأخير 1% شهرياً، تعليق الخدمات بعد 30 يوماً من التأخر.\n\n---\n\n## شروط التجديد (Renewal Terms)\n\n- التجديد تلقائي لمدة سنة إضافية ما لم يُخطر أحد الطرفين الآخر كتابياً قبل **60 يوماً**.\n- تعديل التسعير عند التجديد بحد أقصى **معدل التضخم الرسمي + 5%**، مع إخطار قبل 60 يوماً.\n- يحق للعميل الترقية إلى Enterprise في أي وقت مع احتساب تناسبي للفرق.\n- يحق للعميل التراجع إلى Basic عند التجديد فقط (وليس خلال مدة العقد).\n- مكافأة الولاء عند التجديد للسنة الثالثة على التوالي: شهر مجاني أو ترقية مؤقتة لمدة 3 أشهر.\n\n---\n\n## إنهاء العقد (Termination)\n\n### الإنهاء العادي\n\n- إخطار كتابي مُسبق مدته **90 يوماً**.\n- تسديد جميع المستحقات حتى تاريخ الإنهاء الفعلي.\n\n### الإنهاء للسبب\n\n- إخلال جوهري لم يُصحَّح خلال **30 يوماً** من الإخطار.\n- إفلاس أو تصفية إجبارية.\n- خرق جسيم للسرية أو حماية البيانات.\n\n### الالتزامات عند الإنهاء\n\n- تسليم نسخة كاملة من بيانات العميل خلال **30 يوماً**.\n- تسليم وثائق التشغيل (Runbooks) والوصول الكامل إلى البنية التحتية.\n- جلسة تسليم فنية (Knowledge Transfer Session) لمدة 4 ساعات.\n- حذف بيانات العميل من أنظمة مقدم الخدمة خلال **90 يوماً** (باستثناء ما يفرضه القانون).\n- استرداد رسوم أي شهر مدفوع مُسبقاً ولم يُستخدَم بالكامل (تناسبياً).\n\n---\n\n## السرية وحماية البيانات (Confidentiality & Data Protection)\n\n### السرية\n\n- يلتزم كل طرف بسرية معلومات الطرف الآخر طوال مدة العقد و**خمس سنوات** بعد انتهائه.\n- توقيع اتفاقية عدم إفصاح (NDA) منفصلة كملحق لهذا العقد.\n- الاستثناءات: المعلومات العامة، أو ما يجب الإفصاح عنه بحكم القانون أو القضاء.\n\n### حماية البيانات\n\n- جميع البيانات ملك حصري للعميل.\n- الامتثال لقانون حماية البيانات الشخصية المصري (151/2020).\n- الامتثال لمعيار PCI-DSS فيما يخص بيانات بطاقات الدفع (على المستوى المُنطبق على الباقة الاحترافية).\n- التشفير في الراحة والنقل.\n- عزل بيانات الإنتاج عن بيئات الاختبار والتطوير.\n\n### إجراءات الأمان\n\n- تدقيق سنوي مُختصَر لإعدادات الأمان (مُضمَّن).\n- مصادقة ثنائية (2FA) إلزامية لجميع وصول فريق الدعم.\n- تدوير بيانات الاعتماد كل 90 يوماً.\n- استخدام مدير كلمات سرّ مؤسسي (Enterprise Password Manager).\n\n### الاستجابة لتسريب البيانات\n\n- إخطار العميل خلال **24 ساعة** من اكتشاف أي تسريب.\n- تقرير أولي خلال 72 ساعة.\n- تقرير سبب جذري نهائي خلال 14 يوماً.\n\n---\n\n## المسؤولية والضمانات (Liability & Warranties)\n\n### الضمانات\n\n- تقديم الخدمات بمستوى مهني عالٍ.\n- توافر الكوادر المؤهَّلة والمُعتمَدة.\n- اتباع أفضل الممارسات الصناعية في الأمان والتشغيل.\n- الإفصاح الفوري عن أي تضارب مصالح محتمل.\n\n### حدود المسؤولية\n\n- لا تتجاوز المسؤولية الإجمالية لمقدم الخدمة قيمة **القيمة السنوية الإجمالية للعقد** (216,000 جنيه).\n- لا يُسأل عن الأضرار غير المباشرة أو التبعية أو فقدان الأرباح.\n- استثناء: في حالات الإهمال الجسيم أو سوء النية، تُرفع حدود المسؤولية إلى ضعف القيمة السنوية.\n\n### القوة القاهرة\n\n- الكوارث الطبيعية، الحرب، الإرهاب، الإضرابات.\n- انقطاع البنية التحتية الوطنية.\n- قرارات حكومية تمنع التنفيذ.\n- جوائح صحية مُعلَنة.\n- في حال استمرار القوة القاهرة لأكثر من 60 يوماً، يحق لأي طرف إنهاء العقد دون مساءلة.\n\n### التأمين\n\n- يحتفظ مقدم الخدمة بتأمين مسؤولية مهنية لا يقل عن 500,000 جنيه مصري.\n- يُقدَّم إثبات التأمين عند الطلب.\n\n---\n\n## التواصل وجهات الاتصال (Communication & Contacts)\n\n### جهات الاتصال لدى مقدم الخدمة\n\n| الدور | الاسم | البريد الإلكتروني | الهاتف / واتساب |\n|---|---|---|---|\n| مدير الحساب (Account Manager) | يُحدَّد عند التوقيع | accounts@devya.dev | +20 1XX XXX XXXX |\n| فريق الدعم الفني (Support Team) | فريق الدعم | support@devya.dev | +20 1XX XXX XXXX |\n| التصعيد المستوى الثاني (L2) | قائد الفريق | escalation@devya.dev | — |\n| التصعيد المستوى الثالث (L3) | مدير الهندسة | engineering@devya.dev | — |\n| الفوترة (Billing) | قسم المالية | billing@devya.dev | — |\n| الأمان (Security) | مسؤول الأمان | security@devya.dev | — |\n\n### جهات الاتصال لدى العميل\n\n| الدور | الاسم | البريد الإلكتروني | الهاتف |\n|---|---|---|---|\n| المسؤول الرئيسي (Primary Contact) | _____________ | _____________ | _____________ |\n| المسؤول الفني (Technical Contact) | _____________ | _____________ | _____________ |\n| المسؤول المالي (Billing Contact) | _____________ | _____________ | _____________ |\n| المسؤول الأمني (Security Contact) | _____________ | _____________ | _____________ |\n\n### قنوات التواصل الرسمية\n\n- **التواصل اليومي:** البريد + بوابة التذاكر + واتساب الأعمال.\n- **الاجتماعات:** Microsoft Teams / Zoom.\n- **التعديلات على العقد:** كتابية وموقّعة من الطرفين فقط.\n- **إخطارات الطوارئ:** عبر جميع القنوات المتاحة بالتوازي.\n\n---\n\n## التوقيعات (Signatures)\n\nأُبرم هذا العقد من نسختين أصليتين، يحتفظ كل طرف بنسخة منهما، ويُعدّ نافذاً اعتباراً من تاريخ التوقيع.\n\n---\n\n### الطرف الأول — مقدم الخدمة (First Party — Service Provider)\n\n**شركة ديفيا للحلول التقنية (Devya Solutions Ltd.)**\n\n| البند | التفاصيل |\n|---|---|\n| الاسم (Name) | _______________________________ |\n| الصفة (Title) | _______________________________ |\n| التوقيع (Signature) | _______________________________ |\n| التاريخ (Date) | _____ / _____ / 2026 |\n| الختم (Stamp) | _______________________________ |\n\n---\n\n### الطرف الثاني — ال من شهر يونيو لعام ألفين وستة وعشرين ميلادية (2026-06-29) بين الطرفين المذكورين أعلاه. ويُعدّ هذا العقد الإطار التنظيمي الشامل لتقديم خدمات الصيانة والدعم الفني والمراقبة المؤسسية (Enterprise Tier) من قبل مقدم الخدمة لصالح العميل، فيما يتعلق بمنصة \"جولة\" (Jawla) الإلكترونية المتخصصة في حجوزات السياحة عبر الإنترنت (Online Travel Agency).\n\nيعكس هذا العقد التزاماً استراتيجياً طويل الأمد من مقدم الخدمة لضمان استمرارية الأعمال (Business Continuity)، أعلى مستويات التوفّر (High Availability)، والامتثال لأعلى معايير الأمان (Security Compliance)، مع تخصيص فريق متفرّغ جزئياً يفهم خصوصية أعمال العميل وأهدافه التجارية.\n\nوقد أقرّ الطرفان بأهليتهما القانونية الكاملة للتعاقد، واتفقا على ما يلي.\n\n### التعريفات (Definitions)\n\nلأغراض تفسير وتطبيق هذا العقد، تُحمل المصطلحات التالية المعاني المُبيّنة قرين كل منها:\n\n- **المنصة (Platform):** منصة \"جولة\" الإلكترونية الكاملة (Web, Mobile APIs, Admin, Database, Microservices, Background Workers, Search Index, CDN, Cache Layer).\n- **الخدمات (Services):** الخدمات المؤسسية الكاملة للصيانة والدعم والمراقبة والتطوير المُحدّدة في هذا العقد.\n- **اتفاقية مستوى الخدمة (SLA):** الالتزامات الكمية الصارمة بالإتاحة (99.9%) والاستجابة والحلّ.\n- **الإتاحة (Uptime):** النسبة المئوية لتوفّر المنصة شهرياً، باستثناء الصيانة المُجدوَلة.\n- **مدير الحساب المخصّص (DAM — Dedicated Account Manager):** شخص مُعيَّن من قبل مقدم الخدمة كنقطة اتصال رئيسية واستراتيجية للعميل.\n- **خط الطوارئ المخصّص (Hotline):** رقم هاتف مباشر لطوارئ P1 يعمل على مدار 24/7.\n- **التدقيق الأمني الربع سنوي (Quarterly Security Audit):** مراجعة شاملة للأمان كل ثلاثة أشهر.\n- **تمارين التعافي من الكوارث (DR Drills — Disaster Recovery Drills):** تمارين دورية لاختبار خطط التعافي.\n- **اجتماع المراجعة التنفيذي الشهري (Monthly Executive Review):** اجتماع مع القيادة العليا للعميل.\n- **مراجعة استراتيجية تقنية (Technical Strategy Review):** مراجعة سنوية للخارطة الفنية.\n- **تخطيط السعة (Capacity Planning):** تحليل دوري لاحتياجات الموارد المستقبلية.\n- **التزام التواجد (Presence Commitment):** التزام مقدم الخدمة بتواجد فني في مقر العميل عند الحاجة.\n\n---\n\n## نطاق الخدمات (Scope of Services)\n\nيلتزم مقدم الخدمة بتقديم باقة شاملة مؤسسية تتضمّن:\n\n### 1. الدعم 24/7 الكامل (Full 24/7 Support)\n\nدعم متواصل على مدار الساعة طوال أيام السنة، بما في ذلك العطلات الرسمية والإجازات الموسمية، من خلال فريق نوبات (Shift Team) يضمن وجود فني خبير في كل لحظة.\n\n### 2. مدير حساب مخصّص (Dedicated Account Manager)\n\n- شخص واحد مُعيَّن كنقطة اتصال رئيسية للعميل.\n- يُكرّس 30% من وقته (≈ 48 ساعة شهرياً) لشؤون العميل.\n- يحضر جميع الاجتماعات الدورية والمراجعات.\n- يفهم البنية الفنية والأهداف التجارية للعميل.\n- يقود التخطيط الفصلي والسنوي.\n\n### 3. خط طوارئ مخصّص (Dedicated Hotline)\n\n- رقم هاتف مُخصّص يصل إلى فريق الطوارئ مباشرة دون قوائم انتظار.\n- متاح 24/7 لحوادث P1.\n- متابعة فورية + إنشاء تذكرة + بدء التحقيق خلال 15 دقيقة.\n\n### 4. المراقبة الاستباقية الكاملة (Full Proactive Monitoring)\n\n- مراقبة شاملة لجميع طبقات المنصة (Application, Database, Infrastructure, Network, Security).\n- مراقبة ذكاء أعمال (Business Metrics Monitoring) — معدل الحجوزات، نسبة التحويل.\n- اكتشاف الشذوذ (Anomaly Detection) بالذكاء الاصطناعي.\n- إجراءات تلقائية للتعافي (Auto-Remediation) للحالات الشائعة.\n\n### 5. تخطيط السعة (Capacity Planning)\n\n- مراجعة شهرية لاتجاهات الاستخدام.\n- توقّعات سنوية للنمو وحاجات البنية.\n- توصيات بتوسيع الموارد قبل الذروة (الموسم السياحي).\n- خطة سعة موسمية مُحدَّثة قبل بداية كل موسم بـ 60 يوماً.\n\n### 6. التدقيق الأمني الربع سنوي (Quarterly Security Audits)\n\n- تدقيق شامل كل 3 أشهر يشمل:\n  - مراجعة إعدادات الأمان.\n  - فحص الثغرات (Vulnerability Scan).\n  - مراجعة سجلات الوصول (Access Audit).\n  - مراجعة سياسات الصلاحيات (IAM Review).\n  - اختبار اختراق محدود (Limited Penetration Test).\n- تقرير تنفيذي + خطة معالجة.\n\n### 7. ساعات التطوير الشهرية (12 ساعة / شهر)\n\n- 12 ساعة شهرياً لتطوير مزايا صغيرة ومتوسطة.\n- إمكانية ترحيل الساعات غير المُستخدَمة حتى 3 أشهر، بحدّ أقصى تراكمي 24 ساعة.\n- التغييرات الكبرى تُسعَّر بعقد عمل منفصل (SOW).\n\n### 8. تمارين التعافي من الكوارث (DR Drills)\n\n- تمرين كامل نصف سنوي.\n- تمرين جزئي ربع سنوي.\n- تقرير نتائج لكل تمرين مع خطة تحسين.\n\n### 9. التقارير والاجتماعات\n\n- تقارير أسبوعية.\n- اجتماع مراجعة شهري تنفيذي.\n- مراجعة تقنية ربع سنوية.\n- مراجعة استراتيجية سنوية.\n\n### 10. النسخ الاحتياطي المؤسسي\n\n- نسخ مستمرة (Continuous Backup) مع زمن RPO قصير جداً.\n- نسخ متعدّدة المواقع (Multi-Region).\n- استعادة فورية (Hot Standby) لقاعدة البيانات.\n\n### 11. إدارة الإصدارات المُتقدّمة\n\n- بيئات منفصلة (Dev / Staging / UAT / Production).\n- نشر تدريجي (Canary Deployment).\n- إمكانية الرجوع الفوري (Rollback) خلال دقائق.\n\n### 12. التزام التواجد في الموقع (On-site Presence)\n\n- زيارة شهرية لمقر العميل (لمدة يوم).\n- تواجد طارئ في مقر العميل خلال 4 ساعات لحوادث P1 الحرجة (في القاهرة الكبرى).\n\n---\n\n## اتفاقية مستوى الخدمة SLA (Service Level Agreement)\n\n### نسبة الإتاحة المضمونة (Guaranteed Uptime)\n\nيضمن مقدم الخدمة نسبة إتاحة شهرية لا تقل عن **99.9%** (تسعة وتسعين فاصلة تسعة بالمئة) من إجمالي ساعات الشهر التقويمي، باستثناء نوافذ الصيانة المُجدوَلة مُسبقاً والمُوافَق عليها من العميل.\n\n| المعيار (Metric) | القيمة (Value) | ملاحظات (Notes) |\n|---|---|---|\n| نسبة الإتاحة (Uptime %) | **99.9%** | شهرياً |\n| الحد الأقصى للتوقف غير المُجدوَل (Max Downtime) | ≈ 43 دقيقة شهرياً | تراكمي |\n| نافذة الصيانة (Maintenance Window) | الجمعة 03:00 – 05:00 ص | إخطار مسبق 7 أيام، موافقة العميل المُسبقة مطلوبة |\n| المراقبة (Monitoring) | 24/7 شامل | استباقي + ذكاء أعمال |\n| RTO (Recovery Time Objective) | **2 ساعة** | في حال كارثة كاملة |\n| RPO (Recovery Point Objective) | **15 دقيقة** | الحد الأقصى لفقدان البيانات |\n\n### تصنيف الحوادث وأزمنة الاستجابة (Severity Levels)\n\n| المستوى | الوصف | زمن الاستجابة | زمن الحل المُستهدف |\n|---|---|---|---|\n| **P1 — حرجة (Critical)** | توقّف كامل، فقدان بيانات، اختراق أمني | **15 دقيقة** | **4 ساعات** |\n| **P2 — عالية (High)** | تعطّل وظيفة رئيسية للأعمال | **1 ساعة** | **12 ساعة** |\n| **P3 — متوسطة (Medium)** | خلل وظيفي محدود | **4 ساعات** | **2 يوم عمل** |\n| **P4 — منخفضة (Low)** | استفسارات، تحسينات | **8 ساعات** | **5 أيام عمل** |\n\n### حساب نسبة الإتاحة\n\n> **Uptime % = ((إجمالي الدقائق في الشهر − دقائق التوقّف غير المُجدوَل) / إجمالي الدقائق في الشهر) × 100**\n\n### مقاييس الأداء التجارية (Business KPIs)\n\n| المعيار | الهدف |\n|---|---|\n| متوسط زمن استجابة الـ API (p95) | < 500 ميلي ثانية |\n| متوسط زمن استجابة الـ API (p99) | < 1200 ميلي ثانية |\n| معدل أخطاء التطبيق | < 0.1% |\n| نسبة نجاح المدفوعات (الفنية) | > 99% |\n| زمن تحميل الصفحة الأولى (p75) | < 2 ثانية |\n| زمن إكمال عملية الحجز end-to-end (p95) | < 12 ثانية |\n| توافر تكاملات الموردين (Supplier APIs Uptime) | > 99% |\n\n### تعويضات الإخلال بمستوى الخدمة (Service Credits)\n\n| نسبة الإتاحة الفعلية | الخصم المُستحَق |\n|---|---|\n| من 99.5% إلى أقل من 99.9% | 15% من قيمة الشهر |\n| من 99.0% إلى أقل من 99.5% | 25% من قيمة الشهر |\n| من 98.0% إلى أقل من 99.0% | 50% من قيمة الشهر |\n| أقل من 98.0% | 75% من قيمة الشهر + حق فسخ العقد |\n\n### تعويضات تجاوز زمن الاستجابة\n\n| المستوى | عقوبة التأخير |\n|---|---|\n| P1: تأخر أكثر من 30 دقيقة عن المهلة | 5% من قيمة الشهر لكل ساعة، بحد أقصى 30% |\n| P2: تأخر أكثر من ساعتين | 2% من قيمة الشهر لكل ساعة، بحد أقصى 15% |\n\n### الالتزام بمقاييس الأعمال\n\nفي حال هبوط نسبة نجاح المدفوعات الفنية تحت 99% لمدة تتجاوز 24 ساعة دون سبب خارجي، يُمنَح العميل خصم 10% من قيمة الشهر.\n\n---\n\n## ساعات الدعم (Support Hours)\n\n| اليوم (Day) | الساعات (Hours) | المنطقة الزمنية | فريق العمل |\n|---|---|---|---|\n| الأحد (Sunday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات كامل |\n| الإثنين (Monday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات كامل |\n| الثلاثاء (Tuesday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات كامل |\n| الأربعاء (Wednesday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات كامل |\n| الخميس (Thursday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات كامل |\n| الجمعة (Friday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات مُختصَر + خط طوارئ |\n| السبت (Saturday) | 24 ساعة | توقيت القاهرة (GMT+2) | فريق نوبات مُختصَر + خط طوارئ |\n\n**إجمالي ساعات التغطية الأسبوعية:** 168 ساعة (24/7).\n\n### نوبات الفريق\n\n| النوبة | الساعات | عدد المهندسين |\n|---|---|---|\n| النوبة الصباحية | 7:00 ص – 3:00 م | 4 مهندسين |\n| النوبة المسائية | 3:00 م – 11:00 م | 3 مهندسين |\n| النوبة الليلية | 11:00 م – 7:00 ص | 2 مهندس + On-Call Senior |\n\n### العطلات الرسمية\n\n- التغطية الكاملة 24/7 سارية في جميع العطلات الرسمية بدون استثناء.\n- تواجد إضافي في فترات الذروة الموسمية (موسم العمرة، رمضان، الأعياد) بناءً على خطة موسمية متفق عليها.\n\n---\n\n## قنوات الدعم (Support Channels)\n\n| القناة | التفاصيل | الاستخدام | متاحة |\n|---|---|---|---|\n| **خط الطوارئ المخصّص (Hotline)** | +20 1XX XXX XXXX (مخصّص) | حوادث P1 فقط | 24/7 |\n| **هاتف الدعم العام** | +20 1XX XXX XXXX | جميع الأنواع | 24/7 |\n| **البريد الإلكتروني** | jawla-support@devya.dev (مخصّص) | جميع الطلبات | 24/7 |\n| **بوابة التذاكر** | https://support.devya.dev | تتبّع وإدارة | 24/7 |\n| **واتساب الأعمال** | +20 1XX XXX XXXX (مخصّص) | تواصل سريع | 24/7 |\n| **Microsoft Teams / Slack** | قناة مشتركة مخصّصة | تواصل يومي مع مدير الحساب | أيام العمل |\n| **اجتماعات Zoom / Teams** | حسب الجدولة | الاجتماعات الدورية | حسب الجدولة |\n| **زيارات الموقع** | شهرية / حسب الحاجة | مراجعات استراتيجية وطوارئ | حسب الجدولة |\n\n**كل قنوات الاتصال تتكامل مع نظام التذاكر الموحّد لضمان عدم ضياع أي إبلاغ.**\n\n---\n\n## الخدمات المشمولة (Included Services)\n\n- دعم 24/7/365 لجميع مستويات الخطورة.\n- مدير حساب مخصّص (30% من وقته).\n- خط طوارئ مخصّص يعمل 24/7.\n- إصلاح جميع الأعطال البرمجية في الوحدات القائمة.\n- التحديثات الأمنية بكافة درجاتها (Critical, High, Medium, Low).\n- المراقبة الاستباقية الكاملة لكل طبقات النظام.\n- مراقبة ذكاء الأعمال (Business Metrics Monitoring).\n- اكتشاف الشذوذ بالذكاء الاصطناعي.\n- إجراءات تلقائية للتعافي (Auto-Remediation).\n- نسخ احتياطي مستمر مع RPO قدره 15 دقيقة.\n- استعادة فورية (Hot Standby DB).\n- استعادة غير محدودة (Unlimited Restores).\n- تخطيط السعة الشهري والسنوي.\n- تدقيق أمني ربع سنوي شامل.\n- اختبار اختراق محدود ربع سنوي.\n- تمارين تعافي من الكوارث (نصف سنوية كاملة + ربع سنوية جزئية).\n- 12 ساعة تطوير شهرياً (قابلة للترحيل حتى 24 ساعة تراكمياً).\n- إدارة إصدارات متقدمة (Canary, Rollback, Blue-Green Deployment).\n- بيئات معزولة (Dev / Staging / UAT / Production).\n- تقارير أسبوعية تنفيذية.\n- اجتماع مراجعة شهري مع القيادة العليا.\n- مراجعة تقنية ربع سنوية.\n- مراجعة استراتيجية سنوية.\n- زيارات شهرية لمقر العميل.\n- تواجد طارئ في الموقع خلال 4 ساعات للحوادث الحرجة.\n- تدريب فصلي للمستخدمين (جلستان فصلياً).\n- مراجعة سجلّات الوصول وتدقيق الصلاحيات شهرياً.\n- ضبط جميع الفهارس والاستعلامات.\n- مراجعة هندسة البرمجيات (Architecture Review) سنوياً.\n- تطبيق أفضل ممارسات DevOps و CI/CD.\n- تجديد جميع الشهادات تلقائياً.\n- إدارة قاعدة المعرفة (Knowledge Base) الخاصة بالعميل.\n- توثيق Runbooks لجميع السيناريوهات الحرجة.\n- خطة استمرارية أعمال (Business Continuity Plan) محدّثة سنوياً.\n- الامتثال لمعايير PCI-DSS كاملة.\n- مراجعة الامتثال للقوانين المحلية والدولية ربع سنوياً.\n- مستشار أمن إلكتروني (CISO Advisory) ساعتين شهرياً.\n\n---\n\n## الخدمات غير المشمولة (Excluded Services)\n\n- تطوير وحدات أو مزايا كبيرة تتجاوز ساعات التطوير الشهرية المُضمَّنة (12 ساعة + المرحَّل).\n- إعادة تصميم شامل للواجهات (Full Redesign Project).\n- تكاملات جديدة كبرى (Major New Integrations) — تُسعَّر بعقود عمل منفصلة.\n- بناء تطبيقات موبايل أصيلة (Native Mobile Apps) من الصفر.\n- خدمات تسويق رقمي أو SEO.\n- ترحيل المنصة إلى منصة سحابية مختلفة (Cloud Migration).\n- إصلاح الأعطال الناتجة عن تعديلات أجراها العميل أو أطراف خارجية دون علم مقدم الخدمة.\n- استبدال المكوّنات الأساسية للمنصة (مثل تغيير قاعدة البيانات).\n- شراء التراخيص أو خدمات السحابة باسم العميل (يتحملها العميل مباشرة).\n- خدمات استشارية في مجالات تجارية بحتة (مثل تسعير المنتجات السياحية).\n- تطوير منتجات مستقلة جديدة منفصلة عن المنصة الحالية.\n- ترجمة المحتوى أو إضافة لغات جديدة (تتم بعقد منفصل).\n- الدعم القانوني أو المحاسبي.\n\n---\n\n## التحديثات الأمنية (Security Updates)\n\n### السياسة العامة (السقف الأعلى للسرعة)\n\n| فئة التحديث | المهلة الزمنية |\n|---|---|\n| ثغرات حرجة (Critical — CVSS ≥ 9.0) | خلال **4 ساعات** من الإعلان الرسمي |\n| ثغرات عالية (High — CVSS 7.0–8.9) | خلال **48 ساعة** |\n| ثغرات متوسطة (Medium — CVSS 4.0–6.9) | خلال **14 يوماً** |\n| ثغرات منخفضة (Low — CVSS < 4.0) | خلال **30 يوماً** |\n| Zero-Day Vulnerabilities | تطبيق فوري + إخطار |\n\n### نطاق التحديثات (شامل)\n\n- نظام التشغيل وحزم النظام بكامل المستويات.\n- محرّكات قواعد البيانات (Primary + Replicas).\n- بيئات التشغيل (Node.js, Next.js, NestJS, إلخ).\n- جميع التبعيات (NPM, OS Packages, Container Images).\n- صور Docker وKubernetes Manifests.\n- شهادات الأمان (SSL/TLS, Code Signing).\n- إعدادات WAF (Web Application Firewall).\n- إعدادات DDoS Protection.\n- إعدادات CDN.\n- بروتوكولات الأمان (TLS 1.3, Modern Cipher Suites).\n- إعدادات OAuth/OIDC/JWT.\n\n### الاختبار قبل النشر\n\n- جميع التحديثات تُختبَر على Staging ثم UAT.\n- اختبارات أمان تلقائية (Automated Security Tests).\n- اختبارات حِمل (Load Tests) للتحديثات ذات الأثر المحتمل على الأداء.\n- توقيع رقمي لكل إصدار (Signed Releases).\n\n### إخطار العميل\n\n- إخطار مُسبق بـ 48 ساعة للتحديثات العادية.\n- إخطار فوري + تقرير لاحق خلال ساعتين للحالات الطارئة.\n- تقرير شهري بكافة التحديثات المُطبَّقة.\n\n### Bug Bounty Coordination\n\n- مقدم الخدمة يدير برنامج Bug Bounty بالنيابة عن العميل (إن طُلب).\n- معالجة البلاغات المُعتمَدة وفق سياسة Triage الأمني.\n\n---\n\n## مراقبة البنية التحتية (Infrastructure Monitoring)\n\nنظام مراقبة مؤسسي 24/7 يشمل:\n\n| نوع المراقبة | التفاصيل | عتبة التنبيه |\n|---|---|---|\n| الإتاحة (Uptime) | فحص HTTP كل 30 ثانية من 3 مواقع جغرافية | فشل > 1 محاولة |\n| زمن الاستجابة (Latency) | قياس p50/p95/p99 لكل endpoint | p95 > 800ms |\n| استهلاك المعالج (CPU) | كل 15 ثانية | > 70% لمدة 5 دقائق |\n| استهلاك الذاكرة (Memory) | كل 15 ثانية | > 75% لمدة 5 دقائق |\n| مساحة القرص (Disk) | كل دقيقة | > 70% |\n| صحة قاعدة البيانات | كل 15 ثانية | استعلام بطيء > 2s |\n| Replication Lag | كل دقيقة | > 5 ثواني |\n| طوابير المهام | كل 30 ثانية | تراكم > 500 مهمة |\n| معدل الأخطاء | كل 30 ثانية | > 0.5% خلال دقيقتين |\n| شهادات SSL | يومي | انتهاء خلال 60 يوماً |\n| تكاملات الدفع | كل دقيقة | فشل > 2% |\n| تكاملات الموردين | كل دقيقة | فشل > 5% |\n| معدل الحجوزات الناجحة | كل 5 دقائق | انخفاض غير اعتيادي (Anomaly) |\n| معدل التحويل (Conversion Rate) | كل 15 دقيقة | هبوط > 20% عن المعدّل |\n| سجلات الأمان (Security Events) | فوري | أي حدث مشبوه |\n| محاولات الوصول الفاشلة | فوري | > 10 محاولات/دقيقة من IP واحد |\n| WAF Triggers | فوري | لكل قاعدة مُفعَّلة |\n| DDoS Indicators | فوري | حجم حركة غير اعتيادي |\n\n### قنوات التنبيهات\n\n| المستوى | القناة | الجهة |\n|---|---|---|\n| Info | لوحة المراقبة | فريق المراقبة |\n| Warning | Slack | فريق الدعم + DAM |\n| Critical | PagerDuty + SMS + هاتف | On-Call Senior |\n| Customer-Visible | إبلاغ العميل عبر جميع القنوات | DAM + المسؤول الفني للعميل |\n\n### الإجراءات التلقائية (Auto-Remediation)\n\n- إعادة تشغيل الخدمة عند فشلها (Auto-Restart).\n- توسيع الموارد تلقائياً عند الضغط (Auto-Scaling).\n- تحويل حركة المرور لاحتياطي عند فشل الأساسي (Failover).\n- تنظيف قواعد البيانات وOptimization تلقائياً في نوافذ منخفضة الحركة.\n\n---\n\n## التقارير الدورية (Periodic Reports)\n\n### التقرير الأسبوعي (Weekly Report)\n\nيُسلَّم كل يوم اثنين ويتضمّن:\n\n1. ملخص الأسبوع (Executive Summary).\n2. نسبة الإتاحة الأسبوعية.\n3. الحوادث المُسجّلة والمُغلَقة.\n4. مقاييس الأداء الأسبوعية.\n5. الإجراءات الاستباقية المُتّخذة.\n6. التحديثات الأمنية المُطبَّقة.\n7. ساعات التطوير المُستهلَكة.\n8. القضايا المفتوحة والمخاطر.\n\n### التقرير الشهري الشامل (Monthly Comprehensive Report)\n\nيُسلَّم في الأسبوع الأول من كل شهر ويتضمّن:\n\n1. **ملخّص تنفيذي** — للقيادة العليا، يركّز على Business Impact.\n2. **التزام SLA** — التزام بكل مقياس + استحقاقات Service Credits (إن وُجدت).\n3. **سجل الحوادث الكامل** — تحليل + سبب جذري + خطة منع التكرار.\n4. **مقاييس الأداء (KPIs)** — رسوم بيانية تفصيلية.\n5. **مقاييس الأعمال** — معدل الحجوزات، التحويل، نجاح الدفع.\n6. **استخدام الموارد** — رسوم بيانية مع توقّعات.\n7. **التحديثات الأمنية والأمان** — قائمة كاملة + أي تنبيهات.\n8. **ساعات التطوير** — تفصيل دقيق للـ 12 ساعة.\n9. **التغييرات على المنصة (Changelog)** — كامل ومُفصَّل.\n10. **التوصيات الاستراتيجية** — للشهر القادم وللربع.\n11. **حالة النسخ الاحتياطي وDR** — نتائج اختبارات الاستعادة.\n12. **سجلات الوصول والتدقيق** — مراجعة شهرية.\n\n### اجتماع المراجعة التنفيذي الشهري (Monthly Executive Review)\n\n- يُعقد في الأسبوع الثاني من كل شهر.\n- مدته: ساعتان.\n- يحضره من جانب مقدم الخدمة: مدير الحساب المخصّص + مدير الهندسة + قائد فريق المراقبة + (عند الحاجة) المدير التنفيذي للعمليات.\n- يحضره من جانب العميل: المدير التنفيذي / الفني / المالي.\n- جدول الأعمال:\n  - مراجعة أداء الشهر.\n  - الالتزام بـ SLA.\n  - الخطة للشهر القادم.\n  - مناقشة المبادرات الاستراتيجية.\n  - أي قضايا تتطلب اتخاذ قرارات.\n- يُسلَّم محضر اجتماع موقّع خلال 24 ساعة.\n\n### المراجعة التقنية الربع سنوية (Quarterly Technical Review)\n\n- مراجعة شاملة كل 3 أشهر، مدتها نصف يوم.\n- مراجعة هندسة النظام (Architecture Review).\n- مراجعة الأمان (Security Review).\n- خطة السعة (Capacity Planning).\n- تحديثات تقنية كبرى متوقّعة.\n\n### المراجعة الاستراتيجية السنوية (Annual Strategic Review)\n\n- جلسة كاملة (يوم كامل) في نهاية كل سنة عقد.\n- تقييم الأداء السنوي.\n- مراجعة الأهداف.\n- خطة تقنية للسنة القادمة.\n- مقترحات تحديث العقد.\n\n---\n\n## إدارة الحوادث (Incident Management)\n\n### مراحل دورة حياة الحادثة\n\n1. **الاكتشاف (Detection):** نظام مراقبة استباقي أو إبلاغ العميل.\n2. **التسجيل الفوري (Immediate Logging):** فتح تذكرة + توليد رقم تتبّع.\n3. **التصنيف السريع (Rapid Triage):** خلال 5 دقائق للـ P1.\n4. **التأكيد (Acknowledgment):** ضمن مهلة SLA الصارمة.\n5. **War Room (لـ P1 فقط):** تشكيل غرفة طوارئ افتراضية فوراً.\n6. **التحقيق المتوازي (Parallel Investigation):** عدة مهندسين بالتوازي.\n7. **الحلّ المؤقت (Workaround):** أولوية إعادة الخدمة.\n8. **الحلّ الجذري (Permanent Fix):** الإصلاح النهائي.\n9. **التحقق (Verification):** اختبار الحل + موافقة العميل.\n10. **الإغلاق (Closure):** توثيق كامل.\n11. **تقرير ما بعد الحادثة (Post-Mortem):** خلال 48 ساعة لـ P1، 5 أيام لـ P2.\n12. **اجتماع Post-Mortem:** للحوادث P1 — اجتماع مشترك مع العميل لاستعراض السبب الجذري والخطط.\n\n### مصفوفة التصعيد المؤسسية (Executive Escalation Matrix)\n\n| المستوى | الجهة | إذا تجاوز الزمن |\n|---|---|---|\n| L1 | فني الدعم | الزمن المُحدّد بالـ SLA |\n| L2 | قائد فريق الدعم | بعد تجاوز 30% من زمن الحل |\n| L3 | مدير الهندسة + مدير الحساب المخصّص | بعد تجاوز 60% من زمن الحل |\n| L4 | المدير التنفيذي للعمليات (COO) | بعد تجاوز 100% |\n| L5 | الرئيس التنفيذي (CEO) | للحوادث ذات الأثر الاستراتيجي |\n\n### تواصل العميل أثناء الحوادث (Communication Cadence)\n\n| المستوى | تواتر التحديث |\n|---|---|\n| P1 | كل 15 دقيقة حتى الحل + اتصال مباشر |\n| P2 | كل ساعة |\n| P3 | كل 4 ساعات |\n| P4 | يومياً |\n\n### War Room (للحوادث الحرجة)\n\n- يُفعَّل تلقائياً لأي حادثة P1.\n- قناة Slack / Teams مخصّصة + Bridge صوتي مفتوح.\n- مدير الحساب المخصّص يقود التواصل مع العميل.\n- مهندس قائد (Incident Commander) يقود التحقيق التقني.\n- مسجّل أحداث (Scribe) يوثّق التسلسل الزمني.\n\n### تحليل ما بعد الحادثة (Post-Mortem)\n\nيلتزم مقدم الخدمة بنموذج Blameless Post-Mortem يشمل:\n\n- التسلسل الزمني الكامل (Timeline).\n- السبب الجذري (Root Cause).\n- العوامل المُساهِمة (Contributing Factors).\n- الأثر على الأعمال (Business Impact).\n- إجراءات الإصلاح الفوري (Immediate Actions).\n- إجراءات الوقاية المستقبلية (Preventive Actions).\n- الدروس المُستفادة (Lessons Learned).\n\n---\n\n## النسخ الاحتياطي والاستعادة (Backup & Restore)\n\n### سياسة النسخ الاحتياطي المؤسسي\n\n| المُكوِّن | التكرار | فترة الاحتفاظ |\n|---|---|---|\n| قاعدة البيانات (مُستمر — Continuous WAL/Oplog) | لحظي | 7 أيام للـ Point-in-Time |\n| قاعدة البيانات (نسخ كاملة) | كل 6 ساعات | 30 يوماً |\n| قاعدة البيانات (يومي مؤرشف) | يومي | 90 يوماً |\n| قاعدة البيانات (شهري مؤرشف) | شهري | 3 سنوات |\n| Hot Standby DB | متزامن مباشر | جاهز للتشغيل خلال 60 ثانية |\n| الملفّات المرفوعة (Snapshots) | كل 6 ساعات | 90 يوماً |\n| إعدادات البنية التحتية (IaC) | عند كل تغيير | احتفاظ دائم في Git |\n| النسخ الجغرافية المتعدّدة (Geo-Replicas) | مستمر | 30 يوماً في كل موقع |\n\n### الاستعادة (Restore)\n\n- **عدد الاستعادات المجانية:** غير محدود (Unlimited).\n- **زمن الاستعادة المُستهدف (RTO):** **2 ساعة**.\n- **زمن فقدان البيانات الأقصى (RPO):** **15 دقيقة**.\n- **استعادة لحظة محدّدة (Point-in-Time Restore):** متاحة لآخر 7 أيام.\n- **استعادة جزئية:** مُتاحة على مستوى السجل الفردي.\n- **اختبار استعادة شهري:** يُجرى وتقرير مفصّل.\n\n### موقع التخزين والتشفير\n\n- نسخ احتياطية في 3 مواقع جغرافية على الأقل (مصر + الإمارات + أوروبا).\n- تخزين بارد للأرشيف طويل الأمد.\n- تشفير AES-256 في الراحة + TLS 1.3 أثناء النقل.\n- مفاتيح التشفير في HSM (Hardware Security Module).\n- مراجعة دورية لسياسة التشفير وتدوير المفاتيح كل 12 شهراً.\n\n### تمارين التعافي من الكوارث (DR Drills)\n\n| نوع التمرين | التكرار | الوصف |\n|---|---|---|\n| تمرين كامل (Full DR Drill) | نصف سنوي | محاكاة فشل كامل + استعادة كاملة |\n| تمرين جزئي (Partial Drill) | ربع سنوي | استعادة مكوّن واحد |\n| تمرين Failover للقاعدة | شهري | تحويل لـ Standby |\n| تمرين Communication | ربع سنوي | تجربة قنوات الاتصال أثناء الأزمات |\n\nكل تمرين يُسلَّم بتقرير يشمل: الزمن الفعلي، المشكلات المُكتشَفة، خطة التحسين.\n\n---\n\n## التسعير وجدول الدفع (Pricing & Payment Schedule)\n\n### القيمة الإجمالية\n\n| البند | القيمة | الوحدة |\n|---|---|---|\n| الاشتراك الشهري | 30,000 | جنيه مصري / شهرياً |\n| الاشتراك السنوي (12 شهراً) | 360,000 | جنيه مصري / سنوياً |\n| خصم الدفع السنوي المُقدَّم | 8% (28,800 جنيه) | يُخصم من الإجمالي |\n| القيمة الفعلية السنوية بعد الخصم | 331,200 | جنيه مصري |\n| خصم الدفع السنوي + التزام لمدة سنتين | 12% | يُخصم من الإجمالي |\n| الضرائب | حسب القانون | تُضاف للفاتورة |\n\n### الخدمات الإضافية\n\n| الخدمة | السعر |\n|---|---|\n| ساعات تطوير إضافية فوق 12 ساعة | 800 جنيه / ساعة (سعر تفضيلي) |\n| تكامل جديد متوسط الحجم | 25,000 جنيه (شامل) |\n| تكامل جديد كبير | يُسعَّر بـ SOW منفصل |\n| اختبار اختراق شامل سنوي | مُضمَّن في الباقة |\n| تدقيق امتثال ISO 27001 / PCI-DSS | 50,000 جنيه (سنوي) |\n| تدريب موسّع مخصّص | 4,000 جنيه / جلسة |\n| استشارات هندسية إضافية (CTO Advisory) | 1,500 جنيه / ساعة |\n| تواجد ميداني إضافي (On-site) | 3,000 جنيه / يوم |\n\n### جدول الدفع\n\n- **الدورة:** شهرياً، ربع سنوياً، أو سنوياً (مع خصومات تصاعدية).\n- **تاريخ الإصدار:** اليوم الأول من كل شهر / ربع / سنة.\n- **مهلة السداد:** خلال 30 يوماً من تاريخ الفاتورة (شروط ميسّرة للحساب المؤسسي).\n- **طريقة الدفع:** تحويل بنكي.\n- **التأخر في السداد:** فائدة تأخير 0.5% شهرياً، مع تشاور مسبق قبل أي تعليق للخدمة. لا يُعلَّق الدعم الطارئ لـ P1 حتى في حال التأخر.\n- **مراجعة فوترة:** يحق للعميل طلب مراجعة فوترة ربع سنوية مع مدير الحساب.\n\n### بدل الإقامة والسفر\n\n- تكاليف السفر داخل القاهرة الكبرى مُضمَّنة.\n- السفر خارج القاهرة الكبرى يُسعَّر بالتكلفة الفعلية + مصاريف إدارية 15%.\n\n---\n\n## شروط التجديد (Renewal Terms)\n\n- التجديد التلقائي لمدة سنة إضافية ما لم يُخطر أحد الطرفين الآخر كتابياً قبل **120 يوماً** (مهلة طويلة بسبب طبيعة الحساب المؤسسي).\n- تعديل التسعير عند التجديد بحد أقصى **معدل التضخم الرسمي + 3%** (سقف منخفض كميزة للحساب المؤسسي).\n- مراجعة تجديد رسمية تُعقد قبل التجديد بـ 90 يوماً.\n- يحق للعميل التراجع إلى Professional عند التجديد فقط، مع مهلة انتقال 60 يوماً.\n- مكافأة الولاء عند التجديد للسنة الثالثة على التوالي: شهر مجاني + 24 ساعة تطوير إضافية للسنة.\n- بند Right of First Refusal: في حال طرح أي مزايا جديدة في الباقة المؤسسية مستقبلاً، يحصل العميل عليها تلقائياً دون رسوم إضافية للسنة الأولى.\n\n---\n\n## إنهاء العقد (Termination)\n\n### الإنهاء العادي\n\n- إخطار كتابي مُسبق مدته **180 يوماً** (مهلة طويلة بسبب تعقّد التسليم).\n- خطة تسليم تفصيلية يُتفق عليها قبل الإنهاء.\n- تسديد جميع المستحقات حتى تاريخ الإنهاء الفعلي.\n\n### الإنهاء للسبب\n\n- إخلال جوهري لم يُصحَّح خلال **60 يوماً** من الإخطار (مهلة أطول من الباقات الأخرى).\n- إفلاس أو تصفية إجبارية.\n- خرق جسيم للسرية أو حماية البيانات.\n- ثلاث حالات إخلال جسيمة بـ SLA خلال 6 أشهر.\n- في حال إنهاء العميل للسبب، يُرَدّ للعميل قيمة جميع المبالغ المدفوعة مُسبقاً عن الفترة غير المُستخدَمة + 10% تعويض.\n\n### الإنهاء بسبب SLA\n\n- يحق للعميل إنهاء العقد فوراً وبدون عقوبات إذا انخفضت نسبة الإتاحة إلى أقل من 98% لمدة شهرين متتاليين.\n\n### الالتزامات عند الإنهاء (Comprehensive Handover)\n\n- **خطة تسليم رسمية** يُتفق عليها خلال 30 يوماً من إعلان الإنهاء.\n- **مرحلة التسليم:** 90 يوماً للنقل الكامل للمعرفة.\n- **جلسات نقل المعرفة:** حتى 40 ساعة مُضمَّنة في فترة التسليم.\n- **التوثيق الكامل:** Runbooks، Architecture Diagrams، Credentials، Logs.\n- **تسليم البيانات:** نسخة كاملة بصيغة قياسية خلال 30 يوماً.\n- **حذف البيانات من أنظمة مقدم الخدمة:** خلال 180 يوماً (مع إصدار شهادة حذف رسمية).\n- **استمرار خدمات الطوارئ:** حتى 60 يوماً بعد التسليم الفعلي (Best Effort) بدون رسوم إضافية.\n\n---\n\n## السرية وحماية البيانات (Confidentiality & Data Protection)\n\n### السرية المُعزَّزة\n\n- اتفاقية NDA تفصيلية كملحق.\n- التزام السرية لمدة **7 سنوات** بعد انتهاء العقد (أطول من الباقات الأخرى).\n- جميع موظفي مقدم الخدمة المُخصَّصين للحساب يوقّعون NDA شخصي.\n- مراجعة تأهيل أمني (Security Clearance) للفريق المخصّص.\n\n### حماية البيانات (Comprehensive)\n\n- بيانات العميل وعملائه ملك حصري للعميل بالكامل.\n- الامتثال الكامل لقانون حماية البيانات الشخصية المصري (151/2020).\n- الامتثال الكامل لـ PCI-DSS Level 1 (للحجم المُتوقَّع من المعاملات).\n- الامتثال لمبادئ GDPR لحماية بيانات العملاء الأوروبيين.\n- خصوصية البيانات حسب التصميم (Privacy by Design).\n- تشفير شامل End-to-End لكل البيانات الحسّاسة.\n- عزل تام بين بيانات الإنتاج والبيئات الأخرى.\n- تخفي بيانات الإنتاج (Data Masking) في بيئات التطوير والاختبار.\n\n### إجراءات الأمان المؤسسية\n\n- تدقيق سنوي شامل مُستقل (Third-Party Audit) — تكلفته مُضمَّنة.\n- مصادقة متعددة العوامل (MFA) إلزامية + Hardware Tokens للوصول المميّز.\n- شبكة VPN مخصّصة + Zero Trust Architecture للوصول للبيئة الإنتاجية.\n- تدوير بيانات الاعتماد كل 60 يوماً.\n- إدارة الأسرار (Secrets Management) باستخدام Vault مؤسسي.\n- مراقبة سلوك المستخدمين (UEBA — User Entity Behavior Analytics).\n- فحص أمني تلقائي للكود قبل أي نشر (SAST + DAST + SCA).\n\n### الاستجابة لتسريب البيانات (Breach Response)\n\n- خطة استجابة لتسريب البيانات (Incident Response Plan) محدّثة سنوياً.\n- إخطار العميل خلال **4 ساعات** من اكتشاف أي اشتباه (وليس فقط تأكيد).\n- تقرير أولي خلال 24 ساعة.\n- تقرير سبب جذري نهائي خلال 7 أيام.\n- التزام تحمّل التكاليف القانونية والتشغيلية الناتجة عن إهمال جسيم من مقدم الخدمة.\n\n### الامتثال التنظيمي\n\n- مراجعة الامتثال للقوانين المحلية ربع سنوياً.\n- تحديث السياسات بناءً على أي تغييرات تنظيمية.\n- دعم العميل في أي تدقيق خارجي أو طلبات تنظيمية.\n\n---\n\n## المسؤولية والضمانات (Liability & Warranties)\n\n### الضمانات الشاملة\n\n- تقديم الخدمات بأعلى مستوى مهني.\n- توافر كوادر مُعتمَدة (CISSP, AWS Certified, MongoDB Certified, إلخ).\n- اتباع أفضل الممارسات الصناعية وأطر العمل المعترف بها.\n- ضمان عدم استخدام أي مكوّن مفتوح المصدر دون التحقق من تراخيصه.\n- ضمان عدم تضارب المصالح مع منافسي العميل المباشرين دون إخطار مسبق.\n- ضمان عدم تعيين أي موظف من العميل لمدة سنة بعد انتهاء العقد (وبالعكس).\n\n### حدود المسؤولية المُعزَّزة\n\n- لا تتجاوز المسؤولية الإجمالية لمقدم الخدمة **ضعف القيمة السنوية الإجمالية للعقد** (720,000 جنيه).\n- في حالات الإهمال الجسيم أو سوء النية أو الاحتيال، لا تُطبَّق حدود المسؤولية.\n- في حالات الإخلال بحماية البيانات بسبب إهمال جسيم، تُرفع المسؤولية إلى 4 أضعاف القيمة السنوية.\n\n### القوة القاهرة (Force Majeure)\n\n- الكوارث الطبيعية، الحرب، الإرهاب، الإضرابات.\n- انقطاع البنية التحتية الوطنية المُمتد.\n- قرارات حكومية تمنع التنفيذ.\n- جوائح صحية مُعلَنة.\n- في حال استمرار القوة القاهرة لأكثر من 90 يوماً، يحق لأي طرف إنهاء العقد دون مساءلة، مع تسوية مالية تناسبية.\n\n### التأمين\n\n- يحتفظ مقدم الخدمة بتأمين مسؤولية مهنية لا يقل عن **2,000,000 جنيه مصري**.\n- تأمين Cyber Liability لا يقل عن 1,000,000 جنيه.\n- يُقدَّم إثبات التأمين سنوياً مع شهادة التجديد.\n\n### حقوق الملكية الفكرية (IP Rights)\n\n- جميع الكود والوثائق التي يُنشئها مقدم الخدمة ضمن العقد ملك للعميل (Work-for-Hire).\n- تُستثنى الأدوات والمكتبات العامة لمقدم الخدمة (Pre-existing IP).\n- يحق للعميل الحصول على الكود المصدري الكامل + الوثائق في أي وقت.\n\n---\n\n## التواصل وجهات الاتصال (Communication & Contacts)\n\n### جهات الاتصال المخصّصة لدى مقدم الخدمة\n\n| الدور | الاسم | البريد الإلكتروني | الهاتف / واتساب |\n|---|---|---|---|\n| **مدير الحساب المخصّص (Dedicated AM)** | يُحدَّد عند التوقيع | jawla-am@devya.dev | +20 1XX XXX XXXX |\n| **الخط الساخن للطوارئ (P1 Hotline)** | فريق On-Call | jawla-p1@devya.dev | +20 1XX XXX XXXX |\n| **فريق الدعم المؤسسي** | فريق نوبات 24/7 | jawla-support@devya.dev | +20 1XX XXX XXXX |\n| **مدير الهندسة (Engineering Manager)** | يُحدَّد عند التوقيع | engineering@devya.dev | — |\n| **رئيس قسم الأمان (Head of Security)** | يُحدَّد عند التوقيع | security@devya.dev | — |\n| **المدير التنفيذي للعمليات (COO)** | يُحدَّد عند التوقيع | coo@devya.dev | — |\n| **الفوترة (Billing)** | قسم المالية | billing@devya.dev | — |\n| **المستشار الأمني (CISO Advisory)** | يُحدَّد عند التوقيع | ciso@devya.dev | — |\n\n### جهات الاتصال لدى العميل\n\n| الدور | الاسم | البريد الإلكتروني | الهاتف |\n|---|---|---|---|\n| **الراعي التنفيذي (Executive Sponsor)** | _____________ | _____________ | _____________ |\n| **المسؤول الرئيسي (Primary Contact)** | _____________ | _____________ | _____________ |\n| **المسؤول الفني (Technical Contact)** | _____________ | _____________ | _____________ |\n| **المسؤول الفني البديل (Backup Tech)** | _____________ | _____________ | _____________ |\n| **المسؤول المالي (Billing Contact)** | _____________ | _____________ | _____________ |\n| **المسؤول الأمني (Security Contact)** | _____________ | _____________ | _____________ |\n| **مسؤول الامتثال (Compliance Contact)** | _____________ | _____________ | _____________ |\n\n### قنوات التواصل الرسمية\n\n- **التواصل اليومي:** قناة Slack/Teams مشتركة مخصّصة.\n- **الطوارئ:** الخط الساخن المخصّص + جميع القنوات الأخرى بالتوازي.\n- **الاجتماعات الرسمية:** Microsoft Teams / Zoom + توثيق بمحضر اجتماع.\n- **التعديلات على العقد:** كتابية وموقّعة من الطرفين فقط.\n- **القرارات الاستراتيجية:** عبر الاجتماعات التنفيذية مع توثيق رسمي.\n\n### بروتوكول الاتصال\n\n- لكل مستوى خطورة قناة وفريق محدّدان.\n- مدير الحساب المخصّص هو نقطة الاتصال الرئيسية لكل ما هو غير طارئ.\n- الخط الساخن مُخصّص حصراً لحالات الطوارئ وليس للاستفسارات العامة.\n\n---\n\n## التوقيعات (Signatures)\n\nأُبرم هذا العقد من ثلاث نسخ أصلية: نسخة لكل طرف، ونسخة تُحفظ مع مستشار قانوني مستقل، ويُعدّ نافذاً اعتباراً من تاريخ التوقيع.\n\n---\n\n### الطرف الأول — مقدم الخدمة (First Party — Service Provider)\n\n**شركة ديفيا للحلول التقنية (Devya Solutions Ltd.)**\n\n| البند | التفاصيل |\n|---|---|\n| الاسم (Name) | _______________________________ |\n| الصفة (Title) | _______________________________ |\n| رقم البطاقة (ID No.) | _______________________________ |\n| التوقيع (Signature) | _______________________________ |\n| التاريخ (Date) | _____ / _____ / 2026 |\n| الختم الرسمي (Official Stamp) | _______________________________ |\n\n**معتمد من المدير التنفيذي (CEO Approved):**\n\n| البند | التفاصيل |\n|---|---|\n| الاسم | _______________________________ |\n| التوقيع | _______________________________ |\n| التاريخ | _____ / _____ / 2026 |\n\n---\n\n### الطرف الثاني — العميل (Second Party — Client)\n\n**شركة جولة للسياحة (Jawla Tours OTA)**\n\n| البند | التفاصيل |\n|---|---|\n| الاسم (Name) | _______________________________ |\n| الصفة (Title) | _______________________________ |\n| رقم البطاقة (ID No.) | _______________________________ |\n| التوقيع (Signature) | _______________________________ |\n| التاريخ (Date) | _____ / _____ / 2026 |\n| الختم الرسمي (Official Stamp) | _______________________________ |\n\n**معتمد من الراعي التنفيذي (Executive Sponsor Approved):**\n\n| البند | التفاصيل |\n|---|---|\n| الاسم | _______________________________ |\n| التوقيع | _______________________________ |\n| التاريخ | _____ / _____ / 2026 |\n\n---\n"}</script>
<script>
(function () {
  const DOCS = JSON.parse(document.getElementById('docs-data').textContent);

  const CATEGORIES = [
    { id: 'proposals',  label: 'Client Proposals',     sub: 'عروض العملاء',           icon: '📜', rtl: true },
    { id: 'prds',       label: 'Product Requirements', sub: 'متطلبات المنتج (PRD)',    icon: '🎯', rtl: true },
    { id: 'srs',        label: 'Software Specs',       sub: 'مواصفات النظام (SRS)',    icon: '⚙️', rtl: true },
    { id: 'maintenance',label: 'Maintenance Contracts',sub: 'عقود الصيانة',           icon: '🛡️', rtl: true },
  ];
  const TIERS = [
    { id: 'basic',        label: 'Basic',        short: 'B',   badge: 'badge-basic', price: '600,000 EGP (~$12,000)',   timeline: '3 months', maint: '10,000 EGP/mo (~$200)' },
    { id: 'professional', label: 'Professional', short: 'PRO', badge: 'badge-pro',   price: '850,000 EGP (~$17,000)',   timeline: '4 months', maint: '20,000 EGP/mo (~$400)' },
    { id: 'enterprise',   label: 'Enterprise',   short: 'ENT', badge: 'badge-ent',   price: '1,400,000 EGP (~$28,000)', timeline: '6 months', maint: '30,000 EGP/mo (~$600)' },
  ];
  const KEY = (c, t) => c + '-' + t;

  marked.setOptions({ gfm: true, breaks: false, headerIds: true });

  const $ = (sel, root) => (root || document).querySelector(sel);
  const el = (tag, attrs, children) => {
    const e = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') e.className = v;
      else if (k === 'html') e.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    }
    if (children) for (const c of [].concat(children)) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  };

  let active = null;

  function render() {
    const root = $('#app');
    root.innerHTML = '';
    const layout = el('div', { class: 'layout' });
    layout.appendChild(buildSidebar());
    layout.appendChild(buildMain());
    root.appendChild(layout);
  }

  function buildSidebar() {
    const aside = el('aside', { class: 'sidebar no-print' });
    const logo = el('div', { class: 'brand-logo' });
    logo.appendChild(el('img', { src: 'assets/jawla-logo-white.svg', alt: 'Jawla Tours' }));
    aside.appendChild(el('div', { class: 'brand' }, [
      logo,
      el('div', null, [
        el('div', { style: 'font-weight:700;color:#fff;letter-spacing:-0.01em' }, 'Jawla Tours'),
        el('div', { style: 'font-size:12px;color:var(--muted)' }, 'OTA Project · Doc Hub'),
      ]),
    ]));
    for (const cat of CATEGORIES) {
      const section = el('div', { class: 'nav-section' });
      section.appendChild(el('div', { class: 'nav-label' }, [
        el('span', null, cat.icon),
        el('span', null, cat.label),
      ]));
      section.appendChild(el('div', { class: 'nav-sub' }, cat.sub));
      for (const tier of TIERS) {
        const k = KEY(cat.id, tier.id);
        const btn = el('button', {
          class: 'nav-item' + (active === k ? ' active' : ''),
          onclick: () => { active = k; window.location.hash = k; render(); },
        }, [
          el('span', { style: 'font-weight:500' }, tier.label),
          el('span', { class: 'badge ' + tier.badge }, tier.short),
        ]);
        section.appendChild(btn);
      }
      aside.appendChild(section);
    }
    aside.appendChild(el('div', { class: 'footer-card' }, [
      el('div', { class: 'footer-card-title' }, '12 documents'),
      el('div', null, '3 proposals · 3 PRDs · 3 SRS · 3 contracts'),
    ]));
    return aside;
  }

  function buildMain() {
    const main = el('main', { class: 'main' });
    if (!active) {
      main.appendChild(buildHero());
      return main;
    }
    const [catId, ...rest] = active.split('-');
    const tierId = rest.join('-');
    const cat = CATEGORIES.find(c => c.id === catId);
    const tier = TIERS.find(t => t.id === tierId);
    if (!cat || !tier) { main.appendChild(buildHero()); return main; }
    main.appendChild(buildTopbar(cat, tier));
    const wrap = el('div', { class: 'doc-wrap' });
    const md = DOCS[active] || '# Document not found';
    const article = el('article', {
      class: 'doc-prose' + (cat.rtl ? ' rtl' : ''),
      html: DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['target'] }),
    });
    wrap.appendChild(article);
    wrap.appendChild(el('div', { class: 'doc-footer no-print' }, [
      el('span', null, 'Jawla Tours · OTA Documentation · ' + new Date().getFullYear()),
      el('button', { class: 'btn', onclick: () => { active = null; window.location.hash = ''; render(); } }, '← Back to overview'),
    ]));
    main.appendChild(wrap);
    return main;
  }

  function buildTopbar(cat, tier) {
    const bar = el('div', { class: 'topbar no-print' });
    bar.appendChild(el('div', null, [
      el('div', { class: 'topbar-label' }, cat.label),
      el('div', { class: 'topbar-title' }, [
        document.createTextNode(tier.label + ' Package '),
        el('span', { class: 'badge ' + tier.badge }, tier.price),
      ]),
    ]));
    bar.appendChild(el('div', { style: 'display:flex;align-items:center' }, [
      el('div', { class: 'topbar-meta' }, [
        el('span', null, '⏱ ' + tier.timeline),
        el('span', null, '🛠 ' + tier.maint),
      ]),
      el('button', { class: 'btn', onclick: () => window.print() }, '🖨 Print / PDF'),
    ]));
    return bar;
  }

  function buildHero() {
    const hero = el('div', { class: 'hero rtl' });
    hero.appendChild(el('div', { class: 'hero-eyebrow' }, 'مركز توثيق المشروع'));
    hero.appendChild(el('h1', { class: 'hero-title' }, 'جولة تورز · منصة حجوزات سفر متكاملة'));
    hero.appendChild(el('p', { class: 'hero-sub' }, 'حزمة كاملة من الوثائق التجارية والهندسية لمشروع منصة الحجز الإلكتروني، مقسّمة على ثلاثة باقات. تتضمن العروض المقدّمة للعميل بالعربية، ومستندات متطلبات المنتج (PRD)، ومواصفات النظام (SRS)، وعقود الصيانة.'));

    const ota = el('div', { class: 'ota-block' });
    ota.appendChild(el('h3', null, 'ما هي منصة OTA؟'));
    ota.appendChild(el('p', null, [
      el('strong', null, 'OTA '),
      document.createTextNode('اختصار لـ '),
      el('strong', null, 'Online Travel Agency'),
      document.createTextNode(' أي '),
      el('strong', null, '«وكالة سفر إلكترونية كاملة»'),
      document.createTextNode('. هي منصّة رقمية تتيح للعميل البحث والحجز والدفع لخدمات السفر — رحلات الطيران، الفنادق، الباقات السياحية — مباشرةً عبر موقع الشركة، دون الحاجة إلى تحويل العميل إلى مواقع خارجية أو الاتصال بموظف لإتمام العملية.'),
    ]));
    ota.appendChild(el('p', null, 'الهدف من هذا المشروع تحويل موقع جولة تورز الحالي إلى منصة OTA متكاملة، يصبح فيها الموقع قناة بيع مستقلة تعمل على مدار الساعة وتولّد الحجوزات تلقائياً.'));

    const feats = el('div', { class: 'ota-features' });
    const F = [
      ['✈️', 'بحث الرحلات', 'عرض رحلات الطيران من جميع شركات الطيران عبر Amadeus مع الأسعار اللحظية'],
      ['🏨', 'حجز الفنادق', 'بحث في آلاف الفنادق حول العالم مع التوفر الفوري والأسعار'],
      ['💳', 'دفع داخلي', 'إتمام الدفع داخل الموقع عبر Stripe و Paymob و Adyen بأمان كامل'],
      ['📧', 'تأكيدات تلقائية', 'إرسال تذاكر السفر وقسائم الحجز بالبريد فور إتمام الدفع'],
      ['👤', 'حساب العميل', 'لوحة تحكم شخصية لإدارة الحجوزات والاطلاع على سجل السفر'],
      ['🌐', 'عربي وإنجليزي', 'دعم كامل للغتين مع تجربة استخدام متجاوبة على جميع الأجهزة'],
    ];
    for (const [i, t, d] of F) {
      feats.appendChild(el('div', { class: 'ota-feat' }, [
        el('div', { class: 'ota-feat-icon' }, i),
        el('div', { class: 'ota-feat-title' }, t),
        el('div', { class: 'ota-feat-desc' }, d),
      ]));
    }
    ota.appendChild(feats);
    hero.appendChild(ota);

    hero.appendChild(el('div', { class: 'hero-eyebrow', style: 'margin-bottom:16px' }, 'الباقات المقترحة'));
    const grid = el('div', { class: 'pkg-grid' });
    const TIER_AR = { basic: 'الأساسية', professional: 'الاحترافية', enterprise: 'المؤسسية' };
    const META_AR = { basic: '3 شهور · صيانة 10,000 ج.م/شهر (~$200)', professional: '4 شهور · صيانة 20,000 ج.م/شهر (~$400)', enterprise: '6 شهور · صيانة 30,000 ج.م/شهر (~$600)' };
    const PRICE_AR = { basic: '600,000 ج.م (~$12,000)', professional: '850,000 ج.م (~$17,000)', enterprise: '1,400,000 ج.م (~$28,000)' };
    const CAT_AR = { proposals: 'العرض', prds: 'PRD', srs: 'SRS', maintenance: 'الصيانة' };
    for (const tier of TIERS) {
      const card = el('div', { class: 'pkg-card' });
      card.appendChild(el('div', { class: 'pkg-card-row' }, [
        el('div', { class: 'pkg-card-label' }, 'الباقة'),
        el('span', { class: 'badge ' + tier.badge }, TIER_AR[tier.id]),
      ]));
      card.appendChild(el('div', { class: 'pkg-price' }, PRICE_AR[tier.id]));
      card.appendChild(el('div', { class: 'pkg-meta' }, META_AR[tier.id]));
      const tags = el('div', { class: 'pkg-tags' });
      for (const c of CATEGORIES) {
        tags.appendChild(el('button', {
          class: 'pkg-tag',
          onclick: () => { active = KEY(c.id, tier.id); window.location.hash = active; render(); },
        }, c.icon + ' ' + CAT_AR[c.id]));
      }
      card.appendChild(tags);
      grid.appendChild(card);
    }
    hero.appendChild(grid);

    const info = el('div', { class: 'info-grid' });
    const pay = el('div', { class: 'info-card' });
    pay.appendChild(el('div', { class: 'info-title' }, 'جدول الدفع'));
    const payGrid = el('div', { class: 'pay-grid' });
    for (const [pct, lbl] of [['30%','عند التوقيع'],['25%','المرحلة 1'],['25%','المرحلة 2'],['20%','التسليم']]) {
      payGrid.appendChild(el('div', { class: 'pay-num' }, [
        el('div', { class: 'pay-pct' }, pct),
        el('div', { class: 'pay-lbl' }, lbl),
      ]));
    }
    pay.appendChild(payGrid);
    info.appendChild(pay);

    const stack = el('div', { class: 'info-card' });
    stack.appendChild(el('div', { class: 'info-title' }, 'البنية التقنية'));
    const stackTags = el('div', { class: 'stack-tags' });
    for (const s of ['Next.js','NestJS','PostgreSQL','Redis','BullMQ','Amadeus','Stripe','Paymob','Adyen','WhatsApp']) {
      stackTags.appendChild(el('span', { class: 'stack-tag' }, s));
    }
    stack.appendChild(stackTags);
    info.appendChild(stack);
    hero.appendChild(info);

    return hero;
  }

  const hash = window.location.hash.slice(1);
  if (hash && DOCS[hash] !== undefined) active = hash;
  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    active = (h && DOCS[h] !== undefined) ? h : null;
    render();
  });

  render();
})();
</script>
</body>
</html>
