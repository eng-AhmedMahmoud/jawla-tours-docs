-048 | هل في تراخيص نقود إلكترونية / محفظة مصرية محددة مطلوبة لو الرصيد تجاوز X؟ | القانوني | M1 |\n| OQ-049 | إيه التزام إمكانية الوصول للباقة الاحترافية - WCAG 2.1 AA على كل الصفحات أو بس المسارات الأساسية؟ | المنتج + التصميم | M2 |\n| OQ-050 | تحسين بعد الإطلاق - هل في retainer تحسين مستمر مخطط، أو ده تسليم فقط؟ | العقد | M6 |\n\n---\n\n## الملحق A: إضافات المعمارية (مرجع)\n\n| الطبقة | الإضافة مقابل Basic |\n|-------|-------------------|\n| Event Bus | Redis Streams (افتراضي) أو RabbitMQ |\n| Data Warehouse | PostgreSQL Analytical Replica (افتراضي) أو ClickHouse |\n| WhatsApp | Meta Cloud API (افتراضي) عن طريق webhook gateway |\n| Loyalty Service | وحدة NestJS مستقلة بـ DB schema خاص (loyalty.*) و event handlers |\n| Wallet Service | وحدة دفتر مزدوج القيد (wallet.ledger، wallet.account) بحدود اتساق قوية |\n| Reporting | Metabase منشور كخدمة container ضد المستودع |\n| Feature Flags | Unleash self-hosted (افتراضي) |\n| i18n | Phrase (افتراضي) مع sync CLI في CI |\n| Translation Workflow | تعديلات التسويق في Phrase -> CI sync -> deploy |\n\n## الملحق B: إضافات المسرد\n\n| المصطلح | التعريف |\n|------|------------|\n| HHI | Herfindahl-Hirschman Index (تركز الموردين) |\n| BSP | Business Solution Provider (لـ WhatsApp) |\n| CDC | Change Data Capture (لـ ETL) |\n| RBAC | Role-Based Access Control |\n| LTV | Lifetime Value |\n| ETL | Extract Transform Load |\n| OLTP | Online Transaction Processing |\n| FX | Foreign Exchange |\n\n## الملحق C: التوقيع\n\n| الدور | الاسم | التوقيع | التاريخ |\n|------|------|-----------|------|\n| الراعي من جهة العمل | _________________ | _________________ | _________ |\n| مسؤول المنتج | أحمد محمود | _________________ | 2026-06-29 |\n| قائد الهندسة | _________________ | _________________ | _________ |\n| معتمد المالية | _________________ | _________________ | _________ |\n| مراجع قانوني | _________________ | _________________ | _________ |\n| مسؤول التسويق | _________________ | _________________ | _________ |\n","prds-enterprise":"## 🎯 ملخص لمجلس الإدارة\n\nنبني منصة سفر متكاملة باسم \"جولة\" متخصصة في حجوزات الطيران، تقدّم تجربة موحّدة عبر موقع إلكتروني متجاوب يخدم الأفراد على كل الأجهزة (كمبيوتر وموبايل وتابلت). باقة Enterprise هي الباقة الكاملة التي تفتح مصادر دخل متعددة عبر تنويع المنتجات (الخدمات الإضافية للطيران، الأنشطة، النقل، تأجير السيارات) وخدمة قطاعات أكبر (حسابات الشركات، حجوزات المجموعات، عمليات الفروع المتعددة). هذا الاستثمار يحوّل \"جولة\" من موقع حجوزات إلى شركة تكنولوجيا سفر قادرة على المنافسة الإقليمية مع تكامل كامل مع منظومة Amadeus المؤسسية للطيران (Master Pricer، PNR/Ticketing الكامل، NDC، الخدمات الإضافية، Tours & Activities، Transfers، Cars)، وتقدّم لوحات تحكم مخصصة لكل عميل (Custom User Dashboards) كقدرة مميِّزة لهذه الباقة دون غيرها.\n\n### ماذا يحصل عليه العميل في هذه الباقة؟\n\n- موقع إلكتروني متجاوب كامل لبيع تذاكر الطيران للأفراد مباشرة، محسّن للعمل على الكمبيوتر والموبايل والتابلت من نفس الكود\n- تكامل كامل مع منظومة Amadeus المؤسسية للطيران: Master Pricer للبحث المتقدم، PNR و Ticketing الكامل، NDC للأسعار المباشرة من شركات الطيران، الخدمات الإضافية (Ancillaries) مثل الأمتعة واختيار المقاعد، Tours & Activities للأنشطة، Transfers للنقل، و Cars لتأجير السيارات\n- تسعير ديناميكي ذكي يرفع ويخفض الأسعار تلقائياً حسب الطلب والمنافسة لزيادة الأرباح\n- خدمة حجوزات المجموعات والشركات لتذاكر الطيران (رحلات عمل، مؤتمرات، رحلات عائلية كبيرة)\n- حسابات شركات بفرض سياسات السفر وفواتير شهرية موحدة\n- لوحة تحكم لإدارة فروع متعددة في مدن أو دول مختلفة من مكان واحد\n- نظام كشف الاحتيال في الدفع لحماية الشركة من المعاملات المزيفة\n- لوحات تقارير مالية وتشغيلية لحظية لمتابعة الأداء واتخاذ القرار\n- لوحات تحكم مخصصة لكل عميل (Custom User Dashboards) قابلة للتخصيص بالـ widgets — قدرة حصرية في باقة Enterprise\n- دعم كامل باللغتين العربية والإنجليزية وبعملات متعددة عبر بوابة PayTabs الإقليمية\n\n### الأرقام الرئيسية\n\n| البند | القيمة |\n|---|---|\n| السعر الإجمالي | 20,000 دولار أمريكي |\n| المعادل بالجنيه المصري | تقريباً 1,000,000 جنيه مصري |\n| مدة التنفيذ | 6 أشهر |\n| الصيانة الشهرية | 20,000 جنيه مصري شهرياً (تقريباً 400 دولار) |\n| ساعات استشارة Amadeus المتضمنة | حزمة استشارات كاملة لربط منظومة Amadeus المؤسسية بالكامل (Master Pricer، PNR/Ticketing، NDC، Ancillaries، Tours & Activities، Transfers، Cars) |\n| عدد قنوات البيع | قناة واحدة (موقع ويب متجاوب كامل التجربة عبر الأجهزة) |\n| عدد الموظفين المطلوبين | فريق متكامل من المطورين ومدير منتج ومسؤول عمليات (يُحدَّد التفصيل في خطة الموارد) |\n| العائد المتوقع على الاستثمار خلال 12 شهر | استرداد قيمة الاستثمار مع تحقيق هامش ربح معقول من تنويع المنتجات والقطاعات (نموذج محافظ نظراً للنطاق المخفّض) |\n| نسبة المخاطر التقنية | منخفضة إلى متوسطة (مع خطة معالجة واضحة) |\n\n### القيمة التجارية المتوقعة\n\n- الموقع المتجاوب يخدم المسافرين الذين يحجزون من الموبايل (الغالبية العظمى من المسافرين اليوم) بدون الحاجة لتطوير تطبيقات منفصلة\n- التكامل الكامل مع منظومة Amadeus المؤسسية للطيران يفتح مصادر الإيرادات الإضافية (Ancillaries، Tours، Transfers، Cars) في معاملة واحدة، ويرفع متوسط قيمة الحجز\n- التسعير الديناميكي يرفع متوسط هامش الربح من كل عملية حجز بشكل تلقائي ومستمر\n- إدارة الفروع المتعددة تمهّد الطريق لنموذج الامتياز التجاري (Franchise) والتوسع الجغرافي السريع\n- حجوزات الشركات والمجموعات تجلب صفقات كبيرة بقيمة عالية وعملاء متكررين طويلي الأجل\n- لوحات تحكم العميل المخصصة (Custom Dashboards) ترفع معدل التفاعل والاحتفاظ مع كبار العملاء وتميّز Jawla عن المنافسين\n\n### المخاطر الرئيسية وكيف نعالجها\n\n| المخاطرة | المعالجة |\n|---|---|\n| التأخير في تنفيذ المشروع خلال 6 أشهر | تقسيم العمل إلى مراحل شهرية مع تسليم جزء قابل للاستخدام كل شهر ومتابعة أسبوعية |\n| تعقيد ربط أنظمة موردي الطيران العالمية | الاستعانة بحزمة استشارات Amadeus المتضمنة في الباقة وخبراء متخصصين في التكامل |\n| محاولات الاحتيال في الدفع الإلكتروني | نظام كشف احتيال ذكي مدمج منذ اليوم الأول مع مراجعة بشرية للمعاملات المشبوهة |\n| اعتماد المشروع على عدد محدود من الموظفين الأساسيين | توثيق كامل لكل خطوة من خطوات العمل وتدريب موظفين بدلاء لكل دور حساس |\n| تغيّر أسعار الموردين أو شروط التعاقد معهم | عقود طويلة الأجل مع أكثر من مورد بديل لضمان استمرارية الخدمة واستقرار التكاليف |\n\n### القرار المطلوب من المجلس\n\nالموافقة على اعتماد استثمار قدره 20,000 دولار أمريكي (تقريباً 1,000,000 جنيه مصري) لتنفيذ باقة Enterprise خلال 6 أشهر، بالإضافة إلى الالتزام بتوفير فريق العمل المطلوب وميزانية الصيانة الشهرية البالغة 20,000 جنيه (تقريباً 400 دولار) لضمان استمرارية التشغيل والتطوير بعد الإطلاق.\n\n---\n\n# Jawla Tours OTA - وثيقة متطلبات منتج باقة Enterprise\n\n## بيانات الوثيقة\n\n| البند | القيمة |\n|-------|-------|\n| عنوان الوثيقة | Jawla Tours OTA - وثيقة متطلبات منتج باقة Enterprise |\n| الإصدار | 1.0.0 |\n| التاريخ | 2026-06-29 |\n| الحالة | معتمدة للتطوير |\n| مالك الوثيقة | أحمد محمود (المسؤول التقني عن المنتج) |\n| الراعي من جهة العمل | فريق إدارة Jawla Tours التنفيذي + مجلس الإدارة |\n| قائد الهندسة | لم يحدد بعد - Backend Lead و Frontend Lead و Platform Lead |\n| قائد البيانات والـ BI | لم يحدد بعد - Senior Analytics Engineer |\n| قائد الأمن | لم يحدد بعد - Security Engineer (مسؤولية عرضية) |\n| قائد التصميم | لم يحدد بعد - Design Director (للويب المتجاوب ولوحات التحكم المخصصة) |\n| مستشار تكامل Amadeus | متخصص خارجي (مخصص له تقريبًا 100-120 ساعة) |\n| التصنيف | داخلي - سري، مخصص لمجلس الإدارة |\n| التوزيع | الهندسة، المنتج، QA، المالية، العمليات، نجاح العملاء، الشؤون القانونية، الإدارة التنفيذية |\n| تاريخ المراجعة التالية | 2026-09-29 |\n| يلغي ويحل محل | لا شيء (يمتد على باقتي Basic و Professional إصدار v1.0.0) |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ | الكاتب | ملخص التغيير |\n|---------|---------|---------|--------------|\n| 0.1.0 | 2026-05-25 | أ. محمود | بدء نطاق Enterprise؛ مواءمة استراتيجية مجلس الإدارة |\n| 0.3.0 | 2026-06-02 | أ. محمود | إضافة وحدة Packages وتوسعة الأنشطة وcross-sell |\n| 0.5.0 | 2026-06-10 | أ. محمود | أسلوب التسعير الديناميكي |\n| 0.7.0 | 2026-06-18 | أ. محمود | نطاق كشف الاحتيال وقدرات لوحات العميل المخصصة |\n| 0.9.0 | 2026-06-25 | أ. محمود | الانتهاء من المجموعات/الشركات والفروع المتعددة |\n| 1.0.0 | 2026-06-29 | أ. محمود | الإصدار النهائي المعتمد |\n| 1.1.0 | 2026-06-30 | أ. محمود | استبعاد بوابة وكلاء B2B ونظام White-Label بناءً على طلب العميل؛ توحيد بوابة الدفع تحت PayTabs |\n\n### العلاقة مع باقتي Basic و Professional\n\nباقة Enterprise هي مجموعة أكبر تضم كل ما في باقتي Basic و Professional. فهي تشمل كل ما في تلك الوثائق، بالإضافة إلى القدرات الإضافية المذكورة هنا. ولو ظهرت ميزة في أكثر من وثيقة، فإن تعريف Enterprise هو الذي يُعتمد.\n\n### الوثائق المرتبطة\n\n- Jawla Tours Master Statement of Work (SOW-2026-001)\n- وثيقة متطلبات منتج باقة Basic إصدار v1.0.0\n- وثيقة متطلبات منتج باقة Professional إصدار v1.0.0\n- اتفاقية Amadeus Enterprise API (المفاوضات جارية)\n- WhatsApp Business API - الانضمام إلى Meta Cloud API\n- مذكرة ترخيص هيئة السياحة المصرية |\n- تقييم مبدئي لـ PCI DSS Level 1\n\n---\n\n## الرؤية\n\nباقة Enterprise ترفع Jawla من مجرد OTA طيران مصري منافس إلى منصة بيع تذاكر طيران إقليمية. باقة Basic أثبتت إن Jawla تقدر تنفّذ معاملات حجز طيران. باقة Professional أثبتت إنها تقدر تنافس. وباقة Enterprise بتحوّل Jawla إلى عمل منصاتي: عملية متعددة المنتجات والقطاعات تخدم في نفس الوقت المستهلكين المباشرين والعملاء الشركات ومنسقي المجموعات وعمليات الفروع المتعددة، بقاعدة دفع موحدة عبر PayTabs (بوابة MENA متعددة العملات).\n\nالتحولات الاستراتيجية في هذه الباقة:\n\n1. **توسيع المنتجات حول الطيران**: خدمات إضافية للطيران (Ancillaries من Amadeus)، رحلات يومية وأنشطة عبر شركاء (Viator/GetYourGuide)، نقل ومواصلات (Transfers)، وتأجير السيارات (Cars) — كلها كـ cross-sell بجانب تذكرة الطيران لرفع متوسط قيمة الحجز.\n2. **تجربة قناة موحدة**: موقع ويب متجاوب بتجربة كاملة على كل الأجهزة (كمبيوتر، تابلت، موبايل) بدون الحاجة لتطبيقات منفصلة.\n3. **توسيع العملاء**: حجوزات المجموعات (10 مسافرين أو أكثر)، حسابات الشركات بفرض السياسات، وعمليات بفروع متعددة (المقر في القاهرة + فروع إقليمية).\n4. **النضج التشغيلي**: محرك تسعير ديناميكي، كشف احتيال لحظي (مبني على ML)، وتسوية مالية متعددة العملات.\n5. **إدارة المنصة**: تحكم في الوصول مبني على الأدوار (RBAC) عبر شخصيات معقدة، منصة API للشركاء، لوحات تحكم مخصصة لكل عميل (Custom Dashboards)، وموقف شامل من التدقيق والامتثال (PCI DSS Level 1، الاستعداد لـ SOC 2 Type 1).\n\nباقة Enterprise هي النطاق الصحيح لـ Jawla لو (أ) باقة Professional أثبتت اقتصاديات العملاء المتكررين، (ب) العلامة التجارية بنت مصداقية في السوق المصري وجاهزة تمتد لقطاعات الشركات والمجموعات والإقليم، و(ج) فريق العمليات مستعد يدير التعقيد بحجم أكبر (10-50 ضعف الحجم الحالي). ومش النطاق الصحيح لـ Jawla اللي لسه بتختبر طلب المستهلك المباشر.\n\nباقة Enterprise قصدًا هي استثمار يمتد عدة أرباع سنوية. لازم تتعامل معها كسلسلة من خطوط العمل المتكاملة عموديًا، مش كقائمة ميزات تنفذ بالتتابع. خطوط العمل تشمل: التسعير الديناميكي، الاحتيال، المجموعات/الشركات، الفروع المتعددة، ولوحات العميل المخصصة. كل خط له قائد هندسي، قائد تصميم، وبوابة قبول خاصة بيه.\n\n---\n\n## الأهداف ومقاييس النجاح\n\n### الأهداف الاستراتيجية\n\n1. **GBV السنوي للمنصة يتعدى EGP 200M خلال 6 شهور من إطلاق Enterprise** (مقارنة بـ ~EGP 75M كخط أساس Professional).\n2. **تنويع القطاعات**: على الأقل 18% من GBV من حسابات الشركات والمجموعات خلال 12 شهر.\n3. **تحول مزيج المنتجات**: على الأقل 18% من GBV من الخدمات الإضافية للطيران (Ancillaries) و cross-sell الأنشطة/النقل/السيارات (مقارنة بأقل من 1% حاليًا).\n4. **النطاق التشغيلي**: دعم 10,000 مستخدم متزامن بدون تدهور؛ 50,000 حجز/شهر بنسبة uptime أكبر من 99.9%.\n5. **موقف الامتثال**: شهادة PCI DSS Level 1، شهادة SOC 2 Type 1 قيد التنفيذ، تشغيل برنامج خصوصية مكافئ لـ GDPR.\n6. **تقليل الاحتيال**: نسبة chargeback أقل من 0.25% (الأفضل في الصناعة)؛ خسائر الاحتيال أقل من 0.15% من GBV.\n7. **تبني لوحات التحكم المخصصة**: على الأقل 40% من العملاء النشطين شهريًا يستخدمون لوحة تحكم مخصصة واحدة على الأقل في غضون 6 أشهر من إطلاق Enterprise.\n\n### مقاييس النجاح (180 يوم بعد إطلاق Enterprise)\n\n| المقياس | الهدف | خط الأساس (Professional) |\n|---------|-------|---------------------------|\n| GBV السنوي | > EGP 200M | EGP 75M |\n| حصة الشركات والمجموعات من GBV | > 18% | <1% |\n| حصة الخدمات الإضافية و cross-sell من GBV | > 18% | <1% |\n| الحجوزات المؤكدة (الذروة الشهرية) | > 50,000 | ~5,000 |\n| المستخدمون المتزامنون (الذروة) | > 10,000 | ~800 |\n| Uptime النظام | > 99.9% | 99.7% |\n| نسبة Chargeback | < 0.25% | 0.6% |\n| خسائر الاحتيال كنسبة من GBV | < 0.15% | n/a |\n| حسابات الشركات العاملة | > 30 | 0 |\n| ارتفاع الإيراد من التسعير الديناميكي | > 6% مقارنة بـ flat-markup | n/a |\n| الفروع العاملة | >= 3 | 1 |\n| حصة حجوزات المجموعات | > 8% من GBV | <0.5% |\n| نسبة العملاء المستخدمين لـ Custom Dashboard شهريًا | > 40% | n/a |\n\n---\n\n## الشخصيات (Personas)\n\nشخصيات Basic و Professional لسه فعّالة. Enterprise تضيف الشخصيات التالية اللي لازم المنصة تخدمهم كمستخدمين أساسيين.\n\n| الشخصية | الاسم | العمر | المكان | الأهداف | نقاط الألم |\n|---------|------|-----|----------|-------|-------------|\n| مدير سفر شركة | رانيا سعد | 42 | القاهرة، مصر (مقر شركة متعددة الجنسيات) | تحجز سفر الموظفين في حدود سياسة الشركة؛ فاتورة شهرية موحدة؛ إيصالات متوافقة ضريبيًا؛ تقصر الحجوزات على شركات طيران معينة ودرجات محددة؛ دعم 24/7 للطوارئ | كثرة الأدوات؛ خروقات السياسة بتعدي؛ تقارير المصاريف كابوس؛ مفيش سجل حجوزات موحد |\n| منسق حجز مجموعات | كريم عادل | 35 | القاهرة، مصر | يحجز رحلة طيران لمجموعة عائلية 30 شخص (عمرة/مؤتمرات)؛ يحتاج نفس الرحلة لكل المسافرين بنفس PNR لو ممكن؛ مرونة في الدفع لكل مسافر؛ بيانات ركاب بالجملة | الـ OTAs بتحدد بـ 9 ركاب كحد أقصى؛ أسعار شركات الطيران للمجموعات (offline) غير متاحة للمستهلكين؛ تنسيق الدفع من مصادر متعددة فوضى |\n| مدير فرع | سلمى حسام | 40 | فرع الغردقة | تدير عمليات فرع الغردقة؛ تدير وكلاء محليين؛ تتابع P&L الفرع؛ تبيع للعملاء اللي بييجوا للفرع | الـ OTAs المركزية ما بتديش رؤية P&L على مستوى الفرع؛ مش قادرة تُصدر حجوزات محلية مرتبطة بإيراد الفرع |\n| محلل احتيال (دور تشغيلي جديد) | حسن منير | 33 | المقر بالقاهرة | يرصد إشارات الاحتيال لحظيًا؛ يراجع الحجوزات عالية المخاطر؛ يضبط مجموعات القواعد؛ يحقق في chargebacks | بيتفاعل بس بعد ما الـ chargeback يحصل؛ مفيش ML scoring؛ مفيش إدارة حالات |\n| عميل عالي القيمة (Custom Dashboard) | ندى عبد العزيز | 36 | القاهرة، مصر | تحجز سفر متكرر لرحلات عمل وعائلية؛ تحتاج لوحة تحكم مخصصة بـ widgets قابلة للترتيب (الحجوزات القادمة، النفقات الشهرية، تنبيهات الأسعار للوجهات المفضلة، تتبع المسافر المتكرر) | اللوحات الجاهزة ما بتعكسش طريقتها في الإدارة؛ بتفقد رؤية مصاريف السفر؛ بتفوّت تنبيهات أسعار الوجهات |\n| (مرفّعة) مسؤولة الامتثال والمخاطر | ليلى نور | 45 | المقر بالقاهرة | إدارة PCI Level 1؛ برنامج SOC 2؛ خصوصية مكافئة لـ GDPR؛ الاستجابة للتدقيق | الامتثال مضاف من بره مش متكامل؛ التدقيقات بتكشف الفجوات متأخر |\n| (مرفّع) صاحب مصلحة تنفيذي | شريف محمود (CEO) | 52 | المقر بالقاهرة | dashboard تنفيذي لحظي؛ P&L حسب القطاع؛ احتفاظ العملاء حسب الـ cohort؛ تقارير بدرجة المستثمرين | بيانات القرار في 6 أنظمة؛ مش شايف \"إيه اللي بتعمله المنصة دلوقتي\"؛ المستثمرون بيسألوا عن مقاييس مش عنده |\n\n### مصفوفة تغطية الشخصيات (ميزات Enterprise)\n\n| الميزة | رانيا | كريم | سلمى | ندى | حسن | ليلى ن. | شريف |\n|---------|-------|-------|-------|------|--------|----------|--------|\n| حجوزات المجموعات | ثانوي | أساسي | - | ثانوي | - | - | - |\n| حسابات الشركات | أساسي | - | - | ثانوي | - | - | - |\n| فروع متعددة | - | - | أساسية | - | - | تدقق | - |\n| التسعير الديناميكي | - | - | - | يستفيد | - | - | استراتيجي |\n| كشف الاحتيال | محمية | محمي | - | محمية | أساسي | تدقق | - |\n| لوحات تحكم مخصصة للعميل | ثانوي | ثانوي | - | أساسي | - | - | - |\n| Dashboard التنفيذي | - | - | - | - | - | - | أساسي |\n\n---\n\n## قصص المستخدم\n\nالقصص بتكمل من US-001..US-038 (الموروثة من Basic و Professional). Enterprise تضيف US-042 إلى US-090 (مع حذف القصص الخاصة بتطبيقات الموبايل US-051..US-057 وحذف قصص بوابة وكلاء B2B وقصص White-Label بناءً على طلب العميل).\n\n### الخدمات الإضافية للطيران والـ cross-sell\n\n**US-042: الرحلات اليومية والأنشطة والنقل**\n\nكمسافر، عايز أضيف رحلات يومية، نقل، تأجير سيارات، أو تذاكر معالم لحجز الطيران عشان أنظم رحلتي الكاملة على Jawla.\n\n- AC-042.1: الأنشطة مصدرها مخزون شريك (Viator، GetYourGuide، أو مورد محلي - يحدد لاحقًا) ومخزون Amadeus (Tours & Activities، Transfers، Cars).\n- AC-042.2: Cross-sell بعد حجز الطيران وعلى صفحة التأكيد.\n- AC-042.3: الأنشطة/النقل/السيارات المحجوزة تظهر في My Bookings للعميل.\n\n### لوحات التحكم المخصصة للعميل (Custom User Dashboards)\n\n**US-043: لوحة تحكم مخصصة بـ Widgets قابلة للتخصيص**\n\nكندى (عميلة عالية القيمة)، عايزة لوحة تحكم خاصة بحسابي أقدر أعدّلها بـ widgets قابلة للسحب والترتيب عشان أعرض المعلومات اللي تهمني كل ما أدخل على المنصة.\n\n- AC-043.1: لوحة التحكم لازم تكون متاحة فقط في باقة Enterprise؛ المستخدمون في الباقات الأقل يشوفون صفحة \"ترقية لـ Enterprise\".\n- AC-043.2: مكتبة widgets لازم تشمل على الأقل: الحجوزات القادمة، النفقات الشهرية، تنبيهات أسعار الوجهات المفضلة، رحلات سابقة، رصيد المحفظة، حالة برنامج الولاء، توصيات وجهات.\n- AC-043.3: العميل لازم يقدر يضيف/يحذف/يعيد ترتيب widgets بسحب وإفلات (drag-and-drop).\n- AC-043.4: تخطيط اللوحة يتم حفظه لكل مستخدم ويُستعاد عند الدخول من أي جهاز.\n- AC-043.5: لازم تتوفر قوالب جاهزة (Templates) للوحات: لوحة المسافر المتكرر، لوحة عميل الشركات، لوحة منسق المجموعات.\n- AC-043.6: لازم تدعم لوحة التحكم وضع العرض المتجاوب على الموبايل والتابلت.\n\n### التسعير الديناميكي\n\n**US-058: محرك قواعد Markup الديناميكية**\n\nكهاجر (إدارة الإيرادات)، عايزة أحدد قواعد بتعدّل الـ markup بناءً على إشارات عشان يتحسّن الإيراد.\n\n- AC-058.1: خصائص القاعدة: المنتج، الخط/الوجهة، الموسم، يوم الأسبوع، الأيام للمغادرة، درجة العميل، المورد، إشارة الطلب (سرعة البحث)، مرجع المنافس (لو البيانات موجودة).\n- AC-058.2: القواعد تتجمع: markup أساسي + تعديلات؛ markup نهائي محدود بـ floor/ceiling.\n- AC-058.3: كل قاعدة لها سجل تدقيق وتواريخ سريان.\n- AC-058.4: وضع Dry-run يعرض الأثر التاريخي بدون تطبيق.\n\n**US-059: التسعير بناءً على الطلب**\n\nنفس اللي فوق، مع إشارات طلب تلقائية من حجم البحث الداخلي.\n\n- AC-059.1: سرعة البحث لكل خط/عقار تتطبّع على نافذة متحركة.\n- AC-059.2: العناصر عالية الطلب تستلم زيادة markup؛ العناصر منخفضة الطلب تستلم خصم للتصريف.\n- AC-059.3: نطاق الزيادة/الخصم محدود (مثلاً -5% إلى +8%).\n\n**US-060: مرجع المنافس (لو البيانات موجودة)**\n\nكهاجر، عايزة أدمج بيانات سعر المنافسين لما تكون متاحة عشان أسعّر بشكل تنافسي.\n\n- AC-060.1: بيانات المنافس مدخلة عبر partner feed أو خدمة scraping (مراجعة قانونية مطلوبة).\n- AC-060.2: محرك التسعير يعرض شارة \"مقابل المنافس: -3%\" لكل عرض.\n\n**US-061: Dashboard أثر الإيراد**\n\nكهاجر، عايزة أشوف أثر قواعد التسعير الديناميكي على الإيراد عشان أكرّر التحسين.\n\n- AC-061.1: Dashboard: تقدير ارتفاع الإيراد % مقابل التحكم، لكل قاعدة.\n- AC-061.2: اختبارات A/B مدعومة عبر منصة التجارب.\n\n### حجوزات المجموعات والشركات\n\n**US-062: طلب حجز مجموعة**\n\nككريم، عايز أطلب حجز مجموعة (10-50 راكب) عشان Jawla تسعّر لي على الأسعار offline.\n\n- AC-062.1: النموذج: الخط/الوجهة، التواريخ، عدد الركاب، الدرجة/الفئة المفضلة، احتياجات خاصة (غذائية، حركة).\n- AC-062.2: الطلب يوجَّه لفريق عمليات المجموعات بـ SLA رد خلال 24 ساعة.\n- AC-062.3: السعر يُسلّم داخل المنصة؛ العميل يقبل/يفاوض.\n\n**US-063: تأكيد ودفع حجز المجموعة**\n\nككريم، عايز أدفع للمجموعة بمرونة عشان العائلة/الأصحاب كل واحد يدفع نصيبه.\n\n- AC-063.1: قبول السعر يولّد حجز معلّق بموعد نهائي للعربون.\n- AC-063.2: روابط دفع لكل مسافر؛ المدفوعات تتجمع للحجز المعلّق.\n- AC-063.3: الدفع الكامل في الموعد النهائي يطلق إصدار التذاكر/القسائم النهائي.\n\n**US-064: إعداد حساب شركة**\n\nكرانيا، عايزة أعدّ حساب شركتنا مع سياسة السفر وبيانات الفواتير عشان الموظفين يحجزوا في حدود القواعد.\n\n- AC-064.1: إعداد الحساب: بيانات الشركة، عنوان الفواتير، بيانات ضريبية، حد ائتماني، معتمدون افتراضيون.\n- AC-064.2: سياسة السفر: قائمة سماح/حظر شركات الطيران، أقصى درجة حسب مسافة الخط، حد أدنى للحجز المسبق، أقصى سعر تذكرة.\n- AC-064.3: إدارة المستخدمين: إضافة موظفين بأدوار (Traveler، Approver، Admin).\n\n**US-065: فرض سياسة سفر الشركة**\n\nكرانيا، عايزة الحجوزات اللي تخالف السياسة تحتاج موافقة عشان نتحكم في التكاليف.\n\n- AC-065.1: تدفق الحجز يفحص ضد السياسة وقت السعر؛ العروض غير المتوافقة معلّمة.\n- AC-065.2: تقديم الحجز بمخالفة يطلق سير عمل المعتمد.\n- AC-065.3: المعتمد يستلم إيميل/إشعار بزر موافقة/رفض.\n\n**US-066: فاتورة شركة موحدة**\n\nكرانيا، عايزة فاتورة شهرية واحدة لكل حجوزات الشركة عشان يسهل على الحسابات.\n\n- AC-066.1: كشف شهري: كل الحجوزات بالمسافر، الخط، التواريخ، التكلفة، الالتزام بالسياسة.\n- AC-066.2: فاتورة PDF + XLSX، قابلة للتحميل والإرسال بالإيميل.\n- AC-066.3: شروط الدفع net-30 أو حسب التعاقد.\n\n**US-067: دعم 24/7 للشركات**\n\nكرانيا، عايزة دعم بأولوية خلال اضطرابات السفر عشان موظفينا يلاقوا رعاية.\n\n- AC-067.1: درجة الشركات محددة وقت استقبال الدعم.\n- AC-067.2: خط هاتف مخصص / رقم WhatsApp للشركات.\n- AC-067.3: SLA: استجابة في 15 دقيقة بعد ساعات العمل.\n\n### عمليات الفروع المتعددة\n\n**US-068: إعداد حساب فرع**\n\nكسلمى، عايزة فرع الغردقة بتاعي يتعدّ بمستخدمين، نسب P&L، ووصول للمخزون عشان نشتغل كفرع.\n\n- AC-068.1: كيان الفرع: الاسم، الموقع، المدير، مرجع المركز الضريبي/مركز التكلفة.\n- AC-068.2: أدوار مستخدمي الفرع: Manager، Counter Agent، Cashier.\n- AC-068.3: كل الحجوزات المنشأة من مستخدمي الفرع تُنسب لـ P&L الفرع.\n\n**US-069: Dashboard P&L الفرع**\n\nكسلمى، عايزة أشوف حجوزات فرعي، الإيراد، التكاليف، والهامش عشان أدير الفرع كمركز ربح.\n\n- AC-069.1: Dashboard: حجوزات يومية/أسبوعية/شهرية، GBV، COGS، الهامش الإجمالي، الأكثر مبيعًا.\n- AC-069.2: تعمّق لمستوى المعاملة.\n\n**US-070: مبيعات الفرع المباشرة**\n\nكموظف counter في الفرع، عايز أحجز للعملاء اللي بييجوا وأقبل نقدي/POS عشان أبيع شخصيًا.\n\n- AC-070.1: تدفق حجز counter مبسّط، بدون دخول عميل مطلوب.\n- AC-070.2: طرق الدفع تشمل: كاش (مع تسوية الشيفت)، POS terminal، تعبئة محفظة.\n- AC-070.3: الإيصال يطبع عبر طابعة محلية (USB أو IP).\n\n**US-071: تسوية كاش الفرع**\n\nكسلمى، عايزة تسوية كاش نهاية اليوم عشان أقفل الفرع صح.\n\n- AC-071.1: سير عمل فتح/قفل الشيفت.\n- AC-071.2: الكاش المعدود مقابل كاش النظام، الفروقات مسجلة.\n- AC-071.3: تقرير تسوية يومي يُرسل لمالية المقر.\n\n### كشف الاحتيال\n\n**US-076: تقييم الاحتيال اللحظي**\n\nكحسن (محلل احتيال)، عايز كل حجز يتقيّم لمخاطر الاحتيال لحظيًا عشان أمنع المخاطر العالية قبل الدفع.\n\n- AC-076.1: إشارات الاحتيال: BIN، IP geolocation، device fingerprint، السرعة (لكل بطاقة، لكل إيميل، لكل IP)، السلوك (الوقت على الصفحة، نمط التصفح)، تاريخ العميل.\n- AC-076.2: نموذج ML مدرّب على chargebacks تاريخية لـ Jawla وحالات احتيال منسّقة.\n- AC-076.3: التقييم < 200ms؛ تدفق الحجز يحظر عند تقييم >= 85 (قابل للتهيئة)، يراجع في 60-85، يسمح < 60.\n\n**US-077: قائمة مراجعة الاحتيال**\n\nكحسن، عايز قائمة بالحجوزات متوسطة المخاطر لأراجعها يدويًا عشان نوازن الاحتكاك مقابل الاحتيال.\n\n- AC-077.1: القائمة مرتبة حسب التقييم وقيمة الحجز.\n- AC-077.2: المراجع يشوف: الإشارات، تاريخ العميل، حالات مشابهة سابقة.\n- AC-077.3: الإجراءات: موافقة، رفض، طلب معلومات إضافية من العميل.\n\n**US-078: محرر قواعد الاحتيال**\n\nكحسن، عايز أضيف/أعدّل قواعد احتيال (بالإضافة لـ ML) عشان أرد على الأنماط الناشئة.\n\n- AC-078.1: محرر القواعد: عتبة الإشارة + إجراء.\n- AC-078.2: القواعد تُختبر على البيانات التاريخية قبل النشر.\n\n**US-079: إدارة Chargebacks**\n\nكحسن، عايز سير عمل للـ chargebacks الواردة عشان أرد بأدلة.\n\n- AC-079.1: webhook الـ chargeback من البوابة ينشئ حالة.\n- AC-079.2: حزمة الأدلة تتجمع تلقائيًا: الحجز، بيانات العميل، IP/الجهاز، التواصل، إثبات تسليم القسيمة.\n- AC-079.3: تقديم الأدلة للبوابة عبر API.\n\n### الأدمن المتقدم وعمليات المنصة\n\n**US-081: منصة API للشركاء**\n\nكشريك تكامل، عايز API عام عشان أضمّن مخزون Jawla في موقعي عشان نوسع التوزيع.\n\n- AC-081.1: REST + GraphQL APIs للبحث، الحجز، الإدارة.\n- AC-081.2: إدارة مفاتيح API، rate limiting، اشتراكات webhook.\n- AC-081.3: مستندات عامة و sandbox.\n\n**US-082: Dashboard تنفيذي لحظي**\n\nكشريف (CEO)، عايز dashboard تنفيذي لحظي عشان أشوف نبض العمل.\n\n- AC-082.1: حجوزات اليوم + GBV + الإيراد، مزيج القطاع (B2C الأفراد، حسابات الشركات، المجموعات)، أعلى الفروع، أعلى المشاكل.\n- AC-082.2: تصميم متجاوب لعرض الـ dashboard على متصفح الموبايل بشكل مريح.\n- AC-082.3: ملخص تنفيذي أسبوعي بالإيميل يتوّلد تلقائيًا.\n\n**US-083: تحليلات Cohort والاحتفاظ**\n\nكشريف، عايز تحليل cohort (شهر الاكتساب مقابل الشراء المتكرر) عشان أفهم LTV.\n\n- AC-083.1: رسم cohort بتعريف اكتساب قابل للتهيئة.\n- AC-083.2: تعمّق للقناة، القطاع.\n\n### الامتثال والأمن\n\n**US-084: موقف PCI DSS Level 1**\n\nكليلى نور (الامتثال)، المنصة لازم تستوفي متطلبات PCI DSS Level 1 عشان نتعرّض للتدقيق والشهادة.\n\n- AC-084.1: تقسيم الشبكة لعزل بيئة بيانات حاملي البطاقات (CDE).\n- AC-084.2: اختبار اختراق سنوي، فحص ثغرات ربع سنوي.\n- AC-084.3: سياسات موثقة، فرض RBAC، تشفير at rest + in transit.\n- AC-084.4: تعاقد مع QSA معتمد للتقييم.\n\n**US-085: الاستعداد لـ SOC 2 Type 1**\n\nنفس اللي فوق، المنصة لازم تحقق شهادة SOC 2 Type 1 خلال 6 شهور من إطلاق Enterprise.\n\n- AC-085.1: إطار الضوابط مطبق (CC1-CC9 + معايير مختارة).\n- AC-085.2: جمع الأدلة مؤتمت قدر الإمكان (Vanta، Drata، أو داخلي).\n\n**US-086: برنامج خصوصية مكافئ لـ GDPR**\n\nكليلى نور، المنصة لازم تدعم حقوق صاحب البيانات (الوصول، الحذف، النقل) عشان نمتثل بأشد نظام خصوصية ينطبق.\n\n- AC-086.1: خدمة ذاتية للعميل: تنزيل بياناتي، حذف حسابي.\n- AC-086.2: حذف ناعم مع حذف صلب بعد 30 يوم (حيث يسمح القانون).\n- AC-086.3: اتفاقيات معالجة بيانات مع كل الموردين.\n\n**US-087: تسجيل التدقيق بنطاق المنصة**\n\nكليلى نور، كل الأفعال الحساسة عبر المنصة لازم تتسجل بشكل ثابت مع احتفاظ عشان التدقيقات تنجح.\n\n- AC-087.1: سجل تدقيق append-only لتخزين ثابت (GCS bucket مع Bucket Lock / Object Versioning، أو Spanner مع change streams، أو ما يعادله على GCP).\n- AC-087.2: احتفاظ 7 سنوات.\n- AC-087.3: واجهة استعلام سجل التدقيق لفريق الامتثال.\n\n### النطاق والأداء\n\n**US-088: التوسع الأفقي**\n\nكفريق الهندسة، المنصة لازم تتوسع أفقيًا عشان نخدم أحمال الذروة.\n\n- AC-088.1: خدمات stateless متوسعة عبر container orchestrator (Kubernetes أو Nomad).\n- AC-088.2: نسخ قراءة لقاعدة البيانات؛ فصل warehouse.\n- AC-088.3: طبقات caching (Redis، CDN) للمسارات الساخنة.\n\n**US-089: التعافي من الكوارث متعدد المناطق**\n\nكفريق الهندسة، المنصة لازم تنجو من انقطاع منطقة مع RTO < 1 ساعة عشان العمل يكون مرن.\n\n- AC-089.1: منطقة نشطة + standby دافئ في منطقة ثانية.\n- AC-089.2: تجارب failover مؤتمتة كل ربع سنة.\n- AC-089.3: runbooks موثقة.\n\n**US-090: قابلية ملاحظة شاملة**\n\nكفريق الهندسة، المنصة لازم يكون عندها قابلية ملاحظة شاملة عشان الحوادث تتشخّص خلال دقائق.\n\n- AC-090.1: distributed tracing على كل طلب (OpenTelemetry).\n- AC-090.2: logs مركزية ببحث منظم.\n- AC-090.3: dashboards لكل فرع، لكل مورد، لكل endpoint.\n- AC-090.4: dashboards SLO/SLA للعرض التنفيذي.\n\n---\n\n## المتطلبات التجارية\n\nمتطلبات Basic (BR-001..BR-025) و Professional (BR-026..BR-050) لسه سارية. Enterprise تضيف:\n\n| ID | المتطلب | الأولوية | المصدر |\n|----|---------|---------|--------|\n| BR-053 | المنصة لازم توفّر لوحات تحكم مخصصة للعميل (Custom User Dashboards) بـ widgets قابلة للسحب والإفلات، قوالب جاهزة، وحفظ تخطيط لكل مستخدم — كقدرة حصرية لباقة Enterprise تميّزها عن باقتي Basic و Professional. | Must | Product |\n| BR-055 | المنصة لازم تشمل محرك تسعير ديناميكي بقواعد قابلة للتهيئة وتعديلات حسب الطلب، مع تدقيق كل التغييرات وقابلية التراجع. | Must | Revenue |\n| BR-056 | المنصة لازم تدعم حجوزات المجموعات (10+ ركاب) بتدفق سعر offline، حجوزات معلّقة، تحصيل عربون، وروابط دفع لكل مسافر. | Must | Product |\n| BR-057 | المنصة لازم تدعم حسابات الشركات بفرض سياسة السفر، تدفقات المعتمد، وفاتورة شهرية موحدة. | Must | Sales |\n| BR-058 | المنصة لازم تدعم عمليات الفروع المتعددة بـ P&L على مستوى الفرع، أدوار مستخدمي الفرع، مبيعات counter (كاش + POS)، وتسوية كاش. | Must | Operations |\n| BR-059 | المنصة لازم تنفّذ تقييم احتيال لحظي باستخدام مزيج من الطرق المبنية على القواعد و ML، مع تجميع وتقديم أدلة chargeback. | Must | Finance + Security |\n| BR-060 | المنصة لازم تحقق شهادة PCI DSS Level 1 خلال 9 شهور من إطلاق Enterprise. | Must | Compliance |\n| BR-061 | المنصة لازم تحقق شهادة SOC 2 Type 1 خلال 12 شهر من إطلاق Enterprise. | Must | Compliance |\n| BR-062 | المنصة لازم تدعم حقوق صاحب البيانات (الوصول، الحذف، النقل) بتدفقات خدمة ذاتية. | Must | Legal |\n| BR-063 | المنصة لازم تشتغل بـ >= 99.9% availability مع تعافي كوارث متعدد المناطق، RTO < 1 ساعة، RPO < 5 دقايق. | Must | Engineering + Business |\n| BR-064 | المنصة لازم تتوسع لـ >= 10,000 مستخدم متزامن و >= 50,000 حجز/شهر بدون تدهور أداء. | Must | Engineering |\n| BR-065 | المنصة لازم تعرض منصة API عامة لشركاء التوزيع بإدارة مفاتيح، rate limiting، و webhooks. | Should | Sales |\n| BR-067 | المنصة لازم تتكامل مع مصدرين على الأقل لمخزون الرحلات اليومية/الأنشطة للـ cross-sell. | Should | Product |\n| BR-068 | المنصة لازم تعتمد على بوابة PayTabs الموحدة (متعددة العملات MENA) لكل عمليات الدفع، مع دعم Apple Pay و Google Pay عبر نفس البوابة. | Must | Finance + Compliance |\n| BR-069 | المنصة لازم تشمل أدوات قابلية ملاحظة (distributed tracing، logs مركزية، dashboards، تنبيهات) تغطي 100% من المسارات الحرجة. | Must | Engineering |\n| BR-070 | كل النشر لازم يكون تدريجي (canary أو blue/green) مع تراجع مؤتمت عند استنفاد ميزانية الأخطاء. | Must | Engineering |\n| BR-071 | المنصة لازم تشتغل على container orchestrator (Kubernetes موصى به) بـ autoscaling. | Must | Engineering |\n| BR-072 | المنصة لازم تحافظ على service catalog بمالكين موثقين، SLOs، dependencies، و runbooks لكل خدمة. | Must | Engineering |\n| BR-073 | كل أفعال الأدمن الحساسة عبر المنصة لازم تتسجل لتخزين ثابت ويتم الاحتفاظ بها 7 سنوات. | Must | Compliance |\n| BR-074 | المنصة لازم تدعم تهيئة إقامة البيانات على مستوى المنصة (مقيمة في مصر مقابل خارجها) لما تتفعّل إقامة البيانات المصرية. | Should | Legal |\n| BR-075 | فواتير حسابات الشركات لازم تنتج فواتير متوافقة ضريبيًا حسب معايير الفواتير الإلكترونية لمصلحة الضرائب المصرية. | Must | Finance + Legal |\n| BR-076 | المنصة لازم تنفّذ تحكم وصول مبني على الأدوار بـ 9 أدوار مميزة على الأقل عبر سياقات المستهلك، الشركات، الفرع، والأدمن. | Must | Security |\n| BR-077 | نماذج كشف الاحتيال لازم تتدرّب على الأقل شهريًا، مع dashboards لمقاييس أداء النموذج. | Must | Engineering + Finance |\n| BR-078 | المنصة لازم تدعم الحملات الترويجية (أكواد، تلقائية، مبنية على الدرجة) بحدود استخدام، انتهاء، وتدقيق. | Should | Marketing |\n| BR-079 | المنصة لازم تدعم برامج الإحالة بنسب، إصدار مكافآت، وحماية ضد الاحتيال. | Should | Marketing |\n| BR-081 | المنصة لازم تتكامل مع نظام محاسبة واحد على الأقل (Xero، QuickBooks، أو ERP محلي) للمزامنة المالية. | Should | Finance |\n| BR-082 | عمليات الفروع المتعددة لازم تفرض إن مستخدمي الفرع يشوفوا بس عملاء وحجوزات فرعهم. | Must | Security |\n| BR-084 | تدفق سعر offline لحجز المجموعات لازم يتكامل مع موردين على الأقل لأسعار المجموعات (أو قابل للتشغيل بمصادر يدوية). | Should | Product |\n| BR-085 | حسابات LTV العميل وتقارير cohort لازم تكون متاحة للتنفيذيين لحظيًا. | Must | Executive |\n\n---\n\n## معايير القبول الوظيفية\n\nFAC-1..FAC-14 من الباقات السابقة لسه سارية. Enterprise تضيف:\n\n### FAC-16: لوحة تحكم العميل المخصصة (Custom User Dashboard)\n\nلوحة التحكم المخصصة تكون صحيحة وظيفيًا لما:\n1. التحقق إن المستخدم على باقة Enterprise قبل عرض اللوحة (الباقات الأقل تشوف صفحة الترقية).\n2. تحميل widgets المتاحة وتخطيط المستخدم المحفوظ خلال 1.5 ثانية p95.\n3. السحب والإفلات يعمل على الويب والتابلت؛ والترتيب في الموبايل يحدث بواجهة مبسّطة.\n4. كل تغيير على التخطيط يُحفظ تلقائيًا خلال 2 ثانية.\n5. كل widget يجلب بياناته من مصدر موثق ويعرض حالة \"تحميل\" ثم محتوى أو حالة فارغة.\n6. القوالب الجاهزة تطبّق التخطيط المرتبط بها مع الحفاظ على بيانات المستخدم.\n\n### FAC-17: حجز شركة بفرض السياسة\n\nحجز شركة يكون صحيح وظيفيًا لما:\n1. المسافر مصادق عليه كمستخدم شركة.\n2. التحقق من السياسة يجري على كل عرض.\n3. العروض غير المتوافقة تعرض تحذير؛ الاختيار يتطلب إقرار.\n4. تقديم الحجز بمخالفة يوجَّه للمعتمد.\n5. المعتمد يشوف السياق الكامل، يقدر يوافق/يرفض.\n6. الحجز الموافق عليه يكمل؛ الحجز المرفوض ينبّه المسافر.\n7. الحجز يضاف لكشف الشركة الشهري.\n\n### FAC-19: تطبيق التسعير الديناميكي\n\nالتسعير الديناميكي يكون صحيح وظيفيًا لما:\n1. الـ markup الأساسي يُطبَّق أولًا.\n2. سلسلة القواعد تُقيَّم بترتيب محدد.\n3. الـ markup النهائي محدود بـ floor/ceiling.\n4. الـ markup يُطبَّق على السعر الصافي لإنتاج السعر المعروض.\n5. قرار الـ markup مسجّل للتدقيق وإعادة التشغيل.\n6. العميل لا يشوف أبدًا حساب الـ markup الخام.\n\n### FAC-21: تقييم الاحتيال والإجراء\n\nتقييم الاحتيال يكون صحيح وظيفيًا لما:\n1. الإشارات تُجمَع قبل الدفع.\n2. التقييم يُرجَع خلال 200ms p95.\n3. الإجراء يُطبَّق حسب العتبة (حظر، مراجعة، سماح).\n4. القرار مسجّل بالإشارات + التقييم + الإجراء.\n5. رسالة العميل مترجمة للإجراء (مثلاً \"الرجاء التواصل مع الدعم لإتمام هذا الحجز\").\n6. فريق الاحتيال يقدر يعدّل الحظر عبر الأدمن.\n\n### FAC-22: تعليق حجز المجموعة والتسوية\n\nحجز المجموعة يكون صحيح وظيفيًا لما:\n1. قبول السعر ينشئ حجز معلّق بمرجع وموعد نهائي للعربون.\n2. روابط دفع لكل مسافر مولّدة.\n3. المدفوعات تتجمع للحجز المعلّق؛ الرصيد ظاهر للمنسق.\n4. الدفع الكامل في الموعد النهائي يطلق إصدار التذاكر النهائي.\n5. الدفع الجزئي في الموعد النهائي يطلق إجراء قابل للتهيئة (تمديد، إصدار جزئي، إلغاء كامل).\n\n### FAC-23: تسوية كاش الفروع المتعددة\n\nقفل شيفت الفرع يكون صحيح وظيفيًا لما:\n1. كاش فتح الشيفت مسجّل.\n2. كل المعاملات خلال الشيفت مسجّلة.\n3. كاش القفل معدود، الفرق محسوب.\n4. فرق > 5% من الكاش المتحرك يحتاج توقيع المشرف.\n5. تقرير تسوية يومي يُرسل لمالية المقر.\n\n### FAC-24: امتثال PCI DSS المستمر\n\nامتثال PCI يكون مستوفى باستمرار لما:\n1. فحوصات الثغرات الربع سنوية تنجح.\n2. اختبار اختراق سنوي بشركة خارجية.\n3. تقسيم شبكة CDE متحقق منه.\n4. كل الموظفين بوصول لـ CDE مدرّبين سنويًا.\n5. خطة الاستجابة للحوادث مختبرة سنويًا.\n\n---\n\n## مؤشرات الأداء (KPIs)\n\nمؤشرات Basic و Professional لسه سارية. مؤشرات Enterprise:\n\n| المؤشر | الهدف | القياس | المالك | التكرار |\n|--------|------|--------|--------|---------|\n| GBV السنوي | > EGP 200M | Warehouse | Executive | شهري |\n| حصة الخدمات الإضافية و cross-sell من GBV | > 18% | Warehouse | Product | شهري |\n| حسابات شركات نشطة | > 30 | Warehouse | Sales | شهري |\n| نسبة تبني لوحة التحكم المخصصة (Custom Dashboard) | > 40% من المستخدمين النشطين شهريًا | DB query | Product | شهري |\n| حصة حجوزات المجموعات من GBV | > 8% | Warehouse | Product | شهري |\n| ارتفاع الإيراد من التسعير الديناميكي | > 6% مقابل التحكم | A/B + warehouse | Revenue Mgmt | شهري |\n| كمون تقييم الاحتيال (p95) | < 200ms | APM | Engineering | أسبوعي |\n| معدل رفض الاحتيال | < 2% من كل الحجوزات | DB | Fraud | أسبوعي |\n| نسبة Chargeback | < 0.25% | Gateway + DB | Fraud | أسبوعي |\n| خسائر الاحتيال % من GBV | < 0.15% | DB | Fraud | شهري |\n| معدل الإيجابيات الزائفة (الاحتيال) | < 8% (عملاء جيدين مرفوضين) | قائمة المراجعة + تواصل العميل | Fraud | شهري |\n| Uptime الموقع | > 99.9% | Monitoring | Engineering | شهري |\n| MTTR | < 20 دقيقة | سجلات الحوادث | Engineering | لكل حادث |\n| تجربة التعافي من الكوارث | ناجحة ربع سنوي | تنفيذ التجربة | Engineering | ربع سنوي |\n| فحص ثغرات PCI DSS | يجتاز ربع سنوي | QSA / scanner | Compliance | ربع سنوي |\n| اختبار اختراق PCI DSS | يجتاز سنوي | طرف ثالث | Compliance | سنوي |\n| تغطية ضوابط SOC 2 | 100% بحلول الشهر 9 | Vanta/Drata | Compliance | شهري |\n| SLA لطلبات أصحاب البيانات (DSR) | < 30 يوم | نظام تذاكر الخصوصية | Legal | لكل طلب |\n| تبني منصة API | > 5 شركاء نشطين بحلول الشهر 6 | سجل مفاتيح API | Sales | شهري |\n| هامش P&L الفرع | > 15% لكل فرع | Warehouse | Finance | شهري |\n| أيام التحصيل المستحقة للشركات | < 35 يوم | AR aging | Finance | شهري |\n| معدل تكرار Cohort (اليوم 90) | > 22% | Cohort warehouse | Marketing | شهري |\n| LTV العميل (24 شهر) | > EGP 45,000 | Cohort warehouse | Marketing | ربع سنوي |\n| سعة المستخدمين المتزامنين المختبرة | >= 10,000 | Load test | Engineering | ربع سنوي |\n| إنتاجية Event Bus | > 2,000 حدث/ثانية | Load test | Engineering | ربع سنوي |\n| استعلام Warehouse p95 | < 4 ثواني لأعلى 20 dashboard | سجلات Warehouse | Engineering | أسبوعي |\n\n---\n\n## المراحل الزمنية\n\nEnterprise منظمة كخطوط عمل متوازية مش جدول زمني تسلسلي واحد. خطوط العمل تتقدم بالتوازي مع بوابات تكامل دورية.\n\n| المرحلة | المخرجات | المدة | محفز الدفع | % الدفع | المبلغ (EGP) |\n|---------|----------|------|-----------|--------|--------------|\n| M0 - توقيع العقد | SOW موقع، انطلاق تنفيذي، تجميع الفريق الكامل، استمرار مستشار Amadeus | اليوم 0 | تنفيذ العقد | 18% | 180,000 |\n| M1 - الاكتشاف والمعمارية والتصميم | معمارية لكل خط عمل (الخدمات الإضافية وcross-sell، تسعير ديناميكي، احتيال، مجموعات/شركات، فروع متعددة، لوحات تحكم العميل المخصصة)؛ مكتبة Figma كاملة للويب المتجاوب والأدمن؛ خارطة طريق الامتثال؛ نموذج السعة؛ هيكل الفريق نهائي | الأسابيع 1-3 | قبول M1 | 10% | 100,000 |\n| M2 - المنصة والأساسيات | Kubernetes (أو orchestrator مختار) جاهز؛ stack القابلية للملاحظة؛ schema DB؛ إطار RBAC؛ منصة feature flag | الأسابيع 3-7 | اختبار smoke للمنصة ينجح | 14% | 140,000 |\n| M3 - الخدمات الإضافية للطيران و cross-sell والتسعير الديناميكي | تكامل Amadeus Ancillaries (أمتعة، مقاعد)؛ تكامل Tours & Activities و Transfers و Cars؛ Cross-sell على صفحات الحجز والتأكيد؛ محرك قواعد التسعير الديناميكي؛ تعديلات حسب الطلب؛ dashboard ارتفاع الإيراد | الأسابيع 7-11 | حجز طيران مع cross-sell من البداية للنهاية + إثبات قاعدة تسعير | 16% | 160,000 |\n| M4 - لوحات التحكم المخصصة للعميل والاحتيال | محرك Custom User Dashboards بـ widgets قابلة للسحب والإفلات؛ مكتبة widgets أولية؛ قوالب جاهزة؛ حفظ التخطيط لكل مستخدم؛ محرك تقييم الاحتيال؛ قائمة مراجعة الاحتيال؛ إدارة chargeback؛ نموذج ML v1 مدرّب | الأسابيع 9-14 | عرض لوحات تحكم مخصصة حية + تقييم الاحتيال على 100% من الحجوزات | 16% | 160,000 |\n| M5 - المجموعات والشركات والفروع المتعددة | تدفق حجز المجموعات؛ حسابات الشركات بالسياسة + المعتمد؛ فواتير موحدة؛ كيانات الفروع؛ P&L الفروع؛ مبيعات counter؛ تسوية الكاش | الأسابيع 13-18 | حجز مجموعة حي تم؛ أول حساب شركة + أول فرع عامل | 18% | 180,000 |\n| M7 - الامتثال والتقوية والإطلاق | معالجة فجوات PCI DSS؛ نشر ضوابط SOC 2؛ خدمة ذاتية DSR؛ UAT كامل (600+ حالة)؛ load test 10k متزامن؛ نشر إنتاج؛ 4 أسابيع رعاية مكثفة | الأسابيع 18-24 | الإنتاج حي؛ تقرير تحليل فجوات PCI مسلّم | 8% | 80,000 |\n| **الإجمالي** | | **20-24 أسبوع** | | **100%** | **1,000,000** |\n\n### معايير قبول المراحل التفصيلية\n\n**قبول M1**\n- مستندات معمارية لكل خط عمل (6 خطوط: cross-sell، تسعير ديناميكي، احتيال، مجموعات/شركات، فروع متعددة، Custom Dashboards) مراجَعة وموقّعة.\n- مكتبة Figma كاملة للويب المتجاوب + الأدمن + لوحات التحكم المخصصة (تقدير 130+ إطار).\n- خارطة طريق الامتثال بمواعيد PCI/SOC 2.\n- نموذج السعة: توقعات الزيارات، حمل الذروة، خطة التوسع.\n- هيكل الفريق: قادة لكل خط عمل، مصفوفة المسؤولية.\n\n**قبول M2**\n- Kubernetes (أو بديل) يشتغل بـ autoscaling.\n- Stack القابلية للملاحظة جاهز (tracing، logs، metrics، dashboards).\n- ترحيل schema مختبر.\n- فرض RBAC متحقق منه ضد مستخدمين اختبار لكل دور.\n- Feature flags قابلة للتبديل من الأدمن.\n\n**قبول M3**\n- Amadeus Ancillaries (أمتعة، مقاعد) متكاملة وقابلة للحجز في staging.\n- Cross-sell الـ Tours/Transfers/Cars يظهر على صفحة التأكيد ويُكمل الحجز.\n- محرر قواعد التسعير شغّال؛ تغييرات قواعد عيّنة تنتشر.\n- التعديل المبني على الطلب يشتغل على زيارات اختبار.\n\n**قبول M4**\n- محرك Custom User Dashboards حي مع 8 widgets على الأقل قابلة للسحب والإفلات.\n- 3 قوالب جاهزة على الأقل (مسافر متكرر، شركات، منسق مجموعات) تعمل.\n- حفظ التخطيط لكل مستخدم متحقق منه عبر أجهزة متعددة.\n- تقييم الاحتيال على 100% من الحجوزات؛ قائمة المراجعة نشطة.\n- نموذج ML v1 منشور بأداء موثق.\n\n**قبول M5**\n- حجز مجموعة حي واحد (10+ ركاب) معالج من البداية للنهاية.\n- حساب شركة (كيان اختبار) محجوز بمخالفة سياسة تطلق موافقة.\n- كيان فرع واحد عامل مع بيع counter حي + تسوية.\n\n**قبول M7**\n- UAT (600+ حالة) > 96% نسبة نجاح.\n- تدقيق أمني: لا توجد نتائج Critical؛ < 3 High مفتوحة.\n- Load test يصمد لـ 10,000 متزامن بـ p95 < 3 ثواني على endpoints رئيسية.\n- تحليل فجوات PCI مسلّم بخطة معالجة وجدول زمني.\n- نافذة رعاية مكثفة 4 أسابيع بدوران on-call.\n\n---\n\n## أولويات الميزات (MoSCoW)\n\n### Must Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| Cross-sell الرحلات اليومية / الأنشطة / النقل / السيارات | معدل ربط أعلى، هامش |\n| الخدمات الإضافية للطيران (Ancillaries: أمتعة، مقاعد) | رفع متوسط قيمة الحجز |\n| لوحات تحكم مخصصة للعميل (Custom User Dashboards) | قدرة مميِّزة حصرية لباقة Enterprise؛ تفاعل واحتفاظ |\n| بوابة PayTabs الموحدة (متعددة العملات MENA) | مرونة دفع إقليمية بدون تعدد بوابات |\n| محرك تسعير ديناميكي | تحسين الإيراد |\n| التسعير بناءً على الطلب | ارتفاع الهامش |\n| تدفق حجز المجموعات (10+) | قطاع مربح |\n| حسابات الشركات بالسياسة | قطاع مربح، إيراد متكرر |\n| فواتير موحدة | متطلب الشركات |\n| عمليات الفروع المتعددة | واقع تشغيلي |\n| Dashboard P&L الفرع | تحفيز الفرع |\n| مبيعات Counter (كاش + POS) | إيراد العملاء الحضوريين |\n| تقييم الاحتيال (قواعد + ML) | تقليل المخاطر |\n| إدارة Chargeback | تقليل الخسائر |\n| موقف PCI DSS Level 1 | متطلب امتثال عند النطاق |\n| استعداد SOC 2 Type 1 | مطلوب لمبيعات الشركات |\n| DSR مكافئ لـ GDPR | امتثال |\n| Kubernetes / التوسع الأفقي | مطلوب عند هذا الحجم |\n| تعافي من الكوارث متعدد المناطق | مرونة |\n| قابلية ملاحظة شاملة | متطلب تشغيلي |\n| منصة API عامة | توسيع التوزيع |\n| Dashboard تنفيذي لحظي | دعم قرار |\n| تحليلات Cohort والاحتفاظ | دعم قرار استراتيجي |\n| RBAC عبر 9+ أدوار | متطلب أمن عند النطاق |\n| محرك حملات ترويجية | متطلب تسويق |\n| برنامج إحالة | اكتساب |\n\n### Should Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| تكامل محاسبي (Xero/QuickBooks) | كفاءة مالية |\n| دردشة حية داخل الموقع مع توجيه وكيل | دعم |\n| سوق ولاء (استرداد غير سفر) | تفاعل |\n| تقارير سفر الشركات (بصمة CO2) | سرد ESG |\n| تكامل مباشر مع موردي أسعار المجموعات | هامش |\n| لغات متعددة بعد AR/EN (FR، DE) | سوق السياح |\n| dashboards KPI لموظفي الفرع | تحفيز الفرع |\n| حجز صوتي عبر WhatsApp AI (beta) | ابتكار |\n\n### Could Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| دفع كريبتو (USDC) | متخصص لكن واعي للتوجه |\n| BNPL عبر Tabby/Tamara | تحويل |\n| دفتر يوميات الرحلة / مشاركة اجتماعية | تفاعل |\n| مطابقة حالة ولاء من برامج أخرى | اكتساب |\n| chatbot / وضع kiosk للفرع | أتمتة الفرع |\n| شراء تعويض كربون عند الدفع | ESG |\n\n### Won't Have (Enterprise النهائية - مؤجلة لما بعد Enterprise)\n\n| الميزة | ملاحظات |\n|---------|-------|\n| تكامل OTA لشركة مكتسبة (سيناريو M&A) | خارج النطاق |\n| توزيع NDC مباشر للـ GDS (البيع لـ OTAs أخرى) | خارج النطاق |\n| حجز كروز أصلي | مستقبلي |\n| إيجارات طويلة (>30 يوم) | مستقبلي |\n| تأمين داخلي | خارج النطاق |\n| بناء CRM مخصص | استخدم الموجود |\n| بناء helpdesk مخصص | استخدم الموجود |\n\n---\n\n## خارج النطاق\n\nرغم اتساع باقة Enterprise، التالي مستبعد صراحة:\n\n1. **وحدة حجز الفنادق — تم استبعادها صراحة من جميع باقات المشروع بناءً على طلب العميل**. المنصة طيران فقط (مع الخدمات الإضافية وcross-sell الأنشطة/النقل/السيارات).\n2. **بوابة وكلاء B2B (Sub-system مستقل) — مستبعدة بناءً على طلب العميل**. لا يوجد تسجيل دخول لوكيل سفر، ولا إدارة markup للوكيل، ولا حدود ائتمان للوكلاء، ولا محاسبة عمولات وكلاء، ولا إدارة مستخدمين فرعيين لوكالات السفر.\n3. **محرك White-Label لإنشاء علامات فرعية — مستبعد بناءً على طلب العميل**. لا multi-tenant، ولا theming لكل مستأجر، ولا أدمن معزول لشريك، ولا فواتير لشركاء white-label، ولا تهيئة gateway لكل مستأجر.\n4. **تكامل علامة مكتسبة**: لو Jawla اكتسبت OTA آخر، التكامل التزام منفصل.\n5. **توزيع NDC الخارجي**: بيع أسعار Jawla المتفاوض عليها لـ OTAs أخرى عبر معايير NDC.\n6. **حجوزات الكروز**: مخزون وتدفقات حجز الكروز.\n7. **إيجارات طويلة (شبه Airbnb)**: نموذج مخزون مختلف.\n8. **CRM أو Helpdesk مبني مخصص**: استخدم طرف ثالث (HubSpot، Zendesk).\n9. **بنية مدفوعات داخلية (تصبح Payment Service Provider)**: استمر باستخدام PayTabs كبوابة موحدة.\n7. **تصنيع أجهزة POS**: استخدم terminals طرف ثالث موجودة.\n8. **VR/AR ما وراء اللمسات النهائية**: تجربة VR كاملة خارج النطاق.\n9. **تأمين تأمين**: استمر في الإحالة لشركاء التأمين.\n10. **توكينات ولاء / Blockchain**: خارج النطاق.\n11. **نماذج سفر مزايدة / مزاد (شبه Priceline)**: خارج النطاق.\n12. **مخطط رحلة AI بـ LLM**: ممكن يضاف لكن غير ملتزم في نطاق Enterprise.\n13. **محرك ضرائب/VAT كامل متعدد الدول**: مصر + السعودية + الإمارات فقط.\n14. **خدمات معالجة التأشيرات**: إحالة فقط.\n15. **عمليات طيران تشارتر**: خارج النطاق.\n16. **Hotel Channel Manager / أي وحدة فنادق**: المنصة طيران فقط، مغطاة بالاستبعاد الصريح في البند 1 أعلاه.\n17. **الترحيل من نظام حجز قديم**: لو Jawla عندها أنظمة سابقة، الترحيل التزام منفصل.\n18. **شراء أجهزة (POS الفرع، طابعات إيصال)**: تكامل برمجي فقط؛ الأجهزة تُشترى منفصلة.\n19. **توريد NOC 24/7**: ابني المنصة بحيث تكون قابلة للتشغيل من Jawla؛ عقد NOC منفصل.\n20. **قناة صوتية (تكامل اتصال مركز الاتصال)**: ما وراء deep links للاتصال.\n21. **تطبيقات موبايل أصلية (iOS / Android)**: الباقة تعتمد على ويب متجاوب فقط؛ التطبيقات الأصلية خارج النطاق ويمكن إضافتها في باقة لاحقة.\n22. **توطين ما وراء AR/EN**: لغات أخرى (FR، DE، إلخ) لاحقًا.\n23. **عملات تتجاوز الـ 5 المدعومة في المنصة (EGP، USD، EUR، SAR، AED)**: لا توجد عملات إضافية.\n24. **تطوير ميزات مخصصة لكل عميل خارج نطاق Custom Dashboards الجاهز**: التهيئة محدودة بـ widgets الموجودة في المكتبة وقوالب اللوحة، بدون كود مخصص لكل عميل.\n25. **بيانات مالية مدققة بدرجة المستثمر**: موقف الامتثال يدعم التدقيق؛ التدقيق نفسه التزام منفصل.\n\n---\n\n## المخاطر وتخفيفها\n\nمخاطر Basic (R-001..R-020) و Professional (R-021..R-040) لسه سارية. مخاطر خاصة بـ Enterprise:\n\n| ID | المخاطر | الاحتمال | الأثر | التخفيف | المالك |\n|----|---------|---------|------|---------|--------|\n| R-041 | النطاق كبير جدًا على 24 أسبوع؛ خطوط عمل متعددة تتأخر | عالٍ جدًا | حرج | قادة خطوط عمل بفرق متوازية؛ بوابات نطاق صارمة عند M3، M4، M6؛ احتجاز الأسابيع 24-26 كاحتياطي جدول (غير موعود به خارجيًا) | Project Lead |\n| R-043 | شهادة PCI Level 1 تستغرق أكثر من 9 شهور | متوسط | عالٍ | تعاقد مع QSA عند M1؛ تحليل فجوات عند M3؛ معالجة مستمرة؛ نهج تدريجي (ضوابط تعويضية أولًا) | Compliance |\n| R-044 | استعداد SOC 2 يتعارض مع سرعة الهندسة | متوسط | متوسط | Vanta/Drata لأتمتة الأدلة؛ ضوابط هندسية مدمجة من M2؛ مراجعة امتثال أسبوعية مع الهندسة | Compliance + Engineering |\n| R-045 | حادث تسريب بيانات بين قطاعات العملاء (أفراد/شركات/مجموعات/فروع) | متوسط | حرج | إطار RBAC صارم باختبارات مؤتمتة (كل PR)؛ اختبار اختراق مركز على فصل القطاعات والفروع؛ برنامج bug bounty بعد الإطلاق | Security |\n| R-046 | قواعد التسعير الديناميكي تسبب غضب العملاء (استغلال مُدرَك) | عالٍ | عالٍ | تحديد تعديلات الرفع بشدة؛ السعر المرجعي معروض دائمًا؛ شرح ودود للعلاقات العامة لنموذج التسعير؛ قدرة تراجع سريعة | Product + Comms |\n| R-047 | نموذج ML الاحتيال له معدل إيجابيات زائفة عالٍ، يحظر عملاء جيدين | عالٍ | عالٍ | عتبات محافظة عند الإطلاق؛ قائمة مراجعة للحالات الحدية؛ مراجعة إيجابيات زائفة أسبوعية؛ تواصل العملاء للمحظورين الجيدين | Fraud + Product |\n| R-049 | عملاء الشركات يطلبون ميزات مخصصة خارج النطاق | عالٍ | متوسط | العقد القياسي يستبعد التطوير المخصص؛ عملية طلب تغيير؛ يكون عندنا درجة \"مخصصة\" بتسعير مميز | Sales |\n| R-051 | تدفق تبة widgets الافتراضية لـ Custom User Dashboard - أي 8-12 widget الأهم للإطلاق؟ ومن يحدد روادمايل widgets المستقبلية؟ | Product + Design | M2 |\n\n---\n\n## ملحق A: إضافات المعمارية (مرجعي)\n\n| الطبقة | الإضافة مقابل Professional |\n|--------|---------------------------|\n| Compute | Kubernetes (**GKE على Google Cloud Platform — مقدَّمة من العميل**)، autoscaling، multi-zone، multi-region |\n| Web (Responsive) | Next.js (أو ما يعادله) مع تصميم متجاوب يخدم الكمبيوتر، التابلت، والموبايل من نفس الكود؛ PWA اختياري |\n| API Platform | API Gateway (Kong، **GCP API Gateway / Apigee**، أو داخلي)؛ بوابة مطورين |\n| المدفوعات | تكامل موحد مع PayTabs (بوابة MENA متعددة العملات) عبر hosted fields/iframes؛ webhooks لتسوية ومعاملات الاسترداد |\n| التسعير الديناميكي | خدمة مستقلة بمحرر قواعد UI؛ قواعد في DB؛ التسعير كسلسلة دوال |\n| كشف الاحتيال | خدمة مستقلة؛ نموذج ML مُقدّم عبر microservice Python (FastAPI) يُستدعى من تدفق الحجز؛ UI إدارة حالات |\n| حجز المجموعات | خدمة سير عمل مستقلة بآلة حالة (XState أو مبني على NestJS) |\n| حسابات الشركات | جزء من وظائف CRM؛ محرك سياسة منفصل |\n| الفروع المتعددة | بُعد الفرع في كل الجداول المعنية؛ استعلامات بنطاق الفرع؛ عروض UI/أدمن خاصة بالفرع |\n| Custom User Dashboards | خدمة Layout/Widgets منفصلة؛ تخطيط لكل مستخدم في DB؛ مكتبة widgets قابلة للتوسع؛ سحب وإفلات على Frontend |\n| القابلية للملاحظة | OpenTelemetry collectors؛ backend مركزي (Datadog أو Grafana stack)؛ dashboards as code |\n| أدوات الامتثال | Vanta أو Drata لجمع أدلة SOC 2؛ dashboards داخلية لضوابط PCI |\n| التعافي من الكوارث | standby دافئ متعدد المناطق؛ تكرار DB؛ تكرار تخزين عبر المناطق؛ playbooks failover مؤتمتة |\n| CI/CD | تطوير trunk-based؛ توصيل تدريجي (Argo Rollouts أو LaunchDarkly canaries)؛ تراجع مؤتمت |\n\n## ملحق B: مصفوفة ملكية خطوط العمل\n\n| خط العمل | قائد الهندسة | قائد المنتج | قائد التصميم | قائد QA |\n|------------|------------------|--------------|-------------|---------|\n| Cross-sell / Ancillaries | Backend Lead A | PM A | Designer A | QA A |\n| التسعير الديناميكي | Platform Lead | PM D | (بدون UI) | QA D |\n| المجموعات والشركات | Backend Lead A | PM A | Designer A | QA A |\n| الفروع المتعددة | Backend Lead B | PM B | Designer B | QA B |\n| Custom User Dashboards | Backend Lead B | PM C | Designer C | QA B |\n| الاحتيال | Platform Lead + Data Scientist | PM D | Designer E | QA D |\n| المنصة / الامتثال | Platform Lead | PM E | (UI محدود) | QA E + Compliance |\n\n## ملحق C: إضافات المصطلحات\n\n| المصطلح | التعريف |\n|------|------------|\n| NDC | New Distribution Capability (معيار توزيع طيران IATA) |\n| DSR | Data Subject Request (نمط GDPR) |\n| QSA | Qualified Security Assessor (مدقق PCI) |\n| CDE | Cardholder Data Environment |\n| RTO | Recovery Time Objective |\n| RPO | Recovery Point Objective |\n| SRE | Site Reliability Engineer |\n| HHI | Herfindahl-Hirschman Index |\n| BNPL | Buy Now Pay Later |\n| KYC | Know Your Customer |\n| AR | Accounts Receivable |\n| AP | Accounts Payable |\n| ESG | Environmental, Social, Governance |\n| SLO | Service Level Objective |\n| SLA | Service Level Agreement |\n| OLAP | Online Analytical Processing |\n| ML | Machine Learning |\n\n## ملحق D: التوقيعات\n\n| الدور | الاسم | التوقيع | التاريخ |\n|------|------|-----------|------|\n| الراعي التجاري (CEO) | _________________ | _________________ | _________ |\n| ممثل مجلس الإدارة | _________________ | _________________ | _________ |\n| قائد المنتج | أحمد محمود | _________________ | 2026-06-29 |\n| قائد الهندسة | _________________ | _________________ | _________ |\n| المعتمد المالي (CFO) | _________________ | _________________ | _________ |\n| مسؤول الامتثال | _________________ | _________________ | _________ |\n| المستشار القانوني | _________________ | _________________ | _________ |\n| قائد العمليات | _________________ | _________________ | _________ |\n","srs-basic":"## 🎯 ملخص فني لمجلس الإدارة (بلغة الأعمال)\n\nهذه الوثيقة هي المخطط الهندسي الكامل للنظام في الباقة الأساسية، مكتوب بلغة المهندسين. هذا الملخص يترجم محتواها إلى لغة الأعمال حتى يستطيع مجلس الإدارة فهم ما سيتم بناؤه واتخاذ القرار المناسب دون الحاجة لمراجعة كل التفاصيل التقنية.\n\n### ماذا يبنيه فريق الهندسة؟\n\n- موقع ويب حديث يعمل على الكمبيوتر والهاتف والتابلت ويدعم اللغتين العربية والإنجليزية\n- خوادم خلفية مسؤولة عن استقبال الحجوزات ومعالجة الدفعات وإصدار التذاكر\n- قاعدة بيانات آمنة تحفظ معلومات العملاء والحجوزات والمدفوعات بشكل مشفّر\n- ربط مباشر مع نظام Amadeus العالمي للبحث عن الرحلات الجوية والحصول على الأسعار اللحظية\n- ربط مع بوابة الدفع PayTabs لقبول الدفع داخل الموقع بالكامل (متعدد العملات: EGP/USD/EUR/SAR/AED)\n- نظام إرسال رسائل بريد إلكتروني تلقائية لتأكيدات الحجز وإرسال تذاكر الطيران\n- لوحة تحكم بسيطة للإدارة الداخلية لمتابعة الحجوزات والعملاء والمبيعات\n- المنصة في هذه الباقة تركز حصرياً على بيع تذاكر الطيران (Flights only) — لا توجد منتجات فنادق\n\n### كيف نضمن أن النظام آمن وموثوق؟\n\n| الضمان                          | الطريقة بلغة الأعمال                                                                  |\n| ------------------------------- | ------------------------------------------------------------------------------------- |\n| الموقع متاح دائماً               | استضافة على **Google Cloud Platform (GCP)** بضمان وقت تشغيل 99.0% (أي توقف لا يتجاوز 7 ساعات شهرياً) — حساب GCP **مقدَّم من العميل** |\n| أمان معلومات الدفع              | جميع المعاملات تمر عبر بوابات معتمدة من المصارف (PCI-DSS) ولا نخزن أرقام البطاقات     |\n| حماية بيانات العملاء            | تشفير كامل عند النقل وعند التخزين، وفصل صلاحيات الوصول لكل موظف                    |\n| نسخ احتياطية يومية              | حفظ نسخة كاملة من قاعدة البيانات يومياً، مع إمكانية الاستعادة خلال ساعتين كحد أقصى     |\n| مراقبة مستمرة                   | نظام يكتشف أي خطأ أو تأخر فور حدوثه ويرسل تنبيهات للفريق التقني                       |\n| الامتثال لحماية البيانات        | الالتزام بقانون حماية البيانات المصري وتوفير حق العميل في حذف بياناته                  |\n\n### الأرقام المهمة لاتخاذ القرار\n\n| المتغير                                      | القيمة                                       |\n| -------------------------------------------- | -------------------------------------------- |\n| عدد المستخدمين المتوقع (السنة الأولى)         | 15,000 – 25,000 مستخدم نشط                  |\n| متوسط زمن استجابة الصفحة                      | أقل من ثانيتين                              |\n| نسبة وقت تشغيل النظام (Uptime SLA)            | 99.0%                                         |\n| حجم البيانات المتوقع (السنة الأولى)            | 5 – 10 GB                                    |\n| التكاليف الشهرية للبنية التحتية (Hosting)     | حوالي 350 – 550 USD شهرياً                  |\n| عدد المهندسين العاملين على المشروع           | 3 (Backend + Frontend + DevOps بدوام جزئي)  |\n\n### اعتمادنا على الموردين الخارجيين\n\n| المورد                  | لماذا نحتاجه بلغة الأعمال                                                       |\n| ----------------------- | ------------------------------------------------------------------------------- |\n| Amadeus                 | المصدر العالمي لبيانات الرحلات الجوية والأسعار اللحظية والحجز الفعلي لتذاكر الطيران |\n| PayTabs                 | بوابة الدفع متعددة العملات (EGP/USD/EUR/SAR/AED) تقبل البطاقات المصرية والدولية وتحوّل الأموال لحسابنا |\n| Mailgun / SendGrid      | خدمة إرسال البريد الإلكتروني لتأكيدات الحجز والتذاكر بشكل موثوق                |\n| **Google Cloud Platform (GCP) — مقدَّم من العميل** | الخوادم التي يعمل عليها الموقع (Cloud Run + Cloud SQL + Cloud Storage)، مرنة ويمكن زيادة قدرتها فوراً عند الحاجة. حساب GCP مملوك للعميل وتكاليف الاستضافة الشهرية على عاتقه مباشرة         |\n\n### ما الذي يحتاج المجلس أن يعرفه؟\n\n- نحن نملك الكود المصدري وقاعدة البيانات بالكامل ولا يوجد قفل تكنولوجي على أي مورد\n- يمكن استبدال أي مورد خارجي (بوابة دفع، خدمة بريد) خلال شهر دون توقف الخدمة\n- البنية مصممة لتحمّل زيادة 10 أضعاف في عدد العملاء دون إعادة بناء\n- التكاليف الشهرية للصيانة والاستضافة محددة وقابلة للتنبؤ على مدى 3 سنوات\n\n---\n\n# مواصفات متطلبات البرنامج — Jawla Tours OTA (Basic Tier)\n\n## التحكم في الوثيقة\n\n| الحقل             | القيمة                                                  |\n| ----------------- | ------------------------------------------------------ |\n| عنوان الوثيقة     | Jawla Tours OTA — SRS (Basic Tier)                     |\n| معرّف الوثيقة     | JAWLA-SRS-BASIC                                        |\n| الإصدار           | 1.0                                                    |\n| تاريخ الإصدار     | 2026-06-29                                             |\n| الحالة            | معتمد — Baseline                                       |\n| التصنيف           | داخلي — Engineering / Product                          |\n| المالك            | Jawla Engineering                                      |\n| الإعداد           | Platform Architecture Group                            |\n| المراجعة          | CTO, Head of Product, QA Lead                          |\n| الاعتماد          | CTO                                                    |\n| التوزيع           | Engineering, Product, QA, DevOps, Security             |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ    | المؤلف              | القسم/الأقسام   | ملخص التغيير                                              |\n| ------- | ---------- | ------------------- | --------------- | --------------------------------------------------------- |\n| 0.1     | 2026-05-12 | Platform Arch Group | الكل            | المسودة الأولى (تحليل الفجوات من ورش الاكتشاف)            |\n| 0.2     | 2026-05-28 | Platform Arch Group | FR, NFR, API    | إضافة متطلبات الـ flights بعد Amadeus PoC                  |\n| 0.3     | 2026-06-10 | QA Lead             | Acceptance      | إضافة AT-001..AT-024 من مراجعة الـ BDD                    |\n| 0.4     | 2026-06-19 | Security            | Security, Auth  | تشديد إجراءات OWASP وإضافة OTP للـ refunds                |\n| 1.0     | 2026-06-29 | CTO                 | الكل            | اعتماد الـ Baseline لـ Basic Tier MVP                     |\n\n### المصطلحات\n\n| المصطلح   | المعنى                                                                            |\n| --------- | ---------------------------------------------------------------------------------- |\n| OTA       | Online Travel Agency (وكالة سفر إلكترونية)                                         |\n| PNR       | Passenger Name Record (مرجع الحجز في Amadeus)                                      |\n| GDS       | Global Distribution System                                                          |\n| BSP       | Bank Settlement Plan                                                                |\n| 3DS       | 3-D Secure (تأكيد هوية حامل البطاقة، EMV 3DS 2.x)                                  |\n| PCI DSS   | Payment Card Industry Data Security Standard                                        |\n| SCA       | Strong Customer Authentication (PSD2)                                               |\n| RBAC      | Role-Based Access Control                                                           |\n| OTP       | One-Time Password (كود لمرة واحدة عبر TOTP أو SMS أو email)                        |\n| FR        | Functional Requirement                                                              |\n| NFR       | Non-Functional Requirement                                                          |\n| AT        | Acceptance Test                                                                     |\n| BCD       | Booking Confirmation Document (e-ticket)                                            |\n\n---\n\n## المقدمة\n\n### الغرض\n\nالوثيقة دي بتحدد متطلبات الـ **Basic Tier** لمنصة *Jawla Tours*، وهي منصة Online Travel Agency.\nالـ Basic Tier ده هو نطاق الـ MVP اللي هينزل في أول إطلاق على الإنتاج في منطقة واحدة\n(eu-central-1 كـ primary من غير multi-region failover)، ومستهدف السوق المصري والعربي.\nالوثيقة بتحدد النطاق المتفق عليه والقيود ومستوى الجودة اللي فريق الـ engineering ملتزم يوصله.\n\nالجمهور المستهدف للوثيقة دي: مهندسي software، مهندسي QA، فريق DevOps، مراجعي الـ security،\nالـ product managers، والـ external auditors اللي بيعملوا مراجعة PCI scope.\n\n### النطاق\n\nالموجود ضمن نطاق الـ Basic Tier:\n\n- مسار حجز موجّه للمستهلك لـ **flights** يظهر من خلال موقع الـ Next.js التسويقي\n  الموجود حالياً، مع إضافة modules حجز محمية بـ authentication.\n- backend بـ NestJS بيوفر **حوالي 18 REST endpoint** للبحث والحجز والدفع والإشعارات.\n- مزوّد flights واحد (**Amadeus Self-Service / Enterprise Test endpoints**).\n- الدفع بالكارت عن طريق **PayTabs** (PSP واحد للـ MVP، multi-currency: EGP/USD/EUR/SAR/AED).\n- إشعارات email عن طريق مزوّد transactional (SES أو Resend).\n- console إداري بسيط لفريق الدعم لمراجعة الـ bookings والـ refunds والـ audit trail.\n  **الـ refunds اليدوية عن طريق PSP dashboard مقبولة في الـ tier ده.**\n- PayTabs بيدعم multi-currency native (EGP/USD/EUR/SAR/AED) عند الـ checkout.\n\nخارج نطاق الـ Basic Tier (مؤجل لـ Professional / Enterprise):\n\n- تطبيقات الموبايل، B2B agent portal، white-label theming، fraud ML، dynamic pricing engine.\n- إشعارات WhatsApp Business.\n- multi-region active-active deployment.\n- automated refund orchestration.\n- منتجات الفنادق، السيارات، النشاطات، أو غيرها من منتجات السفر (المنصة flights only).\n\n### التعريفات والاختصارات\n\nارجع لجدول المصطلحات اللي فوق. المصطلحات الصناعية المعيارية للسفر بتتبع\nIATA Resolution 830a وأعراف Amadeus Self-Service API.\n\n### المراجع\n\n| Ref ID | المرجع                                                                       |\n| ------ | ---------------------------------------------------------------------------- |\n| R-01   | Amadeus Self-Service API Reference (v3, retrieved 2026-05)                   |\n| R-02   | PayTabs API Reference (PayPage v3 + IPN)                                     |\n| R-03   | PCI DSS v4.0 — SAQ A-EP scoping guidance                                     |\n| R-04   | OWASP Top 10:2021 + OWASP ASVS 4.0.3 (Level 2)                               |\n| R-05   | EU GDPR Articles 5, 6, 17, 32; Egyptian Data Protection Law 151/2020         |\n| R-06   | IATA Resolution 890 (Card payment acceptance)                                |\n| R-07   | ISO 4217 (Currencies), ISO 8601 (Dates), ISO 3166-1 (Country codes)         |\n| R-08   | RFC 6749 (OAuth 2.0), RFC 7519 (JWT), RFC 6238 (TOTP)                        |\n| R-09   | WCAG 2.1 AA, EN 301 549 v3.2.1                                               |\n| R-10   | Next.js 15 App Router, NestJS 10 documentation                               |\n\n### أعراف الوثيقة\n\n- المتطلبات الـ functional بتتسمّى `FR-XXX` ولازم تكون قابلة للاختبار (ليها AT).\n- المتطلبات الـ non-functional بتستخدم `NFR-XXX`.\n- معايير القبول مكتوبة بصيغة Gherkin: `Given / When / Then`.\n- MUST، SHOULD، MAY بمعناها في RFC 2119.\n- استخدام HTTP status codes بيتبع RFC 9110.\n\n---\n\n## المتطلبات الـ Functional\n\n### Module: Authentication (FR-001 — FR-018)\n\n| ID     | المتطلب                                                                                                    | Priority |\n| ------ | ---------------------------------------------------------------------------------------------------------- | -------- |\n| FR-001 | لازم النظام يسمح بالتسجيل بـ email + password (10 حروف على الأقل، zxcvbn score ≥ 3).                       | MUST     |\n| FR-002 | لازم النظام يأكد الـ email عن طريق signed token (TTL = 24 ساعة) قبل ما يفعّل الحجز.                        | MUST     |\n| FR-003 | لازم النظام يدعم login بـ email + password ويرجع access token (15 دقيقة) + refresh token (30 يوم) JWT.     | MUST     |\n| FR-004 | لازم النظام يدعم refresh-token rotation؛ أي refresh token مستخدم مرتين لازم يلغي الـ family كلها.          | MUST     |\n| FR-005 | لازم النظام يسمح بمسار نسيان كلمة المرور عن طريق signed email link (TTL = 30 دقيقة، استخدام واحد).         | MUST     |\n| FR-006 | لازم النظام يقفل الحساب 15 دقيقة بعد 5 محاولات login فاشلة خلال 10 دقايق.                                  | MUST     |\n| FR-007 | لازم النظام يسمح بـ logout ويلغي الـ refresh token النشط.                                                  | MUST     |\n| FR-008 | لازم النظام يـ hash كلمات المرور بـ Argon2id (m=64 MiB, t=3, p=2).                                         | MUST     |\n| FR-009 | لازم النظام يسمح بتحديث الـ profile (الاسم، التليفون، locale، العملة الافتراضية للعرض).                    | MUST     |\n| FR-010 | لازم النظام يسمح بحذف الحساب، مع soft-delete للبيانات الشخصية بعد فترة سماح 30 يوم.                       | MUST     |\n| FR-011 | لازم النظام يطلب تأكيد OTP عن طريق email قبل أي refund العميل بيبدأه.                                      | MUST     |\n| FR-012 | لازم النظام يـ log كل auth event (login، logout، إعادة تعيين كلمة المرور، إصدار OTP) في الـ audit trail.   | MUST     |\n| FR-013 | المفروض النظام يدعم Google OAuth SSO (قابل للتأجيل، behind feature flag في Basic).                          | SHOULD   |\n| FR-014 | لازم النظام يفرض signature على الـ JWT بـ RS256، مع rotation للـ keys كل 90 يوم.                            | MUST     |\n| FR-015 | لازم النظام يوفّر `/auth/me` بيرجع الـ profile للمستخدم المسجّل + array الـ permissions.                    | MUST     |\n| FR-016 | لازم النظام يفرض CAPTCHA (hCaptcha) على endpoints الـ register والـ login وreset password.                  | MUST     |\n| FR-017 | لازم النظام يسمح لموظفي الدعم (role=`admin`) بانتحال شخصية مستخدم للدعم، مع تسجيل الفعل.                   | MUST     |\n| FR-018 | لازم النظام ينهي الـ sessions الخاملة بعد 24 ساعة بدون refresh، حتى لو الـ TTL مخلصش.                       | MUST     |\n\n### Module: Flights (FR-019 — FR-032)\n\n| ID     | المتطلب                                                                                                                              | Priority |\n| ------ | ------------------------------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-019 | لازم النظام يسمح بالبحث عن رحلات one-way وround-trip بـ origin، destination، departure date، return date، عدد الـ pax.               | MUST     |\n| FR-020 | لازم النظام يدعم حتى 9 ركاب في الحجز الواحد (adults+children+infants، حد IATA).                                                        | MUST     |\n| FR-021 | لازم النظام يعرض fare لكل نوع pax والـ total fare، شاملاً الضرايب ورسوم الناقل.                                                       | MUST     |\n| FR-022 | لازم النظام يـ cache ردود Amadeus flight-offer لمدة ≤ 10 دقايق بـ key على `(origin,dest,date,pax,cabin)`.                              | MUST     |\n| FR-023 | لازم النظام ينفّذ price-confirm call على Amadeus Flight Offers Price قبل عرض صفحة الـ checkout.                                       | MUST     |\n| FR-024 | لو السعر اتغيّر بأكتر من 0.5%، لازم النظام يعرض dialog تأكيد قبل ما يسمح بالـ checkout.                                                | MUST     |\n| FR-025 | لازم النظام يجمع بيانات الركاب (title، الاسم الأول/العائلة، تاريخ الميلاد، نوع/رقم/تاريخ انتهاء/بلد إصدار الوثيقة) عند الـ checkout.   | MUST     |\n| FR-026 | لازم النظام يتحقق إن صلاحية جواز السفر ≥ 6 شهور بعد تاريخ العودة.                                                                      | MUST     |\n| FR-027 | لازم النظام يصدر PNR عن طريق Amadeus Flight Create Orders بعد ما الـ payment authorization ينجح.                                       | MUST     |\n| FR-028 | لازم النظام يعيد محاولة إنشاء PNR حتى 3 مرات بـ exponential backoff على 5xx، مع إلغاء الـ charge لو كل المحاولات فشلت.                  | MUST     |\n| FR-029 | لازم النظام يدعم cabin classes: ECONOMY, PREMIUM_ECONOMY, BUSINESS, FIRST.                                                              | MUST     |\n| FR-030 | لازم النظام يدعم fare filters: عدد الـ stops، أقصى مدة، الناقلين، نافذة المغادرة.                                                       | MUST     |\n| FR-031 | لازم النظام يبعت e-ticket PDF كمرفق email خلال 60 ثانية من الـ ticketing.                                                              | MUST     |\n| FR-032 | ممكن النظام يعرض ملخص لـ baggage allowance لما الناقل يوفّره؛ غيابه مش بيمنع الحجز.                                                    | MAY      |\n\n### Module: Booking (FR-033 — FR-043)\n\n| ID     | المتطلب                                                                                                  | Priority |\n| ------ | -------------------------------------------------------------------------------------------------------- | -------- |\n| FR-033 | لازم النظام يصدر `bookingId` من السيرفر (UUIDv7) قبل بدء الدفع.                                          | MUST     |\n| FR-034 | لازم النظام يحتفظ بالحجز بـ status: `DRAFT`، `PENDING_PAYMENT`، `CONFIRMED`، `FAILED`، `CANCELLED`، `REFUNDED`. | MUST     |\n| FR-035 | لازم النظام يعتبر endpoint الحجز idempotent باستخدام `Idempotency-Key` header.                            | MUST     |\n| FR-036 | لازم النظام ينهي الـ bookings اللي بحالة `DRAFT` بعد 15 دقيقة.                                            | MUST     |\n| FR-037 | لازم النظام ينهي الـ bookings اللي بحالة `PENDING_PAYMENT` بعد 30 دقيقة (PayTabs transaction auto-expire متوافق).   | MUST     |\n| FR-038 | لازم النظام يسمح للمستخدم يشوف كل حجوزاته مقسّمة على صفحات بترتيب تنازلي بالتاريخ.                         | MUST     |\n| FR-039 | لازم النظام يسمح للمستخدم بإلغاء حجز refundable قبل deadline المزوّد.                                     | MUST     |\n| FR-040 | لازم النظام يضيف audit-log row غير قابل للتعديل لكل تغيير في الـ status.                                   | MUST     |\n| FR-041 | لازم النظام يعمل rollback لحجز المزوّد لو إصدار الـ ticket النهائي فشل.                                    | MUST     |\n| FR-042 | لازم النظام ينتج `bookingReference` (8 خانات alphanumeric، Crockford base32) معروض للمستخدم.              | MUST     |\n| FR-043 | لازم النظام يصدر domain events (`BookingConfirmed`, `BookingCancelled`) على BullMQ للمستهلكين.            | MUST     |\n\n### Module: Payment (FR-044 — FR-052)\n\n| ID     | المتطلب                                                                                                              | Priority |\n| ------ | -------------------------------------------------------------------------------------------------------------------- | -------- |\n| FR-044 | لازم النظام ينشئ PayTabs transaction بـ `auth` mode (pre-authorization) عند الـ checkout.                              | MUST     |\n| FR-045 | لازم النظام يفرض 3DS2 challenge (PayTabs `tran_class=ecom` مع 3DS مفعّل).                                              | MUST     |\n| FR-046 | لازم النظام يعمل capture للـ PayTabs transaction بعد ما إصدار الـ ticket من المزوّد ينجح.                              | MUST     |\n| FR-047 | لازم النظام يعمل reconcile عن طريق PayTabs IPN webhooks (`tran_type=Sale`, `Auth`, `Capture`, `Refund`, `Void`).        | MUST     |\n| FR-048 | لازم النظام يتحقق من signatures الـ PayTabs IPN بالـ server-key + HMAC-SHA256.                                          | MUST     |\n| FR-049 | لازم النظام يتحمل تكرار الـ webhook (idempotent على `tran_ref`).                                                        | MUST     |\n| FR-050 | لازم النظام يعرض payment-error code mapping يتحوّل لرسالة user-friendly localized.                                     | MUST     |\n| FR-051 | في Basic، ممكن الـ refunds تتعمل يدوي من Ops عن طريق PayTabs merchant dashboard؛ والنظام لازم يعمل reconcile عبر webhook. | MAY  |\n| FR-052 | لازم النظام **مايخزّنش** PAN أو CVV أو بيانات الـ track كاملة — PayTabs hosted payment page (PayPage) tokenization بس. | MUST     |\n\n### Module: Notifications (FR-053 — FR-058)\n\n| ID     | المتطلب                                                                                                      | Priority |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-053 | لازم النظام يبعت email transactional عند: تأكيد الحجز، فشل الدفع، الإلغاء، الـ refund.                        | MUST     |\n| FR-054 | لازم النظام يحط كل الإشعارات الخارجة في طابور على BullMQ (`notifications.email` queue).                       | MUST     |\n| FR-055 | لازم النظام يعيد محاولة إرسال الـ email حتى 5 مرات بـ exponential backoff (base 30 ثانية، factor 2).         | MUST     |\n| FR-056 | لازم النظام يـ localize الـ emails لـ AR (الافتراضي لمصر)، EN، FR (الـ locale يتحدد من profile المستخدم).      | MUST     |\n| FR-057 | لازم النظام يمنع الإشعارات المكررة (de-dup key = `${eventId}:${userId}:${template}`).                          | MUST     |\n| FR-058 | لازم النظام يحترم تفضيلات الإشعارات للمستخدم (الـ transactional emails مش ممكن يعمل opt-out منها).             | MUST     |\n\n### Module: Admin (FR-059 — FR-066)\n\n| ID     | المتطلب                                                                                                     | Priority |\n| ------ | ----------------------------------------------------------------------------------------------------------- | -------- |\n| FR-059 | لازم الـ admin console يسمح بالبحث في الـ bookings بـ reference، email العميل، supplier ref، status، التاريخ. | MUST     |\n| FR-060 | لازم الـ admin console يسمح بعرض تفاصيل الحجز كاملة مع الـ audit log.                                         | MUST     |\n| FR-061 | لازم الـ admin console يسمح للموظفين بإعادة إرسال notification.                                              | MUST     |\n| FR-062 | لازم الـ admin console يسمح للموظفين بتعليم الحجز كـ refunded بعد refund يدوي من PayTabs (reconciliation).    | MUST     |\n| FR-063 | لازم الـ admin console يسمح للموظفين بعرض المستخدمين (بحث بالـ email، عرض profile أساسي، آخر login).         | MUST     |\n| FR-064 | لازم الـ admin console يكون محمي بـ role `admin` ويطلب re-authentication كل 12 ساعة.                          | MUST     |\n| FR-065 | لازم الـ admin console يـ log كل فعل من الموظف بالـ actor والـ target والفرق before/after.                    | MUST     |\n| FR-066 | المفروض الـ admin console يعرض tile KPIs يومي (الحجوزات النهارده، GMV النهارده، نسبة الفشل).                  | SHOULD   |\n\n---\n\n## المتطلبات الـ Non-functional\n\n### الأداء (Performance)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-001 | endpoint البحث عن flights لازم يكون p95 latency ≤ 2.5 ثانية (شامل call الـ Amadeus)، p99 ≤ 4 ثواني.       |\n| NFR-002 | كل الـ endpoints اللي مش بتاعت مزوّد لازم تكون p95 ≤ 250 ميلي ثانية.                                     |\n| NFR-003 | Largest Contentful Paint (LCP) لصفحة الـ home ≤ 2.0 ثانية على 4G profile.                                 |\n| NFR-004 | Time-to-Interactive (TTI) لصفحة نتائج البحث ≤ 3.5 ثانية.                                                  |\n| NFR-005 | هدف نسبة الـ search cache hit ≥ 35% خلال ساعات الشغل.                                                     |\n\n### القابلية للتوسع (Scalability)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-006 | لازم النظام يتحمّل 50 RPS booking-funnel sessions مستمرة لمدة ساعة.                                       |\n| NFR-007 | لازم النظام يتحمّل 300 RPS على endpoints الـ catalog للقراءة فقط مع horizontal scale.                     |\n| NFR-008 | لازم الـ BullMQ workers تتقدر تتوسع أفقياً لـ 4 replicas من غير تعديل في الكود.                            |\n| NFR-009 | لازم اتصالات الـ Database تكون pooled عن طريق PgBouncer (transaction mode، حد أقصى 200 client conns).     |\n\n### التوافر (Availability)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-010 | الـ uptime الشهري المستهدف 99.5% (downtime ≤ 3 ساعات و39 دقيقة).                                          |\n| NFR-011 | RPO ≤ 15 دقيقة، RTO ≤ 4 ساعات للـ DR الكامل في الـ primary region.                                        |\n| NFR-012 | لازم Postgres ينشر مع synchronous standby replica واحد.                                                   |\n| NFR-013 | لازم Redis ينشر مع replica واحد + Sentinel.                                                                |\n| NFR-014 | لازم نوافذ الصيانة المخططة تتعلن قبلها بـ 72 ساعة على الأقل.                                              |\n\n### الأمان (Security)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-015 | TLS 1.2+ إلزامي على كل ingress؛ HSTS `max-age=63072000; includeSubDomains; preload`.                     |\n| NFR-016 | البيانات at rest مشفّرة بـ AES-256 (Postgres TDE، Redis disk encryption).                                |\n| NFR-017 | لازم الـ secrets تكون في **GCP Secret Manager** (FE + BE) ضمن نفس مشروع GCP الخاص بالعميل.                            |\n| NFR-018 | الثغرات بـ severity ≥ High لازم تتصلّح خلال 7 أيام؛ Critical خلال 24 ساعة.                                | \n| NFR-019 | لازم يتعمل pentest خارجي على الأقل مرة في السنة.                                                          |\n\n### التدويل (Internationalization)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-020 | لازم النظام يدعم AR (RTL)، EN، FR لكل الواجهات المعروضة للمستخدم.                                         |\n| NFR-021 | لازم كل التواريخ تتعرض بـ timezone اللي المستخدم اختاره؛ والتخزين لازم يكون UTC.                          |\n| NFR-022 | لازم كل القيم المالية تتضمن صراحة ISO 4217 currency codes.                                                |\n\n### إمكانية الوصول (Accessibility)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-023 | لازم الموقع يتوافق مع WCAG 2.1 AA (semantic landmarks، focus order، color contrast ≥ 4.5:1).             |\n| NFR-024 | لازم كل العناصر التفاعلية تكون قابلة للتشغيل بالكيبورد؛ ومؤشرات focus ظاهرة مطلوبة.                       |\n| NFR-025 | لازم الـ forms تعرض رسايل الخطأ بطريقة programmatic عن طريق `aria-describedby`.                          |\n\n### الامتثال (Compliance)\n\n| ID      | المتطلب                                                                                                  |\n| ------- | -------------------------------------------------------------------------------------------------------- |\n| NFR-026 | PCI scope: SAQ A-EP. مفيش PAN يلمس السيرفرات بتاعتنا.                                                    |\n| NFR-027 | GDPR: مسارات data-export وdata-deletion لازم تكون متاحة خلال 30 يوم من الطلب.                            |\n| NFR-028 | Cookie consent: opt-in صريح للكوكيز اللي مش أساسية؛ مع تحكم granular.                                    |\n\n---\n\n## معمارية النظام (System Architecture)\n\nالـ Basic Tier بينشر بالكامل على **Google Cloud Platform (GCP) — مقدَّمة من العميل** في region أساسي واحد، فيه Next.js على Cloud Run قدامه Cloud CDN، وNestJS API على Cloud Run تاني، مدعومة بـ Cloud SQL for PostgreSQL + Memorystore for Redis + BullMQ.\n\n```\n┌──────────┐       ┌────────────┐       ┌─────────────────────┐      ┌──────────────────────┐\n│  Client  │──TLS─▶│  Cloud CDN │──TLS─▶│   Next.js 15 (RSC)  │──┬──▶│  NestJS API          │\n│ Browser  │       │   (GCP)    │       │   Cloud Run         │  │   │  Cloud Run           │\n└──────────┘       └────────────┘       │  - Marketing pages  │  │   │  - REST controllers  │\n                                        │  - Booking funnel   │  │   │  - Domain services   │\n                                        │  - Server Actions   │  │   │  - Idempotency layer │\n                                        └─────────────────────┘  │   └──────────┬───────────┘\n                                                                 │              │\n                                                                 │              ▼\n                                                                 │      ┌───────────────┐\n                                                                 │      │  PgBouncer    │\n                                                                 │      └───────┬───────┘\n                                                                 │              ▼\n                                                                 │      ┌───────────────────────┐\n                                                                 │      │ Cloud SQL (Postgres 16)│\n                                                                 │      │ + HA Standby replica  │\n                                                                 │      └───────────────────────┘\n                                                                 │\n                                                                 ├──────────────┐\n                                                                 │              ▼\n                                                                 │      ┌────────────────────┐\n                                                                 │      │ Memorystore Redis  │\n                                                                 │      │ (cache + BullMQ)   │\n                                                                 │      └─────────┬──────────┘\n                                                                 │                ▼\n
