                             | MUST     |\n| FR-117 | يجب أن يسمح الـ dashboard بتحديث بيانات الاتصال، الـ locale، العملة، MFA، الـ sessions، وكلمة المرور.            | MUST     |\n| FR-118 | يجب أن يدير الـ dashboard المسافرين المحفوظين (CRUD) مع موافقة صريحة للحجوزات المشتركة.                          | MUST     |\n| FR-119 | يجب أن يعرض الـ dashboard خزينة وثائق السفر (جوازات، تأشيرات) مع تحذيرات انتهاء الصلاحية.                       | MUST     |\n| FR-120 | يجب أن يدير الـ dashboard البطاقات المحفوظة (PSP-token فقط؛ لا PAN أبدًا) مع حذف وضبط افتراضية.                  | MUST     |\n| FR-121 | يجب أن يسمح الـ dashboard بإلغاء ذاتي مع preview للـ refund المتوقع.                                            | MUST     |\n| FR-122 | يجب أن يعرض الـ dashboard timeline لتتبع الـ refund (requested → in_progress → settled).                      | MUST     |\n| FR-123 | يجب أن يعرض الـ dashboard workflow لطلب تصدير بيانات GDPR مع الحالة.                                            | MUST     |\n| FR-124 | يجب أن يعرض الـ dashboard workflow لحذف الحساب مع grace period لـ 30 يومًا وفحوص أمان للإلغاء.                  | MUST     |\n| FR-125 | يجب أن يعرض الـ dashboard placeholder للولاء (رصيد wallet، read-only في Pro).                                    | SHOULD   |\n| FR-126 | يجب أن يعرض الـ dashboard panel realtime لحالة الرحلة (تأخيرات، gate) للرحلات القادمة خلال 24 ساعة.            | SHOULD   |\n\n---\n\n## المتطلبات غير الوظيفية\n\n### الأداء\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-001 | بحث الطيران: p95 ≤ 2.0 ثانية (مجمّع، cache-hot ≤ 600 ms).                                     |\n| NFR-002 | بحث الفنادق المجمّع: p95 ≤ 2.5 ثانية (3 suppliers fanout، ميزانية 1.8 ثانية لكل supplier-call). |\n| NFR-003 | الـ endpoints التي لا تستدعي supplier: p95 ≤ 200 ms.                                          |\n| NFR-004 | TTFB لـ customer dashboard: p95 ≤ 350 ms.                                                     |\n| NFR-005 | استقبال الـ webhook (PSP): p95 ≤ 150 ms ack.                                                  |\n| NFR-006 | LCP ≤ 1.8 ثانية على 4G؛ CLS ≤ 0.05؛ INP ≤ 200 ms.                                            |\n\n### القابلية للتوسّع\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-007 | تحمّل 200 RPS في funnel الحجز، مع ذروة 500 RPS لمدة 10 دقائق.                                  |\n| NFR-008 | تحمّل 1000 RPS للـ catalog/search.                                                            |\n| NFR-009 | يجب أن تتوسّع workers الـ BullMQ إلى 12 replicas دون تغيير في الكود؛ مع concurrency قابل للضبط. |\n| NFR-010 | يجب أن يتحمّل Postgres حتى 600 client conns عبر PgBouncer؛ مع CPU الـ primary ≤ 60% تحت ضغط مستمر. |\n| NFR-011 | يجب أن يقوم الـ aggregator بـ shard لاستدعاءات الـ supplier عبر pool من workers لتجنّب head-of-line blocking. |\n\n### التوافر\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-012 | هدف uptime شهري 99.9% (downtime لا يزيد عن 43 دقيقة).                                        |\n| NFR-013 | RPO ≤ 5 دقائق، RTO ≤ ساعة لـ DR كاملة في الـ primary region.                                   |\n| NFR-014 | warm standby نشط في AZ ثانية؛ Postgres primary مع synchronous replica؛ كتابة بـ quorum.       |\n| NFR-015 | نشر دون downtime عبر blue/green للـ API؛ وcanary للـ FE (5% → 25% → 100%).                    |\n| NFR-016 | نوافذ الصيانة يُعلَن عنها قبل 7 أيام؛ بحد أقصى نافذتان لكل ربع سنوي، كل واحدة لا تتجاوز 30 دقيقة. |\n\n### الأمان\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-017 | TLS 1.2+، HSTS 2 سنة preload؛ OCSP stapling مفعّل.                                            |\n| NFR-018 | البيانات في الـ storage بـ AES-256؛ هرمية مفاتيح KMS-rooted مع تدوير شهري لـ DEK.              |\n| NFR-019 | كل الـ secrets في AWS Secrets Manager / HashiCorp Vault؛ ولا توضع أبدًا في env files في git.   |\n| NFR-020 | pentest أمني مرتين سنويًا؛ معالجة العالية خلال 30 يومًا، والحرجة خلال 7 أيام.                   |\n| NFR-021 | جاهزية SOC 2 Type I أثناء المستوى Pro؛ مع mapping للضوابط.                                    |\n\n### الامتثال\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-022 | شهادة PCI DSS v4.0 SAQ A-EP يتم تجديدها سنويًا.                                              |\n| NFR-023 | GDPR + قانون حماية البيانات المصري: توثيق DPIA لكل نشاط معالجة جديد.                          |\n| NFR-024 | الفوترة الضريبية: VAT لـ EG/SA حين ينطبق؛ مع رقم فاتورة تسلسلي لكل market.                    |\n| NFR-025 | حق النسيان يُنفّذ خلال 30 يومًا؛ مع أسبقية الـ legal hold.                                     |\n\n### التدويل\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-026 | كل واجهات الـ UI تدعم AR (RTL) و EN و FR؛ مع معالجة bidi واعية لـ RTL.                       |\n| NFR-027 | تنسيق التاريخ/الوقت/الأرقام عبر ICU؛ مع timezone قابل للاختيار من الـ user؛ والتخزين بـ UTC.   |\n| NFR-028 | العملة: أكواد ISO 4217 في كل مكان؛ مع banker's rounding وفق exponent العملة.                  |\n\n### إمكانية الوصول\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-029 | WCAG 2.1 AA — يُتحقّق منها عبر axe-core في الـ CI + audit يدوي ربع سنوي من استشاري accessibility. |\n| NFR-030 | mobile-first؛ مع touch targets ≥ 44×44 CSS px.                                                |\n\n---\n\n## معمارية النظام\n\n```\n                                            ┌───────────────────────────────────────┐\n                                            │            External APIs              │\n                                            │ ┌─────────┐ ┌──────────┐ ┌──────────┐ │\n                                            │ │ Amadeus │ │HotelBeds │ │ Booking  │ │\n                                            │ └─────────┘ └──────────┘ └──────────┘ │\n                                            │ ┌─────────┐ ┌──────────┐ ┌──────────┐ │\n                                            │ │ Stripe  │ │ Paymob   │ │  Adyen   │ │\n                                            │ └─────────┘ └──────────┘ └──────────┘ │\n                                            │ ┌─────────────┐ ┌───────────────────┐ │\n                                            │ │ WA Cloud API│ │ SES / Resend      │ │\n                                            │ └─────────────┘ └───────────────────┘ │\n                                            └────────────────▲──────────────────────┘\n                                                             │\n                                                             │\n┌──────────┐     ┌────────────┐     ┌──────────────┐     ┌───┴────────────────────────┐\n│  Client  │────▶│ Cloudflare │────▶│  Vercel CDN  │────▶│ Next.js 15 (App Router)    │\n│ Web/Web  │     │  (WAF/Bot) │     │     Edge     │     │ - Marketing               │\n└──────────┘     └────────────┘     └──────────────┘     │ - Customer Dashboard      │\n                                                          │ - Admin Console (RBAC)    │\n                                                          │ - Server Actions          │\n                                                          └────────────┬──────────────┘\n                                                                       │\n                                                                       ▼\n                                                          ┌────────────────────────────┐\n                                                          │       NestJS API Gateway   │\n                                                          │  - Auth + Authorization    │\n                                                          │  - Rate limit / Idempotency│\n                                                          │  - Request validation      │\n                                                          └────────────┬───────────────┘\n                                                                       │\n              ┌────────────────────────────────────────────────────────┼────────────────────┐\n              ▼                                  ▼                     ▼                    ▼\n      ┌───────────────┐                ┌───────────────┐       ┌───────────────┐    ┌───────────────┐\n      │ Flight Svc    │                │ Hotel Aggregator│     │ Booking Svc   │    │ Payment Svc   │\n      │ - Amadeus     │                │ - Amadeus       │     │ - Saga engine │    │ - PSP router  │\n      │ - cache layer │                │ - HotelBeds     │     │ - Idempotency │    │ - FX engine   │\n      │               │                │ - Booking Aff   │     │               │    │               │\n      └───────┬───────┘                └────────┬────────┘     └───────┬───────┘    └───────┬───────┘\n              │                                 │                      │                    │\n              └───────────────────┬─────────────┴──────────────────────┴────────────────────┘\n                                  ▼\n                          ┌──────────────────┐    ┌──────────────────┐\n                          │ PgBouncer        │───▶│ PostgreSQL 16    │\n                          └──────────────────┘    │ + sync standby + │\n                                                  │ 1 async replica  │\n                                                  └──────────────────┘\n                                  │\n                                  ▼\n                          ┌──────────────────┐    ┌──────────────────────────────┐\n                          │ Redis 7 (cluster)│───▶│ BullMQ workers (12 replicas) │\n                          │ cache + queues   │    │ - booking.fulfill            │\n                          └──────────────────┘    │ - notifications.{email,wa}   │\n                                                  │ - payment.refund             │\n                                                  │ - reconciliation.daily       │\n                                                  │ - aggregator.fanout          │\n                                                  └──────────────────────────────┘\n```\n\n### التنظيم الـ Hexagonal (لكل خدمة)\n\n- **Adapters in**: HTTP controllers، queue listeners، webhook receivers.\n- **Application**: use cases (إدارة الـ saga، أوامر idempotent).\n- **Domain**: entities صافية (`Booking` و `Payment` و `Offer`) + value objects (`Money`،\n  `Currency`، `Locale`).\n- **Adapters out**: PSP clients، supplier clients، repositories (Prisma)، event bus.\n\n### الحدود الـ Async\n\n- كل العمليات متعددة الخطوات (fulfillment الحجز، refunds، payouts، dunning) تعمل كـ\n  BullMQ jobs مع `attempts` و `backoff:{type:exponential, delay:1000}` ومع handlers\n  من نوع idempotent.\n- domain events يُنشَر داخليًا في in-process EventEmitter، ثم يُعاد توجيهه اختياريًا\n  إلى طابور `domain.events` في BullMQ لاستهلاكه من خدمات أخرى.\n\n---\n\n## تصميم قاعدة البيانات\n\nPostgreSQL 16، والمستوى Pro يضيف الجداول التالية فوق المستوى Basic.\n\n| الجدول                 | الغرض                                                                          |\n| ---------------------- | ----------------------------------------------------------------------------- |\n| `currencies`           | مرجع ISO 4217 + display exponent                                              |\n| `fx_rates`             | snapshots يومية للـ FX                                                        |\n| `saved_travellers`     | ملفات مسافرين قابلة لإعادة الاستخدام لكل user                                 |\n| `saved_documents`      | خزينة وثائق السفر (مُشفّرة)                                                   |\n| `saved_payment_methods`| مراجع PSP-token لكل user                                                      |\n| `carts`                | aggregate الـ cart متعدد العناصر                                              |\n| `cart_items`           | عناصر الـ cart                                                                |\n| `booking_sagas`        | حالة الـ saga لكل حجز (الخطوة، retries، errors)                                |\n| `booking_changes`      | ledger للتغييرات الإرادية (delta charge/refund)                                |\n| `supplier_mappings`    | canonical hotel ID ↔ معرّفات الـ supplier المحددة                              |\n| `supplier_payouts`     | ledger مدفوعات الـ supplier (العمولة + الصافي)                                 |\n| `psp_routes`           | جدول قواعد التوجيه (currency، BIN، amount) → PSP                              |\n| `wa_templates`         | templates الـ WhatsApp Business المعتمدة لكل locale                          |\n| `wa_messages`          | رسائل WA المُرسَلة + حالة التسليم                                              |\n| `consents`             | سجل موافقة مع version (T&C، marketing، WA)                                    |\n| `invoices`             | metadata الفاتورة الضريبية المُنتَجة + storage URL                              |\n\n### DDL الرئيسية\n\n```sql\nCREATE TABLE currencies (\n  code        CHAR(3) PRIMARY KEY,\n  name        TEXT NOT NULL,\n  exponent    SMALLINT NOT NULL,\n  symbol      TEXT\n);\n\nCREATE TABLE fx_rates (\n  as_of_date  DATE        NOT NULL,\n  base        CHAR(3)     NOT NULL REFERENCES currencies(code),\n  quote       CHAR(3)     NOT NULL REFERENCES currencies(code),\n  rate        NUMERIC(18,8) NOT NULL,\n  source      TEXT        NOT NULL,\n  margin_bps  INT         NOT NULL DEFAULT 0,\n  PRIMARY KEY (as_of_date, base, quote)\n);\n\nCREATE TABLE saved_travellers (\n  id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id      UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  title        TEXT,\n  given_name   TEXT NOT NULL,\n  family_name  TEXT NOT NULL,\n  dob          DATE NOT NULL,\n  nationality  CHAR(2),\n  ff_numbers   JSONB,\n  created_at   TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE saved_documents (\n  id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id         UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  traveller_id    UUID REFERENCES saved_travellers(id) ON DELETE CASCADE,\n  doc_type        TEXT NOT NULL,\n  doc_number_enc  BYTEA NOT NULL,         -- AES-256-GCM via KMS DEK\n  doc_number_hash BYTEA NOT NULL,         -- HMAC for lookup\n  doc_expiry      DATE NOT NULL,\n  doc_country     CHAR(2),\n  created_at      TIMESTAMPTZ NOT NULL DEFAULT now()\n);\nCREATE INDEX ON saved_documents (doc_number_hash);\n\nCREATE TABLE saved_payment_methods (\n  id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id     UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  psp         TEXT NOT NULL,\n  psp_token   TEXT NOT NULL,\n  brand       TEXT,\n  last4       CHAR(4),\n  exp_month   SMALLINT,\n  exp_year    SMALLINT,\n  is_default  BOOLEAN NOT NULL DEFAULT FALSE,\n  created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),\n  UNIQUE (user_id, psp, psp_token)\n);\n\nCREATE TABLE carts (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id        UUID REFERENCES users(id),\n  display_currency CHAR(3) NOT NULL,\n  fx_snapshot_id UUID,\n  total_minor    BIGINT NOT NULL DEFAULT 0,\n  expires_at     TIMESTAMPTZ NOT NULL DEFAULT now() + INTERVAL '20 minutes',\n  status         TEXT NOT NULL DEFAULT 'OPEN'\n                 CHECK (status IN ('OPEN','CHECKED_OUT','EXPIRED','ABANDONED'))\n);\n\nCREATE TABLE cart_items (\n  id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  cart_id     UUID NOT NULL REFERENCES carts(id) ON DELETE CASCADE,\n  item_type   TEXT NOT NULL CHECK (item_type IN ('FLIGHT','HOTEL')),\n  supplier    TEXT NOT NULL,\n  offer_id    TEXT NOT NULL,\n  offer_snapshot JSONB NOT NULL,\n  amount_minor BIGINT NOT NULL,\n  currency    CHAR(3) NOT NULL,\n  added_at    TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE booking_sagas (\n  booking_id    UUID PRIMARY KEY REFERENCES bookings(id) ON DELETE CASCADE,\n  current_step  TEXT NOT NULL,\n  attempt       INT  NOT NULL DEFAULT 0,\n  state         JSONB NOT NULL,\n  last_error    TEXT,\n  updated_at    TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE supplier_mappings (\n  canonical_id  TEXT NOT NULL,\n  supplier      TEXT NOT NULL,\n  supplier_id   TEXT NOT NULL,\n  name          TEXT,\n  PRIMARY KEY (supplier, supplier_id)\n);\nCREATE INDEX ON supplier_mappings (canonical_id);\n\nCREATE TABLE supplier_payouts (\n  id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id      UUID NOT NULL REFERENCES bookings(id),\n  supplier        TEXT NOT NULL,\n  gross_minor     BIGINT NOT NULL,\n  commission_minor BIGINT NOT NULL,\n  net_minor       BIGINT NOT NULL,\n  currency        CHAR(3) NOT NULL,\n  due_date        DATE,\n  paid_at         TIMESTAMPTZ,\n  status          TEXT NOT NULL DEFAULT 'PENDING'\n                  CHECK (status IN ('PENDING','PAID','DISPUTED','VOID'))\n);\n\nCREATE TABLE psp_routes (\n  id           SERIAL PRIMARY KEY,\n  priority     INT NOT NULL,\n  match_currency CHAR(3),\n  match_bin_country CHAR(2),\n  amount_min_minor BIGINT,\n  amount_max_minor BIGINT,\n  psp          TEXT NOT NULL,\n  is_active    BOOLEAN NOT NULL DEFAULT TRUE\n);\n\nCREATE TABLE wa_templates (\n  name        TEXT NOT NULL,\n  locale      TEXT NOT NULL,\n  category    TEXT NOT NULL,\n  meta_id     TEXT NOT NULL,\n  body        TEXT NOT NULL,\n  PRIMARY KEY (name, locale)\n);\n\nCREATE TABLE wa_messages (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id       UUID REFERENCES users(id),\n  booking_id    UUID REFERENCES bookings(id),\n  template_name TEXT NOT NULL,\n  locale        TEXT NOT NULL,\n  to_e164       TEXT NOT NULL,\n  meta_msg_id   TEXT,\n  status        TEXT NOT NULL CHECK (status IN ('queued','sent','delivered','read','failed')),\n  error_code    TEXT,\n  created_at    TIMESTAMPTZ NOT NULL DEFAULT now(),\n  delivered_at  TIMESTAMPTZ\n);\n\nCREATE TABLE consents (\n  id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id     UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  kind        TEXT NOT NULL,\n  version     TEXT NOT NULL,\n  given       BOOLEAN NOT NULL,\n  given_at    TIMESTAMPTZ NOT NULL DEFAULT now(),\n  ip_inet     INET,\n  user_agent  TEXT\n);\n\nCREATE TABLE invoices (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id    UUID NOT NULL REFERENCES bookings(id),\n  number        TEXT NOT NULL UNIQUE,\n  series        TEXT NOT NULL,\n  issued_at     TIMESTAMPTZ NOT NULL DEFAULT now(),\n  total_minor   BIGINT NOT NULL,\n  tax_minor     BIGINT NOT NULL,\n  currency      CHAR(3) NOT NULL,\n  pdf_url       TEXT NOT NULL,\n  market        TEXT NOT NULL,\n  legal_entity  TEXT NOT NULL\n);\n```\n\n---\n\n## تصميم الـ API\n\nعدد الـ endpoints: 40. الـ authentication / rate limits / error envelope موروثة من Basic.\n\n| #  | METHOD | PATH                                          | Auth        | Request                                            | Response                              | Status              |\n| -- | ------ | --------------------------------------------- | ----------- | -------------------------------------------------- | ------------------------------------- | ------------------- |\n| 1  | POST   | `/auth/register`                              | none        | `{email,password,locale,country}`                  | `{userId}`                            | 201,400,409,429     |\n| 2  | POST   | `/auth/login`                                 | none        | `{email,password,captcha}`                         | `{access,refresh}`                    | 200,401,423,429     |\n| 3  | POST   | `/auth/refresh`                               | refresh     | `{refresh}`                                        | `{access,refresh}`                    | 200,401             |\n| 4  | POST   | `/auth/logout`                                | bearer      | —                                                  | 204                                   | 204                 |\n| 5  | POST   | `/auth/mfa/totp/enroll`                       | bearer      | —                                                  | `{secret,qrUri}`                      | 200                 |\n| 6  | POST   | `/auth/mfa/totp/verify`                       | bearer      | `{code}`                                           | `{enabled:true}`                      | 200,400             |\n| 7  | POST   | `/auth/mfa/challenge`                         | bearer      | `{code}`                                           | `{stepUp:true}`                       | 200,401             |\n| 8  | POST   | `/auth/oauth/google`                          | none        | `{idToken}`                                        | `{access,refresh}`                    | 200,401             |\n| 9  | POST   | `/auth/oauth/apple`                           | none        | `{idToken}`                                        | `{access,refresh}`                    | 200,401             |\n| 10 | GET    | `/auth/sessions`                              | bearer      | —                                                  | `[Session]`                           | 200                 |\n| 11 | DELETE | `/auth/sessions/{id}`                         | bearer      | —                                                  | 204                                   | 204                 |\n| 12 | GET    | `/auth/me`                                    | bearer      | —                                                  | `User`                                | 200                 |\n| 13 | PATCH  | `/auth/me`                                    | bearer      | `Partial<User>`                                    | `User`                                | 200,400             |\n| 14 | GET    | `/catalog/currencies`                         | none        | —                                                  | `[Currency]`                          | 200                 |\n| 15 | GET    | `/catalog/fx-rate?base&quote`                 | none        | —                                                  | `{rate,asOf,marginBps}`               | 200                 |\n| 16 | POST   | `/flights/search`                             | bearer/anon | `FlightSearchReq`                                  | `{searchId,offers[]}`                 | 200,400,502         |\n| 17 | POST   | `/flights/price-check`                        | bearer      | `{offerId}`                                        | `{offerId,priceConfirmed,delta}`      | 200,409             |\n| 18 | POST   | `/flights/ancillaries`                        | bearer      | `{offerId,paxId,items[]}`                          | `{updatedTotalMinor}`                 | 200,409             |\n| 19 | POST   | `/hotels/search`                              | bearer/anon | `HotelSearchReq`                                   | `{searchId,hotels[],partial?:[]}`     | 200                 |\n| 20 | GET    | `/hotels/{hotelId}/rooms`                     | bearer/anon | check-in/out, guests                                | `{rooms[]}`                           | 200,404             |\n| 21 | POST   | `/hotels/offer/confirm`                       | bearer      | `{offerId}`                                        | `{confirmed,priceDelta}`              | 200,409             |\n| 22 | POST   | `/carts`                                      | bearer      | `{displayCurrency}`                                | `Cart`                                | 201                 |\n| 23 | POST   | `/carts/{id}/items`                           | bearer      | `{type,offerId}`                                   | `Cart`                                | 200,400             |\n| 24 | DELETE | `/carts/{id}/items/{itemId}`                  | bearer      | —                                                  | `Cart`                                | 200                 |\n| 25 | POST   | `/carts/{id}/checkout`                        | bearer      | `{contact,passengers[],paymentMethod}` + Idem      | `{bookingId,reference,paymentIntent}` | 201,409,422         |\n| 26 | GET    | `/bookings/{id}`                              | bearer      | —                                                  | `Booking`                             | 200                 |\n| 27 | GET    | `/bookings`                                   | bearer      | filters + paging                                   | `{items,nextCursor}`                  | 200                 |\n| 28 | POST   | `/bookings/{id}/cancel`                       | bearer+OTP  | `{reason,otp}`                                     | `{refundPreview,status}`              | 200,409             |\n| 29 | POST   | `/bookings/{id}/change`                       | bearer      | `{changeType,payload}`                             | `{quoteId,deltaMinor}`                | 200                 |\n| 30 | GET    | `/bookings/{id}/invoice`                      | bearer      | —                                                  | `Invoice`                             | 200                 |\n| 31 | POST   | `/payments/intents`                           | bearer      | `{cartId,paymentMethod}` + Idem                    | `{clientSecret,intentId,psp}`         | 201,409             |\n| 32 | POST   | `/payments/refunds`                           | admin/bearer+OTP | `{paymentId,amountMinor,reason}` + Idem       | `{refundId,status}`                   | 201,409             |\n| 33 | POST   | `/payments/methods`                           | bearer      | `{psp,token}`                                      | `SavedPaymentMethod`                  | 201,409             |\n| 34 | DELETE | `/payments/methods/{id}`                      | bearer      | —                                                  | 204                                   | 204                 |\n| 35 | POST   | `/notifications/preferences`                  | bearer      | `{channel,enabled}`                                | `Prefs`                               | 200                 |\n| 36 | POST   | `/webhooks/psp/{psp}`                         | sig         | PSP event                                          | 200                                   | 200,400             |\n| 37 | POST   | `/webhooks/whatsapp`                          | sig         | Meta event                                         | 200                                   | 200,400             |\n| 38 | GET    | `/admin/bookings`                             | admin       | filters                                            | `{items,nextCursor}`                  | 200                 |\n| 39 | POST   | `/admin/bookings/bulk`                        | admin       | `{ids[],action,params}`                            | `{queuedJobId}`                       | 202                 |\n| 40 | GET    | `/admin/reports/daily`                        | admin       | date                                                | `Report`                              | 200                 |\n\n### مثال: Cart Checkout\n\n```json\nPOST /carts/c_01J9.../checkout\nIdempotency-Key: 9f0a...c1\nAuthorization: Bearer ...\n\n{\n  \"contact\": { \"email\": \"ahmed@example.com\", \"phoneE164\": \"+201001234567\" },\n  \"passengers\": [\n    { \"type\": \"ADT\", \"title\": \"MR\", \"givenName\": \"Ahmed\", \"familyName\": \"Mahmoud\", \"dob\": \"1990-04-12\", \"doc\": { \"type\": \"PASSPORT\", \"number\": \"A12345678\", \"expiry\": \"2030-01-01\", \"country\": \"EG\" } }\n  ],\n  \"paymentMethod\": { \"savedMethodId\": \"spm_01J9...\" },\n  \"displayCurrency\": \"EGP\"\n}\n```\n\nالرد (201):\n\n```json\n{\n  \"bookingId\": \"bk_01J9...\",\n  \"reference\": \"JWL-7K2QZ8\",\n  \"paymentIntent\": {\n    \"psp\": \"paymob\",\n    \"intentId\": \"pi_3OnL...\",\n    \"clientSecret\": \"...\",\n    \"currency\": \"EGP\",\n    \"amountMinor\": 7800000,\n    \"requires3ds\": true\n  }\n}\n```\n\n---\n\n## Authentication و Authorization\n\n### نموذج الـ Token (الفرق عن Basic)\n\n- Access JWT لمدة 10 دقائق، refresh لمدة 30 يومًا (rotated و family-aware).\n- claims جديدة: `mfa: bool` و `mfa_methods: [\"totp\"]` و `step_up_until: <epoch>`.\n- يجب أن يكون `step_up_until >= now()` لعمليات الـ refund وتغيير وسيلة الدفع وإيقاف MFA.\n\n### الأدوار والصلاحيات\n\n| الدور            | أمثلة الصلاحيات                                                                    |\n| ---------------- | --------------------------------------------------------------------------------- |\n| customer         | `booking:*:self`، `payment:create`، `payment_method:*:self`                       |\n| support          | `booking:read:any`، `notification:resend`، `customer:view`                        |\n| ops              | `booking:write:any`، `refund:create:<=5000usd`، `supplier:health:view`            |\n| admin            | `*`                                                                               |\n| finance          | `report:export`، `reconciliation:run`، `payout:approve`                           |\n| cms_editor       | `cms:*`، `template:*`                                                             |\n\nموافقة 4-eye مفروضة على `refund:create:>5000usd` و `payout:approve`.\n\n### كلمات المرور و MFA\n\n- Argon2id (m=64MiB، t=3، p=2)، مع pepper من KMS.\n- تسجيل TOTP عبر QR + backup codes (10 أكواد كل واحد للاستخدام مرة، طول كل كود 8).\n- MFA مفروض على: الموظفين (إلزامي)، والعملاء (اختياري لكن لازم للعمليات الحساسة).\n- الـ backup codes تُخزَّن مُجزَّأة بـ Argon2id.\n\n---\n\n## الأمان\n\n### تخفيف مخاطر OWASP (الإضافات)\n\n| الخطر     | التخفيف (إضافات Pro)                                                                              |\n| --------- | ------------------------------------------------------------------------------------------------ |\n| A01       | فحص نطاق tenant عبر `userId` و `accountId` في كل قراءة؛ مع فصل الـ admin بالصلاحيات.              |\n| A02       | تشفير KMS envelope لوثائق السفر؛ مع تشفير deterministic عبر HMAC لمفاتيح البحث.                    |\n| A03       | parameterization عبر Drizzle/Prisma + تحقق Zod schema على مدخلات كل controller.                   |\n| A05       | CSP مفروض (لا report-only)؛ مع strict-dynamic + nonces.                                          |\n| A07       | TOTP MFA، step-up auth، إبطال refresh family.                                                     |\n| A09       | OpenTelemetry traces، Sentry، audit log؛ تكامل SIEM عبر Vector → ClickHouse.                     |\n| A10 SSRF  | egress proxy مع allow-list + DNS pinning؛ مع outbound NAT egress IP من نوع Lambda-style لاستخدامه في allow-list لـ supplier. |\n\n### التشفير على مستوى الحقل\n\n- أرقام وثائق السفر، صور الجوازات (object storage)، أرقام BIN للبطاقات المحفوظة (مُجزَّأة\n  لا مشفّرة) لأغراض التحليلات.\n- مفاتيح KMS لكل region؛ مع DEK لكل سجل مشفّر بـ KEK لكل tenant.\n- تدوير ربع سنوي للمفاتيح؛ تدوير فوري عند أي تسريب.\n\n### التحقق من الـ Webhook\n\n| PSP    | الطريقة                                                                              |\n| ------ | ----------------------------------------------------------------------------------- |\n| Stripe | `Stripe-Signature` HMAC-SHA256 على payload + timestamp، مع skew ±5 دقائق.            |\n| Paymob | HMAC-SHA512 لـ concatenation أساسي حسب توثيق Paymob، مع secret لكل integration.      |\n| Adyen  | HMAC-SHA256 على payload الـ Notification؛ secret لكل merchant account.               |\n| Meta   | `X-Hub-Signature-256` HMAC-SHA256 بـ app secret.                                     |\n\nكل الـ webhooks idempotent على `event.id`؛ نافذة الـ replay 24 ساعة؛ والأحداث القديمة ترجع 410 Gone.\n\n### Rate Limiting\n\n- متعدد المستويات: WAF (Cloudflare) لـ DDoS على مستوى الـ IP، وbucket في NestJS للـ\n  throttle التجاري على مستوى الـ user، وsupplier-circuit-breaker للحماية والـ fallback.\n\n### إدارة الـ Secrets\n\n- AWS Secrets Manager للوقت التشغيلي؛ مع SOPS-encrypted YAML لـ bootstrap الـ IaC.\n- تدوير الـ secrets: تدوير master الـ AWS RDS المُدار؛ وتدوير Stripe/Paymob/Adyen ربع\n  سنوي عبر runbook.\n\n---\n\n## Workflow الحجز\n\n### الـ Saga\n\n```\n                   ┌────────────────────────────────────────┐\n                   │              State Machine             │\n                   └────────────────────────────────────────┘\n   create-cart ──▶ OPEN_CART ──checkout──▶ DRAFT_BOOKING ──payment-intent──▶ PENDING_PAYMENT\n                                                                                  │\n                                              payment.succeeded webhook           │\n                                                                                  ▼\n                                                                       SAGA RUNNING\n                                                                                  │\n                          ┌───────────── step graph (per item) ──────────────────┐│\n                          ▼                                                       ▼│\n                FLIGHT.book ──▶ FLIGHT.ticket ──▶ HOTEL.book ──▶ all_ok? ──▶ CAPTURE_PAYMENT\n                          │           │              │           no              │\n                          │ failure   │ failure      │ failure                   │\n                          ▼           ▼              ▼                           ▼\n                COMPENSATE: void supplier + void payment ──▶ FAILED        CONFIRMED\n                                                                                  │\n                                                                                  ▼\n                                                                          NOTIFY (email + WA)\n```\n\n### تعريفات الخطوات (`booking_sagas.current_step`)\n\n| الخطوة                | الفعل                                            | Idem key             | Compensation                            |\n| --------------------- | ----------------------------------------------- | -------------------- | --------------------------------------- |\n| `PRICE_CONFIRM`       | إعادة تسعير العرض مع كل supplier                | bookingId            | لا شيء                                  |\n| `PAYMENT_HOLD`        | إنشاء أو استخدام PaymentIntent (manual capture) | bookingId            | إلغاء الـ PI                            |\n| `SUPPLIER_BOOK_<i>`   | إصدار PNR / حجز فندق لكل عنصر                   | bookingId+itemSeq    | إلغاء supplier (أو void uncaptured)     |\n| `PAYMENT_CAPTURE`     | عمل capture للـ PI                              | bookingId            | refund                                  |\n| `NOTIFY`              | وضع الإشعارات في الطابور                          | bookingId            | لا شيء                                  |\n| `INVOICE`             | توليد الفاتورة                                   | bookingId            | لا شيء                                  |\n\n### المهل الزمنية\n\n| الخطوة              | Hard timeout | سياسة الـ Retry                                |\n| ------------------- | ------------ | --------------------------------------------- |\n| PRICE_CONFIRM       | 8 ثواني      | محاولة retry واحدة                             |\n| PAYMENT_HOLD        | 8 ثواني      | محاولتان retry                                 |\n| SUPPLIER_BOOK_*     | 30 ثانية     | 3 retries exp backoff؛ على الأخيرة → compensate |\n| PAYMENT_CAPTURE     | 10 ثواني     | 5 retries exp backoff؛ على الأخيرة → page on-call |\n| NOTIFY              | 5 دقائق في الطابور | 5 retries                                |\n| INVOICE             | 60 ثانية     | 3 retries                                     |\n\n---\n\n## Flight Flow (إضافات Pro)\n\n- Branded fares: استدعاء ثانٍ اختياري (`Flight Offers Pricing` مع `include=detailed-fare-rules`)\n  مع cache لـ 5 دقائق.\n- Ancillaries: `Seat Map Display` و `Flight Order Management` لإضافة الـ SSR.\n- التغيير الذاتي: cancel + rebook في نفس الـ saga مع رسم/refund الفرق.\n\n```\nsearch → fanout cache → display → select → priceCheck → seat-map(opt) → checkout → PNR → ticket → SSR (ancillaries) → capture → emailtix + WA\n```\n\n---\n\n## Hotel Flow (متعدد المزوّدين)\n\n```\nclient search ──▶ aggregator.search ──┬─▶ amadeus.search   ─┐\n                                       ├─▶ hotelbeds.search ─┼─▶ merge + dedup + normalize ──▶ cache 10m ──▶ client\n                                       └─▶ booking.search    ─┘\n\nselect hotel ──▶ aggregator.rooms(canonicalHotelId)\n                  └─▶ fan-out to suppliers that have the canonical id\n                  └─▶ merge offers, prefer cheapest equivalent room\n\nselect offer ──▶ supplier-of-record routed thereafter:\n    confirm   → supplier.offerConfirm(offerId)\n    book      → supplier.book(offerId, guest)\n    cancel    → supplier.cancel(confirmation)\n```\n\n### داخل الـ Aggregator\n\n- fan-out متزامن باستخدام `Promise.allSettled` مع timeout 1.8 ثانية لكل supplier.\n- فشل الـ supplier يؤدي إلى degrade وليس فشل؛ مع banner عند `partial=true`.\n- الـ deduplication يستخدم Giata canonical ID؛ مع fallback عبر fuzzy match (الاسم + lat-lng خلال 50m).\n- المساواة: نفس فئة الـ room + نفس الـ board + نفس الـ refund flag.\n- cache طبقي: cache خام لكل supplier (60s)، وcache للرد المدمج (10 دقائق).\n\n### توليد الـ Voucher\n\n- worker `voucher.generate` يستخدم Puppeteer + template React مخصص لكل locale، ويوقّع\n  metadata الـ PDF، ويرفعه إلى S3 (`s3://jawla-prod-vouchers/{bookingId}.pdf`)، مع\n  pre-signed URL ينتهي خلال 30 يومًا.\n\n---\n\n## Payment Flow (متعدد الـ PSP، refunds آلية)\n\n### التوجيه\n\n```\nchoose_psp(currency, binCountry, amount, customerRiskScore):\n  for route in psp_routes order by priority asc:\n    if route.matches(currency, binCountry, amount):\n      return route.psp\n  return fallback (Stripe)\n```\n\nأمثلة:\n\n| الشرط                                    | PSP     |\n| ---------------------------------------- | ------- |\n| currency = EGP                           | Paymob  |\n| currency = USD، BIN country = EG         | Paymob  |\n| currency in (EUR,GBP)، amount > €1000    | Adyen   |\n| أي شيء آخر                                | Stripe  |\n\n### Flow الـ Charge (لم يتغير مفهومًا عن Basic؛ مجرد PSP-abstracted)\n\n```\nPI create ──▶ 3DS / SCA ──▶ hold (manual capture) ──▶ supplier fulfill ──▶ capture ──▶ confirm\n```\n\n### Flow الـ Refund (آلي)\n\n```\ntrigger:\n   - customer self-service cancel (within policy)\n   - ops dashboard refund\n   - rule engine (e.g., supplier-cancel auto-refund)\n\nworker payment.refund:\n   verify booking eligibility + amount cap\n   write `payments.refund_requests` row (idempotency_key)\n   call psp.refunds.create(paymentIntent, amount, currency=originalCapture, idemKey)\n   on success: payments.refunded_amount_minor += amount\n                 if fully refunded: booking.status = REFUNDED\n                 else: booking.status = PARTIAL_REFUND\n   notify customer (email + WA)\n```\n\n### الـ Reconciliation\n\n- job ليلي يجلب تقارير الـ payout من الـ PSP → ledger entries.\n- مطابقة ثلاثية: `bookings.total` ↔ `payments` ↔ `psp.payout_line`.\n- الفرق الأكبر من 0.5% يُرفع للـ finance review مع التفاصيل.\n\n---\n\n## Modules الـ Admin\n\n| الصفحة                      | الإمكانيات                                                                                |\n| --------------------------- | ----------------------------------------------------------------------------------------- |\n| KPI dashboard               | GMV، الحجوزات، التحويل، نسبة الـ refund، FX P&L، take rate — تبويبات يومي/أسبوعي/شهري.    |\n| Bookings workbench          | فلتر + bulk actions (export، refund، tag، إرسال WA)، مع quick-jump لـ customer-360.       |\n| Customer-360                | الحجوزات، المدفوعات، الإشعارات، sessions، حالة MFA، الأجهزة.                              |\n| Refund console              | طابور الـ refund، موافقات 4-eye، أداة preview للـ refund، timeline للحالة.                |\n| Dunning                     | المدفوعات الفاشلة، timeline الـ retry، retry يدوي، استبعاد من الـ auto-retry.             |\n| Supplier health             | لكل supplier latency p50/p95/p99، تفصيل الأخطاء، حالة الـ circuit-breaker.                |\n| Catalog / Hotel mapping     | رفع mappings الـ Giata، أداة audit للـ fuzzy-match، تنبيهات rate-parity.                  |\n| Finance reports             | GMV حسب الـ market، refunds حسب السبب، FX P&L، payouts الـ supplier.                     |\n| CMS                         | صفحات تسويق، banners، FAQ؛ مع localization؛ من staged → published.                       |\n| Notification templates      | تعديل النص + المتغيرات، إرسال test، version + rollback؛ metadata WhatsApp template.       |\n| Feature flags               | toggles لكل بيئة، audit، rollout بنسبة مئوية لكل user cohort.                              |\n| Users & Roles               | إدارة RBAC؛ إنشاء موظفين؛ تعيين دور؛ فرض MFA.                                            |\n| Audit log                   | غير قابل للتعديل، فلتر حسب actor / target / action؛ تصدير CSV.                            |\n| Settings                    | psp_routes، هوامش FX، سياسات retry (تقرأها الخدمات ديناميكيًا).                           |\n\n---\n\n## النشر\n\n### الـ Topology\n\n- **Frontend**: Vercel، اثنان من الـ regions (`fra1` primary و `cdg1` standby ISR mirror).\n- **Backend**: Fly.io org `jawla`، region `fra` primary + `cdg` warm standby (read-only في التشغيل العادي).\n- **Postgres**: Postgres مُدار (مثل Neon prod أو Crunchy) مع sync replica في `fra` AZ-b و async cross-region replica في `cdg`.\n- **Redis**: Upstash Cluster، multi-AZ، مع replication بين region للـ queue durability.\n- **Queues**: BullMQ broker لكل region؛ مع تقسيم الـ jobs حسب الطابور.\n- **Object storage**: S3 buckets، مع cross-region replication لـ `vouchers` و `invoices`.\n\n### الـ Pipelines\n\n| المرحلة           | الخطوات                                                                                |\n| ----------------- | ------------------------------------------------------------------------------------ |\n| lint              | `pnpm lint` و `tsc --noEmit`                                                          |\n| test:unit         | Jest + RTL، مع coverage gate ≥ 85% lines                                              |\n| test:integration  | تشغيل Postgres + Redis + WireMock للـ suppliers                                       |\n| test:contract     | Pact verify مقابل supplier stubs مثبّتة                                                |\n| build             | FE + BE؛ SBOM (cyclonedx) + Trivy + Snyk؛ توقيع الـ image (Cosign)                    |\n| deploy:preview    | Vercel preview + Fly app `pr-<n>` للـ E2E                                             |\n| e2e               | Playwright suite على الـ preview                                                       |\n| deploy:staging    | Fly + Vercel staging عند الدمج إلى `main`                                              |\n| smoke:staging     | حجز تجريبي صناعي؛ supplier sandbox                                                    |\n| deploy:prod       | موافقة يدوية → Fly blue/green + Vercel `--prod` canary 5% → 25% → 100%                |\n| post-deploy       | synthetic /healthz، error-rate watcher لمدة 30 دقيقة؛ rollback تلقائي عند التراجع     |\n\n### Environment Variables (الإضافات)\n\n| المتغير                              | الغرض                                    |\n| ------------------------------------- | ---------------------------------------- |\n| `HOTELBEDS_API_KEY`/`_SECRET`         | HotelBeds API                            |\n| `BOOKING_AFFILIATE_KEY`               | Booking Affiliate                        |\n| `PAYMOB_API_KEY`/`_HMAC_SECRET`       | Paymob                                   |\n| `ADYEN_API_KEY`/`_HMAC_SECRET`        | Adyen                                    |\n| `WABA_ACCESS_TOKEN`/`PHONE_NUMBER_ID` | WhatsApp                                 |\n| `FX_PROVIDER_KEY`                     | openexchangerates                        |\n| `KMS_KEY_ID`                          | تشفير على مستوى الحقل                     |\n\n---\n\n## Logging\n\n- Pino structured JSON.\n- الحقول المطلوبة (إضافات Pro): `tenantId` و `requestRegion` و `pspId` و `supplierId` و\n  `sagaStep` و `attempt`.\n- redaction للحقول الحساسة موسّع ليشمل: `psp_token` و `wa_token` و `doc_number` و `card_*` و\n  `iban` و `tax_id`.\n- توجيه الـ logs: stdout → Vector → ClickHouse (analytics) + S3 cold storage.\n- الاحتفاظ: 90 يومًا hot، سنتان cold؛ audit logs لمدة 7 سنوات في S3 Object Lock.\n\n---\n\n## Monitoring\n\n- الـ stack: Sentry (errors + perf)، Grafana Cloud (metrics + logs + traces)، PagerDuty.\n- OpenTelemetry SDK يصدر OTLP إلى Tempo / Loki / Mimir.\n\n### المقاييس (الإضافات)\n\n| المقياس                                 | ملاحظات                                     |\n| --------------------------------------- | ------------------------------------------- |\n| `aggregator_supplier_latency_ms`        | لكل supplier لكل op                          |\n| `aggregator_supplier_error_total`       | لكل supplier لكل error code                  |\n| `aggregator_partial_results_total`      | عدد الردود المُتردّية                          |\n| `payment_route_choice_total`            | لكل route PSP مختار                          |\n| `payment_refund_latency_ms`             | من request إلى settled                        |\n| `fx_margin_bps`                         | توزيع الـ margin المطبّق                       |\n| `wa_message_delivery_total`             | لكل حالة                                     |\n| `saga_step_duration_ms`                 | لكل خطوة                                     |\n| `saga_compensation_total`               | لكل خطوة فاشلة                                |\n\n### التنبيهات\n\n| الشرط                                                            | الخطورة  | التوجيه       |\n| --------------------------------------------------------------- | -------- | ------------ |\n| API p95 > 600 ms لمدة 5 دقائق                                    | page     | PagerDuty    |\n| نتائج الـ aggregator الجزئية > 20% لمدة 10 دقائق                  | warn     | #ops         |\n| نسبة compensation للـ saga > 2% لمدة 15 دقيقة                    | page     | PagerDuty    |\n| تأخير webhook الـ PSP > 3 دقائق                                  | page     | PagerDuty    |\n| فشل تسليم WA > 10% لمدة 15 دقيقة                                 | warn     | #ops         |\n| تجاوز SLA الـ refund (أكثر من 24h pending)                       | page     | finance OnCall |\n| تأخير الـ replication > 15 ثانية                                  | warn     | #ops         |\n| نسبة الأخطاء 5xx > 0.5% لمدة 5 دقائق                              | page     | PagerDuty    |\n| حالات auth غير طبيعية (impossible travel، brute force)            | page     | security OnCall |\n\n---\n\n## استراتيجية الاختبار\n\n| الطبقة           | الأدوات                                | الهدف                          |\n| ---------------- | -------------------------------------- | ----------------------------- |\n| Unit             | Jest                                   | 85% lines BE؛ 80% FE          |\n| Integration      | Jest + testcontainers (PG، Redis)      | كل الخدمات + repos             |\n| Contract         | Pact لكل supplier + PSP                | كل الـ adapters                |\n| Aggregator       | Property-based (fast-check)            | ثوابت الـ dedup                |\n| E2E              | Playwright (multi-locale، RTL)         | المسارات الحرجة + smoke        |\n| Load             | k6 baseline + Argo workflow            | NFR-007 / 008 sustained         |\n| Accessibility    | axe + audit يدوي WCAG                  | صفر serious                    |\n| Security         | OWASP ZAP، Burp Suite (يدوي ربع سنوي)  | صفر highs بدون تخفيف           |\n| Chaos            | Toxiproxy في supplier calls على staging | البقاء بعد تعطّل supplier واحد   |\n\n---\n\n## اختبارات القبول\n\n> إضافة للمستوى السابق: AT-001..024 من Basic تبقى سارية. وPro يضيف:\n\n| ID     | العنوان                                     | Given                                                 | When                                          | Then                                                                                  |\n| ------ | ------------------------------------------- | ----------------------------------------------------- | --------------------------------------------- | ------------------------------------------------------------------------------------- |\n| AT-025 | Multi-currency cart                         | Cart بـ EGP                                            | أحوّل displayCurrency إلى USD                  | يُعاد حساب الإجمالي عبر FX snapshot؛ مع الإفصاح عن FX margin.                          |\n| AT-026 | Saved-traveller prefill                     | لدي مسافر محفوظ                                       | أبدأ حجزًا جديدًا                              | تُملأ نماذج الـ pax تلقائيًا؛ مع toggle صريح \"use saved\".                              |\n| AT-027 | Aggregator dedup                            | 3 suppliers يردّون بنفس الفندق (Giata=X123)            | أبحث                                          | يظهر فندق واحد فقط؛ مع شارة best-price يظهر فيها supplier-of-record والسعر.            |\n| AT-028 | Supplier degradation                        | HotelBeds يحدث له timeout                              | أبحث                                          | تظهر النتائج رغم ذلك؛ مع banner `partial=true` وتلميح لإعادة المحاولة.                |\n| AT-029 | Stop-sell honor                             | Booking Affiliate يضع الفندق sold-out                  | أحاول الحجز خلال 60 ثانية                      | 409 `SUPPLIER_SOLD_OUT`؛ مع اقتراح بدائل.                                              |\n| AT-030 | Cart hold expiry                            | Cart غير نشط لمدة 21 دقيقة                             | أحاول checkout                                | 410 `CART_EXPIRED`؛ مع إعادة flow.                                                     |\n| AT-031 | Branded fare                                | شركة الطيران تكشف 3 fare bundles                       | أعرض العرض                                    | LITE/STANDARD/FLEX تظهر؛ مع السعر + المميزات لكل bundle.                                |\n| AT-032 | Ancillary baggage                           | العرض يدعم extra-bag                                   | أضيف حقيبة واحدة                              | الإجمالي يعكس سعر الـ ancillary؛ ويُضاف SSR للـ PNR وقت الـ capture.                  |\n| AT-033 | Saga rollback                               | Hotel.book يفشل بعد نجاح Flight.book                   | الـ saga تقوم بـ compensate                    | يُلغى Flight Order؛ ويتم void للدفع؛ وحالة الحجز FAILED.                              |\n| AT-034 | PSP routing — Paymob لـ EGP                 | Currency EGP                                          | أنشئ payment intent                           | PSP=`paymob`؛ والـ intent يُنشأ في Paymob.                                            |\n| AT-035 | PSP routing — Adyen لـ €1500 EUR            | Currency EUR، amount €1500                            | أنشئ payment intent                           | PSP=`adyen`.                                                                          |\n| AT-036 | Automated refund                            | إلغاء كامل من العميل ضمن السياسة                       | طلب إلغاء                                     | refund يتم آليًا عبر PSP؛ الحجز → REFUNDED؛ يُرسَل email + WA.                       |\n| AT-037 | Partial refund                              | العميل يلغي عنصرًا واحدًا من اثنين                      | طلب إلغاء                                     | refund جزئي؛ الحالة PARTIAL_REFUND؛ مع ملاحظة على الفاتورة.                            |\n| AT-038 | تأكيد WhatsApp                              | المستخدم opt-in على WA                                  | الحجز CONFIRMED                                | يُرسَل template معتمد؛ وحالة التسليم تُحدَّث عبر webhook.                              |\n| AT-039 | WA delivery fallback                        | فشل تسليم WA template                                  | تمضي 5 دقائق دون callback بـ delivered          | يُرسَل email بديل؛ ويُبلَّغ الـ admin.                                                  |\n| AT-040 | MFA TOTP enroll/verify                      | أسجّل TOTP عبر QR                                       | أدخل الكود الصحيح                              | `mfa: true`؛ تُولَّد backup codes؛ والعمليات الحساسة لاحقًا تتطلب step-up.            |\n| AT-041 | Step-up قبل الـ refund                       | أنا عميل مفعّل لديه MFA                                 | أطلب refund دون step-up حديث                    | 401 `STEP_UP_REQUIRED`؛ ومحاولة مع TOTP تنجح.                                         |\n| AT-042 | إدارة saved card                            | أضفت بطاقة عبر PSP token                                | أحذف البطاقة                                  | السجل المحفوظ يُحذف؛ ويُعاد تعيين البطاقة الافتراضية إن لزم.                            |\n| AT-043 | توليد ssional v1.0* —\n","srs-enterprise":"## 🎯 ملخص فني لمجلس الإدارة (بلغة الأعمال)\n\nهذه الوثيقة هي المخطط الهندسي الكامل للنظام في الباقة المؤسسية، وهي بنية تحتية متعددة القنوات: موقع ويب + تطبيق iOS + تطبيق Android + بوابة B2B لوكلاء السفر + محرك White-Label لإنشاء علامات تجارية فرعية. الملخص التالي يلخّص الاستثمار المطلوب والعائد المتوقع بلغة الأعمال.\n\n### ماذا يبنيه فريق الهندسة؟ (الباقة الكاملة)\n\n- تطبيق هاتف محمول كامل لنظامي iOS و Android بنفس قدرات الموقع\n- بوابة B2B لوكلاء السفر لحجز التذاكر بأسعار الجملة وتتبع العمولات تلقائياً\n- محرك White-Label لإنشاء علامات تجارية فرعية بسهولة (شركاء، فروع، امتيازات)\n- محرك تسعير ديناميكي يعدّل الأسعار حسب الطلب والوقت لرفع هامش الربح\n- نظام حجز جماعي للرحلات المدرسية والمؤتمرات والوفود الكبيرة\n- حسابات الشركات (Corporate Accounts) بفواتير شهرية وحدود ائتمان\n- لوحة إدارة متعددة الفروع تفصل بيانات كل فرع مع تقارير موحدة\n- محرك ذكاء اصطناعي لكشف الاحتيال وحماية المعاملات الكبيرة\n- منشئ الباقات السياحية (Package Builder): دمج طيران + فندق + نشاطات + تأشيرة في باقة واحدة\n- لوحة تحليلات متقدمة (BI Dashboard) لقرارات استراتيجية مبنية على البيانات\n- نظام مكافآت متدرجة لكبار المسافرين (Tier-based VIP)\n- تكامل مع برامج Frequent Flyer لشركات الطيران الرئيسية\n\n### كيف نضمن أن النظام آمن وموثوق؟\n\n| الضمان                                       | الطريقة بلغة الأعمال                                                                       |\n| -------------------------------------------- | ------------------------------------------------------------------------------------------ |\n| الموقع متاح دائماً                            | استضافة بضمان 99.9% Uptime (توقف لا يتجاوز 45 دقيقة شهرياً) مع استرداد فوري عند الأعطال         |\n| الانتشار الجغرافي متعدد المناطق              | الخوادم موزّعة على أكثر من منطقة جغرافية، وفشل منطقة كاملة لا يوقف الخدمة                   |\n| كشف الاحتيال بالذكاء الاصطناعي               | نموذج تعلّم آلي يحلل سلوك الدفع لحظياً ويوقف المعاملات المشبوهة قبل تنفيذها                 |\n| فصل بيانات كل فرع                            | كل فرع لا يرى بيانات الفروع الأخرى، مع تقارير موحدة للإدارة العامة فقط                       |\n| سجل تدقيق كامل لوكلاء B2B                    | كل عملية يقوم بها وكيل خارجي مسجّلة بالكامل لأي تحقيق مالي مستقبلي                         |\n| تشفير بيانات العملاء الحساسة (PII)           | تشفير قوي بمفاتيح مختلفة لكل فرع وعلامة تجارية فرعية                                       |\n| تجارب استرداد الكوارث الدورية                | تدريبات ربع سنوية على استعادة النظام من نسخة احتياطية كاملة خلال 4 ساعات                   |\n| مراقبة Capacity Planning                     | تنبؤ مسبق بالحاجة لزيادة الموارد قبل الذروات الموسمية (رمضان، الصيف، الأعياد)              |\n| الامتثال لمعايير PCI-DSS Level 1            | المستوى الأعلى من الامتثال لمعايير صناعة بطاقات الدفع                                       |\n| تدقيق أمني خارجي ربع سنوي                    | شركة أمن سيبراني خارجية تختبر النظام كل 3 شهور وتقدّم تقريراً للإدارة                       |\n\n### الأرقام المهمة لاتخاذ القرار\n\n| المتغير                                            | القيمة                                                  |\n| -------------------------------------------------- | ------------------------------------------------------- |\n| عدد المستخدمين المتوقع (السنة الأولى)               | 150,000 – 300,000 مستخدم نشط عبر جميع القنوات             |\n| متوسط زمن استجابة الصفحة                            | أقل من 1.2 ثانية                                       |\n| نسبة وقت تشغيل النظام (Uptime SLA)                  | 99.9%                                                    |\n| عدد المعاملات اليومية المتوقعة                       | 1,500 – 5,000 معاملة                                    |\n| عدد قنوات البيع                                     | 4 قنوات (Web + iOS App + Android App + B2B Portal)      |\n| عدد الفروع المدعومة                                 | حتى 25 فرع/علامة تجارية فرعية                          |\n| عدد العملات المدعومة                                | 10+ عملات رئيسية                                       |\n| التكاليف الشهرية للبنية التحتية                    | حوالي 2,500 – 4,000 USD شهرياً                          |\n| عدد المهندسين العاملين                              | 9 (Backend + Frontend + iOS + Android + DevOps + Data + QA + Security) |\n| العائد المتوقع على الاستثمار خلال 18 شهر           | 3.5x – 5x من الاستثمار الأصلي                            |\n\n### اعتمادنا على الموردين الخارجيين\n\n| المورد                              | لماذا نحتاجه بلغة الأعمال                                                           |\n| ----------------------------------- | ----------------------------------------------------------------------------------- |\n| Amadeus                             | المصدر العالمي للرحلات والباقات والأسعار مع عقد Enterprise بصلاحيات أوسع              |\n| Stripe                              | بوابة دفع دولية بمستوى Enterprise لقبول جميع البطاقات والمحافظ                       |\n| Paymob                              | بوابة الدفع المصرية الرئيسية للسوق المحلي                                            |\n| Adyen                               | بوابة دفع ثانوية للأسواق الأوروبية والآسيوية كبديل عن Stripe                          |\n| WhatsApp Business API               | قناة التواصل الرئيسية للعملاء والوكلاء B2B                                            |\n| Apple App Store                     | منصة توزيع تطبيق iOS — رسوم سنوية 99 USD ونسبة 15-30% من المبيعات داخل التطبيق        |\n| Google Play                         | منصة توزيع تطبيق Android — رسوم لمرة واحدة 25 USD ونسبة مماثلة                       |\n| Mailgun                             | البريد الإلكتروني التجاري لإرسال ملايين الرسائل شهرياً بأسعار منخفضة                  |\n| استضافة متعددة المناطق (AWS/GCP)    | بنية تحتية موزّعة على 3 مناطق جغرافية لضمان الانتشار العالمي                          |\n| CDN عالمي (Cloudflare)              | تسريع الموقع للعملاء في كل دول العالم وحماية من هجمات DDoS                            |\n| خدمة Fraud Detection (Sift/Stripe Radar) | محرك خارجي متخصص في كشف الاحتيال يكمل نظامنا الداخلي                                |\n\n### ما الذي يحتاج المجلس أن يعرفه؟\n\n- مقارنة مع Professional: زيادة في القدرات بنسبة 100% (مضاعفة) مقابل زيادة في السعر 65%\n- نحتاج تأسيس فريق DevOps داخلي دائم (مهندسان) لإدارة البنية التحتية المعقدة\n- تكاليف رخص متاجر التطبيقات (Apple/Google) وعمولاتها يجب إدراجها في خطة التسعير\n- النظام يحتاج تدقيق أمني مستقل (Security Audit) من شركة معتمدة قبل الإطلاق\n- محرك White-Label يفتح مصدر دخل جديد: ترخيص النظام لشركات سفر أخرى بإيراد متكرر شهري\n- بوابة B2B تتطلب فريق Sales/Account Manager لاكتساب الوكلاء وتفعيلهم\n\n---\n\n# مواصفات متطلبات البرمجيات — Jawla Tours OTA (الباقة Enterprise)\n\n## ضبط الوثيقة\n\n| الحقل             | القيمة                                                          |\n| ----------------- | -------------------------------------------------------------- |\n| عنوان الوثيقة     | Jawla Tours OTA — SRS (الباقة Enterprise)                       |\n| رقم الوثيقة       | JAWLA-SRS-ENT                                                  |\n| الإصدار           | 1.0                                                            |\n| تاريخ الإصدار     | 2026-06-29                                                     |\n| الحالة            | معتمدة — Baseline                                               |\n| التصنيف           | سرية — الهندسة / المنتج / المالية / الالتزام                    |\n| المالك            | Jawla Platform Engineering                                     |\n| إعداد             | Platform Architecture Group                                    |\n| مراجعة            | CTO, COO, رئيس المنتج، رئيس المالية، قائد QA، قائد الأمان، DPO |\n| اعتماد            | CTO + COO                                                      |\n| التوزيع           | كل الهندسة، المنتج، QA، DevOps، الأمان، المالية، الدعم، BizDev، شركاء B2B |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ    | الكاتب              | الأقسام                          | ملخص التغيير                                                                    |\n| ------- | ---------- | ------------------- | -------------------------------- | ------------------------------------------------------------------------------- |\n| 0.1     | 2026-03-09 | Platform Arch Group | الكل                             | مسودة أولى (تمتد من الباقة Pro)                                                  |\n| 0.2     | 2026-04-02 | Mobile Lead         | Mobile، Auth، Notifications      | نطاق iOS/Android الأصلي؛ push notifications عبر APNs/FCM                         |\n| 0.3     | 2026-04-21 | Product (B2B)       | Agent Portal، RBAC               | بوابة وكلاء B2B، حسابات الوكالات، حدود ائتمان، تعريفات IATA                      |\n| 0.4     | 2026-05-09 | ML Lead             | Fraud ML، Pricing                | نموذج تقييم الاحتيال + محرك التسعير الديناميكي                                    |\n| 0.5     | 2026-05-21 | Brand               | White-label، Theming             | تأجير White-label + خط أنابيب الـ theming                                        |\n| 0.6     | 2026-06-04 | DevOps              | Architecture، Deployment         | متعدد المناطق active-active؛ global anycast؛ CRR                                |\n| 0.7     | 2026-06-15 | Security            | Security، Compliance             | ضوابط SOC 2 Type II؛ تحديث نطاق PCI؛ KMS hierarchy                              |\n| 0.8     | 2026-06-22 | QA Lead             | Acceptance                       | AT-047..AT-085                                                                  |\n| 1.0     | 2026-06-29 | CTO + COO           | الكل                             | اعتماد Baseline                                                                  |\n\n### قاموس المصطلحات (إضافات الباقة Enterprise)\n\n| المصطلح      | المعنى                                                                    |\n| ------------ | ------------------------------------------------------------------------- |\n| Tenant       | علامة تجارية أو حساب معزول منطقياً (عميل white-label أو وكالة B2B)         |\n| RU           | Region Unit (مجموعة منطقة متجانسة واحدة)                                   |\n| CRDT         | Conflict-free Replicated Data Type                                        |\n| EDA          | Event-Driven Architecture                                                 |\n| Saga         | معاملة طويلة الأمد مع تعويضات                                              |\n| KEK / DEK    | Key Encryption Key / Data Encryption Key (تشفير بأسلوب envelope)          |\n| FCM / APNs   | Firebase Cloud Messaging / Apple Push Notification service                |\n| RBAC / ABAC  | تحكم في الوصول بناءً على الدور / السمات                                    |\n| OPA          | Open Policy Agent (تصريح كـ policy-as-code)                                |\n| ML-FRAUD     | خدمة تقييم الاحتيال                                                         |\n| DYN-PRICE    | محرك التسعير الديناميكي                                                    |\n| TMC          | Travel Management Company (نوع من شركاء B2B)                              |\n| BSP          | Bank Settlement Plan (IATA)                                                |\n\n---\n\n## المقدمة\n\n### الهدف\n\nهذه الوثيقة تحدد متطلبات البرمجيات لـ **الباقة Enterprise** من *Jawla Tours*.\nالباقة Enterprise توفر منصة متعددة المناطق، متعددة الـ tenants، B2B+B2C، مع\nتطبيقات native للموبايل، و white-labelling، و machine learning للاحتيال، وتسعير\nديناميكي، ومحرك ثقيل للـ queue لإدارة الـ package deals. هذه الوثيقة هي العقد\nللإصدار الكبير الثالث (هدف GA هو Q2 2027).\n\nالجمهور المستهدف من هذه الوثيقة: كل الهندسة، المنتج، QA، DevOps، الأمان،\nDPO، المالية، BizDev/B2B partner ops، والمدققين الخارجيين (SOC 2 Type II، PCI DSS،\nGDPR، PDPL السعودي، قانون حماية البيانات المصري).\n\n### النطاق\n\nضمن النطاق:\n\n- كل وظائف الباقة Basic + Professional (مفترضة؛ سيتم ذكر الجديد والمتغير فقط).\n- **متعدد المناطق active-active** (eu-central-1 + me-central-1 + ap-south-1)\n  مع توجيه read-local / write-aware.\n- **تطبيقات موبايل native** (iOS + Android، React Native 0.76 + Expo)، بنفس مميزات الويب.\n- **بوابة وكلاء B2B** لشركات TMCs ووكالات السفر مع خطوط ائتمان، markups،\n  منشئ مسارات، استيراد جماعي للركاب، تقارير BSP-CASS.\n- **theming بنظام White-label** — branding مرتبط بكل tenant (ألوان، خطوط، شعار، domain)،\n  إيميلات/قوالب مخصصة، توجيه دفع مخصص.\n- **Fraud ML** — تقييم real-time لكل محاولة حجز + فرض step-up.\n- **محرك تسعير ديناميكي** — محرك قواعد markup/discount مع hooks للمرونة.\n- **Package deals** (flight + hotel + transfer + activity) مع تجميع متوازي ثقيل\n  على الـ queue وتأكيد atomic.\n- **حوالي 70 endpoint REST** + عقود gRPC داخلية + GraphQL gateway لـ B2B.\n\n### المراجع\n\n| Ref ID | المرجع                                                                          |\n| ------ | ------------------------------------------------------------------------------- |\n| R-01   | JAWLA-SRS-PRO v1.0                                                              |\n| R-02   | Amadeus Enterprise (Production NDC + Master Pricer)                             |\n| R-03   | HotelBeds + Booking Affiliate + Expedia Rapid + Hotelston (4 موردين)            |\n| R-04   | Stripe + Paymob + Adyen + Tap (KSA/UAE alt MPMs)                                |\n| R-05   | WhatsApp Business Cloud API, APNs (Apple), FCM (Google), Mailgun                |\n| R-06   | OWASP Top 10:2021 + ASVS 4.0.3 L3 + MASVS L2 (mobile)                            |\n| R-07   | SOC 2 Type II (Security, Availability, Confidentiality)                          |\n| R-08   | PCI DSS v4.0 — SAQ A-EP + SAQ D مخصص للـ payouts                                 |\n| R-09   | GDPR، PDPL السعودي، قانون حماية البيانات المصري 151/2020، PDPL الإماراتي         |\n| R-10   | IATA Resolution 890؛ BSP Manual for Agents                                       |\n| R-11   | WCAG 2.1 AA + EN 301 549؛ إرشادات إمكانية الوصول لـ iOS/Android                  |\n| R-12   | RFC 9457 (Problem Details)، RFC 9421 (HTTP Message Signatures، حيثما ينطبق)      |\n\n---\n\n## المتطلبات الوظيفية\n\n> إضافية للباقة. حيث لا يُذكر \"*يمتد*\" فالمتطلب جديد.\n\n### Module: Authentication & Identity (FR-001 — FR-028)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-001 | *يمتد من Pro FR-001..022.*                                                                                    | MUST     |\n| FR-023 | يجب أن يدعم النظام **enterprise SSO** عبر SAML 2.0 و OIDC لمستخدمي tenants من نوع B2B.                       | MUST     |\n| FR-024 | يجب أن يدعم النظام provisioning عبر **SCIM 2.0** لـ tenants من نوع B2B (إنشاء/تحديث/تعطيل المستخدمين).        | MUST     |\n| FR-025 | يجب أن يدعم النظام passkeys بـ WebAuthn (FIDO2) للعملاء والموظفين معاً.                                       | MUST     |\n| FR-026 | يجب أن يدعم النظام إعدادات identity provider لكل tenant (IdP واحد لكل tenant؛ JIT provisioning).               | MUST     |\n| FR-027 | يجب أن يدعم النظام إعادة المصادقة البيومترية على الموبايل (Face ID / Touch ID / Android BiometricPrompt).     | MUST     |\n| FR-028 | يجب أن يصدر النظام refresh tokens مرتبطة بالجهاز للموبايل (DPoP، RFC 9449).                                   | MUST     |\n\n### Module: Flights (FR-029 — FR-046)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-029 | *يمتد من Pro FR-023..038.*                                                                                    | MUST     |\n| FR-030 | يجب أن يدعم النظام عروض NDC عند توفرها (Amadeus NDC-X + direct connects للطيران).                              | MUST     |\n| FR-031 | يجب أن يدعم النظام محتوى FareLogix/ATPCO إذا لم يُظهر Amadeus سعر مناسب.                                       | SHOULD   |\n| FR-032 | يجب أن يدعم النظام split-PNR ticketing لأكثر من 9 ركاب عبر تقسيم إنشاء الـ PNR طبقاً لقواعد IATA.              | MUST     |\n| FR-033 | يجب أن يدعم النظام فتح corporate fares لحسابات B2B مع airline ID.                                              | MUST     |\n| FR-034 | يجب أن يدعم النظام تتبع unused-ticket residual-value لكل راكب لكل شركة طيران.                                  | SHOULD   |\n| FR-035 | يجب أن يدعم النظام عمليات exchanges (تغيير التاريخ) من البداية للنهاية باستخدام NDC حيث مدعوم.                  | MUST     |\n| FR-036 | يجب أن يتكامل النظام مع Sabre / Travelport كـ GDS ثانوي لتنويع الـ inventory (failover).                       | SHOULD   |\n| FR-037 | يجب أن يدعم النظام تسعير refund اختياري حسب fare-rules في real time.                                            | MUST     |\n| FR-038 | يجب أن يدعم النظام إشعارات schedule-change اللاإرادية وفلو re-protect.                                          | MUST     |\n| FR-039 | يجب أن يدعم النظام rebook تلقائي عند الاضطرابات بموافقة العميل في حدود سياسة شركة الطيران.                      | SHOULD   |\n| FR-040 | يجب أن يلتزم النظام بمعايير IATA `OFRD` (offer-response data) لعروض NDC.                                       | MUST     |\n| FR-041 | يجب أن يدعم النظام ربط frequent-flyer تلقائياً حسب شركة الطيران من الـ profile المحفوظ.                          | MUST     |\n| FR-042 | يجب أن يُظهر النظام للمستخدم الأزواج التي تحتاج visa (إرشادي فقط، مصدره IATA TIM حيث متاح).                     | SHOULD   |\n| FR-043 | يجب أن يدعم النظام مجموعات المسافرين (8+) عبر توجيهها لـ queue الـ bulk-fares group desk.                       | SHOULD   |\n| FR-044 | يجب أن يدعم النظام ticketing مباشر EDI مع شركات طيران مختارة (مثل EgyptAir المباشر).                            | MAY      |\n| FR-045 | يجب أن يشغّل النظام **محرك التسعير الديناميكي (DYN-PRICE)** على كل عرض طيران في real time.                      | MUST     |\n| FR-046 | يجب أن يسجل النظام كل قرار من DYN-PRICE (features الإدخال، تعديل المخرجات، إصدار النموذج).                      | MUST     |\n\n### Module: Hotels (FR-047 — FR-064)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-047 | *يمتد من Pro FR-039..058.*                                                                                    | MUST     |\n| FR-048 | يجب أن يقوم الـ aggregator بعمل fan out عبر **4 موردين على الأقل** (Amadeus, HotelBeds, Booking Aff, Expedia Rapid). | MUST |\n| FR-049 | يجب أن يدعم الـ aggregator أسعار متفاوض عليها (B2B contracted) موجهة عبر pseudo-supplier اسمه \"Direct Contracts\". | MUST |\n| FR-050 | يجب أن يحسب الـ aggregator ويطبق DYN-PRICE لكل مورد لكل عرض.                                                   | MUST     |\n| FR-051 | يجب أن يدعم النظام meta-aggregation (TripAdvisor / Trivago عبر feed خارجي) للتسويق.                            | SHOULD   |\n| FR-052 | يجب أن يُظهر الـ aggregator أكواد الأسعار المتفاوض عليها فقط لـ tenants/مستخدمين B2B مصرح لهم.                 | MUST     |\n| FR-053 | يجب أن يدعم النظام نشر stop-sell عبر المناطق خلال 30 ثانية.                                                     | MUST     |\n| FR-054 | يجب أن يدعم النظام تطبيع محتوى الفنادق للـ amenities و room types و board basis (متعدد اللغات).                | MUST     |\n| FR-055 | يجب أن يكتشف النظام الفنادق المكررة عبر canonical mapping + نموذج ML للتشابه (كـ fallback).                    | MUST     |\n| FR-056 | يجب أن يقوم النظام بـ cache لاستجابات البحث الحارة إقليمياً مع invalidation عبر المناطق.                       | MUST     |\n| FR-057 | يجب أن يدعم النظام مزايدة على غرف الفنادق للـ opaque inventory (B2C فقط، معطل افتراضياً).
