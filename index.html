.                                                    | MUST     |\n| FR-147 | يجب أن يوفر النظام theming pipeline: token JSON → CSS variables مولّدة + Tailwind theme.                      | MUST     |\n| FR-148 | يجب أن يدعم النظام subdomains خاصة لكل tenant و custom apex domains أيضاً (DNS + TLS مُدار تلقائياً).         | MUST     |\n| FR-149 | يجب أن يعزل النظام بيانات الـ tenant عبر row-level security في Postgres (tenant_id في كل جدول).               | MUST     |\n| FR-150 | يجب أن يدعم النظام عملات افتراضية وأسواق مدعومة لكل tenant.                                                    | MUST     |\n\n### Module: Fraud ML (FR-151 — FR-160)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-151 | يجب أن يقيّم ML-FRAUD كل محاولة حجز في real time (p95 < 80 ms).                                                | MUST     |\n| FR-152 | يجب أن يصدر ML-FRAUD نتيجة 0–100 بالإضافة إلى reason codes (مثل `VELOCITY`، `GEO_MISMATCH`، `BIN_AAVS_FAIL`). | MUST     |\n| FR-153 | يجب أن يتسبب ML-FRAUD في: < 30 → frictionless؛ 30–70 → step-up MFA + 3DS مفروض؛ > 70 → block + مراجعة ops.   | MUST     |\n| FR-154 | يجب أن يحفظ ML-FRAUD النتيجة + features + القرار لكل حجز للقابلية للتفسير.                                    | MUST     |\n| FR-155 | يجب أن يدعم ML-FRAUD وضع shadow (يتنبأ لكن لا ينفذ) لكل cohort للـ A/B.                                       | MUST     |\n| FR-156 | يجب أن يسمح ML-FRAUD بـ overrides بناءً على قواعد (allow-list لكل email/IP/BIN) يدير الـ ops.                  | MUST     |\n| FR-157 | يجب أن يُعاد تدريب ML-FRAUD شهرياً بنتائج الـ chargeback المُصنّفة (offline pipeline).                          | MUST     |\n| FR-158 | يجب أن يراقب ML-FRAUD الـ drift عبر PSI على features رئيسية؛ تنبيه عند PSI > 0.2.                              | MUST     |\n| FR-159 | يجب أن يكون لـ ML-FRAUD إصدارات نماذج (semver) ويسمح بـ rollback عبر flag.                                    | MUST     |\n| FR-160 | يجب أن يكون ML-FRAUD قابل للتدقيق من SOC؛ القرارات ظاهرة في الـ admin وأدوات الدعم.                            | MUST     |\n\n### Module: Dynamic Pricing (FR-161 — FR-170)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-161 | يجب أن يطبق DYN-PRICE القواعد حسب أولوية: tenant override → market → channel → cohort.                       | MUST     |\n| FR-162 | يجب أن يدعم DYN-PRICE markups (موجبة) و discounts (سالبة) مع قواعد cap لكل مورد.                              | MUST     |\n| FR-163 | يجب أن يدعم DYN-PRICE elasticity hooks (A/B على ارتفاع التحويل)؛ مع تسجيل القرار.                              | MUST     |\n| FR-164 | يجب أن يسمح DYN-PRICE بقواعد مجدولة (مثل \"Black Friday + 10% خصم على الرحلات الدولية\").                       | MUST     |\n| FR-165 | يجب أن يحترم DYN-PRICE أسعار الـ floor المتعاقد عليها مع المورد (لا بيع تحتها).                                | MUST     |\n| FR-166 | يجب أن يعرض DYN-PRICE السعر النهائي فقط (بدون تسريب markup)؛ مع الاحتفاظ بـ audit.                            | MUST     |\n| FR-167 | يجب أن يدعم DYN-PRICE حل promo-code (لكل كود: خصم، الأهلية، استخدام واحد، انتهاء).                            | MUST     |\n| FR-168 | يجب أن يحاكي DYN-PRICE تأثير القاعدة على آخر 30 يوم من الحجوزات قبل التفعيل.                                  | MUST     |\n| FR-169 | يجب أن يصدر DYN-PRICE أحداث قرارات التسعير لـ BI لتقارير الأداء.                                              | MUST     |\n| FR-170 | يجب أن يسمح DYN-PRICE بـ override لكل tenant (white-label) بدون تأثير عبر الـ tenants.                        | MUST     |\n\n### Module: Mobile Apps (FR-171 — FR-180)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-171 | يجب أن تحقق تطبيقات الموبايل تكافؤ المميزات لـ: search، book، pay، manage trips، profile، MFA.                | MUST     |\n| FR-172 | يجب أن تدعم تطبيقات الموبايل إعادة المصادقة البيومترية (Face ID / Touch ID / BiometricPrompt).                | MUST     |\n| FR-173 | يجب أن تدعم تطبيقات الموبايل push notifications + deep links (universal links / app links).                   | MUST     |\n| FR-174 | يجب أن تدعم تطبيقات الموبايل عرض offline للحجوزات القادمة (cached بأمان).                                      | MUST     |\n| FR-175 | يجب أن تتكامل تطبيقات الموبايل مع Apple Pay (iOS) و Google Pay (Android) بشكل native.                         | MUST     |\n| FR-176 | يجب أن تتكامل تطبيقات الموبايل مع Wallet (PassKit / Google Wallet) لـ boarding-pass + voucher.                | SHOULD   |\n| FR-177 | يجب أن تدعم تطبيقات الموبايل step-up بيومتري للـ refunds + عمليات payment-method.                              | MUST     |\n| FR-178 | يجب أن تدعم تطبيقات الموبايل deep-link لإجراءات schedule-change re-protect.                                    | MUST     |\n| FR-179 | يجب أن تُطلق تطبيقات الموبايل عبر OTA (EAS Update) لإصلاحات الأخطاء غير الـ native.                            | MUST     |\n| FR-180 | يجب أن تكون تطبيقات الموبايل متوافقة مع MASVS L2 (بدون secrets في الـ binary، TLS pinning، جلب جذور jailbreak). | MUST    |\n\n---\n\n## المتطلبات غير الوظيفية\n\n### Performance\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-001 | flight search p95 ≤ 1.8 s محلي للمنطقة (cache-cold)، ≤ 500 ms cache-hot.                     |\n| NFR-002 | hotel aggregated search p95 ≤ 2.2 s (fanout على 4 موردين، 1.5 s budget لكل مورد).            |\n| NFR-003 | API غير المرتبط بالموردين p95 ≤ 150 ms.                                                       |\n| NFR-004 | mobile cold-start حتى home screen ≤ 1.8 s p95 على iPhone 12 / Pixel 6.                       |\n| NFR-005 | ML-FRAUD score p95 ≤ 80 ms؛ p99 ≤ 150 ms.                                                     |\n| NFR-006 | تقييم قاعدة DYN-PRICE p95 ≤ 10 ms لكل عرض.                                                    |\n| NFR-007 | webhook ingestion p95 ≤ 100 ms ack.                                                           |\n| NFR-008 | LCP ≤ 1.6 s، INP ≤ 150 ms، CLS ≤ 0.05.                                                        |\n\n### Scalability\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-009 | booking funnel يحتمل 800 RPS؛ peak 2000 RPS لمدة 15 دقيقة.                                    |\n| NFR-010 | catalog/search يحتمل 5000 RPS.                                                                |\n| NFR-011 | BullMQ workers يجب أن تتوسع حتى 40 replicas؛ packages queue يتوسع تلقائياً بشكل مستقل.        |\n| NFR-012 | Postgres يجب أن يعمل primary + 2 sync replicas + 2 async read replicas لكل منطقة.             |\n| NFR-013 | تطبيقات الموبايل يجب أن تتعامل مع 500K MAU push متزامن بدون backpressure.                     |\n\n### Availability\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-014 | هدف uptime شهري 99.95% (≤ 21.6 دقيقة downtime).                                                |\n| NFR-015 | RPO ≤ 1 دقيقة (cross-region async replication)، RTO ≤ 15 دقيقة لفقدان منطقة كاملة.            |\n| NFR-016 | multi-region active-active مع anycast DNS + توجيه واعي بالمنطقة (latency).                    |\n| NFR-017 | auto-failover عند تدهور صحة المنطقة (composite health check يفشل 3× في 60 ثانية).             |\n| NFR-018 | read-after-write consistency داخل المنطقة؛ eventual بين المناطق (≤ 5 s للقراءات).             |\n| NFR-019 | deploys بدون downtime عبر blue/green؛ قناة OTA للموبايل لـ rollback لتغييرات FE فقط.           |\n\n### Security\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-020 | TLS 1.3 مفضل؛ HSTS preload؛ OCSP stapling؛ مجموعات cipher بـ PFS فقط.                         |\n| NFR-021 | البيانات في الـ rest بـ AES-256 مع KEK جذر من KMS؛ DEK لكل tenant يتم rotation شهرياً.        |\n| NFR-022 | secrets في Vault (B2B-grade)؛ credentials ديناميكية قصيرة العمر لوصول الـ DB.                  |\n| NFR-023 | SOC 2 Type II — Security، Availability، Confidentiality — تدقيق سنوي.                         |\n| NFR-024 | PCI DSS v4.0 — SAQ A-EP لـ B2C؛ SAQ D-SP محدد النطاق لـ payouts للموردين.                     |\n| NFR-025 | pentest خارجي ربع سنوي؛ داخلي شهري؛ بوابات OPA policy في CI.                                  |\n| NFR-026 | mobile MASVS L2؛ certificate pinning؛ تخزين آمن لـ refresh tokens (Keychain/Keystore).        |\n\n### Compliance & Privacy\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-027 | GDPR، PDPL السعودي، قانون حماية البيانات المصري 151/2020، PDPL الإماراتي محترمة جميعها مع data residency إقليمية. |\n| NFR-028 | DSR (export/delete/restrict) SLA: 30 يوم؛ متتبع في الـ admin.                                  |\n| NFR-029 | data residency: حجوزات KSA مخزنة في me-central-1؛ EU في eu-central-1؛ الافتراضي eu.           |\n| NFR-030 | right-to-be-forgotten محترم خلال 30 يوم إلا إذا كان flag legal-hold مفعل.                      |\n| NFR-031 | cookie consent لكل منطقة مع تحكم granular؛ consent ledger.                                     |\n\n### I18N / A11Y\n\n| ID      | المتطلب                                                                                       |\n| ------- | -------------------------------------------------------------------------------------------- |\n| NFR-032 | AR (RTL)، EN، FR، ES — دعم كامل شامل الإيميلات، PDFs، والموبايل.                              |\n| NFR-033 | WCAG 2.1 AA + إمكانية الوصول لمنصات الموبايل (VoiceOver، TalkBack).                            |\n| NFR-034 | كل المبالغ تُعرض بأكواد ISO 4217 صريحة؛ فواصل تجميع/عشرية واعية باللغة.                        |\n| NFR-035 | تنسيق تاريخ/وقت خاص باللغة عبر ICU.                                                            |\n\n---\n\n## معمارية النظام\n\n```\n                                          GLOBAL ANYCAST / LATENCY-BASED ROUTING\n                                                       │\n              ┌────────────────────────────────────────┼────────────────────────────────────────┐\n              │                                        │                                        │\n        ┌─────▼──────┐                          ┌─────▼──────┐                            ┌─────▼──────┐\n        │  Region 1  │                          │  Region 2  │                            │  Region 3  │\n        │  eu-central│                          │ me-central │                            │  ap-south  │\n        └─────┬──────┘                          └─────┬──────┘                            └─────┬──────┘\n              │                                        │                                        │\n        ┌─────▼──────────────────────────────────────────────────────────────────────────────────▼─────┐\n        │                              SHARED CONTROL PLANE (multi-region)                              │\n        │  • Identity (Auth0 / Cognito federated)   • Config Service     • Feature Flags                │\n        │  • Audit Log (write to local + replicate to central)           • Vault                        │\n        └────────────────────────────────────────────────────────────────────────────────────────────────┘\n\n   ┌───────────────────────────────── Per-Region Stack (Region 1 expanded) ─────────────────────────────────┐\n   │                                                                                                       │\n   │ Mobile (iOS/Android RN)                 Web (Next.js 15)                  B2B Portal (Next.js, RBAC)  │\n   │      │                                       │                                    │                  │\n   │      ▼                                       ▼                                    ▼                  │\n   │  ┌─────────────────────────────── API Gateway (per region) ──────────────────────────────┐           │\n   │  │ Cloudflare WAF → Cloudflare Workers (edge auth / smart cache) → ALB → NestJS Gateway   │           │\n   │  └────────────────────────────────────────┬────────────────────────────────────────────────┘           │\n   │                                            │                                                          │\n   │  ┌────────────────────────┬─────────────────────────────┬─────────────────────────┐                  │\n   │  ▼                        ▼                             ▼                         ▼                  │\n   │ Flight Svc            Hotel Aggregator              Booking Svc                Payment Svc            │\n   │ (Amadeus,            (Amadeus, HotelBeds,           (saga engine,             (PSP router,            │\n   │  Sabre/Travelport,    Booking, Expedia,              package builder,         FX engine,              │\n   │  NDC)                 Hotelston)                     atomic ops)              Fraud-ML hook,          │\n   │                                                                                Tap/Stripe/Adyen/      │\n   │                                                                                Paymob)                │\n   │     │                       │                              │                           │              │\n   │     └───────────┬───────────┴──────────────────────────────┴───────────────────────────┘              │\n   │                 ▼                                                                                     │\n   │           Identity Svc ─ Auth ─ MFA ─ WebAuthn ─ SAML/OIDC ─ SCIM                                     │\n   │                                                                                                       │\n   │  ┌────────────────────────────┬────────────────────────────┬────────────────────────────┐            │\n   │  ▼                            ▼                            ▼                            ▼            │\n   │ Notifications Svc        ML-FRAUD Svc (Python)        DYN-PRICE Svc            CMS / Theming Svc      │\n   │ (push, email,             (FastAPI + xgboost/                                                          │\n   │  WA, SSE)                  isolation-forest)                                                            │\n   │                                                                                                       │\n   │  Data plane (per region):                                                                              │\n   │   ┌──────────────┐   ┌──────────────┐   ┌──────────────┐   ┌──────────────┐                            │\n   │   │ Postgres 16  │   │ Redis 7      │   │ S3 / R2      │   │ ClickHouse   │                            │\n   │   │ primary +    │   │ cluster      │   │ vouchers/    │   │ analytics +  │                            │\n   │   │ 2 sync       │   │ + BullMQ     │   │ invoices     │   │ ML features  │                            │\n   │   │ + 2 async    │   │              │   │              │   │              │                            │\n   │   └──────────────┘   └──────────────┘   └──────────────┘   └──────────────┘                            │\n   │                                                                                                       │\n   │  Async backbone (per region): NATS JetStream + cross-region mirroring for `domain.events`             │\n   └───────────────────────────────────────────────────────────────────────────────────────────────────────┘\n```\n\n### استراتيجية Multi-Region\n\n- DNS عبر Cloudflare؛ توجيه latency-based مثبت على أقرب منطقة سليمة للمستخدم.\n- writes تذهب للـ primary في المنطقة المحلية؛ cross-region eventual replication (logical\n  replication، عادة < 5 ثانية).\n- read-after-write داخل المنطقة (sticky session header `X-Jawla-Region`).\n- bookings + payments موجهة إلى \"source-region\" sticky طوال مدة الـ saga.\n- الـ tenants موسومين بـ **home region** للالتزام (data residency).\n\n### Internal Communication\n\n- north-south: REST + GraphQL (لبوابة وكلاء B2B).\n- east-west: gRPC + NATS JetStream (events).\n- service mesh: Linkerd (mTLS).\n\n---\n\n## تصميم قاعدة البيانات\n\nPostgreSQL 16 مع row-level security و per-region sharding. كل جدول يحتوي\n`tenant_id UUID NOT NULL`؛ سياسة RLS الافتراضية `USING (tenant_id = current_setting('app.tenant_id')::uuid)`.\n\n### جداول Enterprise (الزيادة على Pro)\n\n| الجدول                 | الهدف                                                                          |\n| ---------------------- | ----------------------------------------------------------------------------- |\n| `tenants`              | سجل الـ tenants (white-label + B2B)                                            |\n| `tenant_branding`      | tokens الـ theme، الشعارات، الخطوط                                              |\n| `tenant_legal`         | overrides للصفحات القانونية                                                     |\n| `tenant_psp_routes`    | توجيه PSP خاص بالـ tenant                                                       |\n| `tenant_markups`       | قواعد markup الـ DYN-PRICE الخاصة بالـ tenant                                  |\n| `agencies`             | profile وكالة B2B (الاسم القانوني، IATA، BSP)                                  |\n| `agency_users`         | الوكلاء داخل الوكالة                                                            |\n| `agency_credit`        | حدود الائتمان + الاستخدام + الكشوف                                              |\n| `agency_markups`       | إعداد markup على مستوى الوكالة                                                  |\n| `quotes`               | quotes محفوظة لكل agent / عميل                                                 |\n| `packages`             | قوالب packages محفوظة                                                          |\n| `package_components`   | المكونات لكل package                                                           |\n| `dynpricing_rules`     | قواعد محرك DYN-PRICE                                                           |\n| `dynpricing_logs`      | القرارات المسجلة                                                                |\n| `mlfraud_scores`       | نتائج الاحتيال + features لكل حجز                                              |\n| `chargebacks`          | سجل الـ chargeback                                                              |\n| `disputes`             | disputes يبدأها العميل                                                          |\n| `schedule_changes`     | أحداث schedule-change من الناقل + إجراءات re-protect                            |\n| `data_subject_requests`| تذاكر DSR لـ GDPR/PDPL                                                          |\n| `device_tokens`        | tokens الـ APNs/FCM لكل user/device                                            |\n| `push_messages`        | سجل الـ push + حالة التسليم                                                     |\n| `webhooks_outbound`    | تسجيلات webhook خارجية + retries للتسليم (لـ B2B)                              |\n| `feature_flags`        | flags لكل env / لكل tenant / لكل cohort                                        |\n| `bsp_reports`          | سجل تصدير IATA BSP-CASS                                                        |\n| `direct_contracts`     | عقود فنادق متفاوض عليها                                                         |\n\n### مقتطفات DDL\n\n```sql\nCREATE TABLE tenants (\n  id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  slug         TEXT NOT NULL UNIQUE,\n  legal_name   TEXT NOT NULL,\n  home_region  TEXT NOT NULL CHECK (home_region IN ('eu-central-1','me-central-1','ap-south-1')),\n  status       TEXT NOT NULL DEFAULT 'ACTIVE' CHECK (status IN ('ACTIVE','SUSPENDED','ARCHIVED')),\n  created_at   TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE tenant_branding (\n  tenant_id    UUID PRIMARY KEY REFERENCES tenants(id) ON DELETE CASCADE,\n  tokens_json  JSONB NOT NULL,\n  logo_url     TEXT,\n  favicon_url  TEXT,\n  font_family  TEXT,\n  domains      TEXT[] NOT NULL DEFAULT '{}',\n  updated_at   TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE agencies (\n  id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  tenant_id    UUID NOT NULL REFERENCES tenants(id),\n  legal_name   TEXT NOT NULL,\n  iata_number  TEXT,\n  bsp_country  CHAR(2),\n  status       TEXT NOT NULL DEFAULT 'ACTIVE',\n  created_at   TIMESTAMPTZ NOT NULL DEFAULT now()\n);\nCREATE INDEX ON agencies (tenant_id);\n\nCREATE TABLE agency_users (\n  user_id      UUID PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,\n  agency_id    UUID NOT NULL REFERENCES agencies(id) ON DELETE CASCADE,\n  role         TEXT NOT NULL CHECK (role IN ('agency_admin','agent','viewer','finance')),\n  created_at   TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE agency_credit (\n  agency_id        UUID PRIMARY KEY REFERENCES agencies(id) ON DELETE CASCADE,\n  currency         CHAR(3) NOT NULL,\n  limit_minor      BIGINT NOT NULL,\n  utilized_minor   BIGINT NOT NULL DEFAULT 0,\n  payment_terms    TEXT NOT NULL DEFAULT 'NET30',\n  updated_at       TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE quotes (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  agency_id     UUID REFERENCES agencies(id),\n  agent_user_id UUID REFERENCES users(id),\n  customer_email CITEXT,\n  payload       JSONB NOT NULL,\n  total_minor   BIGINT NOT NULL,\n  currency      CHAR(3) NOT NULL,\n  status        TEXT NOT NULL CHECK (status IN ('OPEN','EXPIRED','CONVERTED','VOID')),\n  expires_at    TIMESTAMPTZ NOT NULL,\n  created_at    TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE packages (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  tenant_id     UUID NOT NULL REFERENCES tenants(id),\n  type          TEXT NOT NULL CHECK (type IN ('TEMPLATE','DYNAMIC')),\n  config        JSONB NOT NULL,\n  is_active     BOOLEAN NOT NULL DEFAULT TRUE,\n  created_at    TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE package_components (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  package_id    UUID NOT NULL REFERENCES packages(id) ON DELETE CASCADE,\n  component_type TEXT NOT NULL CHECK (component_type IN ('FLIGHT','HOTEL','TRANSFER','ACTIVITY')),\n  config        JSONB NOT NULL,\n  required      BOOLEAN NOT NULL DEFAULT TRUE,\n  seq           INT NOT NULL\n);\n\nCREATE TABLE dynpricing_rules (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  tenant_id     UUID REFERENCES tenants(id),\n  priority      INT NOT NULL,\n  name          TEXT NOT NULL,\n  conditions    JSONB NOT NULL,\n  action        JSONB NOT NULL,  -- {type: 'markup', value: 5.0, mode: 'pct', cap: 200}\n  effective_from TIMESTAMPTZ NOT NULL,\n  effective_to   TIMESTAMPTZ,\n  is_active     BOOLEAN NOT NULL DEFAULT TRUE\n);\n\nCREATE TABLE mlfraud_scores (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id     UUID NOT NULL REFERENCES bookings(id),\n  model_version  TEXT NOT NULL,\n  score          NUMERIC(5,2) NOT NULL,\n  decision       TEXT NOT NULL CHECK (decision IN ('ALLOW','CHALLENGE','BLOCK','SHADOW')),\n  reason_codes   TEXT[] NOT NULL DEFAULT '{}',\n  features       JSONB NOT NULL,\n  created_at     TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE chargebacks (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  payment_id     UUID NOT NULL REFERENCES payments(id),\n  psp            TEXT NOT NULL,\n  case_id        TEXT NOT NULL,\n  reason_code    TEXT,\n  amount_minor   BIGINT NOT NULL,\n  currency       CHAR(3) NOT NULL,\n  due_date       DATE,\n  status         TEXT NOT NULL CHECK (status IN ('OPEN','EVIDENCE_REQUIRED','SUBMITTED','WON','LOST','EXPIRED')),\n  evidence_url   TEXT,\n  created_at     TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE schedule_changes (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id     UUID NOT NULL REFERENCES bookings(id),\n  change_type    TEXT NOT NULL CHECK (change_type IN ('SCHEDULE','CANCEL','EQUIPMENT')),\n  detected_at    TIMESTAMPTZ NOT NULL DEFAULT now(),\n  new_payload    JSONB,\n  customer_action TEXT CHECK (customer_action IN ('PENDING','ACCEPT','REJECT','REPROTECT')),\n  resolved_at    TIMESTAMPTZ\n);\n\nCREATE TABLE data_subject_requests (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id        UUID NOT NULL REFERENCES users(id),\n  kind           TEXT NOT NULL CHECK (kind IN ('EXPORT','DELETE','RESTRICT','PORTABILITY')),\n  status         TEXT NOT NULL CHECK (status IN ('OPEN','IN_PROGRESS','COMPLETED','REJECTED')),\n  due_at         TIMESTAMPTZ NOT NULL,\n  legal_hold     BOOLEAN NOT NULL DEFAULT FALSE,\n  notes          TEXT,\n  created_at     TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE device_tokens (\n  id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id      UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  platform     TEXT NOT NULL CHECK (platform IN ('ios','android','web-push')),\n  token        TEXT NOT NULL,\n  app_version  TEXT,\n  device_model TEXT,\n  last_seen    TIMESTAMPTZ NOT NULL DEFAULT now(),\n  is_active    BOOLEAN NOT NULL DEFAULT TRUE,\n  UNIQUE (platform, token)\n);\n\nCREATE TABLE webhooks_outbound (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  tenant_id      UUID NOT NULL REFERENCES tenants(id),\n  url            TEXT NOT NULL,\n  secret         BYTEA NOT NULL,\n  events         TEXT[] NOT NULL,\n  is_active      BOOLEAN NOT NULL DEFAULT TRUE,\n  failure_count  INT NOT NULL DEFAULT 0,\n  last_status    INT,\n  created_at     TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE feature_flags (\n  key            TEXT NOT NULL,\n  tenant_id      UUID,\n  env            TEXT NOT NULL,\n  enabled        BOOLEAN NOT NULL,\n  rollout_pct    SMALLINT,\n  cohort         JSONB,\n  updated_at     TIMESTAMPTZ NOT NULL DEFAULT now(),\n  PRIMARY KEY (key, COALESCE(tenant_id, '00000000-0000-0000-0000-000000000000'::uuid), env)\n);\n\nCREATE TABLE bsp_reports (\n  id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  agency_id      UUID NOT NULL REFERENCES agencies(id),\n  period_start   DATE NOT NULL,\n  period_end     DATE NOT NULL,\n  total_minor    BIGINT NOT NULL,\n  currency       CHAR(3) NOT NULL,\n  pdf_url        TEXT,\n  csv_url        TEXT,\n  status         TEXT NOT NULL CHECK (status IN ('DRAFT','SUBMITTED','SETTLED'))\n);\n```\n\n### الـ Indexes\n\n- كل أعمدة `tenant_id` بها index؛ multi-column indexes للاستعلامات الحارة المرتبطة بـ tenant.\n- `bookings(tenant_id, status, created_at DESC)` لجداول زمنية للـ tenant.\n- GIN على أعمدة JSONB للـ filtering الـ ad-hoc.\n- BRIN indexes للجداول الزمنية (`audit_events`، `dynpricing_logs`،\n  `mlfraud_scores`).\n\n---\n\n## تصميم الـ API\n\n70 endpoint. يرث endpoints الباقة Pro. المصادقة عبر JWT أو API key لكل tenant\n(B2B). كل الـ endpoints multi-tenant عبر header `X-Jawla-Tenant: <slug>` (يُحل في الـ\ngateway).\n\n| #               | none        | 200      |\n| 21 | GET    | `/catalog/currencies`                            | none        | 200      |\n| 22 | GET    | `/catalog/fx-rate?base&quote`                    | none        | 200      |\n| 23 | POST   | `/flights/search`                                | optional    | 200      |\n| 24 | POST   | `/flights/price-check`                           | bearer      | 200      |\n| 25 | POST   | `/flights/ancillaries`                           | bearer      | 200      |\n| 26 | POST   | `/flights/exchange`                              | bearer      | 200      |\n| 27 | POST   | `/flights/seat-map`                              | bearer      | 200      |\n| 28 | POST   | `/flights/refund-quote`                          | bearer      | 200      |\n| 29 | POST   | `/hotels/search`                                 | optional    | 200      |\n| 30 | GET    | `/hotels/{hotelId}/rooms`                        | optional    | 200      |\n| 31 | POST   | `/hotels/offer/confirm`                          | bearer      | 200      |\n| 32 | POST   | `/packages/search`                               | bearer      | 200      |\n| 33 | POST   | `/packages/build`                                | bearer      | 200      |\n| 34 | POST   | `/transfers/search`                              | bearer      | 200      |\n| 35 | POST   | `/activities/search`                             | bearer      | 200      |\n| 36 | POST   | `/carts`                                         | bearer      | 201      |\n| 37 | POST   | `/carts/{id}/items`                              | bearer      | 200      |\n| 38 | DELETE | `/carts/{id}/items/{itemId}`                     | bearer      | 200      |\n| 39 | POST   | `/carts/{id}/promo-code`                         | bearer      | 200      |\n| 40 | POST   | `/carts/{id}/checkout`                           | bearer      | 201      |\n| 41 | GET    | `/bookings/{id}`                                 | bearer      | 200      |\n| 42 | GET    | `/bookings`                                      | bearer      | 200      |\n| 43 | POST   | `/bookings/{id}/cancel`                          | bearer+OTP  | 200      |\n| 44 | POST   | `/bookings/{id}/change`                          | bearer      | 200      |\n| 45 | POST   | `/bookings/{id}/reprotect`                       | bearer      | 200      |\n| 46 | GET    | `/bookings/{id}/invoice`                         | bearer      | 200      |\n| 47 | POST   | `/bookings/{id}/dispute`                         | bearer      | 201      |\n| 48 | POST   | `/payments/intents`                              | bearer      | 201      |\n| 49 | POST   | `/payments/refunds`                              | admin+OTP   | 201      |\n| 50 | POST   | `/payments/methods`                              | bearer      | 201      |\n| 51 | DELETE | `/payments/methods/{id}`                         | bearer      | 204      |\n| 52 | POST   | `/webhooks/psp/{psp}`                            | sig         | 200      |\n| 53 | POST   | `/webhooks/whatsapp`                             | sig         | 200      |\n| 54 | POST   | `/notifications/preferences`                     | bearer      | 200      |\n| 55 | GET    | `/notifications/inbox`                           | bearer      | 200      |\n| 56 | POST   | `/notifications/devices`                         | bearer      | 201      |\n| 57 | DELETE | `/notifications/devices/{id}`                    | bearer      | 204      |\n| 58 | POST   | `/agencies`                                      | admin       | 201      |\n| 59 | GET    | `/agencies/{id}`                                 | agency_admin| 200      |\n| 60 | POST   | `/agencies/{id}/users`                           | agency_admin| 201      |\n| 61 | GET    | `/agencies/{id}/credit`                          | agency_admin| 200      |\n| 62 | POST   | `/agencies/{id}/quotes`                          | agent       | 201      |\n| 63 | POST   | `/agencies/{id}/bookings`                        | agent       | 201      |\n| 64 | GET    | `/agencies/{id}/bsp-report?period=`              | finance     | 200      |\n| 65 | POST   | `/admin/tenants`                                 | admin       | 201      |\n| 66 | PATCH  | `/admin/tenants/{id}/branding`                   | admin       | 200      |\n| 67 | POST   | `/admin/dynpricing/rules`                        | admin       | 201      |\n| 68 | POST   | `/admin/dynpricing/simulate`                     | admin       | 200      |\n| 69 | POST   | `/admin/fraud/overrides`                         | ops         | 201      |\n| 70 | POST   | `/admin/feature-flags`                           | admin       | 200      |\n\n### Outbound Webhooks (B2B)\n\n`POST {tenant.webhook_url}` موقع بـ HMAC-SHA256 على body + timestamp باستخدام\nsecret خاص بالـ tenant. الأحداث:\n\n- `booking.created`، `booking.confirmed`، `booking.cancelled`، `booking.refunded`،\n  `payment.refunded`، `payment.chargeback`، `schedule.change.detected`،\n  `supplier.health.degraded`.\n\nالتسليم: at-least-once مع exponential backoff (1s، 8s، 64s، 5m، 30m، 2h، 12h)؛\nحد أقصى 7 محاولات، ثم dead-letter.\n\n---\n\n## المصادقة والتصريح\n\n### نموذج Tokens\n\n- access JWT 10 دقائق، refresh 30 يوم (rotated، family-aware). الموبايل يستخدم\n  refresh tokens مرتبطة بـ DPoP.\n- claims جديدة: `tenant_id`، `agency_id?`، `mfa: bool`، `step_up_until: <epoch>`،\n  `region`، `risk: 0..100`.\n- refresh tokens مخزنة بـ hash؛ الـ rotation يلغي السابق؛ إعادة الاستخدام →\n  العائلة كلها تُبطل.\n\n### Identity Providers\n\n- B2C: email/password، Google، Apple، WebAuthn passkey.\n- B2B: SAML 2.0 + OIDC لكل tenant؛ دورة حياة المستخدم بـ SCIM 2.0؛ MFA إجباري لأدوار\n  finance/admin.\n- Mobile: refresh مرتبط بالجهاز مع WebAuthn أو إعادة مصادقة بيومترية.\n\n### نموذج التصريح\n\n- **RBAC** للدور على مستوى عام + **ABAC عبر OPA** للقرارات الدقيقة\n  (نطاق الـ tenant، نطاق الـ agency، نطاق المنطقة).\n- bundles من OPA policies موقعة؛ تُحمل عند البدء؛ hot-reload عند تحديث الـ bundle.\n- policy نموذجية:\n\n```rego\npackage jawla.authz\n\ndefault allow = false\n\nallow {\n  input.action == \"booking:read\"\n  input.subject.tenant_id == input.resource.tenant_id\n  some role\n  role := input.subject.roles[_]\n  role_can_read_booking[role]\n}\n\nrole_can_read_booking[\"customer\"] {\n  input.subject.user_id == input.resource.user_id\n}\nrole_can_read_booking[\"agency_admin\"] {\n  input.subject.agency_id == input.resource.agency_id\n}\nrole_can_read_booking[\"admin\"]\nrole_can_read_booking[\"support\"]\n```\n\n### MFA\n\n- TOTP (RFC 6238)، WebAuthn (FIDO2)، backup codes.\n- step-up مطلوب لـ: refunds، عمليات payment-method، تعطيل MFA، تعيين الأدوار،\n  تغييرات theming الـ white-label.\n\n---\n\n## الأمان\n\n### تخفيفات OWASP / ASVS L3 (الزيادة)\n\n| المجال                       | التحكم                                                                                                    |\n| ---------------------------- | -------------------------------------------------------------------------------------------------------- |\n| Authentication               | WebAuthn، DPoP، عائلات refresh، كشف الشذوذ (impossible travel)                                            |\n| Authorization                | bundles OPA policy، RLS في Postgres، deny-by-default                                                      |\n| Cryptography                 | KMS hierarchy، rotation شهري للـ DEK، AES-256-GCM مع AAD، RSA-OAEP للـ envelope                          |\n| Input Validation             | Zod في كل مكان؛ فرض schema على مستوى الـ gateway؛ JSON-Schema للـ webhooks الخارجية                       |\n| Logging/Monitoring           | SIEM (Vector → Sumo/ELK)، audit مركزي؛ الوصول مراجع ربع سنوياً                                            |\n| Mobile                       | MASVS L2؛ cert pinning؛ كشف jailbreak/root (إعلامي)؛ تخزين آمن                                            |\n| SSRF / Egress                | egress gateway مع allow-list، DNS pinning، شروط signed-URL لسحب البائعين                                  |\n| Supply Chain                 | صور موقعة بـ Cosign، SBOMs (CycloneDX)، Snyk في CI، حماية branch في GitHub                                |\n| Insider                      | credentials DB just-in-time عبر Vault؛ PAM (Teleport) لـ prod shell؛ تسجيل الجلسات                        |\n\n### التشفير\n\n- KMS hierarchy: AWS KMS root → KEK لكل منطقة → DEK لكل tenant → DEK لكل سجل.\n- تشفير على مستوى الحقل (AES-256-GCM) لـ: أرقام مستندات السفر، تفاصيل BIN لبطاقات\n  B2B، عناوين العملاء، نسب commission الوكلاء.\n- تخزين الكائنات SSE-KMS؛ lifecycle إلى Glacier Deep Archive بعد سنة.\n\n### PCI DSS\n\n- SAQ A-EP لـ B2C (حقول مستضافة من PSP).\n- نطاق SAQ D-SP لـ payouts الموردين (لأننا نوجه حركة الأموال)؛ تدقيق سنوي\n  في الموقع + ASV scan ربع سنوي؛ التقسيم مختبر سنوياً.\n\n### برامج الالتزام\n\n- SOC 2 Type II — Security، Availability، Confidentiality. كتالوج التحكم في\n  Vanta/Drata؛ تدقيق سنوي.\n- DPIA GDPR لكل نشاط معالجة جديد؛ موافقة DPO؛ record-of-processing.\n- DPAs خاصة بالـ tenant متاحة؛ قائمة sub-processors عامة.\n\n### Rate Limiting\n\n- Edge (Cloudflare): DDoS + bot fight.\n- App (NestJS): token-bucket لكل (route، principal) — الـ principal ممكن يكون user،\n  agency، tenant، أو IP.\n- تكيفي: ML-FRAUD high score → حدود أضيق.\n\n### Secrets\n\n- HashiCorp Vault (HA cluster، auto-unseal عبر KMS).\n- credentials ديناميكية لـ Postgres (TTL 15 دقيقة) لكل خدمة.\n- secrets ثابتة (3rd-party API keys) rotation ربع سنوي مع runbooks.\n\n---\n\n## Workflow الحجز\n\n### Saga (Enterprise، يدرك الـ packages)\n\n```\n            cart.checkout\n                │\n                ▼\n       DRAFT_BOOKING ──▶ (ML-FRAUD pre-screen) ──blocked──▶ FAILED (fraud)\n                │                                   │\n                │                                   challenge → step-up MFA\n                ▼\n        PENDING_PAYMENT\n                │\n                │  payment_intent.succeeded webhook\n                ▼\n         SAGA RUNNING\n                │\n                │  per-component step graph (parallelized for packages)\n                │  ┌──────────────────────┬──────────────────────┬──────────────────────┐\n                ▼  ▼                      ▼                      ▼                      ▼\n         FLIGHT.book         HOTEL.book           TRANSFER.book          ACTIVITY.book\n                │                      │                      │                      │\n                └──────────────────────┴──────────────────────┴──────────────────────┘\n                                            │\n                                            ▼\n                                       all_ok? ────no──▶ COMPENSATE (cancel all confirmed components, void payment)\n                                            │ yes                          │\n                                            ▼                              ▼\n                                  PAYMENT_CAPTURE                    FAILED (compensated)\n                                            │\n                                            ▼\n                                  INVOICE + NOTIFY (multi-channel)\n                                            │\n                                            ▼\n                                       CONFIRMED\n```\n\n### قواعد التعويض\n\n- لكل إجراء مورد مؤكد، يوجد compensator مكتوب بنوع (إلغاء PNR،\n  إلغاء حجز فندق، إلغاء transfer، إلغاء activity).\n- إذا فشل التعويض، الحجز يُوقف في `MANUAL_OPS_REQUIRED` مع تنبيه ورابط runbook في الـ admin.\n\n### المهل (Enterprise)\n\n| الخطوة            | hard timeout | إعادة المحاولة                          |\n| ----------------- | ------------ | --------------------------------------- |\n| pre-fraud check   | 80 ms        | لا شيء (fallthrough = ALLOW عند timeout) |\n| price confirm     | 6 s          | 1 retry                                  |\n| supplier book     | 25 s لكل واحد | 3 retries exp                            |\n| payment capture   | 8 s          | 5 retries exp                            |\n| notify            | 5 min queued | 5 retries                                |\n| invoice           | 60 s         | 3 retries                                |\n\n### Idempotency\n\n- `Idempotency-Key` UUIDv7 مطلوب على كل POST يغير الحالة.\n- مخزن 24 ساعة مع hash للاستجابة + status؛ الـ replays ترجع الاستجابة الأصلية.\n- محدد النطاق لكل tenant (key namespace = tenant).\n\n---\n\n## Flow الطيران (Enterprise)\n\n```\nsearch ──▶ multi-source fanout (Amadeus + Sabre/NDC + direct connects + corporate fares)\n        ──▶ DYN-PRICE applied per offer\n        ──▶ ML-FRAUD bin-pre-check (cookie features) for B2C\n        ──▶ cache 10m per source\n        ──▶ merge + dedup + sort\n        ──▶ display\n\nselect ──▶ priceCheck via source-of-record\nancillaries ──▶ branded fare / bag / seat / SSR\ncheckout ──▶ saga\n   - PRE_FRAUD: ML-FRAUD scoring (block / challenge / allow)\n   - PAYMENT_HOLD: PSP route via tenant config + ML-FRAUD signal\n   - PNR: source-of-record bookFlow\n   - TICKET: issue via supplier\n   - CAPTURE: capture PSP\n   - POST: invoice + notify (push + WA + email)\n\nexchange flow ──▶ NDC change endpoints where supported; otherwise cancel+rebook saga with delta\n```\n\n---\n\n## Flow الفنادق (fanout على 4 موردين، أسعار متعاقد عليها)\n\n```\nsearch                ──▶ aggregator.search(canonicalCity, dates, guests)\n                             ├─▶ amadeus, hotelbeds, booking-aff, expedia-rapid\n                             ├─▶ + direct-contracts (B2B authorized)\n                             ├─▶ DYN-PRICE per offer\n                             └─▶ dedup via canonical mapping + ML similarity\ndetail                ──▶ aggregator.rooms(canonicalHotelId)\noffer.confirm         ──▶ supplier-of-record offer confirmation\ncheckout              ──▶ saga (FRAUD → PAYMENT_HOLD → HOTEL.book → CAPTURE → notify)\npost-confirmation     ──▶ voucher (multilingual, tenant-branded) + push + WA + email + wallet\nschedule_changes      ──▶ supplier event → re-protect workflow + customer notify\n```\n\n---\n\n## Flow الدفع (multi-PSP + fraud + B2B credit)\n\n### B2C\n\n```\nquote ──▶ fraud preview ──▶ PSP route (currency, BIN, fraud score, tenant route table)\n       ──▶ Tap / Stripe / Paymob / Adyen\n       ──▶ 3DS (forced if challenge or PSD2)\n       ──▶ hold ──▶ supplier book ──▶ capture ──▶ confirm\n```\n\n### B2B (credit-line)\n\n```\nquote ──▶ agency credit available?\n            yes ──▶ debit credit + supplier book + invoice on monthly cycle\n            no  ──▶ require partial card top-up (split-pay) or block\n\nsettle ──▶ end-of-month invoice + statement export (PDF + CSV)\n        ──▶ BSP-CASS report per IATA period\n```\n\n### Refunds\n\n```\ntrigger (customer | ops | rule) ──▶ refund saga\n   - eligibility check (policy + state + chargeback)\n   - PSP refund (or credit-note for B2B)\n   - per-leg supplier refund (component-level)\n   - notify\n```\n\n### دورة حياة Chargeback\n\n```\nPSP webhook (chargeback.opened) ──▶ chargebacks row OPEN\n                                         │\n                                         ▼\n                                 ops auto-evidence assembly (booking, IP, OTP, 3DS, supplier acceptance)\n                                         │\n                                         ▼\n                                   SUBMITTED ──▶ PSP arbitration ──▶ WON / LOST\n                                                                              │\n                                                                              ▼\n                                                                       if LOST: post-mortem + ML feedback\n```\n\n---\n\n## Admin Modules\n\nراجع FR-109..126 للقائمة. بالإضافة لما في Pro:\n\n| الصفحة                          | الإمكانيات                                                                  |\n| ------------------------------- | ------------------------------------------------------------------------- |\n| Tenants                         | إنشاء، تعليق، branding، domains، صفحات قانونية، PSP routes                |\n| DYN-PRICE                       | CRUD للقواعد، محرر priority، simulator، تاريخ A/B                          |\n| ML-FRAUD                        | histograms للنتائج، audit للقرارات، override allow-list، rollback النموذج |\n| Region health                   | حركة لكل منطقة، معدل الخطأ، replication lag، نسبة edge cache hit          |\n| Queues                          | عمق BullMQ لكل queue، عمر أقدم job، معدل الفشل، زر requeue                |\n| Chargebacks                     | الحالات المفتوحة، تجميع تلقائي لحزمة الأدلة، workflow الإرسال              |\n| Disputes                        | disputes العملاء، رفع أدلة، pipeline الحالة                                |\n| Schedule changes                | re-protect جماعي، قوالب comms للعملاء لكل تغيير                            |\n| BSP / CASS                      | تقارير دورية، exports، إرسالات IATA                                        |\n| Content CMS                     | تسويق، مدونة، عروض، banners مع variants لكل tenant                        |\n| Promo / Coupon engine           | CRUD للأكواد، قواعد الأهلية، الاسترداد، حماية احتيال                       |\n| Audit                           | بحث faceted، CSV export، browser للاحتفاظ                                  |\n| DSR Console                     | حالات DSR، الساعة التنظيمية، legal hold                                    |\n| Incident Response               | لوحة الحالة، runbooks، postmortems                                         |\n| Release Mgmt                    | محرر feature-flag، استهداف cohort، kill-switches                          |\n| Agency Mgmt                     | onboarding، credit، mark-ups، تقارير BSP، commission                      |\n| Direct Contracts                | استقبال عقود فنادق مباشرة، نوافذ صلاحية، مراقبة                            |\n\n---\n\n## النشر\n\n### الـ Topology\n\n- **Frontend (Next.js)**: Vercel مع deployment متعدد المناطق + edge functions في\n  3 مناطق؛ builds الموبايل عبر EAS مع قنوات `production` + `staging` منفصلة.\n- **Backend**: Kubernetes (EKS/GKE) لكل منطقة؛ ArgoCD GitOps؛ Helm charts؛\n  Linkerd mTLS mesh.\n- **Database**: Postgres مُدار لكل منطقة مع logical replication؛ pgvector\n  extension لعمليات بحث نموذج تشابه الفنادق.\n- **Cache/Queue**: ElastiCache for Redis Cluster لكل منطقة + cross-region replication\n  للـ queues؛ NATS JetStream للأحداث.\n- **Object storage**: S3 مع cross-region replication؛ Glacier Deep Archive.\n- **CDN/WAF**: Cloudflare global anycast + WAF + bot management.\n\n### CI/CD\n\n| المرحلة            | الخطوات                                                                              |\n| ------------------ | ------------------------------------------------------------------------------------ |\n| lint               | eslint، prettier، tsc                                                                |\n| test:unit          | Jest، RTL، ≥ 85% lines                                                               |\n| test:integration   | testcontainers + WireMock                                                            |\n| test:contract      | Pact verify لكل supplier + PSP                                                       |\n| test:e2e           | Playwright لكل منطقة لكل لغة                                                          |\n| test:mobile        | Detox على simulator + EAS Build smoke                                                |\n| build              | docker buildx multi-arch؛ Cosign sign؛ SBOM CycloneDX؛ Snyk + Trivy                 |\n| deploy:preview     | Vercel preview + per-PR k8s namespace                                                |\n| deploy:staging     | ArgoCD sync عند merge إلى `main`                                                     |\n| smoke:staging      | حجز اصطناعي flight+hotel+package                                                      |\n| deploy:prod        | موافقة يدوية → تدريجي (canary لكل منطقة)                                              |\n| post-deploy        | OTel synthetic check؛ auto-rollback عند تراجع SLO                                    |\n| mobile:OTA         | EAS Update channel deploy لإصلاحات FE فقط                                            |\n\n### متغيرات البيئة (إضافات على Pro)\n\n| المتغير                          | الهدف                                                  |\n| -------------------------------- | ------------------------------------------------------ |\n| `EXPEDIA_RAPID_KEY`/`_SECRET`    | Expedia Rapid                                          |\n| `TAP_API_KEY`/`_SECRET`          | Tap Payments                                           |\n| `APNS_KEY_ID`/`_TEAM_ID`/`_P8`   | APNs auth                                              |\n| `FCM_SERVICE_ACCOUNT`            | FCM v1                                                 |\n| `SAML_IDP_METADATA_<tenant>`     | metadata SAML لكل tenant                               |\n| `OPA_BUNDLE_URL`                 | bundle policy لـ OPA                                   |\n| `MLFRAUD_API_URL`/`_TOKEN`       | خدمة ML-FRAUD                                          |\n| `DYN_PRICE_API_URL`              | خدمة DYN-PRICE                                          |\n| `NATS_URL`                       | event bus                                              |\n| `VAULT_ADDR`/`VAULT_ROLE`        | Vault                                                  |\n| `KMS_KEY_ARN_<region>`           | KMS لكل منطقة                                          |\n\n---\n\n## Logging\n\n- Pino (Node) + structlog (خدمات Python ML).\n- الحقول المطلوبة: `ts`، `level`، `service`، `region`، `tenant_id`، `actor_id`،\n  `correlation_id`، `trace_id`، `span_id`، `route`، `msg`.\n- التوجيه: stdout → Vector → ClickHouse (analytics) + S3 cold + SIEM (Splunk/Sumo).\n- redaction الحساس موسع: card_*، doc_*، otp، password، secret، ssn،\n  tax_id، agency_credit_details، mlfraud_features (مع PII منزوع فقط).\n- الاحتفاظ: 30 يوم hot؛ 2 سنة warm؛ 7 سنوات audit (S3 Object Lock + WORM).\n\n---\n\n## المراقبة\n\n- الـ stack: Sentry، Grafana Cloud، Datadog APM (موبايل)، PagerDuty، StatusPage.\n- OpenTelemetry SDK من البداية للنهاية (web، mobile، API، workers، خدمات ML).\n\n### Metrics\n\n| Metric                                       | ملاحظات                                          |\n| -------------------------------------------- | ---------------------------------------------- |\n| `http_server_duration_ms`                    | حسب route، status، region                       |\n| `supplier_call_duration_ms`                  | لكل supplier، op                                |\n| `aggregator_partial_results_total`           | تفصيل لكل supplier-fail                         |\n| `saga_step_duration_ms`                      | لكل step                                        |\n| `saga_compensation_total`                    | لكل step                                        |\n| `package_assembly_duration_ms`               | من البداية للنهاية                              |\n| `mlfraud_score_latency_ms`                   | histogram للخدمة                                |\n| `mlfraud_decision_total`                     | حسب القرار                                      |\n| `dynpricing_eval_duration_ms`                | تقييم القاعدة                                    |\n| `dynpricing_decision_total`                  | حسب القاعدة                                     |\n| `chargeback_opened_total`                    | حسب PSP، السبب                                  |\n| `payment_route_choice_total`                 | حسب PSP                                         |\n| `notification_delivery_total`                | حسب القناة + الحالة                              |\n| `pg_pool_in_use`                             | لكل منطقة                                        |\n| `redis_command_duration_ms`                  |                                                |\n| `nats_messages_processed_total`              | حسب subject                                     |\n| `mobile_app_crash_free_users`                | لكل منصة                                        |\n| `mobile_app_cold_start_ms`                   | p95                                            |\n\n### التنبيهات (Enterprise)\n\n| الشرط                                                           | الخطورة  | التوجيه            |\n| --------------------------------------------------------------- | -------- | ------------------ |\n| API p95 > 400 ms لمدة 5 دقائق                                   | page     | PagerDuty          |\n| توفر منطقة متدهور (composite check 3× في 60s)                  | page     | PagerDuty + COO    |\n| معدل تعويض الـ saga > 1.5% لمدة 15 دقيقة                       | page     | PagerDuty          |\n| نتائج جزئية من الـ aggregator > 15% لمدة 15 دقيقة              | warn     | #ops               |\n| انحراف نتائج ML-FRAUD (PSI > 0.2)                              | warn     | ML on-call         |\n| latency خدمة ML-FRAUD p95 > 80 ms                              | page     | ML on-call         |\n| إخفاق simulator قواعد DYN-PRICE (delta بعد deploy > 10%)       | page     | product on-call    |\n| معدل chargeback > 0.5% خلال 7 أيام                             | page     | finance on-call    |\n| فشل تسليم WA > 10% خلال 15 دقيقة                                | warn     | #ops               |\n| فشل تسليم Push > 5% خلال 15 دقيقة                               | warn     | #ops               |\n| Postgres replication lag > 10 s                                 | warn     | DBA                |\n| معدل أخطاء KMS > 0% خلال 5 دقائق                                | page     | sec on-call        |\n| 5xx > 0.3% لمدة 5 دقائق                                         | page     | PagerDuty          |\n| crash-free users للموبايل < 99.5% (rolling 24h)                | page     | mobile on-call     |\n\n---\n\n## استراتيجية الاختبار\n\n| الطبقة           | الأدوات                                | الهدف                               |\n| ---------------- | -------------------------------------- | ----------------------------------- |\n| Unit (BE)        | Jest                                   | ≥ 90% lines، ≥ 80% branches         |\n| Unit (FE)        | Jest + RTL                             | ≥ 85% lines                         |\n| Unit (mobile)    | Jest                                   | ≥ 80% lines                         |\n| Integration      | testcontainers + WireMock              | كل الخدمات                          |\n| Contract         | Pact لكل supplier + PSP                | 100% adapters                       |\n| Property-based   | fast-check (aggregator، pricing)       | الثوابت الحرجة                       |\n| ML model         | offline holdout + A/B في shadow         | AUC > 0.85؛ FPR < 1%                |\n| E2E web          | Playwright؛ multi-locale RTL            | المسارات الحرجة                      |\n| E2E mobile       | Detox + Maestro                        | المسارات الحرجة لكل منصة            |\n| Performance      | k6 + Argo Workflows                    | NFR-009/010 مستدام                   |\n| Chaos            | Toxiproxy + ChaosMesh                  | يصمد ضد تعطل supplier واحد + منطقة واحدة |\n| Accessibility    | axe + تدقيق يدوي ربع سنوي + الموبايل   | صفر مشكلات خطيرة                    |\n| Security         | OWASP ZAP، Burp (يدوي ربع سنوي)        | صفر highs غير معالجة                |\n| Pen-test         | خارجي ربع سنوي                          | كل الـ highs مُعالجة < 30 يوم        |\n\n---\n\n## اختبارات القبول\n\n> ATs الـ Pro والـ Basic تبقى. الـ Enterprise يضيف AT-047..085.\n\n| ID      | العنوان                                          | Given                                                       | When                                          | Then                                                                                  |\n| ------- | -------------------- greement) |\n| الطرف الأول — مقدم الخدمة (Service Provider / First Party) | شركة ديفيا للحلول التقنية (Devya Solutions Ltd.) — جمهورية مصر العربية |\n| الطرف الثاني — العميل (Client / Second Party) | شركة جولة للسياحة (Jawla Tours OTA) |\n| تاريخ السريان (Effective Date) | 29 يونيو 2026 (June 29, 2026) |\n| مدة العقد (Initial Term) | اثنا عشر (12) شهراً ميلادياً |\n| تاريخ الانتهاء (Expiry Date) | 28 يونيو 2027 (June 28, 2027) |\n| القيمة الشهرية (Monthly Value) | 10,000 جنيه مصري (EGP 10,000) |\n| القيمة السنوية الإجمالية (Annual Contract Value) | 120,000 جنيه مصري (EGP 120,000) |\n| العملة (Currency) | الجنيه المصري (EGP) |\n| نوع الباقة (Tier) | الأساسية (Basic) |\n| القانون الحاكم (Governing Law) | قوانين جمهورية مصر العربية |\n| المحكمة المختصة (Jurisdiction) | محاكم القاهرة الاقتصادية |\n\n---\n\n## المقدمة والتعريفات (Preamble & Definitions)\n\n### تمهيد\n\nأُبرم هذا العقد في يوم الإثنين الموافق التاسع والعشرين من شهر يونيو لعام ألفين وستة وعشرين ميلادية (2026-06-29) بين الطرفين المذكورين أعلاه، بناءً على رغبة الطرف الثاني (العميل) في الحصول على خدمات الصيانة والدعم الفني الأساسية لمنصته الإلكترونية \"جولة\" (Jawla)، المتخصصة في حجوزات السياحة عبر الإنترنت (Online Travel Agency)، ورغبة الطرف الأول (مقدم الخدمة) في تقديم هذه الخدمات وفق الشروط والأحكام المُبيّنة في هذا العقد.\n\nوقد أقرّ الطرفان بأهليتهما القانونية الكاملة للتعاقد، واتفقا على ما يلي.\n\n### التعريفات (Definitions)\n\nلأغراض تفسير وتطبيق هذا العقد، تُحمل المصطلحات التالية المعاني المُبيّنة قرين كل منها:\n\n- **المنصة (Platform):** منصة \"جولة\" الإلكترونية بما في ذلك تطبيق الويب (Web Application)، واجهات برمجة التطبيقات (APIs)، لوحة الإدارة (Admin Dashboard)، وقاعدة البيانات (Database).\n- **الخدمات (Services):** خدمات الصيانة والدعم الفني المُحدّدة في القسم \"نطاق الخدمات\" من هذا العقد.\n- **اتفاقية مستوى الخدمة (SLA — Service Level Agreement):** الالتزامات الكميّة المُتعلّقة بزمن الاستجابة، زمن الحل، ونسبة الإتاحة.\n- **مدة التشغيل / الإتاحة (Uptime):** النسبة المئوية للوقت الذي تكون فيه المنصة متاحة للاستخدام خلال الشهر التقويمي، باستثناء النوافذ المُجدوَلة للصيانة.\n- **الحادثة (Incident):** أي خلل أو عُطل يؤثر على عمل المنصة بشكل جزئي أو كلي.\n- **مستوى الخطورة (Severity Level):** تصنيف الحادثة وفق تأثيرها على الأعمال (P1 / P2 / P3 / P4).\n- **زمن الاستجابة (Response Time):** الفترة الزمنية بين الإبلاغ عن الحادثة وأول رد رسمي من فريق الدعم.\n- **زمن الحل (Resolution Time):** الفترة الزمنية بين الإبلاغ عن الحادثة وإعادة المنصة إلى حالتها الطبيعية.\n- **ساعات العمل (Business Hours):** من الأحد إلى الخميس، من الساعة 9:00 صباحاً حتى 6:00 مساءً بتوقيت القاهرة (GMT+2).\n- **التصحيح الأمني (Security Patch):** تحديث برمجي يُعالج ثغرة أمنية مُعلَنة في مكوّنات المنصة.\n- **الأيام العمل (Business Days):** أيام الأحد إلى الخميس باستثناء العطلات الرسمية في جمهورية مصر العربية.\n\n---\n\n## نطاق الخدمات (Scope of Services)\n\nيلتزم مقدم الخدمة بتقديم الخدمات التالية للعميل وفق الباقة الأساسية:\n\n### 1. الدعم التفاعلي (Reactive Support)\n\nيُقدّم مقدم الخدمة دعماً تفاعلياً للحوادث والأعطال التي يُبلّغ عنها العميل عبر القنوات المُعتمدة، وفق أزمنة الاستجابة المُبيّنة في قسم اتفاقية مستوى الخدمة.\n\n### 2. التصحيحات الأمنية (Security Patches)\n\nتطبيق التصحيحات الأمنية الحرجة (Critical Security Patches) على مكوّنات المنصة الأساسية بما في ذلك:\n\n- نظام التشغيل للخوادم (Server OS)\n- محرك قاعدة البيانات (Database Engine)\n- بيئة التشغيل (Node.js / Runtime)\n- التبعيات البرمجية ذات الثغرات المُعلَنة (Dependencies with known CVEs)\n\n### 3. مراقبة الإتاحة الأساسية (Basic Uptime Monitoring)\n\nمراقبة عمل المنصة عن بُعد من خلال نظام Ping/HTTP كل خمس دقائق، مع تنبيهات تلقائية لفريق الدعم عند انقطاع الخدمة.\n\n### 4. النسخ الاحتياطي اليومي (Daily Backups)\n\nتنفيذ نسخة احتياطية يومية لقاعدة البيانات والملفّات الأساسية، مع الاحتفاظ بآخر سبعة (7) نسخ.\n\n### 5. إصلاح الأعطال (Bug Fixes)\n\nإصلاح الأعطال البرمجية المُكتشَفة في وحدات المنصة الموجودة وقت تاريخ سريان العقد، شريطة عدم احتياجها إلى تطوير وحدات جديدة.\n\n### 6. التقرير الشهري (Monthly Report)\n\nتقرير شهري أساسي يلخّص حالة المنصة، الحوادث المُسجّلة، ونسبة الإتاحة المُتحقّقة.\n\n---\n\n## اتفاقية مستوى الخدمة SLA (Service Level Agreement)\n\n### نسبة الإتاحة المضمونة (Guaranteed Uptime)\n\nيضمن مقدم الخدمة نسبة إتاحة شهرية لا تقل عن **99.0%** (تسعة وتسعين بالمئة) من إجمالي ساعات الشهر التقويمي، باستثناء نوافذ الصيانة المُجدولة مُسبقاً.\n\n| المعيار (Metric) | القيمة (Value) | ملاحظات (Notes) |\n|---|---|---|\n| نسبة الإتاحة (Uptime %) | 99.0% | شهرياً، باستثناء الصيانة المُجدولة |\n| الحد الأقصى للتوقف (Max Downtime) | ≈ 7 ساعات و18 دقيقة شهرياً | احتسابها التراكمي |\n| نافذة الصيانة (Maintenance Window) | الجمعة 02:00 – 06:00 ص | بتوقيت القاهرة، يُخطَر العميل قبلها بـ 48 ساعة |\n\n### تصنيف الحوادث وأزمنة الاستجابة (Severity Levels & Response Times)\n\n| المستوى (Severity) | الوصف (Description) | زمن الاستجابة (Response Time) | زمن الحل المُستهدف (Resolution Target) |\n|---|---|---|---|\n| **P1 — حرجة (Critical)** | توقّف كامل للمنصة أو فقدان البيانات | 4 ساعات | 24 ساعة عمل |\n| **P2 — عالية (High)** | تعطّل وظيفة رئيسية (الحجز، الدفع) دون توقّف كامل | 8 ساعات عمل | 3 أيام عمل |\n| **P3 — متوسطة (Medium)** | خلل وظيفي محدود لا يمنع الاستخدام الأساسي | 2 أيام عمل | 7 أيام عمل |\n| **P4 — منخفضة (Low)** | استفسارات، تحسينات صغيرة، أخطاء تجميلية | 5 أيام عمل | حسب جدول الإصدارات |\n\n### حساب نسبة الإتاحة\n\nتُحسب نسبة الإتاحة وفق المعادلة التالية:\n\n> **Uptime % = ((إجمالي الدقائق في الشهر − دقائق التوقّف غير المُجدوَل) / إجمالي الدقائق في الشهر) × 100**\n\n### تعويضات الإخلال بمستوى الخدمة (Service Credits)\n\nفي حال إخلال مقدم الخدمة بالنسبة المُتفق عليها، يستحق العميل خصومات (Service Credits) تُطبَّق على فاتورة الشهر التالي وفق الجدول:\n\n| نسبة الإتاحة الفعلية | الخصم المُستحَق |\n|---|---|\n| من 98.0% إلى أقل من 99.0% | 5% من قيمة الشهر |\n| من 95.0% إلى أقل من 98.0% | 10% من قيمة الشهر |\n| أقل من 95.0% | 20% من قيمة الشهر |\n\n---\n\n## ساعات الدعم (Support Hours)\n\n| اليوم (Day) | الساعات (Hours) | المنطقة الزمنية (Timezone) |\n|---|---|---|\n| الأحد (Sunday) | 9:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n| الإثنين (Monday) | 9:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n| الثلاثاء (Tuesday) | 9:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n| الأربعاء (Wednesday) | 9:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n| الخميس (Thursday) | 9:00 ص – 6:00 م | توقيت القاهرة (GMT+2) |\n| الجمعة (Friday) | خارج الخدمة | — |\n| السبت (Saturday) | خارج الخدمة | — |\n\n**ملاحظة:** الإبلاغات المُستلَمة خارج ساعات العمل تُسجَّل تلقائياً، ويُبدأ احتساب زمن الاستجابة من بداية يوم العمل التالي، باستثناء حوادث P1 التي تخضع لسياسة الطوارئ المُحدودة في الباقة الأساسية (محاولة قصوى — Best Effort).\n\n### العطلات الرسمية (Public Holidays)\n\nتُعَدّ العطلات الرسمية في جمهورية مصر العربية أيام انقطاع للدعم، وتُمدَّد أزمنة الاستجابة بمقدار أيام العطلة.\n\n---\n\n## قنوات الدعم (Support Channels)\n\nتُتاح للعميل في الباقة الأساسية القنوات التالية للتواصل مع فريق الدعم:\n\n| القناة (Channel) | التفاصيل (Details) | الاستخدام (Use Case) |\n|---|---|---|\n| **البريد الإلكتروني (Email)** | support@devya.dev | جميع أنواع الطلبات (الافتراضي) |\n| **بوابة التذاكر (Ticket Portal)** | https://support.devya.dev | تتبّع الحوادث والطلبات |\n| **الهاتف (Phone)** | غير متاح في الباقة الأساسية | — |\n| **واتساب (WhatsApp)** | غير متاح في الباقة الأساسية | — |\n\n**جميع التواصل الرسمي يجب أن يمرّ عبر بوابة التذاكر أو البريد الإلكتروني لضمان توثيق الإبلاغات وتفعيل احتساب زمن الاستجابة.**\n\n---\n\n## الخدمات المشمولة (Included Services)\n\nيشمل العقد في الباقة الأساسية الخدمات التالية:\n\n- استقبال بلاغات الأعطال وتحليلها وتشخيصها.\n- إصلاح الأعطال البرمجية في الوحدات القائمة وقت توقيع العقد.\n- تطبيق التصحيحات الأمنية الحرجة على مكوّنات المنصة.\n- مراقبة الإتاحة الأساسية (Ping / HTTP Health Checks).\n- النسخ الاحتياطي اليومي لقاعدة البيانات والملفّات الأساسية.\n- استعادة قاعدة البيانات من أحدث نسخة عند الحاجة (مرة واحدة شهرياً كحد أقصى دون رسوم إضافية).\n- تقرير شهري أساسي يتضمّن نسبة الإتاحة وملخص الحوادث.\n- إعادة تشغيل الخدمات (Service Restart) عند الحاجة.\n- مراجعة سجلّات الأخطاء (Error Logs) بشكل تفاعلي.\n- إعادة ضبط بيانات الاعتماد (Credentials) المرتبطة بمكوّنات المنصة.\n\n---\n\n## الخدمات غير المشمولة (Excluded Services)\n\nتستثني الباقة الأساسية صراحةً ما يلي، ويُمكن طلبها كخدمات إضافية بأجر مُنفصل:\n\n- تطوير وحدات أو مزايا جديدة (New Feature Development).\n- تعديل تصميم واجهات المستخدم (UI/UX Redesign).\n- تكامل خدمات طرف ثالث جديدة (Third-Party Integrations) لم تكن قائمة وقت توقيع العقد.\n- ترحيل البيانات بين البيئات أو من/إلى أنظمة أخرى (Data Migration).\n- التدقيق الأمني الدوري (Security Audits) ـ يتوفّر في الباقة المؤسسية.\n- اختبار الاختراق (Penetration Testing).\n- تحسين الأداء العام للمنصة (Performance Tuning) ـ يتوفّر في الباقة الاحترافية فأعلى.\n- توسيع البنية التحتية أو تخطيط السعة (Capacity Planning).\n- الدعم خارج ساعات العمل المُحدّدة (إلا حوادث P1 ضمن سياسة Best Effort).\n- التدريب الموسّع للمستخدمين النهائيين.\n- استرداد البيانات من نسخ احتياطية أقدم من سبعة أيام.\n- إصلاح الأعطال الناتجة عن تعديلات أجراها العميل أو أطراف خارجية على المنصة دون علم مقدم الخدمة.\n- إعادة كتابة وحدات قائمة أو إعادة هيكلة الكود (Refactoring).\n\n---\n\n## التحديثات الأمنية (Security Updates)\n\n### السياسة العامة\n\nيلتزم مقدم الخدمة بتطبيق التحديثات الأمنية على مكوّنات المنصة وفق الجدول التالي:\n\n| فئة التحديث | المهلة الزمنية |\n|---|---|\n| ثغرات حرجة (Critical CVE) — درجة CVSS ≥ 9.0 | خلال 72 ساعة من الإعلان الرسمي |\n| ثغرات عالية (High) — CVSS 7.0–8.9 | خلال 14 يوماً |\n| ثغرات متوسطة (Medium) — CVSS 4.0–6.9 | خلال 30 يوماً |\n| ثغرات منخفضة (Low) — CVSS < 4.0 | ضمن النافذة الربع سنوية |\n\n### نطاق التحديثات\n\nتشمل التحديثات الأمنية الأساسية:\n\n- نظام التشغيل للخوادم (Linux Kernel & OS Packages).\n- محرك قاعدة البيانات (MongoDB / PostgreSQL Engine).\n- بيئة التشغيل (Node.js Runtime).\n- التبعيات البرمجية المُعلَنة في `package.json` ذات الثغرات الموثّقة في قواعد بيانات CVE / NVD.\n- إعدادات الجدار الناري وشهادات SSL/TLS.\n\n### إخطار العميل\n\nيُخطَر العميل بكل تحديث أمني حرج قبل تطبيقه بمدة لا تقل عن 24 ساعة، باستثناء حالات الطوارئ القصوى التي تُطبّق فوراً مع إخطار لاحق.\n\n---\n\n## مراقبة البنية التحتية (Infrastructure Monitoring)\n\nفي الباقة الأساسية، تشمل المراقبة:\n\n| نوع المراقبة | الحالة | التفاصيل |\n|---|---|---|\n| مراقبة الإتاحة (Uptime) | مُفعّل | فحص HTTP كل 5 دقائق |\n| مراقبة الاستجابة (Response Time) | مُفعّل أساسي | حد أعلى تنبيهي: 5 ثواني |\n| مراقبة استهلاك المعالج (CPU) | غير مُفعّل | متوفر في الباقة الاحترافية |\n| مراقبة الذاكرة (Memory) | غير مُفعّل | متوفر في الباقة الاحترافية |\n| مراقبة قاعدة البيانات (DB Health) | فحص اتصال أساسي | لا يشمل التحليل التفصيلي |\n| مراقبة الأمان (Security Events) | غير مُفعّل | متوفر في الباقة المؤسسية |\n| التنبيهات (Alerts) | فقط عند انقطاع كامل | عبر البريد الإلكتروني |\n\n---\n\n## التقارير الشهرية (Monthly Reports)\n\nيُسلَّم العميل تقريراً شهرياً خلال الأسبوع الأول من كل شهر يتضمّن:\n\n1. **ملخص تنفيذي (Executive Summary):** نسبة الإتاحة الفعلية والمقارنة بالـ SLA.\n2. **سجل الحوادث (Incidents Log):** قائمة بالحوادث المُسجّلة خلال الشهر، تصنيفها، وأزمنة الحل.\n3. **التذاكر المُغلَقة (Closed Tickets):** عدد التذاكر المُستلَمة والمُغلَقة.\n4. **التحديثات الأمنية المُطبَّقة:** قائمة بالتصحيحات الأمنية التي طُبّقت خلال الشهر.\n5. **حالة النسخ الاحتياطي:** تأكيد نجاح النسخ اليومي خلال الشهر.\n6. **التوصيات الأساسية:** ملاحظات عامة (إن وُجدت) لرفع كفاءة المنصة.\n\n**التقرير يُسلَّم بصيغة PDF عبر البريد الإلكتروني للجهة المُمثَّلة عن العميل.**\n\n---\n\n## إدارة الحوادث (Incident Management)\n\n### مراحل دورة حياة الحادثة\n\n1. **الإبلاغ (Reporting):** يُبلَّغ عن الحادثة عبر إحدى القنوات المُعتمدة (Email / Ticket Portal).\n2. **التسجيل (Logging):** تُسجَّل الحادثة في نظام التذاكر برقم تعريفي فريد (Ticket ID).\n3. **التصنيف (Triage):** يُقيّم فريق الدعم خطورة الحادثة ويُخصّص لها مستوى (P1–P4).\n4. **التأكيد (Acknowledgment):** يُرسَل تأكيد للعميل خلال زمن الاستجابة المُحدّد بالـ SLA.\n5. **التحقيق (Investigation):** يُجري فريق الدعم تحليل السبب الجذري (Root Cause Analysis).\n6. **المعالجة (Remediation):** تُطبَّق الحلول المؤقتة (Workaround) ثم الحل الجذري.\n7. **التحقق (Verification):** يُختبَر الحل ويُؤكَّد العميل عودة الخدمة لطبيعتها.\n8. **الإغلاق (Closure):** تُغلَق التذكرة بعد موافقة العميل.\n9. **التقرير اللاحق (Post-Mortem):** للحوادث P1 فقط، يُسلَّم تقرير سبب جذري خلال 5 أيام عمل من الإغلاق.\n\n### مصفوفة التصعيد (Escalation Matrix)\n\n| المستوى | الجهة المعنية | إذا تجاوز الزمن |\n|---|---|---|\n| L1 | فني الدعم المسؤول | الزمن المُحدّد بالـ SLA |\n| L2 | قائد فريق الدعم (Team Lead) | بعد تجاوز 50% من زمن الحل |\n| L3 | مدير الهندسة (Engineering Manager) | بعد تجاوز 100% من زمن الحل |\n\n---\n\n## النسخ الاحتياطي والاستعادة (Backup & Restore)\n\n### سياسة النسخ الاحتياطي\n\n| المُكوِّن | تكرار النسخ | فترة الاحتفاظ |\n|---|---|---|\n| قاعدة البيانات الرئيسية | يومي (Daily) | 7 أيام |\n| الملفّات المرفوعة (User Uploads) | يومي (Daily) | 7 أيام |\n| إعدادات الخادم | عند كل تغيير | 30 يوماً |\n\n### الاستعادة (Restore)\n\n- **عدد الاستعادات المجانية:** مرة واحدة شهرياً.\n- **زمن الاستعادة المُستهدف (RTO):** 8 ساعات عمل.\n- **زمن فقدان البيانات الأقصى (RPO):** 24 ساعة.\n- **استعادة جزئية (Partial Restore):** متاحة على مستوى المجموعة (Collection) أو الجدول.\n- **استعادة كاملة (Full Restore):** متاحة في حالات الطوارئ.\n\n### موقع تخزين النسخ\n\nتُخزَّن النسخ الاحتياطية في موقع جغرافي مُنفصل عن البيئة الإنتاجية (Cross-Region) مع تشفير AES-256 في الراحة (At Rest).\n\n---\n\n## التسعير وجدول الدفع (Pricing & Payment Schedule)\n\n### القيمة الإجمالية\n\n| البند | القيمة | الوحدة |\n|---|---|---|\n| الاشتراك الشهري الأساسي | 10,000 | جنيه مصري / شهرياً |\n| الاشتراك السنوي (12 شهراً) | 120,000 | جنيه مصري / سنوياً |\n| الضرائب (Taxes) | حسب القانون المعمول به | تُضاف إلى الفاتورة |\n\n### الخدمات الإضافية (Additional Services)\n\n| الخدمة | السعر |\n|---|---|\n| تطوير ساعي خارج العقد | 1,200 جنيه / ساعة |\n| دعم طارئ خارج ساعات العمل (Out-of-Hours P1) | 2,500 جنيه / ساعة |\n| استعادة إضافية بعد الاستعادة المجانية | 3,000 جنيه / استعادة |\n| نسخة احتياطية يدوية خارج الجدول | 1,500 جنيه / نسخة |\n\n### جدول الدفع (Payment Schedule)\n\n- **الدورة:** شهرياً.\n- **تاريخ الإصدار:** اليوم الأول من كل شهر ميلادي.\n- **مهلة السداد:** خلال 15 يوماً من تاريخ إصدار الفاتورة.\n- **طريقة الدفع:** تحويل بنكي إلى الحساب المُحدّد من قبل مقدم الخدمة.\n- **التأخر في السداد:** يستحق مقدم الخدمة فائدة تأخير قدرها 1% شهرياً من قيمة الفاتورة المُتأخّرة. يحق له تعليق الخدمات في حال تجاوز التأخر 30 يوماً.\n\n---\n\n## شروط التجديد (Renewal Terms)\n\n- يُجدَّد العقد تلقائياً لمدة سنة إضافية ما لم يُخطر أحد الطرفين الآخر كتابياً برغبته في عدم التجديد قبل **60 يوماً** من تاريخ انتهاء العقد.\n- يحق لمقدم الخدمة تعديل التسعير عند التجديد بنسبة لا تتجاوز **معدل التضخم الرسمي + 5%** على أن يُخطر العميل بذلك قبل 60 يوماً من تاريخ التجديد.\n- يحق للعميل ترقية الباقة إلى Professional أو Enterprise في أي وقت خلال مدة العقد، مع احتساب الفرق بشكل تناسبي (Pro-rata).\n\n---\n\n## إنهاء العقد (Termination)\n\n### الإنهاء العادي (Termination for Convenience)\n\n- يحق لأي من الطرفين إنهاء العقد بإخطار كتابي مُسبق مدته **90 يوماً** قبل تاريخ الإنهاء المطلوب.\n- يلتزم العميل بسداد جميع المستحقات المالية حتى تاريخ الإنهاء الفعلي.\n\n### الإنهاء للسبب (Termination for Cause)\n\nيحق لأي من الطرفين إنهاء العقد فوراً في الحالات التالية:\n\n- إخلال الطرف الآخر بأي التزام جوهري في العقد، وعدم تصحيح الإخلال خلال 30 يوماً من تاريخ الإخطار الكتابي.\n- إفلاس أحد الطرفين أو دخوله في تصفية إجبارية.\n- ارتكاب أحد الطرفين تصرفاً يُلحق ضرراً جوهرياً بسمعة الطرف الآخر.\n\n### الالتزامات عند الإنهاء (Post-Termination Obligations)\n\n- تسليم العميل نسخة كاملة من بياناته خلال 30 يوماً من تاريخ الإنهاء.\n- حذف بيانات العميل من أنظمة مقدم الخدمة خلال 90 يوماً من تاريخ الإنهاء (باستثناء ما يتطلّبه القانون).\n- إعادة بيانات الاعتماد والوصول إلى البنية التحتية الخاصة بالعميل.\n\n---\n\n## السرية وحماية البيانات (Confidentiality & Data Protection)\n\n### السرية (Confidentiality)\n\n- يلتزم كل طرف بالحفاظ على سرية المعلومات التي يحصل عليها من الطرف الآخر بحكم تنفيذ هذا العقد.\n- يستمر الالتزام بالسرية لمدة **خمس سنوات** بعد انتهاء أو إنهاء العقد.\n- يُستثنى من ذلك المعلومات التي تكون عامة، أو التي يجب الإفصاح عنها بحكم القانون.\n\n### حماية البيانات (Data Protection)\n\n- بيانات المنصة وعملاء العميل ملك حصري للعميل.\n- يلتزم مقدم الخدمة بالامتثال للقوانين السارية في جمهورية مصر العربية بخصوص حماية البيانات الشخصية (قانون رقم 151 لسنة 2020).\n- لا يُسمح بنقل البيانات خارج جمهورية مصر العربية إلا بموافقة كتابية مسبقة من العميل.\n- في حال وقوع تسريب للبيانات (Data Breach)، يلتزم مقدم الخدمة بإخطار العميل خلال **48 ساعة** من اكتشاف الحادثة.\n\n### الوصول إلى البيانات (Data Access)\n\n- يقتصر الوصول إلى بيانات الإنتاج على فريق الدعم المُصرّح له فقط.\n- يُسجَّل كل وصول للبيانات في سجلّات التدقيق (Audit Logs).\n- لا يُستخدم أي من بيانات العميل لأغراض غير تنفيذ هذا العقد.\n\n---\n\n## المسؤولية والضمانات (Liability & Warranties)\n\n### الضمانات (Warranties)\n\n- يضمن مقدم الخدمة أن خدماته تُقدَّم بمستوى مهني عالٍ ومتوافق مع أفضل الممارسات الصناعية.\n- يضمن مقدم الخدمة أن لديه الكوادر المؤهَّلة والخبرات اللازمة لتنفيذ التزاماته.\n\n### حدود المسؤولية (Limitation of Liability)\n\n- لا تتجاوز المسؤولية الإجمالية لمقدم الخدمة تجاه العميل عن أي ضرر أو خسارة قيمة **القيمة السنوية الإجمالية للعقد** (120,000 جنيه مصري).\n- لا يُسأل مقدم الخدمة عن الأضرار غير المباشرة أو التبعية (Indirect or Consequential Damages) بما في ذلك فقدان الأرباح أو فقدان الفرص التجارية.\n\n### القوة القاهرة (Force Majeure)\n\nلا يُسأل أي من الطرفين عن الإخلال بالعقد إذا كان ذلك ناتجاً عن قوة قاهرة، بما في ذلك على سبيل المثال لا الحصر:\n\n- الحرب، الإرهاب، الإضرابات العامة.\n- الكوارث الطبيعية (الزلازل، الفيضانات).\n- انقطاع البنية التحتية الوطنية للإنترنت.\n- قرارات حكومية تمنع تنفيذ العقد.\n- جوائح صحية مُعلَنة رسمياً.\n\n---\n\n## التواصل وجهات الاتصال (Communication & Contacts)\n\n### جهات الاتصال لدى مقدم الخدمة (Service Provider Contacts)\n\n| الدور | الاسم | البريد الإلكتروني | الهاتف |\n|---|---|---|---|\n| مدير الحساب (Account Manager) | يُحدَّد لاحقاً | accounts@devya.dev | — |\n| فريق الدعم (Support Team) | فريق الدعم الف
