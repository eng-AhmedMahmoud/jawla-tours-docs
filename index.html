│      ┌────────────────────┐\n                                                                 │      │ BullMQ Workers x2  │\n                                                                 │      │ (Cloud Run jobs)   │\n                                                                 │      │ notifications.*    │\n                                                                 │      │ booking.cleanup    │\n                                                                 │      └────────────────────┘\n                                                                 │\n                                                                 └──── External APIs ────────┐\n                                                                                              ▼\n                                                                                ┌──────────────────────┐\n                                                                                │ Amadeus Self-Service │\n                                                                                │ PayTabs API          │\n                                                                                │ SendGrid / Resend    │\n                                                                                └──────────────────────┘\n```\n\n### مسؤوليات الـ Components\n\n| الـ Component       | المسؤولية                                                                                          |\n| ------------------- | ------------------------------------------------------------------------------------------------ |\n| Next.js (Cloud Run) | SSR/ISR للصفحات التسويقية، RSC + Server Actions لمسار الحجز، يحتضن PayTabs PayPage iframe.         |\n| NestJS API (Cloud Run) | منطق الـ domain، تنسيق المزوّدين، idempotency، التخزين، إرسال الـ jobs للطابور.                |\n| Cloud SQL (Postgres 16) | المصدر الأساسي للبيانات: users، bookings، payments، audit log، ردود المزوّدين (jsonb).        |\n| Memorystore for Redis | blacklist لتوكنات الجلسات، search cache، عدادات rate-limit، broker لـ BullMQ.                  |\n| BullMQ workers      | الشغل الـ async: إرسال email، rollback للمزوّد، تنظيف الـ bookings، إعادة تشغيل webhook.            |\n| Amadeus             | inventory للـ flights، الـ ticketing، إصدار الـ PNR.                                                |\n| PayTabs             | حفظ الكروت (token)، lifecycle الـ transaction، 3DS، refunds، multi-currency settlement.            |\n| Cloud Armor + Cloud CDN | حماية DDoS وWAF قدام Cloud Run للـ apex domain؛ bot management.                                |\n\n---\n\n## تصميم قاعدة البيانات (Database Design)\n\nPostgreSQL 16 مع الـ extensions `uuid-ossp` و`pgcrypto`. الفلوس بتتخزن كـ `bigint`\nبالـ minor-units مع column `currency` منفصل (ISO 4217). كل الجداول فيها\n`created_at`, `updated_at` (`timestamptz` default `now()`). الحذف soft عن طريق `deleted_at`.\n\n### نظرة عامة على الجداول\n\n| الجدول                    | الغرض                                                                | العلاقات الأساسية                                |\n| ------------------------- | -------------------------------------------------------------------- | ----------------------------------------------- |\n| `users`                   | هويات العملاء + الموظفين                                              | 1—N → `bookings`, `audit_events`                |\n| `user_credentials`        | hash كلمة المرور + حالة الـ reset                                    | 1—1 → `users`                                   |\n| `refresh_tokens`          | عائلة الـ refresh-token النشطة + كشف الـ replay                       | N—1 → `users`                                   |\n| `airports`                | بيانات مرجعية لمطارات IATA                                            | —                                               |\n| `airlines`                | بيانات مرجعية لشركات الطيران IATA                                     | —                                               |\n| `cities`                  | بيانات مرجعية لمدن IATA                                               | —                                               |\n| `bookings`                | الجذر الأساسي للحجز (aggregate root)                                  | N—1 → `users`; 1—N → `booking_items`, `payments` |\n| `booking_items`           | عناصر لكل منتج (flight)                                               | N—1 → `bookings`                                |\n| `flight_segments`         | segment لكل leg من رحلة flight item                                   | N—1 → `booking_items`                           |\n| `passengers`              | تفاصيل الراكب المرتبطة بالحجز                                          | N—1 → `bookings`                                |\n| `payments`                | سجلات lifecycle الـ PaymentIntent                                     | N—1 → `bookings`                                |\n| `payment_webhook_events`  | مخزن de-duplication لـ events الـ PayTabs                             | —                                               |\n| `supplier_calls`          | log calls المزوّدين الخارجية (request + response, jsonb)              | N—1 → `bookings`                                |\n| `notifications`           | الإشعارات في الطابور / المُرسَلة + حالة التسليم                       | N—1 → `users`, `bookings`                       |\n| `audit_events`            | audit log غير قابل للتعديل                                            | N—1 → `users`                                   |\n| `idempotency_keys`        | mapping الـ Idempotency-Key → response hash                          | —                                               |\n\n### مقتطفات SQL DDL\n\n```sql\nCREATE TABLE users (\n  id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  email           CITEXT NOT NULL UNIQUE,\n  email_verified  BOOLEAN NOT NULL DEFAULT FALSE,\n  given_name      TEXT,\n  family_name     TEXT,\n  phone_e164      TEXT,\n  locale          TEXT NOT NULL DEFAULT 'en',\n  default_currency CHAR(3) NOT NULL DEFAULT 'USD',\n  role            TEXT NOT NULL DEFAULT 'customer'\n                  CHECK (role IN ('customer','admin','support')),\n  created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),\n  updated_at      TIMESTAMPTZ NOT NULL DEFAULT now(),\n  deleted_at      TIMESTAMPTZ\n);\n\nCREATE TABLE user_credentials (\n  user_id          UUID PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,\n  password_hash    TEXT NOT NULL,\n  password_algo    TEXT NOT NULL DEFAULT 'argon2id',\n  failed_attempts  INT  NOT NULL DEFAULT 0,\n  locked_until     TIMESTAMPTZ,\n  updated_at       TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n\nCREATE TABLE refresh_tokens (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id       UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,\n  family_id     UUID NOT NULL,\n  token_hash    BYTEA NOT NULL,\n  user_agent    TEXT,\n  ip_inet       INET,\n  expires_at    TIMESTAMPTZ NOT NULL,\n  revoked_at    TIMESTAMPTZ,\n  created_at    TIMESTAMPTZ NOT NULL DEFAULT now(),\n  UNIQUE(token_hash)\n);\nCREATE INDEX ON refresh_tokens (user_id);\nCREATE INDEX ON refresh_tokens (family_id) WHERE revoked_at IS NULL;\n\nCREATE TABLE bookings (\n  id                 UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  reference          CHAR(8) NOT NULL UNIQUE,\n  user_id            UUID NOT NULL REFERENCES users(id),\n  status             TEXT NOT NULL\n                     CHECK (status IN ('DRAFT','PENDING_PAYMENT','CONFIRMED',\n                                       'FAILED','CANCELLED','REFUNDED')),\n  total_amount_minor BIGINT NOT NULL,\n  currency           CHAR(3) NOT NULL,\n  contact_email      CITEXT NOT NULL,\n  contact_phone_e164 TEXT,\n  locale             TEXT NOT NULL DEFAULT 'en',\n  created_at         TIMESTAMPTZ NOT NULL DEFAULT now(),\n  updated_at         TIMESTAMPTZ NOT NULL DEFAULT now(),\n  confirmed_at       TIMESTAMPTZ,\n  cancelled_at       TIMESTAMPTZ,\n  expires_at         TIMESTAMPTZ\n);\nCREATE INDEX ON bookings (user_id, created_at DESC);\nCREATE INDEX ON bookings (status) WHERE status IN ('DRAFT','PENDING_PAYMENT');\n\nCREATE TABLE booking_items (\n  id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id      UUID NOT NULL REFERENCES bookings(id) ON DELETE CASCADE,\n  item_type       TEXT NOT NULL CHECK (item_type IN ('FLIGHT')),\n  supplier        TEXT NOT NULL DEFAULT 'amadeus',\n  supplier_ref    TEXT,\n  offer_payload   JSONB NOT NULL,\n  amount_minor    BIGINT NOT NULL,\n  currency        CHAR(3) NOT NULL,\n  created_at      TIMESTAMPTZ NOT NULL DEFAULT now()\n);\nCREATE INDEX ON booking_items (booking_id);\nCREATE INDEX ON booking_items (supplier_ref);\n\nCREATE TABLE flight_segments (\n  id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_item_id  UUID NOT NULL REFERENCES booking_items(id) ON DELETE CASCADE,\n  sequence         INT NOT NULL,\n  carrier_iata     CHAR(2) NOT NULL,\n  flight_number    TEXT NOT NULL,\n  origin_iata      CHAR(3) NOT NULL,\n  destination_iata CHAR(3) NOT NULL,\n  departure_utc    TIMESTAMPTZ NOT NULL,\n  arrival_utc      TIMESTAMPTZ NOT NULL,\n  cabin            TEXT NOT NULL,\n  fare_basis       TEXT,\n  UNIQUE(booking_item_id, sequence)\n);\n\nCREATE TABLE passengers (\n  id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id   UUID NOT NULL REFERENCES bookings(id) ON DELETE CASCADE,\n  pax_type     TEXT NOT NULL CHECK (pax_type IN ('ADT','CHD','INF')),\n  title        TEXT,\n  given_name   TEXT NOT NULL,\n  family_name  TEXT NOT NULL,\n  dob          DATE NOT NULL,\n  doc_type     TEXT,\n  doc_number   TEXT,\n  doc_expiry   DATE,\n  doc_issuing_country CHAR(2)\n);\n\nCREATE TABLE payments (\n  id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id          UUID NOT NULL REFERENCES bookings(id),\n  psp                 TEXT NOT NULL DEFAULT 'paytabs',\n  tran_ref            TEXT NOT NULL UNIQUE,\n  status              TEXT NOT NULL\n                      CHECK (status IN ('requires_action','authorized',\n                                        'processing','succeeded','failed','refunded','cancelled')),\n  amount_minor        BIGINT NOT NULL,\n  currency            CHAR(3) NOT NULL,\n  three_ds_status     TEXT,\n  failure_code        TEXT,\n  captured_at         TIMESTAMPTZ,\n  refunded_amount_minor BIGINT NOT NULL DEFAULT 0,\n  created_at          TIMESTAMPTZ NOT NULL DEFAULT now(),\n  updated_at          TIMESTAMPTZ NOT NULL DEFAULT now()\n);\nCREATE INDEX ON payments (booking_id);\n\nCREATE TABLE payment_webhook_events (\n  tran_ref     TEXT PRIMARY KEY,\n  psp          TEXT NOT NULL,\n  event_type   TEXT NOT NULL,\n  payload      JSONB NOT NULL,\n  received_at  TIMESTAMPTZ NOT NULL DEFAULT now(),\n  processed_at TIMESTAMPTZ\n);\n\nCREATE TABLE supplier_calls (\n  id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  booking_id    UUID REFERENCES bookings(id),\n  supplier      TEXT NOT NULL,\n  operation     TEXT NOT NULL,\n  request_id    TEXT,\n  http_status   INT,\n  latency_ms    INT,\n  request_body  JSONB,\n  response_body JSONB,\n  created_at    TIMESTAMPTZ NOT NULL DEFAULT now()\n);\nCREATE INDEX ON supplier_calls (booking_id, created_at);\n\nCREATE TABLE notifications (\n  id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n  user_id     UUID REFERENCES users(id),\n  booking_id  UUID REFERENCES bookings(id),\n  channel     TEXT NOT NULL CHECK (channel IN ('email')),\n  template    TEXT NOT NULL,\n  dedup_key   TEXT NOT NULL UNIQUE,\n  status      TEXT NOT NULL CHECK (status IN ('queued','sent','failed','suppressed')),\n  attempts    INT NOT NULL DEFAULT 0,\n  last_error  TEXT,\n  created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),\n  sent_at     TIMESTAMPTZ\n);\n\nCREATE TABLE audit_events (\n  id           BIGSERIAL PRIMARY KEY,\n  occurred_at  TIMESTAMPTZ NOT NULL DEFAULT now(),\n  actor_id     UUID,\n  actor_role   TEXT,\n  action       TEXT NOT NULL,\n  target_type  TEXT,\n  target_id    TEXT,\n  payload      JSONB,\n  ip_inet      INET,\n  user_agent   TEXT\n);\nCREATE INDEX ON audit_events (target_type, target_id);\nCREATE INDEX ON audit_events (actor_id, occurred_at DESC);\n\nCREATE TABLE idempotency_keys (\n  key            TEXT PRIMARY KEY,\n  user_id        UUID,\n  endpoint       TEXT NOT NULL,\n  request_hash   BYTEA NOT NULL,\n  response_status INT NOT NULL,\n  response_body  JSONB NOT NULL,\n  expires_at     TIMESTAMPTZ NOT NULL,\n  created_at     TIMESTAMPTZ NOT NULL DEFAULT now()\n);\n```\n\n### استراتيجية الـ Indexing\n\n- B-tree على كل column من نوع FK (Postgres مش بيعملهم تلقائي).\n- Partial indexes على الـ subsets الساخنة من enum الـ status (`bookings.status IN ('DRAFT','PENDING_PAYMENT')`).\n- GIN index على `booking_items.offer_payload` للبحث من فريق الدعم: `CREATE INDEX ON booking_items USING gin (offer_payload jsonb_path_ops)`.\n\n---\n\n## تصميم الـ API\n\nBase URL: `https://api.jawla.travel/v1`. كل الـ requests والـ responses JSON UTF-8.\nAuth header: `Authorization: Bearer <access_token>`. الأخطاء بتتبع RFC 7807\n`application/problem+json`.\n\n| #  | METHOD | PATH                                       | Auth        | Request                                              | Response                              | Status codes        |\n| -- | ------ | ------------------------------------------ | ----------- | ---------------------------------------------------- | ------------------------------------- | ------------------- |\n| 1  | POST   | `/auth/register`                           | none        | `{email,password,locale}`                            | `{userId}`                            | 201,400,409,429     |\n| 2  | POST   | `/auth/verify-email`                       | none        | `{token}`                                            | `{verified:true}`                     | 200,400,410         |\n| 3  | POST   | `/auth/login`                              | none        | `{email,password,captcha}`                           | `{access,refresh,expiresIn}`          | 200,401,423,429     |\n| 4  | POST   | `/auth/refresh`                            | refresh     | `{refresh}`                                          | `{access,refresh,expiresIn}`          | 200,401             |\n| 5  | POST   | `/auth/logout`                             | bearer      | `{}`                                                 | `204`                                 | 204,401             |\n| 6  | POST   | `/auth/password/forgot`                    | none        | `{email,captcha}`                                    | `204`                                 | 204,429             |\n| 7  | POST   | `/auth/password/reset`                     | none        | `{token,newPassword}`                                | `204`                                 | 204,400,410         |\n| 8  | GET    | `/auth/me`                                 | bearer      | —                                                    | `{user,permissions[]}`                | 200,401             |\n| 9  | GET    | `/catalog/airports?q=`                     | none        | `q` query string                                     | `[{iata,name,city,country}]`          | 200                 |\n| 10 | GET    | `/catalog/cities?q=`                       | none        | `q`                                                  | `[{iata,name,country}]`               | 200                 |\n| 11 | POST   | `/flights/search`                          | bearer/anon | `FlightSearchRequest`                                | `{searchId,offers[]}`                 | 200,400,502         |\n| 12 | GET    | `/flights/offers/{id}`                     | bearer/anon | —                                                    | `FlightOffer`                         | 200,404             |\n| 13 | POST   | `/flights/price-check`                     | bearer      | `{offerId}`                                          | `{offerId,priceConfirmed,delta}`      | 200,400,409         |\n| 14 | POST   | `/bookings`                                | bearer      | `{type,offerId,passengers[],contact}` + Idempotency  | `{bookingId,reference,status}`        | 201,400,409,422     |\n| 15 | GET    | `/bookings/{id}`                           | bearer      | —                                                    | `Booking`                             | 200,403,404         |\n| 16 | GET    | `/bookings?limit=&cursor=`                 | bearer      | paging                                               | `{items[],nextCursor}`                | 200                 |\n| 17 | POST   | `/bookings/{id}/cancel`                    | bearer+OTP  | `{reason,otp}`                                       | `{status}`                            | 200,403,409         |\n| 18 | POST   | `/payments/paytabs`                        | bearer      | `{bookingId}` + Idempotency                          | `{paymentUrl,tranRef,amount}`         | 201,409             |\n| 19 | POST   | `/payments/webhooks/paytabs`               | sig         | PayTabs IPN event                                    | `200`                                 | 200,400             |\n| 20 | GET    | `/admin/bookings?...`                      | admin       | filters                                              | `{items[],nextCursor}`                | 200,403             |\n| 21 | POST   | `/admin/bookings/{id}/refund-reconcile`    | admin       | `{paytabsRefundRef,amount}`                          | `{status:'REFUNDED'}`                 | 200,403,409         |\n| 22 | POST   | `/admin/notifications/{id}/resend`         | admin       | —                                                    | `{queued:true}`                       | 202,403,404         |\n\n### مثال Request: `POST /flights/search`\n\n```json\n{\n  \"tripType\": \"ROUND_TRIP\",\n  \"origin\": \"CAI\",\n  \"destination\": \"DXB\",\n  \"departureDate\": \"2026-08-12\",\n  \"returnDate\": \"2026-08-19\",\n  \"passengers\": { \"adt\": 2, \"chd\": 1, \"inf\": 0 },\n  \"cabin\": \"ECONOMY\",\n  \"currency\": \"USD\",\n  \"maxResults\": 30\n}\n```\n\n### مثال Response\n\n```json\n{\n  \"searchId\": \"01J9X0KZ8C5E0BR9Q9XZWAB4DR\",\n  \"offers\": [\n    {\n      \"id\": \"of_01J9X0M4XKR1XZ\",\n      \"price\": { \"totalMinor\": 84500, \"currency\": \"USD\" },\n      \"itineraries\": [\n        {\n          \"duration\": \"PT5H10M\",\n          \"segments\": [\n            {\n              \"carrier\": \"MS\",\n              \"number\": \"915\",\n              \"from\": { \"iata\": \"CAI\", \"at\": \"2026-08-12T08:30:00+02:00\" },\n              \"to\":   { \"iata\": \"DXB\", \"at\": \"2026-08-12T14:40:00+04:00\" },\n              \"cabin\": \"ECONOMY\"\n            }\n          ]\n        }\n      ],\n      \"fareRules\": { \"refundable\": false, \"changeable\": true, \"lastTicketingDate\": \"2026-08-11T23:59:00Z\" }\n    }\n  ]\n}\n```\n\n### مظروف الخطأ Error Envelope (RFC 7807)\n\n```json\n{\n  \"type\":   \"https://api.jawla.travel/problems/price-changed\",\n  \"title\":  \"Price has changed\",\n  \"status\": 409,\n  \"code\":   \"PRICE_CHANGED\",\n  \"detail\": \"Offer price increased by 2.4%. Confirm to continue.\",\n  \"instance\": \"/v1/flights/price-check\",\n  \"traceId\": \"01J9X0MA9JC56AH6\"\n}\n```\n\n### حدود الـ Rate Limits\n\n| مجموعة الـ Endpoint | الحد                     | الـ Bucket key   |\n| ------------------- | ------------------------ | ---------------- |\n| auth/*              | 10 req / IP / دقيقة      | IP               |\n| flights/search      | 30 req / IP / دقيقة      | IP + user        |\n| bookings (POST)     | 5 req / user / 10 دقايق  | user             |\n| admin/*             | 60 req / staff / دقيقة   | user             |\n\n---\n\n## الـ Authentication والـ Authorization\n\n### نموذج التوكنات\n\n- **Access token** — RS256 JWT، TTL 15 دقيقة، الـ claims: `sub`, `email`, `role`, `perms[]`,\n  `iss=https://api.jawla.travel`, `aud=jawla-web`, `iat`, `exp`, `jti`.\n- **Refresh token** — opaque random 256-bit، مـ hashed (SHA-256) at rest، TTL 30 يوم،\n  بيتعمله rotation كل استخدام؛ إعادة الاستخدام بتعمل invalidation للـ family كلها\n  (`refresh_tokens.family_id`).\n\n### الأدوار والصلاحيات (RBAC)\n\n| الـ Role  | الوصف                                       | الصلاحيات الافتراضية                                |\n| --------- | ------------------------------------------ | -------------------------------------------------- |\n| customer  | مستخدم نهائي                                 | `booking:read:self`, `booking:create`, `me:write`  |\n| support   | دعم الخط الأول                              | `booking:read:any`, `notification:resend`          |\n| admin     | admin كامل                                  | `*`                                                |\n\nنصوص الصلاحيات بتتطابق كـ glob expressions (مثلاً `booking:*` ⊆ `*`).\nالـ Authorization بيتفرض في NestJS عن طريق decorator `@RequirePerms(...)` + global\n`PermissionGuard` بيقرا `request.user.perms`.\n\n### سياسة كلمة المرور\n\n| القاعدة                                            | القيمة          |\n| ------------------------------------------------- | --------------- |\n| الحد الأدنى للطول                                  | 10              |\n| الحد الأدنى لـ zxcvbn score                        | 3               |\n| algorithm الـ Hash                                 | Argon2id        |\n| تكلفة الذاكرة                                      | 64 MiB          |\n| التكرارات / التوازي                                | 3 / 2           |\n| الـ Pepper                                         | env-bound (HSM) |\n| الـ History (في Basic)                             | غير مفعّل       |\n\n### OTP للعمليات الحساسة\n\n- كود رقمي 6 خانات عبر email، TTL 10 دقايق، استخدام واحد.\n- مطلوب لـ: إلغاء/refund العميل، حذف الحساب، تغيير الـ email.\n- محدود بـ rate-limit: حد أقصى 3 طلبات OTP لكل user كل 10 دقايق.\n\n---\n\n## الأمان (Security)\n\n### خريطة معالجة OWASP Top 10:2021\n\n| الخطر                              | المعالجة                                                                                          |\n| --------------------------------- | ------------------------------------------------------------------------------------------------ |\n| A01 Broken Access Control         | RBAC عن طريق guards، deny-by-default، فحص `userId` scope على كل read.                            |\n| A02 Cryptographic Failures        | TLS 1.2+، Argon2id، AES-256 at rest، RS256 JWT، مفيش تعامل مع PAN.                               |\n| A03 Injection                     | parameterized queries (Prisma)، Zod input validation، مفيش SQL مبني بالـ string.                 |\n| A04 Insecure Design               | threat model في DESIGN.md، مراجعة abuse cases لكل epic.                                          |\n| A05 Security Misconfiguration     | Helmet defaults متشددة، CSP report-only في الأول، مفيش debug في prod، تغييرات عن طريق IaC بس.    |\n| A06 Vulnerable Components         | `npm audit`، Dependabot، Snyk، نافذة patching كل أسبوعين.                                        |\n| A07 Identification/AuthN Failures | Argon2id، throttling للـ login، MFA عن طريق OTP، rotation للـ refresh-token + family invalidation.|\n| A08 Software/Data Integrity       | الـ CI بيوقّع الـ build artifacts، image digests مثبتة، package-lock معمول له commit.             |\n| A09 Logging & Monitoring          | Pino JSON logs، correlation IDs، Sentry، alerting على شذوذ الـ auth.                             |\n| A10 SSRF                          | outbound allow-list لـ Amadeus/PayTabs؛ مع mitigation لـ DNS rebinding؛ مفيش URLs من المستخدم.   |\n\n### التشفير\n\n- **In transit:** TLS 1.2/1.3 بس، ECDHE ciphers، HSTS preload.\n- **At rest:** تشفير Persistent Disk على GCP (AES-256-XTS by default)، Cloud SQL CMEK للـ backups،\n  Memorystore snapshots مشفّرة، GCS buckets بـ Google-managed أو CMEK كحد أدنى.\n- **Field-level:** الـ PII (DOB، رقم الوثيقة) في `passengers` مشفّر بـ AES-256-GCM\n  باستخدام **GCP Cloud KMS** DEK + envelope encryption.\n\n### نطاق PCI DSS\n\n- SAQ **A-EP** — حقول الدفع بتترندر بواسطة PayTabs PayPage (hosted)؛ الـ backend\n  ماشافش PAN/CVV أبداً. الـ controls المطلوبة: TLS، vendor due diligence،\n  log retention سنة، quarterly ASV scan.\n\n### Rate Limiting\n\n- Redis token-bucket لكل `(routeKey, principalKey)`؛ الـ principal = `userId` لو\n  المستخدم مسجّل، غير كده الـ IP بعد hashing.\n- بيرجع 429 مع `Retry-After` header.\n\n### CSRF\n\n- الـ endpoints المسجّلة اللي بتغيّر state بتقبل الـ JWT في `Authorization` header\n  (مش في cookies) → فالـ CSRF مش قابل للاستغلال بالطريقة الكلاسيكية. الـ Server Actions\n  في Next.js بتستخدم `same-origin` + فحص Origin.\n\n### إدارة الـ Secrets\n\n- FE + BE: **GCP Secret Manager** (لكل environment)، بيتعملها rotation؛ بتتحقن عند الـ boot عن طريق **Cloud IAM service account** مرفقة لـ Cloud Run.\n- مفيش secret بيتعمل له commit في git أبداً؛ pre-commit secret-scan hook مفروض.\n\n### النسخ الاحتياطي والاحتفاظ بالبيانات\n\n| البيانات              | فترة الاحتفاظ   | الطريقة                            |\n| --------------------- | --------------- | --------------------------------- |\n| Cloud SQL PITR        | 7 أيام          | continuous archive لـ GCS         |\n| Postgres logical dump | 30 يوم          | `pg_dump` يومي لـ GCS (مشفّر)      |\n| Application logs      | 30 يوم (hot) + سنة (cold) | Cloud Logging + GCS Archive class |\n| Audit log             | 7 سنين          | Append-only، GCS Bucket Lock (WORM) |\n\n---\n\n## مسار الحجز (Booking Workflow)\n\n### State Diagram\n\n```\n            ┌────────────────────────────────┐\n            ▼                                │\n        ┌────────┐  create-intent   ┌─────────────────┐  payment_succeeded   ┌───────────┐\n─create─▶│ DRAFT  │─────────────────▶│ PENDING_PAYMENT │─────────────────────▶│ CONFIRMED │\n        └────────┘                  └─────────────────┘                      └─────┬─────┘\n            │ 15m TTL                       │ 30m TTL                              │\n            │                                │                                     │\n            ▼                                ▼                                     ▼\n        ┌────────┐                      ┌────────┐                            ┌───────────┐\n        │ FAILED │                      │ FAILED │   refund                   │ CANCELLED │──refund─▶┌──────────┐\n        └────────┘                      └────────┘ ◀──────────────────────────└───────────┘         │ REFUNDED │\n                                                                                                    └──────────┘\n```\n\n### الخطوات تفصيلياً\n\n1. الـ Client بيعمل `POST /bookings` مع `Idempotency-Key`.\n2. السيرفر بيتحقق من الـ offer (`flights/price-check`).\n3. السيرفر بيدخل row في `bookings` (`status=DRAFT`، `expires_at=now()+15m`).\n4. الـ Client بينادي `POST /payments/paytabs` → بيتنشئ PayTabs transaction\n   (`tran_type=Auth`)، الحجز يبقى → `PENDING_PAYMENT`، `expires_at=now()+30m`.\n5. الـ Client بيتحوّل لـ PayTabs PayPage (3DS) لإدخال بيانات البطاقة.\n6. PayTabs IPN `tran_type=Auth, response_status=A` بيوصل.\n7. الـ Worker `booking.fulfill` بيشتغل: بينادي Amadeus لإصدار PNR.\n8. لو نجح، بيتنادى PayTabs `Capture` → الحجز → `CONFIRMED`،\n   ويتعمل enqueue للـ notification.\n9. لو فشل المزوّد: PayTabs `Void` (void uncaptured authorization)، الحجز → `FAILED`،\n   ويتبعت email للعميل \"ماقدرناش نأكد مع الطيران، مفيش خصم\".\n\n### مصفوفة الـ Timeouts والـ Rollback\n\n| الخطوة                        | الـ Timeout | فعل الفشل                                                                     |\n| ----------------------------- | ----------- | ----------------------------------------------------------------------------- |\n| Amadeus price-check           | 8 ثواني     | يعرض 409 PRICE_CHANGED، ويسمح بإعادة البحث.                                   |\n| PayTabs transaction create    | 6 ثواني     | retry مرة واحدة، بعدها 503.                                                    |\n| PayTabs confirm (client)      | 30 دقيقة    | الحجز يتعمل له FAIL تلقائي، والـ transaction يتلغي.                            |\n| Amadeus PNR creation          | 30 ثانية    | حتى 3 retries؛ في النهاية لو فشل يعمل Void للـ transaction ويـ FAIL الحجز.    |\n| PayTabs capture               | 10 ثواني    | retry حتى 5 مرات؛ في النهاية لو فشل يـ page on-call، ويبدأ supplier rollback. |\n\n### Idempotency\n\n- `Idempotency-Key` UUID لكل محاولة حجز؛ مخزّن في `idempotency_keys` لمدة 24 ساعة.\n- POST مكرر بنفس الـ key بيرجع الـ response الأصلي من غير side effects.\n\n---\n\n## مسار الـ Flight (Amadeus)\n\n```\nClient                       Next.js                   NestJS               Redis           Amadeus\n  │ search form              │                           │                     │              │\n  │─────────────────────────▶│                           │                     │              │\n  │                          │ POST /flights/search      │                     │              │\n  │                          │──────────────────────────▶│ cache key?          │              │\n  │                          │                           │────────────────────▶│              │\n  │                          │                           │ HIT → return        │              │\n  │                          │                           │                     │              │\n  │                          │                           │ MISS → call         │              │\n  │                          │                           │────────────────────────────────────▶│\n  │                          │                           │     offers          │              │\n  │                          │                           │◀────────────────────────────────────│\n  │                          │                           │ cache 10m + return  │              │\n  │ select offer             │                           │                     │              │\n  │─────────────────────────▶│ POST /flights/price-check │                     │              │\n  │                          │──────────────────────────▶│ Amadeus Flight Offers Price ───────▶│\n  │                          │                           │◀────────────────────────────────────│\n  │ checkout (pax + pay)     │                           │                     │              │\n  │─────────────────────────▶│ POST /bookings + /payments/paytabs              │              │\n  │                          │                           │                     │              │\n  │ 3DS challenge            │                           │                     │              │\n  │ PayTabs → authorized     │ IPN                       │                     │              │\n  │                          │                           │ worker.fulfill:     │              │\n  │                          │                           │ Flight Create Orders─────────────▶│\n  │                          │                           │ PNR + e-ticket      │              │\n  │                          │                           │ capture PayTabs     │              │\n  │ confirmation email       │                           │ enqueue email job   │              │\n```\n\n### الـ Caching\n\n| شكل الـ Key                                              | TTL    | ملاحظات                       |\n| -------------------------------------------------------- | ------ | ------------------------------ |\n| `flt:search:{origin}:{dest}:{out}:{ret}:{pax}:{cabin}`   | 10 دقايق | مظروف نتائج البحث            |\n| `flt:offer:{offerId}`                                    | 15 دقيقة | الـ offer الكامل لـ price-check |\n| `flt:airport:{iata}`                                     | 24 ساعة  | بيانات مرجعية                  |\n\n### معالجة الفشل\n\n- `PRICE_CHANGED`: بيرجع 409 من price-check؛ الـ client لازم يعيد العرض.\n- `OFFER_EXPIRED`: أعد البحث بنفس الـ filters؛ اعرض banner.\n- `PNR_CREATION_TIMEOUT`: retry، بعدها علّمه FAILED + alert.\n- `TICKETING_FAILED`: void PayTabs (uncaptured authorization)؛ compensating call للمزوّد لو الـ PNR\n  اتعمل قبل الفشل (Flight Order Management `DELETE`).\n\n---\n\n## مسار الدفع (Payment Flow)\n\n```\n┌─────────────┐  create Auth txn     ┌─────────────┐\n│  Client      │─────────────────────▶│ NestJS API  │\n└─────────────┘                       └────┬────────┘\n       │                                    │  PayTabs.payment.request (tran_type=Auth)\n       │                                    ▼\n       │                              ┌──────────┐\n       │  payment_url                 │ PayTabs  │\n       │◀─────────────────────────────└──────────┘\n       │ redirect to PayPage (hosted, 3DS)\n       │                                    \n       ▼                                    \n   3DS Challenge (issuer)                   \n       │                                    \n       ▼                                    \n   tran_type=Auth, response_status=A (authorized)\n       │                                    \n       ▼                                    \n   PayTabs IPN ──────────────▶ NestJS verify sig ─▶ enqueue booking.fulfill\n                                                          │\n                                                          ▼\n                                                    supplier PNR/booking\n                                                          │ success\n                                                          ▼\n                                                    PayTabs.capture(tran_ref)\n                                                          │\n                                                          ▼\n                                                    booking CONFIRMED + email\n```\n\n### الـ Refunds (في Basic)\n\n1. العميل بيطلب refund عن طريق `POST /bookings/{id}/cancel` (بيتطلب OTP).\n2. النظام بيفحص سياسة المزوّد → لو refundable وفي خلال الـ deadline، يحط\n   `status=CANCELLED` ويحط task `payment.refund.manual` في الطابور.\n3. فريق الـ Ops بيتنبه؛ الـ refund بيتعمل من PayTabs merchant dashboard.\n4. IPN `tran_type=Refund` من PayTabs بيوصل → بيتحدّث `payments.refunded_amount_minor`،\n   و`bookings.status=REFUNDED` لو الـ refund كان كامل.\n5. بيتبعت email للعميل.\n\n---\n\n## Modules الـ Admin\n\n| الصفحة                     | الإمكانيات                                                                          |\n| -------------------------- | ---------------------------------------------------------------------------------- |\n| Dashboard                  | KPIs النهارده: bookings، GMV، نسبة الفشل، أكتر أخطاء من المزوّدين.                  |\n| Bookings list              | بحث بـ ref/email/status، filter بالتاريخ/المزوّد، export CSV (للـ admin فقط).      |\n| Booking detail             | تفصيل كامل للعناصر، audit log، timeline الدفع، إعادة إرسال notification، علامة refunded. |\n| Users list                 | بحث بالـ email، عرض الـ profile، آخر login، حالة القفل.                            |\n| Notifications log          | آخر 30 يوم، الحالة، زر إعادة الإرسال، خطأ التسليم.                                  |\n| Supplier call inspector    | فحص rows الـ `supplier_calls` للحجز؛ مع إخفاء الـ secrets.                          |\n| Audit log                  | timeline للقراءة فقط لأفعال الموظفين؛ export CSV للـ compliance.                   |\n| Feature flags              | للقراءة فقط في Basic؛ بتعرض القيم الحالية من config service.                       |\n| Settings                   | profile الـ admin + تغيير كلمة المرور.                                              |\n\n---\n\n## الـ Deployment\n\n### الطوبولوجي (Topology)\n\n- **Frontend** (Next.js): **Cloud Run على GCP**، region أساسي واحد (`europe-west3` Frankfurt لـ EU/MENA) داخل مشروع GCP الخاص بالعميل.\n- **Backend** (NestJS): **Cloud Run على GCP**، نفس الـ region `europe-west3`، 2 app instances (min) + autoscaling لـ workers.\n- **Postgres**: **Cloud SQL for PostgreSQL 16**، 1 primary + 1 HA standby في نفس الـ region.\n- **Redis**: **Memorystore for Redis** (Standard tier)، multi-zone داخل الـ region.\n- **Static assets**: **Cloud CDN** قدام Cloud Run بـ `s-maxage=86400, stale-while-revalidate=604800`.\n- **Object storage**: **Google Cloud Storage** buckets (`jawla-prod-{tickets,backups,logs}`)، region `europe-west3`.\n\n### Environment Variables (مقتطف)\n\n| المتغير                    | المكان       | ملاحظات                                         |\n| ------------------------- | ------------ | ---------------------------------------------- |\n| `DATABASE_URL`            | API + worker | PgBouncer pool URL                             |\n| `DIRECT_URL`              | API (migrations) | URL الـ primary المباشر                     |\n| `REDIS_URL`               | API + worker | Memorystore for Redis TLS URL (private VPC)    |\n| `JWT_PRIVATE_KEY`         | API          | RS256 private، PEM، rotation كل 90 يوم          |\n| `JWT_PUBLIC_KEY`          | API + FE     | RS256 public                                   |\n| `AMADEUS_CLIENT_ID`/`SECRET` | API       | Self-Service prod                              |\n| `PAYTABS_API_KEY`         | API          | PayTabs server key                             |\n| `PAYTABS_PROFILE_ID`      | API          | merchant profile ID                            |\n| `PAYTABS_WEBHOOK_SECRET`  | API          | IPN HMAC secret                                |\n| `EMAIL_PROVIDER_KEY`      | worker       | Resend / SendGrid                              |\n| `SENTRY_DSN`              | API + FE     |                                                |\n| `NEXT_PUBLIC_PAYTABS_PROFILE` | FE       | client-side profile ID for PayPage             |\n\n### CI/CD Pipeline (GitHub Actions)\n\n| المرحلة         | الخطوات                                                                                              |\n| --------------- | ---------------------------------------------------------------------------------------------------- |\n| `lint`          | `pnpm lint` (eslint, prettier), `tsc --noEmit`                                                       |\n| `test:unit`     | `jest --maxWorkers=2 --coverage` (FE + BE)                                                           |\n| `test:integration` | تشغيل Postgres + Redis عن طريق service containers؛ تشغيل integration suite الـ NestJS              |\n| `build`         | `pnpm build` (FE), `pnpm build && docker build` (BE), SBOM + image scan بـ Trivy                     |\n| `e2e`           | Playwright على staging URL بعد الـ preview deploy                                                    |\n| `deploy:preview` | **Cloud Run preview revision** للـ FE والـ BE لكل PR (traffic = 0)؛ deploy لـ `staging` Cloud Run service على `main` |\n| `deploy:prod`   | بوابة موافقة يدوية → **Cloud Run blue/green traffic split** (5% → 25% → 100%)                        |\n| `smoke`         | synthetic `/healthz` + booking dry-run بعد الـ deploy للـ prod                                       |\n\n---\n\n## الـ Logging\n\n- المكتبة: **pino** (BE) و Next.js الـ built-in + `pino-http` لمسارات الـ SSR.\n- التنسيق: JSON، سطر واحد لكل event.\n- الحقول المطلوبة: `ts`, `level`, `service`, `env`, `traceId`, `spanId`,\n  `userId?`, `bookingId?`, `route`, `msg`.\n- الـ Levels: `trace`, `debug`, `info`, `warn`, `error`, `fatal`. الافتراضي في prod هو `info`.\n- الحقول الحساسة بيتعملها redact عن طريق pino redact list: `password`, `token`, `secret`,\n  `authorization`, `card`, `pan`, `cvv`, `doc_number`.\n- الـ Retention: 30 يوم hot (**Cloud Logging**)، 365 يوم cold (**GCS Archive class**).\n- الـ Correlation: `X-Request-Id` header بيتمرر من البداية للنهاية؛ لو غير موجود،\n  بيتولّد من السيرفر كـ ULID.\n\n---\n\n## المراقبة (Monitoring)\n\n- **Sentry** لتتبع أخطاء FE + BE وصحة الـ releases.\n- **OpenTelemetry** SDK → Grafana Tempo للـ traces.\n- **Prometheus** بيـ scrape metrics الـ `prom-client` من NestJS؛ Grafana dashboards.\n\n### الـ Metrics الأساسية\n\n| الـ Metric                            | النوع     | ملاحظات                                |\n| ------------------------------------- | --------- | -------------------------------------- |\n| `http_server_duration_ms`             | histogram | حسب route, method, status              |\n| `http_server_inflight`                | gauge     | لكل route                              |\n| `supplier_call_duration_ms`           | histogram | حسب supplier, op                       |\n| `supplier_call_errors_total`          | counter   | حسب supplier, op, code                 |\n| `booking_state_transitions_total`     | counter   | from → to                              |\n| `payment_intent_status_total`         | counter   | حسب الـ status                         |\n| `queue_jobs_total`                    | counter   | حسب queue, state                       |\n| `queue_job_duration_ms`               | histogram | حسب queue                              |\n| `pg_pool_in_use`                      | gauge     |                                        |\n| `redis_command_duration_ms`           | histogram |                                        |\n\n### حدود الـ Alerts\n\n| الشرط                                                              | الخطورة  | الوجهة       |\n| ------------------------------------------------------------------ | -------- | ------------ |\n| API p95 > 1 ثانية لمدة 5 دقايق                                     | warn     | #ops-alerts  |\n| نسبة فشل الـ booking > 5% خلال 15 دقيقة                            | page     | PagerDuty    |\n| نسبة أخطاء المزوّد (Amadeus) > 10% خلال 10 دقايق                    | page     | PagerDuty    |\n| تأخر PayTabs IPN > 5 دقايق                                           | page     | PagerDuty    |\n| Postgres replication lag > 30 ثانية                                | warn     | #ops-alerts  |\n| استخدام الـ Disk > 80%                                              | warn     |              |\n| نسبة 5xx > 1% خلال 5 دقايق                                          | page     | PagerDuty    |\n\n---\n\n## استراتيجية الاختبار (Testing Strategy)\n\n| الطبقة        | الأدوات                                | هدف التغطية              |\n| ------------ | -------------------------------------- | ------------------------ |\n| Unit (BE)    | Jest, ts-jest                          | ≥ 80% lines، ≥ 70% branches |\n| Unit (FE)    | Jest, React Testing Library            | ≥ 75% lines              |\n| Integration  | Jest + testcontainers (PG, Redis)      | كل الـ public services + repos مغطاة |\n| Contract     | Pact (Amadeus, PayTabs stubs)          | كل تكاملات المزوّدين      |\n| E2E          | Playwright                             | Smoke + المسارات الحرجة (search, book, pay, cancel) |\n| Performance  | k6                                     | baseline scripts في الـ repo |\n| Accessibility | axe-core في Playwright                | صفر مخالفات serious      |\n| Security     | OWASP ZAP baseline                     | بوابة في الـ CI أسبوعياً  |\n\n- كل الـ PRs لازم تحافظ على التغطية فوق الـ baseline؛ تقليلها بيفشل الـ CI.\n- ميزانية الـ Flake: > 1% flake rate بتمنع الـ merge على `main`.\n\n---\n\n## اختبارات القبول (Acceptance Tests)\n\n> الصيغة: Given / When / Then\n\n| ID      | العنوان                              | Given                                                              | When                                              | Then                                                                                  |\n| ------- | ------------------------------------ | ------------------------------------------------------------------ | ------------------------------------------------- | ------------------------------------------------------------------------------------- |\n| AT-001  | تسجيل بـ email صالح                  | أنا زائر جديد                                                       | بقدم register بـ email صالح + password قوية      | الحساب اتعمل بـ `pending_verification`؛ email التحقق اتبعت.                          |\n| AT-002  | رفض كلمة مرور ضعيفة                  | أنا في form الـ register                                            | بقدم password \"12345678\" (zxcvbn 1)              | 400 مع `code=WEAK_PASSWORD`؛ مفيش row اتدخّل.                                         |\n| AT-003  | التحقق من الـ email                  | عندي verification token                                             | بعمل POST `/auth/verify-email` بـ token صالح     | `users.email_verified=true`؛ 200.                                                     |\n| AT-004  | throttle للـ login                   | فشلت في الـ login 5 مرات                                            | بحاول المرة السادسة خلال 10 دقايق                | 423 Locked؛ الحساب اتقفل 15 دقيقة.                                                    |\n| AT-005  | rotation للـ refresh token           | عندي refresh token صالح                                             | بنادي `/auth/refresh`                            | بستلم refresh token جديد؛ القديم اتلغى.                                              |\n| AT-006  | كشف إعادة استخدام الـ refresh token  | عملت rotation للـ refresh token من قبل                              | قدّمت الـ refresh token القديم                   | الـ family كلها اتلغت؛ 401.                                                            |\n| AT-007  | الـ caching للبحث عن flights         | Cache MISS لـ (CAI,DXB,...)                                         | بنادي `/flights/search`                          | Amadeus بتتنادى مرة واحدة؛ النداء التاني خلال 10 دقايق بيرجع من الـ cache.            |\n| AT-008  | flight price-check من غير تغيير      | السعر للـ offer لسه صالح                                            | بنادي `/flights/price-check`                     | 200 مع `delta=0`.                                                                     |\n| AT-009  | flight price-check اتغيّر > 0.5%     | Amadeus رجّعت سعر زائد 2.4%                                         | بنادي `/flights/price-check`                     | 409 `PRICE_CHANGED`؛ الـ offer اتحدّث بالسعر الجديد لإعادة التأكيد.                   |\n| AT-010  | حارس صلاحية جواز السفر               | جواز السفر بيخلص قبل 6 شهور من تاريخ العودة                         | بقدم booking                                      | 422 `PASSPORT_TOO_SHORT`.                                                              |\n| AT-011  | idempotency الحجز                    | عملت POST `/bookings` بـ key K ونجح                                 | عملت POST `/bookings` تاني بنفس الـ key K        | الـ response الأصلي 201 رجع؛ مفيش row جديد اتعمل.                                     |\n| AT-012  | انتهاء الـ Draft                     | حجز DRAFT عمره > 15 دقيقة                                            | الـ cleanup worker شغّال                          | Status → FAILED بـ reason `DRAFT_EXPIRED`.                                            |\n| AT-013  | دفع بـ 3DS مطلوب                     | كارت اختبار بيطلب 3DS2                                              | بأكد الـ transaction                            | challenge المُصدر بيظهر؛ لو نجح، الـ PayTabs transaction بيتحول لـ `authorized`.       |\n| AT-014  | signature الـ webhook                | IPN بـ PayTabs signature غير صالح وصل                              | NestJS بيتحقق                                    | 400 `INVALID_SIGNATURE`؛ مفيش تغيير في الـ state.                                     |\n| AT-015  | rollback فشل ticketing من المزوّد    | إنشاء PNR في Amadeus بيرجع 5xx 3 مرات                              | الـ Worker استنفذ الـ retries                    | PayTabs Authorization اتعملها Void؛ الحجز FAILED؛ email \"مفيش خصم\" اتبعت للعميل.       |\n| AT-016  | reconcile للـ refund اليدوي          | فريق Ops عمل refund من PayTabs dashboard                            | IPN `tran_type=Refund` وصل                       | `payments.refunded_amount_minor` اتحدّث؛ الحجز REFUNDED لو كان كامل.                  |\n| AT-017  | الإلغاء بيطلب OTP                    | أنا صاحب الحجز                                                       | بنادي `/bookings/{id}/cancel` من غير OTP         | 401 `OTP_REQUIRED`.                                                                    |\n| AT-018  | منع قراءة حجز عبر الـ tenants        | أنا user A                                                          | بعمل GET `/bookings/{idOfUserB}`                 | 403 Forbidden.                                                                         |\n| AT-019  | audit log للـ admin                  | أنا admin وبعمل إعادة إرسال notification                            | الفعل اكتمل                                       | row في `audit_events` اتدخل بـ actor، target، before/after.                            |\n| AT-020  | rate limit للـ auth                  | أصدرت 11 محاولة login في 60 ثانية من IP واحد                        | المحاولة الـ 11                                  | 429 مع `Retry-After`.                                                                  |\n| AT-021  | التعريب (AR)                         | الـ locale في profile = `ar`                                        | بستلم email تأكيد حجز                            | الـ Email بيظهر RTL بنص AR.                                                            |\n| AT-022  | WCAG focus order                     | بعمل tab في form البحث                                              | بلاحظ الـ focus                                  | الـ Focus بيزور الـ inputs بترتيب DOM؛ مع focus ring ظاهر يحقق contrast 3:1.          |\n| AT-023  | Backup PITR                          | أنا DBA                                                              | شغّلت PITR لـ 30 دقيقة فاتت                       | الـ Restore بيكتمل في < 4 ساعات (RTO)؛ فقد البيانات ≤ 15 دقيقة (RPO).                  |\n\n---\n\n## ملحق A — مخاطر / مسائل مفتوحة\n\n| ID   | الخطر                                                       | الاحتمالية | التأثير | المعالجة                                                  |\n| ---- | ----------------------------------------------------------- | ---------- | ------ | --------------------------------------------------------- |\n| R-01 | حدود rate الـ Amadeus في فترات العروض                       | متوسط      | عالي   | caching قوي، queueing للطلبات، credentials بديلة.         |\n| R-02 | تساقط المستخدمين عند 3DS challenge في PayTabs               | متوسط      | متوسط  | تذكير بالسعر قبل 3DS، نص \"save card\" بـ A/B.              |\n| R-03 | تجاوز SLA للـ refund اليدوي                                 | منخفض      | متوسط  | تقرير يومي لـ Ops؛ alert على > 24 ساعة معلّق.             |\n| R-04 | عطل في الـ region الواحد                                    | منخفض      | عالي   | runbook موثّق لتشغيل DR في `iad`.                          |\n| R-05 | تأخر pentest ما قبل الإطلاق                                 | متوسط      | متوسط  | جدولة الـ pentest قبل GA بـ 4 أسابيع.                     |\n\n— *نهاية الوثيقة — Jawla SRS Basic v1.0* —\n","srs-professional":"## 🎯 ملخص فني لمجلس الإدارة (بلغة الأعمال)\n\nهذه الوثيقة هي المخطط الهندسي الكامل للنظام في الباقة الاحترافية، وهي إصدار موسّع من الباقة الأساسية يضيف قدرات تجارية متقدمة (محفظة، نقاط ولاء، WhatsApp، خدمة ذاتية للعميل، تعدد العملات). الملخص التالي يلخّص ما يبنيه الفريق ولماذا تستحق الباقة استثمارها بلغة الأعمال.\n\n### ماذا يبنيه فريق الهندسة؟ (إضافات على الباقة الأساسية)\n\n- بوابة خدمة ذاتية للعميل: إلغاء حجوزات الطيران وطلب استرداد المبلغ دون الحاجة للاتصال بخدمة العملاء\n- محفظة إلكترونية متعددة العملات (جنيه مصري، دولار، يورو، ريال، درهم) داخل حساب العميل\n- نظام نقاط ولاء يكافئ العميل عن كل حجز ويحوّل النقاط إلى خصومات على الحجوزات اللاحقة\n- تكامل WhatsApp Business لإرسال تأكيدات الحجز وتذاكر الطيران والتنبيهات بشكل فوري\n- لوحة تحكم إدارية متقدمة تتضمن تقارير المبيعات والعمولات وتحليل سلوك العملاء\n- بوابة الدفع PayTabs متعددة العملات (EGP/USD/EUR/SAR/AED) لتغطية البطاقات المحلية والدولية بمعالجة موحّدة\n- نظام استرداد آلي للدفع يقلل وقت المعالجة من أيام إلى دقائق\n- نظام تنبيهات أسعار يخبر العميل بانخفاض سعر رحلة كان يبحث عنها\n- المنصة في هذه الباقة تركز حصرياً على بيع تذاكر الطيران (Flights only) — لا توجد منتجات فنادق\n\n### كيف نضمن أن النظام آمن وموثوق؟\n\n| الضمان                                  | الطريقة بلغة الأعمال                                                                       |\n| --------------------------------------- | ------------------------------------------------------------------------------------------ |\n| الموقع متاح دائماً                       | استضافة على **Google Cloud Platform (GCP)** بضمان وقت تشغيل 99.5% (أي توقف لا يتجاوز 3.5 ساعات شهرياً) — حساب GCP **مقدَّم من العميل** |\n| كشف عمليات الدفع المشبوهة                | محرك ذكي يحلل كل عملية دفع ويمنع التحويلات المشبوهة قبل تنفيذها                             |\n| سلامة عمليات الاسترداد الآلية            | حد أقصى لكل عملية استرداد آلية، وما يتجاوز الحد يحتاج موافقة مسؤول                         |\n| الامتثال لمعايير الدفع العالمية (PCI)    | جميع البيانات الحساسة تمر عبر مزودين معتمدين دون أن تمر بخوادمنا                            |\n| نسخ احتياطية متعددة المناطق             | نسخ على مدار اليوم في موقعين جغرافيين مختلفين لضمان عدم فقد البيانات                       |\n| تشفير شامل لبيانات العملاء              | تشفير قوي (AES-256) على البيانات الحساسة عند التخزين وعند النقل                            |\n| سجل تدقيق كامل لجميع العمليات           | كل إجراء على النظام مسجّل ويمكن مراجعته لأي تحقيق مالي أو أمني                              |\n| مراقبة استباقية للأداء                   | اكتشاف بطء الأداء قبل أن يلاحظه العملاء، مع إنذارات فورية للفريق                            |\n\n### الأرقام المهمة لاتخاذ القرار\n\n| المتغير                                      | القيمة                                            |\n| -------------------------------------------- | ------------------------------------------------- |\n| عدد المستخدمين المتوقع (السنة الأولى)         | 40,000 – 70,000 مستخدم نشط                       |\n| متوسط زمن استجابة الصفحة                      | أقل من 1.5 ثانية                                 |\n| نسبة وقت تشغيل النظام (Uptime SLA)            | 99.5%                                              |\n| عدد المعاملات اليومية المتوقعة                 | 200 – 500 معاملة                                  |\n| عدد العملات المدعومة                          | 5 عملات (EGP, USD, EUR, SAR, AED)                |\n| التكاليف الشهرية للبنية التحتية              | حوالي 800 – 1,200 USD شهرياً                     |\n| عدد المهندسين العاملين على المشروع           | 5 (Backend + Frontend + Mobile-web + DevOps + QA) |\n\n### اعتمادنا على الموردين الخارجيين\n\n| المورد                          | لماذا نحتاجه بلغة الأعمال                                                          |\n| ------------------------------- | ---------------------------------------------------------------------------------- |\n| Amadeus                         | المصدر العالمي لبيانات الرحلات الجوية والأسعار اللحظية والحجز الفعلي لتذاكر الطيران  |\n| PayTabs                         | بوابة الدفع متعددة العملات (EGP/USD/EUR/SAR/AED) لقبول البطاقات المحلية والدولية والمحافظ الإلكترونية بمعالجة موحّدة |\n| WhatsApp Business API           | قناة التواصل الأساسية في مصر لإرسال التأكيدات والتذاكر مباشرة على هاتف العميل      |\n| Mailgun / SendGrid              | إرسال البريد الإلكتروني الموثوق للفواتير والتأكيدات                                  |\n| **Google Cloud Platform (GCP) — مقدَّم من العميل** | البنية التحتية المرنة (Cloud Run + Cloud SQL + Memorystore) التي تتكيف مع حجم الحركة لحظياً، وحساب GCP مملوك للعميل تماماً |\n| **Google Cloud Storage (GCS) + Cloud CDN** | تخزين وعرض e-tickets والفواتير وأصول واجهة المستخدم بسرعة عالية للعملاء في أي مكان |\n\n### ما الذي يحتاج المجلس أن يعرفه؟\n\n- مقارنة مع الباقة الأساسية: زيادة في القدرات الإدارية والتجارية بنسبة 60% مقابل زيادة في السعر 42%\n- البنية جاهزة للنمو حتى 500,000 مستخدم في السنة الثانية دون إعادة بناء\n- دعم العملات الأجنبية يفتح السوق الخليجي والمصريين بالخارج كقطاع جديد\n- الخدمة الذاتية تقلل تكاليف خدمة العملاء بنسبة 40% خلال 6 أشهر من الإطلاق\n- نقاط الولاء ترفع معدل تكرار الشراء (Repeat Rate) من 12% إلى 28% خلال السنة الأولى\n\n---\n\n# مواصفات متطلبات البرنامج — Jawla Tours OTA (المستوى Professional)\n\n## ضبط الوثيقة\n\n| الحقل             | القيمة                                                          |\n| ----------------- | -------------------------------------------------------------- |\n| عنوان الوثيقة     | Jawla Tours OTA — SRS (المستوى Professional)                   |\n| معرّف الوثيقة     | JAWLA-SRS-PRO                                                  |\n| الإصدار           | 1.0                                                            |\n| تاريخ الإصدار     | 2026-06-29                                                     |\n| الحالة            | معتمد — Baseline                                                |\n| التصنيف           | داخلي — Engineering / Product / Finance                        |\n| المالك            | Jawla Platform Engineering                                     |\n| أعدّها            | Platform Architecture Group                                    |\n| راجعها            | CTO, Head of Product, Head of Finance, QA Lead, Security Lead  |\n| اعتمدها           | CTO                                                            |\n| التوزيع           | Engineering, Product, QA, DevOps, Security, Finance, Support   |\n\n### سجل التعديلات\n\n| الإصدار | التاريخ    | الكاتب              | القسم/الأقسام               | ملخص التغيير                                                          |\n| ------- | ---------- | ------------------- | --------------------------- | -------------------------------------------------------------------- |\n| 0.1     | 2026-04-22 | Platform Arch Group | الكل                        | مسودة مبنية فوق المستوى Basic (delta-spec)                            |\n| 0.2     | 2026-05-09 | Finance             | Payment, NFR (FX, compliance) | دعم عدة عملات، refunds آلية، وتخفيف مخاطر FX                        |\n| 0.3     | 2026-05-25 | Platform Arch Group | Architecture, Payment       | إضافة تكامل PayTabs متعدد العملات (EGP/USD/EUR/SAR/AED) ودعم profiles لكل market |\n| 0.4     | 2026-06-08 | Product             | Admin, FR                   | لوحة admin متقدمة + صفحات الحساب الذاتي للعميل (account self-service)  |\n| 0.5     | 2026-06-17 | Security            | Security, AuthN             | تخزين توكنات WhatsApp Business، تحسين أمان OTP                        |\n| 0.6     | 2026-06-24 | QA Lead             | Acceptance                  | إضافة AT-025..AT-046                                                  |\n| 1.0     | 2026-06-29 | CTO                 | الكل                        | اعتماد الـ Baseline                                                   |\n\n### المسرد (إضافات Pro)\n\n| المصطلح      | المعنى                                                                   |\n| ------------ | ------------------------------------------------------------------------- |\n| GMV          | Gross Merchandise Value (مجموع قيم الحجوزات المؤكدة)                       |\n| Take Rate    | صافي العمولة مقسومًا على الـ GMV                                            |\n| BSP-CASS     | نظام تسوية IATA للطيران والنقل متعدد الوسائط                                |\n| WABA         | WhatsApp Business Account                                                 |\n| Idempotency  | خاصية إعادة المحاولة بنفس الـ key بأمان دون آثار جانبية                      |\n| MAR          | Multi-currency Authorization Routing                                      |\n\n---\n\n## مقدّمة\n\n### الغرض\n\nهذه الوثيقة تحدّد متطلبات البرنامج للمستوى **Professional** من *Jawla Tours*.\nوهي تحلّ محل الـ baseline الخاص بالمستوى Basic، بإضافة تجارة متعددة العملات،\nوتكامل PayTabs متعدد العملات، وrefunds آلية، وإشعارات WhatsApp، وصفحات حساب ذاتي للعميل،\nولوحة admin متقدمة. وهي العقد بين Engineering و Product و Finance و Security\nوالـ external auditors للإصدار الكبير الثاني (المستهدف GA في Q4 2026). المنصة في هذا المستوى flights only — منتجات الفنادق غير مشمولة.\n\n### النطاق\n\nداخل النطاق:\n\n- كل وظائف المستوى Basic (مفترضة ولن يُعاد ذكرها إلا حين تتغير جوهريًا) — Flights فقط.\n- **التجارة متعددة العملات**: التسعير والشحن والتسوية والـ refund من البداية للنهاية\n  بـ EGP و USD و EUR و GBP و SAR و AED و KWD؛ مع سياسة شفافة لهامش الـ FX.\n- **بوابة دفع PayTabs**: متعددة العملات (EGP/USD/EUR/SAR/AED)، تدعم البطاقات\n  المحلية والدولية والمحافظ الإلكترونية ووسائل الدفع البديلة في منطقة MENA.\n- **حساب ذاتي للعميل** (account self-service، ليس custom dashboard): الرحلات، الملف الشخصي،\n  خزينة وثائق السفر، المسافرون المفضلون، وسائل الدفع المحفوظة (مُدارة عبر PayTabs)، الإيصالات،\n  خدمة refund ذاتية. لوحات التحكم القابلة للتخصيص (custom dashboards) متاحة فقط في Enterprise.\n- **إشعارات WhatsApp Business** عبر Meta Cloud API (مع templates معتمدة).\n- **تنسيق refund آلي** مع compensation متعدد المراحل (supplier + PSP).\n- **Admin متقدم** يحوي تقارير، عمليات bulk، صحة الـ supplier، طابور dunning.\n- **حوالي 33 endpoint من نوع REST**.\n\nخارج النطاق (مؤجل لمستوى Enterprise):\n\n- تطبيقات mobile أصلية، portal للوكلاء B2B، white-label، fraud ML، تسعير ديناميكي،\n  stack طوابير لحزم الـ deals، multi-region active-active.\n- منتجات الفنادق، السيارات، النشاطات، أو غيرها من منتجات السفر (المنصة flights only).\n\n### اصطلاحات الوثيقة\n\n- نفس اصطلاحات RFC 2119 و Gherkin المستخدمة في المستوى Basic.\n- حين يكون المتطلب **منقولًا حرفيًا** من Basic، نشير لمعرّفه القديم (مثلًا \"extends FR-027\").\n\n### المراجع\n\n| Ref ID | المرجع                                                                          |\n| ------ | ------------------------------------------------------------------------------- |\n| R-01   | JAWLA-SRS-BASIC v1.0                                                            |\n| R-02   | Amadeus Flight Create Orders v2, Flight Offers Pricing                          |\n| R-03   | PayTabs PayPage API v3 + IPN (multi-currency settlement EGP/USD/EUR/SAR/AED)    |\n| R-04   | PayTabs Transactions API (Auth/Capture/Refund/Void)                             |\n| R-05   | WhatsApp Business Cloud API — Messaging + Templates                             |\n| R-06   | PCI DSS v4.0 — SAQ A-EP                                                         |\n| R-07   | EU GDPR، قانون حماية البيانات المصري 151/2020، Saudi PDPL                       |\n| R-08   | OWASP Top 10:2021 + ASVS 4.0.3 L2                                               |\n| R-09   | WCAG 2.1 AA, EN 301 549                                                         |\n\n---\n\n## المتطلبات الوظيفية\n\n> إضافة للمستوى السابق: المتطلبات **جديدة** ما لم يُذكر *extends*.\n\n### الـ Module: Authentication (FR-001 — FR-022)\n\n| ID     | المتطلب                                                                                                            | الأولوية |\n| ------ | ----------------------------------------------------------------------------------------------------------------- | -------- |\n| FR-001 | *Extends Basic FR-001..018.* كل متطلبات الـ auth منقولة كما هي ما لم يُذكر تعديل أدناه.                              | MUST     |\n| FR-019 | يجب أن يدعم النظام TOTP MFA (RFC 6238، نافذة 30 ثانية، SHA-1/6 أرقام) كاختيار اختياري لكل user.                      | MUST     |\n| FR-020 | يجب أن يطلب النظام تحدي MFA قبل الـ refund الذاتي وإدارة الـ saved cards.                                            | MUST     |\n| FR-021 | يجب أن يسمح النظام بـ Google SSO و Apple SSO مع mapping للـ email-claim؛ ويُطلب استكمال الملف عند أول تسجيل دخول.    | MUST     |\n| FR-022 | يجب أن يدعم النظام عرض الـ sessions الحالية مع إمكانية remote-revoke (قائمة الأجهزة).                                | MUST     |\n\n### الـ Module: Flights (FR-023 — FR-038)\n\n| ID     | المتطلب                                                                                                                  | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-023 | *Extends Basic FR-019..032.* كل متطلبات الطيران الأساسية تظل سارية.                                                        | MUST     |\n| FR-024 | يجب أن يعرض النظام fare bundles (مثل LITE/STANDARD/FLEX) عندما تكشف شركة الطيران عن branded fares.                          | MUST     |\n| FR-025 | يجب أن يسمح النظام بإضافة ancillary add-ons عند الـ checkout: حقيبة إضافية، اختيار مقعد إن دعم الـ supplier ذلك.            | MUST     |\n| FR-026 | يجب أن يدعم النظام itineraries بنمط multi-city حتى 6 slices.                                                                | MUST     |\n| FR-027 | يجب أن يدعم النظام إدخال frequent-flyer number لكل pax لكل carrier (FOID)، مع تحقّق وفق قائمة IATA carrier code.            | MUST     |\n| FR-028 | يجب أن يسمح النظام للعميل بإضافة حقيبة بعد الحجز إن سمح الـ supplier، مع تطبيق رسم الفرق.                                    | SHOULD   |\n| FR-029 | يجب أن يعرض النظام السعر بالعملة التي اختارها العميل مع إفصاح صريح عن سعر الـ FX والـ margin.                                | MUST     |\n| FR-030 | يجب أن يُصدر النظام e-ticket PDF بلغة الحجز يحوي كل الـ legs وملخص fare rules وجدول الأمتعة للـ carrier.                     | MUST     |\n| FR-031 | يجب أن يسمح النظام بطلب تغيير ذاتي للرحلة (إن سمحت شركة الطيران)؛ مع حساب الفرق فوريًا.                                       | SHOULD   |\n| FR-032 | يجب أن يحتفظ النظام بدفتر \"المسافرين المحفوظين\" لكل user، مع تعبئة بيانات الـ pax تلقائيًا بعد الموافقة.                       | MUST     |\n\n### الـ Module: Booking (FR-039 — FR-052)\n\n| ID     | المتطلب                                                                                                       | الأولوية |\n| ------ | ------------------------------------------------------------------------------------------------------------ | -------- |\n| FR-039 | *Extends Basic FR-033..043.*                                                                                  | MUST     |\n| FR-040 | يجب أن
