هوامش 25%+ تلقائياً.\n- الباقات المُجمَّعة تُحقِّق ربحية أعلى من بيع العناصر منفصلة.\n- البيع التكميلي يضيف 15-20% للإيرادات لكل حجز.\n\n#### 6. خفض التكاليف\n- أتمتة 80%+ من العمليات اليدوية.\n- خفض تكلفة الحجز الواحد 70% مقارنة بالنموذج اليدوي.\n- نظام كشف الاحتيال يحمي من خسائر تُقدَّر بمئات الآلاف سنوياً.\n\n### الفوائد التشغيلية\n\n#### 7. الكفاءة التشغيلية الفائقة\n- معالجة آلاف الحجوزات يومياً بفريق صغير.\n- خدمة ذاتية للعميل تُخفِّض عبء الفريق.\n- إدارة فروع متعددة من لوحة موحدة.\n\n#### 8. الجودة والاتساق\n- تجربة موحدة عبر جميع الفروع وجميع المنصات.\n- معايير خدمة موثقة وقابلة للقياس.\n- تقليل الأخطاء البشرية إلى الحد الأدنى.\n\n### الفوائد التسويقية\n\n#### 9. الانتشار والوصول\n- وصول لشرائح جديدة من العملاء (شباب، عملاء دوليون، شركات).\n- شبكة وكلاء توسع الانتشار الجغرافي دون فتح فروع.\n- علامات تجارية فرعية تستهدف شرائح متخصصة.\n\n#### 10. ولاء العملاء\n- نظام ولاء متعدد المستويات يُحوِّل العملاء إلى سفراء.\n- معدل احتفاظ بالعملاء يفوق 70%.\n- تقييمات إيجابية تُعزِّز السمعة الرقمية.\n\n### الفوائد الاستراتيجية الطويلة الأمد\n\n#### 11. أصل رقمي عالي القيمة\n- بناء أصل تقني يزيد من قيمة الشركة السوقية بشكل ملحوظ.\n- جاذبية للمستثمرين الإقليميين والدوليين.\n- جاهزية للاكتتاب العام المستقبلي.\n\n#### 12. بيانات استراتيجية\n- بيانات قيمة عن أنماط السفر في السوق المصري.\n- إمكانية بيع البيانات والتحليلات لشركاء أو شركات بحوث.\n- اتخاذ قرارات استثمارية مدروسة في المنتجات والوجهات.\n\n#### 13. شراكات استراتيجية\n- جذب شراكات مع شركات الطيران الكبرى.\n- شراكات مع سلاسل الفنادق العالمية بشروط مميزة.\n- شراكات مع البنوك لخدمات الدفع والتقسيط.\n\n---\n\n## الجدول الزمني\n\nتم تخطيط المشروع لينتهي خلال فترة لا تتجاوز أربعة وعشرين أسبوعاً، موزعة كما يلي:\n\n| الأسبوع | المرحلة | الأنشطة الرئيسية | المُخرَجات |\n|---------|---------|------------------|-----------|\n| 1-2 | البدء والاكتشاف المؤسسي | ورش عمل مع الإدارة، تحليل الأعمال، اعتماد الرؤية | وثيقة الاستراتيجية الرقمية |\n| 3 | الهوية البصرية | تصميم متكامل للويب والتطبيقات وعلامات White-label | الهوية البصرية الكاملة |\n| 4-5 | التصميم الشامل | تصميم جميع واجهات المستخدم | مكتبة التصاميم الشاملة |\n| 6-7 | البنية الأساسية | بناء البنية المعمارية الأساسية | الأساس المؤسسي جاهز |\n| 8-10 | منصة B2C الأساسية | بناء منصة الويب الرئيسية | منصة B2C كاملة |\n| 11 | الباقات المُجمَّعة | بناء محرك دمج الطيران والفنادق | الباقات تعمل بالكامل |\n| 12 | بوابة B2B | بناء منصة الوكلاء | بوابة الوكلاء جاهزة |\n| 13 | الجولات السياحية | بناء نظام إدارة الجولات | نظام الجولات جاهز |\n| 14 | الحجوزات الجماعية | بناء أداة المجموعات الكبيرة | نظام المجموعات جاهز |\n| 15 | تطبيقات الهاتف + الحسابات المؤسسية | تطوير iOS و Android، نظام الشركات | التطبيقات والحسابات المؤسسية جاهزة |\n| 16 | نظام White-label | بناء البنية متعددة العلامات | نظام White-label جاهز |\n| 17-18 | لوحة الإدارة المؤسسية | بناء لوحة الفروع المتعددة | اللوحة المؤسسية جاهزة |\n| 19 | التسعير الديناميكي | بناء محرك التسعير الذكي | نظام التسعير جاهز |\n| 20 | التحليلات + كشف الاحتيال | بناء نظام التقارير والحماية | الذكاء والحماية جاهزان |\n| 21 | الاختبار الشامل | اختبارات تحميل، أمان، تجربة مستخدم | تقارير الاختبارات |\n| 22 | التدريب المؤسسي | تدريب جميع الفرق | فرق مُدرَّبة بالكامل |\n| 23 | الإطلاق المرحلي | إطلاق متدرج للمكونات | منصة منشورة |\n| 24 | الإطلاق الكامل والمتابعة | إطلاق رسمي شامل ومتابعة مكثفة | منصة تعمل بكامل طاقتها |\n\n> **ملاحظة:** قد يمتد الجدول الزمني بأربعة أسابيع إضافية في حال طلب العميل تعديلات جوهرية على المتطلبات بعد بدء التنفيذ، أو في حال تأخر تسليم بيانات الاعتماد من الجهات الخارجية.\n\n---\n\n## جدول الدفع\n\nتم تقسيم القيمة الإجمالية للمشروع البالغة **1,390,000 جنيه مصري** على أربع دفعات مرنة تواكب مراحل الإنجاز:\n\n| الدفعة | النسبة | القيمة (جنيه مصري) | موعد الاستحقاق | المرحلة المرتبطة |\n|--------|--------|---------------------|----------------|------------------|\n| الأولى | 30% | 417,000 جنيه | عند توقيع العقد | بدء المشروع وتأمين الموارد المؤسسية |\n| الثانية | 25% | 347,500 جنيه | نهاية الأسبوع العاشر | اكتمال منصة B2C الأساسية والباقات |\n| الثالثة | 25% | 347,500 جنيه | نهاية الأسبوع الثامن عشر | اكتمال جميع المنصات والتطبيقات |\n| الرابعة | 20% | 278,000 جنيه | بعد الإطلاق الناجح | اعتماد التسليم النهائي |\n| **الإجمالي** | **100%** | **1,390,000 جنيه** | | |\n\n### شروط الدفع\n\n- جميع المدفوعات تُسدَّد بالجنيه المصري عبر التحويل البنكي إلى الحساب المعتمد للطرف المُنفِّذ.\n- يتم إصدار فاتورة ضريبية رسمية مع كل دفعة وفقاً للقانون المصري.\n- يتم احتساب ضريبة القيمة المضافة بنسبة 14% فوق المبلغ المذكور إن انطبقت.\n- تأخر السداد لأكثر من 14 يوماً من تاريخ الاستحقاق قد يستوجب تعليق العمل مؤقتاً.\n- في حال السداد المبكر لكامل المبلغ مقدماً، يُقدَّم خصم 5% على إجمالي قيمة المشروع (توفير 69,500 جنيه).\n- في حال السداد على دفعتين فقط (60% / 40%)، يُقدَّم خصم 3% على إجمالي القيمة.\n\n### خيارات التمويل\n\n- إمكانية ترتيب تمويل بنكي للجزء الأكبر من المبلغ مع بنك شريك.\n- خطط دفع مرنة قابلة للتفاوض حسب التدفق النقدي للوكالة.\n\n---\n\n## الضمان\n\nنلتزم بضمان شامل بمستوى مؤسسي على المنصة المُسلَّمة، يشمل ما يلي:\n\n### مدة الضمان\n\n**180 يوماً** كاملة من تاريخ الإطلاق الرسمي للمنصة، بزيادة 90 يوماً عن الباقة الأساسية.\n\n### نطاق الضمان\n\n- **معالجة جميع الأخطاء البرمجية** التي تظهر في جميع الوظائف المُسلَّمة دون أي رسوم إضافية.\n- **استجابة فورية** للملاحظات الحرجة خلال ساعة واحدة.\n- **تصحيح الأخطاء غير الحرجة** خلال 8-12 ساعة عمل.\n- **ضمان عمل جميع التكاملات** مع أماديوس، مزودي الفنادق المتعددين، بوابات الدفع، واتساب، أسعار الصرف، أنظمة التمويل والشراكات.\n- **ضمان توافق التطبيقات** مع آخر إصدارات iOS و Android خلال فترة الضمان.\n\n### الالتزامات أثناء الضمان\n\n- مراقبة مستمرة لأداء المنصة على مدار الساعة طوال أيام الأسبوع.\n- تقارير دورية أسبوعية بحالة المنصة خلال الأشهر الثلاثة الأولى.\n- اجتماع متابعة أسبوعي لاستعراض الأداء والملاحظات.\n- توفير قناة تواصل مباشرة لفريق جولة تورز.\n- توفير **فريق مخصص من 3 مهندسين** للاستجابة السريعة.\n- مراجعات شهرية لتجربة المستخدم وتقديم توصيات.\n\n### ضمان الأداء المؤسسي\n\n- ضمان وقت تشغيل (Uptime) لا يقل عن **99.9%** خلال فترة الضمان.\n- ضمان زمن استجابة الصفحات أقل من ثانيتين.\n- ضمان معالجة كل عملية حجز في أقل من 20 ثانية.\n- ضمان دعم 1,000+ مستخدم متزامن دون تدهور الأداء.\n- ضمان أمان البيانات وفقاً للمعايير الدولية.\n\n### ضمان التحديثات\n\n- جميع التحديثات الأمنية الضرورية مجانية خلال فترة الضمان.\n- توافق مستمر مع أي تحديثات لأنظمة الدفع، المتاجر، والمنصات الشريكة.\n\n### ما لا يشمله الضمان\n\n- الميزات الجديدة الكاملة التي تتجاوز نطاق المتطلبات المُعتمدة.\n- المشاكل الناتجة عن التدخل المباشر من فريق العميل في إعدادات المنصة دون استشارة الفريق المُنفِّذ.\n- المشاكل الناتجة عن خدمات طرف ثالث (مع الالتزام بالتنسيق لحلها).\n- التغييرات في سياسات الفنادق أو شركات الطيران.\n\n---\n\n## الصيانة\n\nنقدم باقة صيانة شهرية مؤسسية بقيمة **30,000 جنيه مصري شهرياً** تشمل:\n\n### الصيانة الفنية المؤسسية\n\n- **مراقبة على مدار الساعة** طوال أيام الأسبوع بفريق متخصص.\n- تطبيق التحديثات الأمنية الدورية فوراً.\n- النسخ الاحتياطي **في الوقت الفعلي** لجميع البيانات الحرجة.\n- معالجة المشاكل الطارئة بسرعة استجابة قصوى **ساعة واحدة**.\n- اختبارات أداء أسبوعية وتقارير شهرية.\n- اختبارات أمان شهرية شاملة.\n- خطط استرداد من الكوارث محدثة دائماً.\n\n### الصيانة الوظيفية\n\n- إصلاح أي خلل يظهر في جميع الميزات المُسلَّمة.\n- التوافق مع جميع تحديثات الأنظمة الخارجية.\n- ضبط الأداء وتحسين سرعة الاستجابة باستمرار.\n- تحديث أسعار الصرف ومراقبة دقتها.\n- تحديث التطبيقات لمتاجر آبل وجوجل عند الحاجة.\n\n### الدعم الفني المؤسسي\n\n- قناة دعم مخصصة بثلاث وسائط (بريد + هاتف + تطبيق محادثة).\n- **خط ساخن مخصص** للحالات الحرجة على مدار الساعة.\n- **مدير حساب مخصص** نقطة اتصال موحدة لجميع المتطلبات.\n- تقرير شهري مفصل بأنشطة الصيانة المُنفَّذة.\n- تقرير ربعي تحليلي شامل بأداء المنصة وتوصيات التحسين.\n- مراجعة استراتيجية سنوية شاملة.\n\n### حدود باقة الصيانة المؤسسية\n\n- تشمل ما يصل إلى **40 ساعة عمل شهرياً** لتنفيذ تعديلات وتحسينات.\n- إضافة محتوى وتعديلات على الواجهة بكميات كبيرة.\n- تحديث المرشحات وإضافة وجهات جديدة.\n- تعديلات على نظام التسعير وقواعده.\n- إضافة وكلاء جدد وحسابات مؤسسية جديدة.\n- التعديلات الكبيرة أو الميزات الجديدة الكبرى تُسعَّر بشكل منفصل.\n\n### الميزات الإضافية المؤسسية\n\n- جلسات استشارية شهرية مع الإدارة العليا.\n- ورش عمل ربعية لتحسين تجربة المستخدم.\n- تقارير سنوية شاملة لمراجعة الأداء وتحديد الفرص.\n- دعم في تطوير الميزات الجديدة بأسعار تفضيلية (خصم 20%).\n- تدريب دوري لأي موظفين جدد في فريق العميل.\n\n---\n\n## الافتراضات\n\nيستند هذا العرض إلى مجموعة من الافتراضات الجوهرية:\n\n1. **توفر العميل للقرارات السريعة**: يلتزم فريق جولة تورز بالرد على الاستفسارات واعتماد التصاميم خلال 5 أيام عمل كحد أقصى لكل مرحلة كبرى.\n\n2. **الحصول على بيانات الاعتماد**: يلتزم العميل بتوفير بيانات الاعتماد اللازمة من جميع مزودي الخدمات (أماديوس، مزودي الفنادق، بوابات الدفع، واتساب، أسعار الصرف، شركاء التمويل) قبل بدء كل مرحلة تكامل ذات صلة.\n\n3. **حسابات متاجر التطبيقات**: يلتزم العميل بإنشاء حسابات مطورين رسمية على متجر آبل (Apple Developer) ومتجر جوجل (Google Play Console) قبل الأسبوع الثاني عشر.\n\n4. **اتفاقيات صحيحة مع مزودي المحتوى**: يلتزم العميل بوجود اتفاقيات سارية وصحيحة مع جميع مزودي المحتوى.\n\n5. **توفر المحتوى الأولي**: يلتزم العميل بتوفير المحتوى التسويقي الأساسي الشامل خلال الأسابيع الثلاثة الأولى.\n\n6. **تثبيت نطاق المشروع**: يفترض العرض ثبات المتطلبات المُعتمدة بعد ورش العمل التفصيلية.\n\n7. **توفر بنية تحتية مؤسسية**: يفترض توفر بنية استضافة سحابية مؤسسية مناسبة لاستضافة المنصة بمستوى الأداء المطلوب.\n\n8. **التزام العميل بالاجتماعات الدورية**: يلتزم ممثلو العميل بحضور الاجتماعات الأسبوعية وورش العمل التفصيلية.\n\n9. **حساب أعمال واتساب الرسمي**: يلتزم العميل بإنشاء حساب أعمال واتساب رسمي على مستوى مؤسسي.\n\n10. **الموافقات القانونية الشاملة**: يلتزم العميل بالحصول على جميع الموافقات القانونية اللازمة لتشغيل:\n    - منصة محفظة إلكترونية\n    - نظام ولاء ومكافآت\n    - بوابة وكلاء B2B\n    - حسابات مؤسسية\n    - علامات تجارية فرعية\n\n11. **تحديد سياسات الأعمال**: يلتزم العميل بتحديد جميع سياسات الأعمال (الولاء، العمولات، التسعير، الإلغاء) خلال ورش العمل الأولى.\n\n12. **توفر فريق داخلي للتنسيق**: يلتزم العميل بتوفير فريق داخلي مكون من 3 أشخاص على الأقل (ممثل تجاري، ممثل تقني، ممثل عمليات) للتنسيق طوال المشروع.\n\n13. **اعتماد البائعين والشركاء**: يلتزم العميل باعتماد قائمة الوكلاء الأولية والحسابات المؤسسية الأولى لاختبار البوابات المخصصة.\n\n14. **الجاهزية للإطلاق المرحلي**: يقبل العميل الإطلاق المرحلي للمكونات بدلاً من الإطلاق الكلي مرة واحدة، لضمان جودة كل مكون.\n\n---\n\n## الاستثناءات\n\nلا يشمل هذا العرض البنود التالية، والتي يمكن إضافتها كخدمات مستقلة عند الحاجة:\n\n### الخدمات غير المشمولة\n\n- **إنتاج المحتوى التسويقي**: لا يشمل العرض كتابة المحتوى التسويقي، تصوير الفنادق، إنتاج الفيديوهات الترويجية، أو إعداد الكاتالوجات.\n- **الحملات التسويقية الرقمية**: لا يشمل العرض إدارة حملات إعلانية على جوجل وفيسبوك أو منصات أخرى.\n- **استراتيجية التسويق**: لا يشمل العرض وضع استراتيجية تسويقية شاملة للوكالة.\n- **خدمات تحسين محركات البحث (SEO) المتقدمة**: يشمل العرض الأساسيات فقط.\n- **ترجمة المحتوى**: لا يشمل العرض ترجمة المحتوى إلى لغات إضافية غير العربية والإنجليزية.\n- **استضافة المنصة**: تُحتسب رسوم الاستضافة منفصلة (يُمكن للطرف المُنفِّذ التوصية والإدارة).\n- **شراء النطاقات**: شراء النطاق الإلكتروني والشهادات الأمنية المميزة.\n- **الإجراءات القانونية**: التسجيلات الرسمية للشركة وعلاماتها التجارية الفرعية.\n- **تدريب المهارات العامة**: تدريب موظفي جولة تورز على مهارات خدمة العملاء والمبيعات.\n- **رسوم الخدمات الخارجية**: رسوم اشتراك واتساب الرسمية، أسعار الصرف، حسابات المطورين في المتاجر، التمويل التقسيطي - جميعها تُسدَّد مباشرة لمزوديها.\n\n### الميزات غير المشمولة\n\n- **الذكاء الاصطناعي التوليدي**: لا يشمل العرض دمج روبوتات محادثة بالذكاء الاصطناعي التوليدي (يمكن إضافتها لاحقاً).\n- **التوصيات الشخصية بالذكاء الاصطناعي**: نظام توصيات أساسي مشمول، أما التوصيات المتقدمة بنماذج التعلم الآلي فمنفصلة.\n- **الواقع الافتراضي / المعزز**: لا يشمل العرض جولات افتراضية بتقنية VR/AR للفنادق أو الوجهات.\n- **حجز الرحلات البحرية (Cruises)**: لا يشمل العرض حجز الرحلات البحرية والكروز.\n- **حجز القطارات والحافلات**: لا يشمل العرض حجز وسائل النقل البري.\n- **الأنظمة المحاسبية المتقدمة**: لا يشمل العرض نظام محاسبة كامل (يمكن التكامل مع أنظمة موجودة).\n- **التكامل مع أنظمة ERP**: يحتاج لتقييم منفصل حسب النظام المعتمد لدى العميل.\n\n---\n\n## الشروط والأحكام\n\n### 1. الملكية الفكرية\n\n- تنتقل ملكية الكود البرمجي للمنصة والتطبيقات إلى شركة جولة تورز بعد سداد كامل قيمة المشروع.\n- تنتقل ملكية جميع التصاميم والمواد الإبداعية المُنتَجة للعميل.\n- تحتفظ الشركة المُنفِّذة بحق الإشارة إلى المشروع كعمل مرجعي في معرض أعمالها.\n- يحتفظ الطرف المُنفِّذ بحقوق الأدوات والمكتبات الداخلية المُعاد استخدامها (يحصل العميل على حقوق الاستخدام الكامل).\n\n### 2. السرية\n\n- يلتزم الطرفان بسرية كافة المعلومات المتبادلة خلال مدة المشروع وبعدها.\n- لا يجوز لأي طرف الإفصاح عن المعلومات التجارية أو التقنية للطرف الآخر دون إذن خطي.\n- تمتد التزامات السرية لمدة 7 سنوات بعد انتهاء العقد.\n- اتفاقية عدم إفصاح (NDA) منفصلة تُوقَّع مع كل عضو من فريق العمل من الجانبين.\n\n### 3. تعديل النطاق\n\n- يجوز إجراء تعديلات على النطاق عبر طلب خطي رسمي.\n- يتم تقييم أثر التعديل على الجدول الزمني والتكلفة، ولا يبدأ التنفيذ إلا بعد اعتماد التقييم من العميل.\n- التغييرات البسيطة (أقل من 8 ساعات عمل) يتم تنفيذها ضمن النطاق دون رسوم إضافية.\n- التغييرات المتوسطة تُسعَّر بنسبة 15% خصم عن السعر القياسي.\n\n### 4. التسليم والاستلام\n\n- يُعتبر التسليم نهائياً بعد مرور 30 يوماً من تاريخ الإشعار بالاستلام دون اعتراض خطي مسبَّب.\n- يلتزم العميل بمراجعة المُخرَجات خلال هذه الفترة وتقديم ملاحظاته إن وُجدت.\n- يتم اختبار جميع الميزات بحضور ممثلي العميل قبل الإطلاق الرسمي لكل مرحلة.\n- جلسات اختبار قبول رسمية (UAT) لكل مكون رئيسي.\n\n### 5. القوة القاهرة\n\n- لا يُعتبر أي طرف مخلاً بالتزاماته إذا كان السبب راجعاً لظروف القوة القاهرة.\n- يلتزم الطرفان بإخطار بعضهما فوراً عند حدوث أي ظرف قاهر.\n\n### 6. حل النزاعات\n\n- يسعى الطرفان لحل أي خلاف ودياً عبر التفاوض المباشر.\n- في حال تعذر الحل الودي، يتم اللجوء إلى الوساطة عبر طرف ثالث مُحايد.\n- في حال استمرار الخلاف، يتم اللجوء إلى التحكيم وفق قواعد مركز القاهرة الإقليمي للتحكيم التجاري الدولي.\n- يكون التحكيم نهائياً وملزماً للطرفين.\n\n### 7. الإنهاء\n\n- يحق لأي طرف إنهاء العقد بإشعار خطي مسبق مدته 60 يوماً.\n- في حال الإنهاء، يستحق الطرف المُنفِّذ قيمة العمل المُنجَز حتى تاريخ الإنهاء.\n- يلتزم الطرف المُنفِّذ بتسليم جميع الملفات والوثائق المُنجَزة حتى تاريخ الإنهاء.\n- يتم نقل المعرفة لفريق بديل خلال فترة الإشعار.\n\n### 8. الفواتير والضرائب\n\n- جميع الأسعار لا تشمل ضريبة القيمة المضافة.\n- تُصدر الفواتير الضريبية وفق القانون المصري.\n- يلتزم الطرفان بالالتزامات الضريبية المنصوص عليها في القانون.\n\n### 9. حماية البيانات\n\n- يلتزم الطرف المُنفِّذ بحماية بيانات عملاء الوكالة وفقاً لأعلى الممارسات الدولية.\n- يلتزم الطرفان بالالتزام بأي لوائح حماية بيانات معمول بها في مصر والأسواق المُستهدَفة.\n- يلتزم الطرف المُنفِّذ بإجراء تدقيقات أمنية دورية مجانية خلال فترة الضمان.\n\n### 10. الالتزامات المتبادلة\n\n- يلتزم الطرف المُنفِّذ بتخصيص فريق عمل ثابت من 6-8 مهندسين متخصصين طوال مدة المشروع.\n- يلتزم الطرف المُنفِّذ بعدم استبدال أعضاء الفريق الرئيسيين دون إذن العميل.\n- يلتزم العميل بتوفير نقاط اتصال واضحة للقرارات السريعة.\n- يلتزم العميل بالاجتماعات الأسبوعية وورش العمل التفصيلية.\n\n### 11. ضمان عدم المنافسة\n\n- خلال فترة المشروع وسنة بعد انتهائه، يلتزم الطرف المُنفِّذ بعدم تنفيذ مشروع مماثل لأي منافس مباشر لشركة جولة تورز داخل السوق المصري.\n\n### 12. التعديلات على العقد\n\n- لا يجوز تعديل أي بند من بنود هذا العقد إلا بموافقة خطية من الطرفين.\n- جميع الملحقات والتعديلات تُعتبر جزءاً لا يتجزأ من العقد الأصلي.\n\n---\n\n## صفحة التوقيع\n\nتم إعداد هذا العرض المؤسسي بأقصى درجات الدقة والعناية ليعكس فهمنا العميق لرؤية شركة جولة تورز الاستراتيجية، والتزامنا التام بتنفيذه ضمن أعلى المعايير المهنية.\n\nنتطلع إلى **شراكة استراتيجية طويلة الأمد** تُحقق التطلعات الرقمية الكاملة للوكالة، وتفتح آفاقاً غير مسبوقة من النمو والريادة في السوق السياحي العربي.\n\n---\n\n### عن الطرف الأول (العميل)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | شركة جولة تورز للسياحة |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| رقم السجل التجاري | _______________________ |\n| رقم البطاقة الضريبية | _______________________ |\n| العنوان الرسمي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### عن الطرف الثاني (المُنفِّذ)\n\n| البيان | التفاصيل |\n|--------|----------|\n| اسم الشركة | _______________________ |\n| ممثل الشركة | _______________________ |\n| المسمى الوظيفي | _______________________ |\n| رقم السجل التجاري | _______________________ |\n| رقم البطاقة الضريبية | _______________________ |\n| العنوان الرسمي | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n| الختم الرسمي | _______________________ |\n\n---\n\n### الشاهد الأول\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| رقم البطاقة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n### الشاهد الثاني\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| رقم البطاقة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n### المستشار القانوني\n\n| البيان | التفاصيل |\n|--------|----------|\n| الاسم | _______________________ |\n| الصفة | _______________________ |\n| الجهة | _______________________ |\n| التاريخ | _______________________ |\n| التوقيع | _______________________ |\n\n---\n\n> **ملاحظة ختامية:** يُعدّ توقيع هذه الوثيقة من قِبل الطرفين بمثابة الموافقة الكاملة على جميع البنود والشروط المذكورة، ويُصبح هذا المستند جزءاً لا يتجزأ من العقد الرسمي الذي سيُحرَّر لاحقاً. تُعتبر جميع الملاحق والوثائق المُشار إليها في هذا العرض جزءاً لا يتجزأ من العقد.\n\n> **تاريخ الإصدار:** 29 يونيو 2026\n> **رقم العرض:** JT-2026-ENT-001\n> **سريان العرض:** ينتهي في 13 أغسطس 2026 ما لم يتم تمديده خطياً.\n> **مستوى السرية:** سري للغاية (Top Confidential)\n\n---\n\n*شكراً لثقتكم الغالية بنا، ونتطلع لبدء هذه الشراكة الاستراتيجية المتميزة معكم، وللعمل سوياً على بناء قصة نجاح تُلهم السوق السياحي بأكمله.*\n\n---\n\n### ملحق: نظرة سريعة على القيمة المُضافة\n\n| القناة | المساهمة المتوقعة بعد سنتين |\n|--------|---------------------------|\n| العملاء المباشرون (B2C) | 50% من إجمالي الإيرادات |\n| شبكة الوكلاء (B2B) | 30% من إجمالي الإيرادات |\n| العملاء المؤسسيون (Corporate) | 15% من إجمالي الإيرادات |\n| العلامات الفرعية (White-label) | 5% من إجمالي الإيرادات |\n| **الإجمالي** | **100%** |\n\n| المؤشر | الوضع الحالي | الوضع المتوقع بعد سنة | الوضع المتوقع بعد سنتين |\n|--------|--------------|---------------------|----------------------|\n| الحجوزات الشهرية | الأساس المرجعي | 3× الأساس | 5-7× الأساس |\n| متوسط قيمة الحجز | الأساس المرجعي | 1.5× الأساس | 1.7× الأساس |\n| معدل تكرار الحجز | الأساس المرجعي | 2× الأساس | 3× الأساس |\n| تكلفة معالجة الحجز | الأساس المرجعي | 0.5× الأساس | 0.3× الأساس |\n| هامش الربح الإجمالي | الأساس المرجعي | +20% | +40% |\n\n---\n\n*نهاية الوثيقة*\n","prds-basic":"## 🎯 ملخص لمجلس الإدارة\n\nنقوم ببناء موقع حجوزات سفر متكامل لشركة جولة تورز يتيح للعملاء حجز رحلات الطيران والفنادق وباقات السفر بشكل مباشر عبر الإنترنت. يستهدف هذا الموقع المسافرين في مصر والمنطقة العربية الباحثين عن تجربة حجز سهلة وآمنة باللغة العربية. الهدف هو تحويل جولة تورز من شركة سياحة تقليدية إلى منصة بيع رقمية تعمل على مدار الساعة وتزيد المبيعات دون الحاجة لزيادة عدد الموظفين.\n\n### ماذا يحصل عليه العميل في هذه الباقة؟\n\n- بحث وحجز رحلات الطيران من أكثر من 400 شركة طيران حول العالم\n- حجز الفنادق في جميع دول العالم بأسعار تنافسية\n- باقات سياحية جاهزة (طيران + فندق) بأسعار موفرة\n- الدفع الإلكتروني الآمن داخل الموقع بالبطاقات البنكية والمحافظ الإلكترونية\n- استلام تذاكر الطيران وقسائم الحجز فوراً عبر البريد الإلكتروني\n- موقع باللغتين العربية والإنجليزية يعمل على الموبايل والكمبيوتر\n- حساب شخصي لكل عميل لمتابعة حجوزاته السابقة والقادمة\n\n### الأرقام الرئيسية\n\n| البند | القيمة |\n|------|--------|\n| السعر الإجمالي | 600,000 جنيه مصري |\n| العملة المعادلة بالدولار | ما يعادل 12,000 دولار أمريكي |\n| مدة التنفيذ | 3 أشهر |\n| تاريخ التسليم المتوقع | 29 سبتمبر 2026 |\n| الصيانة الشهرية | 10,000 جنيه مصري شهرياً |\n| ساعات الاستشارة الخارجية لـ Amadeus | 40 ساعة استشارية |\n| عدد الموظفين المطلوبين | 4 موظفين متفرغين |\n| نسبة المخاطر التقنية | متوسطة (حوالي 25%) |\n\n### القيمة التجارية المتوقعة\n\n- قناة بيع تعمل 24/7 بدون الحاجة لموظفين إضافيين أو مكاتب فرعية\n- تقليل الاعتماد على الوسطاء الخارجيين وتوفير عمولاتهم\n- بيانات العملاء وسجل حجوزاتهم تصبح ملكاً للشركة وتُستخدم في التسويق المستقبلي\n- توسيع نطاق العملاء ليشمل المسافرين خارج القاهرة والمحافظات الكبرى\n- بناء علامة تجارية رقمية قوية تنافس المواقع العالمية في السوق المحلي\n\n### المخاطر الرئيسية وكيف نعالجها\n\n| المخاطرة | المعالجة |\n|----------|----------|\n| تأخر استلام بيانات الربط من شركة Amadeus | بدء إجراءات التعاقد والربط من اليوم الأول وتخصيص مستشار متخصص |\n| تذبذب أسعار صرف العملة الأجنبية | تثبيت السعر بعقد واضح وجدولة الدفعات على ثلاث مراحل |\n| تعقيد التكامل التقني مع أنظمة الحجز العالمية | الاستعانة باستشاري Amadeus لمدة 40 ساعة لضمان جودة التنفيذ |\n| تغيير المتطلبات من جانب العميل أثناء التنفيذ | توثيق المتطلبات بشكل تفصيلي في بداية المشروع واعتمادها رسمياً |\n| تأخر استلام بيانات بوابة الدفع من البنك | البدء في إجراءات التعاقد مع البنك بالتوازي مع بداية التطوير |\n\n### القرار المطلوب من المجلس\n\nالموافقة على اعتماد ميزانية 600,000 جنيه مصري للباقة الأساسية مع 10,000 جنيه شهرياً للصيانة، والبدء الفوري في تنفيذ المشروع لمدة 3 أشهر.\n\n---\n\n# جولة تورز OTA - وثيقة متطلبات المنتج للباقة الأساسية\n\n## بيانات الوثيقة\n\n| الحقل | القيمة |\n|-------|-------|\n| اسم الوثيقة | جولة تورز OTA - وثيقة متطلبات المنتج للباقة الأساسية |\n| الإصدار | 1.0.0 |\n| التاريخ | 2026-06-29 |\n| الحالة | معتمدة للتطوير |\n| مسؤول الوثيقة | أحمد محمود (قائد المنتج التقني) |\n| الراعي من جهة العمل | الإدارة التنفيذية لـ جولة تورز |\n| قائد الهندسة | يتم تحديده لاحقًا - قائد الـ Backend (NestJS) |\n| قائد التصميم | يتم تحديده لاحقًا - مصمم منتج أول |\n| مستشار تكامل Amadeus | متخصص خارجي (~40 ساعة عمل مخصصة) |\n| التصنيف | داخلي - سري |\n| التوزيع | الهندسة، المنتج، الجودة (QA)، المالية، العمليات |\n| تاريخ المراجعة القادمة | 2026-09-29 |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ | الكاتب | ملخص التغيير |\n|---------|------|--------|----------------|\n| 0.1.0 | 2026-05-15 | أ. محمود | المسودة الأولى بعد ورشة الاستكشاف |\n| 0.5.0 | 2026-06-02 | أ. محمود | إضافة نطاق Amadeus وتنقيح شخصيات المستخدمين |\n| 0.8.0 | 2026-06-18 | أ. محمود | تثبيت مؤشرات الأداء وإضافة مصفوفة الدفع |\n| 1.0.0 | 2026-06-29 | أ. محمود | النسخة النهائية المعتمدة |\n\n### وثائق ذات صلة\n\n- بيان العمل الرئيسي لـ جولة تورز (SOW-2026-001)\n- اتفاقية Amadeus Self-Service API (في انتظار التوقيع)\n- طلب حساب تاجر Stripe في مصر\n- عقد تكامل Paymob (تم توقيعه في 2026-06-10)\n- دليل العلامة التجارية الإصدار 2.1\n\n---\n\n## الرؤية\n\nستطلق جولة تورز منصة Online Travel Agency (OTA) جاهزة للإنتاج، تتيح للمسافرين المصريين البحث والحجز والدفع لتذاكر الطيران وغرف الفنادق في تجربة واحدة ثنائية اللغة (عربي/إنجليزي). الباقة الأساسية ترسي الأساس التشغيلي والتقني: محرك حجز حي متصل بـ Amadeus لمخزون الطيران، ومورد فنادق واحد لمخزون الإقامة، ووسائل دفع محلية مناسبة (Paymob و Stripe)، وأداة إدارة داخلية تسمح لفريق العمليات بمتابعة الحجوزات والتدخل عند الحاجة.\n\nالباقة الأساسية محدودة النطاق عن قصد. هي ليست منصة OTA متكاملة الميزات - بل هي الحد الأدنى من المنصة المطلوبة لاستقبال أموال حقيقية من عملاء حقيقيين، وإتمام الحجوزات عبر GDS وموردين حقيقيين، وتسوية الحسابات المالية. أي شيء خارج هذا الأساس (برامج الولاء، تنسيق متعدد الموردين، استرداد ذاتي للعملاء، الباقات السياحية، خدمات B2B، تطبيقات الموبايل) مؤجل عن قصد للباقات القادمة حتى نقدر نتحقق من اقتصاديات الوحدة، والعلاقات مع الموردين، ونسب نجاح الدفع، والكفاءة التشغيلية قبل ما نزود التعقيد.\n\nالمنتج لازم يكون شغال ومتعامل عليه ومنتج إيرادات قابلة للتسوية في خلال 8-10 أسابيع من بداية العقد. هدفنا الأساسي هو سرعة الوصول للإيرادات، مش كثرة الميزات. كل قرار موثق في هذه الوثيقة بيعطي الأولوية لإطلاق سطح صغير وموثوق بدل سطح كبير وهش.\n\n---\n\n## الأهداف ومقاييس النجاح\n\n### الأهداف الاستراتيجية\n\n1. **تأسيس OTA منتج للإيرادات**: معالجة 100 حجز حقيقي مدفوع على الأقل في أول 60 يوم من التشغيل الحي.\n2. **إثبات اقتصاديات تكامل Amadeus**: الحفاظ على نسبة look-to-book مع Amadeus تحت الحدود المسموح بها تعاقديًا (المستهدف <300:1) لتجنب رسوم العقوبات.\n3. **التحقق من السوق ثنائي اللغة**: تحقيق نسبة 35% على الأقل من الحجوزات عبر الواجهة العربية للتأكد إن دعم اللغتين فعلي وليس شكلي.\n4. **تقليل مخاطر الدفع**: تحقيق نسبة نجاح دفع أعلى من 85% عبر Paymob و Stripe مجتمعين قبل التفكير في بوابات إضافية.\n5. **بناء قدرة تشغيلية داخلية**: تدريب فريق عمليات داخلي من 3-5 موظفين على التعامل مع 100% من استثناءات ما بعد الحجز بدون تصعيد للهندسة بحلول الأسبوع 12.\n\n### مقاييس النجاح (بعد 90 يوم من الإطلاق)\n\n| المقياس | المستهدف | المبرر |\n|--------|--------|-----------|\n| إجمالي قيمة الحجوزات (GBV) | EGP 4.5M | تغطي ~3 أضعاف تكلفة المشروع |\n| الحجوزات المؤكدة | 350+ | تثبت وجود طلب |\n| نسبة نجاح الدفع | >85% | المعيار القياسي لـ OTAs الشرق الأوسط |\n| نسبة التحويل من البحث للحجز | >1.2% | واقعية لعلامة OTA جديدة |\n| متوسط قيمة الطلب (طيران) | EGP 8,500 | خليط من الرحلات المحلية وقصيرة المدى |\n| متوسط قيمة الطلب (فنادق) | EGP 4,200 | متوسط إقامة 2-3 ليالي |\n| نسبة الاسترداد/الإلغاء | <12% | أي شيء فوق ذلك يشير لمشكلة في UX أو التسعير |\n| نسبة تذاكر دعم العملاء | <8% من الحجوزات | تشير لوضوح التأكيدات |\n| وقت تشغيل الموقع | 99.5% | باستثناء الصيانة المجدولة |\n| وقت ظهور أول نتيجة (بحث الطيران) | <4.5s p95 | عامل حاسم في التحويل |\n\n---\n\n## شخصيات المستخدمين\n\n| الشخصية | الاسم | العمر | المكان | الأهداف | نقاط الألم |\n|---------|------|-----|----------|-------|-------------|\n| مسافر داخلي للترفيه | مريم السيد | 32 | القاهرة، مصر | حجز رحلات اقتصادية القاهرة-الغردقة لإجازة الأسبوع؛ إيجاد فنادق شاطئية اقتصادية؛ الدفع ببطاقة Mada المحلية أو الأقساط | مواقع OTA الدولية ترفض بطاقتها؛ المواقع الإنجليزية فقط تربك والديها؛ سياسات الإلغاء غير واضحة؛ رسوم خفية تظهر عند الدفع |\n| مخطط رحلة عائلية للخارج | خالد حسين | 45 | الإسكندرية، مصر | تخطيط رحلة العمرة السنوية أو رحلة صيف أوروبا لعائلة من 4-6 أشخاص؛ يحتاج تسعير متوقع بالجنيه؛ يثق بالعلامات المعروفة | تقلبات العملة بين البحث والدفع؛ صعوبة حجز مسافرين متعددين في نفس PNR؛ يحتاج دعم باللغة العربية |\n| مغترب عائد | نور عبد الله | 28 | دبي، الإمارات | حجز رحلات للقاهرة لزيارة الأهل؛ الدفع ببطاقة Visa دولية؛ يحتاج تأكيدات WhatsApp | OTAs الأجنبية تفرض رسوم تحويل عملة؛ OTAs المحلية ترفض البطاقات غير المصرية؛ تأكيدات الإيميل تضيع |\n| موظف عمليات في جولة | يارا مصطفى | 26 | مقر القاهرة | مراقبة الحجوزات الواردة؛ التدخل عند فشل إنشاء PNR؛ إصدار استرداد يدوي؛ تصدير تقارير الإيرادات اليومية | لا توجد رؤية موحدة للحجوزات عبر المزودين؛ فشل مزامنة PNR لا يظهر إلا عندما يتصل العميل؛ تسوية يدوية على Excel |\n| مراقب مالي في جولة | طارق فهمي | 41 | مقر القاهرة | تسوية تسويات Paymob/Stripe مقابل تذاكر Amadeus وقسائم الفنادق؛ إقفال الحسابات الشهرية؛ متابعة استردادات chargebacks | فجوات في التسويات متعددة العملات؛ لا يوجد مصدر واحد للحقيقة للاعتراف بالإيراد؛ تقارير عشوائية من المهندسين |\n\n### مصفوفة تغطية الشخصيات\n\n| منطقة الميزة | مريم | خالد | نور | يارا | طارق |\n|--------------|--------|--------|------|------|-------|\n| بحث الطيران | أساسي | أساسي | أساسي | - | - |\n| بحث الفنادق | أساسي | أساسي | ثانوي | - | - |\n| الدفع بـ Paymob | أساسي | أساسي | - | - | يسوي |\n| الدفع بـ Stripe | ثانوي | ثانوي | أساسي | - | يسوي |\n| الواجهة العربية | أساسي | أساسي | ثانوي | مطلوب | مطلوب |\n| تأكيد الإيميل | مطلوب | مطلوب | مطلوب | يلاحظ | - |\n| عرض الحجوزات للإدارة | - | - | - | أساسي | ثانوي |\n| إصدار الاسترداد | يتلقى | يتلقى | يتلقى | أساسي | يوافق |\n| تقارير الإيرادات | - | - | - | يشاهد | أساسي |\n\n---\n\n## قصص المستخدمين\n\n### البحث والاكتشاف\n\n**US-001: بحث طيران ثنائي اللغة**\n\nكمسافر، أريد البحث عن رحلات بالعربية أو الإنجليزية حتى أقدر أخطط لرحلتي باللغة المفضلة عندي.\n\n- AC-001.1: لما أكون على الصفحة الرئيسية وأبدل اللغة للعربية، لازم الواجهة كلها بما فيها تسميات النماذج ورسائل الخطأ ومنتقي التواريخ تظهر بالعربية مع تخطيط RTL في خلال 200ms.\n- AC-001.2: لما أختار العربية وأكتب أسماء المطارات بالعربية (مثل \"القاهرة\")، لازم الـ autocomplete يرجع رموز IATA المطابقة (CAI) مرتبة حسب الشعبية.\n- AC-001.3: لما أختار الإنجليزية وأكتب \"Cai\"، لازم الـ autocomplete يرجع Cairo (CAI) و Cairns (CNS) ونتائج أخرى مرتبة حسب حجم الحجوزات.\n- AC-001.4: لما أدخل نقطة الانطلاق والوجهة وتاريخ السفر وعدد المسافرين وأضغط بحث، لازم النظام يستدعي Amadeus Flight Offers Search v2 ويرجع النتائج في خلال 4.5 ثواني p95.\n- AC-001.5: لما يرجع Amadeus صفر نتائج، لازم المستخدم يشوف حالة فارغة مترجمة مع اقتراحات لتواريخ قريبة (+/- 3 أيام).\n\n**US-002: تصفية نتائج الطيران**\n\nكمسافر، أريد تصفية نتائج الطيران حسب التوقفات وشركات الطيران والسعر ووقت الإقلاع حتى أقدر ألاقي الخيار المناسب لي.\n\n- AC-002.1: التصفيات لازم تتطبق client-side على استجابة Amadeus المخزنة (بدون استدعاء جديد لـ Amadeus عند تغيير التصفية) للحفاظ على نسبة look-to-book.\n- AC-002.2: اختيار \"بدون توقفات فقط\" لازم يخفي فورًا النتائج متعددة التوقفات ويحدث العداد المعروض.\n- AC-002.3: شريط السعر لازم يحترم اختيار العميل للعملة (EGP, USD).\n- AC-002.4: لما تجميعة تصفيات ترجع صفر نتائج، لازم CTA \"مسح التصفيات\" يكون بارز.\n\n**US-003: بحث الفنادق حسب الوجهة**\n\nكمسافر، أريد البحث عن فنادق حسب المدينة وتواريخ الدخول/الخروج وعدد الضيوف حتى أقدر ألاقي إقامة متوفرة.\n\n- AC-003.1: مدخل الوجهة لازم يقبل أسماء المدن بالعربية والإنجليزية ويحلها لـ destination ID الخاص بالمورد.\n- AC-003.2: منتقي التواريخ لازم يفرض إن check-out > check-in، بحد أقصى 30 ليلة.\n- AC-003.3: البحث لازم يرجع 20 نتيجة على الأقل لما يكون متاح، مقسمة 20 لكل صفحة.\n- AC-003.4: كل بطاقة فندق لازم تعرض: الاسم، تقييم النجوم، الصورة الرئيسية، السعر لكل ليلة (السعر التمهيدي)، إجمالي سعر الإقامة، وشارة قابلية الاسترداد.\n\n### الحجز والدفع\n\n**US-004: حجز طيران مع بيانات المسافرين**\n\nكمسافر، أريد إدخال بيانات المسافرين وحجز رحلة محددة حتى أستلم تذكرة مؤكدة.\n\n- AC-004.1: نموذج المسافر لازم يجمع: اللقب، الاسم الأول، اسم العائلة، تاريخ الميلاد، الجنسية، رقم جواز السفر (للرحلات الدولية فقط)، تاريخ انتهاء الجواز، النوع.\n- AC-004.2: الأسماء لازم تتحقق ضد مجموعة أحرف IATA (لاتيني فقط، بدون علامات تشكيل) مع شرح مفيد بالعربية للمستخدمين العرب.\n- AC-004.3: لما المستخدم يكون مسجل دخول ويوصل لمرحلة الدفع، لازم بيانات حسابه المحفوظة تملا حقول المسافر الرئيسي تلقائيًا.\n- AC-004.4: لما المستخدم يرسل الحجز ويفشل Amadeus Flight Create Orders، لازم المستخدم يشوف خطأ واضح ولا يتم خصم منه.\n- AC-004.5: لما يتم إنشاء PNR على Amadeus وينجح الدفع، لازم الحجز يتعلم CONFIRMED والتذكرة تصدر عبر Amadeus Flight Order Management.\n\n**US-005: حجز فندق**\n\nكمسافر، أريد حجز غرفة فندق مع بيانات الضيف حتى أستلم قسيمة حجز مؤكدة.\n\n- AC-005.1: اختيار الغرفة لازم يعرض سياسة الإلغاء بلغة بسيطة قبل الدفع.\n- AC-005.2: نموذج الضيف لازم يجمع بيانات الضيف الرئيسي فقط (الضيوف الآخرين بالاسم فقط).\n- AC-005.3: حقل نص حر للطلبات الخاصة (بحد أقصى 500 حرف) لازم يتم تمريره للمورد.\n- AC-005.4: لما المورد يؤكد الحجز ويتم استلام الاستجابة، لازم يتم توليد voucher PDF وإرساله بالإيميل في خلال دقيقتين.\n\n**US-006: دفع متعدد البوابات**\n\nكمسافر، أريد الدفع باستخدام Paymob (للبطاقات/المحافظ المحلية) أو Stripe (للبطاقات الدولية) حتى أكمل حجزي.\n\n- AC-006.1: النظام لازم يكتشف BIN البطاقة تلقائيًا ويوصي بالبوابة المناسبة، مع السماح للمستخدم بتغيير الاختيار.\n- AC-006.2: مسار Paymob لازم يدعم Visa و Mastercard و Meeza والمحفظة الإلكترونية (Vodafone Cash, Orange Money).\n- AC-006.3: مسار Stripe لازم يدعم تحديات 3DS2 و SCA.\n- AC-006.4: مؤقت حجز 15 دقيقة لازم يثبت السعر والمخزون؛ عند انتهاء الوقت، يتم إعادة المستخدم لصفحة البحث.\n- AC-006.5: عند فشل الدفع، لازم المستخدم يشوف رمز السبب من البوابة مترجم لعربي/إنجليزي بسيط.\n\n### إدارة الحساب\n\n**US-007: إنشاء حساب**\n\nكمسافر، أريد إنشاء حساب باستخدام إيميل/كلمة مرور أو OTP بالهاتف حتى أحفظ حجوزاتي وبيانات المسافرين.\n\n- AC-007.1: التسجيل بالإيميل لازم يستلزم تحقق الإيميل قبل السماح بالحجز.\n- AC-007.2: OTP بالهاتف لازم يستخدم مزود SMS محلي (Vonage أو Twilio مع gateway موجه لمصر) وينتهي في 5 دقائق.\n- AC-007.3: سياسة كلمة المرور: 10 أحرف كحد أدنى، حرف كبير واحد، رقم واحد، رمز واحد.\n- AC-007.4: الحساب لازم يخزن: الاسم، الإيميل، الهاتف، اللغة المفضلة، العملة المفضلة، بيانات مسافرين محفوظة (حتى 6).\n\n**US-008: عرض حجوزاتي**\n\nكمسافر مسجل، أريد رؤية كل حجوزاتي السابقة والقادمة في قائمة واحدة حتى أرجع للتأكيدات وتواريخ السفر.\n\n- AC-008.1: القائمة لازم تعرض: مرجع الحجز، النوع (طيران/فندق)، الحالة، تواريخ السفر، المبلغ الإجمالي، وأزرار الإجراءات (عرض، تحميل القسيمة).\n- AC-008.2: الحجوزات لازم تترتب القادمة أولًا، ثم السابقة تنازليًا.\n- AC-008.3: صفحة تفاصيل كل حجز لازم تعرض كل أسماء المسافرين/الضيوف، خط السير، وإيصال الدفع.\n\n### الإدارة\n\n**US-009: لوحة تحكم الإدارة للحجوزات**\n\nكيارا (موظفة عمليات)، أريد رؤية كل الحجوزات على المنصة مع تصفيات حسب الحالة والتاريخ والعميل حتى أراقب العمليات وأتدخل عند الفشل.\n\n- AC-009.1: اللوحة لازم تعرض عدادات فورية: حجوزات اليوم، PNR قيد الانتظار، مدفوعات فاشلة، طلبات استرداد.\n- AC-009.2: جدول الحجوزات لازم يدعم تصفيات: الحالة (قيد الانتظار، مؤكد، ملغي، مسترد)، نطاق التاريخ، إيميل/هاتف العميل، مرجع الحجز.\n- AC-009.3: الضغط على حجز لازم يكشف سجل التدقيق الكامل: بارامترات البحث، استجابة المورد، أحداث الدفع، سجل إرسال الإيميل.\n- AC-009.4: الموظف لازم يقدر يضيف ملاحظات داخلية تظهر للموظفين فقط.\n\n**US-010: بدء استرداد يدوي**\n\nكيارا، أريد بدء استرداد يدوي من لوحة الإدارة حتى أحل مشاكل العملاء بدون تدخل من الهندسة.\n\n- AC-010.1: زر الاسترداد لازم يظهر فقط على الحجوزات المؤكدة (Confirmed) أو فاشلة الإتمام (Failed-Fulfilment).\n- AC-010.2: الموظف لازم يدخل رمز سبب ومبرر نصي حر.\n- AC-010.3: الاسترداد لازم يستدعي refund API لبوابة الدفع الأصلية (Paymob أو Stripe) ويحدث حالة الحجز لـ Refund-Pending.\n- AC-010.4: الاستردادات فوق EGP 10,000 لازم تستلزم موافقة موظف ثاني (4-eyes).\n- AC-010.5: العميل لازم يستلم إيميل مترجم يأكد إن الاسترداد قيد التنفيذ.\n\n### التأكيدات والتواصل\n\n**US-011: إيميل تأكيد الحجز**\n\nكمسافر، أريد استلام إيميل تأكيد بكل تفاصيل الحجز حتى يكون عندي سجل بشرائي.\n\n- AC-011.1: الإيميل لازم يتم إرساله في خلال 60 ثانية من تأكيد الحجز.\n- AC-011.2: لغة الإيميل لازم تطابق لغة الواجهة وقت الحجز.\n- AC-011.3: إيميلات الطيران لازم تشمل: PNR، أرقام التذاكر، خط السير الكامل، ملخص قواعد التعرفة، ومرفق تقويم (.ics).\n- AC-011.4: إيميلات الفنادق لازم تشمل: رقم التأكيد، عنوان الفندق، أوقات الدخول/الخروج، مرفق voucher PDF.\n- AC-011.5: الإيميلات لازم تظهر بشكل صحيح في Gmail و Outlook و Apple Mail و Yahoo - تم اختبارها عبر Litmus قبل الإطلاق.\n\n---\n\n## متطلبات العمل\n\n| ID | المتطلب | الأولوية | المصدر |\n|----|-------------|----------|--------|\n| BR-001 | المنصة لازم تكون ثنائية اللغة بالكامل (عربي/إنجليزي) مع دعم RTL كامل بما فيه تنسيق العملة وتنسيق التاريخ واتجاه النماذج. | Must | السوق |\n| BR-002 | المنصة لازم تقبل المدفوعات بالجنيه المصري (EGP) عبر Paymob (بطاقات، محافظ، Meeza). | Must | المالية |\n| BR-003 | المنصة لازم تقبل المدفوعات بالدولار/اليورو عبر Stripe لحاملي البطاقات الدولية. | Must | المالية |\n| BR-004 | مخزون الطيران لازم يكون مصدره حصريًا Amadeus Self-Service APIs للباقة الأساسية. | Must | المشتريات |\n| BR-005 | مخزون الفنادق لازم يكون من مورد واحد (Hotelbeds أو Expedia EAN أو TBO) - يتم اختياره في الأسبوع 1. | Must | المشتريات |\n| BR-006 | كل الحجوزات لازم تكون قابلة للتسوية من البداية للنهاية: بارامترات البحث -> عرض المورد -> PNR/قسيمة -> نية الدفع -> التسوية -> إصدار التذكرة/القسيمة. | Must | المالية |\n| BR-007 | لوحة الإدارة لازم تكون متاحة للموظفين الداخليين عبر SSO (Google Workspace) مع وصول قائم على الأدوار (موظف، مشرف، مالية، مدير). | Must | الأمان |\n| BR-008 | كل المعلومات التي تحدد الهوية الشخصية (PII) لازم تكون مشفرة في مكان التخزين (AES-256) وفي النقل (TLS 1.3). | Must | الامتثال |\n| BR-009 | بيانات بطاقات الدفع لازم لا تلمس أبدًا سيرفرات جولة - tokenization عبر hosted fields أو iframes من Paymob/Stripe فقط. | Must | PCI |\n| BR-010 | النظام لازم يمتثل لنطاق PCI DSS SAQ-A (حقول دفع مستضافة). | Must | الامتثال |\n| BR-011 | تأكيدات الحجز لازم تتم عبر مزود إيميل المعاملات (SendGrid أو AWS SES) مع نسبة وصول >98%. | Must | العمليات |\n| BR-012 | نسبة look-to-book مع Amadeus لازم تتم مراقبتها يوميًا وتفضل تحت 300:1 لتجنب رسوم العقوبات. | Must | المشتريات |\n| s Flight Offers Price للتأكيد إن السعر لا يزال صالحًا.\n4. المستخدم قدم بيانات المسافرين مع تحقق كل الحقول المطلوبة.\n5. تم استلام الدفع عبر Paymob أو Stripe.\n6. أرجع Amadeus Flight Create Orders PNR مؤكد.\n7. أصدر Amadeus Flight Order Management أرقام التذاكر.\n8. سجل الحجز في قاعدة بيانات جولة بحالة = CONFIRMED.\n9. العميل استلم إيميل التأكيد.\n10. لوحة تحكم الإدارة تعكس الحجز مع سجل التدقيق الكامل.\n\nلو أي خطوة 5-9 فشلت بعد الخطوة 5، النظام لازم يتراجع تلقائيًا (استرداد + تنبيه).\n\n### FAC-2: حجز فندق من البداية للنهاية\n\n1. المستخدم بحث عن فنادق واختار عقار وغرفة.\n2. فحص ما قبل الحجز من المورد (توفر السعر) نجح.\n3. تم التقاط بيانات الضيف والتحقق منها.\n4. تم استلام الدفع.\n5. أرجع API تأكيد حجز المورد رقم تأكيد.\n6. تم توليد voucher PDF وتخزينه.\n7. تم إرسال الإيميل.\n8. تم إنشاء سجل الإدارة.\n\n### FAC-3: معايير الاسترداد الوظيفية\n\n1. الاسترداد تم بدؤه بواسطة موظف مفوض عبر لوحة الإدارة.\n2. تم التقاط رمز السبب.\n3. لو المبلغ > EGP 10K، تم تسجيل موافقة ثانية.\n4. تم استدعاء refund API للبوابة بمرجع الدفع الأصلي.\n5. تم تسجيل استجابة البوابة.\n6. تم تحديث حالة الحجز.\n7. تم إخطار العميل.\n8. تم تحديث لوحة تحكم المالية.\n\n### FAC-4: التبديل بين اللغات\n\n1. زر تبديل اللغة متاح على كل صفحة.\n2. تبديل اللغة يحفظ الحالة الحالية للمستخدم (بارامترات البحث، بيانات النموذج).\n3. كل نصوص الواجهة، بما فيها محتوى المورد المحمل ديناميكيًا حيث ممكن، تتبدل.\n4. نمط الـ URL يتحدث: /en/... أو /ar/... لـ SEO.\n5. خصائص HTML `lang` و `dir` تتحدث.\n6. تنسيقات التاريخ والعملة تتلاءم محليًا.\n\n### FAC-5: مصادقة الإدارة\n\n1. تسجيل دخول الإدارة عبر Google Workspace OAuth فقط (لا توجد حسابات إدارة بكلمة مرور).\n2. الدور يتم تعيينه عبر عضوية مجموعة Google Workspace.\n3. انتهاء صلاحية الجلسة بعد 30 دقيقة من عدم النشاط.\n4. كل إجراءات الإدارة تتسجل مع المتصرف والطابع الزمني وعنوان IP.\n\n### FAC-6: وصول الإيميل\n\n1. SPF و DKIM و DMARC مكونة على دومين الإرسال.\n2. webhooks الارتدادات/الشكاوى تتم معالجتها تلقائيًا.\n3. الإيميلات الحرجة (تأكيد الحجز) تعيد المحاولة عند الفشل العابر (3 محاولات على مدى 10 دقائق).\n4. الإيميلات الفاشلة الإرسال تولد تنبيه عمليات مع مرجع الحجز.\n\n---\n\n## مؤشرات الأداء الرئيسية (KPIs)\n\n| KPI | المستهدف | طريقة القياس | المسؤول | تكرار المراجعة |\n|-----|--------|---------------------|-------|----------------|\n| وقت ظهور أول نتيجة بحث (p95) | < 4.5 ثواني | توقيت APM (Datadog/New Relic) على /api/flights/search | الهندسة | أسبوعيًا |\n| نسبة نجاح حجز الطيران | > 92% | (الحجوزات المؤكدة / محاولات الدفع التي اجتازت التحقق) | المنتج | أسبوعيًا |\n| نسبة نجاح حجز الفنادق | > 90% | (الحجوزات المؤكدة / محاولات الدفع) | المنتج | أسبوعيًا |\n| نسبة نجاح الدفع (Paymob) | > 85% | لوحة تحكم Paymob + السجلات الداخلية | المالية | يوميًا أول 30 يوم، ثم أسبوعيًا |\n| نسبة نجاح الدفع (Stripe) | > 88% | لوحة تحكم Stripe | المالية | أسبوعيًا |\n| نسبة Look-to-Book (Amadeus) | < 300:1 | (استدعاءات Search API / الطلبات المؤكدة) لكل شهر تقويمي | الهندسة + المشتريات | يوميًا أول 60 يوم |\n| التحويل من البحث للحجز | > 1.2% | (الحجوزات المؤكدة / جلسات البحث الفريدة) | المنتج | أسبوعيًا |\n| متوسط قيمة الطلب - طيران | > EGP 8,500 | Sum(إجمالي طلبات الطيران) / count(طلبات الطيران) | المالية | شهريًا |\n| متوسط قيمة الطلب - فنادق | > EGP 4,200 | Sum(إجمالي طلبات الفنادق) / count(طلبات الفنادق) | المالية | شهريًا |\n| نسبة الاسترداد | < 12% | (الحجوزات المستردة / إجمالي الحجوزات المؤكدة) | العمليات | شهريًا |\n| نسبة Chargeback | < 0.6% | تقارير البوابة | المالية | شهريًا |\n| نسبة فتح الإيميل (التأكيدات) | > 65% | تحليلات SendGrid | التسويق | أسبوعيًا |\n| نسبة تذاكر دعم العملاء | < 8% من الحجوزات | نظام Helpdesk (Freshdesk/Zendesk) | العمليات | أسبوعيًا |\n| وقت أول استجابة (الدعم) | < 4 ساعات | SLA الـ Helpdesk | العمليات | أسبوعيًا |\n| وقت تشغيل الموقع | > 99.5% | مراقبة Uptime (Better Uptime / Pingdom) | الهندسة | شهريًا |\n| متوسط وقت التعافي (MTTR) | < 45 دقيقة | تحقيقات ما بعد الحوادث | الهندسة | لكل حادث |\n| نسبة جلسات الواجهة العربية | > 35% | التحليلات (خاصية اللغة) | المنتج | شهريًا |\n| نسبة الحركة من الموبايل | > 60% | التحل نسخ عربية وإنجليزية.\n- بيانات اعتماد Amadeus sandbox فعالة وأول استدعاء اختبار موثق.\n\n**قبول M2**\n- بحث Amadeus الحي يرجع نتائج حقيقية على staging.\n- بحث مورد الفنادق يرجع نتائج حقيقية على staging.\n- الواجهتين ثنائيتي اللغة.\n- درجة Lighthouse >= 80 على صفحات البحث.\n\n**قبول M3**\n- على الأقل 10 حجوزات اختبار على staging مكتملة للطيران (PNR مولد، تذاكر مصدرة).\n- على الأقل 10 حجوزات اختبار على staging مكتملة للفنادق (voucher مولد).\n- مدفوعات الاختبار تنجح لـ: Paymob Visa, Paymob Mastercard, Paymob Meeza, Paymob Vodafone Cash, Stripe Visa, تحدي Stripe 3DS.\n- إيميلات التأكيد تظهر بشكل صحيح في 4 عملاء إيميل رئيسيين.\n\n**قبول M4**\n- الإدارة تقدر تعرض وتصفي وتبحث عن الحجوزات.\n- الاسترداد اليدوي تم اختباره ضد staging Paymob و Stripe.\n- ملاحظات الموظفين تستمر وتسجل في سجل التدقيق.\n- حسابات المستخدمين تم إنشاؤها، الملفات الشخصية تم تعديلها، قائمة الحجوزات مرئية.\n\n**قبول M5**\n- نص UAT (200+ حالة اختبار) تم تنفيذه بواسطة فريق جولة بنسبة نجاح >95%.\n- مراجعة الأمان: لا توجد نتائج حرجة أو عالية مفتوحة.\n- اختبار الحمل يصمد لـ 100 مستخدم متزامن مع p95 < 6s على الـ endpoints الرئيسية.\n\n**قبول M6**\n- بيئة الإنتاج حية مع المراقبة والتنبيهات والنسخ الاحتياطي مكونة.\n- runbook العمليات تم تسليمه (24+ إجراء موثق).\n- أول 50 حجز عميل حقيقي تمت معالجتها بدون تصعيد للهندسة.\n\n---\n\n## ترتيب أولويات الميزات (MoSCoW)\n\n### Must Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| بحث الطيران عبر Amadeus | محرك الإيرادات الأساسي |\n| حجز الطيران عبر Amadeus (PNR + إصدار التذاكر) | محرك الإيرادات الأساسي |\n| بحث الفنادق (مورد واحد) | محرك الإيرادات الأساسي |\n| حجز الفنادق (مورد واحد) | محرك الإيرادات الأساسي |\n| تكامل الدفع Paymob | متطلب دفع محلي |\n| تكامل الدفع Stripe | بطاقات دولية |\n| الواجهة العربية مع RTL | متطلب السوق |\n| الواجهة الإنجليزية | المغتربين + السياح |\n| حسابات المستخدمين الأساسية (إيميل/كلمة مرور) | تاريخ الحجوزات، الشراء المتكرر |\n| تأكيدات الإيميل | متطلب تشغيلي |\n| لوحة تحكم الإدارة للحجوزات | العمليات لا تقدر تشتغل بدونها |\n| الا n1. **الباقات السياحية والعروض المجمعة**: حزم طيران + فندق، تجميع ديناميكي، خط سير جاهز.\n2. **تنسيق متعدد الموردين للفنادق**: تكامل مورد واحد فقط مدرج. إضافة مورد ثاني (Hotelbeds + EAN مثلًا) يتطلب باقة Professional أو طلب تغيير.\n3. **نظام الولاء/المكافآت**: لا نقاط، لا مستويات، لا محفظة، لا آليات إحالة.\n4. **إشعارات WhatsApp**: إيميل فقط.\n5. **الإلغاء/الاسترداد الذاتي للعميل**: كل الإلغاءات والاستردادات لازم تطلب عبر الدعم ويتعامل معها موظف.\n6. **تطبيقات الموبايل**: لا توجد تطبيقات iOS أو Android أصلية. واجهة الويب متجاوبة لكنها ليست PWA قابلة للتثبيت أو لها إشعارات push.\n7. **بوابة B2B / الوكلاء**: لا تسجيل دخول لوكيل سفر، لا إدارة هامش ربح، لا حسابات عمولة وكلاء.\n8. **White-Label / Multi-Tenant**: المنصة تخدم علامة جولة تورز فقط.\n9. **محرك التسعير الديناميكي / الهامش**: التسعير هو السعر الصافي للمورد + نسبة هامش واحدة قابلة للتكوين. لا توجد تسعيرات قائمة على الطلب أو القواعد.\n10. **كشف الاحتيال (قائم على ML)**: مرشحات احتيال على مستوى البوابة (3DS, Stripe Radar الأساسي) فقط؛ لا ML داخلي ولا قواعد سرعة.\n11. **الحجوزات الجماعية (>9 مسافرين)**: حجوزات Amadeus الجماعية تتطلب workflows خارج الإنترنت غير مدعومة.\n12. **أدوات حجز الشركات**: لا فرض سياسة سفر، لا فوترة شركات، لا ملفات GDS.\n13. **لوحات BI / تحليلات متقدمة**: فقط exports أساسية وعدادات الإدارة؛ لا تكامل Metabase/Tableau.\n14. **محاسبة متعددة الفروع**: كيان قانوني واحد، حساب بنكي واحد، مصدر إيراد واحد.\n15. **تخزين المخزون مؤقتًا / فهرسة قبل البحث**: البحث في الوقت الفعلي ضد الموردين؛ لا مخزون ثابت أو طبقة تخزين مؤقت بعيدًا عن الجلسة الواحدة.\n16. **محتوى SEO / صفحات Programmatic**: لا صفحات مدن، لا أدلة وجهات، لا blog CMS. الموقع التسويقي يعيش بشكل منفصل.\n17. **بنية اختبار A/B**: لا منصة تجريب.\n18. **إشعارات Push**: ويب push أو موبايل push.\n19. **مكالمات / Click-to-Call / تكامل IVR**.\n20. **لغات متعددة بعد العربية والإنجليزية**: لا فرنسية، لا ألمانية، لا روسية.\n21. **مدفوعات Crypto, BNPL, أقساط بعد الافتراضي لـ Paymob**.\n22. **محرك ضريبة دولي/VAT**: VAT المصري فقط، مكتوب صراحة.\n23. **هجرة  قائد المنتج | أحمد محمود | _________________ | 2026-06-29 |\n| قائد الهندسة | _________________ | _________________ | _________ |\n| المعتمد المالي | _________________ | _________________ | _________ |\n| المراجع القانوني | _________________ | _________________ | _________ |\n","prds-professional":"## 🎯 ملخص لمجلس الإدارة\n\nنحن نبني منصة حجوزات سفر متكاملة لشركة Jawla Tours تخدم المسافرين في مصر ودول الخليج، تتيح لهم حجز الطيران والفنادق والجولات السياحية بسهولة من خلال موقع إلكتروني وتطبيق موحد. هذه الباقة الاحترافية تتجاوز الباقة الأساسية بإضافة مزايا تجارية مهمة مثل: التعامل مع أكثر من مزود فنادق في نفس الوقت للحصول على أفضل الأسعار، نظام ولاء ومحفظة لتشجيع العملاء على العودة، وتنبيهات واتساب لتقليل تكلفة خدمة العملاء. اخترنا هذه الباقة تحديدًا لأنها تفتح لنا سوق دول الخليج والمغتربين عبر دعم العملات المتعددة، وتقلل الاعتماد على فريق خدمة العملاء عبر تمكين العميل من إلغاء حجوزاته واسترداد أمواله بنفسه.\n\n### ماذا يحصل عليه العميل في هذه الباقة؟\n\n- حجز تذاكر الطيران من عدة شركات طيران في مكان واحد مع المقارنة بين الأسعار\n- حجز الفنادق من أكثر من مزود في نفس الوقت لضمان أفضل سعر وأوسع تشكيلة من الخيارات\n- حجز الجولات السياحية والباقات المتكاملة (طيران + فندق + جولة)\n- برنامج ولاء يمنح العميل نقاطًا على كل حجز يستطيع استبدالها لاحقًا في حجوزات جديدة\n- محفظة إلكترونية شخصية يستطيع العميل شحنها واستخدامها في الدفع أو استرداد قيمة الإلغاءات فيها\n- إشعارات فورية عبر واتساب لتأكيد الحجز والتذكير بالرحلة وتحديثات أي تغييرات\n- إلغاء الحجوزات وطلب استرداد الأموال ذاتيًا دون الحاجة للتواصل مع خدمة العملاء\n- إمكانية الدفع والعرض بعدة عملات (الجنيه المصري، الريال السعودي، الدرهم الإماراتي، الدولار، اليورو)\n- تطبيق موبايل سلس على الأندرويد والآيفون بنفس مزايا الموقع الإلكتروني\n\n### الأرقام الرئيسية\n\n| البيان | القيمة |\n|-------|-------|\n| السعر الإجمالي | 850,000 جنيه مصري |\n| العملة المعادلة بالدولار | حوالي 17,000 دولار أمريكي |\n| مدة التنفيذ | 4 أشهر |\n| تاريخ التسليم المتوقع | أكتوبر 2026 |\n| الصيانة الشهرية | 20,000 جنيه مصري شهريًا |\n| ساعات الاستشارة الخارجية لـ Amadeus | 60 إلى 80 ساعة |\n| عدد الموظفين المطلوبين | 5 إلى 7 أفراد (تطوير + تصميم + بيانات + جودة) |\n| عدد طرق الدفع المدعومة | 4 طرق رئيسية (بطاقات بنكية، محافظ إلكترونية، تحويل بنكي، الدفع عند الاستلام) |\n| العملات المدعومة | 5 عملات (الجنيه المصري، الريال السعودي، الدرهم الإماراتي، الدولار، اليورو) |\n| نسبة المخاطر التقنية | متوسطة (محسوبة ومعالجة بخطط واضحة) |\n\n### القيمة التجارية المتوقعة\n\n- برنامج الولاء والمحفظة يشجع العملاء على تكرار الحجز بدلًا من اللجوء للمنافسين، مما يرفع متوسط الإيراد من كل عميل\n- إشعارات واتساب تقلل عدد المكالمات الواردة لخدمة العملاء وتخفض تكلفة التشغيل الشهرية\n- خاصية الإلغاء والاسترداد الذاتي تقلل الحمل على فريق العمليات وتسرّع رضا العميل\n- دعم عملات الخليج (السعودي والإماراتي) يفتح لنا سوق المسافرين الخليجيين والمصريين العاملين بالخارج\n- التعامل مع أكثر من مزود فنادق يرفع هامش الربح لأننا نختار العرض الأفضل سعرًا في كل لحظة\n- توحيد تجربة الموبايل والويب يرفع معدلات إتمام الحجز وينعكس مباشرة على المبيعات\n\n### المخاطر الرئيسية وكيف نعالجها\n\n| المخاطرة | المعالجة |\n|---------|---------|\n| تعطل أحد مزودي الفنادق وتأثر تجربة العميل | ربط أكثر من مزود في نفس الوقت بحيث يستمر العمل تلقائيًا حتى لو توقف أحدهم |\n| تأخر التكامل مع نظام Amadeus العالمي للطيران | حجز ساعات استشارة كافية من خبير خارجي متخصص منذ بداية المشروع |\n| صعوبة فهم العملاء لنظام النقاط والمحفظة الجديد | تصميم تجربة بسيطة ومرئية مع رسائل توضيحية داخل التطبيق وفيديوهات تعريفية |\n| تذبذب أسعار صرف العملات وتأثيره على هامش الربح | تحديث الأسعار تلقائيًا كل ساعة وإضافة هامش حماية محسوب على كل عملية تحويل |\n| تأخر تسليم المشروع عن الموعد المحدد (4 أشهر) | تقسيم المشروع لمراحل تسليم شهرية مع مراجعة تقدم أسبوعية وخطة طوارئ لكل مرحلة |\n| تجاوز تكلفة الصيانة الشهرية المتوقعة بعد الإطلاق | عقد صيانة بسقف ثابت 20,000 جنيه شهريًا لمدة عام كامل مع تجديد سنوي قابل للتفاوض |\n\n### القرار المطلوب من المجلس\n\nاعتماد ميزانية 850,000 جنيه مصري لتنفيذ الباقة الاحترافية خلال 4 أشهر مع التزام شهري بـ 20,000 جنيه للصيانة بعد الإطلاق.\n\n---\n\n# Jawla Tours OTA - وثيقة متطلبات المنتج للباقة الاحترافية (Professional)\n\n## بيانات الوثيقة\n\n| البيان | القيمة |\n|-------|-------|\n| اسم الوثيقة | Jawla Tours OTA - وثيقة متطلبات منتج الباقة الاحترافية |\n| الإصدار | 1.0.0 |\n| التاريخ | 2026-06-29 |\n| الحالة | معتمدة للتطوير |\n| مالك الوثيقة | أحمد محمود (المسؤول الفني عن المنتج) |\n| الراعي من جهة العمل | الإدارة التنفيذية لشركة Jawla Tours |\n| قائد فريق الهندسة | لم يُحدد بعد - قائد Backend (NestJS) + قائد Frontend (Next.js) |\n| قائد فريق البيانات / BI | لم يُحدد بعد - مهندس تحليلات أول (Senior Analytics Engineer) |\n| قائد التصميم | لم يُحدد بعد - مصمم منتج أول (متخصص في الـ dashboard والـ admin) |\n| مستشار تكامل Amadeus | متخصص خارجي (مخصص له تقريبًا 60-80 ساعة) |\n| التصنيف | داخلي - سري |\n| التوزيع | الهندسة، المنتج، QA، المالية، العمليات، خدمة العملاء |\n| تاريخ المراجعة القادمة | 2026-09-29 |\n| تحل محل | لا شيء (تُعتبر امتدادًا لوثيقة PRD الخاصة بالباقة Basic v1.0.0) |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ | الكاتب | ملخص التعديل |\n|---------|------|--------|----------------|\n| 0.1.0 | 2026-05-20 | أ. محمود | المخطط الأولي؛ عصف ذهني لنطاق الباقة الاحترافية |\n| 0.4.0 | 2026-06-04 | أ. محمود | إضافة تصميم تنسيق الموردين المتعددين (multi-supplier orchestration) |\n| 0.7.0 | 2026-06-15 | أ. محمود | تعريف نموذج الولاء / المحفظة؛ إضافة نطاق WhatsApp |\n| 0.9.0 | 2026-06-22 | أ. محمود | اعتماد وحدة التقارير النهائية؛ اعتماد نموذج العملات المتعددة |\n| 1.0.0 | 2026-06-29 | أ. محمود | الإصدار النهائي المعتمد |\n\n### العلاقة بالباقة Basic\n\nالباقة الاحترافية (Professional) هي امتداد كامل للباقة Basic. يعني كل اللي موجود في PRD باقة Basic موجود هنا، بالإضافة للقدرات الجديدة الموصوفة في الوثيقة دي. ولو في خاصية موجودة في الاتنين، التعريف بتاع الباقة الاحترافية بيلغي تعريف الباقة Basic.\n\n### الوثائق المرتبطة\n\n- وثيقة العمل الرئيسية لـ Jawla Tours (SOW-2026-001)\n- وثيقة PRD الخاصة بالباقة Basic v1.0.0\n- اتفاقية Amadeus Self-Service و Enterprise API\n- اتفاقية التوزيع الرئيسية مع Hotelbeds\n- اتفاقية شراكة Expedia EAN (قيد الاعتماد)\n- اتفاقية التوزيع مع TBO (قيد الاعتماد)\n- استمارة تفعيل WhatsApp Business API - 360dialog / Meta Cloud API\n- دليل العلامة التجارية الإصدار 2.1\n\n---\n\n## الرؤية\n\nالباقة الاحترافية بتحوّل Jawla من OTA شغّال إلى OTA منافس فعلاً. مع الباقة Basic، Jawla بتقدر تعمل حجوزات - مع الباقة الاحترافية، Jawla بتقدر تنافس. المنتج بيتطور على خمس محاور استراتيجية:\n\n1. **عمق المخزون (فنادق من موردين متعددين)**: ربط 3 موردين فنادق على الأقل (زي Hotelbeds و Expedia EAN و TBO) وتنسيقهم من خلال تجربة بحث واحدة بتشيل التكرار، وترتّب النتائج حسب السعر والتوفر والهامش، وبتشتغل بسلاسة لو واحد من الموردين واقع.\n2. **الاحتفاظ بالعميل (ولاء ومحفظة)**: تقديم برنامج ولاء مبني على النقاط ومحفظة بقيمة مخزنة، علشان يبقى عند العميل سبب مادي إنه يرجع لـ Jawla بدل المنافسين.\n3. **وصول التواصل (WhatsApp)**: WhatsApp هو قناة المراسلة الأولى في مصر والمنطقة. إشعارات WhatsApp المعاملاتية عن طريق Meta Business API بتحسن الثقة وبتقلل الضغط على الدعم.\n4. **خدمة ذاتية تشغيلية**: الإلغاءات والاسترجاعات اللي بيعملها العميل بنفسه (في حدود قواعد المورد) بتقلل تكلفة الدعم لكل حجز بنسبة تقديرية 40-60%.\n5. **تحليلات بجودة قرار**: طبقة تقارير فيها لوحات يومية وأسبوعية وشهرية للمنتج والمالية والعمليات - بتحوّل المنصة من صندوق أسود لحاجة مقاسة.\n\nالباقة الاحترافية كمان بتحل تلات نقط تشغيلية كانت الباقة Basic مأجلاها عن قصد: عرض وتسوية العملات المتعددة، أدوات admin أكثر تطورًا (تقسيم العملاء، إجراءات جماعية، تصدير للماركتنج)، والأساسات الجاهزة لباقة Enterprise (event bus، طبقة تجريد للموردين، مستودع بيانات للتقارير).\n\nالباقة الاحترافية هي النطاق المناسب لـ Jawla لو (أ) الباقة Basic أثبتت ملاءمة المنتج للسوق، (ب) حجم الحجوزات يبرر الاستثمار في بنية الاحتفاظ بالعميل، (ج) فريق العمليات بقى مرهق من الشغل اليدوي. ومش النطاق المناسب لو الشركة لسه بتتحقق هل المصريين هيحجزوا أونلاين أصلاً - السؤال ده لازم يتجاوب عليه بـ Basic الأول.\n\n---\n\n## الأهداف ومقاييس النجاح\n\n### الأهداف الاستراتيجية\n\n1. **زيادة حجم الحجوزات 3 أضعاف مقارنة بـ Basic خلال 6 شهور من إطلاق الباقة الاحترافية** عن طريق توسيع المخزون والاحتفاظ بالعملاء.\n2. **تخفيض تكلفة دعم العميل لكل حجز بنسبة 50%** عن طريق الاسترجاع الذاتي وتحويل التواصل لـ WhatsApp.\n3. **بناء اقتصاد شراء متكرر**: المستهدف >30% من الحجوزات من عملاء عائدين (مقابل <8% المتوقع لـ Basic فقط).\n4. **تنويع الاعتماد على الموردين**: ما فيش مورد فنادق واحد يمثل >55% من إجمالي قيمة حجوزات الفنادق (GBV).\n5. **اتخاذ القرارات بالبيانات مش بالحدس**: أي قرار في المنتج أو المالية أو العمليات تأثيره الشهري >50 ألف جنيه لازم يتأسس على لوحة بيانات في Jawla.\n\n### مقاييس النجاح (بعد 90 يوم من إطلاق الباقة الاحترافية)\n\n| المقياس | المستهدف | الأساس (Basic) | التحسن |\n|--------|--------|------------------|-------------|\n| إجمالي قيمة الحجوزات الإجمالية (90 يوم) | 18 مليون جنيه | 4.5 مليون جنيه | 4x |\n| الحجوزات المؤكدة | 1,400+ | 350 | 4x |\n| نسبة العملاء العائدين | > 30% | ~8% | 3.75x |\n| نسبة الاشتراك في برنامج الولاء | > 65% من الحسابات الجديدة | لا ينطبق | جديد |\n| الرصيد النشط في المحفظة (الإجمالي) | > 1.2 مليون جنيه | لا ينطبق | جديد |\n| نسبة الموافقة على WhatsApp وقت الحجز | > 70% | لا ينطبق | جديد |\n| نسبة الإلغاء الذاتي | > 60% من الإلغاءات | 0% | جديد |\n| تذاكر الدعم لكل 100 حجز | < 4 | ~8 | تخفيض 50% |\n| مؤشر تنوع موردي الفنادق (HHI) | < 4500 | لا ينطبق | جديد |\n| نسبة الحجوزات بعملات متعددة | > 18% | <5% (USD فقط) | 3.6x |\n\n---\n\n## الشخصيات (Personas)\n\nشخصيات الباقة Basic لسه صالحة. الباقة الاحترافية بتضيف 3 شخصيات جديدة وبترفع 2 من الموجودين لمرتبة أساسية.\n\n| الشخصية | الاسم | السن | المكان | الأهداف | نقاط الألم |\n|---------|------|-----|----------|-------|-------------|\n| العميل المخلص العائد | ياسمين طارق | 34 | القاهرة، مصر | كسب نقاط على كل حجز؛ استبدال رصيد المحفظة في الرحلة الجاية؛ مزايا في عيد الميلاد والمناسبات | ما فيش سبب يخليها تركز إنفاقها مكان واحد؛ مش شايفة مزاياها بوضوح؛ المنافسين بيكافئوا أكثر |\n| المسافر اللي بيستخدم WhatsApp الأول | عمر فتحي | 27 | المنصورة، مصر | استلام كل تحديثات الحجز على WhatsApp - عمره ما بيفتح إيميل؛ عايز يكلم الدعم على WhatsApp وقت مشاكل السفر | الإيميلات بتفضل من غير قراءة؛ الاتصال بالدعم وهو مسافر مكلف على الـ roaming |\n| السائح بعملات متعددة | صوفي لوران | 38 | باريس، فرنسا | حجز رحلة القاهرة + الأقصر + أسوان؛ الدفع باليورو؛ شوفان الأسعار باليورو في كل مكان؛ استلام فواتير باليورو للمطالبات المالية | معظم الـ OTAs المحلية بتعرض EGP بس؛ التحويل بيحصل مرتين (البنك والمنصة)؛ عملة الفاتورة مش مطابقة |\n| المسؤول المالي (مرفّع) | طارق فهمي | 41 | المقر القاهرة | لوحات يومية وأسبوعية وشهرية؛ تسوية تسويات العملات المتعددة؛ ترحيل تلقائي للاسترجاعات؛ استحقاقات الموردين | التسوية اليدوية بتاخد نص أسبوعه؛ التحويل اليدوي للعملات بيحصل فيه أخطاء؛ ما فيش رؤية لهامش كل مورد |\n| مدير العمليات (مرفّع) | يارا مصطفى | 26 | المقر القاهرة | فرز 10 أضعاف الحجم بنفس الفريق؛ إجراءات جماعية على الحجوزات المقسمة؛ مؤشر صحة العميل؛ لوحة SLA لفشل الموردين | نموذج اللمس لكل حجز مش بيكبر؛ ما فيش طريقة تشوف \"كل فشل Hotelbeds في آخر 24 ساعة\"؛ ما فيش أدوات تقسيم |\n| مسؤول التسويق (جديد) | هاجر الدين | 31 | المقر القاهرة | تقسيم العملاء حسب الوجهة، متوسط قيمة الطلب، الحداثة؛ تصدير لأداة التسويق بالإيميل؛ تشغيل عروض ولاء | ما فيش تقسيم عملاء؛ مش قادرة تقيس تحويل الحملة لحجز؛ نظام الولاء محتاج رافعات تسويقية |\n\n### مصفوفة تغطية الشخصيات (لميزات الباقة الاحترافية)\n\n| الميزة | ياسمين | عمر | صوفي | طارق | يارا | هاجر |\n|---------|---------|------|--------|-------|------|-------|\n| كسب نقاط الولاء | أساسي | مستفيد | مستفيد | يسوي | يلاحظ | يدير الحملات |\n| شحن واستبدال المحفظة | أساسي | ثانوي | ثانوي | يسوي | - | - |\n| تأكيدات WhatsApp | مستفيد | أساسي | مستفيد (إنجليزي) | - | يلاحظ | - |\n| الإلغاء الذاتي | أساسي | أساسي | أساسي | يسوي | يعتمد الحالات الاستثنائية | - |\n| عرض العملات المتعددة | ثانوي | ثانوي | أساسي | يسوي | - | يقسم حسب العملة |\n| الدفع بعملات متعددة | ثانوي | - | أساسي | يسوي | - | - |\n| فنادق من موردين متعددين | مستفيد | مستفيد | أساسي | تحليل الهامش | فرز فشل الموردين | مقارنة أداء الموردين |\n| التقارير المتقدمة | - | - | - | أساسي | أساسي | أساسي |\n| تقسيم العملاء | مستهدف | مستهدف | مستهدف | - | يحدد VIP | أساسي |\n\n---\n\n## قصص المستخدم (User Stories)\n\nالقصص بتكمل ترقيم باقة Basic (US-001..US-011 موروثة). الباقة الاحترافية بتضيف من US-012 إلى US-038.\n\n### تنسيق فنادق من موردين متعددين\n\n**US-012: بحث فنادق موحد عبر الموردين**\n\nكمسافر، أنا عايز أشوف نتائج الفنادق مجمعة من كل موردين Jawla في قائمة واحدة مرتبة علشان أحصل على أفضل سعر واختيار من غير ما أعرف أو أهتم مين المورد بتاع كل سعر.\n\n- AC-012.1: لما أبحث في وجهة، لازم الـ orchestrator يستعلم من 3 موردين فنادق على الأقل بالتوازي مع timeout إجمالي 4 ثواني.\n- AC-012.2: لو موردين رجعوا نفس الفندق، الفندق لازم يظهر مرة واحدة بأقل سعر بارز ويكون العرض البديل متاح عن طريق توسيع \"More rates\".\n- AC-012.3: لو مورد عمل timeout أو حصل عنده error، النتائج من الموردين الباقيين لازم تتعرض والفشل يتسجل من غير ما يظهر للمستخدم.\n- AC-012.4: تكرار الفنادق لازم يتبني على خدمة هوية فنادق (GIATA codes، مطابقة جغرافية، مطابقة اسم تشابه >85%).\n- AC-012.5: خوارزمية الترتيب لازم تأخذ في الاعتبار: السعر، درجة موثوقية المورد (نسبة نجاح متجددة لـ 7 أيام)، الهامش لـ Jawla، تفضيلات المستخدم (يفضل القابل للاسترجاع).\n\n**US-013: لوحة صحة الموردين**\n\nكـ يارا (مدير عمليات)، أنا عايزة لوحة لحظية تعرض صحة كل مورد فنادق علشان أقدر أتواصل مبكرًا مع العملاء ومديري حسابات الموردين لما يحصل تدهور.\n\n- AC-013.1: اللوحة لازم تعرض لكل مورد: نسبة نجاح البحث (آخر ساعة، 24 ساعة، 7 أيام)، نسبة نجاح الحجز، متوسط زمن الاستجابة، حالة circuit-breaker الحالية.\n- AC-013.2: لما تنخفض نسبة نجاح المورد في ساعة واحدة تحت 90%، لازم ينطلق تنبيه للعمليات عبر Slack و PagerDuty.\n- AC-013.3: اللوحة لازم تسمح للعمليات بتعطيل المورد يدوياً (فتح circuit breaker) وإعادة تفعيله بعد التعافي.\n\n**US-014: تقارير هامش الموردين**\n\nكـ طارق (المالية)، أنا عايز تقرير هامش لكل مورد علشان أقدر أعيد التفاوض على الشروط التجارية وأعيد توزيع الترافيك.\n\n- AC-014.1: التقرير لازم يعرض: GBV، COGS (صافي المورد)، إجمالي الهامش، نسبة الهامش %، حسب المورد وحسب الشهر.\n- AC-014.2: التعمق لازم يعرض أعلى 50 فندق بيساهموا في هامش كل مورد.\n\n### الولاء والمحفظة\n\n**US-015: التسجيل في برنامج الولاء**\n\nكحساب جديد، أنا عايز أتسجل تلقائيًا في برنامج ولاء Jawla علشان أبدأ أكسب نقاط على طول من غير خطوة إضافية.\n\n- AC-015.1: إنشاء الحساب لازم ينشئ ملف ولاء مقابل بمستوى \"Member\" افتراضيًا.\n- AC-015.2: العميل لازم يشوف رصيده الحالي من النقاط في كل صفحة (widget في الـ header).\n- AC-015.3: العميل يقدر يخرج من برنامج الولاء من إعدادات الحساب (مسار نادر - الحدث ده يتسجل للتحليل).\n\n**US-016: كسب النقاط على الحجز**\n\nكعضو في الولاء، أنا عايز أكسب نقاط على كل حجز مؤكد علشان أتكافأ على اختياري لـ Jawla.\n\n- AC-016.1: قاعدة الكسب: 1 نقطة لكل 10 جنيه من صافي مبلغ الحجز (مش شامل الضرائب والرسوم) لمستوى Member؛ 1.5x لـ Silver؛ 2x لـ Gold؛ 3x لـ Platinum.\n- AC-016.2: النقاط لازم تتقيد عند تأكيد الحجز بس تتقفل لحد 24 ساعة بعد انتهاء السفر/الإقامة (نافذة حماية من الاسترجاع).\n- AC-016.3: إلغاء الحجز لازم يعكس النقاط؛ لو النقاط اتستبدلت بالفعل، الرصيد ممكن يبقى سالب ولازم يتسدد قبل أي استبدال جديد.\n- AC-016.4: ترقيات المستوى لازم تتحسب ليلاً بناءً على الإنفاق المتجدد لـ 12 شهر.\n\n**US-017: شحن المحفظة**\n\nكعميل، أنا عايز أضيف فلوس للمحفظة بتاعتي في Jawla علشان أقدر أدفع مسبقاً للرحلات الجاية، أو أشارك ميزانية العيلة، أو أحتفظ بمبالغ مسترجعة.\n\n- AC-017.1: الشحن عن طريق Paymob أو Stripe بـ EGP أو USD أو EUR.\n- AC-017.2: أرصدة المحفظة لازم تتعقب لكل عملة على حدة (من غير تحويل تلقائي).\n- AC-017.3: الحد الأدنى للشحن: 200 جنيه / 20 USD / 20 EUR. الحد الأقصى لكل عملية: 50,000 جنيه (سقف تنظيمي).\n- AC-017.4: الشحنات مش قابلة للاسترجاع نقدًا (تتستبدل بس مقابل حجوزات)؛ ده لازم يتعرض قبل التأكيد.\n\n**US-018: استبدال المحفظة عند الدفع**\n\nكعميل عنده رصيد محفظة، أنا عايز أطبق رصيد المحفظة عند الـ checkout علشان أقلل المبلغ اللي بدفعه من جيبي.\n\n- AC-018.1: شاشة الدفع لازم تعرض رصيد المحفظة و slider/toggle للتطبيق.\n- AC-018.2: عملة المحفظة لازم تطابق عملة الحجز، أو المنصة لازم تعرض التحويل بوضوح.\n- AC-018.3: لو المحفظة بتغطي الحجز بالكامل، ما فيش حاجة لدفع عن طريق gateway.\n- AC-018.4: استبدال المحفظة + نقاط الولاء + الدفع عن طريق gateway ممكن يندمجوا في معاملة واحدة.\n\n**US-019: عرض مزايا المستوى**\n\nكعضو في الولاء، أنا عايز أشوف بوضوح المزايا اللي عندي في مستواي الحالي وإيه اللي هفتحه في المستوى التالي علشان أحفز نفسي إني أكمل الحجز مع Jawla.\n\n- AC-019.1: صفحة الحساب لازم تعرض: المستوى الحالي، رصيد النقاط، النقاط للمستوى التالي، قائمة المزايا الحالية، قائمة مزايا المستوى التالي.\n- AC-019.2: مزايا المستويات تشمل: مضاعف الكسب، دعم بأولوية، نافذة إلغاء مجانية (24 ساعة بعد الحجز)، بونص عيد الميلاد، بونص شحن المحفظة.\n\n### إشعارات WhatsApp\n\n**US-020: الموافقة على WhatsApp عند الدفع**\n\nكمسافر، أنا عايز أوافق على إشعارات WhatsApp وقت الدفع علشان أستلم تحديثات الرحلة على القناة المفضلة عندي.\n\n- AC-020.1: فورم الدفع لازم يشمل checkbox للموافقة على WhatsApp، افتراضيًا مش متشيك (موافقة بنمط GDPR).\n- AC-020.2: رقم التليفون اللي يتدخل لازم يتحقق منه عن طريق رسالة WhatsApp (رسالة تأكيد لمرة واحدة بلينك تأكيد، تنتهي بعد 10 دقايق).\n- AC-020.3: إلغاء الاشتراك لازم يكون متاح في كل رسالة WhatsApp (\"Reply STOP\" أو لينك ويب) ومن إعدادات الحساب.\n\n**US-021: تأكيدات الحجز عبر WhatsApp**\n\nكعميل وافق، أنا عايز أستلم تأكيد الحجز على WhatsApp علشان يكون عندي في المكان اللي بستخدمه يوميًا.\n\n- AC-021.1: رسالة WhatsApp template معتمدة لازم تتبعت خلال دقيقتين من تأكيد الحجز.\n- AC-021.2: الرسالة لازم تشمل: تحية، نوع الحجز، التفاصيل الأساسية (المسار+التاريخ أو الفندق+التواريخ)، رقم الحجز، الإجمالي، ولينك للـ itinerary الكامل على الويب.\n- AC-021.3: للطيران، يتم إرفاق e-ticket PDF؛ للفنادق، يتم إرفاق الـ voucher PDF.\n\n**US-022: تذكيرات السفر عبر WhatsApp**\n\nكمسافر، أنا عايز أستلم تذكير قبل الطيران أو الـ check-in بـ 24 ساعة علشان أكون جاهز.\n\n- AC-022.1: تذكير الـ 24 ساعة لازم يشمل: URL للـ check-in (للطيران اللي عنده online check-in)، عنوان الفندق ومعاد الـ check-in (للفنادق).\n- AC-022.2: التذكيرات تتبعت بلغة المستخدم المفضلة (المضبوطة وقت الحجز).\n- AC-022.3: لو في طيران اتأجل من شركة الطيران (إشعار schedule change من Amadeus)، التذكير لازم يعكس المواعيد الجديدة.\n\n**US-023: الردود الواردة على WhatsApp**\n\nكمسافر، أنا عايز أرد على Jawla على WhatsApp وأوصل لـ agent دعم علشان أحل المشاكل بسرعة.\n\n- AC-023.1: رسائل WhatsApp الواردة لازم تتوجه لـ inbox مشترك (HelpScout أو Front أو inbox مدمج في الـ admin).\n- AC-023.2: رد تلقائي خارج ساعات العمل بيؤكد الاستلام ويدي وقت الرد المتوقع.\n- AC-023.3: SLA وقت أول رد على WhatsApp: 30 دقيقة في ساعات العمل، 4 ساعات بعدها.\n\n### الخدمة الذاتية للعملاء\n\n**US-024: الإلغاء الذاتي**\n\nكعميل، أنا عايز ألغي حجزي من My Bookings من غير ما أكلم الدعم علشان أقدر أدير رحلتي بنفسي.\n\n- AC-024.1: زرار الإلغاء بيظهر بس لو الإلغاء مسموح حسب قواعد المورد.\n- AC-024.2: النظام لازم يعرض: مبلغ الاسترجاع، رسوم الإلغاء، شروط المورد، الوقت المتوقع للمعالجة - كل ده قبل التأكيد.\n- AC-024.3: التأكيد يتطلب إدخال رقم الحجز و OTP للـ 2FA (إيميل أو SMS).\n- AC-024.4: النظام لازم يتصل بـ API الإلغاء بتاع المورد، يحفظ الرد، يحدث حالة الحجز، يبدأ استرجاع gateway.\n- AC-024.5: لو API المورد فشل، الإلغاء يتدخل في قائمة انتظار لمراجعة العمليات مع رسالة للعميل \"تم استلام طلب الإلغاء - هنأكد مع المورد خلال 24 ساعة\".\n\n**US-025: تتبع حالة الاسترجاع الذاتي**\n\nكعميل ألغى، أنا عايز أتابع حالة الاسترجاع علشان أعرف امتى الفلوس هتوصلني.\n\n- AC-025.1: صفحة تفاصيل الحجز لازم تعرض حالة الاسترجاع: مطلوب، قيد المعالجة، تأكيد الـ Gateway، البنك بيرصد (ملاحظة 3-7 أيام عمل)، اكتمل.\n- AC-025.2: تغييرات الحالة لازم تبعت إشعارات WhatsApp + إيميل.\n- AC-025.3: FAQ متعلق بالاسترجاع لازم يكون متاح بضغطة واحدة من صفحة الحالة.\n\n**US-026: تعديل الحجز الذاتي (حيث يسمح)**\n\nكعميل، أنا عايز أعدل التاريخ أو الراكب في حجزي لما المورد يسمح علشان أتجنب رسوم الإلغاء.\n\n- AC-026.1: قدرة التعديل تعتمد على المورد؛ الواجهة لازم تعرض بس اللي مسموح.\n- AC-026.2: للطيران، تغيير التاريخ لازم يتصل بـ Amadeus Booking Management بالتاريخ الجديد؛ فرق السعر يتحاسب أو يترجع حسب الحاجة.\n- AC-026.3: للفنادق، بس تعديل التاريخ أو اسم الضيف مدعوم (مش تغيير نوع الغرفة).\n\n### Admin المتقدم\n\n**US-027: إجراءات جماعية على الحجوزات**\n\nكـ يارا (عمليات)، أنا عايزة أختار حجوزات متعددة وأطبق إجراءات جماعية (إعادة إرسال تأكيد، إضافة ملاحظة، تصدير) علشان أقدر أدير الحجم بكفاءة.\n\n- AC-027.1: قائمة الحجوزات لازم تدعم الاختيار المتعدد بـ checkboxes و\"Select all matching filter\".\n- AC-027.2: الإجراءات الجماعية: إعادة إرسال التأكيد، تصدير CSV، إضافة ملاحظة داخلية، تاج، إعادة تعيين لـ agent.\n- AC-027.3: الاسترجاع الجماعي مش مدعوم بقصد (يتطلب مراجعة لكل حجز على حدة).\n\n**US-028: عرض العميل 360**\n\nكـ يارا، أنا عايزة أشوف عرض 360 واحد للعميل (الحجوزات، تذاكر الدعم، المحفظة، الولاء، سجل WhatsApp) علشان أقدر أخدمه بكل السياق.\n\n- AC-028.1: صفحة تفاصيل العميل لازم تعرض: الملف الشخصي، كل الحجوزات، معاملات المحفظة، سجل الولاء، تذاكر الدعم، سجل محادثة WhatsApp (آخر 30 يوم)، الملاحظات.\n- AC-028.2: إجراءات سريعة: إرسال WhatsApp، إيميل، تعديل المحفظة (مع audit log)، تعديل الولاء (مع audit log).\n\n**US-029: تقسيم العملاء**\n\nكـ هاجر (تسويق)، أنا عايزة أبني مقاطع عملاء حسب معايير (الوجهة، متوسط قيمة الطلب، الحداثة، اللغة، العملة، مستوى الولاء) علشان أشغل حملات مستهدفة.\n\n- AC-029.1: واجهة بناء مقاطع مع تسلسل قواعد AND/OR.\n- AC-029.2: معاينة المقطع تعرض العدد وعينة عملاء.\n- AC-029.3: المقاطع تتحفظ، تتجدول (تحديث تلقائي يومي)، وتتصدر كـ CSV أو تتدفع لـ Mailchimp/MoEngage عن طريق integration.\n\n### التقارير و BI\n\n**US-030: تقرير العمليات اليومي**\n\nكـ يارا، أنا عايزة إيميل صباحي يومي يلخص حجوزات أمس والفشل والاسترجاعات علشان أعرف أركز فين في يومي.\n\n- AC-030.1: الإيميل يتبعت الساعة 8:00 صباحًا بتوقيت القاهرة لقائمة توزيع العمليات.\n- AC-030.2: المحتوى: عدد الحجوزات + GBV حسب النوع، عدد نجاح/فشل الدفع، عدد ومبلغ الاسترجاع، ملخص صحة الموردين، أعلى 5 مشاكل عملاء.\n- AC-030.3: لينكات للوحات الكاملة للتعمق.\n\n**US-031: لوحة الإيرادات**\n\nكـ طارق، أنا عايز لوحة إيرادات لحظية فيها GBV، صافي الإيراد، الاسترجاعات، ومستحقات الموردين علشان أدير الكاش وأسوي gateways.\n\n- AC-031.1: اللوحة بتدعم فلاتر: نطاق التاريخ، العملة، نوع المنتج (طيران/فنادق)، المورد، gateway الدفع.\n- AC-031.2: الرسوم البيانية: ترند GBV، ترند الاسترجاع، صافي الإيراد، فجوة تسوية gateway.\n- AC-031.3: التعمق لمستوى المعاملة.\n\n**US-032: تقرير إسناد التسويق**\n\nكـ هاجر، أنا عايزة تقرير يعرض الحجوزات حسب مصدر الاكتساب (UTM، referrer) علشان أقيس ROAS.\n\n- AC-032.1: التقرير يعرض: المصدر، الجلسات، الحجوزات، GBV، ROAS (لو إنفاق الإعلانات اتم استيراده).\n- AC-032.2: إنفاق الإعلانات يتستورد عن طريق CSV أو Google Ads API في الباقة الاحترافية وأعلى.\n\n### العملات المتعددة\n\n**US-033: عرض العملات المتعددة**\n\nكمسافر دولي، أنا عايز أشوف الأسعار بالعملة المفضلة عندي علشان أفهم بدفع كام.\n\n- AC-033.1: العملات المدعومة للعرض: EGP، USD، EUR، SAR، AED.\n- AC-033.2: اختيار العملة بيستمر في الـ session وتفضيلات الحساب.\n- AC-033.3: سعر التحويل يتعرض بوضوح وقت الدفع (\"يتم التحصيل بـ EGP بسعر 1 EUR = X EGP\").\n\n**US-034: الدفع بعملات متعددة**\n\nكمسافر دولي، أنا عايز أدفع باليورو أو الدولار علشان أتجنب التحويل المزدوج من البنك بتاعي.\n\n- AC-034.1: Stripe بيحصل بالعملة المختارة.\n- AC-034.2: Paymob دايمًا بيحصل بـ EGP بغض النظر عن عملة العرض (قيد Paymob).\n- AC-034.3: عملة التسوية لبنك Jawla حسب عقد كل gateway؛ تقرير التسوية لازم يتعامل مع ده.\n\n**US-035: محفظة بعملات متعددة**\n\nزي اللي فوق (US-017) - المحفظة بتدعم أرصدة EGP و USD و EUR لكل مستخدم.\n\n### الأساسات (لازمة لجاهزية Enterprise)\n\n**US-036: Event Bus**\n\nكفريق الهندسة، إحنا محتاجين publish/subscribe event bus علشان الأنظمة التالية (الولاء، WhatsApp، التحليلات) تستهلك أحداث الحجز من غير اقتران نقطة-لنقطة.\n\n- AC-036.1: Event bus يتنفذ عن طريق Redis Streams أو RabbitMQ.\n- AC-036.2: تصنيف الأحداث: booking.created، booking.confirmed، booking.cancelled، booking.refunded، payment.succeeded، payment.failed، supplier.degraded، customer.signed-up.\n- AC-036.3: كل حدث له schema version ويُستهلك بشكل idempotent.\n\n**US-037: طبقة تجريد الموردين**\n\nكفريق الهندسة، إحنا محتاجين واجهة موردين موحدة علشان موردين فنادق جداد يتضافوا في أقل من 5 أيام هندسية.\n\n- AC-037.1: كل تكامل مورد بينفذ واجهة مشتركة `IHotelSupplier` (search، price-check، book، cancel، voucher).\n- AC-037.2: خصوصيات كل مورد تتعالج في فئات adapter.\n- AC-037.3: إضافة مورد جديد موثقة في runbook onboarding.\n\n**US-038: مستودع بيانات التقارير**\n\nكفريق البيانات، إحنا محتاجين تخزين تحليلي منفصل علشان التقارير ما تشتغلش على قاعدة OLTP.\n\n- AC-038.1: مهمة ETL تشتغل كل 30 دقيقة بتنسخ أحداث الحجز والدفع والعميل لمستودع PostgreSQL أو ClickHouse.\n- AC-038.2: schema المستودع بنمط dimensional (bookings fact، أبعاد العميل/التاريخ/المورد).\n- AC-038.3: التقارير تستعلم من المستودع فقط.\n\n---\n\n## متطلبات العمل (Business Requirements)\n\nBR-001..BR-025 الخاصة بباقة Basic لسه سارية. الباقة الاحترافية بتضيف:\n\n| ID | المتطلب | الأولوية | المصدر |\n|----|-------------|----------|--------|\n| BR-026 | المنصة لازم تتكامل مع 3 موردين فنادق على الأقل، والمعمارية تدعم إضافة الرابع في أقل من 5 أيام هندسية. | Must | المشتريات |\n| BR-027 | المنصة لازم تنفذ برنامج ولاء بمستويات (Member، Silver، Gold، Platinum) وقواعد كسب/استبدال قابلة للتعديل من المالية من غير code deploy. | Must | التسويق |\n| BR-028 | المنصة لازم تنفذ محفظة بقيمة مخزنة بأرصدة لكل عملة، شحن عن طريق gateways، وتعديلات يدوية من الـ admin مسجلة في audit log. | Must | المالية |\n| BR-029 | المحفظة لازم تكون متوافقة مع التنظيم: لا استرجاع نقدي من المحفظة، الحد الأقصى للرصيد 50,000 جنيه لكل عميل (إرشادات النقود الإلكترونية المصرية). | Must | القانوني |\n| BR-030 | المنصة لازم تتكامل مع WhatsApp Business API (عن طريق Meta Cloud API أو BSP زي 360dialog) للرسائل الصادرة المعاملاتية وتوجيه المحادثات الواردة. | Must | التسويق + العمليات |\n| BR-031 | كل templates رسائل WhatsApp لازم تكون معتمدة مسبقًا بالعربي والإنجليزي. | Must | التسويق |\n| BR-032 | العملاء لازم يقدروا يلغوا حجز ويطلبوا استرجاع من غير ما يتواصلوا مع الدعم، في حدود القواعد اللي يسمح بها المورد. | Must | العمليات |\n| BR-033 | الإلغاءات الذاتية لازم تفرض 2FA (OTP) قبل المعالجة. | Must | الأمن |\n| BR-034 | لوحة الـ admin لازم تدعم عروض العميل 360، الإجراءات الجماعية على الحجوزات، وتقسيم العملاء. | Must | العمليات + التسويق |\n| BR-035 | المنصة لازم تنتج تقارير يومية/أسبوعية/شهرية للعمليات والمالية والتسويق متاحة عن طريق لوحة ومصدّرة كـ CSV/PDF. | Must | العمليات + المالية |\n| BR-036 | دعم العملات للعرض: EGP، USD، EUR، SAR، AED (5 عملات كحد أدنى). | Must | المنتج |\n| BR-037 | دعم العملات للدفع: EGP عن طريق Paymob؛ EGP، USD، EUR، SAR، AED عن طريق Stripe. | Must | المالية |\n| BR-038 | كل التواصل بين الخدمات لازم يمر بـ event bus موثق لتمكين قدرات Enterprise المستقبلية. | Must | المعمارية |\n| BR-039 | التقارير لازم تشتغل على تخزين تحليلي مخصص، مش قاعدة OLTP الإنتاج، علشان نضمن إنه ما فيش تأثير على زمن الحجز. | Must | الهندسة |\n| BR-040 | المنصة لازم تحفظ إسناد التسويق (UTM، referrer، click ID) على مستوى الجلسة والحجز لمدة 24 شهر على الأقل. | Must | التسويق |\n| BR-041 | أرصدة المحفظة لازم تتسجل في دفتر مزدوج القيد (double-entry ledger) لدعم التدقيق المالي. | Must | المالية |\n| BR-042 | التزام نقاط الولاء لازم يتتبع كبند في الميزانية مع تقارير استحقاق شهرية. | Must | المالية |\n| BR-043 | المنصة لازم تكون متوافقة مع PCI DSS SAQ-A نطاق مستمر رغم وجود المحفظة (لأن المحفظة مش بتخزن PAN). | Must | الامتثال |\n| BR-044 | الإيميلات ورسائل WhatsApp اللي بتوصل للعميل لازم تشمل لينكات إلغاء الاشتراك متوافقة مع قانون التسويق. | Must | القانوني |\n| BR-045 | المنصة لازم تدعم 500 مستخدم متزامن كحد أدنى مع زمن استجابة p95 < 2.5 ثانية على المسارات الأساسية في الباقة الاحترافية. | Must | الهندسة |\n| BR-046 | كل الإجراءات المالية للـ admin (تعديل المحفظة، تعديل الولاء، الاسترجاعات >10 آلاف جنيه) لازم تتطلب اعتماد مزدوج. | Must | الامتثال |\n| BR-047 | المنصة لازم تدعم feature flags علشان الولاء و WhatsApp والخدمة الذاتية يطلعوا تدريجيًا. | Should | المنتج |\n| BR-048 | الترجمات لازم تتدار من خلال منصة i18n (Phrase، Lokalise، Crowdin) بدل الملفات الـ hardcoded، علشان فريق المحتوى غير الهندسي يقدر يحدث. | Should | المنتج |\n| BR-049 | مستودع البيانات لازم يحتفظ بالبيانات المعاملاتية لمدة 7 سنوات حسب قواعد الاحتفاظ بالسجلات المالية المصرية. | Must | الامتثال |\n| BR-050 | تفضيلات إلغاء WhatsApp لازم تحترم خلال 5 دقايق في كل الأنظمة (لا تسرب لإلغاء الاشتراك). | Must | القانوني |\n\n---\n\n## معايير القبول الوظيفية (Functional Acceptance Criteria)\n\n### FAC-7: بحث فنادق بموردين متعددين\n\nبحث الفنادق صحيح وظيفيًا لما:\n1. كل الموردين المضبوطين يتم الاستعلام منهم بالتوازي.\n2. الموردين اللي يتجاوزوا timeout 4 ثواني يتم تركهم لهذا الطلب فقط.\n3. العروض المرجعة تتطبع لـ schema عروض موحد.\n4. التكرارات تندمج باستخدام قواعد هوية الفنادق.\n5. الترتيب يتطبق حسب الخوارزمية المضبوطة.\n6. المستخدم يشوف قائمة موحدة ومرتبة من غير أي إشارة لمين مورد بيقدم أي عرض (إلا في admin debug mode).\n\n### FAC-8: حجز فندق مع failover للموردين\n\nحجز الفندق صحيح وظيفيًا لما:\n1. سعر العرض المختار يتم التحقق منه من المورد المصدر.\n2. لو إعادة التحقق فشلت، المستخدم يتطلب منه السعر الجديد (لو متاح) قبل الدفع.\n3. الدفع يتم تحصيله.\n4. API الحجز بتاع المورد يتم استدعاؤه.\n5. لو حجز المورد فشل بعد الدفع، الاسترجاع يتم تلقائيًا والعمليات تتنبه.\n6. الـ Voucher يتولد ويتسلم عن طريق الإيميل + WhatsApp (لو اتوافق).\n\n### FAC-9: كسب الولاء\n\nحدث كسب الولاء صحيح وظيفيًا لما:\n1. قاعدة الكسب تتطبق بناءً على مستوى العميل وقت الحجز.\n2. النقاط تتحسب على صافي مبلغ الحجز (مش شامل الضرائب والرسوم وعلاوات الموردين).\n3. النقاط تتقيد في دفتر الولاء بمرجع الحجز.\n4. النقاط تتقفل لحد 24 ساعة بعد انتهاء السفر/الإقامة.\n5. العميل يتم إشعاره بالنقاط المكسوبة عن طريق badge في الواجهة و WhatsApp (لو اتوافق).\n\n### FAC-10: شحن المحفظة\n\nالشحن صحيح وظيفيًا لما:\n1. المستخدم يختار المبلغ والعملة.\n2. الدفع عن طريق Paymob (EGP فقط) أو Stripe (أي عملة مدعومة) يتم تحصيله.\n3. دفتر المحفظة يتم تقييده للعملة دي.\n4. بونص الشحن (لو نشط حسب المستوى) يتقيد كقيد منفصل بتاج \"bonus\".\n5. إيصال عن طريق إيميل/WhatsApp يتم إرساله.\n\n### FAC-11: تسليم إشعار WhatsApp\n\nإشعار WhatsApp صحيح وظيفيًا لما:\n1. المستخدم وافق.\n2. الـ template معتمد للغة المستخدم.\n3. الـ message ID اللي WhatsApp API بيرجعه يتسجل.\n4. إيصالات التسليم والقراءة (webhooks) تتم معالجتها.\n5. التسليمات الفاشلة (انتهاء صلاحية template 24 ساعة، المستخدم حظر، إلخ) تتحول للإيميل تلقائيًا.\n\n### FAC-12: الإلغاء الذاتي\n\nالإلغاء الذاتي صحيح وظيفيًا لما:\n1. العميل مصادق عليه.\n2. الحجز في حالة قابلة للإلغاء حسب قواعد المورد.\n3. العميل يشوف التأثير المالي قبل التأكيد.\n4. الـ OTP يتم التحقق منه.\n5. API الإلغاء بتاع المورد يتم استدعاؤه والرد يتسجل.\n6. حالة الحجز تتحدث.\n7. استرجاع gateway يتم بدؤه للمبلغ المستحق.\n8. نقاط الولاء تتعكس.\n9. رصيد المحفظة (لو اتستخدم) يتسترد.\n10. العميل يستلم التأكيد عبر كل القنوات اللي وافق عليها.\n\n### FAC-13: تسوية العملات المتعددة\n\nدورة التسوية صحيحة وظيفيًا لما:\n1. ملفات تسوية الـ gateway يتم استيرادها تلقائيًا يوميًا.\n2. كل بند تسوية يتم مطابقته مع حجز عن طريق المرجع.\n3. أرباح/خسائر العملة تتحسب حسب سعر البنك المركزي المرجعي لليوم.\n4. التناقضات (غير متطابقة، زيادة/نقص) يتم وضع علامة عليها.\n5. تقرير تسوية يومي يتولد ويتبعت بالإيميل لـ طارق.\n\n### FAC-14: نضارة التقارير\n\nكل التقارير لازم تتحدث:\n1. لوحات العمليات: كل 5 دقايق.\n2. لوحات الإيرادات: كل 30 دقيقة.\n3. تقارير التسويق: كل ساعة.\n4. إيميل تقرير العمليات اليومي: قبل الساعة 8:00 صباحًا بتوقيت القاهرة.\n\n---\n\n## KPIs\n\n| KPI | المستهدف | القياس | المالك | الإيقاع |\n|-----|--------|-------------|-------|---------|\n| زمن نتائج بحث الفنادق (p95) | < 5.5 ثانية مع 3 موردين | APM | الهندسة | أسبوعي |\n| نسبة نجاح بحث الفنادق | > 97% (مورد واحد على الأقل بيرجع نتائج) | Logs | الهندسة | يومي |\n| تركز الموردين (HHI) | < 4500 | تجميع شهري | المالية | شهري |\n| دقة إزالة تكرار الفنادق | > 92% | تدقيق عينة | الهندسة | شهري |\n| نسبة الاشتراك في الولاء | > 65% من الحسابات الجديدة | DB query | التسويق | أسبوعي |\n| التزام نقاط الولاء | متتبع، يتقرر شهريًا | Ledger | المالية | شهري |\n| المستخدمين النشطين في المحفظة | > 25% من العملاء النشطين | DB query | التسويق | شهري |\n| متوسط رصيد المحفظة | > 600 جنيه | DB query | التسويق | شهري |\n| نسبة الحجوزات الممولة بالمحفظة | > 12% من الحجوزات | DB query | المنتج | شهري |\n| نسبة الموافقة على WhatsApp | > 70% | تحليلات الـ checkout | المنتج | أسبوعي |\n| نسبة تسليم WhatsApp | > 98% | WhatsApp API webhooks | الهندسة | أسبوعي |\n| نسبة قراءة WhatsApp | > 80% | WhatsA
