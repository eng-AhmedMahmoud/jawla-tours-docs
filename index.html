 │ Credit │  │ Points   │\n     └──────┘    └──────────┘ └──────┘ └────────┘  └──────────┘\n```\n\n#### 6.4.2 🌟 كاش (Cash Payments)\n\n##### بطاقات الائتمان والخصم\n\n| المعالج | البطاقات المدعومة | الميزة |\n|---|---|---|\n| PayTabs (بوابة دفع متعددة العملات) | Visa، MasterCard، Amex، Meeza + International cards | محلي + دولي + خليجي بعملات متعددة (EGP/USD/EUR/SAR/AED/KWD/QAR/JOD/BHD/GBP)، 3D Secure |\n| Checkout.com | متعدد | معدلات تنافسية (احتياطي) |\n| HyperPay | محلي وخليجي | للسوق السعودي (احتياطي) |\n\n##### المحافظ الإلكترونية\n\n| المحفظة | الجمهور |\n|---|---|\n| PayTabs Wallet (متعددة العملات) | عام |\n| Vodafone Cash | عام |\n| Etisalat Cash | عام |\n| Orange Money | عام |\n| Apple Pay | iOS users |\n| Google Pay | Android web users |\n\n##### الدفع الفوري عبر البنوك\n\n| الخدمة | الوصف |\n|---|---|\n| Fawry | الدفع نقدًا في 100,000+ منفذ |\n| Instapay | تحويل بنكي فوري |\n| Aman | الدفع النقدي |\n| Masary | الدفع النقدي |\n| Bank Transfer (Manual) | للحجوزات الكبيرة |\n\n#### 6.4.3 🌟 التقسيط (Installments — BNPL)\n\n| المزوّد | المدة | الحد الأدنى | الحد الأعلى |\n|---|---|---|---|\n| Sympl | 3-12 شهر | 500 EGP | 50,000 EGP |\n| ValU | 6-60 شهر | 1,000 EGP | 250,000 EGP |\n| Premium Card | 3-36 شهر | 500 EGP | 100,000 EGP |\n| Souhoola | 3-12 شهر | 1,000 EGP | 30,000 EGP |\n| Aman Installments | 3-24 شهر | 1,000 EGP | 75,000 EGP |\n| Forsa | 3-12 شهر | 500 EGP | 30,000 EGP |\n\n> **ميزة فريدة:** \"Pricing Calculator\" يعرض القسط الشهري لكل مزوّد جنبًا إلى جنب، فيختار العميل الأنسب له.\n\n#### 6.4.4 🌟 الائتمان للشركات (Corporate Credit Lines)\n\nنظام كامل لإدارة الحسابات الائتمانية للعملاء المؤسسيين:\n\n##### أ) أنواع الحسابات الائتمانية\n\n| النوع | شروط السداد | الحد الائتماني الافتراضي |\n|---|---|---|\n| Net 30 | 30 يومًا من تاريخ الفاتورة | حتى 500,000 EGP |\n| Net 60 | 60 يومًا من تاريخ الفاتورة | حتى 1,000,000 EGP |\n| Net 90 | 90 يومًا من تاريخ الفاتورة | حتى 2,500,000 EGP |\n| Pre-paid Deposit | إيداع مسبق + خصم | غير محدود |\n\n##### ب) ميزات الحسابات الائتمانية\n\n- Credit limit management\n- Real-time credit utilization dashboard\n- Automated invoicing (شهري / أسبوعي / لكل حجز)\n- Statement of Account (SOA) generation\n- Payment reminders (Email + SMS)\n- Late payment penalty automation\n- Credit hold (تعليق الحجز عند تجاوز الحد)\n- Multi-approver workflows (للشركات الكبيرة)\n- Cost center allocation\n- PO Number tracking\n- Custom invoice templates per company\n- Bulk invoice download (PDF/Excel)\n\n##### ج) Corporate Portal للشركات\n\n- Self-service dashboard للشركة\n- إدارة المسافرين (employees roster)\n- Travel policy enforcement\n- Approval workflows\n- Real-time spending analytics\n- Cost reports per department/cost center\n- Direct billing\n- Travel duty of care reports\n\n#### 6.4.5 🌟 نقاط الولاء قابلة للاسترداد كدفعة (Loyalty Redemption)\n\nنظام Jawla Rewards:\n\n| الإجراء | النقاط المُكتسبة |\n|---|---|\n| كل 1 EGP يُنفق | 1 نقطة |\n| تقييم بعد الرحلة | 50 نقطة |\n| إحالة صديق | 500 نقطة (عند أول حجز للصديق) |\n| إكمال الملف الشخصي | 100 نقطة |\n| Birthday bonus | 200 نقطة |\n| تحدّيات شهرية | متغيّر |\n\n| الفئة | متطلب النقاط | المزايا |\n|---|---|---|\n| Bronze | 0-5,000 | basic |\n| Silver | 5,001-25,000 | 1.2x earning، priority support |\n| Gold | 25,001-100,000 | 1.5x earning، lounge، upgrades |\n| Platinum | 100,001+ | 2x earning، concierge، VIP |\n\n**استرداد النقاط:**\n- 100 نقطة = 1 EGP خصم\n- يمكن استرداد جزء أو كامل قيمة الحجز\n- Mix-and-match (نقاط + كاش)\n- نقاط قابلة للتحويل لأفراد العائلة\n\n#### 6.4.6 🌟 أسعار مخفّضة للحجوزات الجماعية (Group Pricing)\n\n| حجم المجموعة | الخصم |\n|---|---|\n| 10-19 مسافر | 5% |\n| 20-49 مسافر | 8% |\n| 50-99 مسافر | 12% |\n| 100+ مسافر | تفاوضي |\n\n- التحقق التلقائي من eligibility\n- Group-only fares من شركات الطيران\n- Group-only blocks في الفنادق\n- Free organizer seat (1 مقعد مجاني لكل 20)\n\n#### 6.4.7 Smart Payment Routing\n\nمحرك ذكي يختار أفضل بوابة دفع بناءً على:\n\n- نوع البطاقة وبلد الإصدار\n- قيمة المعاملة\n- معدّل النجاح التاريخي لكل بوابة\n- التكلفة (transaction fees)\n- توفر 3D Secure\n- وقت الاستجابة\n\n> النتيجة: زيادة معدّل نجاح المعاملات بنسبة 12-18%.\n\n---\n\n### 🌍 6.5 🌟 تعدد العملات الكامل (Multi-Currency) — ميزة محورية\n\n> **هذه هي الميزة المحورية الثالثة في الباقة** — دعم حقيقي لـ 10+ عملات.\n\n#### 6.5.1 العملات المدعومة (10+)\n\n| العملة | الرمز | السوق المستهدف |\n|---|---|---|\n| Egyptian Pound | EGP | مصر (Base currency) |\n| US Dollar | USD | International / المصريون في الخارج |\n| Euro | EUR | السياحة الأوروبية |\n| British Pound | GBP | السوق البريطاني |\n| Saudi Riyal | SAR | السعودية (أكبر سوق خليجي) |\n| UAE Dirham | AED | الإمارات |\n| Kuwaiti Dinar | KWD | الكويت |\n| Qatari Riyal | QAR | قطر |\n| Jordanian Dinar | JOD | الأردن |\n| Bahraini Dinar | BHD | البحرين |\n| Omani Riyal (Phase 2) | OMR | عُمان |\n| Lebanese Pound (Phase 2) | LBP | لبنان |\n\n#### 6.5.2 🌟 أسعار صرف لحظية من API مرجعي\n\n- تكامل مع XE.com / Open Exchange Rates API\n- تحديث الأسعار كل 60 ثانية للعملات الرئيسية\n- تحديث كل 5 دقائق للعملات الثانوية\n- Fallback لمصادر متعددة لضمان عدم الانقطاع\n- Cache ذكي لتقليل API calls\n- Audit log لكل تغيير سعر\n\n#### 6.5.3 🌟 عرض السعر بعملة العميل + الاحتفاظ بالعملة الأصلية\n\nتجربة فريدة:\n\n```\nالرحلة سعرها  : 1,200 SAR (السعر الفعلي للحجز من شركة الطيران)\nالعميل يرى     : 9,840 EGP (بسعر صرف اليوم)\nعند الفوترة    : 9,840 EGP (مع ذكر 1,200 SAR كمرجع)\nPNR في النظام  : 1,200 SAR (للتسوية مع شركة الطيران)\n```\n\n**فوائد هذا النهج:**\n- العميل يفهم السعر بعملته\n- لا توجد مفاجآت في الفاتورة\n- التسوية مع الموردين بعملاتهم الأصلية\n- لا خسائر صرف عند fluctuations\n\n#### 6.5.4 🌟 تثبيت سعر الصرف أثناء الحجز (Rate Lock)\n\n- بمجرد بدء عملية الحجز، يُثبَّت سعر الصرف لمدة 15 دقيقة\n- شريط countdown يظهر للعميل\n- في حال تأخر الدفع، يُعاد التسعير ويُعرض الفرق\n\n#### 6.5.5 إدارة هوامش الصرف (FX Margin Management)\n\n- إمكانية إضافة هامش (markup) على سعر الصرف\n- Markup مختلف لكل قناة (B2C، Corporate)\n- Reports عن أرباح FX\n\n#### 6.5.6 العملات والقوانين\n\n- الالتزام بقوانين البنك المركزي المصري\n- Reporting للمعاملات بالعملات الأجنبية\n- AML compliance\n- KYC للمعاملات > 5,000 USD\n\n---\n\n### 👛 6.6 محفظة متعددة العملات (Multi-Currency Wallet)\n\n#### 6.6.1 الميزات الأساسية\n\n- محفظة واحدة بأرصدة متعددة العملات\n- إيداع بأي طريقة دفع\n- سحب لحساب بنكي أو محفظة\n- تحويل بين العملات بسعر صرف داخلي\n- استخدام رصيد المحفظة في أي حجز\n- استرداد المبالغ (Refunds) للمحفظة فورًا (بدلاً من 7-14 يوم للبطاقة)\n- Cashback automatic للمحفظة\n- مشاركة الرصيد مع أفراد العائلة (Family wallet)\n\n#### 6.6.2 محفظة الشركات (Corporate Wallet)\n\n- محفظة الشركة + sub-wallets للأقسام\n- صلاحيات الإنفاق لكل sub-wallet\n- تقارير الإنفاق التفصيلية\n- Top-up جماعي\n\n---\n\n### 🎯 6.7 محرك التسعير الديناميكي (Dynamic Pricing Engine)\n\n#### 6.7.1 المتغيّرات المؤثرة في السعر\n\n| المتغيّر | الأثر |\n|---|---|\n| الوقت قبل السفر | الأسعار ترتفع كلما اقترب التاريخ |\n| الموسم | High season vs. low season |\n| اليوم في الأسبوع | الجمعة/السبت ≠ الأحد |\n| الطلب الحالي | High demand → سعر أعلى |\n| مخزون شركة الطيران | Last seats → premium |\n| سلوك المستخدم | Returning customer ≠ first-time |\n| الجهاز | Desktop ≠ Mobile pricing |\n| الموقع الجغرافي | Geo-targeted pricing |\n| ساعة اليوم | Peak hours vs. off-peak |\n| أحداث خاصة | المؤتمرات، المواسم الدينية |\n\n#### 6.7.2 استراتيجيات التسعير\n\n- **Surge pricing** — رفع السعر عند زيادة الطلب\n- **Last-minute discounts** — تخفيض المخزون الراكد\n- **Member-only pricing** — أسعار للأعضاء المسجّلين\n- **Promo codes engine** — مرن وقابل للتخصيص\n- **Flash sales** — عروض محدودة المدة\n- **Bundle discounts** — خصم عند جمع تذاكر متعددة (ذهاب وعودة، أفراد عائلة، رحلات متعددة)\n- **Loyalty tier pricing** — أسعار خاصة لكل tier\n\n#### 6.7.3 A/B Testing\n\n- اختبار استراتيجيات تسعير مختلفة على شرائح\n- قياس الأثر على Conversion + AOV + Revenue\n- Auto-rollout للاستراتيجية الفائزة\n\n---\n\n### 🎨 6.8 لوحات تحكم مخصصة للعميل (Custom User Dashboards) — ميزة حصرية لـ Enterprise\n\n> **ميزة مميزة لـ Enterprise:** كل عميل يحصل على لوحة تحكم شخصية بتجربة BI-style — وهي ميزة غير متاحة في باقتي Basic و Professional.\n\n#### 6.8.1 Widgets قابلة للتخصيص\n\n- يختار العميل widgets يريد رؤيتها في لوحته الشخصية\n- إعادة ترتيب الـ widgets بـ drag & drop\n- حفظ تخطيطات (layouts) متعددة\n- مشاركة layout مع أفراد العائلة أو زملاء العمل\n\n#### 6.8.2 Widgets المتاحة\n\n| Widget | الوظيفة |\n|---|---|\n| Upcoming Trips | الرحلات القادمة + countdown |\n| Spending Analytics | تحليل مصاريف السفر شهريًا/ربعيًا/سنويًا |\n| Top Destinations | الوجهات الأكثر سفرًا |\n| Carbon Footprint | البصمة الكربونية لرحلاتك |\n| Loyalty Status | حالة النقاط + التقدّم للمستوى التالي |\n| Wallet Balance | رصيد المحفظة بكل العملات |\n| Price Alerts | تنبيهات انخفاض الأسعار للوجهات المفضّلة |\n| Travel Documents | جوازات السفر وتواريخ انتهائها |\n| Booking History | آخر الحجوزات + الفلترة |\n| Recommendations | اقتراحات ذكية بناءً على السلوك |\n| Saved Searches | عمليات البحث المحفوظة |\n| Quick Actions | أزرار سريعة (بحث، إلغاء، تعديل) |\n\n#### 6.8.3 تحليلات شخصية متقدمة (Personal BI)\n\n- Cohort analysis للعميل (مقارنة سفره عبر السنوات)\n- Heat maps للوجهات\n- Spending breakdown by category\n- Travel patterns insights\n- Budget tracking + alerts\n\n#### 6.8.4 تخصيص بصري كامل\n\n- اختيار theme (Light / Dark / Auto)\n- اختيار accent color\n- اختيار font size\n- اختيار dashboard density (compact / comfortable / spacious)\n\n#### 6.8.5 تصدير ومشاركة\n\n- تصدير البيانات بـ PDF / Excel\n- جدولة تقارير دورية بالبريد\n- مشاركة لوحة مع mentor / مدير سفر شركة\n\n---\n\n### 👥 6.9 الحجوزات الجماعية والشركات (Group & Corporate Bookings)\n\n#### 6.9.1 Group Booking Workflow\n\n##### المرحلة 1: طلب العرض (RFQ)\n\n- منظّم الرحلة يدخل: الوجهة، التاريخ، عدد المسافرين، درجة المقصورة، الميزانية\n- النظام يولّد عرضًا مبدئيًا تلقائيًا\n- يُمكن لـ Travel Consultant إضافة لمسات\n\n##### المرحلة 2: عرض السعر المُفصّل\n\n- breakdown كامل (تذاكر الطيران، نقل من/إلى المطار، جولات وأنشطة اختيارية)\n- خيارات بديلة (Economy vs Premium vs Business)\n- سياسات الإلغاء وقواعد التذكرة\n- شروط الدفع\n\n##### المرحلة 3: قائمة المسافرين (Pax List)\n\n- رفع Excel template مع بيانات المسافرين\n- التحقق التلقائي من البيانات (Passport validity، etc.)\n- توزيع المقاعد على المسافرين (إن متاح)\n- Special requirements (وجبات خاصة على متن الطائرة، احتياجات خاصة، أمتعة إضافية)\n\n##### المرحلة 4: الدفع والتأكيد\n\n- Deposit + balance (مرن)\n- Multiple payment installments\n- Group invoice\n- Master itinerary\n- Individual vouchers per pax\n\n##### المرحلة 5: الإدارة قبل الرحلة\n\n- Pre-trip communication\n- Travel documents collection (Passports، Visas)\n- Travel insurance bulk purchase\n- WhatsApp group للمنظّم والمسافرين\n\n##### المرحلة 6: ما بعد الرحلة\n\n- Feedback collection\n- Group photos & testimonials\n- Future group offers\n\n#### 6.9.2 Corporate Account Management\n\nتكامل عميق مع نظام Corporate Credit (راجع 6.4.4) — مع إدارة Corporate Wallet المتضمّنة:\n\n- Approval workflows\n- Travel policy enforcement\n- Pre-approved travel routes\n- Spending limits per employee/department\n- Manager approvals via Email/WhatsApp\n- Out-of-policy booking warnings\n- Reason codes for out-of-policy bookings\n- Duty of care (real-time location of employees)\n- Travel risk management\n- Emergency contacts\n- COVID/health requirements per destination\n- Visa support\n\n#### 6.9.3 Corporate Reports\n\n| التقرير | المحتوى |\n|---|---|\n| Monthly Spend | إجمالي الإنفاق + breakdown |\n| Cost Center Report | إنفاق كل قسم |\n| Top Travelers | الأكثر سفرًا في الشركة |\n| Top Destinations | الوجهات الأكثر زيارة |\n| Carbon Footprint | الانبعاثات الكربونية |\n| Savings Report | الوفورات vs market |\n| Policy Compliance | نسبة الالتزام بالسياسة |\n\n---\n\n### 📊 6.10 لوحة تحليلات BI (BI Analytics Dashboard)\n\n#### 6.10.1 Dashboards الأساسية\n\n##### أ) Executive Dashboard\n\n- GMV (Gross Merchandise Value) — لحظي\n- Net Revenue\n- Bookings count\n- AOV (Average Order Value)\n- Conversion rate\n- Customer count (new vs returning)\n- Top markets\n- Top products\n\n##### ب) Marketing Dashboard\n\n- Traffic sources (Organic، Paid، Direct، Referral)\n- Campaign ROI\n- Cost per Acquisition (CPA)\n- Lifetime Value (LTV)\n- LTV/CAC ratio\n- Funnel analysis\n- Drop-off points\n\n##### ج) Product Dashboard\n\n- Top selling routes (طيران)\n- Top selling airlines\n- Top selling destinations\n- Product mix\n- Margin per product\n- Inventory utilization\n\n##### د) Financial Dashboard\n\n- Revenue by payment method\n- Refunds rate\n- Chargebacks\n- FX gains/losses\n- Tax reports\n- Supplier payable\n\n##### هـ) Operational Dashboard\n\n- Booking processing time\n- Customer service tickets\n- SLA compliance\n- Agent productivity\n- Queue depths\n\n##### و) Agent Performance Dashboard\n\n- Bookings per agent\n- Revenue per agent\n- Conversion per agent\n- CSAT per agent\n\n#### 6.10.2 Advanced Analytics\n\n- Cohort analysis\n- RFM segmentation (Recency, Frequency, Monetary)\n- Churn prediction\n- Next-best-offer recommendations\n- Price elasticity analysis\n- Seasonality forecasting\n\n#### 6.10.3 Custom Reports\n\n- Drag-and-drop report builder\n- Save و schedule reports\n- Email delivery (Daily، Weekly، Monthly)\n- Export (Excel، PDF، CSV)\n\n---\n\n### 🏬 6.11 لوحة إدارة متعددة الفروع (Multi-Branch Admin)\n\n#### 6.11.1 هيكل الفروع\n\n```\nJawla Tours (HQ)\n├── فرع القاهرة (Cairo Main)\n├── فرع الإسكندرية\n├── فرع الجيزة\n├── فرع 6 أكتوبر\n├── فرع المنصورة\n└── فرع شرم الشيخ\n```\n\n#### 6.11.2 Branch-Level Isolation\n\n- كل فرع له admin مستقل\n- صلاحيات منفصلة\n- Inventory مشترك (مع option للعزل)\n- Customer database مشتركة (مع تتبع \"ownership\")\n- Pricing مشترك (مع option لـ markup فرعي)\n\n#### 6.11.3 Consolidated Reporting\n\n- HQ dashboard يرى كل الفروع\n- Branch dashboards يرى تفاصيل الفرع فقط\n- مقارنة بين الفروع\n- Top performing branches\n- Resource allocation insights\n\n#### 6.11.4 Inter-Branch Transactions\n\n- نقل حجز بين الفروع\n- مشاركة العملاء\n- تتبع العمولة بين الفروع\n\n---\n\n### 🛡️ 6.12 محرك كشف الاحتيال (Fraud Detection Engine — ML-based)\n\n#### 6.12.1 المؤشرات الرئيسية (Fraud Signals)\n\n| المؤشر | الوزن |\n|---|---|\n| BIN country mismatch | عالي |\n| IP/Billing country mismatch | عالي |\n| Velocity (multiple cards same email) | عالي جدًا |\n| Unusual booking patterns | متوسط |\n| High-risk routes | متوسط |\n| New customer + high value | متوسط |\n| Device fingerprint match (known fraud) | عالي جدًا |\n| Email risk score | عالي |\n| Phone risk score | متوسط |\n| Card risk score (BIN database) | عالي |\n| Travel within hours of booking | عالي |\n| Multiple failed payment attempts | عالي |\n| VPN/Proxy detection | متوسط |\n| Disposable email | متوسط |\n\n#### 6.12.2 ML Model\n\n- نموذج تصنيفي (Risk Scoring 0-100)\n- التدريب على بيانات تاريخية + بيانات صناعية\n- التحديث الشهري\n- Explainability (لماذا تم تصنيف هذه المعاملة عالية الخطر)\n\n#### 6.12.3 Actions\n\n| Risk Score | الإجراء |\n|---|---|\n| 0-30 | Auto-approve |\n| 31-60 | 3DS Required |\n| 61-80 | Manual review |\n| 81-100 | Auto-decline |\n\n#### 6.12.4 Integration with 3rd Party\n\n- Sift / Signifyd integration option\n- MaxMind GeoIP\n- Emailage email risk\n- WhitePages phone risk\n\n#### 6.12.5 Chargeback Management\n\n- Auto-collection of evidence\n- Pre-filled response templates\n- Tracking win rate\n- Chargeback alerts من البوابات\n\n---\n\n### 💬 6.13 الإشعارات المتعددة (Multi-Channel Notifications)\n\n#### 6.13.1 القنوات\n\n| القناة | الاستخدام الأمثل |\n|---|---|\n| Email | تأكيدات، فواتير، تقارير، marketing |\n| WhatsApp Business API | تأكيدات سريعة، تذكير، دعم |\n| SMS | OTP، تنبيهات حرجة |\n| Push Notifications (Web) | عروض، تذكير |\n| In-app notifications | داخل المنصة |\n\n#### 6.13.2 الأحداث المُحفِّزة (Triggers)\n\n| الحدث | القناة |\n|---|---|\n| إنشاء حساب | Email |\n| تأكيد بريد | Email |\n| OTP تسجيل دخول | SMS |\n| تأكيد حجز | Email + WhatsApp + SMS |\n| فاتورة | Email |\n| Voucher | Email + WhatsApp |\n| Boarding pass | Email + WhatsApp (24h before) |\n| تذكير check-in | WhatsApp (24h before) |\n| تذكير سفر | WhatsApp (3 days before) |\n| Schedule change | Email + SMS + WhatsApp |\n| إلغاء | Email + SMS |\n| Refund processed | Email + WhatsApp |\n| Trip review request | Email + WhatsApp (after trip) |\n| Promotional offer | Email + Push |\n| Cart abandonment | Email + WhatsApp |\n| Price drop alert | Email + Push |\n| Loyalty milestone | Email + Push |\n\n#### 6.13.3 WhatsApp Business API\n\n- استخدام Templates المُعتمدة\n- Two-way conversations مع customer service\n- Rich media (PDF tickets، itineraries)\n- Quick reply buttons\n- Order management messages\n\n#### 6.13.4 إدارة التفضيلات\n\n- Opt-in / Opt-out لكل قناة\n- Granular preferences (transactional vs marketing)\n- Frequency capping\n- Quiet hours\n- Language preferences\n\n---\n\n### 🌐 6.14 اللغة والتجاوب (Language & Responsiveness)\n\n> **ملاحظة مهمة:** تم حذف تطبيقات الجوال (iOS/Android Native) من نطاق هذه الباقة. التجربة Web-Responsive كاملة بمعايير PWA.\n\n#### 6.14.1 اللغات المدعومة\n\n| اللغة | الاتجاه | المرحلة |\n|---|---|---|\n| العربية | RTL | الإطلاق |\n| English | LTR | الإطلاق |\n| Français | LTR | Phase 2 (اختياري) |\n| Deutsch | LTR | Phase 2 (اختياري) |\n| Russian | LTR | Phase 2 (اختياري) |\n\n#### 6.14.2 Responsive Design\n\n| الجهاز | Breakpoint | الأولوية |\n|---|---|---|\n| Mobile (Phone) | 320-767px | عالية جدًا (60% من traffic) |\n| Tablet | 768-1023px | متوسطة |\n| Desktop | 1024-1439px | عالية |\n| Large Desktop | 1440px+ | متوسطة |\n\n#### 6.14.3 PWA Capabilities\n\nبديل احترافي عن التطبيقات الأصلية:\n\n- ✅ Install to home screen\n- ✅ Offline browsing (cached content)\n- ✅ Push notifications (web push)\n- ✅ App-like navigation\n- ✅ Splash screen\n- ✅ Native sharing\n- ✅ Geolocation\n- ✅ Camera access (لرفع جواز السفر)\n- ✅ Fast loading (Service Worker)\n- ✅ Lighthouse PWA score > 90\n\n#### 6.14.4 Accessibility (a11y)\n\n- WCAG 2.1 AA compliance\n- Keyboard navigation\n- Screen reader friendly\n- Color contrast ≥ 4.5:1\n- Focus indicators\n- Alt text لكل صورة\n- Form labels واضحة\n- Skip-to-content links\n\n#### 6.14.5 Performance\n\n- Lighthouse Performance > 90\n- LCP < 2.0s\n- FID < 100ms\n- CLS < 0.1\n- TTI < 3.5s\n- Code splitting\n- Image optimization (WebP, AVIF)\n- Critical CSS inlining\n- Edge caching (CDN)\n\n---\n\n## 7. 🌟 تكامل Amadeus الكامل (Full Amadeus System)\n\n> هذا قسم مخصص لتوضيح ما يميّز هذه الباقة عن أي عرض آخر: **الوصول الكامل لمنظومة Amadeus Enterprise (1A Direct)**.\n\n### 7.1 الفرق بين Self-Service و Enterprise (1A Direct)\n\n| البُعد | Self-Service | 🌟 Enterprise (1A) |\n|---|---|---|\n| نوع التكامل | REST APIs محدودة | SOAP + REST كامل |\n| Master Pricer | نسخة محدودة | **🌟 Travel Board كامل** |\n| Air Sell from Recommendation | ❌ | **🌟 ✅** |\n| PNR Direct Access | محدود | **🌟 كامل** |\n| Document Issuance | عبر وسيط | **🌟 مباشر** |\n| EMD | ❌ | **🌟 ✅** |\n| Queue Management | ❌ | **🌟 ✅** |\n| NDC | محدود | **🌟 كامل** |\n| Ancillaries | محدود | **🌟 كامل** |\n| Branded Fares | عرض فقط | **🌟 بيع كامل** |\n| Robotics/SOAP | ❌ | **🌟 ✅** |\n| Refund Processing | يدوي | **🌟 آلي** |\n| Exchange | محدود | **🌟 كامل** |\n| Schedule Change | يدوي | **🌟 آلي** |\n| Queue automation | ❌ | **🌟 ✅** |\n\n### 7.2 جدول شامل لكل خدمات Amadeus المُدمَجة\n\n#### 7.2.1 Air APIs (الطيران)\n\n| # | الخدمة | النوع | حالة الإدراج |\n|---|---|---|---|\n| 1 | Flight Offers Search | REST | ✅ مُدمج |\n| 2 | Flight Offers Price | REST | ✅ مُدمج |\n| 3 | Flight Create Orders | REST | ✅ مُدمج |\n| 4 | Flight Order Management | REST | ✅ مُدمج |\n| 5 | Seat Maps | REST | ✅ مُدمج |\n| 6 | Branded Fares Upsell | REST | ✅ مُدمج |\n| 7 | Flight Choice Prediction | REST | ✅ مُدمج |\n| 8 | Flight Price Analysis | REST | ✅ مُدمج |\n| 9 | Travel Recommendations | REST | ✅ مُدمج |\n| 10 | Flight Delay Prediction | REST | ✅ مُدمج |\n| 11 | Airport On-Time Performance | REST | ✅ مُدمج |\n| 12 | On-Demand Flight Status | REST | ✅ مُدمج |\n| 13 | Airport Routes | REST | ✅ مُدمج |\n| 14 | Airline Routes | REST | ✅ مُدمج |\n| k-in reminder | قبل 24 ساعة |\n| Travel disruption alerts | فورية |\n| Post-trip review | بعد العودة |\n\n### 9.2 رحلة العميل المؤسسي (Corporate Portal)\n\n#### المرحلة 1: الإعداد (One-time)\n\n```\nتوقيع عقد → تحديد سقف ائتماني → إضافة الموظفين →\nتعريف Travel Policy → تعريف Approvers → تعريف Cost Centers\n```\n\n#### المرحلة 2: حجز السفر (لكل موظف)\n\n```\nدخول الموظف → بحث/حجز ضمن السياسة → submit للموافقة →\nموافقة المدير (Email/WhatsApp) → تأكيد الحجز →\nخصم من الحد الائتماني → فاتورة في نهاية الشهر\n```\n\n#### المرحلة 3: الإدارة المالية\n\n```\nاستلام Statement شهري → مراجعة → سداد (تحويل بنكي) →\nتجديد الحد الائتماني → تقارير QBR\n```\n\n### 9.3 رحلة منظّم المجموعات\n\n```\nطلب RFQ → استلام عرض مبدئي للرحلة الجماعية → مفاوضة →\nدفع Deposit → رفع Pax List → توزيع المقاعد →\nدفع الـ Balance → استلام Master Itinerary →\nاستلام Individual E-Tickets → السفر → Post-trip feedback\n```\n\n---\n\n## 10. الفوائد لوكالة السفر\n\n### 10.1 الفوائد المالية المباشرة\n\n| الفائدة | التقدير | الإطار الزمني |\n|---|---|---|\n| زيادة GMV | +200-300% | السنة 1 |\n| زيادة AOV عبر Ancillaries | +18-25% | فوري |\n| زيادة AOV عبر Installments | +35-50% | الشهر 3+ |\n| تخفيض Cart Abandonment | -45% | الشهر 1+ |\n| إيراد Corporate جديد | 15-25% من GMV | الشهر 9+ |\n| إيراد FX | 1.5-2.5% من GMV | فوري |\n| تخفيض Chargebacks | من 3.2% إلى < 0.8% | الشهر 3+ |\n| تخفيض تكلفة المعالجة لكل حجز | -60% | فوري |\n\n### 10.2 الفوائد التشغيلية\n\n| الفائدة | الأثر |\n|---|---|\n| سرعة معالجة الحجز | 8-12 دقيقة → 90 ثانية |\n| إنتاجية الوكيل | 3.5x زيادة |\n| تخفيض الأخطاء البشرية | -85% |\n| تخفيض المكالمات لـ Customer Service | -60% |\n| Self-service rate | 75% من الحجوزات |\n| Automation rate (queues) | 85% من العمليات |\n\n### 10.3 الفوائد الاستراتيجية\n\n| الفائدة | القيمة |\n|---|---|\n| منصة قابلة للتوسع لـ 5+ سنوات | لا حاجة لإعادة بناء |\n| دخول 5 أسواق جديدة (خليجية) | فرص نمو ضخمة |\n| 20-30 عميل Corporate | إيراد متكرر مستقر |\n| بيانات استراتيجية (BI) | قرارات أفضل |\n| Brand recognition | منافسة الأكبر |\n\n### 10.4 الفوائد التنافسية\n\n> \"تصبح Jawla قادرة على المنافسة المباشرة مع Almosafer و Wego و Booking.com في الميزات والتكنولوجيا، مع التركيز على نقاط القوة المحلية.\"\n\n| البُعد | Almosafer | Wego | Jawla بعد المشروع |\n|---|---|---|---|\n| Amadeus Enterprise | ✅ | ✅ | **🌟 ✅** |\n| Multi-Currency (10+) | ✅ | ✅ | **🌟 ✅** |\n| BNPL options | محدود | ❌ | **🌟 6+ مزوّدين** |\n| Corporate Credit | ✅ | ❌ | **🌟 ✅** |\n| 🎨 Custom User Dashboards | محدود | ❌ | **🌟 ✅ (ميزة حصرية Enterprise)** |\n| Loyalty مع redemption | ✅ | محدود | **🌟 ✅** |\n| Arabic experience | ✅ | محدود | **🌟 ممتاز (Arabic-first)** |\n| Negotiated Flight Fares محلية | محدود | محدود | **🌟 ✅ (Jawla Exclusive)** |\n\n---\n\n## 11. الجدول الزمني (Timeline)\n\n### 11.1 المدة الإجمالية: 6 أشهر (24 أسبوعًا)\n\n```\nالشهر 1  │■■■■■■■│ Discovery + Architecture + UX\nالشهر 2  │■■■■■■■│ Core Platform + Authentication\nالشهر 3  │■■■■■■■│ Amadeus Enterprise Integration\nالشهر 4  │■■■■■■■│ Payment + Multi-Currency + Corporate\nالشهر 5  │■■■■■■■│ Custom Dashboards + Groups + BI\nالشهر 6  │■■■■■■■│ Testing + Training + Launch\n```\n\n### 11.2 تفصيل المراحل أسبوعيًا\n\n#### المرحلة 1: التأسيس (الأسابيع 1-4)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 1 | Kickoff، Discovery workshops، Stakeholder mapping |\n| 2 | Requirements gathering، User research، Personas |\n| 3 | Information Architecture، Site map، User flows |\n| 4 | Wireframes، Design system kickoff، Tech architecture |\n\n**مسلَّمات نهاية المرحلة:**\n- وثيقة المتطلبات الكاملة\n- IA + Site map\n- Tech architecture document\n- Design system v1\n- Project plan مُفصّل\n\n#### المرحلة 2: التصميم والـ Core Platform (الأسابيع 5-8)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 5 | UI Design (Hi-Fi mockups) — Web responsive |\n| 6 | UI Design — Admin + Corporate Portal + Custom User Dashboards |\n| 7 | Backend setup، Database schema، Auth module |\n| 8 | Frontend foundation، Component library، Routing |\n\n**مسلَّمات:**\n- All UI Designs (Figma)\n- Design system v2\n- Backend skeleton\n- Auth module (مع MFA)\n- Frontend foundation\n\n#### المرحلة 3: تكامل Amadeus Enterprise (الأسابيع 9-12)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 9 | Amadeus Self-Service APIs + Master Pricer Travel Board |\n| 10 | Air Sell + PNR Management + Document Issuance |\n| 11 | EMD + Queue Management + Ancillaries |\n| 12 | Transfers + Car Rental + Tours & Activities + NDC |\n\n**مسلَّمات:**\n- تكامل كامل لـ 67 Amadeus API (للطيران + النقل + الجولات)\n- Flight booking engine يعمل end-to-end\n- إصدار E-Tickets و EMDs\n- Queue management مُفعّل\n\n#### المرحلة 4: الدفع والعملات والـ Corporate (الأسابيع 13-16)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 13 | Multi-Pricing Engine (Cards + Wallets + Banking عبر PayTabs) |\n| 14 | BNPL integrations (6 مزوّدين) + Corporate Credit |\n| 15 | Multi-Currency Engine + FX rate management + Rate Lock |\n| 16 | Corporate Accounts + Approval workflows |\n\n**مسلَّمات:**\n- 15+ خيار دفع متاح\n- 10+ عملات تعمل بأسعار صرف لحظية\n- Corporate Portal كامل\n- Corporate Credit (Net 30/60/90) يعمل\n\n#### المرحلة 5: Custom Dashboards + Groups + BI (الأسابيع 17-20)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 17 | 🎨 Custom User Dashboards Engine (Widgets + Personalization + Theming) |\n| 18 | Personal BI Analytics للعميل + Export/Share |\n| 19 | Group Bookings workflow + Group pricing |\n| 20 | BI Dashboards + Reports + Multi-Branch Admin |\n\n**مسلَّمات:**\n- 🎨 Custom User Dashboards يعمل بالكامل\n- Group Bookings end-to-end\n- BI Dashboards (6 dashboards)\n- Multi-Branch admin\n\n#### المرحلة 6: الاختبار والإطلاق (الأسابيع 21-24)\n\n| الأسبوع | الأنشطة |\n|---|---|\n| 21 | Fraud Detection ML model + Notifications system |\n| 22 | QA كامل (Functional + Performance + Security + UAT) |\n| 23 | Bug fixes + Performance optimization + Training (20 جلسة) |\n| 24 | Soft launch (closed beta) → Full launch + Marketing |\n\n**مسلَّمات:**\n- All QA passed\n- Training completed\n- Documentation complete\n- Soft launch (week 23)\n- Full Production launch (week 24)\n\n### 11.3 Milestones والمعالم الرئيسية\n\n| Milestone | الأسبوع | المُسلَّم |\n|---|---|---|\n| M1 | 4 | Requirements + Architecture |\n| M2 | 8 | Designs + Foundation |\n| M3 | 12 | Amadeus Integration Complete |\n| M4 | 16 | Payment + Multi-Currency + Corporate |\n| M5 | 20 | Custom Dashboards + Groups + BI |\n| M6 | 23 | Soft Launch |\n| M7 | 24 | **🚀 Production Launch** |\n\n### 11.4 المخاطر الزمنية وإدارتها\n\n| الخطر | الاحتمالية | التخفيف |\n|---|---|---|\n| تأخر اعتماد Amadeus | متوسط | البدء بطلب الاعتماد في أسبوع 1 |\n| تأخر integration مع بوابات الدفع | متوسط | parallelize الـ integrations |\n| تأخر اعتمادات الشركاء البنكية | متوسط | تجهيز alternates |\n| تغيير متطلبات من العميل | عالي | تثبيت scope بعد M1 + change request process |\n| نقص resources | منخفض | فريق احتياطي |\n\n---\n\n## 12. جدول الدفع (Payment Schedule)\n\n### 12.1 الإجمالي: 20,000 USD (≈ 1,000,000 EGP)\n\n> سعر الصرف المرجعي: 1 USD = 50 EGP (قد يختلف عند الفوترة الفعلية حسب سعر اليوم)\n\n### 12.2 الدفعات (4 أقساط)\n\n| # | المرحلة | الأسبوع | النسبة | المبلغ بالـ USD | المبلغ بالـ EGP |\n|---|---|---|---|---|---|\n| 1 | **عند توقيع العقد (Down Payment)** | الأسبوع 0 | 30% | **6,000 USD** | **300,000 EGP** |\n| 2 | **عند اكتمال Milestone M2 (Foundation)** | الأسبوع 8 | 25% | **5,000 USD** | **250,000 EGP** |\n| 3 | **عند اكتمال Milestone M4 (Payment + Multi-Currency + Corporate)** | الأسبوع 16 | 25% | **5,000 USD** | **250,000 EGP** |\n| 4 | **عند الإطلاق Production (M7)** | الأسبوع 24 | 20% | **4,000 USD** | **200,000 EGP** |\n| | **الإجمالي** | | **100%** | **20,000 USD** | **1,000,000 EGP** |\n\n### 12.3 شروط الدفع\n\n- جميع الدفعات تُسدد خلال **14 يومًا** من تاريخ الفاتورة\n- يمكن السداد بالـ EGP أو الـ USD حسب اختيار العميل\n- في حال السداد بالـ EGP، يُحتسب سعر الصرف وقت إصدار الفاتورة\n- التأخر عن السداد > 30 يومًا يؤدي إلى إيقاف العمل (لا يُحتسب من المدة الزمنية)\n- التأخر > 60 يومًا قد يؤدي إلى إنهاء العقد\n\n### 12.4 طرق السداد المقبولة\n\n| الطريقة | العملات |\n|---|---|\n| تحويل بنكي محلي | EGP |\n| تحويل دولي (SWIFT) | USD / EUR |\n| Wire transfer | USD |\n| Crypto (USDT/USDC) | USD equivalent |\n\n### 12.5 الفواتير\n\n- فواتير ضريبية رسمية معتمدة\n- VAT/Withholding tax مُدارة وفقًا للقانون المصري\n- إصدار فاتورة قبل كل دفعة بـ 7 أيام\n- بيان حساب شهري\n\n---\n\n## 13. استشاري Amadeus (Amadeus Consultant)\n\n### 13.1 الساعات المُضمّنة: 100-120 ساعة\n\n> هذه الباقة تتضمن أكبر عدد ساعات استشارة Amadeus في خط منتجاتنا — ضعف ما تقدمه أي منافس في المنطقة.\n\n### 13.2 توزيع الساعات\n\n| الفئة | الساعات | الوصف |\n|---|---|---|\n| Pre-Project Audit | 10-15 | تدقيق إعداد Jawla الحالي مع Amadeus |\n| Architecture Consultation | 15-20 | تصميم تكامل enterprise |\n| API Integration Support | 30-35 | مساعدة فنية أثناء التكامل |\n| Master Pricer Setup | 10-15 | إعداد Travel Board بشكل مخصص |\n| PNR & Document Setup | 10-15 | إعداد PNR rules + document templates |\n| Queue Configuration | 5-10 | إعداد القوائم وأتمتتها |\n| NDC Onboarding | 5-10 | تأهيل شركات NDC |\n| Training Sessions | 10-15 | تدريب فريق Jawla |\n| Post-Launch Support | 5-10 | دعم بعد الإطلاق |\n| **الإجمالي** | **100-120** | |\n\n### 13.3 مستوى الاستشاري\n\n- **Senior Amadeus Specialist** — خبرة 10+ سنوات\n- Amadeus Certified Travel Tech Specialist (CTTS)\n- خبرة في تكاملات Enterprise (1A Direct) في المنطقة\n- معرفة عميقة بالسوق المصري والخليجي\n\n### 13.4 طرق الاستشارة\n\n- جلسات Zoom/Teams (مسجّلة)\n- Slack/WhatsApp channel للأسئلة السريعة\n- وثائق مكتوبة وأدلة\n- Code reviews\n- Architecture decision records (ADRs)\n\n### 13.5 الشهادات للفريق\n\n- **3 شهادات Amadeus APIs** لمطوّري Jawla\n- **2 شهادات Amadeus Selling Platform**\n- **1 شهادة Amadeus Reporting & Analytics**\n\n---\n\n## 14. الضمان (Warranty)\n\n### 14.1 مدة الضمان: 12 شهرًا كاملة\n\n> أطول فترة ضمان في خط منتجاتنا — تعكس ثقتنا في جودة العمل.\n\n### 14.2 ما يشمله الضمان\n\n✅ **الأخطاء البرمجية (Bugs)** — إصلاح مجاني خلال SLA\n✅ **مشاكل الأداء** — إذا انخفض الأداء عن المتفق عليه\n✅ **مشاكل الأ عربية والإنجليزية يعمل على الموبايل والكمبيوتر\n- حساب شخصي لكل عميل لمتابعة حجوزاته السابقة والقادمة\n\n### الأرقام الرئيسية\n\n| البند | القيمة |\n|------|--------|\n| السعر الإجمالي | 750,000 جنيه مصري ($15,000) |\n| العملة المعادلة بالدولار | ما يعادل$15,000 دولار أمريكي |\n| مدة التنفيذ | 3 أشهر |\n| تاريخ التسليم المتوقع | 29 سبتمبر 2026 |\n| الصيانة الشهرية | 10,000 جنيه مصري شهرياً |\n| ساعات الاستشارة الخارجية لـ Amadeus | 40 ساعة استشارية |\n| عدد الموظفين المطلوبين | 4 موظفين متفرغين |\n| نسبة المخاطر التقنية | متوسطة (حوالي 25%) |\n\n### القيمة التجارية المتوقعة\n\n- قناة بيع تعمل 24/7 بدون الحاجة لموظفين إضافيين أو مكاتب فرعية\n- تقليل الاعتماد على الوسطاء الخارجيين وتوفير عمولاتهم\n- بيانات العملاء وسجل حجوزاتهم تصبح ملكاً للشركة وتُستخدم في التسويق المستقبلي\n- توسيع نطاق العملاء ليشمل المسافرين خارج القاهرة والمحافظات الكبرى\n- بناء علامة تجارية رقمية قوية تنافس المواقع العالمية في السوق المحلي\n\n### المخاطر الرئيسية وكيف نعالجها\n\n| المخاطرة | المعالجة |\n|----------|----------|\n| تأخر استلام بيانات الربط من شركة Amadeus | بدء إجراءات التعاقد والربط من اليوم الأول وتخصيص مستشار متخصص |\n| تذبذب أسعار صرف العملة الأجنبية | تثبيت السعر بعقد واضح وجدولة الدفعات على ثلاث مراحل |\n| تعقيد التكامل التقني مع أنظمة الحجز العالمية | الاستعانة باستشاري Amadeus لمدة 40 ساعة لضمان جودة التنفيذ |\n| تغيير المتطلبات من جانب العميل أثناء التنفيذ | توثيق المتطلبات بشكل تفصيلي في بداية المشروع واعتمادها رسمياً |\n| تأخر استلام بيانات بوابة الدفع من البنك | البدء في إجراءات التعاقد مع البنك بالتوازي مع بداية التطوير |\n\n### القرار المطلوب من المجلس\n\nالموافقة على اعتماد ميزانية 750,000 جنيه مصري ($15,000) للباقة الأساسية مع 10,000 جنيه شهرياً ($200) للصيانة، والبدء الفوري في تنفيذ المشروع لمدة 3 أشهر.\n\n---\n\n# جولة تورز OTA - وثيقة متطلبات المنتج للباقة الأساسية\n\n## بيانات الوثيقة\n\n| الحقل | القيمة |\n|-------|-------|\n| اسم الوثيقة | جولة تورز OTA - وثيقة متطلبات المنتج للباقة الأساسية |\n| الإصدار | 1.0.0 |\n| التاريخ | 2026-06-29 |\n| الحالة | معتمدة للتطوير |\n| مسؤول الوثيقة | أحمد محمود (قائد المنتج التقني) |\n| الراعي من جهة العمل | الإدارة التنفيذية لـ جولة تورز |\n| قائد الهندسة | يتم تحديده لاحقًا - قائد الـ Backend (NestJS) |\n| قائد التصميم | يتم تحديده لاحقًا - مصمم منتج أول |\n| مستشار تكامل Amadeus | متخصص خارجي (~40 ساعة عمل مخصصة) |\n| التصنيف | داخلي - سري |\n| التوزيع | الهندسة، المنتج، الجودة (QA)، المالية، العمليات |\n| تاريخ المراجعة القادمة | 2026-09-29 |\n\n### سجل المراجعات\n\n| الإصدار | التاريخ | الكاتب | ملخص التغيير |\n|---------|------|--------|----------------|\n| 0.1.0 | 2026-05-15 | أ. محمود | المسودة الأولى بعد ورشة الاستكشاف |\n| 0.5.0 | 2026-06-02 | أ. محمود | إضافة نطاق Amadeus وتنقيح شخصيات المستخدمين |\n| 0.8.0 | 2026-06-18 | أ. محمود | تثبيت مؤشرات الأداء وإضافة مصفوفة الدفع |\n| 1.0.0 | 2026-06-29 | أ. محمود | النسخة النهائية المعتمدة |\n\n### وثائق ذات صلة\n\n- بيان العمل الرئيسي لـ جولة تورز (SOW-2026-001)\n- اتفاقية Amadeus Self-Service API (في انتظار التوقيع)\n- عقد تكامل PayTabs (تم توقيعه في 2026-06-10)\n- دليل العلامة التجارية الإصدار 2.1\n\n---\n\n## الرؤية\n\nستطلق جولة تورز منصة Online Travel Agency (OTA) متخصصة في حجز تذاكر الطيران، جاهزة للإنتاج، تتيح للمسافرين المصريين البحث والحجز والدفع لتذاكر الطيران في تجربة واحدة ثنائية اللغة (عربي/إنجليزي). الباقة الأساسية ترسي الأساس التشغيلي والتقني: محرك حجز حي متصل بـ Amadeus لمخزون الطيران، ووسيلة دفع إقليمية متعددة العملات (PayTabs)، وأداة إدارة داخلية تسمح لفريق العمليات بمتابعة الحجوزات والتدخل عند الحاجة.\n\nالباقة الأساسية محدودة النطاق عن قصد. هي ليست منصة OTA متكاملة الميزات - بل هي الحد الأدنى من المنصة المطلوبة لاستقبال أموال حقيقية من عملاء حقيقيين، وإتمام حجوزات الطيران عبر GDS وموردين حقيقيين، وتسوية الحسابات المالية. أي شيء خارج هذا الأساس (برامج الولاء، استرداد ذاتي للعملاء، تطبيقات الموبايل) مؤجل عن قصد للباقات القادمة حتى نقدر نتحقق من اقتصاديات الوحدة، والعلاقات مع الموردين، ونسب نجاح الدفع، والكفاءة التشغيلية قبل ما نزود التعقيد.\n\nالمنتج لازم يكون شغال ومتعامل عليه ومنتج إيرادات قابلة للتسوية في خلال 8-10 أسابيع من بداية العقد. هدفنا الأساسي هو سرعة الوصول للإيرادات، مش كثرة الميزات. كل قرار موثق في هذه الوثيقة بيعطي الأولوية لإطلاق سطح صغير وموثوق بدل سطح كبير وهش.\n\n---\n\n## الأهداف ومقاييس النجاح\n\n### الأهداف الاستراتيجية\n\n1. **تأسيس OTA منتج للإيرادات**: معالجة 100 حجز حقيقي مدفوع على الأقل في أول 60 يوم من التشغيل الحي.\n2. **إثبات اقتصاديات تكامل Amadeus**: الحفاظ على نسبة look-to-book مع Amadeus تحت الحدود المسموح بها تعاقديًا (المستهدف <300:1) لتجنب رسوم العقوبات.\n3. **التحقق من السوق ثنائي اللغة**: تحقيق نسبة 35% على الأقل من الحجوزات عبر الواجهة العربية للتأكد إن دعم اللغتين فعلي وليس شكلي.\n4. **تقليل مخاطر الدفع**: تحقيق نسبة نجاح دفع أعلى من 85% عبر PayTabs قبل التفكير في بوابات إضافية.\n5. **بناء قدرة تشغيلية داخلية**: تدريب فريق عمليات داخلي من 3-5 موظفين على التعامل مع 100% من استثناءات ما بعد الحجز بدون تصعيد للهندسة بحلول الأسبوع 12.\n\n### مقاييس النجاح (بعد 90 يوم من الإطلاق)\n\n| المقياس | المستهدف | المبرر |\n|--------|--------|-----------|\n| إجمالي قيمة الحجوزات (GBV) | EGP 4.5M | تغطي ~3 أضعاف تكلفة المشروع |\n| الحجوزات المؤكدة | 350+ | تثبت وجود طلب |\n| نسبة نجاح الدفع | >85% | المعيار القياسي لـ OTAs الشرق الأوسط |\n| نسبة التحويل من البحث للحجز | >1.2% | واقعية لعلامة OTA جديدة |\n| متوسط قيمة الطلب (طيران) | EGP 8,500 | خليط من الرحلات المحلية وقصيرة المدى |\n| نسبة الاسترداد/الإلغاء | <12% | أي شيء فوق ذلك يشير لمشكلة في UX أو التسعير |\n| نسبة تذاكر دعم العملاء | <8% من الحجوزات | تشير لوضوح التأكيدات |\n| وقت تشغيل الموقع | 99.5% | باستثناء الصيانة المجدولة |\n| وقت ظهور أول نتيجة (بحث الطيران) | <4.5s p95 | عامل حاسم في التحويل |\n\n---\n\n## شخصيات المستخدمين\n\n| الشخصية | الاسم | العمر | المكان | الأهداف | نقاط الألم |\n|---------|------|-----|----------|-------|-------------|\n| مسافر داخلي للترفيه | مريم السيد | 32 | القاهرة، مصر | حجز رحلات طيران اقتصادية القاهرة-الغردقة لإجازة الأسبوع؛ الدفع ببطاقة Mada المحلية أو الأقساط | مواقع OTA الدولية ترفض بطاقتها؛ المواقع الإنجليزية فقط تربك والديها؛ سياسات الإلغاء غير وأكتب أسماء المطارات بالعربية (مثل \"القاهرة\")، لازم الـ autocomplete يرجع رموز IATA المطابقة (CAI) مرتبة حسب الشعبية.\n- AC-001.3: لما أختار الإنجليزية وأكتب \"Cai\"، لازم الـ autocomplete يرجع Cairo (CAI) و Cairns (CNS) ونتائج أخرى مرتبة حسب حجم الحجوزات.\n- AC-001.4: لما أدخل نقطة الانطلاق والوجهة وتاريخ السفر وعدد المسافرين وأضغط بحث، لازم النظام يستدعي Amadeus Flight Offers Search v2 ويرجع النتائج في خلال 4.5 ثواني p95.\n- AC-001.5: لما يرجع Amadeus صفر نتائج، لازم المستخدم يشوف حالة فارغة مترجمة مع اقتراحات لتواريخ قريبة (+/- 3 أيام).\n\n**US-002: تصفية نتائج الطيران**\n\nكمسافر، أريد تصفية نتائج الطيران حسب التوقفات وشركات الطيران والسعر ووقت الإقلاع حتى أقدر ألاقي الخيار المناسب لي.\n\n- AC-002.1: التصفيات لازم تتطبق client-side على استجابة Amadeus المخزنة (بدون استدعاء جديد لـ Amadeus عند تغيير التصفية) للحفاظ على نسبة look-to-book.\n- AC-002.2: اختيار \"بدون توقفات فقط\" لازم يخفي فورًا النتائج متعددة التوقفات ويحدث العداد المعروض.\n- AC-002.3: شريط السعر لازم يحترم اختيار العميل للعملة (EGP, USD).\n- AC-002.4: لما تجميعة تصفيات ترجع صفر نتائج، لازم CTA \"مسح التصفيات\" يكون بارز.\n\n### الحجز والدفع\n\n**US-004: حجز طيران مع بيانات المسافرين**\n\nكمسافر، أريد إدخال بيانات المسافرين وحجز رحلة محددة حتى أستلم تذكرة مؤكدة.\n\n- AC-004.1: نموذج المسافر لازم يجمع: اللقب، الاسم الأول، اسم العائلة، تاريخ الميلاد، الجنسية، رقم جواز السفر (للرحلات الدولية فقط)، تاريخ انتهاء الجواز، النوع.\n- AC-004.2: الأسماء لازم تتحقق ضد مجموعة أحرف IATA (لاتيني فقط، بدون علامات تشكيل) مع شرح مفيد بالعربية للمستخدمين العرب.\n- AC-004.3: لما المستخدم يكون مسجل دخول ويوصل لمرحلة الدفع، لازم بيانات حسابه المحفوظة تملا حقول المسافر الرئيسي تلقائيًا.\n- AC-004.4: لما المستخدم يرسل الحجز ويفشل Amadeus Flight Create Orders، لازم المستخدم يشوف خطأ واضح ولا يتم خصم منه.\n- AC-004.5: لما يتم إنشاء PNR على Amadeus وينجح الدفع، لازم الحجز يتعلم CONFIRMED والتذكرة تصدر عبر Amadeus Flight Order Management.\n\n**US-006: الدفع عبر PayTabs**\n\nكمسافر، أريد الدفع باستخدام PayTabs (بوابة دفع MENA متعددة العملات تدعم البطاقات المحلية والدولية والمحافظ) حتى أكمل حجزي.\n\n- AC-006.1: النظام لازم يعرض خيارات الدفع المتاحة عبر PayTabs بشكل واضح، ويسمح للمستخدم باختيار طريقة الدفع المناسبة.\n- AC-006.2: مسار PayTabs لازم يدعم Visa و Mastercard و Mada و Meeza و Apple Pay و Google Pay والمحافظ الإلكترونية المحلية.\n- AC-006.3: مسار PayTabs لازم يدعم تحديات 3DS2 و SCA للبطاقات الدولية.\n- AC-006.4: مؤقت حجز 15 دقيقة لازم يثبت السعر والمخزون؛ عند انتهاء الوقت، يتم إعادة المستخدم لصفحة البحث.\n- AC-006.5: عند فشل الدفع، لازم المستخدم يشوف رمز السبب من PayTabs مترجم لعربي/إنجليزي بسيط.\n\n### إدارة الحساب\n\n**US-007: إنشاء حساب**\n\nكمسافر، أريد إنشاء حساب باستخدام إيميل/كلمة مرور أو OTP بالهاتف حتى أحفظ حجوزاتي وبيانات المسافرين.\n\n- AC-007.1: التسجيل بالإيميل لازم يستلزم تحقق الإيميل قبل السماح بالحجز.\n- AC-007.2: OTP بالهاتف لازم يستخدم مزود SMS محلي (Vonage أو Twilio مع gateway موجه لمصر) وينتهي في 5 دقائق.\n- AC-007.3: سياسة كلمة المرور: 10 أحرف كحد أدنى، حرف كبير واحد، رقم واحد، رمز واحد.\n- AC-007.4: الحساب لازم يخزن: الاسم، الإيميل، الهاتف، اللغة المفضلة، العملة المفضلة، بيانات مسافرين محفوظة (حتى 6).\n\n**US-008: عرض حجوزاتي**\n\nكمسافر مسجل، أريد رؤية كل حجوزاتي السابقة والقادمة في قائمة واحدة حتى أرجع للتأكيدات وتواريخ السفر.\n\n- AC-008.1: القائمة لازم تعرض: مرجع الحجز، الحالة، تواريخ السفر، المبلغ الإجمالي، وأزرار الإجراءات (عرض، تحميل التذكرة).\n- AC-008.2: الحجوزات لازم تترتب القادمة أولًا، ثم السابقة تنازليًا.\n- AC-008.3: صفحة تفاصيل كل حجز لازم تعرض كل أسماء المسافرين، خط السير، وإيصال الدفع.\n\n### الإدارة\n\n**US-009: لوحة تحكم الإدارة للحجوزات**\n\nكيارا (موظفة عمليات)، أريد رؤية كل الحجوزات على المنصة مع تصفيات حسب الحالة والتاريخ والعميل حتى أراقب العمليات وأتدخل عند الفشل.\n\n- AC-009.1: اللوحة لازم تعرض عدادات فورية: حجوزات اليوم، PNR قيد الانتظار، مدفوعات فاشلة، طلبات استرداد.\n- AC-009.2: جدول الحجوزات لازم يدعم تصفيات: الحالة (قيد الانتظار، مؤكد، ملغي، مسترد)، نطاق التاريخ، إيميل/هاتف العميل، مرجع الحجز.\n- AC-009.3: الضغط على حجز لازم يكشف سجل التدقيق الكامل: بارامترات البحث، استجابة المورد، أحداث الدفع، سجل إرسال الإيميل.\n- AC-009.4: الموظف لازم يقدر يضيف ملاحظات داخلية تظهر للموظفين فقط.\n\n**US-010: بدء استرداد يدوي**\n\nكيارا، أريد بدء استرداد يدوي من لوحة الإدارة حتى أحل مشاكل العملاء بدون تدخل من الهندسة.\n\n- AC-010.1: زر الاسترداد لازم يظهر فقط على الحجوزات المؤكدة (Confirmed) أو فاشلة الإتمام (Failed-Fulfilment).\n- AC-010.2: الموظف لازم يدخل رمز سبب ومبرر نصي حر.\n- AC-010.3: الاسترداد لازم يستدعي refund API لبوابة PayTabs ويحدث حالة الحجز لـ Refund-Pending.\n- AC-010.4: الاستردادات فوق EGP 10,000 لازم تستلزم موافقة موظف ثاني (4-eyes).\n- AC-010.5: العميل لازم يستلم إيميل مترجم يأكد إن الاسترداد قيد التنفيذ.\n\n### التأكيدات والتواصل\n\n**US-011: إيميل تأكيد الحجز**\n\nكمسافر، أريد استلام إيميل تأكيد بكل تفاصيل الحجز حتى يكون عندي سجل بشرائي.\n\n- AC-011.1: الإيميل لازم يتم إرساله في خلال 60 ثانية من تأكيد الحجز.\n- AC-011.2: لغة الإيميل لازم تطابق لغة الواجهة وقت الحجز.\n- AC-011.3: إيميلات الطيران لازم تشمل: PNR، أرقام التذاكر، خط السير الكامل، ملخص قواعد التعرفة، ومرفق تقويم (.ics).\n- AC-011.4: الإيميلات لازم تظهر بشكل صحيح في Gmail و Outlook و Apple Mail و Yahoo - تم اختبارها عبر Litmus قبل الإطلاق.\n\n---\n\n## متطلبات العمل\n\n| ID | المتطلب | الأولوية | المصدر |\n|----|-------------|----------|--------|\n| BR-001 | المنصة لازم تكون ثنائية اللغة بالكامل (عربي/إنجليزي) مع دعم RTL كامل بما فيه تنسيق العملة وتنسيق التاريخ واتجاه النماذج. | Must | السوق |\n| BR-002 | المنصة لازم تقبل المدفوعات بالجنيه المصري (EGP) عبر PayTabs (بطاقات، محافظ، Meeza، Apple Pay، Google Pay). | Must | المالية |\n| BR-003 | المنصة لازم تقبل المدفوعات بالدولار/اليورو/الريال السعودي/الدرهم الإماراتي عبر PayTabs (بوابة MENA متعددة العملات) لحاملي البطاقات الدولية والإقليمية. | Must | المالية |\n| BR-004 | مخزون الطيران لازم يكون مصدره حصريًا Amadeus Self-Service APIs للباقة الأساسية. | Must | المشتريات |\n| BR-006 | كل الحجوزات لازم تكون قابلة للتسوية من البداية للنهاية: بارامترات البحث -> عرض المورد -> PNR -021 | كل النماذج لازم تشمل تحقق إدخال يدرك العربية (الأسماء العربية مقبولة في الملف الشخصي، اللاتيني مفروض للتذاكر). | Must | المنتج |\n| BR-022 | شروط الخدمة لازم تفصح بوضوح عن دور جولة كوكيل OTA وعن شروط المورد الحاكمة لقواعد التعرفة. | Must | القانوني |\n| BR-023 | الحجوزات الفاشلة (نجاح الدفع، فشل الإتمام) لازم تطلق استرداد تلقائي + تنبيه فوري للعمليات. | Must | العمليات |\n| BR-024 | المنصة لازم لا تخزن CVV أو PAN الكامل أو بيانات الشريط المغناطيسي تحت أي ظرف. | Must | PCI |\n| BR-025 | فريق التطوير لازم يسلم الكود المصدري عبر مستودع GitHub خاص ومملوك لـ جولة مع نقل كامل لحقوق الملكية الفكرية عند الدفعة النهائية. | Must | العقد |\n\n---\n\n## معايير القبول الوظيفية\n\n### FAC-1: حجز طيران من البداية للنهاية\n\nالحجز يعتبر مكتمل وظيفيًا فقط لما كل التالي يكون صحيح:\n1. المستخدم بحث عن الرحلات عبر الواجهة.\n2. المستخدم اختار عرض وانتقل لبيانات المسافرين.\n3. تم استدعاء Amadeus Flight Offers Price للتأكيد إن السعر لا يزال صالحًا.\n4. المستخدم قدم بيانات المسافرين مع تحقق كل الحقول المطلوبة.\n5. تم استلام الدفع عبر PayTabs.\n6. أرجع Amadeus Flight Create Orders PNR مؤكد.\n7. أصدر Amadeus Flight Order Management أرقام التذاكر.\n8. سجل الحجز في قاعدة بيانات جولة بحالة = CONFIRMED.\n9. العميل استلم إيميل التأكيد.\n10. لوحة تحكم الإدارة تعكس الحجز مع سجل التدقيق الكامل.\n\nلو أي خطوة 5-9 فشلت بعد الخطوة 5، النظام لازم يتراجع تلقائيًا (استرداد + تنبيه).\n\n### FAC-3: معايير الاسترداد الوظيفية\n\n1. الاسترداد تم بدؤه بواسطة موظف مفوض عبر لوحة الإدارة.\n2. تم التقاط رمز السبب.\n3. لو المبلغ > EGP 10K، تم تسجيل موافقة ثانية.\n4. تم استدعاء refund API للبوابة بمرجع الدفع الأصلي.\n5. تم تسجيل استجابة البوابة.\n6. تم تحديث حالة الحجز.\n7. تم إخطار العميل.\n8. تم تحديث لوحة تحكم المالية.\n\n### FAC-4: التبديل بين اللغات\n\n1. زر تبديل اللغة متاح على كل صفحة.\n2. تبديل اللغة يحفظ الحالة الحالية للمستخدم (بارامترات البحث، بيانات النموذج).\n3. كل نصوص الواجهة، بما فيها محتوى المورد المحمل ديناميكيًا حيث ممكن، تتبدل.\n4. نمط الـ URL يتحدث: /en/... أو /ar/... لـ SEO.\n5. خصائص HTML `lang` و `dir` تتحدث.\n6. تنسيقات التاريخ والعملة تتلاءم محليًا.\n\n### FAC-5: مصادقة الإدارة\n\n1. تسجيل دخول الإدارة عبر Google Workspace OAuth فقط (لا توجد حسابات إدارة بكلمة مرور).\n2. الدور يتم تعيينه عبر عضوية مجموعة Google Workspace.\n3. انتهاء صلاحية الجلسة بعد 30 دقيقة من عدم النشاط.\n4. كل إجراءات الإدارة تتسجل مع المتصرف والطابع الزمني وعنوان IP.\n\n### FAC-6: وصول الإيميل\n\n1. SPF و DKIM و DMARC مكونة على دومين الإرسال.\n2. webhooks الارتدادات/الشكاوى تتم معالجتها تلقائيًا.\n3. الإيميلات الحرجة (تأكيد الحجز) تعيد المحاولة عند الفشل العابر (3 محاولات على مدى 10 دقائق).\n4. الإيميلات الفاشلة الإرسال تولد تنبيه عمليات مع مرجع الحجز.\n\n---\n\n## مؤشرات الأداء الرئيسية (KPIs)\n\n| KPI | المستهدف | طريقة القياس | المسؤول | تكرار المراجعة |\n|-----|--------|---------------------|-------|----------------|\n| وقت ظهور أول نتيجة بحث (p95) | < 4.5 ثواني | توقيت APM (Datadog/New Relic) على /api/flights/search | الهندسة | أسبوعيًا |\n| نسبة نجاح حجز الطيران | > 92% | (الحجوزات المؤكدة / محاولات الدفع التي اجتازت التحقق) | المنتج | أسبوعيًا |\n| نسبة نجاح الدفع (PayTabs) | > 87% | لوحة تحكم PayTabs + السجلات الداخلية | المالية | يوميًا أول 30 يوم، ثم أسبوعيًا |\n| نسبة Look-to-Book (Amadeus) | < 300:1 | (استدعاءات Search API / الطلبات المؤكدة) لكل شهر تقويمي | الهندسة + المشتريات | يوميًا أول 60 يوم |\n| التحويل من البحث للحجز | > 1.2% | (الحجوزات المؤكدة / جلسات البحث الفريدة) | المنتج | أسبوعيًا |\n| متوسط قيمة الطلب - طيران | > EGP 8,500 | Sum(إجمالي طلبات الطيران) / count(طلبات الطيران) | المالية | شهريًا |\n| نسبة الاسترداد | < 12% | (الحجوزات المستردة / إجمالي الحجوزات المؤكدة) | العمليات | شهريًا |\n| نسبة Chargeback | < 0.6% | تقارير البوابة | المالية | شهريًا |\n| نسبة فتح الإيميل (التأكيدات) | > 65% | تحليلات SendGrid | التسويق | أسبوعيًا |\n| نسبة تذاكر دعم العملاء | < 8% من الحجوزات | نظام Helpdesk (Freshdesk/Zendesk) | العمليات | أسبوعيًا |\n| وقت أول استجابة (الدعم) | < 4 ساعات | SLA الـ Helpdesk | العمليات | أسبوعيًا |\n| وقت تشغيل الموقع | > 99.5% لمعمارية تغطي: الاستضافة، CI/CD، إدارة الأسرار، المراقبة، استراتيجية النسخ الاحتياطي.\n- كل 10 شاشات مصممة لها نسخ عربية وإنجليزية.\n- بيانات اعتماد Amadeus sandbox فعالة وأول استدعاء اختبار موثق.\n\n**قبول M2**\n- بحث Amadeus الحي يرجع نتائج حقيقية على staging.\n- الواجهتين ثنائيتي اللغة.\n- درجة Lighthouse >= 80 على صفحات البحث.\n\n**قبول M3**\n- على الأقل 10 حجوزات اختبار على staging مكتملة للطيران (PNR مولد، تذاكر مصدرة).\n- مدفوعات الاختبار تنجح لـ: PayTabs Visa, PayTabs Mastercard, PayTabs Mada, PayTabs Meeza, PayTabs Apple Pay, PayTabs Google Pay, تحدي PayTabs 3DS.\n- إيميلات التأكيد تظهر بشكل صحيح في 4 عملاء إيميل رئيسيين.\n\n**قبول M4**\n- الإدارة تقدر تعرض وتصفي وتبحث عن الحجوزات.\n- الاسترداد اليدوي تم اختباره ضد staging PayTabs.\n- ملاحظات الموظفين تستمر وتسجل في سجل التدقيق.\n- حسابات المستخدمين تم إنشاؤها، الملفات الشخصية تم تعديلها، قائمة الحجوزات مرئية.\n\n**قبول M5**\n- نص UAT (200+ حالة اختبار) تم تنفيذه بواسطة فريق جولة بنسبة نجاح >95%.\n- مراجعة الأمان: لا توجد نتائج حرجة أو عالية مفتوحة.\n- اختبار الحمل يصمد لـ 100 مستخدم متزامن مع p95 < 6s على الـ endpoints الرئيسية.\n\n**قبول M6**\n- بيئة الإنتاج حية مع المراقبة والتنبيهات والنسخ الاحتياطي مكونة.\n- runbook العمليات تم تسليمه (24+ إجراء موثق).\n- أول 50 حجز عميل حقيقي تمت معالجتها بدون تصعيد للهندسة.\n\n---\n\n## ترتيب أولويات الميزات (MoSCoW)\n\n### Must Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| بحث الطيران عبر Amadeus | محرك الإيرادات الأساسي |\n| حجز الطيران عبر Amadeus (PNR + إصدار التذاكر) | محرك الإيرادات الأساسي |\n| تكامل الدفع PayTabs (متعدد العملات MENA) | متطلب دفع محلي ودولي موحد |\n| الواجهة العربية مع RTL | متطلب السوق |\n| الواجهة الإنجليزية | المغتربين + السياح |\n| حسابات المستخدمين الأساسية (إيميل/كلمة مرور) | تاريخ الحجوزات، الشراء المتكرر |\n| تأكيدات الإيميل | متطلب تشغيلي |\n| لوحة تحكم الإدارة للحجوزات | العمليات لا تقدر تشتغل بدونها |\n| الاستردادات اليدوية (الإدارة) | متطلب خدمة العملاء |\n| معالجة الدفع المتوافقة مع PCI | متطلب قانوني |\n| إيميلات المعاملات مع templating | التأكيدات، إعادة تعيين كلمة المرور |\n| سجل التدقيق | الامتثال |\n| تقارير تسوية الحجوزات | متطلب المالية |\n| ويب متجاوب مع الموبايل | 60%+ من الحركة |\n| عرض العملة (EGP, USD) | متطلب السوق |\n| عرض سياسة الإلغاء قبل الدفع | حماية المستهلك |\n\n### Should Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| تسجيل بـ OTP الهاتف | يقلل الاحتكاك مقارنة بالإيميل فقط |\n| ملفات مسافرين محفوظة | راحة الحجز المتكرر |\n| مرفق التقويم (.ics) في الإيميلات | تحسين UX |\n| تصفيات نتائج البحث (التوقفات، شركات الطيران، السعر) | التحويل |\n| التقاط بيانات التسويق المنسوبة | قياس ROAS |\n| مؤقت الحجز مع تحذيرات | التحويل |\n| أساسيات SEO المحسنة لـ Lighthouse | الاكتساب العضوي |\n\n### Could Have\n\n| الميزة | المبرر |\n|---------|---------------|\n| تسجيل دخول اجتماعي (Google, Apple) | لطيف، مؤجل |\n| قائمة الأمنيات / المفضلة | تفاعل، مش أساسي |\n| رحلات متعددة المراحل أبعد من الذهاب والعودة | حالة استخدام محدودة |\n| ودجت دردشة مباشرة | ممكن plug-and-play (Tawk.to) لكن فريق الدعم يحتاج تدريب |\n\n### Won't Have (في الأساسية - محجوزة للباقات اللاحقة)\n\n| الميزة | الباقة |\n|---------|---------|\n| برنامج الولاء / المحفظة | Professional |\n| إشعارات WhatsApp | Professional |\n| الإلغاء/الاسترداد الذاتي | Professional |\n| تقارير متقدمة ولوحات BI | Professional |\n| بوابة وكلاء B2B | Enterprise |\n| تطبيقات الموبايل (iOS/Android) | Enterprise |\n| محرك تسعير ديناميكي | Enterprise |\n| كشف الاحتيال بـ ML | Enterprise |\n| لوحة تحكم مخصصة للعميل (Custom User Dashboard) | Enterprise |\n| تسوية متعددة الفروع / متعددة العملات | Professional/Enterprise |\n\n---\n\n## خارج النطاق\n\nالتالي صراحة غير مسلم في الباقة الأساسية. أي تضمين يتطلب طلب تغيير (Change Request) بسعر وجدول زمني منفصل:\n\n1. **وحدة حجز الفنادق — تم استبعادها صراحة من جميع باقات المشروع بناءً على طلب العميل**.\n2. **نظام الولاء/المكافآت**: لا نقاط، لا مستويات، لا محفظة، لا آليات إحالة.\n4. **إشعارات WhatsApp**: إيميل فقط.\n5. **الإلغاء/الاسترداد الذاتي للعميل**: كل الإلغاءات والاستردادات لازم تطلب عبر الدعم ويتعامل معها موظف.\n6. **تطبيقات الموبايل**: لا توجد تطبيقات iOS أو Android أصلية. واجهة الويب متجاوبة لكنها ليست PWA قابلة للتثبيت أو لها إشعارات push.\n7. **محرك التسعير الديناميكي / الهامش**: التسعير هو السعر الصافي للمورد + نسبة هامش واحدة قابلة للتكوين. لا توجد تسعيرات قائمة على الطلب أو القواعد.\n8. **لوحة تحكم مخصصة للعميل (Custom User Dashboard)**: متوفرة فقط في باقة Enterprise. الباقة الأساسية تقدم حسابًا بسيطًا وقائمة بسجل الحجوزات دون widgets قابلة للتخصيص أو لوحات مخصصة لكل عميل.\n10. **كشف الاحتيال (قائم على ML)**: مرشحات احتيال على مستوى بوابة PayTabs (3DS، فحوصات احتيال أساسية من البوابة) فقط؛ لا ML داخلي ولا قواعد سرعة.\n11. **الحجوزات الجماعية (>9 مسافرين)**: حجوزات Amadeus الجماعية تتطلب workflows خارج الإنترنت غير مدعومة.\n12. **أدوات حجز الشركات**: لا فرض سياسة سفر، لا فوترة شركات، لا ملفات GDS.\n13. **لوحات BI / تحليلات متقدمة**: فقط exports أساسية وعدادات الإدارة؛ لا تكامل Metabase/Tableau.\n14. **محاسبة متعددة الفروع**: كيان قانوني واحد، حساب بنكي واحد، مصدر إيراد واحد.\n15. **تخزين المخزون مؤقتًا / فهرسة قبل البحث**: البحث في الوقت الفعلي ضد الموردين؛ لا مخزون ثابت أو طبقة تخزين مؤقت بعيدًا عن الجلسة الواحدة.\n16. **محتوى SEO / صفحات Programmatic**: لا صفحات مدن، لا أدلة وجهات، لا blog CMS. الموقع التسويقي يعيش بشكل منفصل.\n17. **بنية اختبار A/B**: لا منصة تجريب.\n18. **إشعارات Push**: ويب push أو موبايل push.\n19. **مكالمات / Click-to-Call / تكامل IVR**.\n20. **لغات متعددة بعد العربية والإنجليزية**: لا فرنسية، لا ألمانية، لا روسية.\n21. **مدفوعات Crypto, BNPL, أقساط بعد الافتراضي لـ PayTabs**.\n22. **محرك ضريبة دولي/VAT**: VAT المصري فقط، مكتوب صراحة.\n23. **هجرة بيانات قديمة**: لو جولة عندها بيانات عملاء/حجوزات موجودة، الهجرة هي مشاركة منفصلة.\n24. **تكامل أجهزة POS**: لمبيعات الفروع المباشرة.\n25. **تكامل Salesforce / HubSpot / CRM**: محدود لنقطة تصدير CSV واحدة لاستخدام التسويق اليدوي.\n\n---\n\n## المخاطر والتخفيف\n\n| ID | المخاطرة | الاحتمال | الأثر | التخفيف | المسؤول |\n|----|------|------------|--------|---------
