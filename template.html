<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jawla Tours · OTA Project Documentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://unpkg.com/html-docx-js/dist/html-docx.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #0f1622;
    --panel-2: #131b2b;
    --border: #1e2a40;
    --text: #e6edf7;
    --muted: #8a98b3;
    --accent: #6ea8ff;
    --accent-2: #9b87ff;
    --success: #34d399;
    --gold: #f4c46b;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .rtl { direction: rtl; font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #2a3852; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 320px; flex-shrink: 0; height: 100vh; position: sticky; top: 0; border-right: 1px solid var(--border); background: var(--panel); overflow-y: auto; }
  .main { flex: 1; min-width: 0; }
  .topbar { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px); background: rgba(11,15,23,0.85); border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; gap: 24px; }
  .brand { display: flex; align-items: center; gap: 12px; padding: 24px 20px; border-bottom: 1px solid var(--border); }
  .brand-logo { width: 56px; height: auto; flex-shrink: 0; display: flex; align-items: center; }
  .brand-logo img { width: 100%; height: auto; display: block; }
  .nav-section { padding: 20px 14px 8px; }
  .nav-section + .nav-section { padding-top: 12px; }
  .nav-label { padding: 8px 12px 2px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .nav-sub { padding: 0 12px 10px; font-size: 10px; color: rgba(138,152,179,0.7); font-style: italic; }
  .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s; background: transparent; border: none; width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: rgba(110,168,255,0.08); color: white; }
  .nav-item.active { background: linear-gradient(90deg, rgba(110,168,255,0.15), rgba(155,135,255,0.08)); border-left: 3px solid var(--accent); color: white; padding-left: 9px; }
  .footer-card { margin: 20px 14px; padding: 14px; border-radius: 10px; background: var(--panel-2); border: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-basic { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-pro { background: rgba(110,168,255,0.15); color: var(--accent); }
  .badge-ent { background: rgba(244,196,107,0.15); color: var(--gold); }
  .footer-card-title { color: white; font-weight: 600; margin-bottom: 4px; }
  .hero { padding: 72px 56px 96px; max-width: 1200px; }
  .hero.rtl { direction: rtl; font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif; }
  .hero.rtl .hero-eyebrow, .hero.rtl .info-title, .hero.rtl .pkg-card-label { letter-spacing: 0; }
  .ota-block { margin: 36px 0 48px; padding: 28px; border-radius: 16px; background: linear-gradient(135deg, rgba(110,168,255,0.08), rgba(155,135,255,0.04)); border: 1px solid var(--border); }
  .ota-block h3 { color: white; font-size: 20px; font-weight: 700; margin: 0 0 12px; }
  .ota-block p { color: #c8d3e8; line-height: 1.8; margin: 8px 0; font-size: 15px; }
  .ota-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 20px; }
  .ota-feat { padding: 14px 16px; background: rgba(15,22,34,0.6); border-radius: 10px; border: 1px solid var(--border); }
  .ota-feat-icon { font-size: 20px; margin-bottom: 6px; }
  .ota-feat-title { color: white; font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .ota-feat-desc { color: var(--muted); font-size: 12px; line-height: 1.5; }
  .hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .hero-title { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; color: white; margin: 0 0 16px; line-height: 1.05; }
  .hero-sub { font-size: 18px; color: var(--muted); max-width: 720px; margin-bottom: 36px; line-height: 1.6; }
  .pkg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 36px; }
  .pkg-card { border: 1px solid var(--border); background: var(--panel); border-radius: 16px; padding: 24px; box-shadow: 0 0 40px rgba(110,168,255,0.06); }
  .pkg-card-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .pkg-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
  .pkg-price { font-size: 24px; font-weight: 700; color: white; }
  .pkg-meta { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .pkg-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .pkg-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .pkg-tag:hover { color: white; border-color: var(--accent); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .info-grid { grid-template-columns: 1fr; } .sidebar { display: none; } .hero-title { font-size: 36px; } }
  .info-card { border: 1px solid var(--border); background: var(--panel); border-radius: 12px; padding: 20px; }
  .info-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; margin-bottom: 12px; }
  .pay-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .pay-num { text-align: center; }
  .pay-pct { font-size: 24px; font-weight: 800; color: white; }
  .pay-lbl { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .stack-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .stack-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); }
  .topbar-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-right: 12px; }
  .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
  .topbar-title { font-size: 22px; font-weight: 700; color: white; display: flex; align-items: center; gap: 12px; margin-top: 2px; }
  .btn { padding: 6px 12px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: #1a2438; border-color: var(--accent); }
  .doc-wrap { padding: 48px 56px 96px; max-width: 1200px; }
  .doc-prose { max-width: 80ch; line-height: 1.75; font-size: 16px; }
  .doc-prose.rtl { max-width: 90ch; }
  .doc-prose h1 { font-size: 2.25rem; font-weight: 800; margin: 2rem 0 1rem; letter-spacing: -0.02em; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
  .doc-prose h2 { font-size: 1.6rem; font-weight: 700; margin: 2.5rem 0 0.75rem; color: #fff; letter-spacing: -0.01em; }
  .doc-prose h3 { font-size: 1.25rem; font-weight: 600; margin: 1.75rem 0 0.5rem; color: #dde6f4; }
  .doc-prose h4 { font-size: 1.05rem; font-weight: 600; margin: 1.25rem 0 0.4rem; color: #c8d3e8; }
  .doc-prose p { margin: 0.8rem 0; color: #c8d3e8; }
  .doc-prose strong { color: #fff; font-weight: 600; }
  .doc-prose em { color: #aebcd6; }
  .doc-prose ul, .doc-prose ol { margin: 0.8rem 0; padding-inline-start: 1.5rem; color: #c8d3e8; }
  .doc-prose li { margin: 0.3rem 0; }
  .doc-prose ul li::marker { color: var(--accent); }
  .doc-prose ol li::marker { color: var(--accent-2); font-weight: 600; }
  .doc-prose a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .doc-prose hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
  .doc-prose blockquote { border-inline-start: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 1rem 0; background: rgba(110, 168, 255, 0.06); color: #c8d3e8; border-radius: 0 8px 8px 0; }
  .doc-prose code { background: #1a2233; color: var(--gold); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
  .doc-prose pre { background: #0a1020; border: 1px solid var(--border); border-radius: 10px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
  .doc-prose pre code { background: transparent; padding: 0; color: #cfd8eb; font-size: 0.85em; }
  .doc-prose table { border-collapse: collapse; margin: 1.25rem 0; width: 100%; font-size: 0.92rem; background: var(--panel-2); border-radius: 10px; overflow: hidden; }
  .doc-prose th { background: #1a2438; color: #fff; font-weight: 600; text-align: start; padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .doc-prose td { padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); color: #c8d3e8; vertical-align: top; }
  .doc-prose tr:last-child td { border-bottom: 0; }
  .doc-prose tr:hover td { background: rgba(110, 168, 255, 0.04); }
  .doc-footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
  @media print {
    body, html { background: #fff !important; color: #000 !important; }
    .no-print, .sidebar, .topbar { display: none !important; }
    .doc-wrap { padding: 0; }
    .doc-prose { max-width: none; color: #000; font-size: 12pt; }
    .doc-prose h1, .doc-prose h2, .doc-prose h3, .doc-prose h4, .doc-prose p, .doc-prose li, .doc-prose td, .doc-prose strong { color: #000 !important; }
    .doc-prose th { background: #f0f0f0 !important; color: #000 !important; }
    .doc-prose table { background: #fff !important; }
    .doc-prose pre { background: #f5f5f5 !important; border-color: #ddd !important; }
    .doc-prose code { background: #f0f0f0 !important; color: #c0392b !important; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script id="docs-data" type="application/json">__DOCS_DATA__</script>
<script>
(function () {
  const DOCS = JSON.parse(document.getElementById('docs-data').textContent);

  const CATEGORIES = [
    { id: 'proposals',  label: 'Client Proposals',     sub: 'عروض العملاء',           icon: '📜', rtl: true },
    { id: 'prds',       label: 'Product Requirements', sub: 'متطلبات المنتج (PRD)',    icon: '🎯', rtl: true },
    { id: 'srs',        label: 'Software Specs',       sub: 'مواصفات النظام (SRS)',    icon: '⚙️', rtl: true },
    { id: 'maintenance',label: 'Maintenance Contracts',sub: 'عقود الصيانة',           icon: '🛡️', rtl: true },
  ];
  const TIERS = [
    { id: 'basic',        label: 'Basic',        short: 'B',   badge: 'badge-basic', price: '$15,000 (~750,000 EGP)',   timeline: '3 months', maint: '10,000 EGP/mo (~$200)' },
    { id: 'professional', label: 'Professional', short: 'PRO', badge: 'badge-pro',   price: '$18,000 (~900,000 EGP)',   timeline: '4 months', maint: '15,000 EGP/mo (~$300)' },
    { id: 'enterprise',   label: 'Enterprise',   short: 'ENT', badge: 'badge-ent',   price: '$20,000 (~1,000,000 EGP)', timeline: '6 months', maint: '20,000 EGP/mo (~$400)' },
  ];
  const KEY = (c, t) => c + '-' + t;

  marked.setOptions({ gfm: true, breaks: false, headerIds: true });

  const $ = (sel, root) => (root || document).querySelector(sel);
  const el = (tag, attrs, children) => {
    const e = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') e.className = v;
      else if (k === 'html') e.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else e.setAttribute(k, v);
    }
    if (children) for (const c of [].concat(children)) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  };

  let active = null;

  function render() {
    const root = $('#app');
    root.innerHTML = '';
    const layout = el('div', { class: 'layout' });
    layout.appendChild(buildSidebar());
    layout.appendChild(buildMain());
    root.appendChild(layout);
  }

  function buildSidebar() {
    const aside = el('aside', { class: 'sidebar no-print' });
    const logo = el('div', { class: 'brand-logo' });
    logo.appendChild(el('img', { src: 'assets/jawla-logo-white.svg', alt: 'Jawla Tours' }));
    aside.appendChild(el('div', { class: 'brand' }, [
      logo,
      el('div', null, [
        el('div', { style: 'font-weight:700;color:#fff;letter-spacing:-0.01em' }, 'Jawla Tours'),
        el('div', { style: 'font-size:12px;color:var(--muted)' }, 'OTA Project · Doc Hub'),
      ]),
    ]));
    for (const cat of CATEGORIES) {
      const section = el('div', { class: 'nav-section' });
      section.appendChild(el('div', { class: 'nav-label' }, [
        el('span', null, cat.icon),
        el('span', null, cat.label),
      ]));
      section.appendChild(el('div', { class: 'nav-sub' }, cat.sub));
      for (const tier of TIERS) {
        const k = KEY(cat.id, tier.id);
        const btn = el('button', {
          class: 'nav-item' + (active === k ? ' active' : ''),
          onclick: () => { active = k; window.location.hash = k; render(); },
        }, [
          el('span', { style: 'font-weight:500' }, tier.label),
          el('span', { class: 'badge ' + tier.badge }, tier.short),
        ]);
        section.appendChild(btn);
      }
      aside.appendChild(section);
    }
    aside.appendChild(el('div', { class: 'footer-card' }, [
      el('div', { class: 'footer-card-title' }, '12 documents'),
      el('div', null, '3 proposals · 3 PRDs · 3 SRS · 3 contracts'),
    ]));
    return aside;
  }

  function buildMain() {
    const main = el('main', { class: 'main' });
    if (!active) {
      main.appendChild(buildHero());
      return main;
    }
    const [catId, ...rest] = active.split('-');
    const tierId = rest.join('-');
    const cat = CATEGORIES.find(c => c.id === catId);
    const tier = TIERS.find(t => t.id === tierId);
    if (!cat || !tier) { main.appendChild(buildHero()); return main; }
    main.appendChild(buildTopbar(cat, tier));
    const wrap = el('div', { class: 'doc-wrap' });
    const md = DOCS[active] || '# Document not found';
    const article = el('article', {
      class: 'doc-prose' + (cat.rtl ? ' rtl' : ''),
      html: DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['target'] }),
    });
    wrap.appendChild(article);
    wrap.appendChild(el('div', { class: 'doc-footer no-print' }, [
      el('span', null, 'Jawla Tours · OTA Documentation · ' + new Date().getFullYear()),
      el('button', { class: 'btn', onclick: () => { active = null; window.location.hash = ''; render(); } }, '← Back to overview'),
    ]));
    main.appendChild(wrap);
    return main;
  }

  function buildTopbar(cat, tier) {
    const bar = el('div', { class: 'topbar no-print' });
    bar.appendChild(el('div', null, [
      el('div', { class: 'topbar-label' }, cat.label),
      el('div', { class: 'topbar-title' }, [
        document.createTextNode(tier.label + ' Package '),
        el('span', { class: 'badge ' + tier.badge }, tier.price),
      ]),
    ]));
    bar.appendChild(el('div', { style: 'display:flex;align-items:center' }, [
      el('div', { class: 'topbar-meta' }, [
        el('span', null, '⏱ ' + tier.timeline),
        el('span', null, '🛠 ' + tier.maint),
      ]),
      el('button', { class: 'btn', onclick: () => window.print() }, '🖨 Print / PDF'),
      el('button', { class: 'btn', style: 'margin-inline-start:8px', onclick: () => exportDocx(cat, tier) }, '📄 Word (.docx)'),
    ]));
    return bar;
  }

  function exportDocx(cat, tier) {
    const key = KEY(cat.id, tier.id);
    const md = DOCS[key] || '';
    const bodyHtml = DOMPurify.sanitize(marked.parse(md), { ADD_ATTR: ['target'] });
    const dir = cat.rtl ? 'rtl' : 'ltr';
    const lang = cat.rtl ? 'ar' : 'en';
    const title = tier.label + ' — ' + cat.label;
    const css = `
      body { font-family: ${cat.rtl ? "'Arial', 'Tahoma', sans-serif" : "'Calibri', 'Arial', sans-serif"}; font-size: 11pt; color: #111; line-height: 1.6; }
      h1 { font-size: 22pt; color: #0b3d91; border-bottom: 2px solid #6ea8ff; padding-bottom: 6pt; margin-top: 18pt; }
      h2 { font-size: 16pt; color: #143b6e; margin-top: 16pt; }
      h3 { font-size: 13pt; color: #1f4e8a; margin-top: 12pt; }
      h4 { font-size: 12pt; color: #2a4d76; margin-top: 10pt; }
      p, li, td, th { font-size: 11pt; }
      table { border-collapse: collapse; width: 100%; margin: 8pt 0; }
      th, td { border: 1px solid #888; padding: 6pt 8pt; vertical-align: top; }
      th { background: #e8eef8; }
      code { font-family: 'Consolas', monospace; background: #f2f2f2; padding: 1pt 3pt; }
      pre { background: #f5f5f5; padding: 8pt; border: 1px solid #ddd; font-family: 'Consolas', monospace; font-size: 9.5pt; }
      blockquote { border-${cat.rtl ? 'right' : 'left'}: 3px solid #6ea8ff; padding: 4pt 10pt; color: #333; background: #f6f9ff; }
      a { color: #0b66c2; text-decoration: underline; }
      hr { border: 0; border-top: 1px solid #ccc; }
    `;
    const html =
      '<!doctype html><html lang="' + lang + '" dir="' + dir + '"><head><meta charset="utf-8"><title>' +
      title + '</title><style>' + css + '</style></head><body>' + bodyHtml + '</body></html>';
    try {
      const blob = window.htmlDocx.asBlob(html, { orientation: 'portrait', margins: { top: 720, right: 720, bottom: 720, left: 720 } });
      window.saveAs(blob, key + '.docx');
    } catch (err) {
      console.error('docx export failed', err);
      alert('Word export failed. Check console.');
    }
  }

  function buildHero() {
    const hero = el('div', { class: 'hero rtl' });
    hero.appendChild(el('div', { class: 'hero-eyebrow' }, 'مركز توثيق المشروع'));
    hero.appendChild(el('h1', { class: 'hero-title' }, 'جولة تورز · منصة حجوزات سفر متكاملة'));
    hero.appendChild(el('p', { class: 'hero-sub' }, 'حزمة كاملة من الوثائق التجارية والهندسية لمشروع منصة الحجز الإلكتروني، مقسّمة على ثلاثة باقات. تتضمن العروض المقدّمة للعميل بالعربية، ومستندات متطلبات المنتج (PRD)، ومواصفات النظام (SRS)، وعقود الصيانة.'));

    const ota = el('div', { class: 'ota-block' });
    ota.appendChild(el('h3', null, 'ما هي منصة OTA لحجز الطيران؟'));
    ota.appendChild(el('p', null, [
      el('strong', null, 'OTA '),
      document.createTextNode('اختصار لـ '),
      el('strong', null, 'Online Travel Agency'),
      document.createTextNode(' أي '),
      el('strong', null, '«وكالة سفر إلكترونية كاملة»'),
      document.createTextNode('. منصّة جولة تورز ستركّز على '),
      el('strong', null, 'حجز الرحلات الجوية فقط'),
      document.createTextNode(' — تتيح للعميل البحث والحجز والدفع لتذاكر الطيران مباشرةً عبر موقع الشركة باستخدام تكامل مباشر مع Amadeus، دون أي تحويل لمواقع خارجية أو اتصال بموظف.'),
    ]));
    ota.appendChild(el('p', null, 'الهدف من المشروع تحويل موقع جولة تورز الحالي إلى منصة حجز طيران متكاملة تعمل على مدار الساعة. وحدة الفنادق مستبعدة من جميع باقات هذا المشروع بناءً على طلب العميل، والتركيز الكامل ينصبّ على وحدة الطيران مع تكامل Amadeus الشامل.'));

    const feats = el('div', { class: 'ota-features' });
    const F = [
      ['✈️', 'بحث الرحلات', 'عرض رحلات الطيران من جميع شركات الطيران عبر Amadeus مع الأسعار اللحظية'],
      ['🎫', 'إصدار التذاكر', 'إنشاء PNR وإصدار التذاكر الإلكترونية مباشرة بعد الدفع'],
      ['💳', 'دفع متعدد العملات', 'إتمام الدفع داخل الموقع عبر PayTabs بأكثر من عملة وبأمان كامل'],
      ['📧', 'تأكيدات تلقائية', 'إرسال التذاكر بالبريد فور إتمام الدفع، وعلى WhatsApp في الباقات المتقدمة'],
      ['👤', 'حساب العميل', 'لوحة تحكم شخصية لإدارة الحجوزات والاطلاع على سجل السفر'],
      ['🌐', 'عربي وإنجليزي', 'دعم كامل للغتين مع تجربة استخدام متجاوبة على جميع الأجهزة'],
    ];
    for (const [i, t, d] of F) {
      feats.appendChild(el('div', { class: 'ota-feat' }, [
        el('div', { class: 'ota-feat-icon' }, i),
        el('div', { class: 'ota-feat-title' }, t),
        el('div', { class: 'ota-feat-desc' }, d),
      ]));
    }
    ota.appendChild(feats);
    hero.appendChild(ota);

    hero.appendChild(el('div', { class: 'hero-eyebrow', style: 'margin-bottom:16px' }, 'الباقات المقترحة'));
    const grid = el('div', { class: 'pkg-grid' });
    const TIER_AR = { basic: 'الأساسية', professional: 'الاحترافية', enterprise: 'المؤسسية' };
    const META_AR = { basic: '3 شهور · صيانة 10,000 ج.م/شهر (~$200)', professional: '4 شهور · صيانة 15,000 ج.م/شهر (~$300)', enterprise: '6 شهور · صيانة 20,000 ج.م/شهر (~$400)' };
    const PRICE_AR = { basic: '$15,000 (~750,000 ج.م)', professional: '$18,000 (~900,000 ج.م)', enterprise: '$20,000 (~1,000,000 ج.م)' };
    const CAT_AR = { proposals: 'العرض', prds: 'PRD', srs: 'SRS', maintenance: 'الصيانة' };
    for (const tier of TIERS) {
      const card = el('div', { class: 'pkg-card' });
      card.appendChild(el('div', { class: 'pkg-card-row' }, [
        el('div', { class: 'pkg-card-label' }, 'الباقة'),
        el('span', { class: 'badge ' + tier.badge }, TIER_AR[tier.id]),
      ]));
      card.appendChild(el('div', { class: 'pkg-price' }, PRICE_AR[tier.id]));
      card.appendChild(el('div', { class: 'pkg-meta' }, META_AR[tier.id]));
      const tags = el('div', { class: 'pkg-tags' });
      for (const c of CATEGORIES) {
        tags.appendChild(el('button', {
          class: 'pkg-tag',
          onclick: () => { active = KEY(c.id, tier.id); window.location.hash = active; render(); },
        }, c.icon + ' ' + CAT_AR[c.id]));
      }
      card.appendChild(tags);
      grid.appendChild(card);
    }
    hero.appendChild(grid);

    const info = el('div', { class: 'info-grid' });
    const pay = el('div', { class: 'info-card' });
    pay.appendChild(el('div', { class: 'info-title' }, 'جدول الدفع'));
    const payGrid = el('div', { class: 'pay-grid' });
    for (const [pct, lbl] of [['30%','عند التوقيع'],['25%','المرحلة 1'],['25%','المرحلة 2'],['20%','التسليم']]) {
      payGrid.appendChild(el('div', { class: 'pay-num' }, [
        el('div', { class: 'pay-pct' }, pct),
        el('div', { class: 'pay-lbl' }, lbl),
      ]));
    }
    pay.appendChild(payGrid);
    info.appendChild(pay);

    const stack = el('div', { class: 'info-card' });
    stack.appendChild(el('div', { class: 'info-title' }, 'البنية التقنية'));
    const stackTags = el('div', { class: 'stack-tags' });
    for (const s of ['Next.js','NestJS','PostgreSQL','Redis','BullMQ','Amadeus','PayTabs','WhatsApp','GCP (client)']) {
      stackTags.appendChild(el('span', { class: 'stack-tag' }, s));
    }
    stack.appendChild(stackTags);
    info.appendChild(stack);
    hero.appendChild(info);

    return hero;
  }

  const hash = window.location.hash.slice(1);
  if (hash && DOCS[hash] !== undefined) active = hash;
  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    active = (h && DOCS[h] !== undefined) ? h : null;
    render();
  });

  render();
})();
</script>
</body>
</html>
